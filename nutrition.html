/* ── MFP text parser ──────────────────────────────── */
function parseMFPText(raw) {
  if (!raw || !raw.trim()) return null;

  // Strip thousands commas
  const clean = t => t.replace(/(\d),(\d{3})/g, '$1$2');
  const allLines = raw.split('\n').map(l => l.trim()).filter(Boolean);

  // Prefer the Totals section if it exists; otherwise scan everything
  // Use LAST occurrence so full-diary pastes give us the daily total, not the first food item
  const totalIdx = allLines.findIndex(l => /^(?:daily\s+)?totals?\s*$/i.test(l));
  const scanLines = totalIdx >= 0 ? allLines.slice(totalIdx, totalIdx + 40) : allLines;

  // Extract first number from a string, ignoring leading non-numeric chars
  function num(s) {
    const m = clean(s).match(/(\d+(?:\.\d+)?)/);
    return m ? parseFloat(m[1]) : 0;
  }

  // Scan lines and keep updating result → naturally returns the LAST occurrence
  function grab(pats, src) {
    let result = 0;
    for (let i = 0; i < src.length; i++) {
      const low = clean(src[i]).toLowerCase();
      let matched = false;
      for (const pat of pats) {
        if (new RegExp(pat, 'i').test(low)) { matched = true; break; }
      }
      if (!matched) continue;
      // Try to get number from same line after the label
      const afterLabel = low.replace(new RegExp(pats[0], 'i'), '');
      const n = num(afterLabel) || num(low);
      if (n) { result = n; continue; }
      // Number might be on the very next line (e.g. MFP stacked format)
      if (i + 1 < src.length) {
        const nxt = num(src[i + 1]);
        if (nxt) { result = nxt; i++; }
      }
    }
    // If nothing found in preferred section, try the whole text as fallback
    if (!result && src !== allLines) {
      for (const pat of pats) {
        const re = new RegExp(pat + '[\\s:•·/]*(\\d+(?:\\.\\d+)?)', 'i');
        const m = clean(raw).match(re);
        // Use matchAll to get the LAST occurrence
        const all = [...clean(raw).matchAll(new RegExp(pat + '[\\s:•·/]*(\\d+(?:\\.\\d+)?)', 'gi'))];
        if (all.length) { result = parseFloat(all[all.length - 1][1]); break; }
      }
    }
    return result;
  }

  // Also scan inline bullet/pipe formats: "Calories 2100 • Protein 165g • Carbs 240g"
  // Pull the LAST inline match for each nutrient
  function grabInline(pats) {
    let result = 0;
    for (const pat of pats) {
      const re = new RegExp(pat + '[\\s:•·,/]*(\\d+(?:\\.\\d+)?)', 'gi');
      const all = [...clean(raw).matchAll(re)];
      if (all.length) { result = parseFloat(all[all.length - 1][1]); break; }
    }
    return result;
  }

  function best(pats) {
    return grab(pats, scanLines) || grabInline(pats);
  }

  const r = {
    kcal: best(['calori(?:es)?', 'energy', '\\bkcal\\b']),
    p:    best(['protein']),
    c:    best(['carbohydrate', 'total carb', '\\bcarbs?\\b']),
    f:    best(['total fat', '(?<![a-z])fat(?![a-z])']),
    fiber:       best(['dietary fiber', 'total fiber', 'fiber', 'fibre']),
    sugar:       best(['total sugar', 'sugars?']),
    sodium:      best(['sodium']),
    cholesterol: best(['cholesterol']),
    potassium:   best(['potassium']),
    satFat:      best(['saturated fat', 'sat\\.? fat']),
    transFat:    best(['trans.?fat']),
    vitA:        best(['vitamin a(?!c)', 'vit a(?!c)']),
    vitC:        best(['vitamin c', 'vit c']),
    vitD:        best(['vitamin d', 'vit d']),
    vitB12:      best(['b-?12', 'cobalamin']),
    calcium:     best(['calcium']),
    iron:        best(['\\biron\\b']),
    magnesium:   best(['magnesium']),
    zinc:        best(['\\bzinc\\b']),
  };

  if (!r.kcal && !r.p && !r.c) return null;
  return r;
}

function runMFPParse() {
  const ta  = document.getElementById('mfpPasteArea');
  const out = document.getElementById('mfpParseResult');
  if (!ta || !out) return;

  const parsed = parseMFPText(ta.value);
  if (!parsed) {
    out.innerHTML = `<div class="mfp-parse-err">
      Couldn't read the numbers — the format might be unusual. Try copying just the <strong>Totals row</strong> at the bottom of your diary (long-press that row), or the <strong>Nutrition summary screen</strong> in MFP. Even just "Calories 2100 Protein 165g Carbs 240g Fat 65g" pasted here will work.
    </div>`;
    _parsedMFP = null;
    return;
  }

  _parsedMFP = parsed;

  const g = v => v > 0 ? `${Math.round(v)}g` : '—';
  const mg = v => v > 0 ? `${Math.round(v)}mg` : null;
  const pct = v => v > 0 ? `${Math.round(v)}%` : null;

  const micros = [
    { lbl: 'Fiber',       val: g(parsed.fiber) },
    { lbl: 'Sugar',       val: g(parsed.sugar) },
    { lbl: 'Sodium',      val: mg(parsed.sodium) },
    { lbl: 'Cholesterol', val: mg(parsed.cholesterol) },
    { lbl: 'Potassium',   val: mg(parsed.potassium) },
    { lbl: 'Sat. Fat',    val: g(parsed.satFat) },
    { lbl: 'Trans Fat',   val: g(parsed.transFat) },
    { lbl: 'Calcium',     val: pct(parsed.calcium) || mg(parsed.calcium) },
    { lbl: 'Iron',        val: pct(parsed.iron) || mg(parsed.iron) },
    { lbl: 'Magnesium',   val: mg(parsed.magnesium) || g(parsed.magnesium) },
    { lbl: 'Zinc',        val: mg(parsed.zinc) || g(parsed.zinc) },
    { lbl: 'Vit A',       val: pct(parsed.vitA) },
    { lbl: 'Vit C',       val: pct(parsed.vitC) },
    { lbl: 'Vit D',       val: pct(parsed.vitD) || mg(parsed.vitD) },
    { lbl: 'Vit B12',     val: pct(parsed.vitB12) || mg(parsed.vitB12) },
  ].filter(m => m.val && m.val !== '—' && m.val !== null);

  const microsHtml = micros.length > 0 ? `
    <div class="mfp-micro-section-lbl">Micronutrients</div>
    <div class="mfp-micro-grid">
      ${micros.map(m => `
        <div class="mfp-micro-item">
          <div class="mfp-micro-val">${m.val}</div>
          <div class="mfp-micro-lbl">${m.lbl}</div>
        </div>`).join('')}
    </div>` : '';

  out.innerHTML = `
    <div class="mfp-preview">
      <div class="mfp-preview-title">◈ Parsed — does this look right?</div>
      <div class="mfp-preview-macros">
        <div class="mfp-macro-chip kcal"><div class="mfp-macro-val">${Math.round(parsed.kcal)||'—'}</div><div class="mfp-macro-lbl">kcal</div></div>
        <div class="mfp-macro-chip prot"><div class="mfp-macro-val">${g(parsed.p)}</div><div class="mfp-macro-lbl">protein</div></div>
        <div class="mfp-macro-chip carb"><div class="mfp-macro-val">${g(parsed.c)}</div><div class="mfp-macro-lbl">carbs</div></div>
        <div class="mfp-macro-chip fat"><div class="mfp-macro-val">${g(parsed.f)}</div><div class="mfp-macro-lbl">fat</div></div>
      </div>
      ${microsHtml}
    </div>
    <button class="mfp-apply-btn" id="mfpApplyBtn">✓ Apply to Today</button>`;
}

function applyQuickEntry() {
  const gn = id => parseFloat(document.getElementById(id) && document.getElementById(id).value) || 0;
  const totalKcal  = gn('qeKcal');
  const totalP     = gn('qeP');
  const totalC     = gn('qeC');
  const totalF     = gn('qeF');
  const totalFiber = gn('qeFiber');
  const totalSugar = gn('qeSugar');
  const totalSodium= gn('qeSodium');

  if (!totalKcal && !totalP) {
    alert('Enter at least Calories and Protein to generate your debrief.'); return;
  }

  // Check if meal breakdown was entered
  const meals = ['breakfast','lunch','dinner','snacks'];
  const hasMeals = meals.some(m => gn(`qe_${m}_kcal`) > 0 || gn(`qe_${m}_p`) > 0);

  logs = [];
  if (hasMeals) {
    // Create one log entry per meal
    meals.forEach(meal => {
      const k = gn(`qe_${meal}_kcal`);
      const p = gn(`qe_${meal}_p`);
      const c = gn(`qe_${meal}_c`);
      const f = gn(`qe_${meal}_f`);
      if (k > 0 || p > 0) {
        logs.push({
          id: Date.now() + Math.random(), meal,
          foodName: `${MEAL_INFO[meal].label} (MFP)`,
          emoji: MEAL_INFO[meal].emoji,
          portionLabel: 'from MyFitnessPal',
          portionG: 0, kcal: k, p, c, f,
          fiber: 0, sugar: 0, satFat: 0, sodium: 0, micros: {},
          ts: new Date().toISOString()
        });
      }
    });
    // Distribute fiber/sugar/sodium into first meal
    if (logs.length > 0) {
      logs[0].fiber  = totalFiber;
      logs[0].sugar  = totalSugar;
      logs[0].sodium = totalSodium;
    }
  } else {
    // Single entry for the whole day
    logs.push({
      id: Date.now(), meal: 'breakfast',
      foodName: 'Today\'s Food (MFP)',
      emoji: '🍽️', portionLabel: 'from MyFitnessPal',
      portionG: 0,
      kcal: totalKcal, p: totalP, c: totalC, f: totalF,
      fiber: totalFiber, sugar: totalSugar, satFat: 0, sodium: totalSodium,
      micros: {}, ts: new Date().toISOString()
    });
  }

  mfpImported = true;
  saveLogs();
  rerender();
}

/* ══════════════════════════════════════════════════════
   DAILY DEBRIEF ENGINE
   ══════════════════════════════════════════════════════ */
function buildDebrief() {
  const tot = calcDayTotals();
  const t   = targets;
  const goal = profile.goal || 'cut';

  if (tot.kcal < 50 && tot.p < 5) return null;  // nothing logged

  let score = 0;
  const wins    = [];
  const issues  = [];
  const tomorrow = [];

  /* ── Protein (most important — 30 pts) ── */
  const pPct = t.p > 0 ? tot.p / t.p * 100 : 0;
  if (pPct >= 95) {
    score += 30;
    wins.push(`Protein nailed — <strong>${r0(tot.p)}g / ${t.p}g (${r0(pPct)}%)</strong>. Every gram is working for you.`);
  } else if (pPct >= 80) {
    score += 18;
    wins.push(`Protein solid — <strong>${r0(tot.p)}g</strong> of ${t.p}g. Good, but squeeze in ${r0(t.p-tot.p)}g more tomorrow.`);
    tomorrow.push(`Add <strong>${r0(t.p-tot.p)}g protein</strong> — that's a Greek yogurt + 1 egg, or 50g chicken.`);
  } else if (pPct >= 60) {
    score += 8;
    issues.push(`Protein low — <strong>${r0(tot.p)}g / ${t.p}g (${r0(pPct)}%)</strong>. Missing ${r0(t.p-tot.p)}g directly ${goal==='cut'?'risks muscle loss':'limits muscle growth'}.`);
    tomorrow.push(`Priority: hit <strong>${t.p}g protein</strong>. Prep a high-protein meal the night before.`);
  } else {
    issues.push(`Protein critically low — <strong>${r0(tot.p)}g / ${t.p}g</strong>. ${goal==='cut'?'Your body will break down muscle for fuel.':'You cannot build muscle without protein.'}`);
    tomorrow.push(`Protein first. Start the day with <strong>40g+ at breakfast</strong> — eggs, Greek yogurt, protein shake.`);
  }

  /* ── Calories (20 pts) ── */
  const kPct = t.kcal > 0 ? tot.kcal / t.kcal * 100 : 0;
  if (kPct >= 90 && kPct <= 110) {
    score += 20;
    wins.push(`Calories on point — <strong>${r0(tot.kcal)} / ${t.kcal} kcal</strong>.`);
  } else if (kPct < 70) {
    score += 5;
    if (goal === 'cut' || goal === 'mini_cut') {
      issues.push(`Under by <strong>${r0(t.kcal-tot.kcal)} kcal</strong>. Aggressive deficit can stall fat loss and destroy muscle. Don't starve.`);
    } else {
      issues.push(`Under by <strong>${r0(t.kcal-tot.kcal)} kcal</strong>. You can't build in a deficit — you're leaving gains on the table.`);
      tomorrow.push(`Add a <strong>${r0(t.kcal-tot.kcal)} kcal meal</strong> — rice, oats, or fruit fill gaps fast.`);
    }
  } else if (kPct < 90) {
    score += 12;
    if (goal === 'bulk') {
      issues.push(`Slightly under calories — <strong>${r0(tot.kcal)} / ${t.kcal} kcal</strong>. Fine for a cut, but you're bulking.`);
    }
  } else if (kPct > 115) {
    score += 6;
    if (goal === 'cut' || goal === 'mini_cut') {
      issues.push(`Over by <strong>${r0(tot.kcal-t.kcal)} kcal</strong>. This wipes out your deficit. ${kPct>130?'Significantly over — assess what spiked it.':''}`);
      tomorrow.push(`Identify what pushed you over. Cut liquid calories, sauces, or cooking oil first.`);
    } else {
      wins.push(`Calories slightly high — fine for bulking. Watch it doesn't become a habit of dirty bulking.`);
    }
  } else {
    score += 15;
  }

  /* ── MPS per meal (15 pts) ── */
  const activeMeals = Object.keys(MEAL_INFO).filter(m => logs.some(l => l.meal === m));
  if (activeMeals.length > 0 && (goal !== 'maintain')) {
    const mpsHits = activeMeals.filter(m => mealTotals(m).p >= 30);
    const mpsScore = Math.round((mpsHits.length / activeMeals.length) * 15);
    score += mpsScore;
    if (mpsHits.length === activeMeals.length && activeMeals.length >= 2) {
      wins.push(`Every meal hit the <strong>30g MPS threshold</strong> — maximum muscle protein synthesis all day.`);
    } else if (mpsHits.length < activeMeals.length) {
      const missed = activeMeals.filter(m => mealTotals(m).p < 30)
        .map(m => `${MEAL_INFO[m].emoji} ${MEAL_INFO[m].label} (${r0(mealTotals(m).p)}g)`).join(', ');
      issues.push(`Below MPS threshold in: <strong>${missed}</strong>. Under 30g protein = no muscle protein synthesis that meal.`);
      tomorrow.push(`Add protein to those meals. Even 2 eggs or 100g cottage cheese closes the gap.`);
    }
  }

  /* ── Fiber (10 pts) ── */
  const fibPct = t.fiber > 0 ? tot.fiber / t.fiber * 100 : 0;
  if (fibPct >= 90) {
    score += 10;
    wins.push(`Fiber excellent — <strong>${r1(tot.fiber)}g / ${t.fiber}g</strong>. Gut health, satiety, and hormones all benefit.`);
  } else if (fibPct >= 60) {
    score += 5;
  } else {
    issues.push(`Fiber low — <strong>${r1(tot.fiber)}g / ${t.fiber}g</strong>. Low fiber = poor satiety on a cut, slower digestion, worse microbiome.`);
    tomorrow.push(`Add a vegetable to every meal. Broccoli, spinach, and oats are the fastest fiber wins.`);
  }

  /* ── Sodium (10 pts) ── */
  if (tot.sodium <= 2300) {
    score += 10;
    if (tot.sodium > 0) wins.push(`Sodium in range — <strong>${r0(tot.sodium)}mg / 2300mg</strong>. No water retention from diet.`);
  } else if (tot.sodium <= 3000) {
    score += 4;
    issues.push(`Sodium slightly high — <strong>${r0(tot.sodium)}mg</strong>. Expect ~0.5kg of water weight on the scale tomorrow.`);
  } else {
    issues.push(`Sodium very high — <strong>${r0(tot.sodium)}mg / 2300mg limit</strong>. Scale could jump 1–2kg from water. Drink an extra litre of water today.`);
    tomorrow.push(`Cut sodium: avoid processed food, sauces, and canned goods for one day to flush it out.`);
  }

  /* ── Sugar (5 pts) ── */
  if (tot.sugar <= 50) {
    score += 5;
  } else {
    issues.push(`Sugar over limit — <strong>${r1(tot.sugar)}g / 50g</strong>. Spikes insulin and can cause energy crashes.`);
  }

  /* ── WHOOP recovery cross-reference ── */
  if (whoop.recovery != null) {
    if (whoop.recovery < 50) {
      issues.push(`WHOOP recovery at <strong>${r0(whoop.recovery)}%</strong> — your body needed more recovery fuel. Eating in a hard deficit on low-HRV days suppresses adaptation.`);
    } else if (whoop.recovery >= 80) {
      wins.push(`WHOOP recovery at <strong>${r0(whoop.recovery)}%</strong> — your body is primed. High-quality food is amplifying it.`);
    }
  }

  score = Math.min(100, Math.max(0, score));

  // Grade
  const grade = score >= 88 ? {word:'Elite',   color:'#6BE3A4'} :
                score >= 72 ? {word:'Strong',   color:'#7DD3FC'} :
                score >= 55 ? {word:'Solid',    color:'#F2C063'} :
                score >= 38 ? {word:'Average',  color:'#FF8C69'} :
                              {word:'Needs Work',color:'#FF6B6B'};

  return { score, grade, wins, issues, tomorrow };
}

function renderDebrief() {
  const el = document.getElementById('debriefCard');
  if (!el) return;
  const d = buildDebrief();
  if (!d) {
    el.innerHTML = `<div class="debrief-no-data">Log your food or import from MFP to generate your daily debrief.</div>`;
    return;
  }

  const winsHtml = d.wins.map(w =>
    `<div class="debrief-item"><span class="debrief-item-icon">✅</span><span>${w}</span></div>`).join('');
  const issuesHtml = d.issues.map(i =>
    `<div class="debrief-item"><span class="debrief-item-icon">❌</span><span>${i}</span></div>`).join('');
  const tmrHtml = d.tomorrow.map(t =>
    `<div class="debrief-item"><span class="debrief-item-icon">→</span><span>${t}</span></div>`).join('');

  el.innerHTML = `
    <div class="debrief-header">
      <div class="debrief-score-wrap">
        <span class="debrief-score-num" style="color:${d.grade.color}">${d.score}</span>
        <span class="debrief-score-denom">/ 100</span>
      </div>
      <div class="debrief-grade">
        <span class="debrief-grade-label">Today's Rating</span>
        <span class="debrief-grade-word" style="color:${d.grade.color}">${d.grade.word}</span>
      </div>
    </div>
    <div class="debrief-body">
      ${d.wins.length ? `<div><div class="debrief-section-label">What you nailed</div><div class="debrief-items">${winsHtml}</div></div>` : ''}
      ${d.issues.length ? `<div><div class="debrief-section-label">What needs work</div><div class="debrief-items">${issuesHtml}</div></div>` : ''}
      ${d.tomorrow.length ? `
        <div class="debrief-tomorrow">

      <div class="ps-preview-cell"><div class="ps-pval" style="color:var(--col-protein)" id="psP">${r1(nutr.p)}</div><div class="ps-plabel">protein g</div></div>
      <div class="ps-preview-cell"><div class="ps-pval" style="color:var(--col-carbs)"   id="psC">${r1(nutr.c)}</div><div class="ps-plabel">carbs g</div></div>
      <div class="ps-preview-cell"><div class="ps-pval" style="color:var(--col-fat)"     id="psF">${r1(nutr.f)}</div><div class="ps-plabel">fat g</div></div>
      <div class="ps-preview-cell"><div class="ps-pval" id="psFiber">${r1(nutr.fiber)}</div><div class="ps-plabel">fiber g</div></div>
      <div class="ps-preview-cell"><div class="ps-pval" id="psSodium">${r0(nutr.sodium)}</div><div class="ps-plabel">sodium mg</div></div>
    </div>
    ${microsNote ? `<div class="ps-micros-note">${microsNote}</div>` : ''}
    <button class="ps-log-btn" id="psLogBtn">Log to ${MEAL_INFO[logMeal].label}</button>`;

  // Live update on qty/unit change
  document.getElementById('psQty').addEventListener('input', updatePortionPreview);
  document.getElementById('psUnit').addEventListener('change', updatePortionPreview);
}

function updatePortionPreview() {
  const food = allFoods()[sheetFidx];
  if (!food) return;
  const qty  = parseFloat(document.getElementById('psQty').value) || 1;
  const unit = document.getElementById('psUnit').value;
  sheetUnit  = unit;
  sheetG     = unitToGrams(food, qty, unit);
  const nutr = portionNutrition(food, sheetG);
  document.getElementById('psKcal').textContent   = r0(nutr.kcal);
  document.getElementById('psP').textContent      = r1(nutr.p);
  document.getElementById('psC').textContent      = r1(nutr.c);
  document.getElementById('psF').textContent      = r1(nutr.f);
  document.getElementById('psFiber').textContent  = r1(nutr.fiber);
  document.getElementById('psSodium').textContent = r0(nutr.sodium);
}

function logPortionedFood() {
  const food  = allFoods()[sheetFidx];
  if (!food) return;
  const qty   = parseFloat(document.getElementById('psQty').value) || 1;
  const unit  = document.getElementById('psUnit').value;
  const grams = unitToGrams(food, qty, unit);
  const nutr  = portionNutrition(food, grams);
  const label = `${qty} ${unit} (${r0(grams)}g)`;
  logs.push({
    id: Date.now(), meal: logMeal,
    foodName: food.name, emoji: food.emoji||'🍽️',
    portionLabel: label, portionG: grams,
    kcal: nutr.kcal, p: nutr.p, c: nutr.c, f: nutr.f,
    fiber: nutr.fiber, sugar: nutr.sugar, satFat: nutr.satFat,
    sodium: nutr.sodium, micros: nutr.micros,
    ts: new Date().toISOString()
  });
  saveLogs();
  closePortionSheet();
  rerender();
}

function saveSettings() {

  const ph = document.getElementById('setPhase').value;
  profile.phaseStartDate = ph || null;

/* ── Log weight ─────────────────────────────────────── */
function logWeight(val) {
  if (!val || isNaN(val)) return;
  const kg = profile.weightUnit === 'lb' ? val / 2.20462 : val;
  weightKg = kg;
  const today = todayStr();
  const wh = profile.weeklyWeightHistory || [];
  const existing = wh.find(w => w.date === today);
  if (existing) existing.kg = +kg.toFixed(2);
  else wh.push({ date: today, kg: +kg.toFixed(2) });
  profile.weeklyWeightHistory = wh.slice(-60);
  saveProfile();
  commitTodayToHistory(+kg.toFixed(2));
  rerender();
}

/* ── Delete log entry ───────────────────────────────── */
function deleteLog(id) {
  logs = logs.filter(l => String(l.id) !== String(id));
  saveLogs();
  rerender();
}

/* ── Event delegation ───────────────────────────────── */
function initEvents() {
  const body = document.body;

  body.addEventListener('click', e => {
    // MFP clear
    if (e.target.id === 'mfpClearBtn') {
      logs = []; mfpImported = false; saveLogs(); rerender(); return;
    }
    // Import tab switch
    const itab = e.target.closest('[data-itab]');
    if (itab) { importTab = itab.dataset.itab; renderImport(); return; }
    // Paste tab: parse button and apply button
    if (e.target.id === 'mfpParseBtn') { runMFPParse(); return; }
    if (e.target.id === 'mfpApplyBtn') { applyPasteEntry(); return; }

    // Food buttons → open portion sheet
    const fb = e.target.closest('.food-btn, .recent-chip');
    if (fb) {
      const fidx = parseInt(fb.dataset.fidx, 10);
      if (!isNaN(fidx)) { logMeal = logMeal || currentMealByTime(); openPortionSheet(fidx); return; }
    }

    // Log portion
    if (e.target.id === 'psLogBtn') { logPortionedFood(); return; }

    // Close portion sheet
    if (e.target.id === 'portionBackdrop') { closePortionSheet(); return; }

    // Close settings sheet
    if (e.target.id === 'settingsBackdrop') { closeSettingsSheet(); return; }

    // Goal badge → open settings
    if (e.target.id === 'goalBadgeBtn' || e.target.closest('#goalBadgeBtn')) {
      openSettingsSheet(); return;
    }

    // Settings save
    if (e.target.id === 'settingsSaveBtn') { saveSettings(); return; }

    // Meal header toggle
    const mh = e.target.closest('.meal-header');
    if (mh) {
      const meal = mh.dataset.meal;
      openMeals[meal] = !openMeals[meal];
      renderMeals(); return;
    }

    // Add food to meal → scroll to log section + preselect meal
    const am = e.target.closest('[data-addmeal]');
    if (am) {
      logMeal = am.dataset.addmeal;
      document.getElementById('logFoodCard').scrollIntoView({behavior:'smooth', block:'start'});
      renderLogFood(); return;
    }

    // Meal chip (log food section)
    const mc = e.target.closest('[data-chipmeal]');
    if (mc) { logMeal = mc.dataset.chipmeal; renderLogFood(); return; }

    // Delete log item
    const dl = e.target.closest('[data-lid]');
    if (dl) { deleteLog(dl.dataset.lid); return; }

    // Macro/Micro tab
    const tb = e.target.closest('[data-tab]');
    if (tb) { macroTab = tb.dataset.tab; renderMacrosMicros(); return; }

    // Log weight button
    if (e.target.id === 'logWeightBtn') {
      const v = parseFloat(document.getElementById('weightInput').value);
      logWeight(v); return;
    }

    // Use adaptive TDEE
    const ua = e.target.closest('#useAdaptiveTDEE');
    if (ua) { profile.tdeeOverride = parseInt(ua.dataset.rtdee, 10); saveProfile(); rerender(); return; }

    // Refeed button
    if (e.target.id === 'refeedBtn') {
      alert('Refeed day scheduled! Tomorrow\'s calorie target will be ' + targets.tdee + ' kcal with extra carbs.');
      return;
    }

    // Insight bars tooltip
    const ib = e.target.closest('.insight-bar');
    if (ib) {
      const dayIdx = parseInt(ib.dataset.day, 10);
      const days = [];
      for (let i=6;i>=0;i--) {
        const d=new Date(); d.setDate(d.getDate()-i);
        const ds=d.toISOString().split('T')[0];
        const h=history.find(e=>e.date===ds);
        days.push({label:d.toLocaleDateString([],{weekday:'long'}), kcal:h?h.kcal:(i===0?r0(calcDayTotals().kcal):0), p:h?h.p:(i===0?r0(calcDayTotals().p):0)});
      }
      const day = days[dayIdx];
      const tt  = document.getElementById('insightTooltip');
      if (tt) {
        tt.style.display = 'block';
        tt.innerHTML = `<strong>${day.label}</strong> · ${day.kcal} kcal · ${day.p}g protein`;
        setTimeout(() => { tt.style.display='none'; }, 2500);
      }
      return;
    }
  });

  // Food search
  body.addEventListener('input', e => {
    if (e.target.id === 'foodSearch') { foodQuery = e.target.value; renderLogFood(); }
  });

  // Custom food save
  body.addEventListener('click', e => {
    if (e.target.id === 'customSaveBtn') {
      const name = (document.getElementById('cfName').value||'').trim();
      const kcal = parseFloat(document.getElementById('cfKcal').value)||0;
      const p    = parseFloat(document.getElementById('cfP').value)||0;
      const c    = parseFloat(document.getElementById('cfC').value)||0;
      const f    = parseFloat(document.getElementById('cfF').value)||0;
      if (!name || !kcal) return;
      const fd = {name, emoji:'🍽️', kcal, p, c, f, fiber:0, sugar:0, satFat:0, sodium:0, servingG:100, servingLabel:'100g', micros:{}};
      custom.push(fd);
      saveCustom();
      document.getElementById('cfName').value = '';
      document.getElementById('cfKcal').value = '';
      document.getElementById('cfP').value = '';
      document.getElementById('cfC').value = '';
      document.getElementById('cfF').value = '';
      renderLogFood();
    }
  });

  // Weight input: press Enter to log
  body.addEventListener('keydown', e => {
    if (e.key === 'Enter' && e.target.id === 'weightInput') {
      const v = parseFloat(e.target.value);
      logWeight(v);
    }
  });

  // Save history on page hide
  document.addEventListener('visibilitychange', () => {
    if (document.visibilityState === 'hidden') commitTodayToHistory(null);
  });
}

/* ── Init ───────────────────────────────────────────── */
async function init() {
  loadLogs();
  loadCustom();
  loadProfile();
  loadHistory();
  await loadWhoop();

  // Default open = current meal
  Object.keys(openMeals).forEach(m => openMeals[m] = false);
  openMeals[currentMealByTime()] = true;
  logMeal = currentMealByTime();

  rerender();
  initEvents();

  // Refresh every minute
  setInterval(rerender, 60000);

  // Cloud sync
  if (window.initCloudSync) {
    window.initCloudSync({
      appKey: 'nutrition',
      syncedKeys: ['nut:logs','nut:custom','nut:profile','nut:history'],
      onApplied: () => {
        loadLogs(); loadCustom(); loadProfile(); loadHistory();
        rerender();
      }
    });
  }
}

document.addEventListener('DOMContentLoaded', init);

})(); // end IIFE
</script>
</body>
</html>

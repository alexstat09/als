<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>Nutrition · ALS</title>
  <meta name="theme-color" content="#050507">
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="apple-touch-icon.png">
  <link rel="stylesheet" href="aurora.css">
  <script src="topbar.js" defer></script>
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
    :root{ --nu:124,211,252; } /* nutrition accent (sky) */
    html,body{min-height:100%;}
    body{ background:#050507; color:var(--au-ivory,#F4F1EA); font-family:var(--au-sans,-apple-system,system-ui,sans-serif); padding:0 0 calc(92px + env(safe-area-inset-bottom)); }

    .nuh{max-width:620px;margin:0 auto;padding:24px 18px 6px;display:flex;align-items:flex-start;justify-content:space-between;gap:14px;}
    .nuh-line{font-family:var(--au-serif,Georgia,serif);font-style:italic;font-size:clamp(23px,6vw,30px);line-height:1.08;color:var(--au-ivory,#F4F1EA);}
    .nuh-eyebrow{font-family:var(--au-mono,ui-monospace,monospace);font-size:9px;font-weight:700;letter-spacing:.2em;text-transform:uppercase;color:rgba(244,241,234,.4);margin-bottom:10px;}
    .nuh .nova{width:66px;height:66px;flex:none;margin-top:2px;}

    .wrap{max-width:620px;margin:0 auto;padding:8px 16px;display:flex;flex-direction:column;gap:14px;}

    .datenav{display:flex;align-items:center;justify-content:center;gap:14px;padding:2px 0 4px;}
    .datenav button{background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.1);color:#F4F1EA;width:34px;height:34px;border-radius:50%;font-size:16px;cursor:pointer;}
    .datenav button:active{background:rgba(255,255,255,.12);}
    .datenav-lbl{font-family:var(--au-mono,ui-monospace,monospace);font-size:12px;font-weight:700;letter-spacing:.05em;color:#F4F1EA;min-width:140px;text-align:center;text-transform:uppercase;}
    .datenav-today{font-family:var(--au-mono,ui-monospace);font-size:9px;color:rgb(var(--nu));background:none;border:none;cursor:pointer;padding:6px;text-transform:uppercase;letter-spacing:.1em;font-weight:700;}

    .card{position:relative;background:rgba(255,255,255,.028);border:1px solid rgba(255,255,255,.08);border-radius:18px;backdrop-filter:blur(14px);overflow:hidden;}
    .card::before{content:'';position:absolute;top:0;left:8%;right:8%;height:1px;background:linear-gradient(90deg,transparent,rgba(var(--nu),.5),transparent);pointer-events:none;}
    /* Adaptive Energy card */
    .en-hdr{font-family:var(--au-mono,ui-monospace);font-size:10px;letter-spacing:.12em;text-transform:uppercase;color:rgba(244,241,234,.5);margin-bottom:11px;}
    .en-row{display:flex;gap:14px;align-items:baseline;margin-bottom:14px;flex-wrap:wrap;}
    .en-stat .en-val{font-size:22px;font-weight:800;color:#F4F1EA;font-family:var(--au-mono,ui-monospace);line-height:1;}
    .en-stat .en-lbl{font-size:10px;color:rgba(244,241,234,.45);margin-top:4px;}
    .goal-seg-wrap{display:flex;gap:7px;}
    .goal-seg{flex:1;padding:12px 4px;border-radius:12px;border:1px solid rgba(255,255,255,.14);background:rgba(255,255,255,.04);color:#F4F1EA;font-family:inherit;font-size:13.5px;font-weight:700;cursor:pointer;-webkit-tap-highlight-color:transparent;transition:background .15s,border-color .15s,transform .1s;}
    .goal-seg.on{border-color:rgb(var(--nu));background:rgba(52,226,176,.18);box-shadow:0 0 0 2px rgba(52,226,176,.12);}
    .goal-seg:active{transform:scale(.96);background:rgba(52,226,176,.28);}
    .en-rate{margin-top:11px;font-size:12px;color:rgba(244,241,234,.62);text-align:center;}
    .en-note{margin-top:11px;font-size:11.5px;color:rgba(244,241,234,.45);line-height:1.5;}

    .sum{padding:18px;}
    .sum-top{display:flex;align-items:center;gap:18px;}
    .sum-ring{position:relative;width:104px;height:104px;flex:none;}
    .sum-ring svg{transform:rotate(-90deg);}
    .sum-ring-in{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;}
    .sum-kcal{font-family:var(--au-mono,ui-monospace);font-size:27px;font-weight:700;color:#F4F1EA;line-height:1;letter-spacing:-.02em;}
    .sum-kcal-lbl{font-family:var(--au-mono,ui-monospace);font-size:8px;font-weight:700;letter-spacing:.16em;text-transform:uppercase;color:rgba(244,241,234,.4);margin-top:4px;}
    .sum-macros{flex:1;min-width:0;display:flex;flex-direction:column;gap:11px;}
    .mac-top{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:5px;font-family:var(--au-mono,ui-monospace);font-size:10px;letter-spacing:.04em;}
    .mac-name{font-weight:700;text-transform:uppercase;color:rgba(244,241,234,.6);}
    .mac-val{color:rgba(244,241,234,.85);}
    .mac-track{height:7px;border-radius:4px;background:rgba(255,255,255,.07);overflow:hidden;}
    .mac-fill{height:100%;border-radius:4px;transition:width .4s ease;}
    .mac.p .mac-fill{background:#34E2B0;} .mac.c .mac-fill{background:#F2C063;} .mac.f .mac-fill{background:#9B8CFF;}
    .micros{display:flex;gap:8px;margin-top:16px;}
    .micro{flex:1;text-align:center;background:rgba(255,255,255,.03);border-radius:11px;padding:9px 4px;}
    .micro-v{font-family:var(--au-mono,ui-monospace);font-size:14px;font-weight:700;color:#F4F1EA;}
    .micro-l{font-family:var(--au-mono,ui-monospace);font-size:7.5px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:rgba(244,241,234,.4);margin-top:3px;}

    .meal{padding:0 0 4px;}
    .meal-hdr{display:flex;align-items:center;justify-content:space-between;padding:13px 14px 9px;}
    .meal-name{font-family:var(--au-serif,Georgia,serif);font-style:italic;font-size:19px;color:#F4F1EA;}
    .meal-kcal{font-family:var(--au-mono,ui-monospace);font-size:11px;font-weight:700;color:rgba(244,241,234,.5);}
    .meal-add{background:rgba(var(--nu),.12);border:1px solid rgba(var(--nu),.32);color:rgb(var(--nu));width:30px;height:30px;border-radius:50%;font-size:19px;line-height:1;cursor:pointer;flex:none;}
    .meal-add:active{background:rgba(var(--nu),.22);}
    .meal-hdr-r{display:flex;align-items:center;gap:12px;}
    .entry{display:flex;align-items:center;gap:10px;padding:11px 14px;border-top:1px solid rgba(255,255,255,.05);cursor:pointer;}
    .entry:active{background:rgba(255,255,255,.03);}
    .entry-main{flex:1;min-width:0;}
    .entry-name{font-size:13.5px;font-weight:600;color:#F4F1EA;line-height:1.25;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
    .entry-sub{font-family:var(--au-mono,ui-monospace);font-size:10px;color:rgba(244,241,234,.42);margin-top:2px;}
    .entry-kcal{font-family:var(--au-mono,ui-monospace);font-size:13px;font-weight:700;color:rgba(244,241,234,.8);flex:none;}
    .entry-del{flex:none;background:none;border:none;color:rgba(255,107,139,.7);font-size:15px;cursor:pointer;padding:4px 2px;}
    .meal-empty{padding:6px 14px 12px;font-family:var(--au-serif,Georgia,serif);font-style:italic;font-size:13px;color:rgba(244,241,234,.32);}

    /* explicit height (not just max-height) so the flex column doesn't collapse
       to near-zero on iOS — same fix as the Nova popup. */
    dialog.nu-sheet{position:fixed;inset:0;margin:auto;width:min(560px,calc(100% - 20px));max-width:min(560px,calc(100% - 20px));height:88vh;height:88dvh;max-height:88dvh;padding:0;border:1px solid rgba(var(--nu),.3);border-radius:22px;background:linear-gradient(180deg,#0b0e13,#080a0e);color:inherit;overflow:hidden;box-shadow:0 30px 80px rgba(0,0,0,.7);}
    dialog.nu-sheet[open]{display:flex;flex-direction:column;}
    dialog.nu-sheet::backdrop{background:rgba(3,4,6,.66);-webkit-backdrop-filter:blur(6px);backdrop-filter:blur(6px);}
    .sh-top{display:flex;align-items:center;gap:10px;padding:16px 16px 12px;border-bottom:1px solid rgba(255,255,255,.07);}
    .sh-title{font-family:var(--au-serif,Georgia,serif);font-style:italic;font-size:20px;color:#F4F1EA;flex:1;}
    .sh-x{background:rgba(255,255,255,.06);border:none;color:rgba(244,241,234,.6);width:32px;height:32px;border-radius:50%;font-size:16px;cursor:pointer;flex:none;}
    .sh-tabs{display:flex;gap:6px;padding:10px 12px;overflow-x:auto;border-bottom:1px solid rgba(255,255,255,.06);}
    .sh-tab{flex:none;font-family:var(--au-mono,ui-monospace);font-size:10px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:rgba(244,241,234,.5);background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.08);border-radius:11px;padding:8px 12px;cursor:pointer;white-space:nowrap;}
    .sh-tab.on{color:#04130D;background:rgb(var(--nu));border-color:rgb(var(--nu));}
    .sh-body{flex:1;min-height:0;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:14px 16px 20px;}
    .sh-in{width:100%;background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.12);border-radius:13px;padding:12px 14px;color:#F4F1EA;font-family:inherit;font-size:15px;outline:none;}
    .sh-in:focus{border-color:rgba(var(--nu),.5);}
    textarea.sh-in{resize:none;min-height:80px;line-height:1.4;}
    .sh-hint{font-size:11.5px;color:rgba(244,241,234,.4);margin:8px 2px 0;line-height:1.4;}
    .sh-btn{width:100%;margin-top:12px;padding:13px;border-radius:13px;border:none;font-family:var(--au-sans,-apple-system);font-size:14.5px;font-weight:700;color:#04130D;background:linear-gradient(120deg,#34E2B0,#18C8C0 55%,#9B8CFF);cursor:pointer;}
    .sh-btn:active{transform:translateY(1px);} .sh-btn:disabled{opacity:.5;}
    .sh-btn.ghost{color:#F4F1EA;background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.1);}
    .res{display:flex;align-items:center;gap:10px;padding:12px 8px;border-bottom:1px solid rgba(255,255,255,.05);cursor:pointer;}
    .res:active{background:rgba(255,255,255,.03);}
    .res-main{flex:1;min-width:0;}
    .res-name{font-size:13.5px;font-weight:600;color:#F4F1EA;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
    .res-sub{font-family:var(--au-mono,ui-monospace);font-size:10px;color:rgba(244,241,234,.42);margin-top:2px;}
    .sh-msg{text-align:center;font-family:var(--au-serif,Georgia,serif);font-style:italic;font-size:14px;color:rgba(244,241,234,.45);padding:18px 8px;line-height:1.5;}
    .sh-spin{text-align:center;padding:20px;font-family:var(--au-mono,ui-monospace);font-size:11px;letter-spacing:.1em;text-transform:uppercase;color:rgba(var(--nu),.8);}

    .pp-name{font-size:16px;font-weight:700;color:#F4F1EA;margin-bottom:3px;}
    .pp-sub{font-family:var(--au-mono,ui-monospace);font-size:10.5px;color:rgba(244,241,234,.45);margin-bottom:14px;}
    .pp-row{display:flex;align-items:center;gap:10px;margin-bottom:14px;}
    .pp-row label{font-family:var(--au-mono,ui-monospace);font-size:10px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:rgba(244,241,234,.5);}
    .pp-g{flex:1;}
    .pp-preview{display:flex;gap:8px;margin-bottom:6px;}
    .pp-chip{flex:1;text-align:center;background:rgba(255,255,255,.04);border-radius:11px;padding:10px 4px;}
    .pp-chip-v{font-family:var(--au-mono,ui-monospace);font-size:16px;font-weight:700;color:#F4F1EA;}
    .pp-chip-l{font-family:var(--au-mono,ui-monospace);font-size:8px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:rgba(244,241,234,.4);margin-top:3px;}
    .pp-meals{display:flex;gap:6px;margin:14px 0;}
    .pp-meal{flex:1;font-family:var(--au-mono,ui-monospace);font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.04em;color:rgba(244,241,234,.55);background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.08);border-radius:10px;padding:9px 4px;cursor:pointer;}
    .pp-meal.on{color:#04130D;background:rgb(var(--nu));border-color:rgb(var(--nu));}
    #scanRegion{width:100%;border-radius:14px;overflow:hidden;margin-bottom:10px;}
  </style>
</head>
<body id="root" class="au-mood-calm">
  <header class="nuh">
    <div>
      <div class="nuh-eyebrow">&#9673; Nutrition</div>
      <div class="nuh-line" id="nuHero">Fuel the work.</div>
    </div>

  </header>

  <div class="wrap" data-am-reveal-group>
    <div class="datenav">
      <button type="button" data-act="day-prev" aria-label="Previous day">&#8249;</button>
      <div style="text-align:center;">
        <div class="datenav-lbl" id="dateLbl">—</div>
        <button type="button" class="datenav-today" data-act="day-today" id="todayBtn">jump to today</button>
      </div>
      <button type="button" data-act="day-next" aria-label="Next day">&#8250;</button>
    </div>

    <a href="planner.html" style="display:flex;align-items:center;gap:10px;text-decoration:none;margin-bottom:12px;padding:13px 15px;border-radius:14px;border:1px solid rgba(124,207,122,.3);background:linear-gradient(135deg,rgba(124,207,122,.12),rgba(124,207,122,.03))">
      <span style="font-size:19px">🛒</span>
      <span style="flex:1;min-width:0"><span style="display:block;font-weight:700;color:#F4F1EA;font-size:14px">Meal Planner</span><span style="display:block;font-size:11.5px;color:rgba(244,241,234,.55)">Plan your week &amp; auto-build a shopping list</span></span>
      <span style="color:rgba(124,207,122,.9);font-size:18px">&rarr;</span>
    </a>

    <a href="import.html" style="display:block;text-align:center;text-decoration:none;margin:-4px 0 12px;font-family:var(--au-mono,ui-monospace);font-size:11px;font-weight:700;letter-spacing:.06em;color:rgba(124,211,252,.85)">⬇️ Import history from MyFitnessPal</a>

    <div class="card sum" id="sumCard"></div>
    <div class="card" id="coachCard" style="padding:14px 16px;"></div>
    <div class="card" id="energyCard" style="padding:14px 16px;"></div>
    <div class="card" id="trendsCard" style="padding:14px 16px;"></div>
    <div id="diary"></div>
  </div>

  <dialog class="nu-sheet" id="addSheet">
    <div class="sh-top"><div class="sh-title" id="shTitle">Add food</div><button type="button" class="sh-x" data-act="sheet-close">&#10005;</button></div>
    <div class="sh-tabs" id="shTabs"></div>
    <div class="sh-body" id="shBody"></div>
  </dialog>

  <script src="sync.js" defer></script>

  <script>
  (function(){

    function dateKey(d){ return d.getFullYear()+'-'+pad(d.getMonth()+1)+'-'+pad(d.getDate()); }
    function today(){ return dateKey(new Date()); }
    function ls(k,f){ try{ var v=JSON.parse(localStorage.getItem(k)); return v==null?f:v; }catch(e){ return f; } }
    function save(k,v){ try{ localStorage.setItem(k,JSON.stringify(v)); }catch(e){} }
    function esc(s){ return String(s==null?'':s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
    function r0(n){ return Math.round(n||0); }
    function r1(n){ return Math.round((n||0)*10)/10; }

    // fold accents + tokenize for local matching (mirrors api/food-search.js)
    function nfFold(s){ return String(s||'').toLowerCase().normalize('NFD').replace(/[̀-ͯ]/g,'').replace(/ς/g,'σ'); }
    function nfToks(s){ return nfFold(s).split(/[^a-z0-9α-ω]+/).filter(Boolean); }
    function nfMatch(hay,q){ var nt=nfToks(hay), qt=nfToks(q); if(!qt.length) return false;

    }

      // estimate. If the DB has the actual product, offer it first; estimate is the fallback.
      Promise.all([
        fetch('/api/nutrition-estimate',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({text:t})}).then(function(r){return r.json();}).catch(function(){return null;}),
        fetch('/api/food-search?q='+encodeURIComponent(t)).then(function(r){return r.json();}).catch(function(){return {results:[]};})
      ]).then(function(res){
        var ai=res[0], dbAll=((res[1]&&res[1].results)||[]);
        // keep DB hits that genuinely overlap the description (>=2 distinctive query tokens)
        var hits=dbAll.filter(function(f){ var hay=nfToks((f.name||'')+' '+(f.brand||'')); var n=0; qToks.forEach(function(q){ if(q.length>=3 && hay.some(function(x){return x===q||x.indexOf(q)===0||q.indexOf(x)===0;})) n++; }); return n>=2; }).slice(0,5);
        var aiOk = ai && !ai.error;

            '<button type="button" class="sh-btn ghost" data-act="tab" data-tab="describe" style="margin-top:8px;">Edit description</button>';
        } else if(aiOk){

        }
      }).catch(function(){ shBody.innerHTML='<div class="sh-msg">Network hiccup — try again.</div><button type="button" class="sh-btn ghost" data-act="tab" data-tab="describe">Try again</button>'; });

    function compressImage(file, cb){
      // Shrink + re-encode to a SMALL JPEG data URL. Steps quality/size down
      // until the payload is safely under the server limit (avoids 413 on big
      // phone photos). Normal photos pass the first step with no quality loss.
      try{ var img=new Image(), url=URL.createObjectURL(file);
        img.onload=function(){
          try{
            var W=img.naturalWidth||img.width||1, H=img.naturalHeight||img.height||1;
            function render(maxDim,q){ var sc=Math.min(1,maxDim/Math.max(W,H)); var cw=Math.max(1,Math.round(W*sc)), ch=Math.max(1,Math.round(H*sc));
              var cv=document.createElement('canvas'); cv.width=cw; cv.height=ch; cv.getContext('2d').drawImage(img,0,0,cw,ch); return cv.toDataURL('image/jpeg',q); }
            var steps=[[768,0.7],[640,0.6],[512,0.5],[420,0.42]], out=null;
            for(var i=0;i<steps.length;i++){ try{ out=render(steps[i][0],steps[i][1]); }catch(e){ out=null; } if(out && out.length<=1400000) break; }
            try{ URL.revokeObjectURL(url); }catch(e){}
            cb((out && out.length<=3500000)?out:null); // hard ceiling well under the platform limit
          }catch(e){ try{ URL.revokeObjectURL(url); }catch(x){} cb(null); }
        };
        img.onerror=function(){ try{ URL.revokeObjectURL(url); }catch(e){} cb(null); };
        img.src=url;
      }catch(e){ cb(null); }
    }

    function showPortion(food,defG){

      var info=hasS?'<div class="sh-hint" style="margin-top:-6px;margin-bottom:10px;">1 '+esc(unit)+' = '+r0(food.servingG)+'g'+(food.packageG>food.servingG?' · whole pack '+r0(food.packageG)+'g':'')+(food.servingsPer>1?' · '+(Math.round(food.servingsPer*10)/10)+'/pack':'')+'</div>':'';

      var gi=document.getElementById('ppG'), si=document.getElementById('ppServ');
      if(gi) gi.addEventListener('input', function(){ if(si&&pickFood.servingG){ var gg=parseFloat((gi.value||'').replace(',','.'))||0; si.value=gg>0?(Math.round(gg/pickFood.servingG*10)/10):''; } ppPreview(); });

      else if(act==='web-go'){ webGo(); }
      else if(act==='web-fallback'){ webFallback(window._lastDescribe||'', ''); }
      else if(act==='web-use-estimate'){ if(window._webEstimate) showPortion(aiToFood(window._webEstimate), window._webEstimate.grams||100); }
      else if(act==='photo-pick'){ photoPick(); }
      else if(act==='search-go'){ searchGo(); }
      else if(act==='bc-go'){ bcGo(); }
      else if(act==='custom-new'){ customNew(); }
      else if(act==='custom-save'){ customSave(); }
      else if(act==='meal-save'){ mealSave(); }
      else if(act==='meal-create'){ editMeal={id:uid(),name:'',items:[]}; gotoMealEditor(); }
      else if(act==='meal-edit'){ var mle=ls(MEALSK,[])[+el.getAttribute('data-i')]; if(mle){ editMeal=JSON.parse(JSON.stringify(mle)); if(!Array.isArray(editMeal.items)) editMeal.items=[]; gotoMealEditor(); } }
      else if(act==='meal-add-food'){ readMealName(); portionTarget='meal'; mealItemEdit=-1; setTab('search'); }
      else if(act==='meal-item-edit'){ if(!editMeal) return; readMealName(); var iti=+el.getAttribute('data-i'), it=editMeal.items[iti]; if(it){ var gk=it.grams||100,kk=100/gk; portionTarget='meal'; mealItemEdit=iti; showPortion({name:it.name,brand:'',per100:{kcal:(it.kcal||0)*kk,p:(it.p||0)*kk,c:(it.c||0)*kk,f:(it.f||0)*kk,fiber:(it.fiber||0)*kk,sugar:(it.sugar||0)*kk,sodium:(it.sodium||0)*kk,satfat:(it.satfat||0)*kk},source:it.source||'manual',servingG:it.grams}, it.grams); } }
      else if(act==='meal-item-del'){ if(!editMeal) return; readMealName(); editMeal.items.splice(+el.getAttribute('data-i'),1); renderMealEditor(); }
      else if(act==='meal-done'){ if(!editMeal) return; readMealName(); if(!editMeal.name) editMeal.name='My meal'; var arr=ls(MEALSK,[]); if(!Array.isArray(arr))arr=[]; var found=false; for(var mi=0;mi<arr.length;mi++){ if(arr[mi]&&arr[mi].id===editMeal.id){ arr[mi]=editMeal; found=true; break; } } if(!found) arr.unshift(editMeal); save(MEALSK,arr); editMeal=null; portionTarget='diary'; setTab('meals'); }
      else if(act==='meal-delete'){ if(!editMeal) return; var delId=editMeal.id; var arr2=(ls(MEALSK,[])||[]).filter(function(x){return !(x&&x.id===delId);}); save(MEALSK,arr2); try{ if(window.ALSSync){ window.ALSSync.drop('nut:meals', delId); window.ALSSync.flush(); } }catch(e){} editMeal=null; portionTarget='diary'; setTab('meals'); }
      else if(act==='meal-cancel'){ editMeal=null; portionTarget='diary'; setTab('meals'); }
      else if(act==='pick'){
        var kind=el.getAttribute('data-kind'), i=+el.getAttribute('data-i');
        if(kind==='search'){ var f=window._sr[i]; showPortion(searchResultToFood(f), f.servingG||100); }
        else if(kind==='recent'){ var rf=window._rf[i]; showPortion(rf, rf.lastG||100); }
        else if(kind==='custom'){ var cf=ls(CUSTOM,[])[i]; showPortion(searchResultToFood(cf),100); }
        else if(kind==='savedmeal'){ addSavedMeal(ls(MEALSK,[])[i]); }
      }
      else if(act==='pp-serv'){ var gi=document.getElementById('ppG'); if(gi&&pickFood&&pickFood.servingG){ gi.value=r0(pickFood.servingG); ppPreview(); } }
      else if(act==='pp-meal'){ pickMeal=el.getAttribute('data-meal'); var ms=document.getElementById('ppMeals'); if(ms){ Array.prototype.forEach.call(ms.children,function(b){ b.classList.toggle('on',b.getAttribute('data-meal')===pickMeal); }); } var ab=document.querySelector('[data-act="pp-add"]'); if(ab&&!pickEditId) ab.textContent='Add to '+pickMeal; }
      else if(act==='pp-add'){ var gg=ppGrams(); if(!gg||!pickFood) return;
        if(portionTarget==='meal' && editMeal){ var mit=scaleEntry(pickFood,gg,pickMeal); delete mit.id; delete mit.ts; delete mit.dateKey; delete mit.meal; if(mealItemEdit>=0){ editMeal.items[mealItemEdit]=mit; } else { editMeal.items.push(mit); } if(pickFood.source==='ai') saveLocalFood(pickFood); mealItemEdit=-1; portionTarget='diary'; gotoMealEditor(); return; }
        var wasEdit=!!pickEditId; if(pickEditId){ delEntry(pickEditId); pickEditId=null; } if(!wasEdit && pickFood.source==='ai') saveLocalFood(pickFood); addEntry(scaleEntry(pickFood,gg,pickMeal)); closeSheet(); }
    });
    document.addEventListener('change', function(e){ if(e.target&&e.target.id==='mealPhoto'){ var f=e.target.files&&e.target.files[0]; try{ e.target.value=''; }catch(x){} if(f) photoGo(f); } });
    sheet.addEventListener('click', function(e){ if(e.target===sheet) closeSheet(); });
    sheet.addEventListener('cancel', function(e){ e.preventDefault(); closeSheet(); });

    renderAll();
    document.addEventListener('visibilitychange', function(){ if(!document.hidden) renderAll(); });
    window.addEventListener('focus', renderAll);
    window.addEventListener('storage', renderAll);
  })();
  </script>

  <script>
    document.addEventListener('DOMContentLoaded', function(){
      function start(){ if(typeof initCloudSync!=='function'){ setTimeout(start,200); return; }
        initCloudSync({ appKey:'nutrition', syncedKeys:['nut:logs','nut:custom','nut:profile','nut:history','nut:meals'], onApplied:function(){ if(window._nutSeedMeals) window._nutSeedMeals(); if(window._nutRerender) window._nutRerender(); } });
        // fallback: seed even if sync never applies (offline first load); flag-guarded so it's still once
        setTimeout(function(){ if(window._nutSeedMeals) window._nutSeedMeals(); }, 2500); }
      start();
    });
  </script>
  <script src="nova.js" defer></script>
  <script src="nova-coach.js?v=18" defer></script>

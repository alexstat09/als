<!DOCTYPE html>
<html lang="en">
<head>
<script src="lock.js"></script>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#050506">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="apple-touch-icon.png">
<title>Nutrition</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="sync.js" defer></script>
<script src="topbar.js" defer></script>
<style>
/* ── DESIGN TOKENS ─────────────────────────────────── */
:root {
  --text-primary:   #FAFAFA;
  --text-secondary: #B8B6B0;
  --text-tertiary:  #76746E;
  --success: #6BE3A4;
  --warning: #F2C063;
  --danger:  #FF6B6B;
  --font:      -apple-system,BlinkMacSystemFont,"Inter","Segoe UI",Roboto,Helvetica,Arial,sans-serif;
  --font-mono: ui-monospace,"SF Mono",Menlo,Consolas,monospace;
  --col-protein: #7DD3FC;
  --col-carbs:   #F2C063;
  --col-fat:     #FF8C69;
  --col-cut:     #FF6B6B;
  --col-bulk:    #6BE3A4;
  --col-maintain:#7DD3FC;
}

* { box-sizing: border-box; }
html, body { margin: 0; padding: 0; background: #050506; color: var(--text-secondary); font-family: var(--font); -webkit-font-smoothing: antialiased; -webkit-text-size-adjust: 100%; }
body { min-height: 100vh; position: relative; overflow-x: hidden; padding: max(28px, env(safe-area-inset-top)) 20px 80px; }

/* drifting glow */
body::before {
  content: ''; position: fixed; inset: 0;
  background: radial-gradient(circle at 82% 14%, rgba(124,184,122,0.13), transparent 45%),
              radial-gradient(circle at 18% 90%, rgba(180,180,200,0.06), transparent 50%);
  filter: blur(40px); pointer-events: none; z-index: -2;
  animation: drift 36s ease-in-out infinite alternate;
}
/* dot texture */
body::after {
  content: ''; position: fixed; inset: 0;
  background-image: radial-gradient(rgba(255,255,255,0.014) 1px, transparent 1px);
  background-size: 3px 3px; pointer-events: none; z-index: -1;
}
@keyframes drift { 0% { transform: translate3d(0,0,0); } 100% { transform: translate3d(-22px,14px,0); } }

/* ── PAGE LAYOUT ───────────────────────────────────── */
.page { max-width: 1100px; margin: 0 auto; }

.dash-title {
  margin: 0 0 14px; font-size: 28px; font-weight: 700; letter-spacing: -0.025em;
  background: linear-gradient(180deg,#FFFFFF 0%,#C7C4BC 120%);
  -webkit-background-clip: text; background-clip: text;
  -webkit-text-fill-color: transparent; color: transparent;
}
@media (max-width: 480px) { .dash-title { font-size: 22px; } }

.section { margin-top: 8px; }
.section-title {
  font-size: 10.5px; font-weight: 700; letter-spacing: 0.18em; text-transform: uppercase;
  color: var(--text-tertiary); display: flex; align-items: center; gap: 12px; margin-bottom: 12px;
}
.section-title::before { content: ''; width: 18px; height: 1px; background: var(--text-tertiary); opacity: 0.6; }
.section-title::after  { content: ''; flex: 1; height: 1px; background: linear-gradient(90deg,rgba(255,255,255,0.08),transparent); }

/* ── GLASS CARD ────────────────────────────────────── */
.gm-card {
  position: relative; background: rgba(255,255,255,0.04); border-radius: 16px;
  padding: 20px; margin-bottom: 14px;
  backdrop-filter: blur(24px) saturate(1.2); -webkit-backdrop-filter: blur(24px) saturate(1.2);
  box-shadow: 0 12px 40px rgba(0,0,0,0.45); overflow: hidden;
}

/* ── §1 TODAY ──────────────────────────────────────── */
.today-top {
  display: grid; grid-template-columns: 148px 1fr; gap: 20px; align-items: center;
}
@media (max-width: 520px) { .today-top { grid-template-columns: 1fr; } }

/* Calorie ring */
.cal-ring-wrap { display: flex; flex-direction: column; align-items: center; gap: 6px; }
.cal-ring-svg  { position: relative; width: 132px; height: 132px; }
.cal-ring-svg svg { width: 100%; height: 100%; display: block; }
.cal-ring-inner {
  position: absolute; inset: 0; display: flex; flex-direction: column;
  align-items: center; justify-content: center; gap: 1px;
}
.cal-num   { font-size: 30px; font-weight: 700; font-variant-numeric: tabular-nums; letter-spacing: -0.04em; color: var(--text-primary); line-height: 1; }
.cal-denom { font-size: 11px; color: var(--text-tertiary); font-family: var(--font-mono); }
.cal-rem   { font-size: 11px; font-weight: 600; }
.cal-rem.over { color: var(--danger); }
.cal-rem.ok   { color: var(--text-tertiary); }

/* Macro arcs — vertical stack */
.macro-arcs { display: flex; flex-direction: column; gap: 10px; }
.macro-arc-row {
  display: flex; align-items: center; gap: 10px;
}
.macro-arc-svg { position: relative; width: 52px; height: 52px; flex-shrink: 0; }
.macro-arc-svg svg { width: 100%; height: 100%; display: block; }
.macro-arc-center {
  position: absolute; inset: 0; display: flex; flex-direction: column;
  align-items: center; justify-content: center;
}
.macro-arc-val   { font-size: 11px; font-weight: 700; color: var(--text-primary); font-variant-numeric: tabular-nums; line-height: 1; }
.macro-arc-info  { flex: 1; }
.macro-arc-label { font-size: 10px; font-weight: 700; letter-spacing: 0.08em; text-transform: uppercase; color: var(--text-tertiary); }
.macro-arc-sub   { font-size: 11px; color: var(--text-secondary); font-family: var(--font-mono); margin-top: 1px; }

/* Goal badge */
.goal-badge {
  display: inline-flex; align-items: center; gap: 5px;
  padding: 4px 10px; border-radius: 999px;
  font-size: 10px; font-weight: 800; letter-spacing: 0.12em; text-transform: uppercase;
  cursor: pointer; border: 1px solid currentColor; opacity: 0.9;
  transition: opacity 0.15s;
}
.goal-badge:hover { opacity: 1; }
.goal-badge.cut     { color: var(--col-cut);     background: rgba(255,107,107,0.12); }
.goal-badge.mini_cut{ color: var(--col-cut);     background: rgba(255,140,105,0.12); }
.goal-badge.bulk    { color: var(--col-bulk);    background: rgba(107,227,164,0.12); }
.goal-badge.maintain{ color: var(--col-maintain);background: rgba(125,211,252,0.12); }

/* today-right = arcs + WHOOP banner stacked */
.today-right { display: flex; flex-direction: column; gap: 12px; }
.today-right-top { display: flex; align-items: flex-start; justify-content: space-between; gap: 12px; }

/* WHOOP banner */
.whoop-banner {
  display: flex; align-items: center; gap: 8px; padding: 8px 12px;
  background: rgba(255,255,255,0.035); border: 1px solid rgba(255,255,255,0.07);
  border-radius: 10px; font-size: 12px; color: var(--text-secondary);
}
.whoop-banner strong { color: var(--text-primary); }

/* Protein per meal row */
.ppm-row { display: flex; flex-wrap: wrap; gap: 10px; align-items: center; padding: 12px 0 0; border-top: 1px solid rgba(255,255,255,0.06); }
.ppm-hint { font-size: 10px; color: var(--text-tertiary); letter-spacing: 0.04em; width: 100%; margin-bottom: 4px; }
.ppm-dot {
  display: flex; flex-direction: column; align-items: center; gap: 3px;
  min-width: 64px;
}
.ppm-dot-circle {
  width: 36px; height: 36px; border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-size: 12px; font-weight: 700; font-variant-numeric: tabular-nums;
  border: 2px solid;
}
.ppm-dot-circle.green  { color: var(--success); border-color: var(--success);   background: rgba(107,227,164,0.10); }
.ppm-dot-circle.amber  { color: var(--warning); border-color: var(--warning);   background: rgba(242,192,99,0.10); }
.ppm-dot-circle.grey   { color: var(--text-tertiary); border-color: rgba(255,255,255,0.10); background: rgba(255,255,255,0.04); }
.ppm-dot-label { font-size: 9px; color: var(--text-tertiary); letter-spacing: 0.06em; }

/* Footer chips */
.footer-chips { display: flex; flex-wrap: wrap; gap: 8px; padding-top: 12px; border-top: 1px solid rgba(255,255,255,0.06); margin-top: 12px; }
.fchip {
  display: flex; flex-direction: column; gap: 1px;
  padding: 6px 10px; border-radius: 8px;
  background: rgba(255,255,255,0.035); border: 1px solid rgba(255,255,255,0.06);
  min-width: 80px;
}
.fchip-label { font-size: 9px; font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase; color: var(--text-tertiary); }
.fchip-val   { font-size: 13px; font-weight: 600; color: var(--text-primary); font-variant-numeric: tabular-nums; }

/* ── §2 MEALS ──────────────────────────────────────── */
.meal-card {
  background: rgba(255,255,255,0.04); border-radius: 14px; margin-bottom: 10px;
  border: 1px solid rgba(255,255,255,0.07); overflow: hidden;
}
.meal-header {
  display: flex; align-items: center; gap: 10px; padding: 14px 16px;
  cursor: pointer; user-select: none; -webkit-user-select: none;
  transition: background 0.15s;
}
.meal-header:hover { background: rgba(255,255,255,0.03); }
.meal-emoji { font-size: 18px; flex-shrink: 0; }
.meal-name  { font-size: 14px; font-weight: 700; color: var(--text-primary); flex: 1; }
.meal-macros { display: flex; gap: 6px; }
.mmacro {
  font-family: var(--font-mono); font-size: 10px; font-weight: 700;
  padding: 2px 6px; border-radius: 5px; background: rgba(255,255,255,0.06);
  color: var(--text-secondary);
}
.meal-kcal { font-family: var(--font-mono); font-size: 12px; color: var(--text-primary); font-weight: 600; margin-left: 4px; }
.meal-chevron { color: var(--text-tertiary); font-size: 11px; transition: transform 0.2s; }
.meal-card.open .meal-chevron { transform: rotate(180deg); }

.meal-body { display: none; padding: 0 16px 14px; }
.meal-card.open .meal-body { display: block; }

.meal-item {
  display: flex; align-items: center; gap: 10px; padding: 9px 0;
  border-bottom: 1px solid rgba(255,255,255,0.05);
}
.meal-item:last-of-type { border-bottom: none; }
.mi-name   { flex: 1; font-size: 13px; color: var(--text-primary); }
.mi-portion{ font-size: 11px; color: var(--text-tertiary); font-family: var(--font-mono); margin-top: 1px; }
.mi-kcal   { font-family: var(--font-mono); font-size: 12px; color: var(--text-primary); font-weight: 600; flex-shrink: 0; }
.mi-macros { display: flex; gap: 4px; }
.mi-m { font-family: var(--font-mono); font-size: 9px; padding: 1px 5px; border-radius: 4px; background: rgba(255,255,255,0.05); color: var(--text-tertiary); }
.mi-del { border: 0; background: transparent; color: var(--text-tertiary); font-size: 17px; cursor: pointer; padding: 0 2px; opacity: 0.45; transition: opacity 0.15s, color 0.15s; }
.meal-item:hover .mi-del { opacity: 1; }
.mi-del:hover { color: var(--danger); }

.mps-warn { display: flex; align-items: center; gap: 6px; margin: 8px 0 4px; padding: 7px 10px; border-radius: 8px; background: rgba(242,192,99,0.08); border: 1px solid rgba(242,192,99,0.18); font-size: 11px; color: var(--warning); }
.meal-empty { font-size: 12px; font-style: italic; color: var(--text-tertiary); padding: 10px 0 6px; }
.meal-add-btn {
  display: inline-flex; align-items: center; gap: 5px; margin-top: 10px;
  padding: 8px 14px; border-radius: 9px; border: 1px solid rgba(255,255,255,0.10);
  background: rgba(255,255,255,0.04); color: var(--text-secondary);
  font-size: 12px; font-weight: 600; cursor: pointer; font-family: inherit;
  transition: background 0.15s;
}
.meal-add-btn:hover { background: rgba(255,255,255,0.08); }

/* ── §3 MACROS & MICROS ────────────────────────────── */
.tab-toggle { display: flex; gap: 4px; margin-bottom: 16px; }
.tab-btn {
  padding: 6px 16px; border-radius: 7px; font-size: 11px; font-weight: 700;
  letter-spacing: 0.08em; text-transform: uppercase; font-family: inherit;
  border: 1px solid rgba(255,255,255,0.10); background: rgba(255,255,255,0.03);
  color: var(--text-tertiary); cursor: pointer; transition: all 0.15s;
}
.tab-btn.active { background: rgba(255,255,255,0.10); color: var(--text-primary); border-color: rgba(255,255,255,0.20); }

.macro-bar-row { display: flex; align-items: center; gap: 10px; margin-bottom: 10px; }
.mbar-label  { font-size: 12px; color: var(--text-secondary); width: 96px; flex-shrink: 0; }
.mbar-track  { flex: 1; height: 7px; background: rgba(255,255,255,0.07); border-radius: 99px; overflow: hidden; }
.mbar-fill   { height: 100%; border-radius: 99px; transition: width 0.4s ease, background 0.3s; }
.mbar-values { font-family: var(--font-mono); font-size: 10px; color: var(--text-tertiary); width: 80px; flex-shrink: 0; text-align: right; }
.mbar-pct    { font-family: var(--font-mono); font-size: 10px; width: 34px; flex-shrink: 0; text-align: right; }

.quality-score-row {
  display: flex; align-items: center; justify-content: space-between;
  margin-top: 16px; padding-top: 14px; border-top: 1px solid rgba(255,255,255,0.06);
}
.qs-label { font-size: 11px; color: var(--text-tertiary); letter-spacing: 0.06em; }
.qs-num   { font-size: 24px; font-weight: 700; color: var(--text-primary); font-variant-numeric: tabular-nums; }

.micro-section-label { font-size: 9.5px; font-weight: 700; letter-spacing: 0.14em; text-transform: uppercase; color: var(--text-tertiary); margin: 14px 0 8px; }
.micro-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
.micro-cell { padding: 10px 12px; background: rgba(255,255,255,0.035); border: 1px solid rgba(255,255,255,0.06); border-radius: 10px; }
.micro-name { font-size: 10px; font-weight: 700; letter-spacing: 0.06em; color: var(--text-tertiary); margin-bottom: 4px; }
.micro-vals { display: flex; align-items: center; justify-content: space-between; margin-bottom: 5px; }
.micro-got  { font-size: 13px; font-weight: 600; color: var(--text-primary); font-variant-numeric: tabular-nums; }
.micro-rda  { font-size: 10px; color: var(--text-tertiary); font-family: var(--font-mono); }
.micro-bar-track { height: 4px; background: rgba(255,255,255,0.07); border-radius: 99px; overflow: hidden; }
.micro-bar-fill  { height: 100%; border-radius: 99px; background: var(--text-tertiary); transition: width 0.4s; }
.micro-bar-fill.done { background: var(--success); }
.micro-bar-fill.over { background: var(--danger); }
.micros-empty { font-size: 12px; font-style: italic; color: var(--text-tertiary); padding: 16px 0; text-align: center; }

/* ── §4 PROGRESS ───────────────────────────────────── */
.progress-chart-wrap { border-radius: 10px; overflow: hidden; background: rgba(0,0,0,0.14); margin-bottom: 14px; }
.progress-chart-wrap svg { display: block; width: 100%; height: 130px; }

.checkin-row { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; margin-bottom: 14px; }
.checkin-input {
  flex: 1; min-width: 100px; padding: 10px 13px;
  border: 1px solid rgba(255,255,255,0.10); border-radius: 10px;
  background: rgba(0,0,0,0.28); color: var(--text-primary);
  font-family: inherit; font-size: 14px; outline: none;
  transition: border-color 0.2s;
}
.checkin-input::placeholder { color: var(--text-tertiary); }
.checkin-input:focus { border-color: rgba(255,255,255,0.28); }
.checkin-btn {
  padding: 10px 18px; border: 0; border-radius: 10px;
  background: linear-gradient(180deg,#FFFFFF 0%,#E8E5DD 100%);
  color: #0A0A0B; font-family: inherit; font-size: 13px; font-weight: 700;
  cursor: pointer; box-shadow: inset 0 1px 0 rgba(255,255,255,0.9), 0 2px 8px rgba(0,0,0,0.35);
  transition: transform 0.1s, filter 0.15s;
}
.checkin-btn:hover { filter: brightness(1.06); transform: translateY(-1px); }
.checkin-streak { font-size: 11px; color: var(--text-tertiary); }

.adaptive-tdee-card {
  padding: 14px; border-radius: 12px; margin-bottom: 12px;
  background: rgba(107,227,164,0.06); border: 1px solid rgba(107,227,164,0.18);
}
.atd-title { font-size: 10px; font-weight: 700; letter-spacing: 0.12em; text-transform: uppercase; color: var(--success); margin-bottom: 6px; }
.atd-body  { font-size: 13px; color: var(--text-secondary); line-height: 1.5; }
.atd-use   {
  display: inline-flex; align-items: center; gap: 5px; margin-top: 8px;
  padding: 5px 12px; border-radius: 7px; border: 1px solid rgba(107,227,164,0.3);
  background: rgba(107,227,164,0.08); color: var(--success);
  font-size: 11px; font-weight: 700; cursor: pointer; font-family: inherit;
}

.phase-row { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; padding-top: 12px; border-top: 1px solid rgba(255,255,255,0.06); margin-top: 4px; }
.phase-badge {
  padding: 4px 10px; border-radius: 8px; font-size: 11px; font-weight: 700;
  background: rgba(255,255,255,0.05); color: var(--text-primary);
}
.phase-warn { font-size: 11px; color: var(--warning); }
.lbm-note   { font-size: 11px; color: var(--text-tertiary); }

.trend-warn-card {
  padding: 12px 14px; border-radius: 12px; margin-bottom: 12px;
  background: rgba(255,107,107,0.06); border: 1px solid rgba(255,107,107,0.20);
  font-size: 13px; color: var(--danger); line-height: 1.5;
}

/* ── §5 LOG FOOD ───────────────────────────────────── */
.meal-chips { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 14px; }
.meal-chip {
  padding: 6px 14px; border-radius: 99px; font-size: 12px; font-weight: 600;
  border: 1px solid rgba(255,255,255,0.10); background: rgba(255,255,255,0.04);
  color: var(--text-tertiary); cursor: pointer; font-family: inherit;
  transition: all 0.15s;
}
.meal-chip.active { background: rgba(255,255,255,0.12); color: var(--text-primary); border-color: rgba(255,255,255,0.24); }

.search-wrap { position: relative; margin-bottom: 12px; }
.search-icon { position: absolute; left: 12px; top: 50%; transform: translateY(-50%); color: var(--text-tertiary); font-size: 14px; pointer-events: none; }
.search-input {
  width: 100%; padding: 11px 14px 11px 36px;
  border: 1px solid rgba(255,255,255,0.10); border-radius: 12px;
  background: rgba(0,0,0,0.28); color: var(--text-primary);
  font-family: inherit; font-size: 14px; outline: none; transition: border-color 0.2s;
}
.search-input::placeholder { color: var(--text-tertiary); }
.search-input:focus { border-color: rgba(255,255,255,0.28); }

.suggested-row { margin-bottom: 12px; }
.suggested-label { font-size: 9.5px; font-weight: 700; letter-spacing: 0.12em; text-transform: uppercase; color: var(--text-tertiary); margin-bottom: 8px; }
.suggested-grid  { display: grid; grid-template-columns: repeat(2,1fr); gap: 6px; }
@media (min-width: 600px) { .suggested-grid { grid-template-columns: repeat(4,1fr); } }

.recent-row { margin-bottom: 12px; }
.recent-label { font-size: 9.5px; font-weight: 700; letter-spacing: 0.12em; text-transform: uppercase; color: var(--text-tertiary); margin-bottom: 8px; }
.recent-chips { display: flex; flex-wrap: wrap; gap: 6px; }
.recent-chip {
  padding: 4px 10px; border-radius: 99px; font-size: 11px; font-weight: 600;
  border: 1px solid rgba(255,255,255,0.10); background: rgba(255,255,255,0.04);
  color: var(--text-secondary); cursor: pointer; font-family: inherit;
  transition: background 0.15s;
}
.recent-chip:hover { background: rgba(255,255,255,0.08); }

.food-grid {
  display: grid; grid-template-columns: repeat(auto-fill,minmax(140px,1fr));
  gap: 7px; max-height: 320px; overflow-y: auto; margin-bottom: 14px;
}
.food-grid::-webkit-scrollbar { width: 4px; }
.food-grid::-webkit-scrollbar-track { background: transparent; }
.food-grid::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.12); border-radius: 2px; }

.food-btn {
  display: flex; flex-direction: column; gap: 3px;
  padding: 10px 11px; border-radius: 10px;
  background: rgba(255,255,255,0.035); border: 1px solid rgba(255,255,255,0.07);
  color: var(--text-secondary); cursor: pointer; text-align: left;
  font-family: inherit; transition: background 0.15s, border-color 0.15s;
  position: relative;
}
.food-btn:hover { background: rgba(255,255,255,0.07); border-color: rgba(255,255,255,0.14); }
.fb-top    { display: flex; align-items: center; justify-content: space-between; }
.fb-emoji  { font-size: 18px; line-height: 1; }
.fb-badge  { font-size: 13px; }
.fb-name   { font-size: 11px; font-weight: 600; color: var(--text-primary); line-height: 1.3; }
.fb-kcal   { font-size: 11px; color: var(--text-tertiary); font-family: var(--font-mono); }
.fb-macros { font-size: 9.5px; color: var(--text-tertiary); font-family: var(--font-mono); }

.custom-form { display: flex; flex-wrap: wrap; gap: 7px; padding-top: 14px; border-top: 1px solid rgba(255,255,255,0.06); }
.custom-form label { font-size: 10px; font-weight: 700; letter-spacing: 0.08em; text-transform: uppercase; color: var(--text-tertiary); display: flex; flex-direction: column; gap: 4px; }
.custom-form label.wide { flex: 2; min-width: 120px; }
.custom-form label.narrow { flex: 1; min-width: 64px; }
.custom-form input {
  padding: 8px 10px; border: 1px solid rgba(255,255,255,0.08); border-radius: 9px;
  background: rgba(0,0,0,0.28); color: var(--text-primary);
  font-family: inherit; font-size: 13px; outline: none; transition: border-color 0.2s;
}
.custom-form input:focus { border-color: rgba(255,255,255,0.24); }
.custom-form input::placeholder { color: var(--text-tertiary); }
.custom-save-btn {
  align-self: flex-end; padding: 9px 16px; border: 0; border-radius: 9px;
  background: linear-gradient(180deg,#FFFFFF 0%,#E8E5DD 100%);

.it-sub   { font-size: 11px; color: var(--text-tertiary); line-height: 1.4; }

.refeed-card {

.refeed-text { font-size: 13px; color: var(--text-secondary); }

.sheet {

<!DOCTYPE html>
<html lang="en">
<head>
<script src="lock.js"></script>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#050506">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="apple-touch-icon.png">
<title>Nutrition</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="sync.js" defer></script>
<link rel="stylesheet" href="jarvis.css">
<script src="topbar.js" defer></script>
<style>
/* ── DESIGN TOKENS ─────────────────────────────────── */
:root {
  --text-primary:   #FAFAFA;
  --text-secondary: #B8B6B0;
  --text-tertiary:  #76746E;
  --success: #6BE3A4;
  --warning: #F2C063;
  --danger:  #FF6B6B;
  --font:      -apple-system,BlinkMacSystemFont,"Inter","Segoe UI",Roboto,Helvetica,Arial,sans-serif;
  --font-mono: ui-monospace,"SF Mono",Menlo,Consolas,monospace;
  --col-protein: #7DD3FC;
  --col-carbs:   #F2C063;
  --col-fat:     #FF8C69;
  --col-cut:     #FF6B6B;
  --col-bulk:    #6BE3A4;
  --col-maintain:#7DD3FC;
  --jv-accent: #7CB87A;
  --jv-accent-rgb: 124,184,122;
}

* { box-sizing: border-box; }
html, body { margin: 0; padding: 0; background: #050506; color: var(--text-secondary); font-family: var(--font); -webkit-font-smoothing: antialiased; -webkit-text-size-adjust: 100%; }
body { min-height: 100vh; position: relative; overflow-x: hidden; padding: max(28px, env(safe-area-inset-top)) 20px 80px; }

/* drifting glow */
body::before {
  content: ''; position: fixed; inset: 0;
  background: radial-gradient(circle at 82% 14%, rgba(124,184,122,0.13), transparent 45%),
              radial-gradient(circle at 18% 90%, rgba(180,180,200,0.06), transparent 50%);
  filter: blur(40px); pointer-events: none; z-index: -2;
  animation: drift 36s ease-in-out infinite alternate;
}
/* dot texture */
body::after {
  content: ''; position: fixed; inset: 0;
  background-image: radial-gradient(rgba(255,255,255,0.014) 1px, transparent 1px);
  background-size: 3px 3px; pointer-events: none; z-index: -1;
}
@keyframes drift { 0% { transform: translate3d(0,0,0); } 100% { transform: translate3d(-22px,14px,0); } }

/* ── PAGE LAYOUT ───────────────────────────────────── */
.page { max-width: 1100px; margin: 0 auto; }

.dash-title {
  margin: 0 0 10px; font-size: 28px; font-weight: 800; letter-spacing: -0.03em;
  background: linear-gradient(135deg, #FFFFFF 0%, rgba(124,184,122,.95) 55%, rgba(107,227,164,.85) 100%);
  -webkit-background-clip: text; background-clip: text;
  -webkit-text-fill-color: transparent; color: transparent;
  filter: drop-shadow(0 0 18px rgba(124,184,122,.2));
}
@media (max-width: 480px) { .dash-title { font-size: 22px; } }

.section { margin-top: 8px; }
.section-title {
  font-size: 10.5px; font-weight: 700; letter-spacing: 0.18em; text-transform: uppercase;
  color: var(--text-tertiary); display: flex; align-items: center; gap: 12px; margin-bottom: 12px;
}
.section-title::before { content: ''; width: 18px; height: 1px; background: var(--text-tertiary); opacity: 0.6; }
.section-title::after  { content: ''; flex: 1; height: 1px; background: linear-gradient(90deg,rgba(255,255,255,0.08),transparent); }

/* ── GLASS CARD ────────────────────────────────────── */
.gm-card {
  position: relative; background: rgba(255,255,255,0.04); border-radius: 16px;
  padding: 20px; margin-bottom: 14px;
  backdrop-filter: blur(24px) saturate(1.2); -webkit-backdrop-filter: blur(24px) saturate(1.2);
  box-shadow: 0 12px 40px rgba(0,0,0,0.45); overflow: hidden;
}

/* ── §1 TODAY ──────────────────────────────────────── */
.today-top {
  display: grid; grid-template-columns: 148px 1fr; gap: 20px; align-items: center;
}
@media (max-width: 520px) { .today-top { grid-template-columns: 1fr; } }

/* Calorie ring */
.cal-ring-wrap { display: flex; flex-direction: column; align-items: center; gap: 6px; }
.cal-ring-svg  { position: relative; width: 132px; height: 132px; }
.cal-ring-svg svg { width: 100%; height: 100%; display: block; }
.cal-ring-inner {
  position: absolute; inset: 0; display: flex; flex-direction: column;
  align-items: center; justify-content: center; gap: 1px;
}
.cal-num   { font-size: 30px; font-weight: 700; font-variant-numeric: tabular-nums; letter-spacing: -0.04em; color: var(--text-primary); line-height: 1; }
.cal-denom { font-size: 11px; color: var(--text-tertiary); font-family: var(--font-mono); }
.cal-rem   { font-size: 11px; font-weight: 600; }
.cal-rem.over { color: var(--danger); }
.cal-rem.ok   { color: var(--text-tertiary); }

/* Macro arcs — vertical stack */
.macro-arcs { display: flex; flex-direction: column; gap: 10px; }
.macro-arc-row {
  display: flex; align-items: center; gap: 10px;
}
.macro-arc-svg { position: relative; width: 52px; height: 52px; flex-shrink: 0; }
.macro-arc-svg svg { width: 100%; height: 100%; display: block; }
.macro-arc-center {
  position: absolute; inset: 0; display: flex; flex-direction: column;
  align-items: center; justify-content: center;
}
.macro-arc-val   { font-size: 11px; font-weight: 700; color: var(--text-primary); font-variant-numeric: tabular-nums; line-height: 1; }
.macro-arc-info  { flex: 1; }
.macro-arc-label { font-size: 10px; font-weight: 700; letter-spacing: 0.08em; text-transform: uppercase; color: var(--text-tertiary); }
.macro-arc-sub   { font-size: 11px; color: var(--text-secondary); font-family: var(--font-mono); margin-top: 1px; }

/* Goal badge */
.goal-badge {
  display: inline-flex; align-items: center; gap: 5px;
  padding: 4px 10px; border-radius: 999px;
  font-size: 10px; font-weight: 800; letter-spacing: 0.12em; text-transform: uppercase;
  cursor: pointer; border: 1px solid currentColor; opacity: 0.9;
  transition: opacity 0.15s;
}
.goal-badge:hover { opacity: 1; }
.goal-badge.cut     { color: var(--col-cut);     background: rgba(255,107,107,0.12); }
.goal-badge.mini_cut{ color: var(--col-cut);     background: rgba(255,140,105,0.12); }
.goal-badge.bulk    { color: var(--col-bulk);    background: rgba(107,227,164,0.12); }
.goal-badge.maintain{ color: var(--col-maintain);background: rgba(125,211,252,0.12); }

/* today-right = arcs + WHOOP banner stacked */
.today-right { display: flex; flex-direction: column; gap: 12px; }
.today-right-top { display: flex; align-items: flex-start; justify-content: space-between; gap: 12px; }

/* WHOOP banner */
.whoop-banner {
  display: flex; align-items: center; gap: 8px; padding: 8px 12px;
  background: rgba(255,255,255,0.035); border: 1px solid rgba(255,255,255,0.07);
  border-radius: 10px; font-size: 12px; color: var(--text-secondary);
}
.whoop-banner strong { color: var(--text-primary); }

/* Protein per meal row */
.ppm-row { display: flex; flex-wrap: wrap; gap: 10px; align-items: center; padding: 12px 0 0; border-top: 1px solid rgba(255,255,255,0.06); }
.ppm-hint { font-size: 10px; color: var(--text-tertiary); letter-spacing: 0.04em; width: 100%; margin-bottom: 4px; }
.ppm-dot {
  display: flex; flex-direction: column; align-items: center; gap: 3px;
  min-width: 64px;
}
.ppm-dot-circle {
  width: 36px; height: 36px; border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-size: 12px; font-weight: 700; font-variant-numeric: tabular-nums;
  border: 2px solid;
}
.ppm-dot-circle.green  { color: var(--success); border-color: var(--success);   background: rgba(107,227,164,0.10); }
.ppm-dot-circle.amber  { color: var(--warning); border-color: var(--warning);   background: rgba(242,192,99,0.10); }
.ppm-dot-circle.grey   { color: var(--text-tertiary); border-color: rgba(255,255,255,0.10); background: rgba(255,255,255,0.04); }
.ppm-dot-label { font-size: 9px; color: var(--text-tertiary); letter-spacing: 0.06em; }

/* Footer chips */
.footer-chips { display: flex; flex-wrap: wrap; gap: 8px; padding-top: 12px; border-top: 1px solid rgba(255,255,255,0.06); margin-top: 12px; }
.fchip {
  display: flex; flex-direction: column; gap: 1px;
  padding: 6px 10px; border-radius: 8px;
  background: rgba(255,255,255,0.035); border: 1px solid rgba(255,255,255,0.06);
  min-width: 80px;
}
.fchip-label { font-size: 9px; font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase; color: var(--text-tertiary); }
.fchip-val   { font-size: 13px; font-weight: 600; color: var(--text-primary); font-variant-numeric: tabular-nums; }

/* ── §2 MEALS ──────────────────────────────────────── */
.meal-card {
  background: rgba(255,255,255,0.04); border-radius: 14px; margin-bottom: 10px;
  border: 1px solid rgba(255,255,255,0.07); overflow: hidden;
}
.meal-header {
  display: flex; align-items: center; gap: 10px; padding: 14px 16px;
  cursor: pointer; user-select: none; -webkit-user-select: none;
  transition: background 0.15s;
}
.meal-header:hover { background: rgba(255,255,255,0.03); }
.meal-emoji { font-size: 18px; flex-shrink: 0; }
.meal-name  { font-size: 14px; font-weight: 700; color: var(--text-primary); flex: 1; }
.meal-macros { display: flex; gap: 6px; }
.mmacro {
  font-family: var(--font-mono); font-size: 10px; font-weight: 700;
  padding: 2px 6px; border-radius: 5px; background: rgba(255,255,255,0.06);
  color: var(--text-secondary);
}
.meal-kcal { font-family: var(--font-mono); font-size: 12px; color: var(--text-primary); font-weight: 600; margin-left: 4px; }
.meal-chevron { color: var(--text-tertiary); font-size: 11px; transition: transform 0.2s; }
.meal-card.open .meal-chevron { transform: rotate(180deg); }

.meal-body { display: none; padding: 0 16px 14px; }
.meal-card.open .meal-body { display: block; }

.meal-item {
  display: flex; align-items: center; gap: 10px; padding: 9px 0;
  border-bottom: 1px solid rgba(255,255,255,0.05);
}
.meal-item:last-of-type { border-bottom: none; }
.mi-name   { flex: 1; font-size: 13px; color: var(--text-primary); }
.mi-portion{ font-size: 11px; color: var(--text-tertiary); font-family: var(--font-mono); margin-top: 1px; }
.mi-kcal   { font-family: var(--font-mono); font-size: 12px; color: var(--text-primary); font-weight: 600; flex-shrink: 0; }
.mi-macros { display: flex; gap: 4px; }
.mi-m { font-family: var(--font-mono); font-size: 9px; padding: 1px 5px; border-radius: 4px; background: rgba(255,255,255,0.05); color: var(--text-tertiary); }
.mi-del { border: 0; background: transparent; color: var(--text-tertiary); font-size: 17px; cursor: pointer; padding: 0 2px; opacity: 0.45; transition: opacity 0.15s, color 0.15s; }
.meal-item:hover .mi-del { opacity: 1; }
.mi-del:hover { color: var(--danger); }

.mps-warn { display: flex; align-items: center; gap: 6px; margin: 8px 0 4px; padding: 7px 10px; border-radius: 8px; background: rgba(242,192,99,0.08); border: 1px solid rgba(242,192,99,0.18); font-size: 11px; color: var(--warning); }
.meal-empty { font-size: 12px; font-style: italic; color: var(--text-tertiary); padding: 10px 0 6px; }
.meal-add-btn {
  display: inline-flex; align-items: center; gap: 5px; margin-top: 10px;
  padding: 8px 14px; border-radius: 9px; border: 1px solid rgba(255,255,255,0.10);
  background: rgba(255,255,255,0.04); color: var(--text-secondary);
  font-size: 12px; font-weight: 600; cursor: pointer; font-family: inherit;
  transition: background 0.15s;
}
.meal-add-btn:hover { background: rgba(255,255,255,0.08); }

/* ── §3 MACROS & MICROS ────────────────────────────── */
.tab-toggle { display: flex; gap: 4px; margin-bottom: 16px; }
.tab-btn {
  padding: 6px 16px; border-radius: 7px; font-size: 11px; font-weight: 700;
  letter-spacing: 0.08em; text-transform: uppercase; font-family: inherit;
  border: 1px solid rgba(255,255,255,0.10); background: rgba(255,255,255,0.03);
  color: var(--text-tertiary); cursor: pointer; transition: all 0.15s;
}
.tab-btn.active { background: rgba(255,255,255,0.10); color: var(--text-primary); border-color: rgba(255,255,255,0.20); }

.macro-bar-row { display: flex; align-items: center; gap: 10px; margin-bottom: 10px; }
.mbar-label  { font-size: 12px; color: var(--text-secondary); width: 96px; flex-shrink: 0; }
.mbar-track  { flex: 1; height: 7px; background: rgba(255,255,255,0.07); border-radius: 99px; overflow: hidden; }
.mbar-fill   { height: 100%; border-radius: 99px; transition: width 0.4s ease, background 0.3s; }
.mbar-values { font-family: var(--font-mono); font-size: 10px; color: var(--text-tertiary); width: 80px; flex-shrink: 0; text-align: right; }
.mbar-pct    { font-family: var(--font-mono); font-size: 10px; width: 34px; flex-shrink: 0; text-align: right; }

.quality-score-row {
  display: flex; align-items: center; justify-content: space-between;
  margin-top: 16px; padding-top: 14px; border-top: 1px solid rgba(255,255,255,0.06);
}
.qs-label { font-size: 11px; color: var(--text-tertiary); letter-spacing: 0.06em; }
.qs-num   { font-size: 24px; font-weight: 700; color: var(--text-primary); font-variant-numeric: tabular-nums; }

.micro-section-label { font-size: 9.5px; font-weight: 700; letter-spacing: 0.14em; text-transform: uppercase; color: var(--text-tertiary); margin: 14px 0 8px; }
.micro-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
.micro-cell { padding: 10px 12px; background: rgba(255,255,255,0.035); border: 1px solid rgba(255,255,255,0.06); border-radius: 10px; }
.micro-name { font-size: 10px; font-weight: 700; letter-spacing: 0.06em; color: var(--text-tertiary); margin-bottom: 4px; }
.micro-vals { display: flex; align-items: center; justify-content: space-between; margin-bottom: 5px; }
.micro-got  { font-size: 13px; font-weight: 600; color: var(--text-primary); font-variant-numeric: tabular-nums; }
.micro-rda  { font-size: 10px; color: var(--text-tertiary); font-family: var(--font-mono); }
.micro-bar-track { height: 4px; background: rgba(255,255,255,0.07); border-radius: 99px; overflow: hidden; }
.micro-bar-fill  { height: 100%; border-radius: 99px; background: var(--text-tertiary); transition: width 0.4s; }
.micro-bar-fill.done { background: var(--success); }
.micro-bar-fill.over { background: var(--danger); }
.micros-empty { font-size: 12px; font-style: italic; color: var(--text-tertiary); padding: 16px 0; text-align: center; }

/* ── §4 PROGRESS ───────────────────────────────────── */
.progress-chart-wrap { border-radius: 10px; overflow: hidden; background: rgba(0,0,0,0.14); margin-bottom: 14px; }
.progress-chart-wrap svg { display: block; width: 100%; height: 130px; }

.checkin-row { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; margin-bottom: 14px; }
.checkin-input {
  flex: 1; min-width: 100px; padding: 10px 13px;
  border: 1px solid rgba(255,255,255,0.10); border-radius: 10px;
  background: rgba(0,0,0,0.28); color: var(--text-primary);
  font-family: inherit; font-size: 14px; outline: none;
  transition: border-color 0.2s;
}
.checkin-input::placeholder { color: var(--text-tertiary); }
.checkin-input:focus { border-color: rgba(255,255,255,0.28); }
.checkin-btn {
  padding: 10px 18px; border: 0; border-radius: 10px;
  background: linear-gradient(180deg,#FFFFFF 0%,#E8E5DD 100%);
  color: #0A0A0B; font-family: inherit; font-size: 13px; font-weight: 700;
  cursor: pointer; box-shadow: inset 0 1px 0 rgba(255,255,255,0.9), 0 2px 8px rgba(0,0,0,0.35);
  transition: transform 0.1s, filter 0.15s;
}
.checkin-btn:hover { filter: brightness(1.06); transform: translateY(-1px); }
.checkin-streak { font-size: 11px; color: var(--text-tertiary); }

.adaptive-tdee-card {
  padding: 14px; border-radius: 12px; margin-bottom: 12px;
  background: rgba(107,227,164,0.06); border: 1px solid rgba(107,227,164,0.18);
}
.atd-title { font-size: 10px; font-weight: 700; letter-spacing: 0.12em; text-transform: uppercase; color: var(--success); margin-bottom: 6px; }
.atd-body  { font-size: 13px; color: var(--text-secondary); line-height: 1.5; }
.atd-use   {
  display: inline-flex; align-items: center; gap: 5px; margin-top: 8px;
  padding: 5px 12px; border-radius: 7px; border: 1px solid rgba(107,227,164,0.3);
  background: rgba(107,227,164,0.08); color: var(--success);
  font-size: 11px; font-weight: 700; cursor: pointer; font-family: inherit;
}

.phase-row { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; padding-top: 12px; border-top: 1px solid rgba(255,255,255,0.06); margin-top: 4px; }
.phase-badge {
  padding: 4px 10px; border-radius: 8px; font-size: 11px; font-weight: 700;
  background: rgba(255,255,255,0.05); color: var(--text-primary);
}
.phase-warn { font-size: 11px; color: var(--warning); }
.lbm-note   { font-size: 11px; color: var(--text-tertiary); }

.trend-warn-card {
  padding: 12px 14px; border-radius: 12px; margin-bottom: 12px;
  background: rgba(255,107,107,0.06); border: 1px solid rgba(255,107,107,0.20);
  font-size: 13px; color: var(--danger); line-height: 1.5;
}

/* ── §5 LOG FOOD ───────────────────────────────────── */
.meal-chips { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 14px; }
.meal-chip {
  padding: 6px 14px; border-radius: 99px; font-size: 12px; font-weight: 600;
  border: 1px solid rgba(255,255,255,0.10); background: rgba(255,255,255,0.04);
  color: var(--text-tertiary); cursor: pointer; font-family: inherit;
  transition: all 0.15s;
}
.meal-chip.active { background: rgba(255,255,255,0.12); color: var(--text-primary); border-color: rgba(255,255,255,0.24); }

.search-wrap { position: relative; margin-bottom: 12px; }
.search-icon { position: absolute; left: 12px; top: 50%; transform: translateY(-50%); color: var(--text-tertiary); font-size: 14px; pointer-events: none; }
.search-input {
  width: 100%; padding: 11px 14px 11px 36px;
  border: 1px solid rgba(255,255,255,0.10); border-radius: 12px;
  background: rgba(0,0,0,0.28); color: var(--text-primary);
  font-family: inherit; font-size: 14px; outline: none; transition: border-color 0.2s;
}
.search-input::placeholder { color: var(--text-tertiary); }
.search-input:focus { border-color: rgba(255,255,255,0.28); }

.suggested-row { margin-bottom: 12px; }
.suggested-label { font-size: 9.5px; font-weight: 700; letter-spacing: 0.12em; text-transform: uppercase; color: var(--text-tertiary); margin-bottom: 8px; }
.suggested-grid  { display: grid; grid-template-columns: repeat(2,1fr); gap: 6px; }
@media (min-width: 600px) { .suggested-grid { grid-template-columns: repeat(4,1fr); } }

.recent-row { margin-bottom: 12px; }
.recent-label { font-size: 9.5px; font-weight: 700; letter-spacing: 0.12em; text-transform: uppercase; color: var(--text-tertiary); margin-bottom: 8px; }
.recent-chips { display: flex; flex-wrap: wrap; gap: 6px; }
.recent-chip {
  padding: 4px 10px; border-radius: 99px; font-size: 11px; font-weight: 600;
  border: 1px solid rgba(255,255,255,0.10); background: rgba(255,255,255,0.04);
  color: var(--text-secondary); cursor: pointer; font-family: inherit;
  transition: background 0.15s;
}
.recent-chip:hover { background: rgba(255,255,255,0.08); }

.food-grid {
  display: grid; grid-template-columns: repeat(auto-fill,minmax(140px,1fr));
  gap: 7px; max-height: 320px; overflow-y: auto; margin-bottom: 14px;
}
.food-grid::-webkit-scrollbar { width: 4px; }
.food-grid::-webkit-scrollbar-track { background: transparent; }
.food-grid::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.12); border-radius: 2px; }

.food-btn {
  display: flex; flex-direction: column; gap: 3px;
  padding: 10px 11px; border-radius: 10px;
  background: rgba(255,255,255,0.035); border: 1px solid rgba(255,255,255,0.07);
  color: var(--text-secondary); cursor: pointer; text-align: left;
  font-family: inherit; transition: background 0.15s, border-color 0.15s;
  position: relative;
}
.food-btn:hover { background: rgba(255,255,255,0.07); border-color: rgba(255,255,255,0.14); }
.fb-top    { display: flex; align-items: center; justify-content: space-between; }
.fb-emoji  { font-size: 18px; line-height: 1; }
.fb-badge  { font-size: 13px; }
.fb-name   { font-size: 11px; font-weight: 600; color: var(--text-primary); line-height: 1.3; }
.fb-kcal   { font-size: 11px; color: var(--text-tertiary); font-family: var(--font-mono); }
.fb-macros { font-size: 9.5px; color: var(--text-tertiary); font-family: var(--font-mono); }

.custom-form { display: flex; flex-wrap: wrap; gap: 7px; padding-top: 14px; border-top: 1px solid rgba(255,255,255,0.06); }
.custom-form label { font-size: 10px; font-weight: 700; letter-spacing: 0.08em; text-transform: uppercase; color: var(--text-tertiary); display: flex; flex-direction: column; gap: 4px; }
.custom-form label.wide { flex: 2; min-width: 120px; }
.custom-form label.narrow { flex: 1; min-width: 64px; }
.custom-form input {
  padding: 8px 10px; border: 1px solid rgba(255,255,255,0.08); border-radius: 9px;
  background: rgba(0,0,0,0.28); color: var(--text-primary);
  font-family: inherit; font-size: 13px; outline: none; transition: border-color 0.2s;
}
.custom-form input:focus { border-color: rgba(255,255,255,0.24); }
.custom-form input::placeholder { color: var(--text-tertiary); }
.custom-save-btn {
  align-self: flex-end; padding: 9px 16px; border: 0; border-radius: 9px;
  background: linear-gradient(180deg,#FFFFFF 0%,#E8E5DD 100%);
  color: #0A0A0B; font-family: inherit; font-size: 12px; font-weight: 700;
  cursor: pointer; box-shadow: inset 0 1px 0 rgba(255,255,255,0.9), 0 2px 6px rgba(0,0,0,0.3);
  transition: transform 0.1s, filter 0.15s; flex-shrink: 0;
}
.custom-save-btn:hover { filter: brightness(1.06); transform: translateY(-1px); }

/* ── §6 INSIGHTS ───────────────────────────────────── */
.insight-chart-wrap { border-radius: 10px; overflow: hidden; background: rgba(0,0,0,0.14); margin-bottom: 16px; position: relative; }
.insight-chart-wrap svg { display: block; width: 100%; height: 130px; }
.insight-tooltip {
  position: absolute; top: 8px; left: 50%; transform: translateX(-50%);
  background: #1A1A1B; border: 1px solid rgba(255,255,255,0.12);
  border-radius: 10px; padding: 8px 12px; font-size: 11px; pointer-events: none;
  white-space: nowrap; z-index: 10;
}
.insight-tooltip strong { color: var(--text-primary); }

.insight-tiles { display: grid; grid-template-columns: repeat(3,1fr); gap: 10px; margin-bottom: 16px; }
@media (max-width: 520px) { .insight-tiles { grid-template-columns: 1fr 1fr; } }
.insight-tile { padding: 14px; background: rgba(255,255,255,0.035); border: 1px solid rgba(255,255,255,0.07); border-radius: 12px; }
.it-label { font-size: 9.5px; font-weight: 700; letter-spacing: 0.12em; text-transform: uppercase; color: var(--text-tertiary); margin-bottom: 6px; }
.it-val   { font-size: 20px; font-weight: 700; color: var(--text-primary); line-height: 1.1; margin-bottom: 2px; }
.it-sub   { font-size: 11px; color: var(--text-tertiary); line-height: 1.4; }

.refeed-card {
  padding: 14px; border-radius: 12px; margin-bottom: 14px;
  background: rgba(125,211,252,0.06); border: 1px solid rgba(125,211,252,0.18);
  display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 10px;
}
.refeed-text { font-size: 13px; color: var(--text-secondary); }
.refeed-btn  {
  padding: 7px 14px; border: 1px solid rgba(125,211,252,0.35);
  border-radius: 8px; background: rgba(125,211,252,0.08);
  color: var(--col-maintain); font-size: 12px; font-weight: 700;
  cursor: pointer; font-family: inherit;
}

.tip-card {
  padding: 14px 16px; border-radius: 12px;
  background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.09);
  display: flex; align-items: flex-start; gap: 10px;
}
.tip-icon  { font-size: 18px; flex-shrink: 0; margin-top: 1px; }
.tip-text  { font-size: 13px; color: var(--text-secondary); line-height: 1.55; }
.tip-text strong { color: var(--text-primary); }

/* ── SLIDE-UP SHEETS ───────────────────────────────── */
.sheet-backdrop {
  position: fixed; inset: 0; background: rgba(0,0,0,0.65); z-index: 200;
  opacity: 0; pointer-events: none; transition: opacity 0.28s;
}
.sheet-backdrop.open { opacity: 1; pointer-events: all; }

.sheet {
  position: fixed; bottom: 0; left: 0; right: 0; z-index: 201;
  background: #0F0F10; border-top: 1px solid rgba(255,255,255,0.10);
  border-radius: 20px 20px 0 0;
  padding: 6px 20px max(28px, env(safe-area-inset-bottom));
  max-height: 92vh; overflow-y: auto;
  transform: translateY(100%); transition: transform 0.32s cubic-bezier(0.22,1,0.36,1);
}
.sheet.open { transform: translateY(0); }
.sheet-handle { width: 36px; height: 4px; border-radius: 2px; background: rgba(255,255,255,0.15); margin: 10px auto 18px; }
.sheet-title { font-size: 16px; font-weight: 700; color: var(--text-primary); margin-bottom: 18px; }

/* Portion sheet */
.ps-food-header { display: flex; align-items: center; gap: 12px; margin-bottom: 18px; }
.ps-food-emoji  { font-size: 36px; }
.ps-food-name   { font-size: 18px; font-weight: 700; color: var(--text-primary); line-height: 1.3; }
.ps-food-kcal   { font-size: 12px; color: var(--text-tertiary); margin-top: 2px; }

.ps-portion-row { display: flex; gap: 8px; align-items: center; margin-bottom: 18px; }
.ps-portion-input {
  flex: 1; padding: 12px 14px; border: 1px solid rgba(255,255,255,0.14);
  border-radius: 12px; background: rgba(0,0,0,0.30);
  color: var(--text-primary); font-family: var(--font-mono); font-size: 18px; font-weight: 700;
  outline: none; text-align: center; transition: border-color 0.2s;
}
.ps-portion-input:focus { border-color: rgba(255,255,255,0.32); }
.ps-unit-select {
  padding: 12px 14px; border: 1px solid rgba(255,255,255,0.12); border-radius: 12px;
  background: rgba(0,0,0,0.28); color: var(--text-primary); font-family: inherit;
  font-size: 14px; outline: none; cursor: pointer;
}

.ps-preview {
  display: grid; grid-template-columns: repeat(3,1fr); gap: 8px; margin-bottom: 16px;
}
.ps-preview-cell { text-align: center; padding: 10px 6px; background: rgba(255,255,255,0.035); border-radius: 10px; }
.ps-pval { font-size: 18px; font-weight: 700; color: var(--text-primary); font-variant-numeric: tabular-nums; line-height: 1; }
.ps-plabel { font-size: 9px; font-weight: 700; letter-spacing: 0.08em; text-transform: uppercase; color: var(--text-tertiary); margin-top: 3px; }
.ps-micros-note { font-size: 11px; color: var(--text-tertiary); margin-bottom: 16px; line-height: 1.5; }

.ps-log-btn {
  width: 100%; padding: 14px; border: 0; border-radius: 13px;
  background: linear-gradient(180deg,#FFFFFF 0%,#E8E5DD 100%);
  color: #0A0A0B; font-family: inherit; font-size: 15px; font-weight: 700;
  cursor: pointer; box-shadow: inset 0 1px 0 rgba(255,255,255,0.9), 0 2px 10px rgba(0,0,0,0.35);
  transition: transform 0.1s, filter 0.15s;
}
.ps-log-btn:hover { filter: brightness(1.06); transform: translateY(-1px); }

/* Settings sheet */
.settings-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
@media (max-width: 400px) { .settings-grid { grid-template-columns: 1fr; } }
.sf { display: flex; flex-direction: column; gap: 6px; }
.sf.full { grid-column: span 2; }
.sf label { font-size: 10px; font-weight: 700; letter-spacing: 0.10em; text-transform: uppercase; color: var(--text-tertiary); }
.sf input, .sf select {
  padding: 10px 12px; border: 1px solid rgba(255,255,255,0.10); border-radius: 10px;
  background: rgba(0,0,0,0.28); color: var(--text-primary);
  font-family: inherit; font-size: 14px; outline: none; transition: border-color 0.2s;
}
.sf input:focus, .sf select:focus { border-color: rgba(255,255,255,0.28); }
.sf select option { background: #1A1A1B; }
.goal-radio-row { display: flex; gap: 8px; flex-wrap: wrap; }
.goal-radio-btn {
  padding: 7px 14px; border-radius: 8px; border: 1px solid rgba(255,255,255,0.12);
  background: rgba(255,255,255,0.04); color: var(--text-tertiary);
  font-size: 11px; font-weight: 700; cursor: pointer; font-family: inherit;
  transition: all 0.15s;
}
.goal-radio-btn.sel-cut      { color: var(--col-cut);     border-color: var(--col-cut);     background: rgba(255,107,107,0.12); }
.goal-radio-btn.sel-mini_cut { color: var(--col-cut);     border-color: var(--col-cut);     background: rgba(255,140,105,0.12); }
.goal-radio-btn.sel-bulk     { color: var(--col-bulk);    border-color: var(--col-bulk);    background: rgba(107,227,164,0.12); }
.goal-radio-btn.sel-maintain { color: var(--col-maintain);border-color: var(--col-maintain);background: rgba(125,211,252,0.12); }
.settings-save-btn {
  margin-top: 20px; width: 100%; padding: 14px; border: 0; border-radius: 13px;
  background: linear-gradient(180deg,#FFFFFF 0%,#E8E5DD 100%);
  color: #0A0A0B; font-family: inherit; font-size: 15px; font-weight: 700;
  cursor: pointer; box-shadow: inset 0 1px 0 rgba(255,255,255,0.9), 0 2px 10px rgba(0,0,0,0.35);
  transition: transform 0.1s, filter 0.15s;
}
.settings-save-btn:hover { filter: brightness(1.06); transform: translateY(-1px); }

/* ── MISC ──────────────────────────────────────────── */
.empty-hint { text-align: center; font-size: 12px; font-style: italic; color: var(--text-tertiary); padding: 18px 0; }

@media (max-width: 480px) {
  body { padding: max(20px, env(safe-area-inset-top)) 14px 70px; }
  .gm-card { padding: 16px; }
  .food-grid { grid-template-columns: repeat(2,1fr); }
  .ps-preview { grid-template-columns: repeat(3,1fr); }
  .macro-bar-row { gap: 6px; }
  .mbar-label { width: 72px; font-size: 11px; }
  .mbar-values { width: 60px; font-size: 9px; }
}

/* ── MFP IMPORT ZONE ───────────────────────────────── */
.mfp-zone {
  border: 2px dashed rgba(255,255,255,0.14);
  border-radius: 14px; padding: 22px 20px;
  text-align: center; cursor: pointer;
  transition: border-color 0.2s, background 0.2s;
  margin-bottom: 14px; position: relative;
}
.mfp-zone:hover, .mfp-zone.drag-over {
  border-color: rgba(124,184,122,0.55);
  background: rgba(124,184,122,0.05);
}
.mfp-zone input[type=file] {
  position: absolute; inset: 0; opacity: 0; cursor: pointer; width: 100%; height: 100%;
}
.mfp-zone-icon  { font-size: 28px; margin-bottom: 8px; }
.mfp-zone-title { font-size: 14px; font-weight: 700; color: var(--text-primary); margin-bottom: 4px; }
.mfp-zone-sub   { font-size: 12px; color: var(--text-tertiary); line-height: 1.5; }
.mfp-zone-hint  { font-size: 10px; color: var(--text-tertiary); margin-top: 8px; opacity: 0.7; }

.mfp-status {
  display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 8px;
  padding: 12px 16px; border-radius: 12px; margin-bottom: 14px;
  background: rgba(124,184,122,0.08); border: 1px solid rgba(124,184,122,0.22);
}
.mfp-status-text { font-size: 13px; color: var(--text-secondary); }
.mfp-status-text strong { color: var(--success); }
.mfp-clear-btn {
  padding: 5px 12px; border-radius: 7px; border: 1px solid rgba(255,255,255,0.12);
  background: rgba(255,255,255,0.05); color: var(--text-tertiary);
  font-size: 11px; font-weight: 600; cursor: pointer; font-family: inherit;
}
.mfp-clear-btn:hover { background: rgba(255,107,107,0.12); color: var(--danger); border-color: rgba(255,107,107,0.25); }

/* ── DAILY DEBRIEF ─────────────────────────────────── */
.debrief-card { padding: 0; overflow: hidden; }

.debrief-header {
  display: flex; align-items: center; justify-content: space-between;
  padding: 18px 20px 14px; border-bottom: 1px solid rgba(255,255,255,0.07);
  flex-wrap: wrap; gap: 12px;
}
.debrief-score-wrap { display: flex; align-items: baseline; gap: 6px; }
.debrief-score-num  {
  font-size: 52px; font-weight: 800; font-variant-numeric: tabular-nums;
  letter-spacing: -0.05em; line-height: 1;
}
.debrief-score-denom { font-size: 18px; color: var(--text-tertiary); font-weight: 600; }
.debrief-grade {
  display: flex; flex-direction: column; gap: 2px;
}
.debrief-grade-label {
  font-size: 11px; font-weight: 700; letter-spacing: 0.12em; text-transform: uppercase;
  color: var(--text-tertiary);
}
.debrief-grade-word {
  font-size: 22px; font-weight: 800; letter-spacing: -0.02em;
}

.debrief-body { padding: 16px 20px; display: flex; flex-direction: column; gap: 12px; }

.debrief-section-label {
  font-size: 9.5px; font-weight: 700; letter-spacing: 0.14em; text-transform: uppercase;
  color: var(--text-tertiary); margin-bottom: 6px;
}
.debrief-items { display: flex; flex-direction: column; gap: 7px; }
.debrief-item {
  display: flex; align-items: flex-start; gap: 9px;
  font-size: 13px; color: var(--text-secondary); line-height: 1.5;
}
.debrief-item-icon { flex-shrink: 0; font-size: 15px; margin-top: 1px; width: 20px; text-align: center; }
.debrief-item strong { color: var(--text-primary); }

.debrief-tomorrow {
  background: rgba(124,184,122,0.07); border: 1px solid rgba(124,184,122,0.18);
  border-radius: 11px; padding: 12px 14px;
}
.debrief-tomorrow-label {
  font-size: 9.5px; font-weight: 700; letter-spacing: 0.14em; text-transform: uppercase;
  color: var(--success); margin-bottom: 8px;
}
.debrief-no-data {
  padding: 24px 20px; text-align: center;
  font-size: 13px; color: var(--text-tertiary); font-style: italic;
}

/* ── Quick Entry ───────────────────────────────────── */
.import-tabs { display: flex; gap: 4px; margin-bottom: 14px; }
.import-tab {
  padding: 7px 16px; border-radius: 8px; font-size: 11px; font-weight: 700;
  letter-spacing: 0.07em; text-transform: uppercase; font-family: inherit;
  border: 1px solid rgba(255,255,255,0.10); background: rgba(255,255,255,0.03);
  color: var(--text-tertiary); cursor: pointer; transition: all 0.15s;
}
.import-tab.active { background: rgba(255,255,255,0.10); color: var(--text-primary); border-color: rgba(255,255,255,0.22); }

.quick-entry-grid {
  display: grid; grid-template-columns: repeat(2,1fr); gap: 10px; margin-bottom: 14px;
}
@media (min-width: 500px) { .quick-entry-grid { grid-template-columns: repeat(4,1fr); } }
.qe-field { display: flex; flex-direction: column; gap: 5px; }
.qe-label {
  font-size: 10px; font-weight: 700; letter-spacing: 0.10em; text-transform: uppercase;
  color: var(--text-tertiary);
}
.qe-input {
  padding: 11px 12px; border: 1px solid rgba(255,255,255,0.10); border-radius: 10px;
  background: rgba(0,0,0,0.28); color: var(--text-primary);
  font-family: var(--font-mono); font-size: 16px; font-weight: 700;
  outline: none; text-align: center; transition: border-color 0.2s;
  -moz-appearance: textfield;
}
.qe-input::-webkit-outer-spin-button,
.qe-input::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
.qe-input:focus { border-color: rgba(255,255,255,0.30); }
.qe-input::placeholder { font-size: 13px; font-weight: 400; color: var(--text-tertiary); }

.qe-optional-row {
  display: grid; grid-template-columns: repeat(3,1fr); gap: 10px; margin-bottom: 14px;
}
.qe-optional-label {
  font-size: 9.5px; font-weight: 700; letter-spacing: 0.12em; text-transform: uppercase;
  color: var(--text-tertiary); margin-bottom: 8px; grid-column: 1/-1;
}
.qe-import-btn {
  width: 100%; padding: 13px; border: 0; border-radius: 11px;
  background: linear-gradient(180deg,#FFFFFF 0%,#E8E5DD 100%);
  color: #0A0A0B; font-family: inherit; font-size: 14px; font-weight: 700;
  cursor: pointer; box-shadow: inset 0 1px 0 rgba(255,255,255,0.9), 0 2px 8px rgba(0,0,0,0.35);
  transition: transform 0.1s, filter 0.15s;
}
.qe-import-btn:hover { filter: brightness(1.06); transform: translateY(-1px); }
.qe-meal-section { margin-bottom: 12px; }
.qe-meal-label {
  font-size: 10px; font-weight: 700; letter-spacing: 0.10em; text-transform: uppercase;
  color: var(--text-tertiary); margin-bottom: 8px; display: flex; align-items: center; gap: 6px;
}
.qe-meal-row { display: grid; grid-template-columns: repeat(4,1fr); gap: 8px; }

/* ── MFP Paste Tab ──────────────────────────────────── */
.mfp-paste-area {
  width: 100%; min-height: 150px; padding: 14px;
  background: rgba(0,0,0,0.30); border: 1px solid rgba(255,255,255,0.10);
  border-radius: 12px; color: var(--text-primary);
  font-family: var(--font-mono); font-size: 12px; line-height: 1.6;
  resize: vertical; outline: none; margin-bottom: 10px;
  transition: border-color 0.2s; display: block;
}
.mfp-paste-area:focus { border-color: rgba(124,184,122,0.45); }
.mfp-paste-area::placeholder { color: var(--text-tertiary); font-family: var(--font); font-size: 13px; line-height: 1.5; }
.mfp-parse-btn {
  width: 100%; padding: 13px; border-radius: 11px; margin-bottom: 12px;
  background: rgba(124,184,122,0.12); border: 1px solid rgba(124,184,122,0.30);
  color: #7CB87A; font-family: inherit; font-size: 14px; font-weight: 700;
  cursor: pointer; transition: all 0.15s;
}
.mfp-parse-btn:hover { background: rgba(124,184,122,0.22); border-color: rgba(124,184,122,0.55); }
.mfp-preview {
  background: rgba(0,0,0,0.20); border: 1px solid rgba(255,255,255,0.07);
  border-radius: 12px; padding: 16px; margin-bottom: 12px;
}
.mfp-preview-title {
  font-size: 10px; font-weight: 700; letter-spacing: 0.15em; text-transform: uppercase;
  color: var(--text-tertiary); margin-bottom: 12px; font-family: var(--font-mono);
}
.mfp-preview-macros {
  display: grid; grid-template-columns: repeat(4,1fr); gap: 8px; margin-bottom: 14px;
}
.mfp-macro-chip { background: rgba(255,255,255,0.04); border-radius: 10px; padding: 10px 8px; text-align: center; border: 1px solid rgba(255,255,255,0.07); }
.mfp-macro-val { font-size: 20px; font-weight: 700; color: var(--text-primary); font-variant-numeric: tabular-nums; line-height: 1; }
.mfp-macro-lbl { font-size: 9px; font-weight: 700; letter-spacing: 0.10em; text-transform: uppercase; color: var(--text-tertiary); margin-top: 4px; }
.mfp-macro-chip.kcal .mfp-macro-val { color: #FAFAFA; }
.mfp-macro-chip.prot .mfp-macro-val { color: var(--col-protein); }
.mfp-macro-chip.carb .mfp-macro-val { color: var(--col-carbs); }
.mfp-macro-chip.fat  .mfp-macro-val { color: var(--col-fat); }
.mfp-micro-section-lbl {
  font-size: 9.5px; font-weight: 700; letter-spacing: 0.12em; text-transform: uppercase;
  color: var(--text-tertiary); margin-bottom: 8px;
}
.mfp-micro-grid { display: grid; grid-template-columns: repeat(3,1fr); gap: 6px; }
@media (max-width: 400px) { .mfp-micro-grid { grid-template-columns: repeat(2,1fr); } }
.mfp-micro-item { background: rgba(255,255,255,0.03); border-radius: 8px; padding: 8px 10px; }
.mfp-micro-val { font-size: 13px; font-weight: 700; color: var(--text-primary); font-variant-numeric: tabular-nums; }
.mfp-micro-lbl { font-size: 9px; color: var(--text-tertiary); margin-top: 2px; }
.mfp-apply-btn {
  width: 100%; padding: 14px; border: 0; border-radius: 11px;
  background: linear-gradient(180deg,#FFFFFF 0%,#E8E5DD 100%);
  color: #0A0A0B; font-family: inherit; font-size: 14px; font-weight: 700;
  cursor: pointer; box-shadow: inset 0 1px 0 rgba(255,255,255,0.9), 0 2px 8px rgba(0,0,0,0.35);
  transition: transform 0.1s, filter 0.15s;
}
.mfp-apply-btn:hover { filter: brightness(1.06); transform: translateY(-1px); }
.mfp-parse-err {
  background: rgba(255,107,107,0.08); border: 1px solid rgba(255,107,107,0.25);
  border-radius: 10px; padding: 12px 14px; font-size: 12px; color: #FF6B6B;
  line-height: 1.6; margin-bottom: 10px;
}
.mfp-meals-row { display: grid; grid-template-columns: repeat(2,1fr); gap: 6px; margin-bottom: 14px; }
.mfp-meal-chip { background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.07); border-radius: 9px; padding: 8px 10px; }
.mfp-meal-chip-name { font-size: 9px; font-weight: 700; letter-spacing: 0.10em; text-transform: uppercase; color: var(--text-tertiary); margin-bottom: 4px; }
.mfp-meal-chip-nums { font-size: 11px; color: var(--text-primary); font-variant-numeric: tabular-nums; }
</style>
</head>
<body>
<div class="page">
  <div class="jv-hdr">
    <a href="index.html" class="jv-hub-link">← HUB</a>
    <span class="jv-hdr-sep">·</span>
    <span>ALS·07</span>
    <span class="jv-hdr-sep">◈</span>
    <span>NUTRITION MODULE</span>
    <span class="jv-hdr-sp"></span>
    <span class="jv-hdr-stat"><span class="jv-dot"></span>ONLINE</span>
  </div>
  <h1 class="dash-title">Nutrition</h1>

  <!-- MFP IMPORT -->
  <div class="section">
    <div class="section-title">Import from MyFitnessPal</div>
    <div id="mfpImportZone"></div>
  </div>

  <!-- §1 TODAY -->
  <div class="section">
    <div class="section-title">Today</div>
    <div class="gm-card" id="todayCard"><div class="empty-hint">Loading…</div></div>
  </div>

  <!-- DAILY DEBRIEF -->
  <div class="section">
    <div class="section-title">Daily Debrief</div>
    <div class="gm-card debrief-card" id="debriefCard"><div class="debrief-no-data">Log your food or import from MFP to generate your daily debrief.</div></div>
  </div>

  <!-- §2 MEALS -->
  <div class="section">
    <div class="section-title">Meals</div>
    <div id="mealsContainer"></div>
  </div>

  <!-- §3 MACROS & MICROS -->
  <div class="section">
    <div class="section-title">Macros &amp; Micros</div>
    <div class="gm-card"><div id="macrosMicrosCard"><div class="empty-hint">Loading…</div></div></div>
  </div>


  <!-- §5 LOG FOOD -->
  <div class="section">
    <div class="section-title">Log Food</div>
    <div class="gm-card" id="logFoodCard"><div class="empty-hint">Loading…</div></div>
  </div>

  <!-- §6 INSIGHTS -->
  <div class="section">

function loadProfile() {
  try {
    const saved = JSON.parse(localStorage.getItem('nut:profile'));

  } catch(e) {}
  // Pull weight from po-water if available

    if (profile.weightKg) weightKg = profile.weightUnit === 'lb'

/* Write today's summary into history (called on check-in + visibilitychange) */
function commitTodayToHistory(overrideWeight) {
  const today = todayStr();
  const t = calcDayTotals();
  const existing = history.find(h => h.date === today);
  const entry = {
    date: today,
    kcal: Math.round(t.kcal),
    p: Math.round(t.p),
    c: Math.round(t.c),
    f: Math.round(t.f),
    weight: overrideWeight != null ? overrideWeight
          : existing ? existing.weight : null
  };
  if (existing) Object.assign(existing, entry);
  else history.push(entry);
  history = history.slice(-90);   // keep last 90 days
  saveHistory();
}

/* ── WHOOP ──────────────────────────────────────────── */
async function loadWhoop() {
  let tokens;
  try { tokens = JSON.parse(localStorage.getItem('whoop_tokens_v1')); } catch(e) { return; }
  if (!tokens || !tokens.access_token) return;

  async function tryFetch(tok) {
    try {
      const r = await fetch('/api/whoop-data', { headers: { Authorization: 'Bearer ' + tok } });
      if (r.status === 401) return 401;
      return r.ok ? r.json() : null;
    } catch(e) { return null; }
  }

  let data = await tryFetch(tokens.access_token);
  if (data === 401) {
    try {
      const rr = await fetch('/api/whoop-refresh', {
        method: 'POST', headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ refresh_token: tokens.refresh_token })
      });
      if (rr.ok) {
        const nt = await rr.json();
        localStorage.setItem('whoop_tokens_v1', JSON.stringify(nt));
        data = await tryFetch(nt.access_token);
      }
    } catch(e) { return; }
  }
  if (!data || data === 401) return;

  if (data.recovery && data.recovery.recovery_score != null)
    whoop.recovery = data.recovery.recovery_score;
  if (data.strain && data.strain.score != null)
    whoop.strain = data.strain.score;
  // Also accept flat structure some proxy endpoints return
  if (data.recovery_score != null) whoop.recovery = data.recovery_score;
  if (data.strain_score   != null) whoop.strain   = data.strain_score;
}

/* ── TDEE & targets engine ──────────────────────────── */
function calcTargets() {
  const kg  = weightKg || 70;
  const cm  = profile.heightCm || 175;
  const age = profile.age || 22;
  const sex = profile.sex || 'm';
  const act = profile.activityLevel || 'moderate';
  const goal = profile.goal || 'cut';

  // Mifflin-St Jeor BMR
  const bmr = sex === 'f'
    ? 10*kg + 6.25*cm - 5*age - 161
    : 10*kg + 6.25*cm - 5*age + 5;

  // TDEE
  let tdee = bmr * (ACTIVITY_MULT[act] || 1.55);
  if (whoop.strain > 0) tdee += (whoop.strain / 21) * 350;
  if (profile.tdeeOverride) tdee = profile.tdeeOverride;

  // Lean mass (if BF% known)
  const bf   = profile.bodyFatPct;
  const leanKg = bf ? kg * (1 - bf / 100) : null;

  // Calorie target by goal
  let calTarget;
  if      (goal === 'cut')      calTarget = Math.max(bmr + 200, Math.max(tdee * 0.75, tdee - 500));
  else if (goal === 'mini_cut') calTarget = Math.max(bmr + 200, tdee - 300);
  else if (goal === 'bulk')     calTarget = tdee + 250;
  else                          calTarget = tdee;             // maintain
  calTarget = Math.round(calTarget / 50) * 50;

  // Macro targets
  let proteinG, fatG;
  if (goal === 'cut' || goal === 'mini_cut') {
    proteinG = leanKg ? leanKg * 2.6 : kg * 2.4;
    fatG     = Math.max(40, kg * 0.8);
  } else if (goal === 'bulk') {
    proteinG = kg * 1.8;
    fatG     = kg * 1.0;
  } else {
    proteinG = kg * 1.6;
    fatG     = kg * 0.9;
  }
  const carbG  = Math.max(0, (calTarget - proteinG * 4 - fatG * 9) / 4);
  const fiberG = Math.round(calTarget / 1000 * 14);

  // Ceiling drops on low WHOOP recovery
  let calCeiling = calTarget;
  if (whoop.recovery != null && whoop.recovery < 55) {
    calCeiling = Math.round(tdee / 50) * 50;  // eat at maintenance
  }

  targets = {
    bmr: Math.round(bmr),
    tdee: Math.round(tdee),
    kcal: calTarget,
    kcalCeiling: calCeiling,
    p:    Math.round(proteinG),
    c:    Math.round(carbG),
    f:    Math.round(fatG),
    fiber: fiberG,
    sugar: SUGAR_LIMIT,
    sodium: SODIUM_LIMIT,
    leanKg: leanKg ? +leanKg.toFixed(1) : null,
    burnEstimate: whoop.strain > 0 ? Math.round((whoop.strain / 21) * 350) : 0
  };
}

/* ── Adaptive TDEE (≥7 days weight history) ─────────── */
function calcAdaptiveTDEE() {
  const withW = history.filter(h => h.weight != null && h.kcal > 0)
                       .sort((a,b) => a.date.localeCompare(b.date))
                       .slice(-21);
  if (withW.length < 7) return null;
  const first = withW[0], last = withW[withW.length - 1];
  const days  = (new Date(last.date) - new Date(first.date)) / 86400000;
  if (days < 6) return null;
  const avgKcal = withW.reduce((s,h) => s + h.kcal, 0) / withW.length;
  const weightChange = last.weight - first.weight;          // kg (neg = loss)
  const realTDEE = avgKcal - (weightChange * 7700 / days);
  return Math.round(realTDEE);
}

/* Weight trend: kg/week via linear regression */
function calcWeightTrend() {
  const wh = (profile.weeklyWeightHistory || [])
    .slice(-14).filter(w => w.kg != null);
  if (wh.length < 4) return null;
  const n = wh.length;
  let sx=0, sy=0, sxy=0, sx2=0;
  wh.forEach((pt,i) => { sx+=i; sy+=pt.kg; sxy+=i*pt.kg; sx2+=i*i; });
  return ((n*sxy - sx*sy) / (n*sx2 - sx*sx)) * 7;   // kg / week
}

/* Days since last refeed (for cut/mini_cut) */
function daysSinceRefeed() {
  const sorted = [...history].sort((a,b) => a.date.localeCompare(b.date));
  let count = 0;
  for (let i = sorted.length - 1; i >= 0; i--) {
    const h = sorted[i];
    if (!h.kcal) continue;
    if (h.kcal >= targets.tdee * 0.93) break;   // refeed = ≥93% TDEE
    count++;
  }
  return count;
}

/* Days into current phase */
function phaseDay() {
  if (!profile.phaseStartDate) return null;
  const start = new Date(profile.phaseStartDate);
  const now   = new Date();
  return Math.max(1, Math.round((now - start) / 86400000));
}

/* ── Data aggregators ───────────────────────────────── */
function allFoods() { return [...FOODS, ...custom]; }

function calcDayTotals() {
  return logs.reduce((acc, l) => {
    acc.kcal  += l.kcal  || 0;
    acc.p     += l.p     || 0;
    acc.c     += l.c     || 0;
    acc.f     += l.f     || 0;
    acc.fiber += l.fiber || 0;
    acc.sugar += l.sugar || 0;
    acc.satFat+= l.satFat|| 0;
    acc.sodium+= l.sodium|| 0;
    if (l.micros) Object.entries(l.micros).forEach(([k,v]) => {
      acc.micros[k] = (acc.micros[k]||0) + v;
    });
    return acc;
  }, {kcal:0,p:0,c:0,f:0,fiber:0,sugar:0,satFat:0,sodium:0,micros:{}});
}

function mealTotals(meal) {
  return logs.filter(l => l.meal === meal).reduce(
    (a,l) => ({kcal:a.kcal+l.kcal, p:a.p+l.p, c:a.c+l.c, f:a.f+l.f}),
    {kcal:0,p:0,c:0,f:0}
  );
}

function currentMealByTime() {
  const h = new Date().getHours();
  if (h < 10) return 'breakfast';
  if (h < 14) return 'lunch';
  if (h < 17) return 'snacks';
  return 'dinner';
}

/* Scale food nutrients from per-100g to portionG */
function portionNutrition(food, grams) {
  const scale = grams / 100;
  const m = {};
  Object.entries(food.micros || {}).forEach(([k,v]) => { m[k] = +(v * scale).toFixed(3); });
  return {
    kcal:   +((food.kcal  ||0)*scale).toFixed(1),
    p:      +((food.p     ||0)*scale).toFixed(1),
    c:      +((food.c     ||0)*scale).toFixed(1),
    f:      +((food.f     ||0)*scale).toFixed(1),
    fiber:  +((food.fiber ||0)*scale).toFixed(1),
    sugar:  +((food.sugar ||0)*scale).toFixed(1),
    satFat: +((food.satFat||0)*scale).toFixed(1),
    sodium: +((food.sodium||0)*scale).toFixed(1),
    micros: m
  };
}

/* Convert portion input (number + unit) → grams */
function unitToGrams(food, qty, unit) {
  const conversions = {
    g:       qty,
    oz:      qty * 28.35,
    tbsp:    qty * 15,
    tsp:     qty * 5,
    cup:     qty * (food.cupG || 240),
    piece:   qty * (food.servingG || 100),
    serving: qty * (food.servingG || 100)
  };
  return conversions[unit] || qty;
}

/* Top-3 micros a food provides (relative to RDA, scaled to portion) */
function topMicros(food, grams) {
  const scale = grams / 100;
  return Object.entries(food.micros || {})
    .filter(([k]) => RDA[k])
    .map(([k,v]) => ({ key: k, pct: (v * scale) / RDA[k] * 100 }))
    .sort((a,b) => b.pct - a.pct)
    .slice(0, 3);
}

/* Recent foods (last 10 unique names) */
function recentFoodNames() {
  const seen = new Set(), out = [];
  const allH = [...history.flatMap(h => []), ...logs].reverse();
  // Walk today's logs backwards, then history entries are summarised —
  // instead use nut:logs stored across days: re-read raw
  try {
    const raw = JSON.parse(localStorage.getItem('nut:logs')) || [];
    [...raw].reverse().forEach(l => {
      if (!seen.has(l.foodName) && seen.size < 10) { seen.add(l.foodName); out.push(l.foodName); }
    });
  } catch(e) {}
  return out;
}

/* Suggested foods for current goal */
function suggestedFoods() {
  const t   = targets;
  const tot = calcDayTotals();
  const pPct = t.p   > 0 ? tot.p   / t.p   : 1;
  const cPct = t.c   > 0 ? tot.c   / t.c   : 1;
  const fPct = t.f   > 0 ? tot.f   / t.f   : 1;
  // Find most-lacking macro
  const minPct = Math.min(pPct, cPct, fPct);
  const af = allFoods();
  let scored;
  if (minPct === pPct) {
    // Need protein → rank by p/kcal
    scored = af.map((fd,i) => ({i, score: fd.kcal > 0 ? fd.p / fd.kcal : 0}));
  } else if (minPct === cPct) {
    // Need carbs → rank by c/kcal
    scored = af.map((fd,i) => ({i, score: fd.kcal > 0 ? fd.c / fd.kcal : 0}));
  } else {
    // Need fat → rank by f/kcal
    scored = af.map((fd,i) => ({i, score: fd.kcal > 0 ? fd.f / fd.kcal : 0}));
  }
  return scored.sort((a,b) => b.score - a.score).slice(0,4).map(s => ({food:af[s.i], fidx:s.i}));
}

/* ── Formatting helpers ─────────────────────────────── */
function r1(n)  { return Math.round(n * 10) / 10; }
function r0(n)  { return Math.round(n); }
function todayStr() { return new Date().toISOString().split('T')[0]; }
function fmtDate(str) {
  const d = new Date(str + 'T00:00:00');
  return d.toLocaleDateString([],{weekday:'short',month:'short',day:'numeric'});
}
function pct(val, max) { return max > 0 ? Math.min(200, val / max * 100) : 0; }
function barColor(p, isLimit) {
  // isLimit = true means going over is BAD (sodium, sugar)
  if (isLimit) return p >= 100 ? '#FF6B6B' : p >= 85 ? '#F2C063' : '#6BE3A4';
  return p > 100 ? '#FF6B6B' : p >= 85 ? '#F2C063' : '#6BE3A4';
}
function id(s) { return document.getElementById(s); }
function esc(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
function goalLabel(g) {
  return {cut:'CUT',mini_cut:'MINI-CUT',bulk:'BULK',maintain:'MAINTAIN'}[g] || g.toUpperCase();
}
function goalClass(g) { return g || 'cut'; }

const MAC_R = 22, MAC_C = +(2 * Math.PI * MAC_R).toFixed(2); // 138.23

function arcOffset(val, max, circ) {
  const p = max > 0 ? Math.min(1, val / max) : 0;
  return +(circ * (1 - p)).toFixed(2);
}
function ringColor(val, max) {
  const p = max > 0 ? val / max * 100 : 0;
  if (p >= 90 && p <= 110) return '#6BE3A4';
  if (p >= 70 && p <= 125) return '#F2C063';
  return '#FF6B6B';
}

        </div>`).join('');

    const mpsWarn = showMPS && mt.p < 30 && items.length > 0
      ? `<div class="mps-warn">⚠ ${r0(mt.p)}g protein — below the 30g MPS threshold</div>` : '';

    return `
    <div class="meal-card ${isOpen ? 'open' : ''}" data-meal="${meal}">
      <div class="meal-header" data-meal="${meal}">
        <span class="meal-emoji">${info.emoji}</span>
        <span class="meal-name">${info.label}</span>
        <div class="meal-macros">
          <span class="mmacro" style="color:var(--col-protein)">${r0(mt.p)}P</span>
          <span class="mmacro" style="color:var(--col-carbs)">${r0(mt.c)}C</span>
          <span class="mmacro" style="color:var(--col-fat)">${r0(mt.f)}F</span>
        </div>
        <span class="meal-kcal">${r0(mt.kcal)} kcal</span>
        <span class="meal-chevron">▾</span>
      </div>
      <div class="meal-body">
        ${mpsWarn}
        ${itemsHtml}
        <button class="meal-add-btn" data-addmeal="${meal}">+ Add food</button>
      </div>
    </div>`;
  }).join('');

  document.getElementById('mealsContainer').innerHTML = html;
}

/* ── §3 Macros & Micros ─────────────────────────────── */
function renderMacrosMicros() {
  const tot = calcDayTotals();
  const t   = targets;

  const tabToggle = `
    <div class="tab-toggle">
      <button class="tab-btn ${macroTab==='MACROS'?'active':''}" data-tab="MACROS">Macros</button>
      <button class="tab-btn ${macroTab==='MICROS'?'active':''}" data-tab="MICROS">Micros</button>
    </div>`;

  let body = '';
  if (macroTab === 'MACROS') {
    const rows = [
      {label:'Calories',  val:r0(tot.kcal),  max:t.kcal,   unit:'kcal', limit:false},
      {label:'Protein',   val:r1(tot.p),     max:t.p,      unit:'g',    limit:false},
      {label:'Carbs',     val:r1(tot.c),     max:t.c,      unit:'g',    limit:false},
      {label:'Fat',       val:r1(tot.f),     max:t.f,      unit:'g',    limit:false},
      {label:'Fiber',     val:r1(tot.fiber), max:t.fiber,  unit:'g',    limit:false},
      {label:'Sugar',     val:r1(tot.sugar), max:t.sugar,  unit:'g',    limit:true },
      {label:'Sat Fat',   val:r1(tot.satFat),max:20,       unit:'g',    limit:true },
      {label:'Sodium',    val:r0(tot.sodium),max:t.sodium, unit:'mg',   limit:true }
    ];
    const barsHtml = rows.map(row => {
      const p   = pct(row.val, row.max);
      const col = barColor(p, row.limit);
      return `
      <div class="macro-bar-row">
        <span class="mbar-label">${row.label}</span>
        <div class="mbar-track">
          <div class="mbar-fill" style="width:${Math.min(100,p).toFixed(1)}%;background:${col}"></div>
        </div>
        <span class="mbar-values">${row.val}/${row.max}${row.unit}</span>
        <span class="mbar-pct" style="color:${col}">${r0(p)}%</span>
      </div>`;
    }).join('');

    // Macro quality score
    const pPct    = t.p     > 0 ? Math.min(1, tot.p     / t.p)     : 0;
    const fibPct  = t.fiber > 0 ? Math.min(1, tot.fiber / t.fiber) : 0;
    const mKeys   = Object.keys(RDA).filter(k => tot.micros[k]);
    const microPct = mKeys.length > 0
      ? mKeys.reduce((s,k) => s + Math.min(1, (tot.micros[k]||0) / RDA[k]), 0) / mKeys.length : 0;
    const sugarOK  = tot.sugar  <= SUGAR_LIMIT  ? 1 : Math.max(0, 1 - (tot.sugar / SUGAR_LIMIT  - 1));
    const sodiumOK = tot.sodium <= SODIUM_LIMIT ? 1 : Math.max(0, 1 - (tot.sodium / SODIUM_LIMIT - 1));
    const qualityScore = r0(
      pPct * 40 + fibPct * 20 + microPct * 20 + sugarOK * 10 + sodiumOK * 10
    );
    const qColor = qualityScore >= 70 ? '#6BE3A4' : qualityScore >= 45 ? '#F2C063' : '#FF6B6B';

    body = barsHtml + `
      <div class="quality-score-row">
        <span class="qs-label">Diet Quality Score</span>
        <span class="qs-num" style="color:${qColor}">${qualityScore}</span>
      </div>`;
  } else {
    // MICROS tab
    const vitKeys = ['vitA','vitC','vitD','vitE','vitK','b1','b2','b3','b6','b9','b12'];
    const minKeys = ['calcium','iron','magnesium','phosphorus','potassium','zinc','selenium'];
    const hasMicros = Object.keys(tot.micros).length > 0;

    if (!hasMicros) {
      body = `<div class="micros-empty">Log some foods to see your micronutrient breakdown.</div>`;
    } else {
      function microSection(title, keys) {
        const cells = keys.filter(k => tot.micros[k] > 0).map(k => {
          const got  = tot.micros[k] || 0;
          const rda  = RDA[k];
          const p    = rda ? Math.min(200, got / rda * 100) : 0;
          const col  = FAT_SOLUBLE.has(k) && p > 200 ? 'over'
                     : p >= 80 ? 'done' : '';
          const disp = got < 1 ? got.toFixed(2) : got < 10 ? r1(got) : r0(got);
          return `
          <div class="micro-cell">
            <div class="micro-name">${RDA_NAME[k]||k}</div>
            <div class="micro-vals">
              <span class="micro-got">${disp}</span>
              <span class="micro-rda">/ ${rda} ${RDA_UNIT[k]||''}</span>
            </div>
            <div class="micro-bar-track">
              <div class="micro-bar-fill ${col}" style="width:${Math.min(100,p).toFixed(1)}%"></div>
            </div>
          </div>`;
        }).join('');
        return cells ? `<div class="micro-section-label">${title}</div><div class="micro-grid">${cells}</div>` : '';
      }
      body = microSection('Vitamins', vitKeys) + microSection('Minerals', minKeys);
    }
  }

  document.getElementById('macrosMicrosCard').innerHTML = tabToggle + body;
}

/* ── §4 Progress ────────────────────────────────────── */
function renderProgress() {
  const wh    = (profile.weeklyWeightHistory || []).slice(-14);
  const trend = calcWeightTrend();
  const goalRate = (profile.goal==='bulk') ? 0.25 : -0.5;   // kg/week
  const pd    = phaseDay();
  const rTDEE = calcAdaptiveTDEE();
  const unit  = profile.weightUnit === 'lb' ? 'lb' : 'kg';

  // Weight chart SVG (560 × 120)
  let chartHtml = '';
  if (wh.length >= 2) {
    const W=560, H=100, PAD=12;
    const withW = wh.filter(w => w.kg != null);
    const allVals = withW.map(w => w.kg);
    const minW = Math.min(...allVals) - 1;
    const maxW = Math.max(...allVals) + 1;
    const xOf  = i => PAD + (i / (wh.length - 1)) * (W - PAD*2);
    const yOf  = v => PAD + (1 - (v - minW) / (maxW - minW)) * (H - PAD*2);

    // Goal-rate line from first weigh-in
    let goalLineHtml = '';
    if (withW.length >= 2) {
      const firstIdx = wh.findIndex(w => w.kg != null);
      const firstVal = wh[firstIdx].kg;
      const x0 = xOf(firstIdx), x1 = xOf(wh.length - 1);
      const goalEnd = firstVal + goalRate * (wh.length - 1 - firstIdx) / 7;
      const y0 = yOf(firstVal), y1 = yOf(goalEnd);
      goalLineHtml = `<line x1="${x0.toFixed(1)}" y1="${y0.toFixed(1)}" x2="${x1.toFixed(1)}" y2="${y1.toFixed(1)}"
        stroke="rgba(255,255,255,0.22)" stroke-width="1" stroke-dasharray="4 3"/>`;
    }

    // Line path
    const pts = withW.map(w => {
      const i = wh.indexOf(w);
      return `${xOf(i).toFixed(1)},${yOf(w.kg).toFixed(1)}`;
    });
    const pathD = 'M' + pts.join(' L');

    // Dots
    const dotsHtml = withW.map(w => {
      const i = wh.indexOf(w);
      return `<circle cx="${xOf(i).toFixed(1)}" cy="${yOf(w.kg).toFixed(1)}" r="3.5"
        fill="var(--success)" stroke="#050506" stroke-width="1.5"/>`;
    }).join('');

    chartHtml = `
    <div class="progress-chart-wrap">
      <svg viewBox="0 0 ${W} ${H+20}" preserveAspectRatio="none">
        <defs>
          <linearGradient id="wGrad" x1="0" y1="0" x2="0" y2="1">
            <stop offset="0%" stop-color="rgba(107,227,164,0.18)"/>
            <stop offset="100%" stop-color="rgba(107,227,164,0.01)"/>
          </linearGradient>
        </defs>
        ${goalLineHtml}
        <path d="${pathD} L${xOf(withW.length-1).toFixed(1)},${(H-PAD).toFixed(1)} L${xOf(0).toFixed(1)},${(H-PAD).toFixed(1)} Z"
          fill="url(#wGrad)"/>
        <path d="${pathD}" fill="none" stroke="#6BE3A4" stroke-width="2.5"
          stroke-linecap="round" stroke-linejoin="round"/>
        ${dotsHtml}
        <text x="${PAD}" y="${H+15}" font-size="9" fill="rgba(255,255,255,0.28)" font-family="ui-monospace,monospace">${wh[0]&&wh[0].date?wh[0].date.slice(5):''}</text>
        <text x="${W-PAD}" y="${H+15}" font-size="9" fill="rgba(255,255,255,0.28)" text-anchor="end" font-family="ui-monospace,monospace">Today</text>
        <text x="${(W/2).toFixed(0)}" y="${H+15}" font-size="9" fill="rgba(255,255,255,0.20)" text-anchor="middle" font-family="ui-monospace,monospace">- - - goal rate</text>
      </svg>
    </div>`;
  } else {
    chartHtml = `<div class="empty-hint" style="padding:20px 0">Log your weight below to see your trend chart.</div>`;
  }

  // Trend warning
  let trendWarnHtml = '';
  if (trend != null) {
    const losing = trend < 0;
    if (profile.goal === 'cut' || profile.goal === 'mini_cut') {
      const pctPerWeek = Math.abs(trend) / weightKg * 100;
      if (pctPerWeek > 1.0)
        trendWarnHtml = `<div class="trend-warn-card">⚠ Losing ${Math.abs(trend).toFixed(2)} kg/week — above 1% body weight. Risk of muscle loss. Add 150–200 kcal.</div>`;
    } else if (profile.goal === 'bulk') {
      if (trend > 0.5)
        trendWarnHtml = `<div class="trend-warn-card">⚠ Gaining ${trend.toFixed(2)} kg/week — above 0.5 kg. Reduce by 150 kcal or add cardio.</div>`;
    }
  }

  // Adaptive TDEE card
  let adaptiveHtml = '';
  if (rTDEE != null && Math.abs(rTDEE - targets.tdee) > 150) {
    adaptiveHtml = `
    <div class="adaptive-tdee-card">
      <div class="atd-title">Adaptive TDEE</div>
      <div class="atd-body">Based on your actual weight trend, your real TDEE is
        <strong>~${rTDEE} kcal/day</strong> vs your calculated ${targets.tdee} kcal.
        ${rTDEE > targets.tdee ? 'You burn more than estimated — you can eat a bit more.' : 'You burn less than estimated — tighten up slightly.'}
      </div>
      <button class="atd-use" id="useAdaptiveTDEE" data-rtdee="${rTDEE}">Use ${rTDEE} kcal →</button>
    </div>`;
  }

  // Phase timer & LBM
  let phaseHtml = '';
  if (pd) {
    const goalName = goalLabel(profile.goal);
    let phaseWarn = '';
    if ((profile.goal==='cut'||profile.goal==='mini_cut') && pd > 70)
      phaseWarn = `<span class="phase-warn">Consider a 1–2 week diet break to restore hormones.</span>`;
    if (profile.goal==='bulk' && pd > 112)
      phaseWarn = `<span class="phase-warn">16+ weeks bulking — time to assess and consider cutting.</span>`;
    const lbmNote = targets.leanKg
      ? `<span class="lbm-note">Lean mass: <strong>${targets.leanKg} kg</strong></span>` : '';
    phaseHtml = `
    <div class="phase-row">
      <span class="phase-badge">Day ${pd} of ${goalName}</span>
      ${phaseWarn}${lbmNote}
    </div>`;
  }

  // Check-in row
  const streak = (() => {
    let s = 0;
    const today = todayStr();
    for (let i = 0; i < 30; i++) {
      const d = new Date(); d.setDate(d.getDate() - i);
      const ds = d.toISOString().split('T')[0];
      if (ds === today) { if((profile.weeklyWeightHistory||[]).some(w=>w.date===ds)) s++; else break; }
      else { if((profile.weeklyWeightHistory||[]).some(w=>w.date===ds)) s++; else break; }
    }
    return s;
  })();

  document.getElementById('progressCard').innerHTML = `
    ${trendWarnHtml}
    ${chartHtml}
    ${adaptiveHtml}
    <div class="checkin-row">
      <input class="checkin-input" id="weightInput" type="number" step="0.1"
        placeholder="Today's weight (${unit})…">
      <button class="checkin-btn" id="logWeightBtn">Log weight</button>
      ${streak > 0 ? `<span class="checkin-streak">🔥 ${streak}-day streak</span>` : ''}
    </div>
    ${phaseHtml}`;
}

    </button>`

    <div class="food-grid" id="foodGrid">${gridHtml}</div>
    <div class="custom-form" id="customForm">

      <label class="narrow">P (g)<input type="number" id="cfP" placeholder="0" min="0"></label>
      <label class="narrow">C (g)<input type="number" id="cfC" placeholder="0" min="0"></label>

      <button class="custom-save-btn" id="customSaveBtn">+ Add</button>
    </div>`;
}

function foodBtnHtml(food, fidx) {
  const isHiPro = food.kcal > 0 && (food.p / food.kcal) > 0.25;
  return `
  <button class="food-btn" data-fidx="${fidx}">
    <div class="fb-top">
      <span class="fb-emoji">${food.emoji||'🍽️'}</span>
      ${isHiPro ? '<span class="fb-badge" title="High protein efficiency">💪</span>' : ''}
    </div>
    <div class="fb-name">${esc(food.name)}</div>
    <div class="fb-kcal">${r0(food.kcal * food.servingG / 100)} kcal</div>
    <div class="fb-macros">${r0(food.p * food.servingG/100)}P · ${r0(food.c * food.servingG/100)}C · ${r0(food.f * food.servingG/100)}F</div>
  </button>`;
}

/* ── §6 Insights ────────────────────────────────────── */
function renderInsights() {
  // Build last 7 days
  const days = [];
  for (let i = 6; i >= 0; i--) {
    const d = new Date(); d.setDate(d.getDate() - i);
    const ds = d.toISOString().split('T')[0];
    const h  = history.find(e => e.date === ds);
    days.push({
      label: d.toLocaleDateString([],{weekday:'short'}),
      kcal:  h ? h.kcal : (i===0 ? r0(calcDayTotals().kcal) : 0),
      p:     h ? h.p    : (i===0 ? r0(calcDayTotals().p)    : 0),
      hasData: !!h || i===0
    });
  }

  // Dual bar chart SVG
  const W=560, H=110, PAD_T=8, PAD_B=22;
  const chartH = H - PAD_T - PAD_B;
  const groupW = (W - 20) / 7;
  const barW   = (groupW - 10) / 2;
  const maxKcal = Math.max(targets.kcal * 1.2, ...days.map(d=>d.kcal));
  const maxP    = Math.max(targets.p * 1.2, ...days.map(d=>d.p));

  const targetY = (PAD_T + (1 - targets.kcal/maxKcal) * chartH).toFixed(1);

  const bars = days.map((day,i) => {
    const x   = 10 + i * groupW;
    const kPct = maxKcal > 0 ? day.kcal / maxKcal : 0;
    const pPct = maxP    > 0 ? day.p    / maxP    : 0;
    const kH   = (kPct * chartH).toFixed(1);
    const pH   = (pPct * chartH).toFixed(1);
    const kY   = (PAD_T + chartH - kH).toFixed(1);
    const pY   = (PAD_T + chartH - pH).toFixed(1);
    const kColor = day.kcal >= targets.kcal * 0.9 && day.kcal <= targets.kcal * 1.1
      ? '#6BE3A4' : day.kcal >= targets.kcal * 0.7 ? '#F2C063' : '#76746E';
    return `
      <rect x="${x.toFixed(1)}" y="${kY}" width="${barW.toFixed(1)}" height="${kH}"
        fill="${day.hasData ? kColor : 'rgba(255,255,255,0.06)'}" rx="2" opacity="0.85"
        class="insight-bar" data-day="${i}"/>
      <rect x="${(x+barW+2).toFixed(1)}" y="${pY}" width="${barW.toFixed(1)}" height="${pH}"
        fill="${day.hasData ? 'rgba(125,211,252,0.7)' : 'rgba(255,255,255,0.04)'}" rx="2"
        class="insight-bar" data-day="${i}"/>
      <text x="${(x + groupW/2).toFixed(1)}" y="${H+2}" font-size="9"
        fill="rgba(255,255,255,0.35)" text-anchor="middle" font-family="ui-monospace,monospace">
        ${day.label}
      </text>`;
  }).join('');

  const chartSvg = `
  <div class="insight-chart-wrap" id="insightChartWrap">
    <svg viewBox="0 0 ${W} ${H+16}" preserveAspectRatio="none" id="insightSvg">
      <line x1="10" y1="${targetY}" x2="${W-10}" y2="${targetY}"
        stroke="rgba(255,255,255,0.22)" stroke-width="1" stroke-dasharray="4 3"/>
      <text x="12" y="${(parseFloat(targetY)-3).toFixed(1)}" font-size="8"
        fill="rgba(255,255,255,0.3)" font-family="ui-monospace,monospace">target</text>
      ${bars}
    </svg>
    <div id="insightTooltip" class="insight-tooltip" style="display:none"></div>
  </div>`;

  // Stat tiles
  const protStreak = (() => {
    let s=0;
    for (let i=0;i<30;i++) {
      const d=new Date(); d.setDate(d.getDate()-i);
      const ds=d.toISOString().split('T')[0];
      const h=history.find(e=>e.date===ds);
      const p= i===0 ? calcDayTotals().p : h ? h.p : 0;
      if(p >= targets.p * 0.8) s++; else break;
    }
    return s;
  })();

  const weekKcals = days.filter(d=>d.hasData).map(d=>d.kcal);
  const avgKcal   = weekKcals.length ? r0(weekKcals.reduce((a,b)=>a+b,0)/weekKcals.length) : 0;
  const kcalDelta = avgKcal - targets.kcal;
  const deltaColor = Math.abs(kcalDelta) < 100 ? 'var(--success)' : kcalDelta > 0 ? 'var(--danger)' : 'var(--warning)';

  const bestDay = days.reduce((best, day, i) => {
    if (!day.hasData) return best;
    const kp = targets.kcal > 0 ? day.kcal/targets.kcal*100 : 0;
    const pp = targets.p    > 0 ? day.p   /targets.p   *100 : 0;
    const cp = targets.c    > 0 ? (history.find(h=>h.date===new Date(Date.now()-i*86400000).toISOString().split('T')[0])||{}).c||0 / targets.c * 100 : 0;
    const ok = kp>=80&&kp<=110 && pp>=80;
    return ok && (best.idx===-1 || day.kcal > best.kcal) ? {idx:i,label:day.label,kcal:day.kcal} : best;
  }, {idx:-1,label:'—',kcal:0});

  const tilesHtml = `
  <div class="insight-tiles">
    <div class="insight-tile">
      <div class="it-label">Protein Streak</div>
      <div class="it-val">${protStreak > 0 ? protStreak+'d' : '0d'} ${protStreak>=3?'🔥':''}</div>
      <div class="it-sub">Days ≥80% protein target</div>
    </div>
    <div class="insight-tile">
      <div class="it-label">Avg Calories</div>
      <div class="it-val">${avgKcal} kcal</div>
      <div class="it-sub" style="color:${deltaColor}">
        ${kcalDelta >= 0 ? '+' : ''}${kcalDelta} vs target
      </div>
    </div>
    <div class="insight-tile">
      <div class="it-label">Best Macro Day</div>
      <div class="it-val">${bestDay.idx >= 0 ? bestDay.label : '—'}</div>
      <div class="it-sub">All macros 80–110% ✓</div>
    </div>
  </div>`;

  // Refeed card (cut only)
  let refeedHtml = '';
  const cutDays = daysSinceRefeed();
  if ((profile.goal==='cut'||profile.goal==='mini_cut') && cutDays >= 5) {
    refeedHtml = `
    <div class="refeed-card">
      <div class="refeed-text">
        <strong>${cutDays} consecutive cut days</strong> — a refeed tomorrow will restore leptin and performance.
      </div>
      <button class="refeed-btn" id="refeedBtn">Schedule Refeed ↗</button>
    </div>`;
  }

  // Personalised tip
  const tip = buildTip();

  document.getElementById('insightsCard').innerHTML =
    chartSvg + tilesHtml + refeedHtml +
    `<div class="tip-card"><span class="tip-icon">${tip.icon}</span>
     <span class="tip-text">${tip.html}</span></div>`;
}

function buildTip() {
  const tot = calcDayTotals();
  const t   = targets;
  const trend = calcWeightTrend();

  if (whoop.recovery != null && whoop.recovery < 55)
    return {icon:'⚠️', html:`WHOOP recovery is <strong>${r0(whoop.recovery)}%</strong> — eat at maintenance today (${t.tdee} kcal). Deep deficits on low-HRV days extend recovery time.`};

  if ((profile.goal==='cut'||profile.goal==='mini_cut') && trend != null && trend < -(weightKg*0.01))
    return {icon:'⚠️', html:`You're losing <strong>${Math.abs(trend).toFixed(2)} kg/wk</strong> — above safe rate. Add 150–200 kcal to protect muscle mass.`};

  if (profile.goal==='cut' && trend != null && Math.abs(trend) < 0.05) {
    const staleDays = history.filter(h=>h.weight!=null).slice(-10);
    if (staleDays.length >= 10) {
      const change = Math.abs(staleDays[staleDays.length-1].weight - staleDays[0].weight);
      if (change < 0.2) return {icon:'📉', html:`Weight has stalled for 10+ days. Drop <strong>100–150 kcal</strong> from carbs or add a 20-min cardio session.`};
    }
  }
  if (profile.goal==='bulk' && trend != null && trend < 0.05)
    return {icon:'📈', html:`Weight isn't moving. Add <strong>100–150 kcal</strong> (prefer carbs around training) to resume lean gains.`};

  if (t.p > 0 && tot.p < t.p * 0.6) {
    const af = allFoods();
    const top2 = af.filter(f=>f.kcal>0 && f.p/f.kcal>0.25).sort((a,b)=>b.p/b.kcal-a.p/a.kcal).slice(0,2);
    const suggest = top2.map(f=>`<strong>${f.name}</strong>`).join(' or ');
    return {icon:'💪', html:`Only <strong>${r0(tot.p)}g</strong> protein so far. Need ${r0(t.p - tot.p)}g more. Try ${suggest||'chicken, tuna, or Greek yogurt'}.`};
  }
  if (t.fiber > 0 && tot.fiber < t.fiber * 0.4)
    return {icon:'🥦', html:`Fiber is low (<strong>${r1(tot.fiber)}g</strong> of ${t.fiber}g target). Add broccoli, lentils, or oats to your next meal.`};
  if (tot.sodium > 2300 * 0.9)
    return {icon:'💧', html:`Sodium is high (<strong>${r0(tot.sodium)}mg</strong>). Drink extra water and eat potassium-rich foods like banana or potato to balance.`};

  const pd = phaseDay();
  const msg = pd ? ` — Day ${pd} of your ${goalLabel(profile.goal).toLowerCase()} phase.` : '.';
  return {icon:'🎯', html:`You're on track${msg} Keep hitting your protein and you'll see results.`};
}

/* ══════════════════════════════════════════════════════
   MFP CSV PARSER
   ══════════════════════════════════════════════════════ */
let mfpImported = false;

function parseCSVLine(line) {
  const result = []; let cur = ''; let inQ = false;
  for (let i = 0; i < line.length; i++) {
    const ch = line[i];
    if (ch === '"') { inQ = !inQ; }
    else if (ch === ',' && !inQ) { result.push(cur.trim().replace(/^"|"$/g,'')); cur = ''; }
    else { cur += ch; }
  }
  result.push(cur.trim().replace(/^"|"$/g,''));
  return result;
}

function parseMFPcsv(text) {
  const lines = text.split(/\r?\n/).map(l => l.trim()).filter(l => l && l !== ',,,,,,,');
  if (!lines.length) return [];
  const header = lines[0].toLowerCase();
  // Detect format: food-log has "food name" or "date" column headers
  if (header.includes('food name') || header.includes('serving size') || (header.includes('date') && header.includes('meal'))) {
    return parseFoodLogFormat(lines);
  }
  return parseSummaryFormat(lines);
}

function parseSummaryFormat(lines) {
  const mealMap = {breakfast:'breakfast',lunch:'lunch',dinner:'dinner',snacks:'snacks',snack:'snacks','morning snack':'snacks','afternoon snack':'snacks','evening snack':'snacks'};
  const entries = [];
  // Find header row to determine column order
  let calIdx=1, carbIdx=2, fatIdx=3, protIdx=4, sodIdx=5, sugIdx=6, fibIdx=7;
  lines.forEach(line => {
    const cols = parseCSVLine(line);
    const rowLabel = (cols[0]||'').toLowerCase().trim();

    // Try to detect header row
    if (rowLabel === '' && cols.some(c => c.toLowerCase().includes('calor'))) {
      calIdx  = cols.findIndex(c => c.toLowerCase().includes('calor'));
      carbIdx = cols.findIndex(c => c.toLowerCase().includes('carbo'));
      fatIdx  = cols.findIndex(c => c.toLowerCase().includes('fat') && !c.toLowerCase().includes('sat'));
      protIdx = cols.findIndex(c => c.toLowerCase().includes('protein'));
      sodIdx  = cols.findIndex(c => c.toLowerCase().includes('sodium'));
      sugIdx  = cols.findIndex(c => c.toLowerCase().includes('sugar'));
      fibIdx  = cols.findIndex(c => c.toLowerCase().includes('fib'));
      return;
    }

    const meal = mealMap[rowLabel];
    if (!meal) return;
    const kcal   = parseFloat(cols[calIdx])  || 0;
    const carbs  = parseFloat(cols[carbIdx]) || 0;
    const fat    = parseFloat(cols[fatIdx])  || 0;
    const prot   = parseFloat(cols[protIdx]) || 0;
    const sodium = parseFloat(cols[sodIdx])  || 0;
    const sugar  = parseFloat(cols[sugIdx])  || 0;
    const fiber  = fibIdx >= 0 ? parseFloat(cols[fibIdx]) || 0 : 0;
    if (kcal <= 0 && prot <= 0) return;
    entries.push({
      id: Date.now() + Math.random(), meal,
      foodName: MEAL_INFO[meal].label + ' (MFP)',
      emoji: MEAL_INFO[meal].emoji,
      portionLabel: 'imported from MyFitnessPal',
      portionG: 0, kcal, p: prot, c: carbs, f: fat,
      fiber, sugar, satFat: 0, sodium, micros: {},
      ts: new Date().toISOString()
    });
  });
  return entries;
}

function parseFoodLogFormat(lines) {
  if (lines.length < 2) return [];
  const headers = parseCSVLine(lines[0]).map(h => h.toLowerCase().trim());
  const idx = {
    meal:    headers.findIndex(h => h === 'meal'),
    food:    headers.findIndex(h => h.includes('food') || h.includes('name')),
    kcal:    headers.findIndex(h => h.includes('calor')),
    carbs:   headers.findIndex(h => h.includes('carbo')),
    fat:     headers.findIndex(h => h.includes('fat') && !h.includes('sat')),
    protein: headers.findIndex(h => h.includes('protein')),
    sodium:  headers.findIndex(h => h.includes('sodium')),
    sugar:   headers.findIndex(h => h.includes('sugar')),
    fiber:   headers.findIndex(h => h.includes('fib')),
    satFat:  headers.findIndex(h => h.includes('sat'))
  };
  const mealMap = {breakfast:'breakfast',lunch:'lunch',dinner:'dinner',snacks:'snacks',snack:'snacks','morning snack':'snacks','afternoon snack':'snacks'};
  const entries = [];

  lines.slice(1).forEach(line => {
    const cols = parseCSVLine(line);
    if (!cols.length || !cols.some(c => c)) return;
    const foodName = idx.food >= 0 ? cols[idx.food] : '';
    if (!foodName || foodName.toLowerCase().includes('total') || foodName.toLowerCase().includes('daily total')) return;
    const mealRaw = (idx.meal >= 0 ? cols[idx.meal] : '').toLowerCase().trim();
    const meal = mealMap[mealRaw] || 'snacks';
    const kcal   = parseFloat(cols[idx.kcal])    || 0;
    const carbs  = parseFloat(cols[idx.carbs])   || 0;
    const fat    = parseFloat(cols[idx.fat])     || 0;
    const prot   = parseFloat(cols[idx.protein]) || 0;
    const sodium = idx.sodium >= 0 ? parseFloat(cols[idx.sodium]) || 0 : 0;
    const sugar  = idx.sugar  >= 0 ? parseFloat(cols[idx.sugar])  || 0 : 0;
    const fiber  = idx.fiber  >= 0 ? parseFloat(cols[idx.fiber])  || 0 : 0;
    const satFat = idx.satFat >= 0 ? parseFloat(cols[idx.satFat]) || 0 : 0;
    if (kcal <= 0 && prot <= 0) return;
    entries.push({
      id: Date.now() + Math.random(), meal,
      foodName: foodName || 'Food item',
      emoji: '🍽️',
      portionLabel: 'from MyFitnessPal',
      portionG: 0, kcal, p: prot, c: carbs, f: fat,
      fiber, sugar, satFat, sodium, micros: {},
      ts: new Date().toISOString()
    });
  });
  return entries;
}

function handleMFPFile(file) {
  if (!file) return;
  const reader = new FileReader();
  reader.onload = e => {
    const entries = parseMFPcsv(e.target.result);
    if (!entries.length) {
      alert('Could not read nutrition data from this file. Make sure you export from MFP → Diary → Export to Spreadsheet.');
      return;
    }
    // Clear today's logs and replace with MFP data
    logs = entries;
    mfpImported = true;
    saveLogs();
    rerender();
  };
  reader.readAsText(file);
}

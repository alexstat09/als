<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>Home</title>
  <meta name="theme-color" content="#050507">
  <link rel="stylesheet" href="aurora.css">
  <script src="topbar.js" defer></script>
  <style>
    /* ============================================================
       Instrument: a precise, single-accent dark language.
       Built on aurora.css tokens; overhauls the visual layer only.
       ============================================================ */
    :root{
      --bg:#050507;
      --ink:#F4F1EA;                    /* primary text */
      --dim:rgba(244,241,234,.56);      /* secondary */
      --faint:rgba(244,241,234,.32);    /* tertiary / labels */
      --ghost:rgba(244,241,234,.16);    /* icons at rest */
      --line:rgba(255,255,255,.07);     /* hairline */
      --line-2:rgba(255,255,255,.045);
      --surface:rgba(255,255,255,.022);
      --surface-2:rgba(255,255,255,.04);
      --accent:#34E2B0;                 /* the one accent */
      --accent-dim:rgba(52,226,176,.16);
      --warn:#F2C063;
      --alert:#FF6B8B;
      --r:15px;                         /* one radius */
      --r-sm:11px;
      --sans:-apple-system,BlinkMacSystemFont,"SF Pro Text","Segoe UI",Roboto,sans-serif;
      --mono:ui-monospace,"SF Mono",Menlo,Consolas,monospace;
    }
    *,*::before,*::after{ box-sizing:border-box; margin:0; padding:0; }
    html,body{ min-height:100%; }
    body{ background:var(--bg); color:var(--ink); font-family:var(--sans);
      -webkit-font-smoothing:antialiased; text-rendering:optimizeLegibility;
      padding:0 0 calc(88px + env(safe-area-inset-bottom)); }
    /* faint top light, no mesh/aurora */
    body::before{ content:''; position:fixed; inset:0 0 auto 0; height:340px; pointer-events:none; z-index:0;
      background:radial-gradient(120% 100% at 50% -20%, rgba(52,226,176,.06), transparent 60%); }
    .wrap{ max-width:480px; margin:0 auto; position:relative; z-index:1; padding:0 20px; }

    .ico{ width:1em; height:1em; display:inline-block; vertical-align:-.12em; fill:none;
      stroke:currentColor; stroke-width:1.75; stroke-linecap:round; stroke-linejoin:round; }

    .ribbon{ padding-top:10px; }
    .ribbon a{ display:inline-flex; align-items:center; gap:7px; font-family:var(--mono); font-size:10px; letter-spacing:.02em;
      color:var(--faint); text-decoration:none; }
    .ribbon .dot{ width:5px; height:5px; border-radius:50%; background:var(--accent); }

    /* ── Pulse ── */
    .pulse{ padding:22px 0 4px; display:flex; align-items:flex-start; justify-content:space-between; gap:16px; }
    .p-date{ font-family:var(--mono); font-size:11px; letter-spacing:.04em; color:var(--faint); }
    .p-greet{ font-size:27px; font-weight:600; letter-spacing:-.02em; line-height:1.12; margin-top:10px; color:var(--ink); }
    .p-next{ display:flex; align-items:center; gap:8px; margin-top:13px; font-size:13.5px; line-height:1.4; color:var(--dim); }
    .p-next .ico{ font-size:15px; color:var(--accent); flex-shrink:0; }
    .p-next b{ color:var(--ink); font-weight:600; }
    .p-nova{ width:38px; height:38px; flex-shrink:0; margin-top:3px; }

    .cta{ display:flex; gap:8px; margin-top:20px; }
    .cta-main{ flex:1; display:inline-flex; align-items:center; justify-content:center; gap:9px; padding:13px 16px; border-radius:var(--r);
      font-size:13.5px; font-weight:600; letter-spacing:-.01em; text-decoration:none; color:#04130D; background:var(--accent);
      transition:transform .14s cubic-bezier(.16,1,.3,1), filter .2s; }
    .cta-main .ico{ font-size:16px; }
    .cta-main:active{ transform:scale(.98); filter:brightness(1.05); }
    .cta-ico{ width:48px; display:inline-flex; align-items:center; justify-content:center; border-radius:var(--r); text-decoration:none;
      border:1px solid var(--line); background:var(--surface); color:var(--dim); font-size:17px; transition:transform .14s, color .2s, border-color .2s; }
    .cta-ico:active{ transform:scale(.95); }
    .cta-ico:hover{ color:var(--ink); border-color:var(--line); }

    /* ── Zone label ── */
    .zone{ display:flex; align-items:baseline; justify-content:space-between; margin:30px 2px 13px; }
    .zone-l{ font-size:12px; font-weight:600; letter-spacing:.02em; color:var(--ink); }
    .zone-r{ font-family:var(--mono); font-size:11px; color:var(--faint); text-decoration:none; display:inline-flex; align-items:center; gap:5px; }
    .zone-r .ico{ font-size:12px; }

    /* ── Today deck ── */
    .deck{ display:grid; grid-template-columns:1fr 1fr; gap:10px; }
    .m{ position:relative; background:var(--surface); border:1px solid var(--line); border-radius:var(--r); padding:15px 15px 14px;
      text-decoration:none; display:block; transition:transform .14s cubic-bezier(.16,1,.3,1), border-color .2s, background .2s; }
    .m:active{ transform:scale(.975); }
    .m:hover{ border-color:rgba(255,255,255,.12); background:var(--surface-2); }
    .m-top{ display:flex; align-items:center; gap:8px; color:var(--ghost); }
    .m-top .ico{ font-size:17px; }
    .m-lbl{ font-size:11px; font-weight:600; letter-spacing:.01em; color:var(--dim); }
    .m-add{ position:absolute; top:11px; right:11px; width:28px; height:28px; border-radius:9px; border:1px solid var(--line);
      background:transparent; color:var(--dim); display:flex; align-items:center; justify-content:center; cursor:pointer;
      transition:background .15s, color .15s, border-color .15s; -webkit-tap-highlight-color:transparent; }
    .m-add .ico{ font-size:15px; }
    .m-add:active{ background:var(--accent-dim); color:var(--accent); border-color:transparent; }
    .m-val{ font-family:var(--mono); font-size:29px; font-weight:600; letter-spacing:-.03em; color:var(--ink); line-height:1; margin-top:16px; }
    .m-val small{ font-size:13px; font-weight:500; color:var(--faint); letter-spacing:0; margin-left:1px; }
    .m-sub{ font-family:var(--mono); font-size:10.5px; color:var(--faint); margin-top:8px; letter-spacing:.01em; height:11px; }
    .m-sub .up{ color:var(--warn); } .m-sub .dn{ color:var(--accent); }
    .m-bar{ height:3px; border-radius:2px; background:rgba(255,255,255,.06); overflow:hidden; margin-top:9px; }
    .m-bar i{ display:block; height:100%; border-radius:2px; background:var(--accent); transition:width .4s cubic-bezier(.16,1,.3,1); }

    /* supplements slim row */
    .supp{ display:flex; align-items:center; gap:12px; margin-top:10px; padding:13px 15px; border:1px solid var(--line);
      border-radius:var(--r); background:var(--surface); text-decoration:none; transition:background .2s; }
    .supp:hover{ background:var(--surface-2); }
    .supp .ico{ font-size:17px; color:var(--ghost); }
    .supp-l{ font-size:11px; font-weight:600; color:var(--dim); }
    .supp-track{ height:3px; border-radius:2px; background:rgba(255,255,255,.06); overflow:hidden; margin-top:7px; }
    .supp-track i{ display:block; height:100%; background:var(--accent); border-radius:2px; transition:width .4s; }
    .supp-mid{ flex:1; min-width:0; }
    .supp-v{ font-family:var(--mono); font-size:14px; font-weight:600; color:var(--ink); white-space:nowrap; }

    /* ── search ── */
    .search{ display:flex; align-items:center; gap:10px; border:1px solid var(--line); border-radius:var(--r); padding:12px 15px; background:var(--surface); margin-bottom:6px; }
    .search .ico{ font-size:16px; color:var(--faint); }
    .search input{ flex:1; background:none; border:none; outline:none; color:var(--ink); font-family:var(--sans); font-size:14.5px; }
    .search input::placeholder{ color:var(--faint); }

    /* ── Spaces list (distinct family from the deck) ── */
    .grp{ margin-top:22px; }
    .grp-h{ font-family:var(--mono); font-size:10.5px; font-weight:600; letter-spacing:.14em; text-transform:uppercase; color:var(--faint); padding:0 2px 4px; }
    .row{ display:flex; align-items:center; gap:14px; padding:13px 4px; text-decoration:none; border-bottom:1px solid var(--line-2);
      transition:padding-left .18s; }
    .row:last-child{ border-bottom:none; }
    .row:active{ padding-left:8px; }
    .row-ic{ width:34px; height:34px; border-radius:10px; border:1px solid var(--line); display:flex; align-items:center; justify-content:center;
      color:var(--dim); flex-shrink:0; font-size:16px; background:var(--surface); }
    .row-t{ flex:1; min-width:0; }
    .row-n{ font-size:14.5px; font-weight:550; color:var(--ink); letter-spacing:-.01em; }
    .row-s{ font-family:var(--mono); font-size:11px; color:var(--faint); margin-top:2px; }
    .row-x{ color:var(--ghost); font-size:15px; }

    @media (prefers-reduced-motion: no-preference){
      .fade{ opacity:0; transform:translateY(8px); animation:fu .55s cubic-bezier(.16,1,.3,1) forwards; }
      @keyframes fu{ to{ opacity:1; transform:none; } }
    }

    .toast{ position:fixed; left:50%; bottom:calc(98px + env(safe-area-inset-bottom)); transform:translateX(-50%) translateY(10px);
      background:rgba(16,18,22,.94); border:1px solid var(--line); color:var(--ink); font-family:var(--mono); font-size:12px;
      padding:10px 15px; border-radius:11px; opacity:0; pointer-events:none; transition:.24s cubic-bezier(.16,1,.3,1); z-index:50;
      backdrop-filter:blur(14px); -webkit-backdrop-filter:blur(14px); display:flex; align-items:center; gap:8px; }
    .toast .ico{ font-size:14px; color:var(--accent); }
    .toast.show{ opacity:1; transform:translateX(-50%) translateY(0); }
  </style>
</head>

    <!-- Today -->

    <div id="spaces"></div>
  </div>

  <div class="toast" id="toast"></div>

      var wUnits=(ls('po_coach_v1')||{}).units||'kg', wtToday=we.find(function(e){ return e.dateKey===today(); });
      var last=we.length?we[we.length-1]:null, wDelta=null; if(we.length>=2) wDelta=we[we.length-1].weight-we[we.length-2].weight;
      var sl=(ls('sleep:logs')||[]).filter(Boolean), slT=sl.find(function(e){ return e&&e.dateKey===today(); });
      var slept=sl.filter(function(e){ return e&&e.hours>0; }).sort(function(a,b){ return a.dateKey<b.dateKey?-1:1; });
      var wo=(ls('po_workouts')||[]).filter(function(w){ return w&&w.date; }).sort(function(a,b){ return a.date<b.date?-1:1; });
      var woToday=wo.some(function(w){ return w.date===today(); }), woLast=wo.length?wo[wo.length-1].date:null;
      var d=new Date(),day=(d.getDay()+6)%7; d.setDate(d.getDate()-day); var weekStart=dateKey(d);
      var woWeek=wo.filter(function(w){ return w.date>=weekStart; }).length;
      var si=ls('stack:items')||[], stk=ls('stack:taken:'+suppToday())||{};
      var sd=si.filter(function(i){ return (i.window||'anytime')!=='occasional'; }), sTaken=sd.filter(function(i){ return !!stk[i.id]; }).length;
      return {wCount:wCount,wTarget:wTarget,cafTotal:cafTotal,cafN:cafLogs.length,kcal:kcal,calT:calT,
        wt:wtToday?wtToday.weight:(last?last.weight:null),wtToday:!!wtToday,wUnits:wUnits,wDelta:wDelta,
        slRec:slT&&slT.recovery!=null?slT.recovery:null,slLast:slept.length?slept[slept.length-1].hours:null,
        woToday:woToday,woLast:woLast,woWeek:woWeek,suppN:si.length,sTaken:sTaken,sTotal:sd.length};
    }

    /* ── today deck ── */
    function paintDeck(){
      var d=D();
      var wPct=Math.min(100,d.wCount/d.wTarget*100), cPct=Math.min(100,d.cafTotal/400*100), kPct=Math.min(100,d.kcal/d.calT*100);
      var cafCol=d.cafTotal>=400?'var(--alert)':d.cafTotal>=280?'var(--warn)':'var(--accent)';
      var kcalCol=d.kcal>d.calT*1.05?'var(--warn)':'var(--accent)';
      var dTxt='', dCls='';
      if(d.wDelta!=null&&d.wDelta!==0){ dCls=d.wDelta>0?'up':'dn'; dTxt=(d.wDelta>0?'+':'')+d.wDelta.toFixed(1)+' '+esc(d.wUnits)+(d.wtToday?'':' · last'); }
      else if(d.wt!=null){ dTxt=d.wtToday?'logged today':'not logged today'; }
      else dTxt='tap to log';
      var tiles=[
        {icon:'droplet',lbl:'Water',href:'po-water.html',add:'water',val:d.wCount+'<small>/'+d.wTarget+'</small>',bar:wPct,col:'var(--accent)',sub:''},
        {icon:'coffee',lbl:'Caffeine',href:'caffeine.html',add:'caf',val:d.cafTotal+'<small>mg</small>',bar:cPct,col:cafCol,sub:d.cafN+(d.cafN===1?' drink':' drinks')},
        {icon:'flame',lbl:'Calories',href:'nutrition.html',add:null,val:d.kcal+'<small>/'+d.calT+'</small>',bar:kPct,col:kcalCol,sub:Math.max(0,d.calT-d.kcal)+' left'},
        {icon:'scale',lbl:'Weight',href:'weight.html',add:null,val:(d.wt!=null?d.wt.toFixed(1):'--')+'<small> '+esc(d.wUnits)+'</small>',bar:null,sub:'<span class="'+dCls+'">'+dTxt+'</span>'},
        {icon:'moon',lbl:'Sleep',href:'sleep.html',add:null,val:(d.slRec!=null?d.slRec+'<small>/100</small>':(d.slLast!=null?Math.floor(d.slLast)+'<small>h</small>':'--')),bar:d.slRec!=null?d.slRec:null,col:'var(--accent)',sub:d.slRec!=null?'recovery':(d.slLast!=null?'last night':'log sleep')},
        {icon:'activity',lbl:'Training',href:'gym.html',add:null,val:d.woWeek+'<small>/wk</small>',bar:null,sub:d.woToday?'trained today':(d.woLast?'last '+fmtRel(d.woLast):'no workouts')}
      ];
      $('deck').innerHTML=tiles.map(function(t){
        return '<a class="m" data-go="'+t.href+'">'+
          (t.add?'<button class="m-add" data-add="'+t.add+'" aria-label="log">'+ic('plus')+'</button>':'')+
          '<div class="m-top">'+ic(t.icon)+'<span class="m-lbl">'+t.lbl+'</span></div>'+
          '<div class="m-val">'+t.val+'</div>'+
          '<div class="m-sub">'+(t.sub||'')+'</div>'+
          (t.bar!=null?'<div class="m-bar"><i style="width:'+Math.min(100,t.bar).toFixed(0)+'%;background:'+(t.col||'var(--accent)')+'"></i></div>':'<div class="m-bar" style="visibility:hidden"><i></i></div>')+
        '</a>';
      }).join('');
      $('deck').querySelectorAll('.m').forEach(function(el){ el.setAttribute('href',el.getAttribute('data-go')); });
      $('deck').querySelectorAll('.m-add').forEach(function(b){
        b.addEventListener('click',function(ev){ ev.preventDefault(); ev.stopPropagation();
          if(b.dataset.add==='water'){ var s=ls('po_water_v1')||{}; if(!s.logs)s.logs={}; s.logs[today()]=(s.logs[today()]||0)+1; s._ts=Date.now(); lsSave('po_water_v1',s); toast(ic('droplet')+'Water logged'); }
          else if(b.dataset.add==='caf'){ var all=ls('caf:logs')||[]; all.push({id:Date.now(),name:'Espresso',mg:63,emoji:'coffee',ts:new Date().toISOString()}); lsSave('caf:logs',all); toast(ic('coffee')+'Espresso · 63mg'); }
          paintDeck(); paintSupp(); paintPulse();
        });
      });
    }
    function paintSupp(){
      var d=D();
      if(!d.suppN){ $('suppRow').innerHTML=ic('pill')+'<div class="supp-mid"><div class="supp-l">Supplements</div></div><span class="supp-v" style="color:var(--faint)">set up</span>'+ic('chevron','rx'); return; }
      var pct=d.sTotal?d.sTaken/d.sTotal*100:0;
      $('suppRow').innerHTML=ic('pill')+'<div class="supp-mid"><div class="supp-l">Supplements</div><div class="supp-track"><i style="width:'+pct.toFixed(0)+'%"></i></div></div><span class="supp-v">'+d.sTaken+'/'+d.sTotal+'</span>';
    }

    /* ── pulse ── */
    function paintPulse(){
      var d=D(), h=new Date().getHours(), dd=new Date();
      var part=h<12?'morning':h<18?'afternoon':'evening';
      $('pGreet').textContent='Good '+part+', Alex.';
      $('pDate').textContent=['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'][dd.getDay()]+', '+['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'][dd.getMonth()]+' '+dd.getDate();
      var icon='sparkles', txt;
      if(d.wCount===0&&h<14){ icon='droplet'; txt='Start the day. <b>Log some water.</b>'; }
      else if(d.slRec==null&&d.slLast==null&&h<11){ icon='moon'; txt='<b>Log last night’s sleep</b> to set today’s recovery.'; }
      else if(!d.wtToday&&h<12){ icon='scale'; txt='<b>Weigh in</b> to keep the trend honest.'; }
      else if(d.cafTotal>=400){ icon='coffee'; txt='Over <b>400mg caffeine.</b> Ease off, hydrate.'; }
      else if(!d.woToday&&d.woWeek<3){ icon='activity'; txt='<b>'+(3-d.woWeek)+' workouts</b> left to hit your week.'; }
      else if(d.kcal>0&&d.kcal<d.calT-400){ icon='flame'; txt='<b>'+(d.calT-d.kcal)+' kcal</b> left today.'; }
      else { icon='sparkles'; txt='On top of it. <b>Everything’s on track.</b>'; }
      $('pNext').innerHTML=ic(icon)+'<span>'+txt+'</span>';
    }

    /* ── spaces ── */
    var SPACES=[
      {g:'Train',rows:[
        {ic:'dumbbell',n:'Fitness',href:'gym.html',live:'sFit',sub:'Workouts & splits'},
        {ic:'trophy',n:'PR Board',href:'pr.html',live:'sPR',sub:'All-time bests'} ]},
      {g:'Mind',rows:[
        {ic:'target',n:'Goals',href:'main.html',live:'sGoals',sub:'Daily plan'},
        {ic:'compass',n:'Identity',href:'identity.html',live:'sId',sub:'North Star & habits'},
        {ic:'bulb',n:'Ideas',href:'ideas.html',live:'sIdeas',sub:'Capture & organise'},
        {ic:'sprout',n:'Improve',href:'improve.html',live:'sImp',sub:'Learning & habits'} ]},
      {g:'Money',rows:[
        {ic:'chart',n:'Finance',href:'finance.html',live:'sFin',sub:'Net worth & spending'},
        {ic:'receipt',n:'Bills',href:'bills.html',live:'sBills',sub:'Calendar & no-spend'} ]},
      {g:'Life',rows:[
        {ic:'film',n:'Movies',href:'movies.html',live:'sMov',sub:'Rate & watchlist'},
        {ic:'sparkles',n:'Your Arc',href:'arc.html',live:'sArc',sub:'A cinematic scroll'},
        {ic:'trending',n:'Trends',href:'trends.html',live:'sTr',sub:'Charts over time'},
        {ic:'network',n:'Insights',href:'insights.html',live:'sIns',sub:'Patterns in your data'} ]},
      {g:'Study',rows:[
        {ic:'landmark',n:'Αρχαία',href:'arxaia.html',live:'sArx',sub:'Άγνωστο'},
        {ic:'book',n:'Ιστορία',href:'istoria.html',live:'sIst',sub:'όροι & νόημα'} ]}
    ];
    function paintSpaces(){
      $('spaces').innerHTML=SPACES.map(function(s){
        return '<section class="grp" data-grp><div class="grp-h">'+s.g+'</div>'+
          s.rows.map(function(t){
            return '<a class="row" data-go="'+t.href+'" data-name="'+esc(t.n.toLowerCase())+' '+esc(t.sub.toLowerCase())+'">'+
              '<span class="row-ic">'+ic(t.ic)+'</span>'+
              '<span class="row-t"><span class="row-n">'+esc(t.n)+'</span><span class="row-s" id="'+t.live+'">'+esc(t.sub)+'</span></span>'+
              ic('chevron','row-x')+'</a>';
          }).join('')+'</section>';
      }).join('');
      document.querySelectorAll('#spaces .row').forEach(function(el){ el.setAttribute('href',el.getAttribute('data-go')); });
    }
    function paintSpaceLive(){
      var set=function(id,v){ var el=$(id); if(el&&v) el.textContent=v; };
      try{ var wo=(ls('po_workouts')||[]).filter(function(w){return w&&w.date;}).sort(function(a,b){return a.date<b.date?-1:1;}); var last=wo.length?wo[wo.length-1].date:null; set('sFit',last?'Last workout '+fmtRel(last):'No workout yet'); }catch(e){}
      try{ var g=ls('goals:'+today())||[]; set('sGoals',g.length?g.filter(function(x){return x.done;}).length+' / '+g.length+' done today':'Set your goals'); }catch(e){}
      try{ var hl=ls('habits:list')||[],lg=ls('habits:log')||{}; var done=(Array.isArray(hl)?hl:[]).filter(function(h){return lg[today()]&&lg[today()][h.id];}).length; if(Array.isArray(hl)&&hl.length) set('sId',done+' / '+hl.length+' habits today'); }catch(e){}
      try{ var nw=0; ['bank','stocks','crypto','other'].forEach(function(c){ (ls('nw:'+c)||[]).forEach(function(it){ nw+=Number(it.amount)||0; }); }); var cur=ls('nw_currency')||'CHF'; set('sFin',nw>0?cur+' '+Math.round(nw).toLocaleString():'View dashboard'); }catch(e){}
      try{ var seen=(ls('movies:seen')||[]).filter(function(x){return x&&x.id;}); if(seen.length) set('sMov',seen.length+' rated'); }catch(e){}
      try{ if(window.ALSInsights){ var n=(window.ALSInsights.compute()||[]).length; set('sIns',n?n+(n===1?' pattern found':' patterns found'):'Connecting data'); } }catch(e){}
      try{ var W=ls('po_coach_weights')||[],WO=ls('po_workouts')||[],SL=ls('sleep:logs')||[],ds=[]; [W,WO,SL].forEach(function(A){ (Array.isArray(A)?A:[]).forEach(function(e){ var k=e&&(e.dateKey||e.date); if(k)ds.push(k); }); }); ds.sort(); var wc=(Array.isArray(WO)?WO:[]).filter(function(w){return w&&w.date;}).length; if(ds.length){ var days=Math.round((new Date(today()+'T00:00:00')-new Date(ds[0]+'T00:00:00'))/86400000)+1; set('sArc',days+' days · '+wc+' workouts'); } }catch(e){}
    }

    function boot(){
      $('icoWeekly').innerHTML=ic('calendar'); $('icoCoach').innerHTML=ic('message'); $('icoNova').innerHTML=ic('sparkles');
      $('measLink').innerHTML='Measurements '+ic('chevron'); $('searchIco').innerHTML=ic('search');
      $('ctaMain').innerHTML=ic('sunrise')+'<span>Morning briefing</span>';
      paintPulse(); paintDeck(); paintSupp(); paintSpaces(); paintSpaceLive();
      var q=$('q'); q.addEventListener('input',function(){ var v=q.value.trim().toLowerCase();
        document.querySelectorAll('#spaces .row').forEach(function(r){ r.style.display=(!v||(r.dataset.name||'').indexOf(v)>=0)?'':'none'; });
        document.querySelectorAll('#spaces .grp').forEach(function(g){ var any=[].slice.call(g.querySelectorAll('.row')).some(function(r){return r.style.display!=='none';}); g.style.display=any?'':'none'; });
      });
    }
    boot();
    window._homeRerender=function(){ paintPulse(); paintDeck(); paintSupp(); paintSpaceLive(); };
    document.addEventListener('visibilitychange',function(){ if(document.visibilityState==='visible') window._homeRerender(); });
    window.addEventListener('storage',function(){ window._homeRerender(); });
    window.addEventListener('focus',function(){ window._homeRerender(); });
    setInterval(paintPulse,30000);
  })();
  </script>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="pocoach-sync.js?v=2"></script>
  <script src="sync.js"></script>
  <script>
    (function(){ if(typeof window.initCloudSync!=='function')return;
      function rr(){ if(window._homeRerender){ try{ window._homeRerender(); }catch(e){} } }
      window.initCloudSync({ appKey:'health', syncedKeys:['stack:items','stack:low','po_water_v1'], syncedPrefixes:['stack:taken:'], onApplied:rr });
      window.initCloudSync({ appKey:'caffeine', syncedKeys:['caf:logs','caf:custom'], onApplied:rr });
    })();
  </script>
  <script src="insights.js" defer></script>
  <script src="insights-engine.js" defer></script>

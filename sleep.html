    </section>

    <!-- Your day — circadian energy schedule -->
    <section class="sl-sec" id="daySec" style="--sec-rgb:242,192,99">
      <div class="sl-sec-hdr"><span class="sl-sec-dot"></span><span class="sl-sec-title">Your day</span><span class="sl-sec-note">ENERGY SCHEDULE</span></div>
      <div class="sl-sec-body" id="dayBody"></div>
    </section>

    <!-- Trends -->
    <section class="sl-sec" style="--sec-rgb:52,226,176">
      <div class="sl-sec-hdr"><span class="sl-sec-dot"></span><span class="sl-sec-title">Trends</span><span class="sl-sec-note">LAST 14 NIGHTS</span></div>
      <div class="sl-sec-body" id="trendBody"></div>
    </section>

    <!-- Consistency calendar -->
    <section class="sl-sec" style="--sec-rgb:52,226,176">
      <div class="sl-sec-hdr"><span class="sl-sec-dot"></span><span class="sl-sec-title">Consistency</span><span class="sl-sec-note">LAST 12 WEEKS</span></div>
      <div class="sl-sec-body" id="consBody"></div>
    </section>

    <!-- What your sleep does to you (consequences) -->
    <section class="sl-sec" id="conSec" style="--sec-rgb:24,200,192">
      <div class="sl-sec-hdr"><span class="sl-sec-dot"></span><span class="sl-sec-title">What your sleep does to you</span><span class="sl-sec-note">CONSEQUENCES</span></div>
      <div class="sl-sec-body" id="conBody"></div>
    </section>

    <!-- What moves your sleep (levers) -->
    <section class="sl-sec" id="patSec" style="--sec-rgb:155,140,255">
      <div class="sl-sec-hdr"><span class="sl-sec-dot"></span><span class="sl-sec-title">What moves your sleep</span><span class="sl-sec-note">LEVERS</span></div>
      <div class="sl-sec-body" id="patBody"></div>
    </section>

    <!-- Every night you've ever logged -->
    <section class="sl-sec" id="histSec" style="--sec-rgb:155,140,255">
      <div class="sl-sec-hdr"><span class="sl-sec-dot"></span><span class="sl-sec-title">Every night</span><span class="sl-sec-note" id="histNote">YOUR HISTORY</span></div>
      <div class="sl-sec-body" id="histBody"></div>
    </section>

  </div>

  <script>
  (function () {
    'use strict';
    var KEY = 'sleep:logs';

    /* ── Helpers ──────────────────────────────────── */
    function pad(n){ return String(n).padStart(2,'0'); }
    function dateKey(d){ return d.getFullYear()+'-'+pad(d.getMonth()+1)+'-'+pad(d.getDate()); }
    function today(){ return dateKey(new Date()); }
    function ls(k){ try{ return JSON.parse(localStorage.getItem(k)); }catch(e){ return null; } }
    function lsSave(k,v){ try{ localStorage.setItem(k, JSON.stringify(v)); }catch(e){} }
    function esc(s){ return String(s==null?'':s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
    function clamp(v,a,b){ return Math.max(a, Math.min(b, v)); }

    function getLogs(){ var a = ls(KEY); return Array.isArray(a) ? a : []; }
    function entryFor(dk){
      var logs = getLogs();
      for (var i=0;i<logs.length;i++){ if (logs[i] && logs[i].dateKey === dk) return logs[i]; }
      return null;
    }
    function todayEntry(){ return entryFor(today()) || { id:'sl-'+today(), dateKey:today() }; }

    /* hours between bed (HH:MM) and wake (HH:MM), wrapping past midnight */
    function calcHours(bed, wake){
      if (!bed || !wake) return null;
      var b = bed.split(':'), w = wake.split(':');
      var bm = (+b[0])*60 + (+b[1]), wm = (+w[0])*60 + (+w[1]);
      var diff = wm - bm; if (diff <= 0) diff += 1440;
      return Math.round(diff / 60 * 100) / 100;
    }
    function fmtHM(hours){
      if (hours == null) return '—';
      var h = Math.floor(hours), m = Math.round((hours - h) * 60);
      if (m === 60){ h += 1; m = 0; }
      return h + 'h' + (m ? ' ' + m + 'm' : '');
    }

    /* ══════════ THE SLEEP SCORE — measured inputs only ══════════
       This number scores the NIGHT, not the man. Nothing you feel goes in:
       energy / mood / stress / soreness are the OUTCOME of sleep, and putting
       them inside the score made it circular (feel bad → score bad → "your
       sleep was bad"). Four measured components, weights renormalized over
       whatever exists, so old nights still score on what they have:

         Duration  .45  — time ASLEEP vs your personal need (curvilinear)
         Efficiency .25 — asleep ÷ time in bed (latency + awakenings)
         Timing    .18  — SD of your sleep midpoint (regularity)
         Debt      .12  — rolling 14-night sleep debt

       Every historical night is scored using ONLY nights up to and including
       itself (uptoDK) — no leaking the future into the past. */

    // Duration vs personal need — curvilinear in BOTH directions.
    // Short sleep hurts fast. Oversleep hurts too: the old curve floored at 82,
    // which is how a 12-hour night used to score in the 80s. It shouldn't —
    // routinely sleeping hours past your need is a signal, not an achievement.
    function durScore(hours, need){
      if (!(hours > 0)) return null;
      if (hours >= need) return clamp(100 - Math.pow(hours - need, 1.4) * 11, 30, 100);
      return clamp(100 - Math.pow(need - hours, 1.5) * 18, 0, 100);
    }
    // sleep efficiency → score. Anchors from sleep medicine: <60% is severe
    // insomnia territory, 85% is the clinical "good sleep" line, 95%+ is ideal.
    var EFF_ANCHORS = [[0.60,0],[0.75,50],[0.85,80],[0.92,95],[0.97,100]];
    function effScore(eff){
      if (eff == null) return null;
      if (eff <= EFF_ANCHORS[0][0]) return 0;
      for (var i=1;i<EFF_ANCHORS.length;i++){
        var p = EFF_ANCHORS[i-1], q = EFF_ANCHORS[i];
        if (eff <= q[0]) return clamp(p[1] + (eff - p[0]) / (q[0] - p[0]) * (q[1] - p[1]), 0, 100);
      }
      return 100;
    }
    // Time in bed (what bed→wake actually measures).
    function inBedHours(e){
      if (!e) return null;
      if (e.bed && e.wake) return calcHours(e.bed, e.wake);
      return (e.hours > 0) ? e.hours : null;      // MCP-written nights have hours only
    }
    // Time ASLEEP = in bed − time to fall asleep − time awake in the night.
    // Each awakening costs ~10 min back to sleep.
    function asleepHours(e){
      var tib = inBedHours(e); if (!(tib > 0)) return null;
      var loss = ((e.latency > 0 ? e.latency : 0) + (e.wakes > 0 ? e.wakes * 10 : 0)) / 60;
      return Math.max(0.5, Math.round((tib - loss) * 100) / 100);
    }
    // Only claim an efficiency when he actually told us latency or awakenings.
    function efficiencyOf(e){
      if (!e || (e.latency == null && e.wakes == null)) return null;
      var tib = inBedHours(e), a = asleepHours(e);
      if (!(tib > 0) || a == null) return null;
      return clamp(a / tib, 0, 1);
    }
    function midMin(e){
      if (!e || !e.bed || !e.wake) return null;
      var b=e.bed.split(':'), w=e.wake.split(':');
      var bm=(+b[0])*60+(+b[1]), wm=(+w[0])*60+(+w[1]); if (wm<=bm) wm+=1440;
      return ((bm+wm)/2)%1440;
    }
    // timing regularity: SD of sleep midpoint over the 14 nights up to uptoDK
    function regularityScore(uptoDK){
      var mids = getLogs().filter(function(e){ return e && e.dateKey && e.bed && e.wake && (!uptoDK || e.dateKey <= uptoDK); })
        .sort(function(a,b){ return a.dateKey < b.dateKey ? 1 : -1; }).slice(0,14)
        .map(midMin).filter(function(v){ return v != null; })
        .map(function(m){ return m < 720 ? m+1440 : m; });   // early-AM midpoints → post-midnight space
      if (mids.length < 4) return null;
      var mean = mids.reduce(function(a,b){ return a+b; },0)/mids.length;
      var sd = Math.sqrt(mids.reduce(function(a,b){ return a+(b-mean)*(b-mean); },0)/mids.length);
      return { score: clamp(100 - Math.max(0, sd-25)*0.8, 20, 100), sd: Math.round(sd) };
    }
    // cumulative sleep debt over the 14 logged nights up to uptoDK (clamped ±2h/night)
    function debtInfo(need, uptoDK){
      var nights = getLogs().filter(function(e){ return e && e.dateKey && inBedHours(e) > 0 && (!uptoDK || e.dateKey <= uptoDK); })
        .sort(function(a,b){ return a.dateKey < b.dateKey ? 1 : -1; }).slice(0,14);
      if (nights.length < 3) return null;
      var debt = nights.reduce(function(s,e){ var a = asleepHours(e); return s + clamp(need - (a != null ? a : e.hours), -2, 2); }, 0);
      return { debt: debt, score: clamp(100 - Math.max(0, debt-1)*7, 25, 100), nights: nights.length };
    }

    var W_DUR = 0.45, W_EFF = 0.25, W_TIM = 0.18, W_DEBT = 0.12;

    // The engine. Kept under the name `recovery()` because the rest of the app
    // (coach, arc, insights, weekly, Nova, MCP) reads e.recovery — that field
    // now carries the honest, measured sleep score.
    function recovery(e){
      if (!e) return null;
      var need = getProfile().need, dk = e.dateKey;
      var tib = inBedHours(e);
      if (!(tib > 0)) return null;                       // no measured night → no score
      var asleep = asleepHours(e), eff = efficiencyOf(e);
      var reg = regularityScore(dk), dbt = debtInfo(need, dk);
      var C = [
        ['Duration',   durScore(asleep, need),      W_DUR],
        ['Efficiency', effScore(eff),               W_EFF],
        ['Timing',     reg ? reg.score : null,      W_TIM],
        ['Debt',       dbt ? dbt.score : null,      W_DEBT]
      ];
      var sum = 0, wsum = 0, parts = [];
      C.forEach(function(x){ if (x[1] != null){ sum += x[1]*x[2]; wsum += x[2]; parts.push({ label:x[0], score:Math.round(x[1]) }); } });
      if (!wsum) return null;
      return {
        score: Math.round(sum/wsum), parts: parts, n: parts.length,
        reg: reg, dbt: dbt, need: need,
        inBed: tib, asleep: asleep, eff: eff,
        hasEff: eff != null
      };
    }
    // Verdicts describe the SLEEP, not the body.
    function verdictFor(score){
      if (score >= 85) return { mood:'hot',   rgb:'52,226,176',  word:'Excellent', advice:'A long, unbroken night at a steady hour. This is what your best sleep looks like.' };
      if (score >= 70) return { mood:'calm',  rgb:'24,200,192',  word:'Solid',     advice:'A good night — enough sleep, taken at roughly the right time.' };
      if (score >= 55) return { mood:'low',   rgb:'242,192,99',  word:'Patchy',    advice:'Short or broken. One night won’t hurt you — two in a row will.' };
      return                  { mood:'alert', rgb:'255,107,139', word:'Poor',      advice:'Not enough real sleep. Protect tonight: earlier bed, same wake time.' };
    }

    /* ── Save a field on today’s entry ───────────── */
    function flashNote(id){
      var n = document.getElementById(id); if (!n) return;
      var was = n.textContent; n.textContent = 'SAVED ✓'; n.classList.add('saved');
      clearTimeout(n._t); n._t = setTimeout(function(){ n.textContent = was; n.classList.remove('saved'); }, 1100);
    }
    // Recompute the derived fields on an entry from its RAW inputs. Never
    // touches bed / wake / latency / wakes / feelings. Never invents `hours`
    // for an entry that only has hours (MCP-written nights have no bed/wake).
    function recomputeDerived(e){
      if (e.bed && e.wake) e.hours = calcHours(e.bed, e.wake);
      var a = asleepHours(e), eff = efficiencyOf(e), r = recovery(e);
      e.asleep = a;
      e.efficiency = (eff != null) ? Math.round(eff * 1000) / 1000 : null;
      e.sleepScore = r ? r.score : null;
      e.recovery = e.sleepScore;      // compat: the whole app reads e.recovery
      return e;
    }
    function setField(field, value, noteId){
      var dk = today();
      var logs = getLogs();
      var idx = -1;
      for (var i=0;i<logs.length;i++){ if (logs[i] && logs[i].dateKey === dk){ idx = i; break; } }
      var e = idx >= 0 ? logs[idx] : { id:'sl-'+dk, dateKey:dk };
      e[field] = value;
      if (idx >= 0) logs[idx] = e; else logs.push(e);
      lsSave(KEY, logs);              // in the array first, so recompute sees tonight
      recomputeDerived(e);
      e.ts = Date.now();
      lsSave(KEY, logs);
      if (noteId) flashNote(noteId);
      // Editing a time input? Refresh only the derived UI — rebuilding
      // #sleepBody here would destroy the <input type=time> mid-pick (on iOS
      // that drops the value / closes the wheel, so the time won't stick).
      if (field === 'bed' || field === 'wake') refreshDerived();
      else renderAll();
    }

    // Update everything that depends on the entry WITHOUT touching the bed/wake
    // inputs (so an in-progress time pick isn't interrupted).
    function refreshDerived(){
      var e = todayEntry();
      var durEl = document.querySelector('#sleepBody .sl-dur-val');
      if (durEl) durEl.textContent = fmtHM(asleepHours(e));
      renderRecovery();
      renderTonight();
      renderDay();
      renderTrends();
      renderConsistency();
      renderPatterns();
      renderConsequences();
      renderHistory();
      updateNova();
      try{ if(window.PageMotion){ PageMotion.scan(window.__slTagged?null:'.sl-hero,.sl-sec'); window.__slTagged=1; } }catch(e){}
    }

    /* ── One-tap sleep / wake buttons. Pending bedtime is kept LOCAL (not synced)
       since it's transient; the finished entry is filed under the wake day via
       setField (calcHours wraps past midnight), so a 23:30→07:00 night lands on
       the morning's date automatically. ── */
    var PEND = 'sleep:pending';
    function hm(ts){ var d = new Date(ts); return pad(d.getHours()) + ':' + pad(d.getMinutes()); }
    function getPending(){ var p = ls(PEND); return (p && typeof p.at === 'number') ? p : null; }
    function goSleep(){ lsSave(PEND, { at: Date.now() }); flashNote('sleepNote'); renderAll(); }
    function cancelSleep(){ try{ localStorage.removeItem(PEND); }catch(e){} renderAll(); }
    function wokeUp(){
      var now = Date.now(), p = getPending();
      if (p){
        var dur = (now - p.at) / 3600000;
        try{ localStorage.removeItem(PEND); }catch(e){}
        if (dur >= 0.33 && dur <= 16){            // a real night → pair bedtime + wake
          setField('bed', hm(p.at), null);
          setField('wake', hm(now), 'sleepNote');
          renderAll();
          return;
        }
      }
      setField('wake', hm(now), 'sleepNote');      // no usable bedtime → log wake, set bedtime manually
      renderAll();
    }

    /* ── Profile, bedtime target, insights, haptics ── */
    var PROF = 'sleep:profile', editingTarget = false;
    function getProfile(){ var p = ls(PROF) || {}; return { wakeTime: p.wakeTime || '07:00', need: (typeof p.need === 'number' ? p.need : 8.5) }; }
    function saveProfile(p){ lsSave(PROF, p); }
    function targetBed(){ var pr = getProfile(); var w = pr.wakeTime.split(':'); var wm = (+w[0]) * 60 + (+w[1]); var bm = (((wm - Math.round(pr.need * 60)) % 1440) + 1440) % 1440; return pad(Math.floor(bm / 60)) + ':' + pad(bm % 60); }
    function buzz(ms){ try{ if (navigator.vibrate) navigator.vibrate(ms || 12); }catch(e){} }
    function daysBetween(a, b){ var pa = a.split('-').map(Number), pb = b.split('-').map(Number); return Math.round((Date.UTC(pa[0],pa[1]-1,pa[2]) - Date.UTC(pb[0],pb[1]-1,pb[2])) / 86400000); }
    function elapsedStr(ms){ var m = Math.max(0, Math.round(ms / 60000)); var h = Math.floor(m / 60); return (h ? h + 'h ' : '') + (m % 60) + 'm'; }
    function daysSinceTrained(){ var w = ls('po_workouts'); if (!Array.isArray(w)) return null; var ds = w.filter(function(x){ return x && x.date; }).map(function(x){ return x.date; }).sort(); return ds.length ? daysBetween(today(), ds[ds.length - 1]) : null; }
    function recoveryOf(dk){ var r = recovery(entryFor(dk)); return r ? r.score : null; }
    function sleepInsights(){
      var logs = getLogs().filter(function(e){ return e && e.dateKey; }).sort(function(a,b){ return a.dateKey < b.dateKey ? -1 : 1; });
      var need = getProfile().need;
      // 14-night rolling debt (Rise-style), consistent with the recovery engine
      var dbt = debtInfo(need, today());
      var debt = dbt ? dbt.debt : 0, weekNights = dbt ? dbt.nights : 0;
      var beds = logs.slice(-10).filter(function(e){ return e.bed; }).map(function(e){ var p = e.bed.split(':'); var mm = (+p[0]) * 60 + (+p[1]); if (mm < 720) mm += 1440; return mm; });
      var consistency = null, spread = null;
      if (beds.length >= 3){
        var mean = beds.reduce(function(a,b){ return a + b; }, 0) / beds.length;
        var std = Math.sqrt(beds.reduce(function(a,b){ return a + (b - mean) * (b - mean); }, 0) / beds.length);
        spread = Math.round(std);
        consistency = Math.round(clamp(100 - Math.max(0, std - 15) * 0.8, 0, 100));
      }
      var have = {}; logs.forEach(function(e){ if (inBedHours(e) > 0) have[e.dateKey] = 1; });
      var streak = 0, cur = new Date();
      if (!have[dateKey(cur)]) cur = new Date(Date.now() - 86400000);
      while (have[dateKey(cur)]){ streak++; cur = new Date(cur.getTime() - 86400000); }
      var recent = logs.slice(-14).filter(function(e){ return inBedHours(e) > 0; }), best = null;
      recent.forEach(function(e){ var sc = recScoreOf(e); var k = sc != null ? sc : (asleepHours(e) || 0); if (!best || k > best.key) best = { e: e, key: k, sc: sc }; });
      return { debt: debt, weekNights: weekNights, consistency: consistency, spread: spread, streak: streak, best: best, need: need };
    }

    /* ══════════ RECOVERY CARD ══════════ */
    function barColor(s){ return s >= 70 ? '#34E2B0' : s >= 45 ? '#F2C063' : '#FF6B8B'; }
    function renderRecovery(){
      var e = entryFor(today());
      var r = recovery(e);
      var sec = document.getElementById('recSec');
      var body = document.getElementById('recBody');

      if (!r){
        sec.style.setProperty('--sec-rgb', '155,140,255');
        body.innerHTML = '<p class="rec-empty">Log when you went to bed and when you woke — that’s all it takes. Your sleep score is measured, never guessed from how you feel.</p>';
        return;
      }

      var v = verdictFor(r.score);
      sec.style.setProperty('--sec-rgb', v.rgb);

      var R = 50, C = 2 * Math.PI * R;
      var off = C - (r.score / 100) * C;

      var bars = r.parts.map(function(p){
        return '<div class="rec-bar-row"><span class="rec-bar-lbl">' + p.label + '</span>' +
          '<div class="rec-bar-track"><div class="rec-bar-fill" style="width:' + p.score + '%;background:' + barColor(p.score) + '"></div></div>' +
          '<span class="rec-bar-v">' + p.score + '</span></div>';
      }).join('');

      var yScore = recoveryOf(dateKey(new Date(Date.now() - 86400000)));
      var delta = (yScore != null) ? r.score - yScore : null, deltaHtml = '';
      if (delta != null && delta !== 0){ var up = delta > 0, dc = up ? '52,226,176' : '255,107,139'; deltaHtml = '<span class="rec-delta" style="color:rgb(' + dc + ');background:rgba(' + dc + ',.14)">' + (up ? '▲ ' : '▼ ') + Math.abs(delta) + ' vs yesterday</span>'; }
      else if (delta === 0){ deltaHtml = '<span class="rec-delta" style="color:var(--au-faint);background:rgba(255,255,255,.06)">even with yesterday</span>'; }

      // What the night actually was, in plain numbers.
      var factsBits = [];
      if (r.asleep != null) factsBits.push('<b>' + fmtHM(r.asleep) + '</b> asleep');
      if (r.eff != null) factsBits.push('<b>' + Math.round(r.eff*100) + '%</b> efficiency');
      else if (r.inBed > 0) factsBits.push('<b>' + fmtHM(r.inBed) + '</b> in bed');
      var trainHtml = factsBits.length ? factsBits.join(' · ') : '';

      // Transparency: what the number is built from — and what it isn't.
      var mReg = r.reg ? ('±' + r.reg.sd + 'm timing' ) : null;
      var mDebt = (r.dbt && r.dbt.debt > 0.5) ? ('−' + (Math.round(r.dbt.debt*10)/10) + 'h debt') : ((r.dbt && r.dbt.debt < -0.5) ? ('+' + (Math.round(-r.dbt.debt*10)/10) + 'h surplus') : null);
      var mBits = [mReg, mDebt].filter(Boolean).join(' · ');
      var mMissing = r.hasEff ? '' : ' <span style="opacity:.8">(add tonight’s fall-asleep time &amp; awakenings to unlock efficiency)</span>';
      var methodHtml = '<div class="rec-method"><b>Measured sleep only</b> — time asleep vs your ' + r.need + 'h need, efficiency, timing &amp; debt. How you feel is never an input; it’s the outcome, below' + (mBits ? ' <span style="opacity:.8">(' + mBits + ')</span>' : '') + '.' + mMissing + '</div>';

      body.innerHTML =
        '<div class="rec-main">' +
          '<div class="rec-ring-wrap' + (r.score >= 85 ? ' peak' : '') + '">' +
            '<svg width="116" height="116" viewBox="0 0 116 116">' +
              '<circle cx="58" cy="58" r="' + R + '" fill="none" stroke="rgba(255,255,255,0.07)" stroke-width="9"/>' +
              '<circle class="am-ring" cx="58" cy="58" r="' + R + '" fill="none" stroke="rgb(' + v.rgb + ')" stroke-width="9" stroke-linecap="round" stroke-dasharray="' + C.toFixed(2) + '" stroke-dashoffset="' + off.toFixed(2) + '" style="filter:drop-shadow(0 0 8px rgba(' + v.rgb + ',.6))"/>' +
            '</svg>' +
            '<div class="rec-ring-inner"><div class="rec-score" data-to="' + r.score + '">' + r.score + '</div><div class="rec-score-lbl">Sleep score</div></div>' +
          '</div>' +
          '<div class="rec-right"><div class="rec-verdict">' + v.word + '.</div>' + deltaHtml + '<div class="rec-advice">' + v.advice + '</div>' + (trainHtml ? '<div class="rec-train">' + trainHtml + '</div>' : '') + '</div>' +
        '</div>' +
        '<div class="rec-bars">' + bars + '</div>' + methodHtml;
      if (window.AuroraMotion) { var _rc = body.querySelector('.am-ring'); if (_rc) AuroraMotion.ring(_rc, (r.score || 0) / 100, 'sleep-rec'); }
    }

    /* ══════════ SLEEP LOG CARD ══════════ */
    // Stored value = the midpoint of the bucket, in minutes.
    var LATENCY = [[5,'&lt;10 min'],[15,'10–20'],[30,'20–45'],[60,'45+']];
    var LAT_LBL = { 5:'Under 10 min', 15:'10–20 min', 30:'20–45 min', 60:'45+ min' };
    var WAKES = [[0,'None'],[1,'Once'],[2,'Twice'],[3,'3+']];

    /* Delegated chip taps — latency + awakenings (tap again to clear) */
    document.addEventListener('click', function(ev){
      var c = ev.target && ev.target.closest ? ev.target.closest('.sl-chip') : null;
      if (!c) return;
      var field = c.getAttribute('data-chip'); if (!field) return;
      var val = +c.getAttribute('data-val');
      var e = todayEntry(); buzz();
      setField(field, e[field] === val ? null : val, 'sleepNote');
    });

    function renderSleep(){
      var e = todayEntry();
      var body = document.getElementById('sleepBody');
      var pend = getPending();

      // STATE A — a sleep is in progress: calm hero, no ambiguity.
      if (pend){
        body.innerHTML =
          '<div class="sl-now">' +
            '<div class="sl-now-moon">🌙</div>' +
            '<div class="sl-now-since">Sleeping since ' + hm(pend.at) + '</div>' +
            '<div class="sl-now-el" id="slElapsed">' + elapsedStr(Date.now() - pend.at) + ' so far</div>' +
            '<div class="sl-acts" style="margin:16px 0 4px"><button type="button" class="sl-act prim" data-sleep-act="woke">I woke up<small>logs ' + hm(pend.at) + ' → now</small></button></div>' +
            '<button type="button" class="sl-now-cancel" data-sleep-act="cancel">cancel · I’m not actually asleep</button>' +
          '</div>';
        return;
      }

      // STATE B/C — bedtime target, quick buttons, manual times, latency/wakes.
      var tib = inBedHours(e), asleep = asleepHours(e);

      var pr = getProfile(), tb = targetBed(), targetHtml;
      if (editingTarget){
        targetHtml = '<div class="sl-edit-row">' +
          '<div class="sl-edit-box"><label>Wake by</label><input type="time" id="slWakeGoal" value="' + pr.wakeTime + '"></div>' +
          '<div class="sl-edit-box"><label>Sleep need</label><select id="slNeed">' +
            [7,7.5,8,8.5,9,9.5].map(function(n){ return '<option value="' + n + '"' + (n === pr.need ? ' selected' : '') + '>' + n + 'h</option>'; }).join('') +
          '</select></div>' +
          '<button type="button" class="sl-act prim" style="flex:0 0 auto;padding:10px 16px" data-sleep-act="target-save">Save</button>' +
        '</div>';
      } else {
        var hit = (asleep != null) ? (asleep >= pr.need - 0.25 ? ' · hit it last night ✓' : ' · last night ' + fmtHM(asleep)) : '';
        targetHtml = '<div class="sl-target" data-sleep-act="target-edit"><span class="sl-target-ico">🎯</span><span class="sl-target-txt">In bed by <b>' + tb + '</b> for <b>' + pr.need + 'h</b> before your ' + pr.wakeTime + ' wake' + hit + '</span><span class="sl-target-edit">Edit</span></div>';
      }

      var acts = '<div class="sl-acts">' +
        '<button type="button" class="sl-act" data-sleep-act="sleep">Going to sleep</button>' +
        '<button type="button" class="sl-act prim" data-sleep-act="woke">I woke up</button>' +
      '</div>';

      // Latency + awakenings — the two measurements that turn "time in bed"
      // into "time asleep". Without them the score can't see a broken night.
      function chipRow(field, opts, cur){
        return opts.map(function(o){
          return '<button type="button" class="sl-chip' + (cur === o[0] ? ' on' : '') + '" data-chip="' + field + '" data-val="' + o[0] + '">' + o[1] + '</button>';
        }).join('');
      }
      var latHtml = '<div class="sl-metric">' +
        '<div class="sl-metric-top"><span class="sl-metric-name">Time to fall asleep</span><span class="sl-metric-cur">' + (e.latency != null ? LAT_LBL[e.latency] || (e.latency + ' min') : '—') + '</span></div>' +
        '<div class="sl-chips">' + chipRow('latency', LATENCY, e.latency) + '</div>' +
      '</div>';
      var wakeHtml = '<div class="sl-metric">' +
        '<div class="sl-metric-top"><span class="sl-metric-name">Times you woke up</span><span class="sl-metric-cur">' + (e.wakes != null ? (e.wakes === 0 ? 'Slept through' : e.wakes + (e.wakes >= 3 ? '+ times' : e.wakes === 1 ? ' time' : ' times')) : '—') + '</span></div>' +
        '<div class="sl-chips">' + chipRow('wakes', WAKES, e.wakes) + '</div>' +
      '</div>';

      // Time in bed vs actually asleep — shown side by side so the difference
      // is visible (this is exactly what the old score was blind to).
      var effV = efficiencyOf(e);
      var effHtml = (effV != null)
        ? '<div class="sl-asleep"><span class="sl-asleep-k">Asleep <b>' + fmtHM(asleep) + '</b></span><span class="sl-asleep-sep">·</span><span class="sl-asleep-k">In bed <b>' + fmtHM(tib) + '</b></span><span class="sl-asleep-sep">·</span><span class="sl-asleep-k">Efficiency <b style="color:rgb(var(--sec-rgb))">' + Math.round(effV*100) + '%</b></span></div>'
        : (tib > 0 ? '<div class="sl-asleep sl-asleep-hint">Add how long you took to fall asleep and how often you woke — that’s what turns time in bed into real sleep.</div>' : '');

      body.innerHTML =
        targetHtml + acts +
        '<div class="sl-times">' +
          '<div class="sl-time-box"><div class="sl-time-lbl">Bedtime</div><input type="time" class="sl-time-in" id="slBed" value="' + (e.bed || '') + '"></div>' +
          '<div class="sl-dur"><div class="sl-dur-val">' + fmtHM(asleep) + '</div><div class="sl-dur-lbl">Asleep</div></div>' +
          '<div class="sl-time-box"><div class="sl-time-lbl">Woke up</div><input type="time" class="sl-time-in" id="slWake" value="' + (e.wake || '') + '"></div>' +
        '</div>' + effHtml + latHtml + wakeHtml;

      var bed = document.getElementById('slBed'), wake = document.getElementById('slWake');
      function bind(el, field){ function save(){ if (el.value) setField(field, el.value, 'sleepNote'); } el.addEventListener('change', save); el.addEventListener('input', save); }
      bind(bed, 'bed'); bind(wake, 'wake');
    }

    /* ══════════ MORNING CHECK-IN CARD ══════════ */
    var CHECK = [
      { key:'energy',   name:'Energy',   low:'Drained',  high:'Buzzing', labels:['','Drained','Low','OK','Good','Buzzing'] },
      { key:'mood',     name:'Mood',     low:'Low',      high:'Great',   labels:['','Low','Meh','OK','Good','Great'] },
      { key:'stress',   name:'Stress',   low:'Calm',     high:'Stressed',labels:['','Calm','Settled','OK','Tense','Stressed'] },
      { key:'soreness', name:'Soreness', low:'Fresh',    high:'Wrecked', labels:['','Fresh','Slight','Some','Sore','Wrecked'] }
    ];
    // How he actually feels, 0–100. NOT a score, NOT an input to sleep —
    // it exists only so the page can spot when body and night disagree.
    function feelPct(e){
      if (!e) return null;
      var v = [], add = function(x, worse){ if (x != null) v.push(worse ? (5-x)/4*100 : (x-1)/4*100); };
      add(e.energy, false); add(e.mood, false); add(e.stress, true); add(e.soreness, true);
      return v.length ? Math.round(avgArr(v)) : null;
    }
    function avgArr(a){ return a.reduce(function(x,y){ return x+y; }, 0) / a.length; }

    // The honest reading when the night and the body disagree. This is the
    // whole point of taking feelings OUT of the score: now they can inform.
    function divergence(e){
      var r = recovery(e), f = feelPct(e);
      if (!r || f == null) return null;
      var gap = f - r.score;
      if (gap <= -25) return { rgb:'242,192,99', txt:'You slept well (<b>' + r.score + '</b>) but you feel rough. That’s <b>not your sleep</b> — look at stress, food, illness or training load.' };
      if (gap >= 25)  return { rgb:'52,226,176', txt:'A weak night (<b>' + r.score + '</b>) and yet you feel good. Ride it, but don’t bank on it — the debt still lands.' };
      if (r.score >= 70 && f >= 70) return { rgb:'52,226,176', txt:'Good sleep, good body. The night is doing its job.' };
      if (r.score < 55 && f < 45)  return { rgb:'255,107,139', txt:'Poor sleep and you feel it. The clearest lever you have today is tonight’s bedtime.' };
      return null;
    }

    function renderCheck(){
      var e = todayEntry();
      var html = CHECK.map(function(m){
        var cur = e[m.key] ? m.labels[e[m.key]] : '—';
        var pills = '';
        for (var i=1;i<=5;i++){
          pills += '<button type="button" class="sl-pill' + (e[m.key] === i ? ' on' : '') + '" data-metric="' + m.key + '" data-val="' + i + '">' + i + '</button>';
        }
        return '<div class="sl-metric">' +
          '<div class="sl-metric-top"><span class="sl-metric-name">' + m.name + '</span><span class="sl-metric-cur">' + cur + '</span></div>' +
          '<div class="sl-scale" data-scale="' + m.key + '">' + pills + '</div>' +
          '<div class="sl-scale-ends"><span>' + m.low + '</span><span>' + m.high + '</span></div>' +
        '</div>';
      }).join('');
      // Felt quality lives here now — it's an impression of the night, not a
      // measurement of it, so it can never touch the score.
      var qLabels = ['', 'Terrible', 'Poor', 'OK', 'Good', 'Great'], qPills = '';
      for (var qi=1; qi<=5; qi++) qPills += '<button type="button" class="sl-pill' + (e.quality === qi ? ' on' : '') + '" data-metric="quality" data-val="' + qi + '">' + qi + '</button>';
      html += '<div class="sl-metric">' +
        '<div class="sl-metric-top"><span class="sl-metric-name">How it felt</span><span class="sl-metric-cur">' + (e.quality ? qLabels[e.quality] : '—') + '</span></div>' +
        '<div class="sl-scale" data-scale="quality">' + qPills + '</div>' +
        '<div class="sl-scale-ends"><span>Terrible</span><span>Great</span></div>' +
      '</div>';

      var tags = Array.isArray(e.tags) ? e.tags : [];
      html += '<div class="sl-tags-wrap"><div class="sl-metric-name" style="margin-bottom:9px">Last night I had…</div><div class="sl-tags">' +
        TAGS.map(function(t){ var on = tags.indexOf(t.id) >= 0; return '<button type="button" class="sl-tag' + (on ? ' on' : '') + '" data-tag="' + t.id + '">' + t.emoji + ' ' + t.label + '</button>'; }).join('') +
        '</div></div>';

      // Night vs body — the reading you can only make once feelings are OUT.
      var dv = divergence(e), dvHtml = '';
      if (dv) dvHtml = '<div class="sl-diverge" style="--dv:' + dv.rgb + '"><span class="sl-diverge-dot"></span><span>' + dv.txt + '</span></div>';

      html += '<div class="rec-method" style="margin-top:16px">None of this feeds the sleep score. It’s the <b>result</b> of your sleep — kept separate so the score can’t just agree with your mood.</div>';

      document.getElementById('checkBody').innerHTML = dvHtml + html;
    }

    /* Delegated pill taps (iOS-reliable) for quality + check-in */
    document.addEventListener('click', function(ev){
      var btn = ev.target && ev.target.closest ? ev.target.closest('.sl-pill') : null;
      if (!btn) return;
      var metric = btn.getAttribute('data-metric');
      var val = +btn.getAttribute('data-val');
      if (!metric || !val) return;
      var e = todayEntry(); buzz();
      // every pill (incl. felt quality) now lives in the "How you feel" card
      // tapping the active value clears it (toggle off)
      setField(metric, e[metric] === val ? null : val, 'checkNote');
    });

    /* Sleep buttons + bedtime-target settings */
    document.addEventListener('click', function(ev){
      var b = ev.target && ev.target.closest ? ev.target.closest('[data-sleep-act]') : null;
      if (!b) return;
      var act = b.getAttribute('data-sleep-act'); buzz();
      if (act === 'sleep') goSleep();
      else if (act === 'woke') wokeUp();
      else if (act === 'cancel') cancelSleep();
      else if (act === 'target-edit'){ editingTarget = true; renderSleep(); }
      else if (act === 'target-save'){
        var wg = document.getElementById('slWakeGoal'), nd = document.getElementById('slNeed'), prof = getProfile();
        if (wg && wg.value) prof.wakeTime = wg.value;
        if (nd && nd.value) prof.need = parseFloat(nd.value) || prof.need;
        saveProfile(prof); editingTarget = false; renderSleep();
      }
    });

    /* ══════════ TRENDS CARD ══════════ */
    function renderTrends(){
      var logs = getLogs().filter(function(e){ return e && e.dateKey; })
                          .sort(function(a,b){ return a.dateKey < b.dateKey ? -1 : 1; });
      var el = document.getElementById('trendBody');

      var slept = logs.filter(function(e){ return inBedHours(e) > 0; });
      if (!slept.length){
        el.innerHTML = '<p class="sl-empty">Your sleep history will grow here night by night.</p>';
        return;
      }

      // 7-day averages — asleep, not time in bed.
      function avg7(field){
        var cut = dateKey(new Date(Date.now() - 7 * 86400000));
        var vals = logs.filter(function(e){ return e.dateKey > cut; })
                       .map(function(e){ return field === 'asleep' ? asleepHours(e) : e[field]; })
                       .filter(function(v){ return v != null; });
        if (!vals.length) return null;
        return vals.reduce(function(a,b){ return a + b; }, 0) / vals.length;
      }
      var avgH = avg7('asleep'), avgR = avg7('recovery');

      // last-14 hours-ASLEEP sparkline
      var view = slept.slice(-14).map(function(e){ var c = Object.create(e); c.hours = asleepHours(e) || 0; return c; });
      var vals = view.map(function(e){ return e.hours; });
      var max = Math.max.apply(null, vals.concat([8])), min = Math.min.apply(null, vals.concat([0]));
      var range = (max - min) || 1;
      var tod = today();
      var bars = view.map(function(e){
        var h = Math.round(((e.hours - min) / range) * 44 + 8);
        var isT = e.dateKey === tod;
        var d = new Date(e.dateKey + 'T00:00:00');
        return '<div class="sl-spark-col"><div class="sl-spark-bar' + (isT ? ' today' : '') + '" style="height:' + h + 'px" title="' + e.dateKey + ': ' + fmtHM(e.hours) + '"></div><div class="sl-spark-lbl">' + ['S','M','T','W','T','F','S'][d.getDay()] + '</div></div>';
      }).join('');

      // recent nights list (latest 6) — the browsable history lives further down
      function recBadge(s){
        if (s == null) return '<span class="sl-night-rec" style="color:var(--au-faint);background:rgba(255,255,255,.05)">—</span>';
        var c = s >= 70 ? '52,226,176' : s >= 45 ? '242,192,99' : '255,107,139';
        return '<span class="sl-night-rec" style="color:rgb(' + c + ');background:rgba(' + c + ',.14)">' + s + '</span>';
      }
      var nights = slept.slice(-6).reverse().map(function(e){
        var d = new Date(e.dateKey + 'T00:00:00');
        var day = e.dateKey === tod ? 'Today' : ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'][d.getDay()] + ' ' + d.getDate();
        var eff = efficiencyOf(e);
        return '<div class="sl-night">' +
          '<span class="sl-night-day">' + day + '</span>' +
          '<span class="sl-night-hrs">' + fmtHM(asleepHours(e)) + '</span>' +
          '<span class="sl-night-q">' + (eff != null ? Math.round(eff*100) + '% efficient' : '') + '</span>' +
          recBadge(recScoreOf(e)) +
        '</div>';
      }).join('');

      // ── Insights: sleep debt (7d), bedtime consistency, logging streak ──
      var ins = sleepInsights();
      var debtV, debtL;
      if (!ins.weekNights){ debtV = '—'; debtL = 'sleep debt'; }
      else if (ins.debt > 0.5){ debtV = '−' + (Math.round(ins.debt * 10) / 10) + 'h'; debtL = 'sleep debt · 14n'; }
      else if (ins.debt < -0.5){ debtV = '+' + (Math.round(-ins.debt * 10) / 10) + 'h'; debtL = 'surplus · 14n'; }
      else { debtV = 'on&nbsp;target'; debtL = '14 nights'; }
      var consV = ins.consistency != null ? (ins.consistency + '<small> /100</small>') : '—';
      var insHtml = '<div class="sl-ins">' +
        '<div class="sl-ins-card"><div class="sl-ins-v">' + debtV + '</div><div class="sl-ins-l">' + debtL + '</div></div>' +
        '<div class="sl-ins-card"><div class="sl-ins-v">' + consV + '</div><div class="sl-ins-l">' + (ins.consistency != null ? 'consistency ±' + ins.spread + 'm' : 'consistency') + '</div></div>' +
        '<div class="sl-ins-card"><div class="sl-ins-v">' + ins.streak + '<small></small></div><div class="sl-ins-l">night streak</div></div>' +
      '</div>';
      var bestDay = '';
      if (ins.best){ var bd = new Date(ins.best.e.dateKey + 'T00:00:00'); bestDay = ins.best.e.dateKey === today() ? 'tonight' : ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'][bd.getDay()]; }
      var takeaway;
      if (ins.debt > 1.5){ var pm = Math.round(ins.debt * 60 / 7); takeaway = 'You’re carrying ' + (Math.round(ins.debt * 10) / 10) + 'h of sleep debt — clear it with about +' + pm + ' min a night this week, or a weekend lie-in.'; }
      else if (ins.streak >= 7 && ins.consistency != null && ins.consistency >= 75) takeaway = 'Locked in — ' + ins.streak + ' nights straight with steady timing. This is exactly how good sleep compounds.';
      else if (ins.consistency != null && ins.consistency < 50) takeaway = 'Your bedtime swings ±' + ins.spread + ' min — steadier timing scores higher than an extra 20 minutes in bed.';
      else if (ins.best && ins.best.sc != null && ins.best.sc >= 80) takeaway = 'Your best night was ' + bestDay + ' — ' + fmtHM(asleepHours(ins.best.e)) + ' asleep, scoring ' + ins.best.sc + '. Worth repeating.';
      else if (ins.debt < -1) takeaway = 'Banking surplus sleep this week — nice. Keep the rhythm going.';
      else takeaway = 'Steady week. Keep stacking consistent nights — it’s the highest-leverage lever you’ve got.';
      var takeHtml = '<div class="sl-takeaway">' + takeaway + '</div>';

      el.innerHTML =
        insHtml + takeHtml +
        '<div class="sl-stats">' +
          '<div><div class="sl-stat-val">' + (avgH != null ? fmtHM(avgH) : '—') + '</div><div class="sl-stat-lbl">7-day asleep</div></div>' +
          '<div><div class="sl-stat-val">' + (avgR != null ? Math.round(avgR) : '—') + '<small> / 100</small></div><div class="sl-stat-lbl">7-day sleep score</div></div>' +
          '<div><div class="sl-stat-val">' + slept.length + '</div><div class="sl-stat-lbl">nights logged</div></div>' +
        '</div>' +
        '<div class="sl-spark">' + bars + '</div>' +
        '<div class="sl-spark-cap"><span>' + view[0].dateKey.slice(5) + '</span><span>hours asleep</span><span>Today</span></div>' +
        '<div class="sl-nights">' + nights + '</div>';
    }

    /* ══════════ WHAT AFFECTS YOU — cross-domain patterns (Phase B) ══════════
       Reads your OTHER logs (caffeine, training, food) + manual night tags,
       then compares recovery/sleep on nights WITH vs WITHOUT each factor
       (Bearable-style; min 3 of each, last 60 nights). Correlation from your
       own data — surfaced honestly, never claimed as proof. All client-side. */
    var TAGS = [
      { id:'alcohol', label:'Alcohol',       emoji:'🍷' },
      { id:'screen',  label:'Late screen',   emoji:'📱' },
      { id:'stress',  label:'Stressful day', emoji:'😰' },
      { id:'nap',     label:'Napped',        emoji:'😴' },
      { id:'sick',    label:'Felt ill',      emoji:'🤒' },
      { id:'travel',  label:'Travel',        emoji:'✈️' }
    ];
    function cafLogs(){ var a = ls('caf:logs'); return Array.isArray(a) ? a : []; }
    function nutLogs(){ var a = ls('nut:logs'); return Array.isArray(a) ? a : []; }
    function workouts(){ var a = ls('po_workouts'); return Array.isArray(a) ? a : []; }
    function prevDay(dk){ var p = dk.split('-').map(Number); return dateKey(new Date(p[0], p[1]-1, p[2]-1)); }
    function avg(a){ return a.reduce(function(x,y){ return x+y; }, 0) / a.length; }
    // Pre-index the evenings that had each behaviour (O(1) lookups afterwards).
    function crossIndex(){
      var lateCaf = {}, trained = {}, lateMeal = {};
      cafLogs().forEach(function(c){ if (c && c.ts != null){ var d = new Date(c.ts); if (!isNaN(d) && d.getHours() >= 14) lateCaf[dateKey(d)] = 1; } });
      workouts().forEach(function(w){ if (w && w.date) trained[w.date] = 1; });
      nutLogs().forEach(function(n){ if (n && n.dateKey && n.ts != null){ var d = new Date(n.ts); if (!isNaN(d) && d.getHours() >= 21) lateMeal[n.dateKey] = 1; } });
      return { lateCaf:lateCaf, trained:trained, lateMeal:lateMeal };
    }
    function factorList(){
      var auto = [
        { key:'caffeine_late', label:'caffeine after 2pm',      test:function(e,X){ return !!X.lateCaf[prevDay(e.dateKey)]; } },
        { key:'trained_prev',  label:'training the day before',  test:function(e,X){ return !!X.trained[prevDay(e.dateKey)]; } },
        { key:'late_meal',     label:'eating after 9pm',         test:function(e,X){ return !!X.lateMeal[prevDay(e.dateKey)]; } }
      ];
      TAGS.forEach(function(t){ auto.push({ key:'tag_'+t.id, label:t.label.toLowerCase(), test:function(e){ return Array.isArray(e.tags) && e.tags.indexOf(t.id) >= 0; } }); });
      return auto;
    }
    function recScoreOf(e){ return e.recovery != null ? e.recovery : (recovery(e) ? recovery(e).score : null); }

    /* ── Welch's t-test — the gate on every claim this page makes ──────────
       Comparing two group means with different sizes and variances. If the
       difference doesn't clear the two-tailed 5% critical value for its
       degrees of freedom, we say NOTHING. A pattern page that always finds a
       pattern is a horoscope. */
    var T_CRIT = [[2,4.30],[3,3.18],[4,2.78],[5,2.57],[6,2.45],[7,2.36],[8,2.31],[9,2.26],[10,2.23],[12,2.18],[15,2.13],[20,2.09],[25,2.06],[30,2.04],[40,2.02],[60,2.00],[120,1.98]];
    function tCrit(df){
      if (df < 2) return Infinity;
      for (var i=0;i<T_CRIT.length;i++){ if (df <= T_CRIT[i][0]) return T_CRIT[i][1]; }
      return 1.96;
    }
    function variance(a){
      if (a.length < 2) return 0;
      var m = avgArr(a);
      return a.reduce(function(s,x){ return s + (x-m)*(x-m); }, 0) / (a.length - 1);
    }
    // Returns null unless the difference between a and b is statistically real.
    function welch(a, b, minN){
      var need = minN || 4;
      if (a.length < need || b.length < need) return null;
      var va = variance(a), vb = variance(b);
      var se = Math.sqrt(va/a.length + vb/b.length);
      if (!(se > 0)) return null;
      var diff = avgArr(a) - avgArr(b), t = diff / se;
      var df = Math.pow(va/a.length + vb/b.length, 2) /
               (Math.pow(va/a.length, 2)/(a.length-1) + Math.pow(vb/b.length, 2)/(b.length-1));
      if (Math.abs(t) < tCrit(df)) return null;         // not real → stay quiet
      return { diff: diff, t: t, df: df, nA: a.length, nB: b.length };
    }

    /* ── LEVERS: what moves your SLEEP ───────────────────────────────────
       Each behaviour is measured against the MEASURED sleep score, duration
       and latency — never against mood. (The old engine compared behaviours
       to a feelings-based score, so it was really measuring your mood twice.) */
    function factorEffects(){
      var cut = dateKey(new Date(Date.now() - 90 * 86400000));
      var pool = getLogs().filter(function(e){ return e && e.dateKey && e.dateKey >= cut; });
      var X = crossIndex(), out = [];
      factorList().forEach(function(f){
        var wS = [], oS = [], wH = [], oH = [], wL = [], oL = [];
        pool.forEach(function(e){
          var has = false; try { has = f.test(e, X); } catch(_){ has = false; }
          var s = recScoreOf(e), a = asleepHours(e);
          if (s != null) (has ? wS : oS).push(s);
          if (a != null) (has ? wH : oH).push(a);
          if (e.latency != null) (has ? wL : oL).push(e.latency);
        });
        var t = welch(wS, oS, 4);
        if (!t) return;                                  // not statistically real → drop it
        var hT = welch(wH, oH, 4), lT = welch(wL, oL, 4);
        out.push({
          label: f.label, key: f.key, test: f.test,
          dR: t.diff, nWith: wS.length, nWithout: oS.length,
          dH: hT ? hT.diff : null,
          dL: lT ? lT.diff : null
        });
      });
      out.sort(function(a,b){ return Math.abs(b.dR) - Math.abs(a.dR); });
      return { effects:out, X:X };
    }

    /* ── CONSEQUENCES: what your sleep does to YOU ────────────────────────
       The reverse question, and the one that only became askable once feelings
       left the score: split nights into good vs poor SLEEP, then compare how
       you felt the morning after each. Same t-gate. */
    function consequences(){
      var pool = getLogs().filter(function(e){ return e && e.dateKey && recScoreOf(e) != null; });
      if (pool.length < 8) return null;
      var good = pool.filter(function(e){ return recScoreOf(e) >= 72; });
      var poor = pool.filter(function(e){ return recScoreOf(e) < 58; });
      if (good.length < 4 || poor.length < 4) return null;
      var out = [];
      CHECK.forEach(function(m){
        var g = good.map(function(e){ return e[m.key]; }).filter(function(v){ return v != null; });
        var p = poor.map(function(e){ return e[m.key]; }).filter(function(v){ return v != null; });
        var t = welch(g, p, 4);
        if (!t) return;
        var worse = (m.key === 'stress' || m.key === 'soreness');   // higher = worse
        var better = worse ? (t.diff < 0) : (t.diff > 0);           // good sleep → better?
        out.push({
          name: m.name, key: m.key, diff: Math.abs(t.diff), better: better,
          goodAvg: avgArr(g), poorAvg: avgArr(p), labels: m.labels, nG: g.length, nP: p.length
        });
      });
      out.sort(function(a,b){ return b.diff - a.diff; });
      return out.length ? { rows: out, nGood: good.length, nPoor: poor.length } : null;
    }
    function socialJetlag(){
      var rows = getLogs().filter(function(e){ return e && e.dateKey && e.bed && e.wake; })
        .sort(function(a,b){ return a.dateKey < b.dateKey ? 1 : -1; }).slice(0,28);
      var wd = [], we = [];
      rows.forEach(function(e){ var m = midMin(e); if (m == null) return; var day = new Date(e.dateKey + 'T00:00:00').getDay(); var adj = m < 720 ? m + 1440 : m; (day === 0 || day === 6 ? we : wd).push(adj); });
      if (wd.length < 3 || we.length < 3) return null;
      return { shiftMin: Math.round(avg(we) - avg(wd)) };
    }
    function fmtMinDur(mins){ var a = Math.abs(mins), h = Math.floor(a/60), m = a%60; return (h ? h + 'h' : '') + (m ? (h ? ' ' : '') + m + 'm' : (h ? '' : '0m')); }
    function renderPatterns(){
      var body = document.getElementById('patBody'); if (!body) return;
      var fe = factorEffects(), effects = fe.effects;
      var sj = socialJetlag(), reg = regularityScore();

      // Today attribution: negative factors that are active for last night.
      var te = entryFor(today()), todayHtml = '';
      if (te){
        var neg = effects.filter(function(f){ return f.dR <= -4; });
        var active = neg.filter(function(f){ try { return f.test(te, fe.X); } catch(_){ return false; } });
        if (active.length){
          var names = active.slice(0,2).map(function(f){ return esc(f.label); }).join(' and ');
          todayHtml = '<div class="pat-today">Last night you logged <b>' + names + '</b> — on your own numbers, that measurably costs you sleep. Worth avoiding tonight.</div>';
        }
      }

      var findings = '';
      if (effects.length){
        findings = '<div class="pat-list">' + effects.slice(0,4).map(function(f){
          var hurts = f.dR < 0, amt = Math.abs(Math.round(f.dR)), rgb = hurts ? '255,107,139' : '52,226,176';
          var extra = [];
          if (f.dH != null && Math.abs(f.dH) >= 0.25) extra.push('you sleep <b>' + fmtMinDur(Math.round(f.dH*60)) + ' ' + (f.dH < 0 ? 'less' : 'more') + '</b>');
          if (f.dL != null && Math.abs(f.dL) >= 5) extra.push('you take <b>' + Math.abs(Math.round(f.dL)) + ' min ' + (f.dL > 0 ? 'longer' : 'less') + '</b> to fall asleep');
          return '<div class="pat-row"><span class="pat-dot" style="color:rgb(' + rgb + ');background:rgb(' + rgb + ')"></span>' +
            '<div class="pat-txt">After <b>' + esc(f.label) + '</b>, your sleep scores <b style="color:rgb(' + rgb + ')">' + amt + ' ' + (hurts ? 'lower' : 'higher') + '</b>' +
              (extra.length ? ' — ' + extra.join(' and ') : '') + '</div>' +
            '<span class="pat-n">' + f.nWith + ' vs ' + f.nWithout + '</span></div>';
        }).join('') + '</div>';
      }

      var rhythmBits = [];
      if (reg) rhythmBits.push('Your bed/wake timing varies <b>±' + reg.sd + ' min</b> (regularity ' + reg.score + '/100)');
      if (sj && Math.abs(sj.shiftMin) >= 20) rhythmBits.push('weekends run <b>' + fmtMinDur(sj.shiftMin) + ' ' + (sj.shiftMin > 0 ? 'later' : 'earlier') + '</b> than weekdays — social jet-lag');
      var rhythm = rhythmBits.length ? '<div class="pat-rhythm">' + rhythmBits.join(' · ') + '. Regular timing lifts recovery more than an extra 20 min in bed.</div>' : '';

      if (!findings && !rhythm && !todayHtml){
        body.innerHTML = '<p class="sl-empty">Nothing here has cleared the bar yet. This card stays empty until a factor moves your sleep by more than chance can explain — no invented patterns.</p>';
        return;
      }
      body.innerHTML = todayHtml + findings + rhythm +
        '<div class="rec-method" style="margin-top:' + (findings || rhythm ? '13px' : '0') + '">Nights with vs without each factor (last 90 days), measured against your <b>sleep score, duration &amp; time to fall asleep</b> — never your mood. Only differences that pass a <b>Welch t-test</b> (p&lt;0.05, min 4 nights each side) are shown. Correlation, not proof.</div>';
    }

    /* ══════════ WHAT YOUR SLEEP DOES TO YOU ══════════ */
    function renderConsequences(){
      var body = document.getElementById('conBody'); if (!body) return;
      var c = consequences();
      if (!c){
        body.innerHTML = '<p class="sl-empty">Once you’ve logged enough good and poor nights — with how you felt the morning after — this shows what your sleep is actually costing you, or paying you.</p>';
        return;
      }
      var rows = c.rows.map(function(r){
        var rgb = r.better ? '52,226,176' : '242,192,99';
        var dir = r.better ? 'better' : 'worse';
        var gl = r.labels[Math.round(r.goodAvg)] || '', pl = r.labels[Math.round(r.poorAvg)] || '';
        return '<div class="pat-row"><span class="pat-dot" style="color:rgb(' + rgb + ');background:rgb(' + rgb + ')"></span>' +
          '<div class="pat-txt">After good sleep your <b>' + r.name.toLowerCase() + '</b> is <b style="color:rgb(' + rgb + ')">' + (Math.round(r.diff*10)/10) + ' points ' + dir + '</b>' +
            (gl && pl ? ' — typically <b>' + esc(gl) + '</b> instead of <b>' + esc(pl) + '</b>' : '') + '</div></div>';
      }).join('');
      body.innerHTML =
        '<div class="pat-today">This is the case <b>for</b> sleeping. Your ' + c.nGood + ' best nights vs your ' + c.nPoor + ' worst — and what your body did the morning after.</div>' +
        '<div class="pat-list">' + rows + '</div>' +
        '<div class="rec-method" style="margin-top:13px">Nights split by <b>measured</b> sleep score (72+ vs under 58), then compared on the next morning’s check-in. Welch t-test, p&lt;0.05. Because feelings are no longer inside the score, this comparison is finally honest.</div>';
    }
    // Toggle a night tag on today's entry (tags feed patterns; they do NOT
    // change the recovery score directly — same as Oura's tags).
    function toggleTag(id){
      var dk = today(), logs = getLogs(), idx = -1;
      for (var i=0;i<logs.length;i++){ if (logs[i] && logs[i].dateKey === dk){ idx = i; break; } }
      var e = idx >= 0 ? logs[idx] : { id:'sl-'+dk, dateKey:dk };
      var tags = Array.isArray(e.tags) ? e.tags.slice() : [];
      var p = tags.indexOf(id); if (p >= 0) tags.splice(p,1); else tags.push(id);
      e.tags = tags; e.ts = Date.now();
      if (idx >= 0) logs[idx] = e; else logs.push(e);
      lsSave(KEY, logs); flashNote('checkNote'); renderCheck(); renderPatterns();
    }
    document.addEventListener('click', function(ev){
      var t = ev.target && ev.target.closest ? ev.target.closest('.sl-tag') : null;
      if (!t) return;
      var id = t.getAttribute('data-tag'); if (!id) return;
      buzz(); toggleTag(id);
    });

    /* ══════════ YOUR DAY — circadian energy schedule (Phase C) ══════════
       Standard circadian phases anchored to your wake time + target bed —
       grogginess, focus peaks, the afternoon dip, wind-down, melatonin
       window. Derivable with no sensor; labelled as approximate. */
    function renderDay(){
      var body = document.getElementById('dayBody'); if (!body) return;
      var pr = getProfile(), te = todayEntry();
      var wake = (te && te.wake) ? te.wake : pr.wakeTime;
      var wp = wake.split(':'), wm = (+wp[0])*60 + (+wp[1]);
      var bp = targetBed().split(':'), bm = (+bp[0])*60 + (+bp[1]);
      if (bm <= wm) bm += 1440;                             // bed after wake on the clock
      function t(mins){ var v = ((Math.round(mins)%1440)+1440)%1440; return pad(Math.floor(v/60)) + ':' + pad(v%60); }
      var phases = [
        { ic:'🌫️', name:'Grogginess',    a:wm,      b:wm+90,   tip:'Sleep inertia — ease in; caffeine works well now.' },
        { ic:'⚡', name:'Peak focus',     a:wm+150,  b:wm+270,  tip:'Your sharpest window — do the hardest thinking.' },
        { ic:'🥱', name:'Afternoon dip',  a:wm+420,  b:wm+540,  tip:'Natural lull — easy tasks, a walk, or a short nap.' },
        { ic:'🔥', name:'Evening peak',   a:wm+600,  b:wm+750,  tip:'Second wind — your best window to train hard.' },
        { ic:'🌆', name:'Wind-down',      a:bm-120,  b:bm-30,   tip:'Dim the lights, screens down — start powering off.' },
        { ic:'🌙', name:'Sleep window',   a:bm-30,   b:bm+45,   tip:'Melatonin’s flowing — lights out here to fall asleep fast.' }
      ];
      body.innerHTML = '<div class="day-list">' + phases.map(function(p){
        return '<div class="day-row"><span class="day-ic">' + p.ic + '</span><div class="day-mid">' +
          '<div class="day-name">' + p.name + ' <span class="day-time">' + t(p.a) + '–' + t(p.b) + '</span></div>' +
          '<div class="day-tip">' + p.tip + '</div></div></div>';
      }).join('') + '</div>' +
      '<div class="rec-method" style="margin-top:12px">A typical circadian rhythm anchored to your <b>' + wake + '</b> wake — approximate, but a useful map for timing focus, training &amp; sleep.</div>';
    }

    /* ══════════ CONSISTENCY CALENDAR (Phase C) ══════════ */
    function renderConsistency(){
      var body = document.getElementById('consBody'); if (!body) return;
      var need = getProfile().need;
      var byDay = {}; getLogs().forEach(function(e){ var a = asleepHours(e); if (e && e.dateKey && a > 0) byDay[e.dateKey] = a; });
      var loggedDays = Object.keys(byDay);
      if (loggedDays.length < 5){ body.innerHTML = '<p class="sl-empty">Your night-by-night consistency grid fills in here as you log sleep.</p>'; return; }
      function status(dk){ var h = byDay[dk]; if (!(h > 0)) return 0; if (h >= need - 0.25) return 3; if (h >= need - 1) return 2; return 1; }
      function col(st){ return st === 3 ? '#34E2B0' : st === 2 ? 'rgba(52,226,176,.45)' : st === 1 ? 'rgba(155,140,255,.4)' : 'rgba(255,255,255,.06)'; }
      var DAYS = 12*7, todayD = new Date(); todayD.setHours(0,0,0,0);
      var start = new Date(todayD.getTime() - (DAYS-1)*86400000); start.setDate(start.getDate() - start.getDay());
      var cur = new Date(start), cells = '';
      while (cur <= todayD){ var colHtml = '';
        for (var i=0;i<7;i++){ var dk = dateKey(cur), future = cur > todayD, st = future ? -1 : status(dk);
          colHtml += '<div title="' + dk + '" style="width:11px;height:11px;border-radius:3px;background:' + (future ? 'transparent' : col(st)) + '"></div>';
          cur.setDate(cur.getDate() + 1); }
        cells += '<div style="display:flex;flex-direction:column;gap:3px">' + colHtml + '</div>';
      }
      function dayNum(dk){ var p = dk.split('-').map(Number); return Math.round(new Date(p[0],p[1]-1,p[2]).getTime()/86400000); }
      var dd = new Date(todayD); if (!(byDay[dateKey(dd)] > 0)) dd.setDate(dd.getDate()-1);
      var streak = 0; while (byDay[dateKey(dd)] > 0){ streak++; dd.setDate(dd.getDate()-1); }
      var ns = loggedDays.map(dayNum).sort(function(a,b){ return a-b; }), best = 0, run = 0, prev = null;
      ns.forEach(function(nn){ run = (prev != null && nn === prev+1) ? run+1 : 1; if (run > best) best = run; prev = nn; });
      var tn = dayNum(dateKey(todayD)), last30 = loggedDays.filter(function(dk){ var a = tn - dayNum(dk); return a >= 0 && a < 30; });
      var hit30 = last30.filter(function(dk){ return status(dk) === 3; }).length;
      function stat(v,l){ return '<div style="flex:1;text-align:center"><div style="font-family:var(--au-mono);font-size:17px;font-weight:800;color:var(--au-ivory)">' + v + '</div><div style="font-family:var(--au-mono);font-size:7.5px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--au-faint);margin-top:3px">' + l + '</div></div>'; }
      body.innerHTML =
        '<div style="display:flex;gap:3px;overflow-x:auto;padding-bottom:4px">' + cells + '</div>' +
        '<div style="display:flex;gap:12px;align-items:center;margin:9px 0 13px;font-family:var(--au-mono);font-size:8px;color:var(--au-faint)"><span style="display:inline-flex;align-items:center;gap:4px"><span style="width:9px;height:9px;border-radius:2px;background:#34E2B0"></span>hit your ' + need + 'h</span><span style="display:inline-flex;align-items:center;gap:4px"><span style="width:9px;height:9px;border-radius:2px;background:rgba(52,226,176,.45)"></span>close</span><span style="display:inline-flex;align-items:center;gap:4px"><span style="width:9px;height:9px;border-radius:2px;background:rgba(155,140,255,.4)"></span>short</span></div>' +
        '<div style="display:flex;gap:8px;border-top:1px solid rgba(255,255,255,.06);padding-top:12px">' + stat(streak + 'n','streak') + stat(best + 'n','best') + stat(last30.length,'logged / 30') + stat(hit30,'hit / 30') + '</div>';
    }

    /* ══════════ TONIGHT — the one thing you can still change ══════════
       Last night is finished; tonight isn't. Pick a bedtime and this projects
       the score you'd wake up with, using YOUR OWN numbers: your typical
       fall-asleep time and efficiency, your rolling debt, and what that
       bedtime does to your timing regularity. Same engine, run forward. */
    var tnPick = null;   // minutes offset from target bed; null = target

    function median(a){
      if (!a.length) return null;
      var s = a.slice().sort(function(x,y){ return x-y; }), m = Math.floor(s.length/2);
      return s.length % 2 ? s[m] : (s[m-1]+s[m])/2;
    }
    // His own habits, from the last 30 nights — the basis of every projection.
    function habits(){
      var recent = getLogs().filter(function(e){ return e && e.dateKey; })
        .sort(function(a,b){ return a.dateKey < b.dateKey ? 1 : -1; }).slice(0,30);
      var lat = median(recent.filter(function(e){ return e.latency != null; }).map(function(e){ return e.latency; }));
      var wk  = median(recent.filter(function(e){ return e.wakes != null; }).map(function(e){ return e.wakes; }));
      var eff = median(recent.map(efficiencyOf).filter(function(v){ return v != null; }));
      return { latency: lat != null ? lat : 15, wakes: wk != null ? wk : 0, eff: eff };
    }
    // Score a hypothetical night that starts at bedMin (minutes from midnight)
    // and ends at his target wake — same four components as the real engine.
    function projectNight(bedMin, need, H){
      var wp = getProfile().wakeTime.split(':'), wm = (+wp[0])*60 + (+wp[1]);
      var tib = (((wm - bedMin) % 1440) + 1440) % 1440; if (!tib) tib = 1440;
      var tibH = tib / 60;
      var asleep = Math.max(0.5, tibH - (H.latency + H.wakes*10)/60);
      var eff = H.eff != null ? H.eff : (asleep / tibH);

      // timing: what this bedtime does to the SD of his midpoint
      var mids = getLogs().filter(function(e){ return e && e.bed && e.wake; })
        .sort(function(a,b){ return a.dateKey < b.dateKey ? 1 : -1; }).slice(0,13)
        .map(midMin).filter(function(v){ return v != null; }).map(function(m){ return m < 720 ? m+1440 : m; });
      var pm = (bedMin + tib/2) % 1440; if (pm < 720) pm += 1440;
      mids.push(pm);
      var timing = null;
      if (mids.length >= 4){
        var mean = avgArr(mids);
        var sd = Math.sqrt(mids.reduce(function(s,x){ return s + (x-mean)*(x-mean); }, 0) / mids.length);
        timing = clamp(100 - Math.max(0, sd-25)*0.8, 20, 100);
      }
      // debt: the last 13 nights plus this projected one
      var prev = getLogs().filter(function(e){ return e && e.dateKey && inBedHours(e) > 0; })
        .sort(function(a,b){ return a.dateKey < b.dateKey ? 1 : -1; }).slice(0,13);
      var debtScore = null, debtVal = null;
      if (prev.length >= 2){
        debtVal = prev.reduce(function(s,e){ var a = asleepHours(e); return s + clamp(need - (a != null ? a : e.hours), -2, 2); }, 0) + clamp(need - asleep, -2, 2);
        debtScore = clamp(100 - Math.max(0, debtVal-1)*7, 25, 100);
      }
      var C = [[durScore(asleep, need), W_DUR], [effScore(eff), W_EFF], [timing, W_TIM], [debtScore, W_DEBT]];
      var sum = 0, wsum = 0;
      C.forEach(function(x){ if (x[0] != null){ sum += x[0]*x[1]; wsum += x[1]; } });
      return { score: wsum ? Math.round(sum/wsum) : null, asleep: asleep, inBed: tibH, debt: debtVal };
    }
    function minToHM(m){ var v = (((Math.round(m) % 1440) + 1440) % 1440); return pad(Math.floor(v/60)) + ':' + pad(v%60); }

    function renderTonight(){
      var body = document.getElementById('tnBody'); if (!body) return;
      var pr = getProfile(), need = pr.need, H = habits();
      var tb = targetBed().split(':'), tbm = (+tb[0])*60 + (+tb[1]);
      var offsets = [-60,-30,0,30,60];
      var picked = (tnPick == null) ? 0 : tnPick;

      var opts = offsets.map(function(off){
        var p = projectNight(tbm + off, need, H);
        return { off: off, bed: minToHM(tbm + off), p: p };
      });
      var cur = opts.filter(function(o){ return o.off === picked; })[0] || opts[2];
      var rgb = scoreRgb(cur.p.score);

      var chips = opts.map(function(o){
        var on = o.off === picked, c = scoreRgb(o.p.score);
        return '<button type="button" class="tn-opt' + (on ? ' on' : '') + '" data-tn="' + o.off + '" style="--tn:' + c + '">' +
          '<span class="tn-opt-t">' + o.bed + '</span>' +
          '<span class="tn-opt-s">' + (o.p.score != null ? o.p.score : '—') + '</span>' +
        '</button>';
      }).join('');

      // Caffeine has a ~5–6h half-life: 8h before bed is the honest cutoff.
      var cafCut = minToHM(tbm + picked - 8*60);
      var mealCut = minToHM(tbm + picked - 3*60);

      var line;
      if (cur.p.score == null) line = 'Log a few nights and this will project the score you’d actually wake up with.';
      else if (picked < 0) line = 'In bed at <b>' + cur.bed + '</b> you’d get about <b>' + fmtHM(cur.p.asleep) + '</b> of real sleep — ' + (cur.p.score >= 85 ? 'your best-case night.' : 'a stronger night than your target.');
      else if (picked === 0) line = 'Your target: <b>' + cur.bed + '</b> gives you about <b>' + fmtHM(cur.p.asleep) + '</b> asleep before your ' + pr.wakeTime + ' wake.';
      else line = 'At <b>' + cur.bed + '</b> you’d sleep about <b>' + fmtHM(cur.p.asleep) + '</b> — ' + (cur.p.score < 60 ? 'that’s a poor night, and the debt carries.' : 'workable, but it costs you.');

      var debtNote = (cur.p.debt != null && cur.p.debt > 1.5)
        ? '<div class="rec-method" style="margin-top:12px">You’d still be carrying <b>' + (Math.round(cur.p.debt*10)/10) + 'h</b> of debt tomorrow. Debt clears with several ordinary nights, not one long one.</div>'
        : '<div class="rec-method" style="margin-top:12px">Projected with <b>your</b> numbers — you typically fall asleep in ' + (LAT_LBL[H.latency] || H.latency + ' min').toLowerCase() + (H.eff != null ? ' at ' + Math.round(H.eff*100) + '% efficiency' : '') + '. Same engine as the score above, run forward.</div>';

      body.innerHTML =
        '<div class="tn-head" style="--tn:' + rgb + '">' +
          '<div class="tn-score">' + (cur.p.score != null ? cur.p.score : '—') + '</div>' +
          '<div class="tn-line">' + line + '</div>' +
        '</div>' +
        '<div class="tn-opts">' + chips + '</div>' +
        '<div class="tn-cuts">' +
          '<div class="tn-cut"><span class="tn-cut-ic">☕</span><div><div class="tn-cut-k">Last caffeine</div><div class="tn-cut-v">' + cafCut + '</div></div></div>' +
          '<div class="tn-cut"><span class="tn-cut-ic">🍽️</span><div><div class="tn-cut-k">Last real meal</div><div class="tn-cut-v">' + mealCut + '</div></div></div>' +
        '</div>' + debtNote;
    }
    document.addEventListener('click', function(ev){
      var t = ev.target && ev.target.closest ? ev.target.closest('[data-tn]') : null;
      if (!t) return;
      buzz(); tnPick = +t.getAttribute('data-tn'); renderTonight();
    });

    /* ══════════ EVERY NIGHT — the full history browser ══════════
       Every night you've ever logged, newest first, grouped by month. Tap a
       row to open the whole night: times, what you actually slept, efficiency,
       the score with its components, how you felt, tags, and which factors
       were running that night. Nothing is hidden behind a summary. */
    var HIST_PAGE = 20, histShown = HIST_PAGE, histOpen = null;
    var MONTHS = ['January','February','March','April','May','June','July','August','September','October','November','December'];
    var DOW = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];

    function scoreRgb(s){ return s == null ? '255,255,255' : (s >= 85 ? '52,226,176' : s >= 70 ? '24,200,192' : s >= 55 ? '242,192,99' : '255,107,139'); }
    function histNights(){
      return getLogs().filter(function(e){ return e && e.dateKey && (inBedHours(e) > 0 || e.quality != null || e.energy != null); })
                      .sort(function(a,b){ return a.dateKey < b.dateKey ? 1 : -1; });
    }
    function nightDetail(e, X){
      var r = recovery(e), tib = inBedHours(e), a = asleepHours(e), eff = efficiencyOf(e);
      function row(k, v){ return '<div class="hs-d-row"><span class="hs-d-k">' + k + '</span><span class="hs-d-v">' + v + '</span></div>'; }
      var out = '';

      if (e.bed && e.wake) out += row('Bed → wake', e.bed + ' → ' + e.wake);
      if (tib > 0) out += row('Time in bed', fmtHM(tib));
      if (a != null) out += row('Actually asleep', '<b>' + fmtHM(a) + '</b>');
      if (eff != null) out += row('Efficiency', Math.round(eff*100) + '%');
      if (e.latency != null) out += row('Fell asleep in', LAT_LBL[e.latency] || (e.latency + ' min'));
      if (e.wakes != null) out += row('Woke up', e.wakes === 0 ? 'Not once' : e.wakes + (e.wakes >= 3 ? '+ times' : e.wakes === 1 ? ' time' : ' times'));

      if (r){
        out += '<div class="hs-d-sub">Score ' + r.score + ' — how it was built</div>';
        out += '<div class="hs-d-bars">' + r.parts.map(function(p){
          return '<div class="rec-bar-row"><span class="rec-bar-lbl">' + p.label + '</span>' +
            '<div class="rec-bar-track"><div class="rec-bar-fill" style="width:' + p.score + '%;background:' + barColor(p.score) + '"></div></div>' +
            '<span class="rec-bar-v">' + p.score + '</span></div>';
        }).join('') + '</div>';
      }

      var feels = CHECK.filter(function(m){ return e[m.key] != null; })
                       .map(function(m){ return '<span class="hs-feel">' + m.name + ' <b>' + m.labels[e[m.key]] + '</b></span>'; });
      if (e.quality != null) feels.unshift('<span class="hs-feel">Felt <b>' + ['','Terrible','Poor','OK','Good','Great'][e.quality] + '</b></span>');
      if (feels.length) out += '<div class="hs-d-sub">That morning</div><div class="hs-feels">' + feels.join('') + '</div>';

      var tg = Array.isArray(e.tags) ? e.tags : [];
      var factors = [];
      if (X){
        var pd = prevDay(e.dateKey);
        if (X.lateCaf[pd]) factors.push('☕ caffeine after 2pm');
        if (X.trained[pd]) factors.push('🏋️ trained the day before');
        if (X.lateMeal[pd]) factors.push('🍽️ ate after 9pm');
      }
      tg.forEach(function(id){ var t = TAGS.filter(function(x){ return x.id === id; })[0]; if (t) factors.push(t.emoji + ' ' + t.label.toLowerCase()); });
      if (factors.length) out += '<div class="hs-d-sub">In play that night</div><div class="hs-feels">' + factors.map(function(f){ return '<span class="hs-feel">' + esc(f) + '</span>'; }).join('') + '</div>';

      return '<div class="hs-detail">' + out + '</div>';
    }
    function renderHistory(){
      var body = document.getElementById('histBody'); if (!body) return;
      var nights = histNights();
      var note = document.getElementById('histNote');
      if (note) note.textContent = nights.length ? nights.length + ' NIGHTS' : 'YOUR HISTORY';

      if (!nights.length){
        body.innerHTML = '<p class="sl-empty">Every night you log lands here — for good. Tap any night to reopen it exactly as it was.</p>';
        return;
      }

      var X = crossIndex();
      var shown = nights.slice(0, histShown), lastMonth = '', html = '';
      shown.forEach(function(e){
        var d = new Date(e.dateKey + 'T00:00:00');
        var mk = d.getFullYear() + '-' + d.getMonth();
        if (mk !== lastMonth){
          lastMonth = mk;
          var mNights = nights.filter(function(x){ var xd = new Date(x.dateKey + 'T00:00:00'); return xd.getFullYear() + '-' + xd.getMonth() === mk; });
          var scored = mNights.map(function(x){ return x.recovery; }).filter(function(v){ return v != null; });
          var mAvg = scored.length ? Math.round(avgArr(scored)) : null;
          html += '<div class="hs-month"><span>' + MONTHS[d.getMonth()] + ' ' + d.getFullYear() + '</span>' +
                  '<span class="hs-month-n">' + mNights.length + ' night' + (mNights.length === 1 ? '' : 's') + (mAvg != null ? ' · avg ' + mAvg : '') + '</span></div>';
        }
        var a = asleepHours(e), s = e.recovery, rgb = scoreRgb(s), open = histOpen === e.dateKey;
        var label = e.dateKey === today() ? 'Today' : (DOW[d.getDay()] + ' ' + d.getDate());
        html += '<div class="hs-item' + (open ? ' open' : '') + '">' +
          '<button type="button" class="hs-row" data-night="' + e.dateKey + '">' +
            '<span class="hs-day">' + label + '</span>' +
            '<span class="hs-hrs">' + (a != null ? fmtHM(a) : '—') + '</span>' +
            '<span class="hs-bar"><span class="hs-bar-fill" style="width:' + (s != null ? s : 0) + '%;background:rgb(' + rgb + ')"></span></span>' +
            '<span class="hs-score" style="color:rgb(' + rgb + ');background:rgba(' + rgb + ',.14)">' + (s != null ? s : '—') + '</span>' +
            '<span class="hs-chev">' + (open ? '▾' : '▸') + '</span>' +
          '</button>' +
          (open ? nightDetail(e, X) : '') +
        '</div>';
      });

      if (nights.length > histShown){
        html += '<button type="button" class="hs-more" data-hist-more="1">Show ' + Math.min(HIST_PAGE, nights.length - histShown) + ' more · ' + (nights.length - histShown) + ' older nights</button>';
      } else if (nights.length > HIST_PAGE){
        html += '<button type="button" class="hs-more" data-hist-more="less">Collapse</button>';
      }
      body.innerHTML = html;
    }
    document.addEventListener('click', function(ev){
      var t = ev.target && ev.target.closest ? ev.target.closest('[data-night]') : null;
      if (t){ var dk = t.getAttribute('data-night'); histOpen = (histOpen === dk) ? null : dk; buzz(); renderHistory(); return; }
      var m = ev.target && ev.target.closest ? ev.target.closest('[data-hist-more]') : null;
      if (m){
        buzz();
        histShown = (m.getAttribute('data-hist-more') === 'less') ? HIST_PAGE : histShown + HIST_PAGE;
        renderHistory();
      }
    });

    /* ── Nova hero: reactive line + page mood ─────── */
    function updateNova(){
      var root = document.getElementById('root'); if (!root) return;
      var dd = new Date(), h = dd.getHours();
      var dEl = document.getElementById('heroDate');
      if (dEl) dEl.textContent = ['SUN','MON','TUE','WED','THU','FRI','SAT'][dd.getDay()] + ' ' + dd.getDate();

      var e = entryFor(today());
      var r = recovery(e);
      var mood, line;
      if (r){
        var v = verdictFor(r.score);
        mood = v.mood;
        var asleepTxt = r.asleep != null ? fmtHM(r.asleep) : '—';
        if (r.score >= 85)      line = asleepTxt + ' of real sleep. An excellent night — ' + r.score + '.';
        else if (r.score >= 70) line = asleepTxt + ' of real sleep. A solid night — ' + r.score + '.';
        else if (r.score >= 55) line = 'Only ' + asleepTxt + ' of real sleep. A patchy night — ' + r.score + '.';
        else                    line = 'Just ' + asleepTxt + ' of real sleep. A poor night — ' + r.score + '.';
      } else {
        mood = 'alert';
        var nm = ''; try { nm = (window.ALSProfile && ALSProfile.firstName()) || ''; } catch(e){}
        line = h < 11 ? ('Morning' + (nm ? ', ' + nm : '') + '. When did you sleep?') : 'Log last night and I’ll score it.';
      }
      root.classList.remove('au-mood-calm','au-mood-hot','au-mood-alert','au-mood-low');
      root.classList.add('au-mood-' + mood);
      var ns = document.getElementById('novaSays'); if (ns) ns.textContent = line;
    }

    /* ══════════ BACKFILL — put every night on one honest scale ══════════
       The old score was mostly self-report, so historical numbers aren't
       comparable to the new ones. This recomputes the DERIVED fields for every
       night from its RAW inputs (bed / wake / hours / latency / wakes) — raw
       inputs and feelings are never touched. Idempotent: only writes (and only
       bumps `ts`, which drives sync) when a value actually changed.
       A night with no measured sleep gets recovery = null: honest, not zero. */
    function backfillScores(){
      var logs = getLogs(); if (!logs.length) return;
      // Oldest first, so each night's debt/timing sees the nights before it.
      var order = logs.slice().filter(function(e){ return e && e.dateKey; })
                      .sort(function(a,b){ return a.dateKey < b.dateKey ? -1 : 1; });
      var changed = 0, now = Date.now();
      order.forEach(function(e){
        var before = [e.recovery, e.sleepScore, e.asleep, e.efficiency].join('|');
        recomputeDerived(e);
        if ([e.recovery, e.sleepScore, e.asleep, e.efficiency].join('|') !== before){
          e.ts = now; changed++;
          if (!e.id) e.id = 'sl-' + e.dateKey;   // sync merges by id
        }
      });
      if (changed) lsSave(KEY, logs);
    }

    /* ── Boot ─────────────────────────────────────── */
    function renderAll(){
      renderRecovery();
      renderSleep();
      renderCheck();
      renderTonight();
      renderDay();
      renderTrends();
      renderConsistency();
      renderPatterns();
      renderConsequences();
      renderHistory();
      updateNova();
      try{ if(window.PageMotion){ PageMotion.scan(window.__slTagged?null:'.sl-hero,.sl-sec'); window.__slTagged=1; } }catch(e){}
    }
    backfillScores();
    renderAll();

    // Live "X so far" while a sleep is in progress.
    setInterval(function(){ var p = getPending(); var el = document.getElementById('slElapsed'); if (p && el) el.textContent = elapsedStr(Date.now() - p.at) + ' so far'; }, 30000);

    // Refreshed by cloud sync when data arrives from another device — nights
    // that land from another device get scored on the same scale before render.
    window._sleepRerender = function(){ backfillScores(); renderAll(); };

    document.addEventListener('visibilitychange', function(){ if (!document.hidden) renderAll(); });
    window.addEventListener('storage', renderAll);
    window.addEventListener('focus', renderAll);
  })();
  </script>

  <!-- Cross-device cloud sync -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="sync.js" defer></script>
  <script>
    document.addEventListener('DOMContentLoaded', function(){
      function start(){
        if (typeof initCloudSync !== 'function'){ setTimeout(start, 200); return; }
        initCloudSync({
          appKey: 'sleep',
          syncedKeys: ['sleep:logs', 'sleep:profile'],
          onApplied: function(){ if (window._sleepRerender) window._sleepRerender(); }
        });
      }
      start();
    });
  </script>

  <script src="nova.js" defer></script>
  <script src="nova-coach.js?v=19" defer></script>
</body>

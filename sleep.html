    function recScoreOf(e){ return e.recovery != null ? e.recovery : (recovery(e) ? recovery(e).score : null); }

    /* ── Welch's t-test — the gate on every claim this page makes ──────────
       Comparing two group means with different sizes and variances. If the
       difference doesn't clear the two-tailed 5% critical value for its
       degrees of freedom, we say NOTHING. A pattern page that always finds a
       pattern is a horoscope. */
    var T_CRIT = [[2,4.30],[3,3.18],[4,2.78],[5,2.57],[6,2.45],[7,2.36],[8,2.31],[9,2.26],[10,2.23],[12,2.18],[15,2.13],[20,2.09],[25,2.06],[30,2.04],[40,2.02],[60,2.00],[120,1.98]];
    function tCrit(df){
      if (df < 2) return Infinity;
      for (var i=0;i<T_CRIT.length;i++){ if (df <= T_CRIT[i][0]) return T_CRIT[i][1]; }
      return 1.96;
    }
    function variance(a){
      if (a.length < 2) return 0;
      var m = avgArr(a);
      return a.reduce(function(s,x){ return s + (x-m)*(x-m); }, 0) / (a.length - 1);
    }
    // Returns null unless the difference between a and b is statistically real.
    function welch(a, b, minN){
      var need = minN || 4;
      if (a.length < need || b.length < need) return null;
      var va = variance(a), vb = variance(b);
      var se = Math.sqrt(va/a.length + vb/b.length);
      if (!(se > 0)) return null;
      var diff = avgArr(a) - avgArr(b), t = diff / se;
      var df = Math.pow(va/a.length + vb/b.length, 2) /
               (Math.pow(va/a.length, 2)/(a.length-1) + Math.pow(vb/b.length, 2)/(b.length-1));
      if (Math.abs(t) < tCrit(df)) return null;         // not real → stay quiet
      return { diff: diff, t: t, df: df, nA: a.length, nB: b.length };
    }

    /* ── LEVERS: what moves your SLEEP ───────────────────────────────────
       Each behaviour is measured against the MEASURED sleep score, duration
       and latency — never against mood. (The old engine compared behaviours
       to a feelings-based score, so it was really measuring your mood twice.) */
    function factorEffects(){
      var cut = dateKey(new Date(Date.now() - 90 * 86400000));
      var pool = getLogs().filter(function(e){ return e && e.dateKey && e.dateKey >= cut; });
      var X = crossIndex(), out = [];
      factorList().forEach(function(f){
        var wS = [], oS = [], wH = [], oH = [], wL = [], oL = [];
        pool.forEach(function(e){
          var has = false; try { has = f.test(e, X); } catch(_){ has = false; }
          var s = recScoreOf(e), a = asleepHours(e);
          if (s != null) (has ? wS : oS).push(s);
          if (a != null) (has ? wH : oH).push(a);
          if (e.latency != null) (has ? wL : oL).push(e.latency);
        });
        var t = welch(wS, oS, 4);
        if (!t) return;                                  // not statistically real → drop it
        var hT = welch(wH, oH, 4), lT = welch(wL, oL, 4);
        out.push({
          label: f.label, key: f.key, test: f.test,
          dR: t.diff, nWith: wS.length, nWithout: oS.length,
          dH: hT ? hT.diff : null,
          dL: lT ? lT.diff : null
        });
      });
      out.sort(function(a,b){ return Math.abs(b.dR) - Math.abs(a.dR); });
      return { effects:out, X:X };
    }

    /* ── CONSEQUENCES: what your sleep does to YOU ────────────────────────
       The reverse question, and the one that only became askable once feelings
       left the score: split nights into good vs poor SLEEP, then compare how
       you felt the morning after each. Same t-gate. */
    function consequences(){
      var pool = getLogs().filter(function(e){ return e && e.dateKey && recScoreOf(e) != null; });
      if (pool.length < 12) return null;               // need enough nights to form thirds
      // RELATIVE split, not absolute. The old cut (good ≥72 / poor <58) assumed a
      // spread of nights that a consistent sleeper never produces — Alex's worst
      // night in 35 days scored 60, so "poor" was empty and this card was silent
      // forever. Comparing your OWN best third vs worst third asks the honest
      // question ("do your rougher nights cost you?") for whoever is logging.
      var sorted = pool.slice().sort(function(a,b){ return recScoreOf(a) - recScoreOf(b); });
      var k = Math.max(4, Math.floor(sorted.length / 3));
      var poor = sorted.slice(0, k);
      var good = sorted.slice(sorted.length - k);
      var gScore = avgArr(good.map(recScoreOf)), pScore = avgArr(poor.map(recScoreOf));
      // The two groups must genuinely differ in quality, or "good vs poor" is a
      // distinction without a difference (every night ~96) and any morning-after
      // gap the t-test finds would be noise dressed as meaning.
      if (gScore - pScore < 6) return null;
      var out = [];
      CHECK.forEach(function(m){
        var g = good.map(function(e){ return e[m.key]; }).filter(function(v){ return v != null; });
        var p = poor.map(function(e){ return e[m.key]; }).filter(function(v){ return v != null; });
        var t = welch(g, p, 4);
        if (!t) return;
        var worse = (m.key === 'stress' || m.key === 'soreness');   // higher = worse
        var better = worse ? (t.diff < 0) : (t.diff > 0);           // good sleep → better?
        out.push({
          name: m.name, key: m.key, diff: Math.abs(t.diff), better: better,
          goodAvg: avgArr(g), poorAvg: avgArr(p), labels: m.labels, nG: g.length, nP: p.length
        });
      });
      out.sort(function(a,b){ return b.diff - a.diff; });
      return out.length ? { rows: out, nGood: good.length, nPoor: poor.length, gScore: Math.round(gScore), pScore: Math.round(pScore) } : null;
    }
    function socialJetlag(){
      var rows = getLogs().filter(function(e){ return e && e.dateKey && e.bed && e.wake; })
        .sort(function(a,b){ return a.dateKey < b.dateKey ? 1 : -1; }).slice(0,28);
      var wd = [], we = [];
      rows.forEach(function(e){ var m = midMin(e); if (m == null) return; var day = new Date(e.dateKey + 'T00:00:00').getDay(); var adj = m < 720 ? m + 1440 : m; (day === 0 || day === 6 ? we : wd).push(adj); });
      if (wd.length < 3 || we.length < 3) return null;
      return { shiftMin: Math.round(avg(we) - avg(wd)) };
    }
    function fmtMinDur(mins){ var a = Math.abs(mins), h = Math.floor(a/60), m = a%60; return (h ? h + 'h' : '') + (m ? (h ? ' ' : '') + m + 'm' : (h ? '' : '0m')); }
    function renderPatterns(){
      var body = document.getElementById('patBody'); if (!body) return;
      var fe = factorEffects(), effects = fe.effects;
      var reg = regularityScore();

      // Today attribution: negative factors that are active for last night.
      var te = entryFor(today()), todayHtml = '';
      if (te){
        var neg = effects.filter(function(f){ return f.dR <= -4; });
        var active = neg.filter(function(f){ try { return f.test(te, fe.X); } catch(_){ return false; } });
        if (active.length){
          var names = active.slice(0,2).map(function(f){ return esc(f.label); }).join(' and ');
          todayHtml = '<div class="pat-today">Last night you logged <b>' + names + '</b> — on your own numbers, that measurably costs you sleep. Worth avoiding tonight.</div>';
        }
      }

      var findings = '';
      if (effects.length){
        findings = '<div class="pat-list">' + effects.slice(0,4).map(function(f){
          var hurts = f.dR < 0, amt = Math.abs(Math.round(f.dR)), rgb = hurts ? '255,107,139' : '52,226,176';
          var extra = [];
          if (f.dH != null && Math.abs(f.dH) >= 0.25) extra.push('you sleep <b>' + fmtMinDur(Math.round(f.dH*60)) + ' ' + (f.dH < 0 ? 'less' : 'more') + '</b>');
          if (f.dL != null && Math.abs(f.dL) >= 5) extra.push('you take <b>' + Math.abs(Math.round(f.dL)) + ' min ' + (f.dL > 0 ? 'longer' : 'less') + '</b> to fall asleep');
          return '<div class="pat-row"><span class="pat-dot" style="color:rgb(' + rgb + ');background:rgb(' + rgb + ')"></span>' +
            '<div class="pat-txt">After <b>' + esc(f.label) + '</b>, your sleep scores <b style="color:rgb(' + rgb + ')">' + amt + ' ' + (hurts ? 'lower' : 'higher') + '</b>' +
              (extra.length ? ' — ' + extra.join(' and ') : '') + '</div>' +
            '<span class="pat-n">' + f.nWith + ' vs ' + f.nWithout + '</span></div>';
        }).join('') + '</div>';
      }

      // Regularity stays here as an actionable LEVER. Weekend drift used to sit
      // beside it, but that is a consistency fact and now lives in the Consistency
      // card — keeping it in both places was the same number said twice.
      var rhythmBits = [];
      if (reg) rhythmBits.push('Your bed/wake timing varies <b>±' + reg.sd + ' min</b> (regularity ' + Math.round(reg.score) + '/100)');
      var rhythm = rhythmBits.length ? '<div class="pat-rhythm">' + rhythmBits.join(' · ') + '. Regular timing lifts recovery more than an extra 20 min in bed.</div>' : '';

      if (!findings && !rhythm && !todayHtml){
        body.innerHTML = '<p class="sl-empty">Nothing here has cleared the bar yet. This card stays empty until a factor moves your sleep by more than chance can explain — no invented patterns.</p>';
        return;
      }
      body.innerHTML = todayHtml + findings + rhythm +
        '<div class="rec-method" style="margin-top:' + (findings || rhythm ? '13px' : '0') + '">Nights with vs without each factor (last 90 days), measured against your <b>sleep score, duration &amp; time to fall asleep</b> — never your mood. Only differences that pass a <b>Welch t-test</b> (p&lt;0.05, min 4 nights each side) are shown. Correlation, not proof.</div>';
    }

    /* ══════════ WHAT YOUR SLEEP DOES TO YOU ══════════ */
    function renderConsequences(){
      var body = document.getElementById('conBody'); if (!body) return;
      var c = consequences();
      if (!c){
        body.innerHTML = '<p class="sl-empty">Once you’ve logged enough good and poor nights — with how you felt the morning after — this shows what your sleep is actually costing you, or paying you.</p>';
        return;
      }
      var rows = c.rows.map(function(r){
        var rgb = r.better ? '52,226,176' : '242,192,99';
        var dir = r.better ? 'better' : 'worse';
        var gl = r.labels[Math.round(r.goodAvg)] || '', pl = r.labels[Math.round(r.poorAvg)] || '';
        return '<div class="pat-row"><span class="pat-dot" style="color:rgb(' + rgb + ');background:rgb(' + rgb + ')"></span>' +
          '<div class="pat-txt">After good sleep your <b>' + r.name.toLowerCase() + '</b> is <b style="color:rgb(' + rgb + ')">' + (Math.round(r.diff*10)/10) + ' points ' + dir + '</b>' +
            (gl && pl ? ' — typically <b>' + esc(gl) + '</b> instead of <b>' + esc(pl) + '</b>' : '') + '</div></div>';
      }).join('');
      body.innerHTML =
        '<div class="pat-today">This is the case <b>for</b> sleeping. Your ' + c.nGood + ' best nights (avg ' + c.gScore + ') vs your ' + c.nPoor + ' roughest (avg ' + c.pScore + ') — and what your body did the morning after.</div>' +
        '<div class="pat-list">' + rows + '</div>' +
        '<div class="rec-method" style="margin-top:13px">Nights split into your own <b>best third vs worst third</b> by measured sleep score, then compared on the next morning’s check-in. Welch t-test, p&lt;0.05. Because feelings are no longer inside the score, this comparison is honest — and relative to <b>your</b> range, so it works even when all your nights are good.</div>';
    }
    // Toggle a night tag on today's entry (tags feed patterns; they do NOT
    // change the recovery score directly — same as Oura's tags).
    function toggleTag(id){
      var dk = today(), logs = getLogs(), idx = -1;
      for (var i=0;i<logs.length;i++){ if (logs[i] && logs[i].dateKey === dk){ idx = i; break; } }
      var e = idx >= 0 ? logs[idx] : { id:'sl-'+dk, dateKey:dk };
      var tags = Array.isArray(e.tags) ? e.tags.slice() : [];
      var p = tags.indexOf(id); if (p >= 0) tags.splice(p,1); else tags.push(id);
      e.tags = tags; e.ts = Date.now();
      if (idx >= 0) logs[idx] = e; else logs.push(e);
      lsSave(KEY, logs); flashNote('checkNote'); renderCheck(); renderPatterns();
    }
    document.addEventListener('click', function(ev){
      var t = ev.target && ev.target.closest ? ev.target.closest('.sl-tag') : null;
      if (!t) return;
      var id = t.getAttribute('data-tag'); if (!id) return;
      buzz(); toggleTag(id);
    });

    /* ══════════ YOUR DAY — circadian energy schedule (Phase C) ══════════
       Standard circadian phases anchored to your wake time + target bed —
       grogginess, focus peaks, the afternoon dip, wind-down, melatonin
       window. Derivable with no sensor; labelled as approximate. */
    function renderDay(){
      var body = document.getElementById('dayBody'); if (!body) return;
      var pr = getProfile(), te = todayEntry();
      var wake = (te && te.wake) ? te.wake : pr.wakeTime;
      var wp = wake.split(':'), wm = (+wp[0])*60 + (+wp[1]);
      var bp = targetBed().split(':'), bm = (+bp[0])*60 + (+bp[1]);
      if (bm <= wm) bm += 1440;                             // bed after wake on the clock
      function t(mins){ var v = ((Math.round(mins)%1440)+1440)%1440; return pad(Math.floor(v/60)) + ':' + pad(v%60); }
      var phases = [
        { ic:'🌫️', name:'Grogginess',    a:wm,      b:wm+90,   tip:'Sleep inertia — ease in; caffeine works well now.' },
        { ic:'⚡', name:'Peak focus',     a:wm+150,  b:wm+270,  tip:'Your sharpest window — do the hardest thinking.' },
        { ic:'🥱', name:'Afternoon dip',  a:wm+420,  b:wm+540,  tip:'Natural lull — easy tasks, a walk, or a short nap.' },
        { ic:'🔥', name:'Evening peak',   a:wm+600,  b:wm+750,  tip:'Second wind — your best window to train hard.' },
        { ic:'🌆', name:'Wind-down',      a:bm-120,  b:bm-30,   tip:'Dim the lights, screens down — start powering off.' },
        { ic:'🌙', name:'Sleep window',   a:bm-30,   b:bm+45,   tip:'Melatonin’s flowing — lights out here to fall asleep fast.' }
      ];
      body.innerHTML = '<div class="day-list">' + phases.map(function(p){
        return '<div class="day-row"><span class="day-ic">' + p.ic + '</span><div class="day-mid">' +
          '<div class="day-name">' + p.name + ' <span class="day-time">' + t(p.a) + '–' + t(p.b) + '</span></div>' +
          '<div class="day-tip">' + p.tip + '</div></div></div>';
      }).join('') + '</div>' +
      '<div class="rec-method" style="margin-top:12px">A typical circadian rhythm anchored to your <b>' + wake + '</b> wake — approximate, but a useful map for timing focus, training &amp; sleep.</div>';
    }

    /* ══════════ CONSISTENCY CALENDAR (Phase C) ══════════ */
    function renderConsistency(){
      var body = document.getElementById('consBody'); if (!body) return;
      var prC = getProfile(), floorC = prC.floor, idealC = prC.ideal;
      // Two maps. Hours drive the tiles; the SCORE drives the grid. The grid
      // used to colour by duration alone, so a long broken night was
      // indistinguishable from a clean one — 12.1h (score 77) and 9.1h (100)
      // both rendered as the same bright green.
      var byDay = {}, scoreByDay = {};
      getLogs().forEach(function(e){
        if (!e || !e.dateKey) return;
        var a = asleepHours(e); if (a > 0) byDay[e.dateKey] = a;
        var sc = recScoreOf(e); if (sc != null) scoreByDay[e.dateKey] = sc;
      });
      var loggedDays = Object.keys(byDay);
      if (loggedDays.length < 5){ body.innerHTML = '<p class="sl-empty">Your night-by-night consistency grid fills in here as you log sleep.</p>'; return; }
      function status(dk){ var h = byDay[dk]; if (!(h > 0)) return 0; if (h >= idealC - 0.25) return 3; if (h >= floorC - 0.25) return 2; return 1; }
      // Colour by the sleep score, on the same bands verdictFor() uses so the
      // grid agrees with every other surface. Nights logged with hours but no
      // score (MCP-written, no bed/wake) fall back to the duration band rather
      // than rendering as "never logged" — silent-empty is this project's disease.
      function cellCol(dk){
        var sc = scoreByDay[dk];
        if (sc != null){
          if (sc >= 85) return '#34E2B0';
          if (sc >= 70) return 'rgba(52,226,176,.55)';
          if (sc >= 55) return 'rgba(242,192,99,.6)';
          return 'rgba(255,107,139,.55)';
        }
        var st = status(dk);
        return st === 0 ? 'rgba(255,255,255,.06)' : st === 3 ? '#34E2B0' : st === 2 ? 'rgba(52,226,176,.55)' : 'rgba(155,140,255,.4)';
      }
      function cellTitle(dk){
        var h = byDay[dk], sc = scoreByDay[dk];
        if (!(h > 0)) return dk + ' — not logged';
        return dk + ' — ' + fmtHM(h) + (sc != null ? ' · scored ' + sc : '');
      }
      var DAYS = 12*7, todayD = new Date(); todayD.setHours(0,0,0,0);
      var start = new Date(todayD.getTime() - (DAYS-1)*86400000); start.setDate(start.getDate() - start.getDay());
      var cur = new Date(start), cells = '';
      while (cur <= todayD){ var colHtml = '';
        for (var i=0;i<7;i++){ var dk = dateKey(cur), future = cur > todayD;
          colHtml += '<div title="' + (future ? '' : cellTitle(dk)) + '" style="width:11px;height:11px;border-radius:3px;background:' + (future ? 'transparent' : cellCol(dk)) + '"></div>';
          cur.setDate(cur.getDate() + 1); }
        cells += '<div style="display:flex;flex-direction:column;gap:3px">' + colHtml + '</div>';
      }
      // The grid always starts on a Sunday (start is snapped back to one), so the
      // seven rows ARE the days of the week. They were never labelled, which hid
      // a pattern that was already on screen: which weekday you sleep badly on.
      var DOW = ['S','M','T','W','T','F','S'];
      var dowCol = '<div style="display:flex;flex-direction:column;gap:3px;flex:0 0 auto;margin-right:2px">' +
        DOW.map(function(d){ return '<div style="width:9px;height:11px;line-height:11px;font-family:var(--au-mono);font-size:7px;color:var(--au-faint);text-align:right">' + d + '</div>'; }).join('') +
      '</div>';
      function dayNum(dk){ var p = dk.split('-').map(Number); return Math.round(new Date(p[0],p[1]-1,p[2]).getTime()/86400000); }
      var dd = new Date(todayD); if (!(byDay[dateKey(dd)] > 0)) dd.setDate(dd.getDate()-1);
      var streak = 0; while (byDay[dateKey(dd)] > 0){ streak++; dd.setDate(dd.getDate()-1); }
      var tn = dayNum(dateKey(todayD)), last30 = loggedDays.filter(function(dk){ var a = tn - dayNum(dk); return a >= 0 && a < 30; });
      var hit30 = last30.filter(function(dk){ return status(dk) === 3; }).length;
      // `best` (longest logging run) and `logged/30` both replaced: for anyone who
      // logs nightly they are frozen at "same as streak" and "30/30", so three of
      // the four tiles carried no information. These two can actually move.
      var typical = median(last30.map(function(dk){ return byDay[dk]; }).filter(function(h){ return h > 0; }));
      var regC = regularityScore(), sjC = socialJetlag();
      function stat(v,l){ return '<div style="flex:1;text-align:center"><div style="font-family:var(--au-mono);font-size:17px;font-weight:800;color:var(--au-ivory)">' + v + '</div><div style="font-family:var(--au-mono);font-size:7.5px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--au-faint);margin-top:3px">' + l + '</div></div>'; }
      // Weekend drift is a CONSISTENCY fact; it used to live only in Levers.
      var sjLine = (sjC && Math.abs(sjC.shiftMin) >= 20)
        ? '<div style="font-family:var(--au-mono);font-size:8px;color:var(--au-faint);margin-top:9px;text-align:center">weekends run <b style="color:var(--au-ivory)">' + fmtMinDur(sjC.shiftMin) + ' ' + (sjC.shiftMin > 0 ? 'later' : 'earlier') + '</b> than weekdays</div>'
        : '';
      body.innerHTML =
        '<div style="display:flex;gap:3px;overflow-x:auto;padding-bottom:4px">' + dowCol + cells + '</div>' +
        // Legend now describes SCORE bands, because that is what the grid encodes.
        '<div style="display:flex;gap:10px;align-items:center;flex-wrap:wrap;margin:9px 0 13px;font-family:var(--au-mono);font-size:8px;color:var(--au-faint)">' +
          [['#34E2B0','excellent'],['rgba(52,226,176,.55)','solid'],['rgba(242,192,99,.6)','patchy'],['rgba(255,107,139,.55)','poor']].map(function(x){
            return '<span style="display:inline-flex;align-items:center;gap:4px"><span style="width:9px;height:9px;border-radius:2px;background:' + x[0] + '"></span>' + x[1] + '</span>';
          }).join('') +
        '</div>' +
        '<div style="display:flex;gap:8px;border-top:1px solid rgba(255,255,255,.06);padding-top:12px">' +
          stat(streak + 'n','streak') +
          stat(typical != null ? fmtHM(typical) : '—','typical night') +
          stat(regC ? '±' + regC.sd + 'm' : '—','timing') +
          stat(hit30 + '<small> /' + last30.length + '</small>','reached ' + idealC + 'h') +
        '</div>' +
        sjLine +
        '<div style="font-family:var(--au-mono);font-size:7.5px;letter-spacing:.09em;text-transform:uppercase;color:var(--au-faint);opacity:.75;margin-top:7px;text-align:center">grid: last 12 weeks · figures: last 30 nights</div>';
    }

    /* ══════════ TONIGHT — the one thing you can still change ══════════
       Last night is finished; tonight isn't. Pick a bedtime and this projects
       the score you'd wake up with, using YOUR OWN numbers: your typical
       fall-asleep time and efficiency, your rolling debt, and what that
       bedtime does to your timing regularity. Same engine, run forward. */
    var tnPick = null;   // minutes offset from target bed; null = target

    function median(a){
      if (!a.length) return null;
      var s = a.slice().sort(function(x,y){ return x-y; }), m = Math.floor(s.length/2);
      return s.length % 2 ? s[m] : (s[m-1]+s[m])/2;
    }
    // His own habits, from the last 30 nights — the basis of every projection.
    function habits(){
      var recent = getLogs().filter(function(e){ return e && e.dateKey; })
        .sort(function(a,b){ return a.dateKey < b.dateKey ? 1 : -1; }).slice(0,30);
      var lat = median(recent.filter(function(e){ return e.latency != null; }).map(function(e){ return e.latency; }));
      var wk  = median(recent.filter(function(e){ return e.wakes != null; }).map(function(e){ return e.wakes; }));
      var eff = median(recent.map(efficiencyOf).filter(function(v){ return v != null; }));
      return { latency: lat != null ? lat : 15, wakes: wk != null ? wk : 0, eff: eff };
    }
    // Score a hypothetical night that starts at bedMin (minutes from midnight)
    // and ends at his target wake — same four components as the real engine.
    function projectNight(bedMin, floor, ideal, H){
      var wp = getProfile().wakeTime.split(':'), wm = (+wp[0])*60 + (+wp[1]);
      var tib = (((wm - bedMin) % 1440) + 1440) % 1440; if (!tib) tib = 1440;
      var tibH = tib / 60;
      var asleep = Math.max(0.5, tibH - (H.latency + H.wakes*10)/60);
      var eff = H.eff != null ? H.eff : (asleep / tibH);

      // timing: what this bedtime does to the SD of his midpoint
      var mids = getLogs().filter(function(e){ return e && e.bed && e.wake; })
        .sort(function(a,b){ return a.dateKey < b.dateKey ? 1 : -1; }).slice(0,13)
        .map(midMin).filter(function(v){ return v != null; }).map(function(m){ return m < 720 ? m+1440 : m; });
      var pm = (bedMin + tib/2) % 1440; if (pm < 720) pm += 1440;
      mids.push(pm);
      var timing = null;
      if (mids.length >= 4){
        var mean = avgArr(mids);
        var sd = Math.sqrt(mids.reduce(function(s,x){ return s + (x-mean)*(x-mean); }, 0) / mids.length);
        timing = clamp(100 - Math.max(0, sd-25)*0.8, 20, 100);
      }
      // debt: the last 13 nights plus this projected one
      var prev = getLogs().filter(function(e){ return e && e.dateKey && inBedHours(e) > 0; })
        .sort(function(a,b){ return a.dateKey < b.dateKey ? 1 : -1; }).slice(0,13);
      var debtScore = null, debtVal = null;
      if (prev.length >= 2){
        debtVal = 0;
        prev.slice().reverse().forEach(function(e){ var a = asleepHours(e); if (a == null) a = e.hours; debtVal = debtApply(debtVal, a, floor); });
        debtVal = debtApply(debtVal, asleep, floor);   // then tonight, as projected
        debtScore = debtScoreOf(debtVal);
      }
      var C = [[durScore(asleep, floor, ideal), W_DUR], [effScore(eff), W_EFF], [timing, W_TIM], [debtScore, W_DEBT]];
      var sum = 0, wsum = 0;
      C.forEach(function(x){ if (x[0] != null){ sum += x[0]*x[1]; wsum += x[1]; } });
      return { score: wsum ? Math.round(sum/wsum) : null, asleep: asleep, inBed: tibH, debt: debtVal };
    }
    function minToHM(m){ var v = (((Math.round(m) % 1440) + 1440) % 1440); return pad(Math.floor(v/60)) + ':' + pad(v%60); }

    function renderTonight(){
      var body = document.getElementById('tnBody'); if (!body) return;
      var pr = getProfile(), H = habits();
      var tb = targetBed().split(':'), tbm = (+tb[0])*60 + (+tb[1]);
      var offsets = [-60,-30,0,30,60];
      var picked = (tnPick == null) ? 0 : tnPick;

      var opts = offsets.map(function(off){
        var p = projectNight(tbm + off, pr.floor, pr.ideal, H);
        return { off: off, bed: minToHM(tbm + off), p: p };
      });
      var cur = opts.filter(function(o){ return o.off === picked; })[0] || opts[2];
      var rgb = scoreRgb(cur.p.score);

      var chips = opts.map(function(o){
        var on = o.off === picked, c = scoreRgb(o.p.score);
        return '<button type="button" class="tn-opt' + (on ? ' on' : '') + '" data-tn="' + o.off + '" style="--tn:' + c + '">' +
          '<span class="tn-opt-t">' + o.bed + '</span>' +
          '<span class="tn-opt-s">' + (o.p.score != null ? o.p.score : '—') + '</span>' +
        '</button>';
      }).join('');

      // Caffeine has a ~5–6h half-life: 8h before bed is the honest cutoff.
      var cafCut = minToHM(tbm + picked - 8*60);
      var mealCut = minToHM(tbm + picked - 3*60);

      var line;
      if (cur.p.score == null) line = 'Log a few nights and this will project the score you’d actually wake up with.';
      else if (picked < 0) line = 'In bed at <b>' + cur.bed + '</b> you’d get about <b>' + fmtHM(cur.p.asleep) + '</b> of real sleep — ' + (cur.p.score >= 85 ? 'your best-case night.' : 'a stronger night than your target.');
      else if (picked === 0) line = 'Your target: <b>' + cur.bed + '</b> gives you about <b>' + fmtHM(cur.p.asleep) + '</b> asleep before your ' + pr.wakeTime + ' wake.';
      else line = 'At <b>' + cur.bed + '</b> you’d sleep about <b>' + fmtHM(cur.p.asleep) + '</b> — ' + (cur.p.score < 60 ? 'that’s a poor night, and the debt carries.' : 'workable, but it costs you.');

      var debtNote = (cur.p.debt != null && cur.p.debt > 1.5)
        ? '<div class="rec-method" style="margin-top:12px">You’d still be carrying <b>' + (Math.round(cur.p.debt*10)/10) + 'h</b> of debt tomorrow. Debt clears with several ordinary nights, not one long one.</div>'
        : '<div class="rec-method" style="margin-top:12px">Projected with <b>your</b> numbers — you typically fall asleep in ' + (LAT_LBL[H.latency] || H.latency + ' min').toLowerCase() + (H.eff != null ? ' at ' + Math.round(H.eff*100) + '% efficiency' : '') + '. Same engine as the score above, run forward.</div>';

      body.innerHTML =
        '<div class="tn-head" style="--tn:' + rgb + '">' +
          '<div class="tn-score">' + (cur.p.score != null ? cur.p.score : '—') + '</div>' +
          '<div class="tn-line">' + line + '</div>' +
        '</div>' +
        '<div class="tn-opts">' + chips + '</div>' +
        '<div class="tn-cuts">' +
          '<div class="tn-cut"><span class="tn-cut-ic">☕</span><div><div class="tn-cut-k">Last caffeine</div><div class="tn-cut-v">' + cafCut + '</div></div></div>' +
          '<div class="tn-cut"><span class="tn-cut-ic">🍽️</span><div><div class="tn-cut-k">Last real meal</div><div class="tn-cut-v">' + mealCut + '</div></div></div>' +
        '</div>' + debtNote;
    }
    document.addEventListener('click', function(ev){
      var t = ev.target && ev.target.closest ? ev.target.closest('[data-tn]') : null;
      if (!t) return;
      buzz(); tnPick = +t.getAttribute('data-tn'); renderTonight();
    });

    /* ══════════ EVERY NIGHT — the full history browser ══════════
       Every night you've ever logged, newest first, grouped by month. Tap a
       row to open the whole night: times, what you actually slept, efficiency,
       the score with its components, how you felt, tags, and which factors
       were running that night. Nothing is hidden behind a summary. */
    var HIST_PAGE = 20, histShown = HIST_PAGE, histOpen = null;
    var MONTHS = ['January','February','March','April','May','June','July','August','September','October','November','December'];
    var DOW = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];

    function scoreRgb(s){ return s == null ? '255,255,255' : (s >= 85 ? '52,226,176' : s >= 70 ? '24,200,192' : s >= 55 ? '242,192,99' : '255,107,139'); }
    function histNights(){
      return getLogs().filter(function(e){ return e && e.dateKey && (inBedHours(e) > 0 || e.quality != null || e.energy != null); })
                      .sort(function(a,b){ return a.dateKey < b.dateKey ? 1 : -1; });
    }
    function nightDetail(e, X){
      var r = recovery(e), tib = inBedHours(e), a = asleepHours(e), eff = efficiencyOf(e);
      function row(k, v){ return '<div class="hs-d-row"><span class="hs-d-k">' + k + '</span><span class="hs-d-v">' + v + '</span></div>'; }
      var out = '';

      if (e.bed && e.wake) out += row('Bed → wake', e.bed + ' → ' + e.wake);
      if (tib > 0) out += row('Time in bed', fmtHM(tib));
      if (a != null) out += row('Actually asleep', '<b>' + fmtHM(a) + '</b>');
      if (eff != null) out += row('Efficiency', Math.round(eff*100) + '%');
      if (e.latency != null) out += row('Fell asleep in', LAT_LBL[e.latency] || (e.latency + ' min'));
      if (e.wakes != null) out += row('Woke up', e.wakes === 0 ? 'Not once' : e.wakes + (e.wakes >= 3 ? '+ times' : e.wakes === 1 ? ' time' : ' times'));

      if (r){
        out += '<div class="hs-d-sub">Score ' + r.score + ' — how it was built</div>';
        out += '<div class="hs-d-bars">' + r.parts.map(function(p){
          return '<div class="rec-bar-row"><span class="rec-bar-lbl">' + p.label + '</span>' +
            '<div class="rec-bar-track"><div class="rec-bar-fill" style="width:' + p.score + '%;background:' + barColor(p.score) + '"></div></div>' +
            '<span class="rec-bar-v">' + p.score + '</span></div>';
        }).join('') + '</div>';
      }

      var feels = CHECK.filter(function(m){ return e[m.key] != null; })
                       .map(function(m){ return '<span class="hs-feel">' + m.name + ' <b>' + m.labels[e[m.key]] + '</b></span>'; });
      if (e.quality != null) feels.unshift('<span class="hs-feel">Felt <b>' + ['','Terrible','Poor','OK','Good','Great'][e.quality] + '</b></span>');
      if (feels.length) out += '<div class="hs-d-sub">That morning</div><div class="hs-feels">' + feels.join('') + '</div>';

      var tg = Array.isArray(e.tags) ? e.tags : [];
      var factors = [];
      if (X){
        var pd = prevDay(e.dateKey);
        if (X.lateCaf[pd]) factors.push('☕ caffeine after 2pm');
        if (X.trained[pd]) factors.push('🏋️ trained the day before');
        if (X.lateMeal[pd]) factors.push('🍽️ ate after 9pm');
      }
      tg.forEach(function(id){ var t = TAGS.filter(function(x){ return x.id === id; })[0]; if (t) factors.push(t.emoji + ' ' + t.label.toLowerCase()); });
      if (factors.length) out += '<div class="hs-d-sub">In play that night</div><div class="hs-feels">' + factors.map(function(f){ return '<span class="hs-feel">' + esc(f) + '</span>'; }).join('') + '</div>';

      return '<div class="hs-detail">' + out + '</div>';
    }
    function renderHistory(){
      var body = document.getElementById('histBody'); if (!body) return;
      var nights = histNights();
      var note = document.getElementById('histNote');
      if (note) note.textContent = nights.length ? nights.length + ' NIGHTS' : 'YOUR HISTORY';

      if (!nights.length){
        body.innerHTML = '<p class="sl-empty">Every night you log lands here — for good. Tap any night to reopen it exactly as it was.</p>';
        return;
      }

      var X = crossIndex();
      var shown = nights.slice(0, histShown), lastMonth = '', html = '';
      shown.forEach(function(e){
        var d = new Date(e.dateKey + 'T00:00:00');
        var mk = d.getFullYear() + '-' + d.getMonth();
        if (mk !== lastMonth){
          lastMonth = mk;
          var mNights = nights.filter(function(x){ var xd = new Date(x.dateKey + 'T00:00:00'); return xd.getFullYear() + '-' + xd.getMonth() === mk; });
          var scored = mNights.map(function(x){ return x.recovery; }).filter(function(v){ return v != null; });
          var mAvg = scored.length ? Math.round(avgArr(scored)) : null;
          html += '<div class="hs-month"><span>' + MONTHS[d.getMonth()] + ' ' + d.getFullYear() + '</span>' +
                  '<span class="hs-month-n">' + mNights.length + ' night' + (mNights.length === 1 ? '' : 's') + (mAvg != null ? ' · avg ' + mAvg : '') + '</span></div>';
        }
        var a = asleepHours(e), s = e.recovery, rgb = scoreRgb(s), open = histOpen === e.dateKey;
        var label = e.dateKey === today() ? 'Today' : (DOW[d.getDay()] + ' ' + d.getDate());
        html += '<div class="hs-item' + (open ? ' open' : '') + '">' +
          '<button type="button" class="hs-row" data-night="' + e.dateKey + '">' +
            '<span class="hs-day">' + label + '</span>' +
            '<span class="hs-hrs">' + (a != null ? fmtHM(a) : '—') + '</span>' +
            '<span class="hs-bar"><span class="hs-bar-fill" style="width:' + (s != null ? s : 0) + '%;background:rgb(' + rgb + ')"></span></span>' +
            '<span class="hs-score" style="color:rgb(' + rgb + ');background:rgba(' + rgb + ',.14)">' + (s != null ? s : '—') + '</span>' +
            '<span class="hs-chev">' + (open ? '▾' : '▸') + '</span>' +
          '</button>' +
          (open ? nightDetail(e, X) : '') +
        '</div>';
      });

      if (nights.length > histShown){
        html += '<button type="button" class="hs-more" data-hist-more="1">Show ' + Math.min(HIST_PAGE, nights.length - histShown) + ' more · ' + (nights.length - histShown) + ' older nights</button>';
      } else if (nights.length > HIST_PAGE){
        html += '<button type="button" class="hs-more" data-hist-more="less">Collapse</button>';
      }
      body.innerHTML = html;
    }
    document.addEventListener('click', function(ev){
      var t = ev.target && ev.target.closest ? ev.target.closest('[data-night]') : null;
      if (t){ var dk = t.getAttribute('data-night'); histOpen = (histOpen === dk) ? null : dk; buzz(); renderHistory(); return; }
      var m = ev.target && ev.target.closest ? ev.target.closest('[data-hist-more]') : null;
      if (m){
        buzz();
        histShown = (m.getAttribute('data-hist-more') === 'less') ? HIST_PAGE : histShown + HIST_PAGE;
        renderHistory();
      }
    });

    /* ── Nova hero: reactive line + page mood ─────── */
    function updateNova(){
      var root = document.getElementById('root'); if (!root) return;
      var dd = new Date(), h = dd.getHours();
      var dEl = document.getElementById('heroDate');
      if (dEl) dEl.textContent = ['SUN','MON','TUE','WED','THU','FRI','SAT'][dd.getDay()] + ' ' + dd.getDate();

      var e = entryFor(today());
      var r = recovery(e);
      var mood, line;
      if (r){
        var v = verdictFor(r.score);
        mood = v.mood;
        var asleepTxt = r.asleep != null ? fmtHM(r.asleep) : '—';
        if (r.score >= 85)      line = asleepTxt + ' of real sleep. An excellent night — ' + r.score + '.';
        else if (r.score >= 70) line = asleepTxt + ' of real sleep. A solid night — ' + r.score + '.';
        else if (r.score >= 55) line = 'Only ' + asleepTxt + ' of real sleep. A patchy night — ' + r.score + '.';
        else                    line = 'Just ' + asleepTxt + ' of real sleep. A poor night — ' + r.score + '.';
      } else {
        mood = 'alert';
        var nm = ''; try { nm = (window.ALSProfile && ALSProfile.firstName()) || ''; } catch(e){}
        line = h < 11 ? ('Morning' + (nm ? ', ' + nm : '') + '. When did you sleep?') : 'Log last night and I’ll score it.';
      }
      root.classList.remove('au-mood-calm','au-mood-hot','au-mood-alert','au-mood-low');
      root.classList.add('au-mood-' + mood);
      var ns = document.getElementById('novaSays'); if (ns) ns.textContent = line;
    }

    /* ══════════ BACKFILL — put every night on one honest scale ══════════
       The old score was mostly self-report, so historical numbers aren't
       comparable to the new ones. This recomputes the DERIVED fields for every
       night from its RAW inputs (bed / wake / hours / latency / wakes) — raw
       inputs and feelings are never touched. Idempotent: only writes (and only
       bumps `ts`, which drives sync) when a value actually changed.
       A night with no measured sleep gets recovery = null: honest, not zero. */
    function backfillScores(){
      var logs = getLogs(); if (!logs.length) return;
      // Oldest first, so each night's debt/timing sees the nights before it.
      var order = logs.slice().filter(function(e){ return e && e.dateKey; })
                      .sort(function(a,b){ return a.dateKey < b.dateKey ? -1 : 1; });
      var changed = 0, now = Date.now();
      order.forEach(function(e){
        var before = [e.recovery, e.sleepScore, e.asleep, e.efficiency].join('|');
        recomputeDerived(e);
        if ([e.recovery, e.sleepScore, e.asleep, e.efficiency].join('|') !== before){
          e.ts = now; changed++;
          if (!e.id) e.id = 'sl-' + e.dateKey;   // sync merges by id
        }
      });
      if (changed) lsSave(KEY, logs);
    }

    /* ── Boot ─────────────────────────────────────── */
    function renderAll(){
      renderRecovery();
      renderSleep();
      renderCheck();
      renderTonight();
      renderDay();
      renderTrends();
      renderConsistency();
      renderPatterns();
      renderConsequences();
      renderHistory();
      updateNova();
      try{ if(window.PageMotion){ PageMotion.scan(window.__slTagged?null:'.sl-hero,.sl-sec'); window.__slTagged=1; } }catch(e){}
    }
    migrateSleepModel();   // floor/ideal split — must run before anything scores
    backfillScores();
    renderAll();

    // Live "X so far" while a sleep is in progress.
    setInterval(function(){ var p = getPending(); var el = document.getElementById('slElapsed'); if (p && el) el.textContent = elapsedStr(Date.now() - p.at) + ' so far'; }, 30000);

    // Refreshed by cloud sync when data arrives from another device — nights
    // that land from another device get scored on the same scale before render.
    window._sleepRerender = function(){ backfillScores(); renderAll(); };

    /* Merge what her watch measured into her nights. Lives INSIDE the IIFE, with
       the data model it touches — getLogs/lsSave/recomputeDerived are all scoped
       here — and is exposed as the one narrow entry point the inbox drain calls.
       THE RULE: fill only what a watch can measure. bed / wake / latency / wakes /
       notes are HERS and are never touched; the watch has no opinion on them. A
       sync that quietly overwrites a human's own input is the exact failure this
       project keeps paying for.
       Returns the number of fields changed, so the caller can stay idempotent and
       not flush or re-render for nothing. */
    // Everything a watch can legitimately claim to have MEASURED. Her own
    // bed / wake / latency / wakes / quality / tags / notes are deliberately
    // absent: the watch has no opinion on those and must never overwrite them.
    // `bedMeasured` / `wakeMeasured` sit alongside `bed` / `wake` rather than
    // replacing them, which is what keeps latency computable at all.
    var WATCH_FIELDS = ['asleepMeasured','restingHR','hrv','garminScore',
      'bedMeasured','wakeMeasured','stages','hypno','restless','awakeCount',
      'overnightHR','resp','respLow','stress','bodyBattery','spo2','hrvStatus'];

    window._sleepApplyWellness = function(items){
      if (!Array.isArray(items) || !items.length) return 0;
      var logs = getLogs(), byDk = {}, changed = 0;
      logs.forEach(function(e){ if (e && e.dateKey) byDk[e.dateKey] = e; });
      items.forEach(function(it){
        if (!it || !it.dateKey) return;
        var e = byDk[it.dateKey], touched = 0;
        if (!e){ e = { id:'sl-'+it.dateKey, dateKey:it.dateKey }; logs.push(e); byDk[it.dateKey] = e; }
        // Scalars compare by value; `stages` and `hypno` are an object and an
        // array, and `!==` on those is ALWAYS true — every drain would report a
        // change, flush to the cloud and re-render, forever. Compare by shape.
        WATCH_FIELDS.forEach(function(f){
          if (it[f] == null) return;
          var same = (f === 'stages' || f === 'hypno')
            ? JSON.stringify(e[f]) === JSON.stringify(it[f])
            : e[f] === it[f];
          if (!same){ e[f] = it[f]; touched++; }
        });
        // `measuredBy`, not the obvious short name: the smoke test's link checker
        // treats that assignment as an HTML source attribute and goes hunting for
        // a file called "garmin". Renaming beats teaching the guard to ignore
        // things — and provenance is what this field actually means anyway.
        if (touched){ e.measuredBy = 'garmin'; recomputeDerived(e); e.ts = Date.now(); changed += touched; }
      });
      if (!changed) return 0;
      lsSave(KEY, logs);
      return changed;
    };

    document.addEventListener('visibilitychange', function(){ if (!document.hidden) renderAll(); });
    window.addEventListener('storage', renderAll);
    window.addEventListener('focus', renderAll);
  })();
  </script>

  <!-- Cross-device cloud sync -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="sync.js" defer></script>
  <script>
    /* ── Garmin wellness inbox ────────────────────────────────────────────────
       The courier (api/run-reminders.js) publishes a rolling snapshot of what her
       watch measured into a 'sleep:inbox' row on HER account: asleepMeasured,
       restingHR, hrv, and Garmin's own verdict as garminScore. Drain it here.

       THE RULE: fill only what a watch can measure, and NEVER overwrite anything
       she typed. bed / wake / latency / wakes / notes are hers; the watch has no
       opinion on them. A sync that quietly overwrites a human's input is the
       failure mode this project keeps paying for.

       Reads with HER session JWT, never the bare anon key — under RLS the anon key
       returns EMPTY on a fresh device, which is exactly how a fresh phone once
       looked like it had lost every weigh-in. `Bearer (token || KEY)`, same as
       run.html's inbox drain. If there is no session yet, don't call at all.       */
    var SB_URL = 'https://oiyvadqfldwbjroiknjc.supabase.co';
    var SB_KEY = 'sb_publishable_fGKn40f1Ek1Y4j0VComsFA_l4aXkKM-';
    var SB_TOKEN = null;
    async function sbToken(){
      if (SB_TOKEN) return SB_TOKEN;
      try {
        var c = window.__alsAuthClient || (window.supabase && window.supabase.createClient(SB_URL, SB_KEY));
        if (!c) return null;
        window.__alsAuthClient = c;
        var s = await c.auth.getSession();
        SB_TOKEN = s && s.data && s.data.session && s.data.session.access_token;
        return SB_TOKEN;
      } catch(e){ return null; }
    }
    async function drainWellness(){
      try {
        var tok = await sbToken();
        if (!tok) return;                       // signed out → RLS would answer empty; don't pretend
        var r = await fetch(SB_URL + '/rest/v1/app_state?select=data&key=eq.sleep%3Ainbox',
          { headers: { apikey: SB_KEY, Authorization: 'Bearer ' + tok }, cache: 'no-store' });
        if (!r.ok) return;
        var rows = await r.json();
        var box = rows && rows[0] && rows[0].data;
        var items = box && Array.isArray(box.items) ? box.items : [];
        if (!items.length) return;

        // The merge lives inside the page's IIFE with the data model it touches;
        // this block only fetches and hands off. (getLogs/lsSave/recomputeDerived
        // are NOT in scope out here — reaching for them would throw.)
        if (typeof window._sleepApplyWellness !== 'function') return;
        var changed = window._sleepApplyWellness(items);
        if (!changed) return;                   // idempotent: a re-drain writes nothing
        if (window.ALSSync && window.ALSSync.flush) window.ALSSync.flush();
        if (window._sleepRerender) window._sleepRerender();
      } catch(e){}
    }

    document.addEventListener('DOMContentLoaded', function(){
      drainWellness();
      window.addEventListener('focus', drainWellness);
      function start(){
        if (typeof initCloudSync !== 'function'){ setTimeout(start, 200); return; }
        initCloudSync({
          appKey: 'sleep',
          syncedKeys: ['sleep:logs', 'sleep:profile'],
          onApplied: function(){ if (window._sleepRerender) window._sleepRerender(); }
        });
      }
      start();
    });
  </script>

  <script src="nova.js" defer></script>
  <script src="nova-coach.js?v=20" defer></script>

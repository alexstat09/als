<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>Sleep &amp; Recovery · ALS</title>
  <meta name="theme-color" content="#050507">
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="apple-touch-icon.png">
  <link rel="stylesheet" href="aurora.css">
  <script src="topbar.js" defer></script>
  <style>
    *, *::before, *::after { box-sizing:border-box; margin:0; padding:0; }
    html, body { min-height:100%; }
    body { padding:0 0 calc(86px + env(safe-area-inset-bottom)); }

    /* ── Hero ─────────────────────────────────────── */
    .sl-hero{ max-width:600px; margin:0 auto; padding:24px 18px 8px; display:flex; align-items:flex-start; justify-content:space-between; gap:14px; }
    .sl-hero-eyebrow{ margin-bottom:12px; }
    .sl-hero-line{ font-family:var(--au-serif); font-style:italic; font-weight:400; color:var(--au-ivory); font-size:clamp(24px,6vw,32px); line-height:1.1; letter-spacing:-.01em; max-width:22ch; }
    .sl-hero .nova{ flex-shrink:0; width:74px; height:74px; margin-top:2px; }

    /* ── Page wrap + cards ────────────────────────── */
    .sl-wrap{ padding:14px 18px; display:flex; flex-direction:column; gap:14px; max-width:600px; margin:0 auto; }
    .sl-sec{ position:relative; background:var(--au-glass); border:1px solid var(--au-line); border-radius:18px; overflow:hidden; backdrop-filter:blur(16px); -webkit-backdrop-filter:blur(16px); transition:border-color .25s, box-shadow .25s; }
    .sl-sec::before{ content:''; position:absolute; top:0; left:8%; right:8%; height:1px; background:linear-gradient(90deg,transparent,rgba(var(--sec-rgb),.55),transparent); pointer-events:none; }
    .sl-sec:hover{ border-color:rgba(var(--sec-rgb),.22); box-shadow:0 14px 44px rgba(0,0,0,.45), 0 0 36px rgba(var(--sec-rgb),.06); }
    .sl-sec-hdr{ display:flex; align-items:center; gap:10px; padding:15px 18px 12px; border-bottom:1px solid var(--au-line); }
    .sl-sec-dot{ width:7px; height:7px; border-radius:50%; background:rgb(var(--sec-rgb)); box-shadow:0 0 10px rgba(var(--sec-rgb),.8); flex-shrink:0; }
    .sl-sec-title{ font-family:var(--au-serif); font-style:italic; font-weight:400; font-size:22px; color:var(--au-ivory); flex:1; line-height:1; }
    .sl-sec-note{ font-family:var(--au-mono); font-size:9px; font-weight:700; letter-spacing:.1em; text-transform:uppercase; color:var(--au-faint); white-space:nowrap; transition:color .25s; }
    .sl-sec-note.saved{ color:rgb(var(--sec-rgb)); }
    .sl-sec-body{ padding:16px 18px; }

    /* ── Recovery card ────────────────────────────── */
    .rec-main{ display:flex; align-items:center; gap:18px; }
    .rec-ring-wrap{ position:relative; width:116px; height:116px; flex-shrink:0; }
    .rec-ring-wrap svg{ transform:rotate(-90deg); }
    .rec-ring-inner{ position:absolute; inset:0; display:flex; flex-direction:column; align-items:center; justify-content:center; }
    .rec-score{ font-family:var(--au-mono); font-size:34px; font-weight:700; color:var(--au-ivory); line-height:1; letter-spacing:-.03em; }
    .rec-score-lbl{ font-family:var(--au-mono); font-size:8px; font-weight:700; letter-spacing:.18em; text-transform:uppercase; color:var(--au-faint); margin-top:5px; }
    .rec-right{ flex:1; min-width:0; }
    .rec-verdict{ font-family:var(--au-serif); font-style:italic; font-size:24px; color:var(--au-ivory); line-height:1.05; }
    .rec-advice{ font-size:12.5px; color:var(--au-dim); line-height:1.45; margin-top:7px; }
    .rec-bars{ margin-top:16px; display:flex; flex-direction:column; gap:9px; }
    .rec-bar-row{ display:flex; align-items:center; gap:10px; }
    .rec-bar-lbl{ font-family:var(--au-mono); font-size:9px; font-weight:700; letter-spacing:.1em; text-transform:uppercase; color:var(--au-faint); width:74px; flex-shrink:0; }
    .rec-bar-track{ flex:1; height:6px; background:rgba(255,255,255,.07); border-radius:3px; overflow:hidden; }
    .rec-bar-fill{ height:100%; border-radius:3px; transition:width .5s ease; }
    .rec-bar-v{ font-family:var(--au-mono); font-size:10px; color:var(--au-dim); width:30px; text-align:right; flex-shrink:0; }
    .rec-empty{ font-family:var(--au-serif); font-style:italic; font-size:16px; color:var(--au-dim); line-height:1.5; text-align:center; padding:8px 4px; }
    .rec-method{ margin-top:14px; padding-top:12px; border-top:1px solid rgba(255,255,255,.06); font-family:var(--au-mono); font-size:9.5px; line-height:1.5; letter-spacing:.02em; color:var(--au-faint); }
    .rec-method b{ color:var(--au-dim); font-weight:700; }

    /* ── Sleep log (times) ────────────────────────── */
    .sl-times{ display:flex; align-items:stretch; gap:10px; margin-bottom:6px; }
    .sl-time-box{ flex:1; background:rgba(255,255,255,.05); border:1px solid rgba(var(--sec-rgb),.28); border-radius:14px; padding:11px 13px; transition:border-color .2s; }
    .sl-time-box:focus-within{ border-color:rgba(var(--sec-rgb),.6); }
    .sl-time-lbl{ font-family:var(--au-mono); font-size:9px; font-weight:700; letter-spacing:.12em; text-transform:uppercase; color:var(--au-faint); margin-bottom:5px; }
    /* NB: do NOT set -webkit-appearance:none here — it breaks the native time
       picker on iOS (the field won't open / value won't stick). */
    .sl-time-in{ width:100%; background:transparent; border:none; outline:none; color:var(--au-ivory); -webkit-text-fill-color:var(--au-ivory); font-family:var(--au-mono); font-size:21px; font-weight:700; letter-spacing:-.01em; min-height:26px; }
    .sl-time-in::-webkit-calendar-picker-indicator{ filter:invert(1); opacity:.45; }
    .sl-dur{ display:flex; flex-direction:column; align-items:center; justify-content:center; min-width:78px; text-align:center; }
    .sl-dur-val{ font-family:var(--au-mono); font-size:23px; font-weight:700; color:rgb(var(--sec-rgb)); line-height:1; }
    .sl-dur-lbl{ font-family:var(--au-mono); font-size:8px; font-weight:700; letter-spacing:.12em; text-transform:uppercase; color:var(--au-faint); margin-top:4px; }

    /* ── Scale pills (quality + check-in) ─────────── */
    .sl-metric{ margin-top:16px; }
    .sl-metric:first-child{ margin-top:0; }
    .sl-metric-top{ display:flex; align-items:baseline; justify-content:space-between; margin-bottom:8px; }
    .sl-metric-name{ font-family:var(--au-mono); font-size:10px; font-weight:700; letter-spacing:.1em; text-transform:uppercase; color:var(--au-dim); }
    .sl-metric-cur{ font-family:var(--au-serif); font-style:italic; font-size:14px; color:rgb(var(--sec-rgb)); }
    .sl-scale{ display:flex; gap:7px; }
    .sl-pill{ flex:1; padding:11px 0; border-radius:12px; border:1px solid var(--au-line); background:rgba(255,255,255,.04); color:var(--au-faint); font-family:var(--au-mono); font-size:15px; font-weight:700; cursor:pointer; transition:all .15s; -webkit-tap-highlight-color:transparent; }
    .sl-pill:active{ transform:scale(.94); }
    .sl-pill.on{ background:rgba(var(--sec-rgb),.18); border-color:rgba(var(--sec-rgb),.6); color:rgb(var(--sec-rgb)); box-shadow:0 0 14px rgba(var(--sec-rgb),.3); }
    .sl-scale-ends{ display:flex; justify-content:space-between; margin-top:6px; font-family:var(--au-mono); font-size:8.5px; letter-spacing:.06em; text-transform:uppercase; color:var(--au-faint); }

    /* ── Trends ───────────────────────────────────── */
    .sl-stats{ display:flex; gap:18px; margin-bottom:16px; }
    .sl-stat-val{ font-family:var(--au-mono); font-size:24px; font-weight:700; color:var(--au-ivory); letter-spacing:-.02em; line-height:1; }
    .sl-stat-val small{ font-size:12px; color:var(--au-faint); font-weight:700; }
    .sl-stat-lbl{ font-family:var(--au-mono); font-size:9px; font-weight:700; letter-spacing:.1em; text-transform:uppercase; color:var(--au-faint); margin-top:5px; }
    .sl-spark{ display:flex; align-items:flex-end; gap:4px; height:52px; }
    .sl-spark-col{ flex:1; display:flex; flex-direction:column; align-items:center; gap:4px; height:100%; justify-content:flex-end; }
    .sl-spark-bar{ width:100%; border-radius:4px 4px 0 0; background:rgba(var(--sec-rgb),.28); min-height:3px; transition:height .4s ease; }
    .sl-spark-bar.today{ background:rgb(var(--sec-rgb)); box-shadow:0 0 10px rgba(var(--sec-rgb),.6); }
    .sl-spark-lbl{ font-family:var(--au-mono); font-size:8px; color:var(--au-faint); }
    .sl-spark-cap{ display:flex; justify-content:space-between; font-family:var(--au-mono); font-size:9px; letter-spacing:.05em; color:var(--au-faint); text-transform:uppercase; margin-top:8px; }
    .sl-nights{ display:flex; flex-direction:column; gap:1px; margin-top:14px; }
    .sl-night{ display:flex; align-items:center; gap:10px; padding:9px 0; border-bottom:1px solid rgba(255,255,255,.05); }
    .sl-night:last-child{ border-bottom:none; }
    .sl-night-day{ font-family:var(--au-mono); font-size:11px; color:var(--au-dim); width:52px; flex-shrink:0; }
    .sl-night-hrs{ font-family:var(--au-mono); font-size:13px; font-weight:700; color:var(--au-ivory); }
    .sl-night-q{ font-size:11px; color:var(--au-faint); font-family:var(--au-serif); font-style:italic; flex:1; }
    .sl-night-rec{ font-family:var(--au-mono); font-size:11px; font-weight:700; padding:2px 9px; border-radius:7px; }
    .sl-empty{ font-family:var(--au-serif); font-style:italic; font-size:15px; color:var(--au-dim); text-align:center; padding:10px 0; }

    /* ── Sleep/wake buttons + in-progress hero ────── */
    .sl-acts{ display:flex; gap:9px; margin-bottom:15px; }
    .sl-act{ flex:1; padding:14px 8px; border-radius:14px; border:1px solid var(--au-line); background:rgba(255,255,255,.05); color:var(--au-ivory); font-family:var(--au-sans); font-size:13px; font-weight:700; cursor:pointer; line-height:1.3; text-align:center; transition:transform .12s, border-color .2s, background .2s; -webkit-tap-highlight-color:transparent; }
    .sl-act:active{ transform:scale(.96); }
    .sl-act.prim{ border-color:rgba(var(--sec-rgb),.55); background:rgba(var(--sec-rgb),.16); }
    .sl-act small{ display:block; font-weight:400; font-size:10.5px; opacity:.7; margin-top:2px; }
    .sl-now{ text-align:center; padding:14px 10px 18px; }
    .sl-now-moon{ font-size:34px; line-height:1; filter:drop-shadow(0 0 12px rgba(var(--sec-rgb),.5)); animation:sl-breathe 4s ease-in-out infinite; }
    @keyframes sl-breathe{ 0%,100%{ opacity:.85; transform:scale(1); } 50%{ opacity:1; transform:scale(1.06); } }
    .sl-now-since{ font-family:var(--au-serif); font-style:italic; font-size:22px; color:var(--au-ivory); margin-top:10px; }
    .sl-now-el{ font-family:var(--au-mono); font-size:13px; color:rgb(var(--sec-rgb)); margin-top:4px; letter-spacing:.02em; }
    .sl-now-cancel{ display:inline-block; margin-top:14px; font-family:var(--au-mono); font-size:10px; letter-spacing:.08em; text-transform:uppercase; color:var(--au-faint); background:none; border:none; cursor:pointer; }

    /* ── Bedtime target ───────────────────────────── */
    .sl-target{ display:flex; align-items:center; gap:9px; padding:11px 13px; margin-bottom:14px; border-radius:13px; background:rgba(var(--sec-rgb),.08); border:1px solid rgba(var(--sec-rgb),.2); cursor:pointer; }
    .sl-target-ico{ font-size:17px; }
    .sl-target-txt{ flex:1; font-size:12.5px; color:var(--au-dim); line-height:1.4; }
    .sl-target-txt b{ color:var(--au-ivory); font-weight:700; }
    .sl-target-edit{ font-family:var(--au-mono); font-size:9px; letter-spacing:.08em; text-transform:uppercase; color:rgb(var(--sec-rgb)); }
    .sl-edit-row{ display:flex; gap:10px; align-items:flex-end; padding:12px 0 4px; }
    .sl-edit-box{ flex:1; }
    .sl-edit-box label{ display:block; font-family:var(--au-mono); font-size:9px; font-weight:700; letter-spacing:.1em; text-transform:uppercase; color:var(--au-faint); margin-bottom:5px; }
    .sl-edit-box input, .sl-edit-box select{ width:100%; background:rgba(255,255,255,.05); border:1px solid rgba(var(--sec-rgb),.3); border-radius:11px; padding:9px 11px; color:var(--au-ivory); -webkit-text-fill-color:var(--au-ivory); font-family:var(--au-mono); font-size:15px; font-weight:700; outline:none; }

    /* ── Recovery delta + peak glow ───────────────── */
    .rec-delta{ display:inline-block; font-family:var(--au-mono); font-size:10px; font-weight:700; margin-top:6px; padding:2px 8px; border-radius:7px; }
    .rec-train{ font-size:11.5px; color:var(--au-faint); line-height:1.4; margin-top:8px; font-style:italic; font-family:var(--au-serif); }
    .rec-ring-wrap.peak::after{ content:''; position:absolute; inset:-6px; border-radius:50%; box-shadow:0 0 26px 4px rgba(var(--sec-rgb),.45); animation:sl-peak 2.2s ease-in-out infinite; pointer-events:none; }
    @keyframes sl-peak{ 0%,100%{ opacity:.4; } 50%{ opacity:.9; } }

    /* ── Insights (in Trends) ─────────────────────── */
    .sl-ins{ display:flex; gap:10px; margin-bottom:14px; }
    .sl-ins-card{ flex:1; background:rgba(255,255,255,.04); border:1px solid var(--au-line); border-radius:13px; padding:11px 12px; }
    .sl-ins-v{ font-family:var(--au-mono); font-size:20px; font-weight:700; color:var(--au-ivory); line-height:1; letter-spacing:-.02em; }
    .sl-ins-v small{ font-size:11px; color:var(--au-faint); }
    .sl-ins-l{ font-family:var(--au-mono); font-size:8.5px; font-weight:700; letter-spacing:.09em; text-transform:uppercase; color:var(--au-faint); margin-top:6px; line-height:1.3; }
    .sl-takeaway{ font-family:var(--au-serif); font-style:italic; font-size:14.5px; color:var(--au-ivory); line-height:1.45; padding:12px 14px; margin-bottom:14px; border-radius:13px; background:rgba(var(--sec-rgb),.07); border-left:2px solid rgb(var(--sec-rgb)); }
    .sl-streak{ font-family:var(--au-mono); font-size:9px; }

    /* ── Night tags (Phase B) ─────────────────────── */
    .sl-tags-wrap{ margin-top:18px; padding-top:15px; border-top:1px solid rgba(255,255,255,.06); }
    .sl-tags{ display:flex; flex-wrap:wrap; gap:7px; }
    .sl-tag{ font-family:var(--au-sans); font-size:12px; font-weight:600; color:var(--au-dim); background:rgba(255,255,255,.04); border:1px solid var(--au-line); border-radius:11px; padding:8px 11px; cursor:pointer; transition:transform .12s, border-color .2s, background .2s, color .2s; -webkit-tap-highlight-color:transparent; }
    .sl-tag:active{ transform:scale(.95); }
    .sl-tag.on{ background:rgba(var(--sec-rgb),.18); border-color:rgba(var(--sec-rgb),.55); color:rgb(var(--sec-rgb)); }

    /* ── Patterns / what affects you (Phase B) ────── */
    .pat-today{ font-family:var(--au-serif); font-style:italic; font-size:14.5px; color:var(--au-ivory); line-height:1.45; padding:11px 14px; margin-bottom:14px; border-radius:12px; background:rgba(var(--sec-rgb),.08); border-left:2px solid rgb(var(--sec-rgb)); }
    .pat-list{ display:flex; flex-direction:column; gap:12px; }
    .pat-row{ display:flex; align-items:flex-start; gap:10px; }
    .pat-dot{ width:8px; height:8px; border-radius:50%; margin-top:5px; flex-shrink:0; box-shadow:0 0 8px currentColor; }
    .pat-txt{ font-size:13px; color:var(--au-dim); line-height:1.45; flex:1; }
    .pat-txt b{ color:var(--au-ivory); font-weight:700; }
    .pat-n{ font-family:var(--au-mono); font-size:9.5px; color:var(--au-faint); white-space:nowrap; }
    .pat-rhythm{ margin-top:13px; padding-top:12px; border-top:1px solid rgba(255,255,255,.06); font-size:12px; color:var(--au-dim); line-height:1.55; }
    .pat-rhythm b{ color:var(--au-ivory); font-weight:700; }

    /* ── Your day: circadian energy schedule (Phase C) ─── */
    .day-list{ display:flex; flex-direction:column; gap:2px; }
    .day-row{ display:flex; align-items:flex-start; gap:12px; padding:9px 0; border-bottom:1px solid rgba(255,255,255,.05); }
    .day-row:last-child{ border-bottom:none; }
    .day-ic{ font-size:16px; line-height:1.4; width:22px; text-align:center; flex-shrink:0; }
    .day-mid{ flex:1; min-width:0; }
    .day-name{ font-family:var(--au-mono); font-size:10.5px; font-weight:700; letter-spacing:.06em; text-transform:uppercase; color:var(--au-ivory); }
    .day-time{ color:rgb(var(--sec-rgb)); margin-left:5px; }
    .day-tip{ font-size:12px; color:var(--au-dim); line-height:1.4; margin-top:3px; }
  </style>
</head>
<body data-page="sleep" class="au-bg au-mood-alert" id="root">

  <!-- Hero -->
  <div class="sl-hero">
    <div>
      <div class="au-eyebrow sl-hero-eyebrow"><span class="au-dot"></span>SLEEP &amp; RECOVERY<span class="au-sep">&middot;</span><span id="heroDate">TODAY</span></div>
      <p class="sl-hero-line" id="novaSays">How did you sleep?</p>
    </div>
    <div class="nova" id="nova" aria-hidden="true">
      <svg viewBox="0 0 100 100">
        <defs><linearGradient id="novaGradSleep" x1="0" y1="0" x2="1" y2="1">
          <stop offset="0%" stop-color="#9B8CFF"/><stop offset="100%" stop-color="#18C8C0"/>
        </linearGradient></defs>
        <g class="nova-glow">
          <rect x="22" y="22" width="56" height="56" rx="16" transform="rotate(45 50 50)" fill="url(#novaGradSleep)" opacity="0.95"/>
          <circle class="nova-eye" cx="42" cy="50" r="5.5" fill="#04130D"/>
          <circle class="nova-eye" cx="58" cy="50" r="5.5" fill="#04130D"/>
          <circle cx="43.4" cy="48.5" r="1.6" fill="#fff"/>
          <circle cx="59.4" cy="48.5" r="1.6" fill="#fff"/>
        </g>
      </svg>
    </div>
  </div>

  <div class="sl-wrap" data-am-reveal-group>

    <!-- Recovery score (flagship) -->
    <section class="sl-sec" id="recSec" style="--sec-rgb:155,140,255">
      <div class="sl-sec-hdr"><span class="sl-sec-dot"></span><span class="sl-sec-title">Recovery</span><span class="sl-sec-note" id="recNote">TODAY</span></div>
      <div class="sl-sec-body" id="recBody"></div>
    </section>

    <!-- Last night's sleep -->
    <section class="sl-sec" style="--sec-rgb:155,140,255">
      <div class="sl-sec-hdr"><span class="sl-sec-dot"></span><span class="sl-sec-title">Last night</span><span class="sl-sec-note" id="sleepNote">AUTO-SAVED</span></div>
      <div class="sl-sec-body" id="sleepBody"></div>
    </section>

    <!-- Morning check-in -->
    <section class="sl-sec" style="--sec-rgb:24,200,192">
      <div class="sl-sec-hdr"><span class="sl-sec-dot"></span><span class="sl-sec-title">This morning</span><span class="sl-sec-note" id="checkNote">AUTO-SAVED</span></div>
      <div class="sl-sec-body" id="checkBody"></div>
    </section>

    <!-- Your day — circadian energy schedule -->
    <section class="sl-sec" id="daySec" style="--sec-rgb:242,192,99">
      <div class="sl-sec-hdr"><span class="sl-sec-dot"></span><span class="sl-sec-title">Your day</span><span class="sl-sec-note">ENERGY SCHEDULE</span></div>
      <div class="sl-sec-body" id="dayBody"></div>
    </section>

    <!-- Trends -->
    <section class="sl-sec" style="--sec-rgb:52,226,176">
      <div class="sl-sec-hdr"><span class="sl-sec-dot"></span><span class="sl-sec-title">Trends</span><span class="sl-sec-note">LAST 14 NIGHTS</span></div>
      <div class="sl-sec-body" id="trendBody"></div>
    </section>

    <!-- Consistency calendar -->
    <section class="sl-sec" style="--sec-rgb:52,226,176">
      <div class="sl-sec-hdr"><span class="sl-sec-dot"></span><span class="sl-sec-title">Consistency</span><span class="sl-sec-note">LAST 12 WEEKS</span></div>
      <div class="sl-sec-body" id="consBody"></div>
    </section>

    <!-- What affects you (cross-domain patterns) -->
    <section class="sl-sec" id="patSec" style="--sec-rgb:155,140,255">
      <div class="sl-sec-hdr"><span class="sl-sec-dot"></span><span class="sl-sec-title">What affects you</span><span class="sl-sec-note">YOUR PATTERNS</span></div>
      <div class="sl-sec-body" id="patBody"></div>
    </section>

  </div>

  <script>
  (function () {
    'use strict';
    var KEY = 'sleep:logs';

    /* ── Helpers ──────────────────────────────────── */
    function pad(n){ return String(n).padStart(2,'0'); }
    function dateKey(d){ return d.getFullYear()+'-'+pad(d.getMonth()+1)+'-'+pad(d.getDate()); }
    function today(){ return dateKey(new Date()); }
    function ls(k){ try{ return JSON.parse(localStorage.getItem(k)); }catch(e){ return null; } }
    function lsSave(k,v){ try{ localStorage.setItem(k, JSON.stringify(v)); }catch(e){} }
    function esc(s){ return String(s==null?'':s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
    function clamp(v,a,b){ return Math.max(a, Math.min(b, v)); }

    function getLogs(){ var a = ls(KEY); return Array.isArray(a) ? a : []; }
    function entryFor(dk){
      var logs = getLogs();
      for (var i=0;i<logs.length;i++){ if (logs[i] && logs[i].dateKey === dk) return logs[i]; }
      return null;
    }
    function todayEntry(){ return entryFor(today()) || { id:'sl-'+today(), dateKey:today() }; }

    /* hours between bed (HH:MM) and wake (HH:MM), wrapping past midnight */
    function calcHours(bed, wake){
      if (!bed || !wake) return null;
      var b = bed.split(':'), w = wake.split(':');
      var bm = (+b[0])*60 + (+b[1]), wm = (+w[0])*60 + (+w[1]);
      var diff = wm - bm; if (diff <= 0) diff += 1440;
      return Math.round(diff / 60 * 100) / 100;
    }
    function fmtHM(hours){
      if (hours == null) return '—';
      var h = Math.floor(hours), m = Math.round((hours - h) * 60);
      if (m === 60){ h += 1; m = 0; }
      return h + 'h' + (m ? ' ' + m + 'm' : '');
    }

    /* ── Recovery scoring (the soul of the page) ───── */
    // Each component → 0..100, then a weighted average over the
    // components that are actually present. Stress & soreness are
    // inverted (higher input = worse).
    // ── Science-grounded Recovery (Phase A) ─────────────────────────
    // The subjective items (sleep, fatigue→energy, soreness, stress) are the
    // VALIDATED Hooper–Mackinnon athlete-wellness set. Each is scored against
    // the athlete's OWN rolling baseline (z-score) — the method sports science
    // uses because subjective wellness tracks training readiness with better
    // sensitivity than HRV/RHR (Saw et al., Br J Sports Med 2016). The sleep
    // dimension adds objective sleep science: duration vs YOUR need, timing
    // regularity, and cumulative sleep debt.
    var BASE_SCORE = 68, Z_SPREAD = 18, SD_FLOOR = 0.5, BASE_MIN_N = 5, BASE_FULL_N = 12;

    function baselineStats(field, excludeDK){
      var vals = getLogs().filter(function(e){ return e && e.dateKey && e.dateKey !== excludeDK && e[field] != null; })
        .sort(function(a,b){ return a.dateKey < b.dateKey ? 1 : -1; }).slice(0,28).map(function(e){ return e[field]; });
      var n = vals.length; if (!n) return { mean:3, sd:1, n:0 };
      var mean = vals.reduce(function(a,b){ return a+b; },0)/n;
      var sd = n>1 ? Math.sqrt(vals.reduce(function(a,b){ return a+(b-mean)*(b-mean); },0)/n) : 1;
      return { mean:mean, sd:sd, n:n };
    }
    // val is 1..5. `worse`=true for items where higher is worse (soreness, stress).
    function subScore(field, val, excludeDK, worse){
      if (val == null) return null;
      var abs = worse ? (5-val)/4*100 : (val-1)/4*100;      // absolute anchor
      var st = baselineStats(field, excludeDK);
      if (st.n < BASE_MIN_N) return clamp(abs, 0, 100);
      var sd = Math.max(st.sd, SD_FLOOR);
      var z = worse ? (st.mean - val)/sd : (val - st.mean)/sd;
      var bl = clamp(BASE_SCORE + z*Z_SPREAD, 0, 100);
      var conf = clamp((st.n - BASE_MIN_N)/(BASE_FULL_N - BASE_MIN_N), 0, 1);
      return clamp(conf*bl + (1-conf)*abs, 0, 100);
    }
    // duration vs personal need — curvilinear (short sleep hurts nonlinearly)
    function durScore(hours, need){
      if (!(hours > 0)) return null;
      if (hours >= need) return clamp(100 - (hours-need)*8, 82, 100);
      return clamp(100 - Math.pow(need-hours, 1.5)*18, 0, 100);
    }
    function midMin(e){
      if (!e || !e.bed || !e.wake) return null;
      var b=e.bed.split(':'), w=e.wake.split(':');
      var bm=(+b[0])*60+(+b[1]), wm=(+w[0])*60+(+w[1]); if (wm<=bm) wm+=1440;
      return ((bm+wm)/2)%1440;
    }
    // timing regularity: SD of sleep midpoint over recent nights (lower = better)
    function regularityScore(){
      var mids = getLogs().filter(function(e){ return e && e.dateKey && e.bed && e.wake; })
        .sort(function(a,b){ return a.dateKey < b.dateKey ? 1 : -1; }).slice(0,14)
        .map(midMin).filter(function(v){ return v != null; })
        .map(function(m){ return m < 720 ? m+1440 : m; });   // early-AM midpoints → post-midnight space
      if (mids.length < 4) return null;
      var mean = mids.reduce(function(a,b){ return a+b; },0)/mids.length;
      var sd = Math.sqrt(mids.reduce(function(a,b){ return a+(b-mean)*(b-mean); },0)/mids.length);
      return { score: clamp(100 - Math.max(0, sd-25)*0.8, 20, 100), sd: Math.round(sd) };
    }
    // cumulative sleep debt over last 14 logged nights (per-night clamped ±2h)
    function debtInfo(need, uptoDK){
      var nights = getLogs().filter(function(e){ return e && e.dateKey && e.hours > 0 && (!uptoDK || e.dateKey <= uptoDK); })
        .sort(function(a,b){ return a.dateKey < b.dateKey ? 1 : -1; }).slice(0,14);
      if (nights.length < 3) return null;
      var debt = nights.reduce(function(s,e){ return s + clamp(need - e.hours, -2, 2); }, 0);
      return { debt: debt, score: clamp(100 - Math.max(0, debt-1)*7, 25, 100), nights: nights.length };
    }
    function recovery(e){
      if (!e) return null;
      var need = getProfile().need, dk = e.dateKey;
      var qS = subScore('quality', e.quality, dk, false);
      var dS = durScore(e.hours != null ? e.hours : calcHours(e.bed, e.wake), need);
      var reg = regularityScore(), rS = reg ? reg.score : null;
      var dbt = debtInfo(need, dk), deS = dbt ? dbt.score : null;
      // Sleep dimension = felt quality + measured (duration / regularity / debt)
      var ss=0, sw=0;
      function addSleep(v,w){ if (v != null){ ss += v*w; sw += w; } }
      addSleep(qS,0.40); addSleep(dS,0.35); addSleep(rS,0.15); addSleep(deS,0.10);
      var sleepDim = sw ? ss/sw : null;
      var enS = subScore('energy',   e.energy,   dk, false);
      var soS = subScore('soreness', e.soreness, dk, true);
      var stS = subScore('stress',   e.stress,   dk, true);
      var moS = subScore('mood',     e.mood,     dk, false);
      // Hooper-equal core (sleep/fatigue/soreness/stress) + mood adjunct
      var W = [['Sleep',sleepDim,0.28],['Energy',enS,0.22],['Freshness',soS,0.22],['Calm',stS,0.18],['Mood',moS,0.10]];
      var sum=0, wsum=0, parts=[];
      W.forEach(function(x){ if (x[1] != null){ sum += x[1]*x[2]; wsum += x[2]; parts.push({ label:x[0], score:Math.round(x[1]) }); } });
      if (!wsum) return null;
      var histN = getLogs().filter(function(x){ return x && x.dateKey && x.dateKey !== dk && (x.quality!=null||x.energy!=null||x.soreness!=null||x.stress!=null); }).length;
      return { score: Math.round(sum/wsum), parts: parts, n: parts.length, histN: histN, reg: reg, dbt: dbt, need: need };
    }
    function verdictFor(score){
      if (score >= 82) return { mood:'hot',   rgb:'52,226,176',  word:'Primed',    advice:'You’re fully recovered — attack a hard session and chase a PR.' };
      if (score >= 65) return { mood:'calm',  rgb:'24,200,192',  word:'Recovered', advice:'Good to go. Train as planned and push your working sets.' };
      if (score >= 45) return { mood:'low',   rgb:'242,192,99',  word:'Run-down',  advice:'Train, but keep it moderate — hit your lifts, skip the grind sets.' };
      return                  { mood:'alert', rgb:'255,107,139', word:'Depleted',  advice:'Go light or rest. Recovery is when you actually grow — respect it.' };
    }

    /* ── Save a field on today’s entry ───────────── */
    function flashNote(id){
      var n = document.getElementById(id); if (!n) return;
      var was = n.textContent; n.textContent = 'SAVED ✓'; n.classList.add('saved');
      clearTimeout(n._t); n._t = setTimeout(function(){ n.textContent = was; n.classList.remove('saved'); }, 1100);
    }
    function setField(field, value, noteId){
      var dk = today();
      var logs = getLogs();
      var idx = -1;
      for (var i=0;i<logs.length;i++){ if (logs[i] && logs[i].dateKey === dk){ idx = i; break; } }
      var e = idx >= 0 ? logs[idx] : { id:'sl-'+dk, dateKey:dk };
      e[field] = value;
      if (field === 'bed' || field === 'wake') e.hours = calcHours(e.bed, e.wake);
      var r = recovery(e);
      e.recovery = r ? r.score : null;
      e.ts = Date.now();
      if (idx >= 0) logs[idx] = e; else logs.push(e);
      lsSave(KEY, logs);
      if (noteId) flashNote(noteId);
      // Editing a time input? Refresh only the derived UI — rebuilding
      // #sleepBody here would destroy the <input type=time> mid-pick (on iOS
      // that drops the value / closes the wheel, so the time won't stick).
      if (field === 'bed' || field === 'wake') refreshDerived();
      else renderAll();
    }

    // Update everything that depends on the entry WITHOUT touching the bed/wake
    // inputs (so an in-progress time pick isn't interrupted).
    function refreshDerived(){
      var e = todayEntry();
      var hrs = (e.hours != null) ? e.hours : calcHours(e.bed, e.wake);
      var durEl = document.querySelector('#sleepBody .sl-dur-val');
      if (durEl) durEl.textContent = fmtHM(hrs);
      renderRecovery();
      renderDay();
      renderTrends();
      renderConsistency();
      renderPatterns();
      updateNova();
    }

    /* ── One-tap sleep / wake buttons. Pending bedtime is kept LOCAL (not synced)
       since it's transient; the finished entry is filed under the wake day via
       setField (calcHours wraps past midnight), so a 23:30→07:00 night lands on
       the morning's date automatically. ── */
    var PEND = 'sleep:pending';
    function hm(ts){ var d = new Date(ts); return pad(d.getHours()) + ':' + pad(d.getMinutes()); }
    function getPending(){ var p = ls(PEND); return (p && typeof p.at === 'number') ? p : null; }
    function goSleep(){ lsSave(PEND, { at: Date.now() }); flashNote('sleepNote'); renderAll(); }
    function cancelSleep(){ try{ localStorage.removeItem(PEND); }catch(e){} renderAll(); }
    function wokeUp(){
      var now = Date.now(), p = getPending();
      if (p){
        var dur = (now - p.at) / 3600000;
        try{ localStorage.removeItem(PEND); }catch(e){}
        if (dur >= 0.33 && dur <= 16){            // a real night → pair bedtime + wake
          setField('bed', hm(p.at), null);
          setField('wake', hm(now), 'sleepNote');
          renderAll();
          return;
        }
      }
      setField('wake', hm(now), 'sleepNote');      // no usable bedtime → log wake, set bedtime manually
      renderAll();
    }

    /* ── Profile, bedtime target, insights, haptics ── */
    var PROF = 'sleep:profile', editingTarget = false;
    function getProfile(){ var p = ls(PROF) || {}; return { wakeTime: p.wakeTime || '07:00', need: (typeof p.need === 'number' ? p.need : 8.5) }; }
    function saveProfile(p){ lsSave(PROF, p); }
    function targetBed(){ var pr = getProfile(); var w = pr.wakeTime.split(':'); var wm = (+w[0]) * 60 + (+w[1]); var bm = (((wm - Math.round(pr.need * 60)) % 1440) + 1440) % 1440; return pad(Math.floor(bm / 60)) + ':' + pad(bm % 60); }
    function buzz(ms){ try{ if (navigator.vibrate) navigator.vibrate(ms || 12); }catch(e){} }
    function daysBetween(a, b){ var pa = a.split('-').map(Number), pb = b.split('-').map(Number); return Math.round((Date.UTC(pa[0],pa[1]-1,pa[2]) - Date.UTC(pb[0],pb[1]-1,pb[2])) / 86400000); }
    function elapsedStr(ms){ var m = Math.max(0, Math.round(ms / 60000)); var h = Math.floor(m / 60); return (h ? h + 'h ' : '') + (m % 60) + 'm'; }
    function daysSinceTrained(){ var w = ls('po_workouts'); if (!Array.isArray(w)) return null; var ds = w.filter(function(x){ return x && x.date; }).map(function(x){ return x.date; }).sort(); return ds.length ? daysBetween(today(), ds[ds.length - 1]) : null; }
    function recoveryOf(dk){ var r = recovery(entryFor(dk)); return r ? r.score : null; }
    function sleepInsights(){
      var logs = getLogs().filter(function(e){ return e && e.dateKey; }).sort(function(a,b){ return a.dateKey < b.dateKey ? -1 : 1; });
      var need = getProfile().need;
      // 14-night rolling debt (Rise-style), consistent with the recovery engine
      var dbt = debtInfo(need, today());
      var debt = dbt ? dbt.debt : 0, weekNights = dbt ? dbt.nights : 0;
      var beds = logs.slice(-10).filter(function(e){ return e.bed; }).map(function(e){ var p = e.bed.split(':'); var mm = (+p[0]) * 60 + (+p[1]); if (mm < 720) mm += 1440; return mm; });
      var consistency = null, spread = null;
      if (beds.length >= 3){
        var mean = beds.reduce(function(a,b){ return a + b; }, 0) / beds.length;
        var std = Math.sqrt(beds.reduce(function(a,b){ return a + (b - mean) * (b - mean); }, 0) / beds.length);
        spread = Math.round(std);
        consistency = Math.round(clamp(100 - Math.max(0, std - 15) * 0.8, 0, 100));
      }
      var have = {}; logs.forEach(function(e){ if (e.hours > 0) have[e.dateKey] = 1; });
      var streak = 0, cur = new Date();
      if (!have[dateKey(cur)]) cur = new Date(Date.now() - 86400000);
      while (have[dateKey(cur)]){ streak++; cur = new Date(cur.getTime() - 86400000); }
      var recent = logs.slice(-14).filter(function(e){ return e.hours > 0; }), best = null;
      recent.forEach(function(e){ var sc = e.recovery != null ? e.recovery : recoveryOf(e.dateKey); var k = sc != null ? sc : e.hours; if (!best || k > best.key) best = { e: e, key: k, sc: sc }; });
      return { debt: debt, weekNights: weekNights, consistency: consistency, spread: spread, streak: streak, best: best, need: need };
    }

    /* ══════════ RECOVERY CARD ══════════ */
    function barColor(s){ return s >= 70 ? '#34E2B0' : s >= 45 ? '#F2C063' : '#FF6B8B'; }
    function renderRecovery(){
      var e = entryFor(today());
      var r = recovery(e);
      var sec = document.getElementById('recSec');
      var body = document.getElementById('recBody');

      if (!r){
        sec.style.setProperty('--sec-rgb', '155,140,255');
        body.innerHTML = '<p class="rec-empty">Log last night’s sleep and a quick morning check-in below — Nova will read them into a recovery score that tells you how hard to train today.</p>';
        return;
      }

      var v = verdictFor(r.score);
      sec.style.setProperty('--sec-rgb', v.rgb);

      var R = 50, C = 2 * Math.PI * R;
      var off = C - (r.score / 100) * C;

      var bars = r.parts.map(function(p){
        return '<div class="rec-bar-row"><span class="rec-bar-lbl">' + p.label + '</span>' +
          '<div class="rec-bar-track"><div class="rec-bar-fill" style="width:' + p.score + '%;background:' + barColor(p.score) + '"></div></div>' +
          '<span class="rec-bar-v">' + p.score + '</span></div>';
      }).join('');

      var yScore = recoveryOf(dateKey(new Date(Date.now() - 86400000)));
      var delta = (yScore != null) ? r.score - yScore : null, deltaHtml = '';
      if (delta != null && delta !== 0){ var up = delta > 0, dc = up ? '52,226,176' : '255,107,139'; deltaHtml = '<span class="rec-delta" style="color:rgb(' + dc + ');background:rgba(' + dc + ',.14)">' + (up ? '▲ ' : '▼ ') + Math.abs(delta) + ' vs yesterday</span>'; }
      else if (delta === 0){ deltaHtml = '<span class="rec-delta" style="color:var(--au-faint);background:rgba(255,255,255,.06)">even with yesterday</span>'; }

      var dst = daysSinceTrained(), trainHtml = '';
      if (dst != null){
        if (r.score >= 65 && dst >= 2) trainHtml = 'You haven’t trained in ' + dst + ' days and you’re recovered — go earn it today.';
        else if (r.score >= 65 && dst <= 1) trainHtml = (dst === 0 ? 'Recovered even after training today' : 'Recovered the day after training') + ' — your engine’s running well.';
        else if (r.score < 45 && dst === 0) trainHtml = 'You trained today and you’re depleted — food and an early night tonight.';
        else if (r.score < 45) trainHtml = 'Low recovery — a rest day or easy walk pays off more than grinding.';
      }

      // Transparency: what the number is built from + baseline maturity.
      var mReg = r.reg ? ('±' + r.reg.sd + 'm timing') : null;
      var mDebt = (r.dbt && r.dbt.debt > 0.5) ? ('−' + (Math.round(r.dbt.debt*10)/10) + 'h debt') : ((r.dbt && r.dbt.debt < -0.5) ? ('+' + (Math.round(-r.dbt.debt*10)/10) + 'h surplus') : null);
      var mBits = [mReg, mDebt].filter(Boolean).join(' · ');
      var mConf = r.histN >= BASE_FULL_N ? 'vs your baseline' : (r.histN >= BASE_MIN_N ? 'baseline building · ' + r.histN + ' nights' : 'early — anchored to norms until ~' + BASE_MIN_N + ' nights');
      var methodHtml = '<div class="rec-method"><b>Hooper wellness index</b>, scored ' + mConf + ' · sleep weighted by duration vs your ' + r.need + 'h need, regularity &amp; debt' + (mBits ? ' <span style="opacity:.8">(' + mBits + ')</span>' : '') + '</div>';

      body.innerHTML =
        '<div class="rec-main">' +
          '<div class="rec-ring-wrap' + (r.score >= 85 ? ' peak' : '') + '">' +
            '<svg width="116" height="116" viewBox="0 0 116 116">' +
              '<circle cx="58" cy="58" r="' + R + '" fill="none" stroke="rgba(255,255,255,0.07)" stroke-width="9"/>' +
              '<circle class="am-ring" cx="58" cy="58" r="' + R + '" fill="none" stroke="rgb(' + v.rgb + ')" stroke-width="9" stroke-linecap="round" stroke-dasharray="' + C.toFixed(2) + '" stroke-dashoffset="' + off.toFixed(2) + '" style="filter:drop-shadow(0 0 8px rgba(' + v.rgb + ',.6))"/>' +
            '</svg>' +
            '<div class="rec-ring-inner"><div class="rec-score">' + r.score + '</div><div class="rec-score-lbl">Recovery</div></div>' +
          '</div>' +
          '<div class="rec-right"><div class="rec-verdict">' + v.word + '.</div>' + deltaHtml + '<div class="rec-advice">' + v.advice + '</div>' + (trainHtml ? '<div class="rec-train">' + trainHtml + '</div>' : '') + '</div>' +
        '</div>' +
        '<div class="rec-bars">' + bars + '</div>' + methodHtml;
      if (window.AuroraMotion) { var _rc = body.querySelector('.am-ring'); if (_rc) AuroraMotion.ring(_rc, (r.score || 0) / 100, 'sleep-rec'); }
    }

    /* ══════════ SLEEP LOG CARD ══════════ */
    function renderSleep(){
      var e = todayEntry();
      var body = document.getElementById('sleepBody');
      var pend = getPending();

      // STATE A — a sleep is in progress: calm hero, no ambiguity.
      if (pend){
        body.innerHTML =
          '<div class="sl-now">' +
            '<div class="sl-now-moon">🌙</div>' +
            '<div class="sl-now-since">Sleeping since ' + hm(pend.at) + '</div>' +
            '<div class="sl-now-el" id="slElapsed">' + elapsedStr(Date.now() - pend.at) + ' so far</div>' +
            '<div class="sl-acts" style="margin:16px 0 4px"><button type="button" class="sl-act prim" data-sleep-act="woke">☀️ I woke up<small>logs ' + hm(pend.at) + ' → now</small></button></div>' +
            '<button type="button" class="sl-now-cancel" data-sleep-act="cancel">cancel · I’m not actually asleep</button>' +
          '</div>';
        return;
      }

      // STATE B/C — bedtime target, quick buttons, manual times, quality.
      var hrs = (e.hours != null) ? e.hours : calcHours(e.bed, e.wake);
      var qLabels = ['', 'Terrible', 'Poor', 'OK', 'Good', 'Great'];
      var pills = '';
      for (var i=1;i<=5;i++) pills += '<button type="button" class="sl-pill' + (e.quality === i ? ' on' : '') + '" data-metric="quality" data-val="' + i + '">' + i + '</button>';

      var pr = getProfile(), tb = targetBed(), targetHtml;
      if (editingTarget){
        targetHtml = '<div class="sl-edit-row">' +
          '<div class="sl-edit-box"><label>Wake by</label><input type="time" id="slWakeGoal" value="' + pr.wakeTime + '"></div>' +
          '<div class="sl-edit-box"><label>Sleep need</label><select id="slNeed">' +
            [7,7.5,8,8.5,9,9.5].map(function(n){ return '<option value="' + n + '"' + (n === pr.need ? ' selected' : '') + '>' + n + 'h</option>'; }).join('') +
          '</select></div>' +
          '<button type="button" class="sl-act prim" style="flex:0 0 auto;padding:10px 16px" data-sleep-act="target-save">Save</button>' +
        '</div>';
      } else {
        var hit = (hrs != null && hrs > 0) ? (hrs >= pr.need - 0.25 ? ' · hit it last night ✓' : ' · last night ' + fmtHM(hrs)) : '';
        targetHtml = '<div class="sl-target" data-sleep-act="target-edit"><span class="sl-target-ico">🎯</span><span class="sl-target-txt">In bed by <b>' + tb + '</b> for <b>' + pr.need + 'h</b> before your ' + pr.wakeTime + ' wake' + hit + '</span><span class="sl-target-edit">Edit</span></div>';
      }

      var acts = '<div class="sl-acts">' +
        '<button type="button" class="sl-act" data-sleep-act="sleep">😴 Going to sleep</button>' +
        '<button type="button" class="sl-act prim" data-sleep-act="woke">☀️ I woke up</button>' +
      '</div>';

      body.innerHTML =
        targetHtml + acts +
        '<div class="sl-times">' +
          '<div class="sl-time-box"><div class="sl-time-lbl">Bedtime</div><input type="time" class="sl-time-in" id="slBed" value="' + (e.bed || '') + '"></div>' +
          '<div class="sl-dur"><div class="sl-dur-val">' + fmtHM(hrs) + '</div><div class="sl-dur-lbl">Asleep</div></div>' +
          '<div class="sl-time-box"><div class="sl-time-lbl">Woke up</div><input type="time" class="sl-time-in" id="slWake" value="' + (e.wake || '') + '"></div>' +
        '</div>' +
        '<div class="sl-metric">' +
          '<div class="sl-metric-top"><span class="sl-metric-name">Sleep quality</span><span class="sl-metric-cur">' + (e.quality ? qLabels[e.quality] : '—') + '</span></div>' +
          '<div class="sl-scale" data-scale="quality">' + pills + '</div>' +
          '<div class="sl-scale-ends"><span>Terrible</span><span>Great</span></div>' +
        '</div>';

      var bed = document.getElementById('slBed'), wake = document.getElementById('slWake');
      function bind(el, field){ function save(){ if (el.value) setField(field, el.value, 'sleepNote'); } el.addEventListener('change', save); el.addEventListener('input', save); }
      bind(bed, 'bed'); bind(wake, 'wake');
    }

    /* ══════════ MORNING CHECK-IN CARD ══════════ */
    var CHECK = [
      { key:'energy',   name:'Energy',   low:'Drained',  high:'Buzzing', labels:['','Drained','Low','OK','Good','Buzzing'] },
      { key:'mood',     name:'Mood',     low:'Low',      high:'Great',   labels:['','Low','Meh','OK','Good','Great'] },
      { key:'stress',   name:'Stress',   low:'Calm',     high:'Stressed',labels:['','Calm','Settled','OK','Tense','Stressed'] },
      { key:'soreness', name:'Soreness', low:'Fresh',    high:'Wrecked', labels:['','Fresh','Slight','Some','Sore','Wrecked'] }
    ];
    function renderCheck(){
      var e = todayEntry();
      var html = CHECK.map(function(m){
        var cur = e[m.key] ? m.labels[e[m.key]] : '—';
        var pills = '';
        for (var i=1;i<=5;i++){

    /* ══════════ TRENDS CARD ══════════ */
    function renderTrends(){
      var logs = getLogs().filter(function(e){ return e && e.dateKey; })
                          .sort(function(a,b){ return a.dateKey < b.dateKey ? -1 : 1; });
      var el = document.getElementById('trendBody');

      var slept = logs.filter(function(e){ return e.hours > 0; });
      if (!slept.length){
        el.innerHTML = '<p class="sl-empty">Your sleep &amp; recovery history will grow here night by night.</p>';
        return;
      }

      // 7-day averages
      function avg7(field){
        var cut = dateKey(new Date(Date.now() - 7 * 86400000));
        var vals = logs.filter(function(e){ return e.dateKey > cut && e[field] != null && (field !== 'hours' || e.hours > 0); })
                       .map(function(e){ return e[field]; });
        if (!vals.length) return null;
        return vals.reduce(function(a,b){ return a + b; }, 0) / vals.length;
      }
      var avgH = avg7('hours'), avgR = avg7('recovery');

      // last-14 sleep-hours sparkline
      var view = slept.slice(-14);
      var vals = view.map(function(e){ return e.hours; });
      var max = Math.max.apply(null, vals.concat([8])), min = Math.min.apply(null, vals.concat([0]));
      var range = (max - min) || 1;
      var tod = today();
      var bars = view.map(function(e){
        var h = Math.round(((e.hours - min) / range) * 44 + 8);
        var isT = e.dateKey === tod;
        var d = new Date(e.dateKey + 'T00:00:00');
        return '<div class="sl-spark-col"><div class="sl-spark-bar' + (isT ? ' today' : '') + '" style="height:' + h + 'px" title="' + e.dateKey + ': ' + fmtHM(e.hours) + '"></div><div class="sl-spark-lbl">' + ['S','M','T','W','T','F','S'][d.getDay()] + '</div></div>';
      }).join('');

      // recent nights list (latest 6)
      var qLabels = ['', 'terrible', 'poor', 'ok', 'good', 'great'];
      function recBadge(s){
        if (s == null) return '<span class="sl-night-rec" style="color:var(--au-faint);background:rgba(255,255,255,.05)">—</span>';
        var c = s >= 70 ? '52,226,176' : s >= 45 ? '242,192,99' : '255,107,139';
        return '<span class="sl-night-rec" style="color:rgb(' + c + ');background:rgba(' + c + ',.14)">' + s + '</span>';
      }
      var nights = slept.slice(-6).reverse().map(function(e){
        var d = new Date(e.dateKey + 'T00:00:00');
        var day = e.dateKey === tod ? 'Today' : ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'][d.getDay()] + ' ' + d.getDate();
        return '<div class="sl-night">' +
          '<span class="sl-night-day">' + day + '</span>' +
          '<span class="sl-night-hrs">' + fmtHM(e.hours) + '</span>' +
          '<span class="sl-night-q">' + (e.quality ? qLabels[e.quality] + ' sleep' : '') + '</span>' +
          recBadge(e.recovery != null ? e.recovery : (recovery(e) ? recovery(e).score : null)) +
        '</div>';
      }).join('');

      // ── Insights: sleep debt (7d), bedtime consistency, logging streak ──
      var ins = sleepInsights();
      var debtV, debtL;
      if (!ins.weekNights){ debtV = '—'; debtL = 'sleep debt'; }
      else if (ins.debt > 0.5){ debtV = '−' + (Math.round(ins.debt * 10) / 10) + 'h'; debtL = 'sleep debt · 14n'; }
      else if (ins.debt < -0.5){ debtV = '+' + (Math.round(-ins.debt * 10) / 10) + 'h'; debtL = 'surplus · 14n'; }
      else { debtV = 'on&nbsp;target'; debtL = '14 nights'; }
      var consV = ins.consistency != null ? (ins.consistency + '<small> /100</small>') : '—';
      var insHtml = '<div class="sl-ins">' +
        '<div class="sl-ins-card"><div class="sl-ins-v">' + debtV + '</div><div class="sl-ins-l">' + debtL + '</div></div>' +
        '<div class="sl-ins-card"><div class="sl-ins-v">' + consV + '</div><div class="sl-ins-l">' + (ins.consistency != null ? 'consistency ±' + ins.spread + 'm' : 'consistency') + '</div></div>' +
        '<div class="sl-ins-card"><div class="sl-ins-v">' + ins.streak + '<small> 🔥</small></div><div class="sl-ins-l">night streak</div></div>' +
      '</div>';
      var bestDay = '';
      if (ins.best){ var bd = new Date(ins.best.e.dateKey + 'T00:00:00'); bestDay = ins.best.e.dateKey === today() ? 'tonight' : ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'][bd.getDay()]; }
      var takeaway;
      if (ins.debt > 1.5){ var pm = Math.round(ins.debt * 60 / 7); takeaway = 'You’re carrying ' + (Math.round(ins.debt * 10) / 10) + 'h of sleep debt — clear it with about +' + pm + ' min a night this week, or a weekend lie-in.'; }
      else if (ins.streak >= 7 && ins.consistency != null && ins.consistency >= 75) takeaway = 'Locked in — ' + ins.streak + ' nights straight with steady timing. This is exactly how recovery compounds.';
      else if (ins.consistency != null && ins.consistency < 50) takeaway = 'Your bedtime swings ±' + ins.spread + ' min — steadier timing lifts recovery more than an extra 20 minutes in bed.';
      else if (ins.best && ins.best.sc != null && ins.best.sc >= 80) takeaway = 'Your best night was ' + bestDay + ' — ' + fmtHM(ins.best.e.hours) + ', recovery ' + ins.best.sc + '. Worth repeating.';
      else if (ins.debt < -1) takeaway = 'Banking surplus sleep this week — nice. Keep the rhythm going.';
      else takeaway = 'Steady week. Keep stacking consistent nights — it’s the highest-leverage lever you’ve got.';
      var takeHtml = '<div class="sl-takeaway">' + takeaway + '</div>';

      el.innerHTML =
        insHtml + takeHtml +
        '<div class="sl-stats">' +
          '<div><div class="sl-stat-val">' + (avgH != null ? fmtHM(avgH) : '—') + '</div><div class="sl-stat-lbl">7-day sleep</div></div>' +
          '<div><div class="sl-stat-val">' + (avgR != null ? Math.round(avgR) : '—') + '<small> / 100</small></div><div class="sl-stat-lbl">7-day recovery</div></div>' +
          '<div><div class="sl-stat-val">' + slept.length + '</div><div class="sl-stat-lbl">nights logged</div></div>' +
        '</div>' +
        '<div class="sl-spark">' + bars + '</div>' +
        '<div class="sl-spark-cap"><span>' + view[0].dateKey.slice(5) + '</span><span>hours asleep</span><span>Today</span></div>' +
        '<div class="sl-nights">' + nights + '</div>';
    }

    /* ══════════ WHAT AFFECTS YOU — cross-domain patterns (Phase B) ══════════
       Reads your OTHER logs (caffeine, training, food) + manual night tags,
       then compares recovery/sleep on nights WITH vs WITHOUT each factor
       (Bearable-style; min 3 of each, last 60 nights). Correlation from your
       own data — surfaced honestly, never claimed as proof. All client-side. */
    var TAGS = [
      { id:'alcohol', label:'Alcohol',       emoji:'🍷' },
      { id:'screen',  label:'Late screen',   emoji:'📱' },
      { id:'stress',  label:'Stressful day', emoji:'😰' },
      { id:'nap',     label:'Napped',        emoji:'😴' },
      { id:'sick',    label:'Felt ill',      emoji:'🤒' },
      { id:'travel',  label:'Travel',        emoji:'✈️' }
    ];
    function cafLogs(){ var a = ls('caf:logs'); return Array.isArray(a) ? a : []; }
    function nutLogs(){ var a = ls('nut:logs'); return Array.isArray(a) ? a : []; }
    function workouts(){ var a = ls('po_workouts'); return Array.isArray(a) ? a : []; }
    function prevDay(dk){ var p = dk.split('-').map(Number); return dateKey(new Date(p[0], p[1]-1, p[2]-1)); }
    function avg(a){ return a.reduce(function(x,y){ return x+y; }, 0) / a.length; }
    // Pre-index the evenings that had each behaviour (O(1) lookups afterwards).
    function crossIndex(){
      var lateCaf = {}, trained = {}, lateMeal = {};
      cafLogs().forEach(function(c){ if (c && c.ts != null){ var d = new Date(c.ts); if (!isNaN(d) && d.getHours() >= 14) lateCaf[dateKey(d)] = 1; } });
      workouts().forEach(function(w){ if (w && w.date) trained[w.date] = 1; });
      nutLogs().forEach(function(n){ if (n && n.dateKey && n.ts != null){ var d = new Date(n.ts); if (!isNaN(d) && d.getHours() >= 21) lateMeal[n.dateKey] = 1; } });
      return { lateCaf:lateCaf, trained:trained, lateMeal:lateMeal };
    }
    function factorList(){
      var auto = [
        { key:'caffeine_late', label:'caffeine after 2pm',      test:function(e,X){ return !!X.lateCaf[prevDay(e.dateKey)]; } },
        { key:'trained_prev',  label:'training the day before',  test:function(e,X){ return !!X.trained[prevDay(e.dateKey)]; } },
        { key:'late_meal',     label:'eating after 9pm',         test:function(e,X){ return !!X.lateMeal[prevDay(e.dateKey)]; } }
      ];
      TAGS.forEach(function(t){ auto.push({ key:'tag_'+t.id, label:t.label.toLowerCase(), test:function(e){ return Array.isArray(e.tags) && e.tags.indexOf(t.id) >= 0; } }); });
      return auto;
    }
    function recScoreOf(e){ return e.recovery != null ? e.recovery : (recovery(e) ? recovery(e).score : null); }
    function factorEffects(){
      var cut = dateKey(new Date(Date.now() - 60 * 86400000));
      var pool = getLogs().filter(function(e){ return e && e.dateKey && e.dateKey >= cut; });
      var X = crossIndex(), out = [];
      factorList().forEach(function(f){
        var wR = [], oR = [], wH = [], oH = [];
        pool.forEach(function(e){
          var has = false; try { has = f.test(e, X); } catch(_){ has = false; }
          var rec = recScoreOf(e);
          if (rec != null) (has ? wR : oR).push(rec);
          if (e.hours > 0) (has ? wH : oH).push(e.hours);
        });
        if (wR.length >= 3 && oR.length >= 3){
          var dR = avg(wR) - avg(oR);
          var dH = (wH.length >= 3 && oH.length >= 3) ? (avg(wH) - avg(oH)) : null;
          if (Math.abs(dR) >= 4) out.push({ label:f.label, key:f.key, test:f.test, dR:dR, dH:dH, nWith:wR.length });
        }
      });
      out.sort(function(a,b){ return Math.abs(b.dR) - Math.abs(a.dR); });
      return { effects:out, X:X };
    }
    function socialJetlag(){
      var rows = getLogs().filter(function(e){ return e && e.dateKey && e.bed && e.wake; })
        .sort(function(a,b){ return a.dateKey < b.dateKey ? 1 : -1; }).slice(0,28);
      var wd = [], we = [];
      rows.forEach(function(e){ var m = midMin(e); if (m == null) return; var day = new Date(e.dateKey + 'T00:00:00').getDay(); var adj = m < 720 ? m + 1440 : m; (day === 0 || day === 6 ? we : wd).push(adj); });
      if (wd.length < 3 || we.length < 3) return null;
      return { shiftMin: Math.round(avg(we) - avg(wd)) };
    }
    function fmtMinDur(mins){ var a = Math.abs(mins), h = Math.floor(a/60), m = a%60; return (h ? h + 'h' : '') + (m ? (h ? ' ' : '') + m + 'm' : (h ? '' : '0m')); }
    function renderPatterns(){
      var body = document.getElementById('patBody'); if (!body) return;
      var fe = factorEffects(), effects = fe.effects;
      var sj = socialJetlag(), reg = regularityScore();

      // Today attribution: negative factors that are active for last night.
      var te = entryFor(today()), todayHtml = '';
      if (te){
        var neg = effects.filter(function(f){ return f.dR <= -4; });
        var active = neg.filter(function(f){ try { return f.test(te, fe.X); } catch(_){ return false; } });
        if (active.length){
          var names = active.slice(0,2).map(function(f){ return esc(f.label); }).join(' and ');
          todayHtml = '<div class="pat-today">Last night you logged <b>' + names + '</b> — that usually costs you recovery. Worth watching tonight.</div>';
        }
      }

      var findings = '';
      if (effects.length){
        findings = '<div class="pat-list">' + effects.slice(0,3).map(function(f){
          var hurts = f.dR < 0, amt = Math.abs(Math.round(f.dR)), rgb = hurts ? '255,107,139' : '52,226,176';
          var hrs = (f.dH != null && Math.abs(f.dH) >= 0.25) ? (' and sleep <b>' + fmtMinDur(Math.round(f.dH*60)) + ' ' + (f.dH < 0 ? 'less' : 'more') + '</b>') : '';
          return '<div class="pat-row"><span class="pat-dot" style="color:rgb(' + rgb + ');background:rgb(' + rgb + ')"></span>' +
            '<div class="pat-txt">After <b>' + esc(f.label) + '</b>, your recovery runs <b style="color:rgb(' + rgb + ')">' + amt + ' ' + (hurts ? 'lower' : 'higher') + '</b>' + hrs + '</div>' +
            '<span class="pat-n">' + f.nWith + ' nights</span></div>';
        }).join('') + '</div>';
      }

      var rhythmBits = [];
      if (reg) rhythmBits.push('Your bed/wake timing varies <b>±' + reg.sd + ' min</b> (regularity ' + reg.score + '/100)');
      if (sj && Math.abs(sj.shiftMin) >= 20) rhythmBits.push('weekends run <b>' + fmtMinDur(sj.shiftMin) + ' ' + (sj.shiftMin > 0 ? 'later' : 'earlier') + '</b> than weekdays — social jet-lag');
      var rhythm = rhythmBits.length ? '<div class="pat-rhythm">' + rhythmBits.join(' · ') + '. Regular timing lifts recovery more than an extra 20 min in bed.</div>' : '';

      if (!findings && !rhythm && !todayHtml){
        body.innerHTML = '<p class="sl-empty">As you log nights — and tag things like alcohol, naps or travel — Nova surfaces what actually moves your sleep &amp; recovery, drawn from your caffeine, training and food logs too.</p>';
        return;
      }
      body.innerHTML = todayHtml + findings + rhythm +
        '<div class="rec-method" style="margin-top:' + (findings || rhythm ? '13px' : '0') + '">Compares nights with vs without each factor (min 3 of each, last 60 days), across your caffeine, training, food &amp; tags. A real signal in your own data — correlation, not proof.</div>';
    }
    // Toggle a night tag on today's entry (tags feed patterns; they do NOT
    // change the recovery score directly — same as Oura's tags).
    function toggleTag(id){
      var dk = today(), logs = getLogs(), idx = -1;
      for (var i=0;i<logs.length;i++){ if (logs[i] && logs[i].dateKey === dk){ idx = i; break; } }
      var e = idx >= 0 ? logs[idx] : { id:'sl-'+dk, dateKey:dk };
      var tags = Array.isArray(e.tags) ? e.tags.slice() : [];
      var p = tags.indexOf(id); if (p >= 0) tags.splice(p,1); else tags.push(id);
      e.tags = tags; e.ts = Date.now();
      if (idx >= 0) logs[idx] = e; else logs.push(e);
      lsSave(KEY, logs); flashNote('checkNote'); renderCheck(); renderPatterns();
    }
    document.addEventListener('click', function(ev){
      var t = ev.target && ev.target.closest ? ev.target.closest('.sl-tag') : null;
      if (!t) return;
      var id = t.getAttribute('data-tag'); if (!id) return;
      buzz(); toggleTag(id);
    });

    /* ══════════ YOUR DAY — circadian energy schedule (Phase C) ══════════
       Standard circadian phases anchored to your wake time + target bed —
       grogginess, focus peaks, the afternoon dip, wind-down, melatonin
       window. Derivable with no sensor; labelled as approximate. */
    function renderDay(){
      var body = document.getElementById('dayBody'); if (!body) return;
      var pr = getProfile(), te = todayEntry();
      var wake = (te && te.wake) ? te.wake : pr.wakeTime;
      var wp = wake.split(':'), wm = (+wp[0])*60 + (+wp[1]);
      var bp = targetBed().split(':'), bm = (+bp[0])*60 + (+bp[1]);
      if (bm <= wm) bm += 1440;                             // bed after wake on the clock
      function t(mins){ var v = ((Math.round(mins)%1440)+1440)%1440; return pad(Math.floor(v/60)) + ':' + pad(v%60); }
      var phases = [
        { ic:'🌫️', name:'Grogginess',    a:wm,      b:wm+90,   tip:'Sleep inertia — ease in; caffeine works well now.' },
        { ic:'⚡', name:'Peak focus',     a:wm+150,  b:wm+270,  tip:'Your sharpest window — do the hardest thinking.' },
        { ic:'🥱', name:'Afternoon dip',  a:wm+420,  b:wm+540,  tip:'Natural lull — easy tasks, a walk, or a short nap.' },
        { ic:'🔥', name:'Evening peak',   a:wm+600,  b:wm+750,  tip:'Second wind — your best window to train hard.' },
        { ic:'🌆', name:'Wind-down',      a:bm-120,  b:bm-30,   tip:'Dim the lights, screens down — start powering off.' },
        { ic:'🌙', name:'Sleep window',   a:bm-30,   b:bm+45,   tip:'Melatonin’s flowing — lights out here to fall asleep fast.' }
      ];
      body.innerHTML = '<div class="day-list">' + phases.map(function(p){
        return '<div class="day-row"><span class="day-ic">' + p.ic + '</span><div class="day-mid">' +
          '<div class="day-name">' + p.name + ' <span class="day-time">' + t(p.a) + '–' + t(p.b) + '</span></div>' +
          '<div class="day-tip">' + p.tip + '</div></div></div>';
      }).join('') + '</div>' +
      '<div class="rec-method" style="margin-top:12px">A typical circadian rhythm anchored to your <b>' + wake + '</b> wake — approximate, but a useful map for timing focus, training &amp; sleep.</div>';
    }

    /* ══════════ CONSISTENCY CALENDAR (Phase C) ══════════ */
    function renderConsistency(){
      var body = document.getElementById('consBody'); if (!body) return;
      var need = getProfile().need;
      var byDay = {}; getLogs().forEach(function(e){ if (e && e.dateKey && e.hours > 0) byDay[e.dateKey] = e.hours; });
      var loggedDays = Object.keys(byDay);
      if (loggedDays.length < 5){ body.innerHTML = '<p class="sl-empty">Your night-by-night consistency grid fills in here as you log sleep.</p>'; return; }
      function status(dk){ var h = byDay[dk]; if (!(h > 0)) return 0; if (h >= need - 0.25) return 3; if (h >= need - 1) return 2; return 1; }
      function col(st){ return st === 3 ? '#34E2B0' : st === 2 ? 'rgba(52,226,176,.45)' : st === 1 ? 'rgba(155,140,255,.4)' : 'rgba(255,255,255,.06)'; }
      var DAYS = 12*7, todayD = new Date(); todayD.setHours(0,0,0,0);
      var start = new Date(todayD.getTime() - (DAYS-1)*86400000); start.setDate(start.getDate() - start.getDay());
      var cur = new Date(start), cells = '';
      while (cur <= todayD){ var colHtml = '';
        for (var i=0;i<7;i++){ var dk = dateKey(cur), future = cur > todayD, st = future ? -1 : status(dk);
          colHtml += '<div title="' + dk + '" style="width:11px;height:11px;border-radius:3px;background:' + (future ? 'transparent' : col(st)) + '"></div>';
          cur.setDate(cur.getDate() + 1); }
        cells += '<div style="display:flex;flex-direction:column;gap:3px">' + colHtml + '</div>';
      }
      function dayNum(dk){ var p = dk.split('-').map(Number); return Math.round(new Date(p[0],p[1]-1,p[2]).getTime()/86400000); }
      var dd = new Date(todayD); if (!(byDay[dateKey(dd)] > 0)) dd.setDate(dd.getDate()-1);
      var streak = 0; while (byDay[dateKey(dd)] > 0){ streak++; dd.setDate(dd.getDate()-1); }
      var ns = loggedDays.map(dayNum).sort(function(a,b){ return a-b; }), best = 0, run = 0, prev = null;
      ns.forEach(function(nn){ run = (prev != null && nn === prev+1) ? run+1 : 1; if (run > best) best = run; prev = nn; });
      var tn = dayNum(dateKey(todayD)), last30 = loggedDays.filter(function(dk){ var a = tn - dayNum(dk); return a >= 0 && a < 30; });
      var hit30 = last30.filter(function(dk){ return status(dk) === 3; }).length;
      function stat(v,l){ return '<div style="flex:1;text-align:center"><div style="font-family:var(--au-mono);font-size:17px;font-weight:800;color:var(--au-ivory)">' + v + '</div><div style="font-family:var(--au-mono);font-size:7.5px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--au-faint);margin-top:3px">' + l + '</div></div>'; }
      body.innerHTML =
        '<div style="display:flex;gap:3px;overflow-x:auto;padding-bottom:4px">' + cells + '</div>' +
        '<div style="display:flex;gap:12px;align-items:center;margin:9px 0 13px;font-family:var(--au-mono);font-size:8px;color:var(--au-faint)"><span style="display:inline-flex;align-items:center;gap:4px"><span style="width:9px;height:9px;border-radius:2px;background:#34E2B0"></span>hit your ' + need + 'h</span><span style="display:inline-flex;align-items:center;gap:4px"><span style="width:9px;height:9px;border-radius:2px;background:rgba(52,226,176,.45)"></span>close</span><span style="display:inline-flex;align-items:center;gap:4px"><span style="width:9px;height:9px;border-radius:2px;background:rgba(155,140,255,.4)"></span>short</span></div>' +
        '<div style="display:flex;gap:8px;border-top:1px solid rgba(255,255,255,.06);padding-top:12px">' + stat(streak + 'n','streak') + stat(best + 'n','best') + stat(last30.length,'logged / 30') + stat(hit30,'hit / 30') + '</div>';
    }

    /* ── Nova hero: reactive line + page mood ─────── */
    function updateNova(){
      var root = document.getElementById('root'); if (!root) return;
      var dd = new Date(), h = dd.getHours();
      var dEl = document.getElementById('heroDate');
      if (dEl) dEl.textContent = ['SUN','MON','TUE','WED','THU','FRI','SAT'][dd.getDay()] + ' ' + dd.getDate();

      var e = entryFor(today());
      var r = recovery(e);
      var mood, line;
      if (r){
        var v = verdictFor(r.score);
        mood = v.mood;
        if (r.score >= 82)      line = 'Recovery’s at ' + r.score + '. You’re primed — go chase a PR.';
        else if (r.score >= 65) line = 'Recovery’s at ' + r.score + '. Solid — train as planned today.';
        else if (r.score >= 45) line = 'Recovery’s at ' + r.score + '. A bit run-down — keep it moderate.';
        else                    line = 'Recovery’s at ' + r.score + '. You’re depleted — go light or rest today.';
      } else {
        mood = 'alert';
        line = h < 11 ? 'Morning, Alex. How did you sleep?' : 'Log last night to see your recovery.';
      }
      root.classList.remove('au-mood-calm','au-mood-hot','au-mood-alert','au-mood-low');
      root.classList.add('au-mood-' + mood);
      var ns = document.getElementById('novaSays'); if (ns) ns.textContent = line;
    }

    /* ── Boot ─────────────────────────────────────── */
    function renderAll(){
      renderRecovery();
      renderSleep();
      renderCheck();
      renderDay();
      renderTrends();
      renderConsistency();
      renderPatterns();
      updateNova();
    }
    renderAll();

    // Live "X so far" while a sleep is in progress.
    setInterval(function(){ var p = getPending(); var el = document.getElementById('slElapsed'); if (p && el) el.textContent = elapsedStr(Date.now() - p.at) + ' so far'; }, 30000);

    // Refreshed by cloud sync when data arrives from another device
    window._sleepRerender = renderAll;

    document.addEventListener('visibilitychange', function(){ if (!document.hidden) renderAll(); });
    window.addEventListener('storage', renderAll);
    window.addEventListener('focus', renderAll);
  })();
  </script>

  <!-- Cross-device cloud sync -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="sync.js" defer></script>
  <script>
    document.addEventListener('DOMContentLoaded', function(){
      function start(){
        if (typeof initCloudSync !== 'function'){ setTimeout(start, 200); return; }
        initCloudSync({
          appKey: 'sleep',
          syncedKeys: ['sleep:logs', 'sleep:profile'],
          onApplied: function(){ if (window._sleepRerender) window._sleepRerender(); }
        });
      }
      start();
    });
  </script>

  <script src="nova.js" defer></script>
  <script src="nova-coach.js?v=18" defer></script>
</body>
</html>

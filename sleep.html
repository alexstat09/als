<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>Sleep &amp; Recovery · MÉTRON</title>
  <meta name="theme-color" content="#050507">
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="apple-touch-icon.png">
  <link rel="stylesheet" href="aurora.css">
  <script src="water.js"></script>
  <script src="topbar.js" defer></script>
  <script>window.__pmAutoSel='.sl-hero,.sl-sec';</script>
  <script src="page-motion.js" defer></script>
  <style>
    *, *::before, *::after { box-sizing:border-box; margin:0; padding:0; }
    html, body { min-height:100%; }
    body { padding:0 0 calc(86px + env(safe-area-inset-bottom)); }

    /* ── Hero ─────────────────────────────────────── */
    .sl-hero{ max-width:600px; margin:0 auto; padding:24px 18px 8px; display:flex; align-items:flex-start; justify-content:space-between; gap:14px; }
    .sl-hero-eyebrow{ margin-bottom:12px; }
    .sl-hero-line{ font-family:var(--au-serif); font-style:italic; font-weight:400; color:var(--au-ivory); font-size:clamp(24px,6vw,32px); line-height:1.1; letter-spacing:-.01em; max-width:22ch; }
    .sl-hero .nova{ flex-shrink:0; width:74px; height:74px; margin-top:2px; }

    /* ── Page wrap + cards ────────────────────────── */
    .sl-wrap{ padding:14px 18px; display:flex; flex-direction:column; gap:14px; max-width:600px; margin:0 auto; }
    .sl-sec{ position:relative; background:var(--au-glass); border:1px solid var(--au-line); border-radius:18px; overflow:hidden; backdrop-filter:blur(16px); -webkit-backdrop-filter:blur(16px); transition:border-color .25s, box-shadow .25s; }
    .sl-sec::before{ content:''; position:absolute; top:0; left:8%; right:8%; height:1px; background:linear-gradient(90deg,transparent,rgba(var(--sec-rgb),.55),transparent); pointer-events:none; }
    .sl-sec:hover{ border-color:rgba(var(--sec-rgb),.22); box-shadow:0 14px 44px rgba(0,0,0,.45), 0 0 36px rgba(var(--sec-rgb),.06); }
    .sl-sec-hdr{ display:flex; align-items:center; gap:10px; padding:15px 18px 12px; border-bottom:1px solid var(--au-line); }
    .sl-sec-dot{ width:7px; height:7px; border-radius:50%; background:rgb(var(--sec-rgb)); box-shadow:0 0 10px rgba(var(--sec-rgb),.8); flex-shrink:0; }
    .sl-sec-title{ font-family:var(--au-serif); font-style:italic; font-weight:400; font-size:22px; color:var(--au-ivory); flex:1; line-height:1; }
    .sl-sec-note{ font-family:var(--au-mono); font-size:9px; font-weight:700; letter-spacing:.1em; text-transform:uppercase; color:var(--au-faint); white-space:nowrap; transition:color .25s; }
    .sl-sec-note.saved{ color:rgb(var(--sec-rgb)); }
    .sl-sec-body{ padding:16px 18px; }

    /* ── Recovery card ────────────────────────────── */
    .rec-main{ display:flex; align-items:center; gap:18px; }
    .rec-ring-wrap{ position:relative; width:116px; height:116px; flex-shrink:0; }
    .rec-ring-wrap svg{ transform:rotate(-90deg); }
    .rec-ring-inner{ position:absolute; inset:0; display:flex; flex-direction:column; align-items:center; justify-content:center; }
    .rec-score{ font-family:var(--au-serif); font-style:italic; font-size:42px; font-weight:400; color:var(--au-ivory); line-height:1; letter-spacing:-.015em; }
    .rec-score-lbl{ font-family:var(--au-mono); font-size:8px; font-weight:700; letter-spacing:.18em; text-transform:uppercase; color:var(--au-faint); margin-top:5px; }
    .rec-right{ flex:1; min-width:0; }
    .rec-verdict{ font-family:var(--au-serif); font-style:italic; font-size:24px; color:var(--au-ivory); line-height:1.05; }
    .rec-advice{ font-size:12.5px; color:var(--au-dim); line-height:1.45; margin-top:7px; }
    .rec-bars{ margin-top:16px; display:flex; flex-direction:column; gap:9px; }
    .rec-bar-row{ display:flex; align-items:center; gap:10px; }
    .rec-bar-lbl{ font-family:var(--au-mono); font-size:9px; font-weight:700; letter-spacing:.1em; text-transform:uppercase; color:var(--au-faint); width:74px; flex-shrink:0; }
    .rec-bar-track{ flex:1; height:6px; background:rgba(255,255,255,.07); border-radius:3px; overflow:hidden; }
    .rec-bar-fill{ height:100%; border-radius:3px; transition:width .5s ease; }
    .rec-bar-v{ font-family:var(--au-mono); font-size:10px; color:var(--au-dim); width:30px; text-align:right; flex-shrink:0; }
    .rec-empty{ font-family:var(--au-serif); font-style:italic; font-size:16px; color:var(--au-dim); line-height:1.5; text-align:center; padding:8px 4px; }
    .rec-method{ margin-top:14px; padding-top:12px; border-top:1px solid rgba(255,255,255,.06); font-family:var(--au-mono); font-size:9.5px; line-height:1.5; letter-spacing:.02em; color:var(--au-faint); }
    .rec-method b{ color:var(--au-dim); font-weight:700; }

    /* ── Sleep log (times) ────────────────────────── */
    .sl-times{ display:flex; align-items:stretch; gap:10px; margin-bottom:6px; }
    .sl-time-box{ flex:1; background:rgba(255,255,255,.05); border:1px solid rgba(var(--sec-rgb),.28); border-radius:14px; padding:11px 13px; transition:border-color .2s; }
    .sl-time-box:focus-within{ border-color:rgba(var(--sec-rgb),.6); }
    .sl-time-lbl{ font-family:var(--au-mono); font-size:9px; font-weight:700; letter-spacing:.12em; text-transform:uppercase; color:var(--au-faint); margin-bottom:5px; }
    /* NB: do NOT set -webkit-appearance:none here — it breaks the native time
       picker on iOS (the field won't open / value won't stick). */
    .sl-time-in{ width:100%; background:transparent; border:none; outline:none; color:var(--au-ivory); -webkit-text-fill-color:var(--au-ivory); font-family:var(--au-mono); font-size:21px; font-weight:700; letter-spacing:-.01em; min-height:26px; }
    .sl-time-in::-webkit-calendar-picker-indicator{ filter:invert(1); opacity:.45; }
    .sl-dur{ display:flex; flex-direction:column; align-items:center; justify-content:center; min-width:78px; text-align:center; }
    .sl-dur-val{ font-family:var(--au-mono); font-size:23px; font-weight:700; color:rgb(var(--sec-rgb)); line-height:1; }
    .sl-dur-lbl{ font-family:var(--au-mono); font-size:8px; font-weight:700; letter-spacing:.12em; text-transform:uppercase; color:var(--au-faint); margin-top:4px; }

    /* ── Scale pills (quality + check-in) ─────────── */
    .sl-metric{ margin-top:16px; }
    .sl-metric:first-child{ margin-top:0; }
    .sl-metric-top{ display:flex; align-items:baseline; justify-content:space-between; margin-bottom:8px; }
    .sl-metric-name{ font-family:var(--au-mono); font-size:10px; font-weight:700; letter-spacing:.1em; text-transform:uppercase; color:var(--au-dim); }
    .sl-metric-cur{ font-family:var(--au-serif); font-style:italic; font-size:14px; color:rgb(var(--sec-rgb)); }
    .sl-scale{ display:flex; gap:7px; }
    .sl-pill{ flex:1; padding:11px 0; border-radius:12px; border:1px solid var(--au-line); background:rgba(255,255,255,.04); color:var(--au-faint); font-family:var(--au-mono); font-size:15px; font-weight:700; cursor:pointer; transition:all .15s; -webkit-tap-highlight-color:transparent; }
    .sl-pill:active{ transform:scale(.94); }
    .sl-pill.on{ background:rgba(var(--sec-rgb),.18); border-color:rgba(var(--sec-rgb),.6); color:rgb(var(--sec-rgb)); box-shadow:0 0 14px rgba(var(--sec-rgb),.3); }
    .sl-scale-ends{ display:flex; justify-content:space-between; margin-top:6px; font-family:var(--au-mono); font-size:8.5px; letter-spacing:.06em; text-transform:uppercase; color:var(--au-faint); }

    /* ── Latency / awakenings chips + asleep readout ── */
    .sl-chips{ display:flex; gap:7px; }
    .sl-chip{ flex:1; padding:11px 4px; border-radius:12px; border:1px solid var(--au-line); background:rgba(255,255,255,.04); color:var(--au-faint); font-family:var(--au-mono); font-size:11px; font-weight:700; letter-spacing:.02em; cursor:pointer; transition:transform .12s, border-color .2s, background .2s, color .2s; -webkit-tap-highlight-color:transparent; }
    .sl-chip:active{ transform:scale(.94); }
    .sl-chip.on{ background:rgba(var(--sec-rgb),.18); border-color:rgba(var(--sec-rgb),.6); color:rgb(var(--sec-rgb)); box-shadow:0 0 14px rgba(var(--sec-rgb),.3); }
    .sl-asleep{ display:flex; align-items:center; flex-wrap:wrap; gap:7px; margin-top:11px; padding:10px 12px; border-radius:12px; background:rgba(255,255,255,.04); border:1px solid var(--au-line); font-family:var(--au-mono); font-size:10.5px; letter-spacing:.02em; color:var(--au-faint); }
    .sl-asleep b{ color:var(--au-ivory); font-weight:700; }
    .sl-asleep-sep{ opacity:.4; }
    .sl-asleep-hint{ font-family:var(--au-serif); font-style:italic; font-size:13px; letter-spacing:0; color:var(--au-dim); line-height:1.45; display:block; }

    /* ── What her watch measured ──────────────────────────────────
       Stage colour is one HUE FAMILY for depth — deep is the saturated
       violet, light is the same violet thinned out, so "light sleep" reads
       as literally lighter — with a separate vivid for REM and the page's
       existing alert rose for being awake. Deliberately not Garmin's blue and
       magenta: this has to look like it grew here. */
    .sl-watch{ margin-top:12px; padding:13px 14px 11px; border-radius:14px; background:rgba(255,255,255,.035); border:1px solid var(--au-line); }
    .sl-watch-top{ display:flex; align-items:baseline; gap:8px; flex-wrap:wrap; margin-bottom:11px; }
    .sl-watch-win{ font-family:var(--au-mono); font-size:13px; font-weight:700; color:var(--au-ivory); letter-spacing:.02em; }
    .sl-watch-win .sl-watch-arrow{ color:var(--au-faint); margin:0 5px; font-weight:400; }
    .sl-watch-chip{ font-family:var(--au-mono); font-size:8.5px; font-weight:700; letter-spacing:.11em; text-transform:uppercase; color:rgb(var(--sec-rgb)); border:1px solid rgba(var(--sec-rgb),.35); border-radius:999px; padding:3px 8px; white-space:nowrap; }
    .sl-watch-sub{ font-family:var(--au-mono); font-size:9.5px; color:var(--au-faint); letter-spacing:.02em; margin-left:auto; }

    /* The hypnogram. Lanes run awake → deep, the conventional reading order
       for sleep architecture. Segments are placed by real time offset, so the
       gaps and the shape are hers, not decoration. */
    .sl-hyp{ position:relative; height:88px; margin:2px 0 9px; }
    .sl-hyp-lane{ position:absolute; left:40px; right:0; height:1px; background:rgba(255,255,255,.055); }
    .sl-hyp-bars{ position:absolute; left:40px; right:0; top:0; bottom:0; }
    .sl-hyp-seg{ position:absolute; height:13px; border-radius:3px; }
    .sl-hyp-seg.deep{  background:#7A6BE8; }
    .sl-hyp-seg.light{ background:rgba(155,140,255,.42); }
    .sl-hyp-seg.rem{   background:var(--au-emerald); }
    .sl-hyp-seg.awake{ background:var(--au-rose); }
    .sl-hyp-tick{ position:absolute; font-family:var(--au-mono); font-size:8px; font-weight:700; letter-spacing:.1em; text-transform:uppercase; color:var(--au-faint); left:0; }
    .sl-hyp-axis{ display:flex; justify-content:space-between; font-family:var(--au-mono); font-size:9px; color:var(--au-faint); letter-spacing:.04em; padding-left:40px; }

    .sl-stages{ display:flex; gap:7px; margin-top:11px; }
    .sl-stage{ flex:1; padding:8px 4px 7px; border-radius:10px; background:rgba(255,255,255,.035); text-align:center; border-top:2px solid transparent; }
    .sl-stage.deep{  border-top-color:#7A6BE8; }
    .sl-stage.light{ border-top-color:rgba(155,140,255,.55); }
    .sl-stage.rem{   border-top-color:var(--au-emerald); }
    .sl-stage.awake{ border-top-color:var(--au-rose); }
    .sl-stage-v{ font-family:var(--au-mono); font-size:12.5px; font-weight:700; color:var(--au-ivory); line-height:1; }
    .sl-stage-k{ font-family:var(--au-mono); font-size:8px; font-weight:700; letter-spacing:.1em; text-transform:uppercase; color:var(--au-faint); margin-top:5px; }
    .sl-stage-p{ font-family:var(--au-mono); font-size:8.5px; color:var(--au-dim); margin-top:3px; }

    .sl-body{ display:flex; flex-wrap:wrap; gap:6px; margin-top:11px; }
    .sl-body-c{ flex:1 1 76px; padding:8px 6px 7px; border-radius:10px; background:rgba(255,255,255,.03); text-align:center; }
    .sl-body-v{ font-family:var(--au-mono); font-size:12.5px; font-weight:700; color:var(--au-ivory); line-height:1; }
    .sl-body-k{ font-family:var(--au-mono); font-size:7.5px; font-weight:700; letter-spacing:.09em; text-transform:uppercase; color:var(--au-faint); margin-top:5px; line-height:1.3; }

    /* ── Divergence: the night vs the body ────────── */
    .sl-diverge{ display:flex; align-items:flex-start; gap:10px; margin:0 0 16px; padding:12px 14px; border-radius:13px; background:rgba(var(--dv),.09); border:1px solid rgba(var(--dv),.24); font-size:13px; line-height:1.5; color:var(--au-dim); }
    .sl-diverge b{ color:var(--au-ivory); font-weight:700; }
    .sl-diverge-dot{ width:8px; height:8px; border-radius:50%; margin-top:6px; flex-shrink:0; background:rgb(var(--dv)); box-shadow:0 0 9px rgba(var(--dv),.9); }

    /* ── Trends ───────────────────────────────────── */
    .sl-stats{ display:flex; gap:18px; margin-bottom:16px; }
    .sl-stat-val{ font-family:var(--au-mono); font-size:24px; font-weight:700; color:var(--au-ivory); letter-spacing:-.02em; line-height:1; }
    .sl-stat-val small{ font-size:12px; color:var(--au-faint); font-weight:700; }
    .sl-stat-lbl{ font-family:var(--au-mono); font-size:9px; font-weight:700; letter-spacing:.1em; text-transform:uppercase; color:var(--au-faint); margin-top:5px; }
    .sl-spark{ display:flex; align-items:flex-end; gap:4px; height:52px; }
    .sl-spark-col{ flex:1; display:flex; flex-direction:column; align-items:center; gap:4px; height:100%; justify-content:flex-end; }
    .sl-spark-bar{ width:100%; border-radius:4px 4px 0 0; background:rgba(var(--sec-rgb),.28); min-height:3px; transition:height .4s ease; }
    .sl-spark-bar.today{ background:rgb(var(--sec-rgb)); box-shadow:0 0 10px rgba(var(--sec-rgb),.6); }
    .sl-spark-lbl{ font-family:var(--au-mono); font-size:8px; color:var(--au-faint); }
    .sl-spark-cap{ display:flex; justify-content:space-between; font-family:var(--au-mono); font-size:9px; letter-spacing:.05em; color:var(--au-faint); text-transform:uppercase; margin-top:8px; }
    .sl-nights{ display:flex; flex-direction:column; gap:1px; margin-top:14px; }
    .sl-night{ display:flex; align-items:center; gap:10px; padding:9px 0; border-bottom:1px solid rgba(255,255,255,.05); }
    .sl-night:last-child{ border-bottom:none; }
    .sl-night-day{ font-family:var(--au-mono); font-size:11px; color:var(--au-dim); width:52px; flex-shrink:0; }
    .sl-night-hrs{ font-family:var(--au-mono); font-size:13px; font-weight:700; color:var(--au-ivory); }
    .sl-night-q{ font-size:11px; color:var(--au-faint); font-family:var(--au-serif); font-style:italic; flex:1; }
    .sl-night-rec{ font-family:var(--au-mono); font-size:11px; font-weight:700; padding:2px 9px; border-radius:7px; }
    .sl-empty{ font-family:var(--au-serif); font-style:italic; font-size:15px; color:var(--au-dim); text-align:center; padding:10px 0; }

    /* ── Sleep/wake buttons + in-progress hero ────── */
    .sl-acts{ display:flex; gap:9px; margin-bottom:15px; }
    .sl-act{ flex:1; padding:14px 8px; border-radius:14px; border:1px solid var(--au-line); background:rgba(255,255,255,.05); color:var(--au-ivory); font-family:var(--au-sans); font-size:13px; font-weight:700; cursor:pointer; line-height:1.3; text-align:center; transition:transform .12s, border-color .2s, background .2s; -webkit-tap-highlight-color:transparent; }
    .sl-act:active{ transform:scale(.96); }
    .sl-act.prim{ border-color:rgba(var(--sec-rgb),.55); background:rgba(var(--sec-rgb),.16); }
    .sl-act small{ display:block; font-weight:400; font-size:10.5px; opacity:.7; margin-top:2px; }
    .sl-now{ text-align:center; padding:14px 10px 18px; }
    .sl-now-moon{ font-size:34px; line-height:1; filter:drop-shadow(0 0 12px rgba(var(--sec-rgb),.5)); animation:sl-breathe 4s ease-in-out infinite; }
    @keyframes sl-breathe{ 0%,100%{ opacity:.85; transform:scale(1); } 50%{ opacity:1; transform:scale(1.06); } }
    .sl-now-since{ font-family:var(--au-serif); font-style:italic; font-size:22px; color:var(--au-ivory); margin-top:10px; }
    .sl-now-el{ font-family:var(--au-mono); font-size:13px; color:rgb(var(--sec-rgb)); margin-top:4px; letter-spacing:.02em; }
    .sl-now-cancel{ display:inline-block; margin-top:14px; font-family:var(--au-mono); font-size:10px; letter-spacing:.08em; text-transform:uppercase; color:var(--au-faint); background:none; border:none; cursor:pointer; }

    /* ── Bedtime target ───────────────────────────── */
    .sl-target{ display:flex; align-items:center; gap:9px; padding:11px 13px; margin-bottom:14px; border-radius:13px; background:rgba(var(--sec-rgb),.08); border:1px solid rgba(var(--sec-rgb),.2); cursor:pointer; }
    .sl-target-ico{ font-size:17px; }
    .sl-target-txt{ flex:1; font-size:12.5px; color:var(--au-dim); line-height:1.4; }
    .sl-target-txt b{ color:var(--au-ivory); font-weight:700; }
    .sl-target-edit{ font-family:var(--au-mono); font-size:9px; letter-spacing:.08em; text-transform:uppercase; color:rgb(var(--sec-rgb)); }
    .sl-edit-row{ display:flex; gap:10px; align-items:flex-end; padding:12px 0 4px; }
    .sl-edit-box{ flex:1; }
    .sl-edit-box label{ display:block; font-family:var(--au-mono); font-size:9px; font-weight:700; letter-spacing:.1em; text-transform:uppercase; color:var(--au-faint); margin-bottom:5px; }
    .sl-edit-box input, .sl-edit-box select{ width:100%; background:rgba(255,255,255,.05); border:1px solid rgba(var(--sec-rgb),.3); border-radius:11px; padding:9px 11px; color:var(--au-ivory); -webkit-text-fill-color:var(--au-ivory); font-family:var(--au-mono); font-size:15px; font-weight:700; outline:none; }

    /* ── Recovery delta + peak glow ───────────────── */
    .rec-delta{ display:inline-block; font-family:var(--au-mono); font-size:10px; font-weight:700; margin-top:6px; padding:2px 8px; border-radius:7px; }
    .rec-train{ font-size:11.5px; color:var(--au-faint); line-height:1.4; margin-top:8px; font-style:italic; font-family:var(--au-serif); }
    .rec-ring-wrap.peak::after{ content:''; position:absolute; inset:-6px; border-radius:50%; box-shadow:0 0 26px 4px rgba(var(--sec-rgb),.45); animation:sl-peak 2.2s ease-in-out infinite; pointer-events:none; }
    @keyframes sl-peak{ 0%,100%{ opacity:.4; } 50%{ opacity:.9; } }

    /* ── Insights (in Trends) ─────────────────────── */
    .sl-ins{ display:flex; gap:10px; margin-bottom:14px; }
    .sl-ins-card{ flex:1; background:rgba(255,255,255,.04); border:1px solid var(--au-line); border-radius:13px; padding:11px 12px; }
    .sl-ins-v{ font-family:var(--au-mono); font-size:20px; font-weight:700; color:var(--au-ivory); line-height:1; letter-spacing:-.02em; }
    .sl-ins-v small{ font-size:11px; color:var(--au-faint); }
    .sl-ins-l{ font-family:var(--au-mono); font-size:8.5px; font-weight:700; letter-spacing:.09em; text-transform:uppercase; color:var(--au-faint); margin-top:6px; line-height:1.3; }
    .sl-takeaway{ font-family:var(--au-serif); font-style:italic; font-size:14.5px; color:var(--au-ivory); line-height:1.45; padding:12px 14px; margin-bottom:14px; border-radius:13px; background:rgba(var(--sec-rgb),.07); border-left:2px solid rgb(var(--sec-rgb)); }
    .sl-streak{ font-family:var(--au-mono); font-size:9px; }

    /* ── Night tags (Phase B) ─────────────────────── */
    .sl-tags-wrap{ margin-top:18px; padding-top:15px; border-top:1px solid rgba(255,255,255,.06); }
    .sl-tags{ display:flex; flex-wrap:wrap; gap:7px; }
    .sl-tag{ font-family:var(--au-sans); font-size:12px; font-weight:600; color:var(--au-dim); background:rgba(255,255,255,.04); border:1px solid var(--au-line); border-radius:11px; padding:8px 11px; cursor:pointer; transition:transform .12s, border-color .2s, background .2s, color .2s; -webkit-tap-highlight-color:transparent; }
    .sl-tag:active{ transform:scale(.95); }
    .sl-tag.on{ background:rgba(var(--sec-rgb),.18); border-color:rgba(var(--sec-rgb),.55); color:rgb(var(--sec-rgb)); }

    /* ── Patterns / what affects you (Phase B) ────── */
    .pat-today{ font-family:var(--au-serif); font-style:italic; font-size:14.5px; color:var(--au-ivory); line-height:1.45; padding:11px 14px; margin-bottom:14px; border-radius:12px; background:rgba(var(--sec-rgb),.08); border-left:2px solid rgb(var(--sec-rgb)); }
    .pat-list{ display:flex; flex-direction:column; gap:12px; }
    .pat-row{ display:flex; align-items:flex-start; gap:10px; }

    /* ── Tonight: the projection ──────────────────── */
    .tn-head{ display:flex; align-items:center; gap:15px; padding:13px 15px; border-radius:14px; background:rgba(var(--tn),.08); border:1px solid rgba(var(--tn),.22); }

    .tn-line{ font-size:13px; color:var(--au-dim); line-height:1.5; }

    .tn-opts{ display:flex; gap:7px; margin-top:14px; }

    .tn-opt:active{ transform:scale(.95); }
    .tn-opt.on{ background:rgba(var(--tn),.16); border-color:rgba(var(--tn),.55); }
    .tn-opt-t{ font-family:var(--au-mono); font-size:11.5px; font-weight:700; color:var(--au-dim); }
    .tn-opt.on .tn-opt-t{ color:var(--au-ivory); }
    .tn-opt-s{ font-family:var(--au-mono); font-size:13px; font-weight:700; color:rgb(var(--tn)); }
    .tn-cuts{ display:flex; gap:9px; margin-top:12px; }
    .tn-cut{ flex:1; display:flex; align-items:center; gap:9px; padding:10px 12px; border-radius:12px; background:rgba(255,255,255,.04); border:1px solid var(--au-line); }

    .tn-cut-v{ font-family:var(--au-mono); font-size:14px; font-weight:700; color:var(--au-ivory); margin-top:3px; }

    /* ── Every night: the history browser ─────────── */
    .hs-month{ display:flex; align-items:baseline; justify-content:space-between; gap:8px; margin:16px 0 6px; padding-bottom:6px; border-bottom:1px solid rgba(255,255,255,.07); font-family:var(--au-mono); font-size:9.5px; font-weight:700; letter-spacing:.12em; text-transform:uppercase; color:var(--au-dim); }

    .hs-item{ border-bottom:1px solid rgba(255,255,255,.05); }
    .hs-item:last-child{ border-bottom:none; }
    .hs-row{ display:flex; align-items:center; gap:10px; width:100%; padding:11px 2px; background:none; border:none; cursor:pointer; text-align:left; -webkit-tap-highlight-color:transparent; }

    .hs-bar-fill{ display:block; height:100%; border-radius:2px; }

    .hs-more:active{ transform:scale(.98); }

    /* ── Your day: circadian energy schedule (Phase C) ─── */
    .day-list{ display:flex; flex-direction:column; gap:2px; }
    .day-row{ display:flex; align-items:flex-start; gap:12px; padding:9px 0; border-bottom:1px solid rgba(255,255,255,.05); }
    .day-row:last-child{ border-bottom:none; }

  </style>
</head>

    <!-- Every night you've ever logged -->
    <section class="sl-sec" id="histSec" style="--sec-rgb:155,140,255">
      <div class="sl-sec-hdr"><span class="sl-sec-dot"></span><span class="sl-sec-title">Every night</span><span class="sl-sec-note" id="histNote">YOUR HISTORY</span></div>
      <div class="sl-sec-body" id="histBody"></div>

  </div>

  <script>
  (function () {
    'use strict';
    var KEY = 'sleep:logs';

    /* ── Helpers ──────────────────────────────────── */
    function pad(n){ return String(n).padStart(2,'0'); }
    function dateKey(d){ return d.getFullYear()+'-'+pad(d.getMonth()+1)+'-'+pad(d.getDate()); }
    function today(){ return dateKey(new Date()); }
    function ls(k){ try{ return JSON.parse(localStorage.getItem(k)); }catch(e){ return null; } }
    function lsSave(k,v){ try{ localStorage.setItem(k, JSON.stringify(v)); }catch(e){} }
    function esc(s){ return String(s==null?'':s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
    function clamp(v,a,b){ return Math.max(a, Math.min(b, v)); }

    function getLogs(){ var a = ls(KEY); return Array.isArray(a) ? a : []; }
    function entryFor(dk){
      var logs = getLogs();
      for (var i=0;i<logs.length;i++){ if (logs[i] && logs[i].dateKey === dk) return logs[i]; }
      return null;
    }
    function todayEntry(){ return entryFor(today()) || { id:'sl-'+today(), dateKey:today() }; }

    /* hours between bed (HH:MM) and wake (HH:MM), wrapping past midnight */
    function calcHours(bed, wake){
      if (!bed || !wake) return null;
      var b = bed.split(':'), w = wake.split(':');
      var bm = (+b[0])*60 + (+b[1]), wm = (+w[0])*60 + (+w[1]);
      var diff = wm - bm; if (diff <= 0) diff += 1440;
      return Math.round(diff / 60 * 100) / 100;
    }
    function fmtHM(hours){
      if (hours == null) return '—';
      var h = Math.floor(hours), m = Math.round((hours - h) * 60);
      if (m === 60){ h += 1; m = 0; }
      return h + 'h' + (m ? ' ' + m + 'm' : '');
    }

    /* ══════════ THE SLEEP SCORE — measured inputs only ══════════
       This number scores the NIGHT, not the man. Nothing you feel goes in:
       energy / mood / stress / soreness are the OUTCOME of sleep, and putting
       them inside the score made it circular (feel bad → score bad → "your
       sleep was bad"). Four measured components, weights renormalized over
       whatever exists, so old nights still score on what they have:

         Duration  .45  — time ASLEEP against your floor→ideal band
         Efficiency .25 — asleep ÷ time in bed (latency + awakenings)
         Timing    .18  — SD of your sleep midpoint (regularity)
         Debt      .12  — rolling 14-night sleep debt

       Every historical night is scored using ONLY nights up to and including
       itself (uptoDK) — no leaking the future into the past. */

    // Duration vs personal need — curvilinear in BOTH directions.
    // Short sleep hurts fast. Oversleep hurts too: the old curve floored at 82,
    // which is how a 12-hour night used to score in the 80s. It shouldn't —
    // routinely sleeping hours past your need is a signal, not an achievement.
    // Duration is scored against a BAND, not a point:
    //   at/above ideal → 100 (with a full extra hour of grace before any taper,
    //                    so a 9h ideal still gives a 10h lie-in full marks)
    //   floor → ideal  → 80 rising to 100
    //   below floor    → falls 16 points per hour short
    // 80 at the floor is deliberate: clearing the floor is a genuinely good
    // night, not a pass mark, but it should still read below a perfect one.
    var DUR_AT_FLOOR = 80, DUR_PER_H_SHORT = 16, DUR_OVER_GRACE = 1;
    function durScore(hours, floor, ideal){
      if (!(hours > 0)) return null;
      if (hours >= ideal){
        var over = Math.max(0, hours - (ideal + DUR_OVER_GRACE));
        return clamp(100 - Math.pow(over, 1.4) * 8, 55, 100);
      }
      if (hours >= floor){
        var span = Math.max(0.5, ideal - floor);
        return clamp(DUR_AT_FLOOR + ((hours - floor) / span) * (100 - DUR_AT_FLOOR), DUR_AT_FLOOR, 100);
      }
      return clamp(DUR_AT_FLOOR - (floor - hours) * DUR_PER_H_SHORT, 0, DUR_AT_FLOOR);
    }
    // sleep efficiency → score. Anchors from sleep medicine: <60% is severe
    // insomnia territory, 85% is the clinical "good sleep" line, 95%+ is ideal.
    var EFF_ANCHORS = [[0.60,0],[0.75,50],[0.85,80],[0.92,95],[0.97,100]];
    function effScore(eff){
      if (eff == null) return null;
      if (eff <= EFF_ANCHORS[0][0]) return 0;
      for (var i=1;i<EFF_ANCHORS.length;i++){
        var p = EFF_ANCHORS[i-1], q = EFF_ANCHORS[i];
        if (eff <= q[0]) return clamp(p[1] + (eff - p[0]) / (q[0] - p[0]) * (q[1] - p[1]), 0, 100);
      }
      return 100;
    }
    // Time in bed (what bed→wake actually measures).
    //
    // THE WATCH DOES NOT KNOW THIS, and it is worth being blunt about why.
    // Garmin reports the sleep it DETECTED, not the time she spent in bed:
    // on her 2026-07-22 night sleepEnd − sleepStart was 24420s and sleepTime
    // was also 24420s — the same number, with awake at 0. Treat that window as
    // "in bed" and efficiency comes out 100% every night by construction, which
    // is exactly the flattery this page was rebuilt in July to stop telling.
    //
    // So the START of time-in-bed can only ever be what SHE tells us. The END
    // is fair game — the watch genuinely does know when she woke.
    function inBedHours(e){
      if (!e) return null;
      var wake = e.wake || e.wakeMeasured;
      if (e.bed && wake) return calcHours(e.bed, wake);
      return (e.hours > 0) ? e.hours : null;      // MCP-written nights have hours only
    }
    // Time ASLEEP = in bed − time to fall asleep − time awake in the night.
    // Each awakening costs ~10 min back to sleep.
    //
    // …unless a watch MEASURED it. Chrissie's Garmin reports time actually asleep
    // (via intervals.icu → the courier → sleep:inbox), which beats this arithmetic
    // outright: bed→wake is time IN BED and flatters you by the hour you lay awake.
    // A measurement always wins over an estimate — that is the whole premise of
    // this page.
    //
    // Gated on the DATA, never on who is looking. Alex has no watch, so no entry
    // of his carries asleepMeasured and this branch is dead code on his dashboard:
    // every one of his nights falls through to the arithmetic below, unchanged.
    // (Also means it just works if he ever straps one on — and nothing is
    // hardcoded to a person.)
    function asleepHours(e){
      if (e && e.asleepMeasured > 0) return e.asleepMeasured;
      var tib = inBedHours(e); if (!(tib > 0)) return null;
      var loss = ((e.latency > 0 ? e.latency : 0) + (e.wakes > 0 ? e.wakes * 10 : 0)) / 60;
      return Math.max(0.5, Math.round((tib - loss) * 100) / 100);
    }
    // Minutes from lights-out to actual sleep onset — MEASURED, whenever she has
    // said when she got into bed and the watch has said when sleep began.
    //
    // This is the one number the pairing produces that neither side owns alone:
    // she cannot time her own falling-asleep, and the watch cannot see her get
    // into bed. It is also why her typed bedtime still matters now that a watch
    // reports the night — it is no longer a worse copy of what Garmin knows,
    // it is the missing half.
    function latencyOf(e){
      if (!e) return null;
      if (e.bed && e.bedMeasured){
        var m = Math.round(calcHours(e.bed, e.bedMeasured) * 60);
        // Over 3h is not latency — it is a bedtime typed against the wrong
        // night, or a nap the watch opened a window for. Refuse to publish
        // nonsense as a measurement.
        if (m >= 0 && m <= 180) return m;
      }
      return (e.latency != null) ? e.latency : null;
    }
    // Only claim an efficiency when the gap between lying down and being asleep
    // is actually visible — either she told us (latency / awakenings), or the
    // watch measured sleep onset against a bedtime she gave us.
    function efficiencyOf(e){
      if (!e) return null;
      var measured = !!(e.bed && e.bedMeasured && e.asleepMeasured > 0);
      if (!measured && e.latency == null && e.wakes == null) return null;
      var tib = inBedHours(e), a = asleepHours(e);
      if (!(tib > 0) || a == null) return null;
      return clamp(a / tib, 0, 1);
    }
    // Sleep midpoint. Prefers the watch — measured onset/offset is a truer
    // midpoint than a typed bedtime, because it is when she was actually
    // ASLEEP rather than when she put the book down.
    function midMin(e){
      if (!e) return null;
      var bS = e.bedMeasured || e.bed, wS = e.wakeMeasured || e.wake;
      if (!bS || !wS) return null;
      var b=bS.split(':'), w=wS.split(':');
      var bm=(+b[0])*60+(+b[1]), wm=(+w[0])*60+(+w[1]); if (wm<=bm) wm+=1440;
      return ((bm+wm)/2)%1440;
    }
    // timing regularity: SD of sleep midpoint over the 14 nights up to uptoDK
    function regularityScore(uptoDK){
      var mids = getLogs().filter(function(e){ return e && e.dateKey && (e.bedMeasured || e.bed) && (e.wakeMeasured || e.wake) && (!uptoDK || e.dateKey <= uptoDK); })
        .sort(function(a,b){ return a.dateKey < b.dateKey ? 1 : -1; }).slice(0,14)
        .map(midMin).filter(function(v){ return v != null; })
        .map(function(m){ return m < 720 ? m+1440 : m; });   // early-AM midpoints → post-midnight space
      if (mids.length < 4) return null;
      var mean = mids.reduce(function(a,b){ return a+b; },0)/mids.length;
      var sd = Math.sqrt(mids.reduce(function(a,b){ return a+(b-mean)*(b-mean); },0)/mids.length);
      return { score: clamp(100 - Math.max(0, sd-25)*0.8, 20, 100), sd: Math.round(sd) };
    }
    // Rolling sleep debt over the 14 logged nights up to uptoDK.
    // Debt accrues ONLY on nights under the floor — clearing the floor is never
    // a deficit, however far short of the ideal it lands. Run as a balance from
    // oldest to newest: short nights add (max 2h each), long nights pay back
    // (max 1h each, since recovery sleep is real but cannot be fully banked),
    // and the balance never drops below zero — surplus is not carried.
    function debtInfo(floor, uptoDK){
      var nights = getLogs().filter(function(e){ return e && e.dateKey && inBedHours(e) > 0 && (!uptoDK || e.dateKey <= uptoDK); })
        .sort(function(a,b){ return a.dateKey < b.dateKey ? 1 : -1; }).slice(0,14);
      if (nights.length < 3) return null;
      var debt = 0;
      nights.slice().reverse().forEach(function(e){
        var a = asleepHours(e); if (a == null) a = e.hours;
        debt = debtApply(debt, a, floor);
      });
      return { debt: debt, score: debtScoreOf(debt), nights: nights.length };
    }
    // One night's effect on the running balance. Shared by the real engine and
    // the Tonight projector so the two can never disagree about what a night costs.
    function debtApply(bal, asleep, floor){
      if (!(asleep > 0)) return bal;
      if (asleep < floor) bal += Math.min(2, floor - asleep);
      else bal -= Math.min(1, asleep - floor);
      return bal < 0 ? 0 : bal;
    }
    function debtScoreOf(debt){ return clamp(100 - Math.max(0, debt - 1) * 7, 25, 100); }

    var W_DUR = 0.45, W_EFF = 0.25, W_TIM = 0.18, W_DEBT = 0.12;

    // The engine. Kept under the name `recovery()` because the rest of the app
    // (coach, arc, insights, weekly, Nova, MCP) reads e.recovery — that field
    // now carries the honest, measured sleep score.
    function recovery(e){
      if (!e) return null;
      var pr = getProfile(), floor = pr.floor, ideal = pr.ideal, dk = e.dateKey;
      var tib = inBedHours(e);
      var asleep = asleepHours(e), eff = efficiencyOf(e);
      // No measured night → no score. "Measured" now means either she told us when
      // she went to bed, OR a watch measured the sleep itself. Requiring bed/wake
      // even when Garmin has already reported the duration would throw away the
      // better number and leave her with no score at all.
      // Alex is unaffected: with no asleepMeasured this is the original
      // `if (!(tib > 0)) return null;` exactly.
      if (!(tib > 0) && !(asleep > 0)) return null;
      var reg = regularityScore(dk), dbt = debtInfo(floor, dk);
      var C = [
        ['Duration',   durScore(asleep, floor, ideal), W_DUR],
        ['Efficiency', effScore(eff),               W_EFF],
        ['Timing',     reg ? reg.score : null,      W_TIM],
        ['Debt',       dbt ? dbt.score : null,      W_DEBT]
      ];
      var sum = 0, wsum = 0, parts = [];
      C.forEach(function(x){ if (x[1] != null){ sum += x[1]*x[2]; wsum += x[2]; parts.push({ label:x[0], score:Math.round(x[1]) }); } });
      if (!wsum) return null;
      return {
        score: Math.round(sum/wsum), parts: parts, n: parts.length,
        reg: reg, dbt: dbt, floor: floor, ideal: ideal,
        inBed: tib, asleep: asleep, eff: eff,
        hasEff: eff != null
      };
    }
    // Verdicts describe the SLEEP, not the body.
    function verdictFor(score){
      if (score >= 85) return { mood:'hot',   rgb:'52,226,176',  word:'Excellent', advice:'A long, unbroken night at a steady hour. This is what your best sleep looks like.' };
      if (score >= 70) return { mood:'calm',  rgb:'24,200,192',  word:'Solid',     advice:'A good night — enough sleep, taken at roughly the right time.' };
      if (score >= 55) return { mood:'low',   rgb:'242,192,99',  word:'Patchy',    advice:'Short or broken. One night won’t hurt you — two in a row will.' };
      return                  { mood:'alert', rgb:'255,107,139', word:'Poor',      advice:'Not enough real sleep. Protect tonight: earlier bed, same wake time.' };
    }

    /* ── Save a field on today’s entry ───────────── */
    function flashNote(id){
      var n = document.getElementById(id); if (!n) return;
      var was = n.textContent; n.textContent = 'SAVED ✓'; n.classList.add('saved');
      clearTimeout(n._t); n._t = setTimeout(function(){ n.textContent = was; n.classList.remove('saved'); }, 1100);
    }
    // Recompute the derived fields on an entry from its RAW inputs. Never
    // touches bed / wake / latency / wakes / feelings. Never invents `hours`
    // for an entry that only has hours (MCP-written nights have no bed/wake).
    function recomputeDerived(e){
      if (e.bed && e.wake) e.hours = calcHours(e.bed, e.wake);
      var a = asleepHours(e), eff = efficiencyOf(e), r = recovery(e);
      e.asleep = a;
      e.efficiency = (eff != null) ? Math.round(eff * 1000) / 1000 : null;
      e.sleepScore = r ? r.score : null;
      e.recovery = e.sleepScore;      // compat: the whole app reads e.recovery
      return e;
    }
    // Scores are DERIVED but also PERSISTED (e.recovery is read by coach, arc,
    // insights, weekly, Nova and MCP), so changing the floor/ideal has to rewrite
    // history or the rest of the app keeps serving numbers from the old model.
    // Raw inputs are never touched — only the derived fields are recomputed.
    function rescoreAll(){
      var logs = getLogs(); if (!logs.length) return 0;
      var n = 0;
      logs.forEach(function(e){ if (e && e.dateKey){ recomputeDerived(e); n++; } });
      lsSave(KEY, logs);
      return n;
    }
    // One-time migration off the single-`need` model. Versioned so it runs once
    // per device and never fights a later manual change to the floor/ideal.
    var SLEEP_MODEL_V = 'sleep:modelv';
    function migrateSleepModel(){
      try {
        if (ls(SLEEP_MODEL_V) === 2) return;
        var p = ls(PROF) || {};
        if (typeof p.floor !== 'number' || typeof p.ideal !== 'number'){
          var pr = getProfile();               // applies the legacy need → ideal rule
          p.floor = pr.floor; p.ideal = pr.ideal; delete p.need;
          saveProfile(p);
        }
        rescoreAll();
        lsSave(SLEEP_MODEL_V, 2);
      } catch (e) {}
    }
    function setField(field, value, noteId){
      var dk = today();
      var logs = getLogs();
      var idx = -1;
      for (var i=0;i<logs.length;i++){ if (logs[i] && logs[i].dateKey === dk){ idx = i; break; } }
      var e = idx >= 0 ? logs[idx] : { id:'sl-'+dk, dateKey:dk };
      e[field] = value;
      if (idx >= 0) logs[idx] = e; else logs.push(e);
      lsSave(KEY, logs);              // in the array first, so recompute sees tonight
      recomputeDerived(e);
      e.ts = Date.now();
      lsSave(KEY, logs);
      if (noteId) flashNote(noteId);
      // Editing a time input? Refresh only the derived UI — rebuilding
      // #sleepBody here would destroy the <input type=time> mid-pick (on iOS
      // that drops the value / closes the wheel, so the time won't stick).
      if (field === 'bed' || field === 'wake') refreshDerived();
      else renderAll();
    }

    // Update everything that depends on the entry WITHOUT touching the bed/wake
    // inputs (so an in-progress time pick isn't interrupted).
    function refreshDerived(){
      var e = todayEntry();
      var durEl = document.querySelector('#sleepBody .sl-dur-val');
      if (durEl) durEl.textContent = fmtHM(asleepHours(e));
      renderRecovery();
      renderTonight();
      renderDay();
      renderTrends();
      renderConsistency();
      renderPatterns();
      renderConsequences();
      renderHistory();
      updateNova();
      try{ if(window.PageMotion){ PageMotion.scan(window.__slTagged?null:'.sl-hero,.sl-sec'); window.__slTagged=1; } }catch(e){}
    }

    /* ── One-tap sleep / wake buttons. Pending bedtime is kept LOCAL (not synced)
       since it's transient; the finished entry is filed under the wake day via
       setField (calcHours wraps past midnight), so a 23:30→07:00 night lands on
       the morning's date automatically. ── */
    var PEND = 'sleep:pending';
    function hm(ts){ var d = new Date(ts); return pad(d.getHours()) + ':' + pad(d.getMinutes()); }
    function getPending(){ var p = ls(PEND); return (p && typeof p.at === 'number') ? p : null; }
    function goSleep(){ lsSave(PEND, { at: Date.now() }); flashNote('sleepNote'); renderAll(); }
    function cancelSleep(){ try{ localStorage.removeItem(PEND); }catch(e){} renderAll(); }
    function wokeUp(){
      var now = Date.now(), p = getPending();
      if (p){
        var dur = (now - p.at) / 3600000;
        try{ localStorage.removeItem(PEND); }catch(e){}
        if (dur >= 0.33 && dur <= 16){            // a real night → pair bedtime + wake
          setField('bed', hm(p.at), null);
          setField('wake', hm(now), 'sleepNote');
          renderAll();
          return;
        }
      }
      setField('wake', hm(now), 'sleepNote');      // no usable bedtime → log wake, set bedtime manually
      renderAll();
    }

    /* ── Profile, bedtime target, insights, haptics ── */
    // Sleep need is a RANGE, not a point.
    //   floor — the line below which sleep DEBT accrues.
    //   ideal — what a perfect night looks like.
    // Missing the ideal costs you score, never debt. The old single `need` was a
    // PEAK: durScore penalised both sides of it and debt was measured against it,
    // so a 9h "need" charged ~2h of debt on every ordinary night and punished a
    // 10h lie-in. Splitting the two is what makes the debt number honest.
    var PROF = 'sleep:profile', editingTarget = false;
    function getProfile(){
      var p = ls(PROF) || {};
      var floor = (typeof p.floor === 'number') ? p.floor : null;
      var ideal = (typeof p.ideal === 'number') ? p.ideal : null;
      // Legacy `need` was a peak target, so it migrates to IDEAL — never to the
      // floor. Migrating it to the floor would keep the exact bug we're fixing.
      if (ideal == null && typeof p.need === 'number') ideal = p.need;
      if (floor == null) floor = 8;
      if (ideal == null) ideal = 9;
      if (ideal < floor + 0.5) ideal = floor + 0.5;
      return { wakeTime: p.wakeTime || '07:00', floor: floor, ideal: ideal };
    }
    function saveProfile(p){ lsSave(PROF, p); }
    // Bed target aims at the IDEAL — the point is to give yourself the good night.
    function targetBed(){ var pr = getProfile(); var w = pr.wakeTime.split(':'); var wm = (+w[0]) * 60 + (+w[1]); var bm = (((wm - Math.round(pr.ideal * 60)) % 1440) + 1440) % 1440; return pad(Math.floor(bm / 60)) + ':' + pad(bm % 60); }
    function buzz(ms){ try{ if (navigator.vibrate) navigator.vibrate(ms || 12); }catch(e){} }
    function daysBetween(a, b){ var pa = a.split('-').map(Number), pb = b.split('-').map(Number); return Math.round((Date.UTC(pa[0],pa[1]-1,pa[2]) - Date.UTC(pb[0],pb[1]-1,pb[2])) / 86400000); }
    function elapsedStr(ms){ var m = Math.max(0, Math.round(ms / 60000)); var h = Math.floor(m / 60); return (h ? h + 'h ' : '') + (m % 60) + 'm'; }
    function daysSinceTrained(){ var w = ls('po_workouts'); if (!Array.isArray(w)) return null; var ds = w.filter(function(x){ return x && x.date; }).map(function(x){ return x.date; }).sort(); return ds.length ? daysBetween(today(), ds[ds.length - 1]) : null; }
    function recoveryOf(dk){ var r = recovery(entryFor(dk)); return r ? r.score : null; }
    function sleepInsights(){
      var logs = getLogs().filter(function(e){ return e && e.dateKey; }).sort(function(a,b){ return a.dateKey < b.dateKey ? -1 : 1; });
      var pr0 = getProfile();
      // 14-night rolling debt (Rise-style), consistent with the recovery engine
      var dbt = debtInfo(pr0.floor, today());
      var debt = dbt ? dbt.debt : 0, weekNights = dbt ? dbt.nights : 0;
      var beds = logs.slice(-10).filter(function(e){ return e.bed; }).map(function(e){ var p = e.bed.split(':'); var mm = (+p[0]) * 60 + (+p[1]); if (mm < 720) mm += 1440; return mm; });
      var consistency = null, spread = null;
      if (beds.length >= 3){
        var mean = beds.reduce(function(a,b){ return a + b; }, 0) / beds.length;
        var std = Math.sqrt(beds.reduce(function(a,b){ return a + (b - mean) * (b - mean); }, 0) / beds.length);
        spread = Math.round(std);
        consistency = Math.round(clamp(100 - Math.max(0, std - 15) * 0.8, 0, 100));
      }
      var have = {}; logs.forEach(function(e){ if (inBedHours(e) > 0) have[e.dateKey] = 1; });
      var streak = 0, cur = new Date();
      if (!have[dateKey(cur)]) cur = new Date(Date.now() - 86400000);
      while (have[dateKey(cur)]){ streak++; cur = new Date(cur.getTime() - 86400000); }
      var recent = logs.slice(-14).filter(function(e){ return inBedHours(e) > 0; }), best = null;
      recent.forEach(function(e){ var sc = recScoreOf(e); var k = sc != null ? sc : (asleepHours(e) || 0); if (!best || k > best.key) best = { e: e, key: k, sc: sc }; });
      return { debt: debt, weekNights: weekNights, consistency: consistency, spread: spread, streak: streak, best: best, floor: pr0.floor, ideal: pr0.ideal };
    }

    /* ══════════ RECOVERY CARD ══════════ */
    function barColor(s){ return s >= 70 ? '#34E2B0' : s >= 45 ? '#F2C063' : '#FF6B8B'; }
    function renderRecovery(){
      var e = entryFor(today());
      var r = recovery(e);
      var sec = document.getElementById('recSec');
      var body = document.getElementById('recBody');

      if (!r){
        sec.style.setProperty('--sec-rgb', '155,140,255');
        body.innerHTML = '<p class="rec-empty">Log when you went to bed and when you woke — that’s all it takes. Your sleep score is measured, never guessed from how you feel.</p>';
        return;
      }

      var v = verdictFor(r.score);
      sec.style.setProperty('--sec-rgb', v.rgb);

      var R = 50, C = 2 * Math.PI * R;
      var off = C - (r.score / 100) * C;

      var bars = r.parts.map(function(p){
        return '<div class="rec-bar-row"><span class="rec-bar-lbl">' + p.label + '</span>' +
          '<div class="rec-bar-track"><div class="rec-bar-fill" style="width:' + p.score + '%;background:' + barColor(p.score) + '"></div></div>' +
          '<span class="rec-bar-v">' + p.score + '</span></div>';
      }).join('');

      var yScore = recoveryOf(dateKey(new Date(Date.now() - 86400000)));
      var delta = (yScore != null) ? r.score - yScore : null, deltaHtml = '';
      if (delta != null && delta !== 0){ var up = delta > 0, dc = up ? '52,226,176' : '255,107,139'; deltaHtml = '<span class="rec-delta" style="color:rgb(' + dc + ');background:rgba(' + dc + ',.14)">' + (up ? '▲ ' : '▼ ') + Math.abs(delta) + ' vs yesterday</span>'; }
      else if (delta === 0){ deltaHtml = '<span class="rec-delta" style="color:var(--au-faint);background:rgba(255,255,255,.06)">even with yesterday</span>'; }

      // What the night actually was, in plain numbers.
      var factsBits = [];
      if (r.asleep != null) factsBits.push('<b>' + fmtHM(r.asleep) + '</b> asleep');
      if (r.eff != null) factsBits.push('<b>' + Math.round(r.eff*100) + '%</b> efficiency');
      else if (r.inBed > 0) factsBits.push('<b>' + fmtHM(r.inBed) + '</b> in bed');
      var trainHtml = factsBits.length ? factsBits.join(' · ') : '';

      // Transparency: what the number is built from — and what it isn't.
      var mReg = r.reg ? ('±' + r.reg.sd + 'm timing' ) : null;
      // Debt can no longer go negative, so there is no "surplus" branch: the
      // balance is either carrying something or it is clear.
      var mDebt = (r.dbt && r.dbt.debt > 0.5) ? ('−' + (Math.round(r.dbt.debt*10)/10) + 'h debt') : null;
      var mBits = [mReg, mDebt].filter(Boolean).join(' · ');
      var mMissing = r.hasEff ? '' : ' <span style="opacity:.8">(add tonight’s fall-asleep time &amp; awakenings to unlock efficiency)</span>';
      // The number must show its own assumption. A debt figure with no visible
      // floor is exactly how a 9h "need" quietly charged debt on decent nights.
      var methodHtml = '<div class="rec-method"><b>Measured sleep only</b> — time asleep against your <b>' + r.floor + 'h floor</b> and <b>' + r.ideal + 'h ideal</b>, plus efficiency, timing &amp; debt. Debt only builds below the floor. How you feel is never an input; it’s the outcome, below' + (mBits ? ' <span style="opacity:.8">(' + mBits + ')</span>' : '') + '.' + mMissing + '</div>';

      body.innerHTML =
        '<div class="rec-main">' +
          '<div class="rec-ring-wrap' + (r.score >= 85 ? ' peak' : '') + '">' +
            '<svg width="116" height="116" viewBox="0 0 116 116">' +
              '<circle cx="58" cy="58" r="' + R + '" fill="none" stroke="rgba(255,255,255,0.07)" stroke-width="9"/>' +
              '<circle class="am-ring" cx="58" cy="58" r="' + R + '" fill="none" stroke="rgb(' + v.rgb + ')" stroke-width="9" stroke-linecap="round" stroke-dasharray="' + C.toFixed(2) + '" stroke-dashoffset="' + off.toFixed(2) + '" style="filter:drop-shadow(0 0 8px rgba(' + v.rgb + ',.6))"/>' +
            '</svg>' +
            '<div class="rec-ring-inner"><div class="rec-score" data-to="' + r.score + '">' + r.score + '</div><div class="rec-score-lbl">Sleep score</div></div>' +
          '</div>' +
          '<div class="rec-right"><div class="rec-verdict">' + v.word + '.</div>' + deltaHtml + '<div class="rec-advice">' + v.advice + '</div>' + (trainHtml ? '<div class="rec-train">' + trainHtml + '</div>' : '') + '</div>' +
        '</div>' +
        '<div class="rec-bars">' + bars + '</div>' + methodHtml;
      if (window.AuroraMotion) { var _rc = body.querySelector('.am-ring'); if (_rc) AuroraMotion.ring(_rc, (r.score || 0) / 100, 'sleep-rec'); }
    }

    /* ══════════ SLEEP LOG CARD ══════════ */
    // Stored value = the midpoint of the bucket, in minutes.
    /* ── The night her watch measured ──────────────────────────────────────
       Three states, and they must LOOK different. Rendering "nothing measured"
       and "measured, but this wire only carries a duration" the same way is
       the silent-empty failure this project keeps re-learning: she would read
       a blank where the honest answer is "your watch knows, the pipe doesn't
       carry it".

       Nothing here feeds the score. Garmin's own verdict is shown once, at the
       bottom, labelled as theirs — the score above it stays ours.            */
    function fmtMins(m){
      if (!(m > 0)) return '0m';
      var h = Math.floor(m / 60), r = Math.round(m % 60);
      return (h ? h + 'h' + (r ? ' ' + r + 'm' : '') : r + 'm');
    }
    var STAGE_ORDER = ['awake','rem','light','deep'];      // hypnogram lanes, top → bottom
    var STAGE_TOP = { awake: 4, rem: 24, light: 44, deep: 64 };
    var STAGE_NAME = { deep:'Deep', light:'Light', rem:'REM', awake:'Awake' };

    function watchHtml(e){
      if (!e || !(e.asleepMeasured > 0)) return '';         // nothing measured — say nothing

      // State 2: a duration arrived, but no window. That is the intervals.icu
      // leg, which carries four numbers and no timeline. Name the limit rather
      // than leave a hole where the times should be.
      if (!e.bedMeasured || !e.wakeMeasured){
        return '<div class="sl-watch"><div class="sl-watch-top">' +
          '<span class="sl-watch-win">' + fmtHM(e.asleepMeasured) + ' asleep</span>' +
          '<span class="sl-watch-chip">Measured</span></div>' +
          '<div class="sl-asleep-hint" style="margin:0">Your watch measured how long you slept, but not when — that arrived over the sync that carries duration only. Add your bedtime above and the rest of the night still works.</div></div>';
      }

      // State 3: the full night.
      var hy = Array.isArray(e.hypno) ? e.hypno : [];
      var span = 0;
      hy.forEach(function(s){ if (s && s.length >= 3) span = Math.max(span, s[0] + s[1]); });
      if (!(span > 0)) span = Math.round(e.asleepMeasured * 60);

      var lanes = '', bars = '';
      STAGE_ORDER.forEach(function(k){
        lanes += '<div class="sl-hyp-lane" style="top:' + (STAGE_TOP[k] + 6) + 'px"></div>' +
                 '<div class="sl-hyp-tick" style="top:' + (STAGE_TOP[k] + 2) + 'px">' + STAGE_NAME[k] + '</div>';
      });
      hy.forEach(function(s){
        if (!s || s.length < 3 || STAGE_TOP[s[2]] == null) return;
        // A 3-minute stage on a 7-hour night is a sliver; floor the width so it
        // stays visible instead of vanishing into a rounding error.
        var w = Math.max(0.7, (s[1] / span) * 100);
        bars += '<div class="sl-hyp-seg ' + s[2] + '" style="left:' + ((s[0] / span) * 100).toFixed(2) +
          '%;width:' + w.toFixed(2) + '%;top:' + STAGE_TOP[s[2]] + 'px"></div>';
      });
      var hyp = hy.length
        ? '<div class="sl-hyp">' + lanes + '<div class="sl-hyp-bars">' + bars + '</div></div>' +
          '<div class="sl-hyp-axis"><span>' + esc(e.bedMeasured) + '</span><span>' + esc(e.wakeMeasured) + '</span></div>'
        : '';

      var st = e.stages || {}, total = (st.deep || 0) + (st.light || 0) + (st.rem || 0);
      var stages = '<div class="sl-stages">' + ['deep','light','rem','awake'].map(function(k){
        var v = st[k] || 0;
        var pct = (total > 0 && k !== 'awake') ? Math.round(v / total * 100) + '%' : '';
        return '<div class="sl-stage ' + k + '"><div class="sl-stage-v">' + fmtMins(v) + '</div>' +
          '<div class="sl-stage-k">' + STAGE_NAME[k] + '</div>' +
          (pct ? '<div class="sl-stage-p">' + pct + '</div>' : '') + '</div>';
      }).join('') + '</div>';

      // "Was it continuous?" — answered outright, which is the whole reason the
      // intervals wire wasn't enough.
      var awakeMin = st.awake || 0, breaks = (e.awakeCount != null) ? e.awakeCount : null;
      var cont = (awakeMin === 0 && (breaks === 0 || breaks === null))
        ? 'Unbroken'
        : 'Broken ' + (breaks ? breaks + (breaks === 1 ? ' time' : ' times') : '') + (awakeMin ? ' · ' + fmtMins(awakeMin) + ' awake' : '');
      if (e.restless != null) cont += ' · ' + e.restless + ' restless moment' + (e.restless === 1 ? '' : 's');

      // Latency only exists once SHE has told us when she got into bed.
      var lat = (e.bed && e.bedMeasured) ? latencyOf(e) : null;
      var latTxt = (lat != null && e.latency == null) ? 'Asleep ' + lat + ' min after lights out' : '';

      var cells = [];
      function cell(v, k){ if (v != null && v !== '') cells.push('<div class="sl-body-c"><div class="sl-body-v">' + esc(v) + '</div><div class="sl-body-k">' + k + '</div></div>'); }
      cell(e.overnightHR, 'Overnight HR');
      cell(e.restingHR, 'Resting HR');
      cell(e.hrv != null ? e.hrv + ' ms' : null, 'Overnight HRV');
      cell(e.resp != null ? e.resp : null, 'Respiration');
      cell(e.bodyBattery != null ? (e.bodyBattery > 0 ? '+' : '') + e.bodyBattery : null, 'Body battery');
      cell(e.stress, 'Sleep stress');
      cell(e.spo2 != null ? e.spo2 + '%' : null, 'SpO₂');
      var body = cells.length ? '<div class="sl-body">' + cells.join('') + '</div>' : '';

      // Garmin's own number, kept at arm's length. It is a verdict from a black
      // box; ours is built from measurements we can name. Showing it as a
      // comparison is useful — letting it into the score is how you end up with
      // two scores that disagree.
      var theirs = (e.garminScore != null)
        ? '<div class="sl-asleep" style="margin-top:10px"><span class="sl-asleep-k">Garmin scored this night <b>' + e.garminScore + '</b></span><span class="sl-asleep-sep">·</span><span class="sl-asleep-k">shown for comparison, not used in yours</span></div>'
        : '';

      return '<div class="sl-watch">' +
        '<div class="sl-watch-top">' +
          '<span class="sl-watch-win">' + esc(e.bedMeasured) + '<span class="sl-watch-arrow">→</span>' + esc(e.wakeMeasured) + '</span>' +
          '<span class="sl-watch-chip">Measured</span>' +
          '<span class="sl-watch-sub">' + esc(cont) + '</span>' +
        '</div>' + hyp + stages +
        (latTxt ? '<div class="sl-watch-sub" style="margin:10px 0 0;display:block">' + esc(latTxt) + '</div>' : '') +
        body + theirs +
      '</div>';
    }

    var LATENCY = [[5,'&lt;10 min'],[15,'10–20'],[30,'20–45'],[60,'45+']];
    var LAT_LBL = { 5:'Under 10 min', 15:'10–20 min', 30:'20–45 min', 60:'45+ min' };
    var WAKES = [[0,'None'],[1,'Once'],[2,'Twice'],[3,'3+']];

    /* Delegated chip taps — latency + awakenings (tap again to clear) */
    document.addEventListener('click', function(ev){
      var c = ev.target && ev.target.closest ? ev.target.closest('.sl-chip') : null;
      if (!c) return;
      var field = c.getAttribute('data-chip'); if (!field) return;
      var val = +c.getAttribute('data-val');
      var e = todayEntry(); buzz();
      setField(field, e[field] === val ? null : val, 'sleepNote');
    });

    function renderSleep(){
      var e = todayEntry();
      var body = document.getElementById('sleepBody');
      var pend = getPending();

      // STATE A — a sleep is in progress: calm hero, no ambiguity.
      if (pend){
        body.innerHTML =
          '<div class="sl-now">' +
            '<div class="sl-now-moon">🌙</div>' +
            '<div class="sl-now-since">Sleeping since ' + hm(pend.at) + '</div>' +
            '<div class="sl-now-el" id="slElapsed">' + elapsedStr(Date.now() - pend.at) + ' so far</div>' +
            '<div class="sl-acts" style="margin:16px 0 4px"><button type="button" class="sl-act prim" data-sleep-act="woke">I woke up<small>logs ' + hm(pend.at) + ' → now</small></button></div>' +
            '<button type="button" class="sl-now-cancel" data-sleep-act="cancel">cancel · I’m not actually asleep</button>' +
          '</div>';
        return;
      }

      // STATE B/C — bedtime target, quick buttons, manual times, latency/wakes.
      var tib = inBedHours(e), asleep = asleepHours(e);

      var pr = getProfile(), tb = targetBed(), targetHtml;
      if (editingTarget){
        targetHtml = '<div class="sl-edit-row">' +
          '<div class="sl-edit-box"><label>Wake by</label><input type="time" id="slWakeGoal" value="' + pr.wakeTime + '"></div>' +
          '<div class="sl-edit-box"><label>Floor (debt below)</label><select id="slFloor">' +
            [6,6.5,7,7.5,8,8.5,9].map(function(n){ return '<option value="' + n + '"' + (n === pr.floor ? ' selected' : '') + '>' + n + 'h</option>'; }).join('') +
          '</select></div>' +
          '<div class="sl-edit-box"><label>Ideal night</label><select id="slIdeal">' +
            [7.5,8,8.5,9,9.5,10].map(function(n){ return '<option value="' + n + '"' + (n === pr.ideal ? ' selected' : '') + '>' + n + 'h</option>'; }).join('') +
          '</select></div>' +
          '<button type="button" class="sl-act prim" style="flex:0 0 auto;padding:10px 16px" data-sleep-act="target-save">Save</button>' +
        '</div>';
      } else {
        // "Hit it" now means clearing the FLOOR — the ideal is what you aim at,
        // not a bar you fail nightly.
        var hit = (asleep != null) ? (asleep >= pr.floor - 0.25 ? ' · cleared your floor ✓' : ' · last night ' + fmtHM(asleep)) : '';
        targetHtml = '<div class="sl-target" data-sleep-act="target-edit"><span class="sl-target-ico">🎯</span><span class="sl-target-txt">In bed by <b>' + tb + '</b> for your <b>' + pr.ideal + 'h</b> ideal before your ' + pr.wakeTime + ' wake' + hit + '</span><span class="sl-target-edit">Edit</span></div>';
      }

      var acts = '<div class="sl-acts">' +
        '<button type="button" class="sl-act" data-sleep-act="sleep">Going to sleep</button>' +
        '<button type="button" class="sl-act prim" data-sleep-act="woke">I woke up</button>' +
      '</div>';

      // Latency + awakenings — the two measurements that turn "time in bed"
      // into "time asleep". Without them the score can't see a broken night.
      function chipRow(field, opts, cur){
        return opts.map(function(o){
          return '<button type="button" class="sl-chip' + (cur === o[0] ? ' on' : '') + '" data-chip="' + field + '" data-val="' + o[0] + '">' + o[1] + '</button>';
        }).join('');
      }
      var latHtml = '<div class="sl-metric">' +
        '<div class="sl-metric-top"><span class="sl-metric-name">Time to fall asleep</span><span class="sl-metric-cur">' + (function(){
          // Measured beats remembered: if she gave a bedtime and the watch gave
          // sleep onset, the answer is arithmetic and the chips below are just
          // an override.
          var mLat = (e.bed && e.bedMeasured) ? latencyOf(e) : null;
          if (mLat != null && e.latency == null) return mLat + ' min · measured';
          return e.latency != null ? (LAT_LBL[e.latency] || (e.latency + ' min')) : '—';
        })() + '</span></div>' +
        '<div class="sl-chips">' + chipRow('latency', LATENCY, e.latency) + '</div>' +
      '</div>';
      var wakeHtml = '<div class="sl-metric">' +
        '<div class="sl-metric-top"><span class="sl-metric-name">Times you woke up</span><span class="sl-metric-cur">' + (e.wakes != null ? (e.wakes === 0 ? 'Slept through' : e.wakes + (e.wakes >= 3 ? '+ times' : e.wakes === 1 ? ' time' : ' times')) : '—') + '</span></div>' +
        '<div class="sl-chips">' + chipRow('wakes', WAKES, e.wakes) + '</div>' +
      '</div>';

      // ── What the watch measured ────────────────────────────────────────
      // Her Garmin knows things she cannot report: when sleep actually began,
      // the architecture of it, and whether it broke. It does NOT know when she
      // got into bed. So this block states the measured window plainly and
      // never dresses it up as time in bed.
      var wHtml = watchHtml(e);
      // Time in bed vs actually asleep — shown side by side so the difference
      // is visible (this is exactly what the old score was blind to).
      var effV = efficiencyOf(e);
      var effHtml = (effV != null)
        ? '<div class="sl-asleep"><span class="sl-asleep-k">Asleep <b>' + fmtHM(asleep) + '</b></span><span class="sl-asleep-sep">·</span><span class="sl-asleep-k">In bed <b>' + fmtHM(tib) + '</b></span><span class="sl-asleep-sep">·</span><span class="sl-asleep-k">Efficiency <b style="color:rgb(var(--sec-rgb))">' + Math.round(effV*100) + '%</b></span></div>'
        : (tib > 0
            ? '<div class="sl-asleep sl-asleep-hint">Add how long you took to fall asleep and how often you woke — that’s what turns time in bed into real sleep.</div>'
            // The watch has the night but not the one thing only she can give.
            // Ask for exactly that, and say what it buys.
            : (e.bedMeasured && !e.bed
                ? '<div class="sl-asleep sl-asleep-hint">Your watch knows sleep began at <b>' + esc(e.bedMeasured) + '</b> — it can’t know when you got into bed. Add your bedtime above and it measures how long you took to fall asleep.</div>'
                : ''));

      body.innerHTML =
        targetHtml + acts +
        '<div class="sl-times">' +
          '<div class="sl-time-box"><div class="sl-time-lbl">Bedtime</div><input type="time" class="sl-time-in" id="slBed" value="' + (e.bed || '') + '"></div>' +
          '<div class="sl-dur"><div class="sl-dur-val">' + fmtHM(asleep) + '</div><div class="sl-dur-lbl">Asleep</div></div>' +
          '<div class="sl-time-box"><div class="sl-time-lbl">Woke up</div><input type="time" class="sl-time-in" id="slWake" value="' + (e.wake || '') + '"></div>' +
        '</div>' + wHtml + effHtml + latHtml + wakeHtml;

      var bed = document.getElementById('slBed'), wake = document.getElementById('slWake');
      function bind(el, field){ function save(){ if (el.value) setField(field, el.value, 'sleepNote'); } el.addEventListener('change', save); el.addEventListener('input', save); }
      bind(bed, 'bed'); bind(wake, 'wake');
    }

    /* ══════════ MORNING CHECK-IN CARD ══════════ */
    var CHECK = [
      { key:'energy',   name:'Energy',   low:'Drained',  high:'Buzzing', labels:['','Drained','Low','OK','Good','Buzzing'] },
      { key:'mood',     name:'Mood',     low:'Low',      high:'Great',   labels:['','Low','Meh','OK','Good','Great'] },
      { key:'stress',   name:'Stress',   low:'Calm',     high:'Stressed',labels:['','Calm','Settled','OK','Tense','Stressed'] },
      { key:'soreness', name:'Soreness', low:'Fresh',    high:'Wrecked', labels:['','Fresh','Slight','Some','Sore','Wrecked'] }
    ];
    // How he actually feels, 0–100. NOT a score, NOT an input to sleep —
    // it exists only so the page can spot when body and night disagree.
    function feelPct(e){
      if (!e) return null;
      var v = [], add = function(x, worse){ if (x != null) v.push(worse ? (5-x)/4*100 : (x-1)/4*100); };
      add(e.energy, false); add(e.mood, false); add(e.stress, true); add(e.soreness, true);
      return v.length ? Math.round(avgArr(v)) : null;
    }
    function avgArr(a){ return a.reduce(function(x,y){ return x+y; }, 0) / a.length; }

    // The honest reading when the night and the body disagree. This is the
    // whole point of taking feelings OUT of the score: now they can inform.
    function divergence(e){
      var r = recovery(e), f = feelPct(e);
      if (!r || f == null) return null;
      var gap = f - r.score;
      if (gap <= -25) return { rgb:'242,192,99', txt:'You slept well (<b>' + r.score + '</b>) but you feel rough. That’s <b>not your sleep</b> — look at stress, food, illness or training load.' };
      if (gap >= 25)  return { rgb:'52,226,176', txt:'A weak night (<b>' + r.score + '</b>) and yet you feel good. Ride it, but don’t bank on it — the debt still lands.' };
      if (r.score >= 70 && f >= 70) return { rgb:'52,226,176', txt:'Good sleep, good body. The night is doing its job.' };
      if (r.score < 55 && f < 45)  return { rgb:'255,107,139', txt:'Poor sleep and you feel it. The clearest lever you have today is tonight’s bedtime.' };
      return null;
    }

    function renderCheck(){
      var e = todayEntry();
      var html = CHECK.map(function(m){
        var cur = e[m.key] ? m.labels[e[m.key]] : '—';
        var pills = '';
        for (var i=1;i<=5;i++){
          pills += '<button type="button" class="sl-pill' + (e[m.key] === i ? ' on' : '') + '" data-metric="' + m.key + '" data-val="' + i + '">' + i + '</button>';
        }
        return '<div class="sl-metric">' +
          '<div class="sl-metric-top"><span class="sl-metric-name">' + m.name + '</span><span class="sl-metric-cur">' + cur + '</span></div>' +
          '<div class="sl-scale" data-scale="' + m.key + '">' + pills + '</div>' +
          '<div class="sl-scale-ends"><span>' + m.low + '</span><span>' + m.high + '</span></div>' +
        '</div>';
      }).join('');
      // Felt quality lives here now — it's an impression of the night, not a
      // measurement of it, so it can never touch the score.
      var qLabels = ['', 'Terrible', 'Poor', 'OK', 'Good', 'Great'], qPills = '';
      for (var qi=1; qi<=5; qi++) qPills += '<button type="button" class="sl-pill' + (e.quality === qi ? ' on' : '') + '" data-metric="quality" data-val="' + qi + '">' + qi + '</button>';
      html += '<div class="sl-metric">' +
        '<div class="sl-metric-top"><span class="sl-metric-name">How it felt</span><span class="sl-metric-cur">' + (e.quality ? qLabels[e.quality] : '—') + '</span></div>' +
        '<div class="sl-scale" data-scale="quality">' + qPills + '</div>' +
        '<div class="sl-scale-ends"><span>Terrible</span><span>Great</span></div>' +
      '</div>';

      var tags = Array.isArray(e.tags) ? e.tags : [];
      html += '<div class="sl-tags-wrap"><div class="sl-metric-name" style="margin-bottom:9px">Last night I had…</div><div class="sl-tags">' +
        TAGS.map(function(t){ var on = tags.indexOf(t.id) >= 0; return '<button type="button" class="sl-tag' + (on ? ' on' : '') + '" data-tag="' + t.id + '">' + t.emoji + ' ' + t.label + '</button>'; }).join('') +
        '</div></div>';

      // Night vs body — the reading you can only make once feelings are OUT.
      var dv = divergence(e), dvHtml = '';
      if (dv) dvHtml = '<div class="sl-diverge" style="--dv:' + dv.rgb + '"><span class="sl-diverge-dot"></span><span>' + dv.txt + '</span></div>';

      html += '<div class="rec-method" style="margin-top:16px">None of this feeds the sleep score. It’s the <b>result</b> of your sleep — kept separate so the score can’t just agree with your mood.</div>';

      document.getElementById('checkBody').innerHTML = dvHtml + html;
    }

    /* Delegated pill taps (iOS-reliable) for quality + check-in */
    document.addEventListener('click', function(ev){
      var btn = ev.target && ev.target.closest ? ev.target.closest('.sl-pill') : null;
      if (!btn) return;
      var metric = btn.getAttribute('data-metric');
      var val = +btn.getAttribute('data-val');
      if (!metric || !val) return;
      var e = todayEntry(); buzz();
      // every pill (incl. felt quality) now lives in the "How you feel" card
      // tapping the active value clears it (toggle off)
      setField(metric, e[metric] === val ? null : val, 'checkNote');
    });

    /* Sleep buttons + bedtime-target settings */
    document.addEventListener('click', function(ev){
      var b = ev.target && ev.target.closest ? ev.target.closest('[data-sleep-act]') : null;
      if (!b) return;
      var act = b.getAttribute('data-sleep-act'); buzz();
      if (act === 'sleep') goSleep();
      else if (act === 'woke') wokeUp();
      else if (act === 'cancel') cancelSleep();
      else if (act === 'target-edit'){ editingTarget = true; renderSleep(); }
      else if (act === 'target-save'){
        var wg = document.getElementById('slWakeGoal'), fl = document.getElementById('slFloor'), id = document.getElementById('slIdeal'), prof = getProfile();
        if (wg && wg.value) prof.wakeTime = wg.value;
        if (fl && fl.value) prof.floor = parseFloat(fl.value) || prof.floor;
        if (id && id.value) prof.ideal = parseFloat(id.value) || prof.ideal;
        // An ideal at or below the floor would collapse the band back into the
        // single-point model this replaced.
        if (prof.ideal < prof.floor + 0.5) prof.ideal = prof.floor + 0.5;
        delete prof.need;                 // legacy field, fully migrated
        saveProfile(prof); editingTarget = false; rescoreAll(); renderSleep();
      }
    });

    /* ══════════ TRENDS CARD ══════════ */
    function renderTrends(){
      var logs = getLogs().filter(function(e){ return e && e.dateKey; })
                          .sort(function(a,b){ return a.dateKey < b.dateKey ? -1 : 1; });
      var el = document.getElementById('trendBody');

      var slept = logs.filter(function(e){ return inBedHours(e) > 0; });
      if (!slept.length){
        el.innerHTML = '<p class="sl-empty">Your sleep history will grow here night by night.</p>';
        return;
      }

      // 7-day averages — asleep, not time in bed.
      function avg7(field){
        var cut = dateKey(new Date(Date.now() - 7 * 86400000));
        var vals = logs.filter(function(e){ return e.dateKey > cut; })
                       .map(function(e){ return field === 'asleep' ? asleepHours(e) : e[field]; })
                       .filter(function(v){ return v != null; });
        if (!vals.length) return null;
        return vals.reduce(function(a,b){ return a + b; }, 0) / vals.length;
      }
      var avgH = avg7('asleep'), avgR = avg7('recovery');

      // last-14 hours-ASLEEP sparkline
      var view = slept.slice(-14).map(function(e){ var c = Object.create(e); c.hours = asleepHours(e) || 0; return c; });
      var vals = view.map(function(e){ return e.hours; });
      var max = Math.max.apply(null, vals.concat([8])), min = Math.min.apply(null, vals.concat([0]));
      var range = (max - min) || 1;
      var tod = today();
      var bars = view.map(function(e){
        var h = Math.round(((e.hours - min) / range) * 44 + 8);
        var isT = e.dateKey === tod;
        var d = new Date(e.dateKey + 'T00:00:00');
        return '<div class="sl-spark-col"><div class="sl-spark-bar' + (isT ? ' today' : '') + '" style="height:' + h + 'px" title="' + e.dateKey + ': ' + fmtHM(e.hours) + '"></div><div class="sl-spark-lbl">' + ['S','M','T','W','T','F','S'][d.getDay()] + '</div></div>';
      }).join('');

      // recent nights list (latest 6) — the browsable history lives further down
      function recBadge(s){
        if (s == null) return '<span class="sl-night-rec" style="color:var(--au-faint);background:rgba(255,255,255,.05)">—</span>';
        var c = s >= 70 ? '52,226,176' : s >= 45 ? '242,192,99' : '255,107,139';
        return '<span class="sl-night-rec" style="color:rgb(' + c + ');background:rgba(' + c + ',.14)">' + s + '</span>';
      }
      var nights = slept.slice(-6).reverse().map(function(e){
        var d = new Date(e.dateKey + 'T00:00:00');
        var day = e.dateKey === tod ? 'Today' : ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'][d.getDay()] + ' ' + d.getDate();
        var eff = efficiencyOf(e);
        return '<div class="sl-night">' +
          '<span class="sl-night-day">' + day + '</span>' +
          '<span class="sl-night-hrs">' + fmtHM(asleepHours(e)) + '</span>' +
          '<span class="sl-night-q">' + (eff != null ? Math.round(eff*100) + '% efficient' : '') + '</span>' +
          recBadge(recScoreOf(e)) +
        '</div>';
      }).join('');

      // ── Insights: sleep debt (7d), bedtime consistency, logging streak ──
      var ins = sleepInsights();
      var debtV, debtL;
      if (!ins.weekNights){ debtV = '—'; debtL = 'sleep debt'; }
      else if (ins.debt > 0.5){ debtV = '−' + (Math.round(ins.debt * 10) / 10) + 'h'; debtL = 'below ' + ins.floor + 'h · 14n'; }
      // The balance floors at zero, so "clear" is the good state — there is no
      // surplus to display any more.
      else { debtV = 'clear'; debtL = 'no debt · 14n'; }
      var consV = ins.consistency != null ? (ins.consistency + '<small> /100</small>') : '—';
      var insHtml = '<div class="sl-ins">' +
        '<div class="sl-ins-card"><div class="sl-ins-v">' + debtV + '</div><div class="sl-ins-l">' + debtL + '</div></div>' +
        '<div class="sl-ins-card"><div class="sl-ins-v">' + consV + '</div><div class="sl-ins-l">' + (ins.consistency != null ? 'consistency ±' + ins.spread + 'm' : 'consistency') + '</div></div>' +
        '<div class="sl-ins-card"><div class="sl-ins-v">' + ins.streak + '<small></small></div><div class="sl-ins-l">night streak</div></div>' +
      '</div>';
      var bestDay = '';
      if (ins.best){ var bd = new Date(ins.best.e.dateKey + 'T00:00:00'); bestDay = ins.best.e.dateKey === today() ? 'tonight' : ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'][bd.getDay()]; }
      var takeaway;
      if (ins.debt > 1.5){ var pm = Math.round(ins.debt * 60 / 7); takeaway = 'You’re carrying ' + (Math.round(ins.debt * 10) / 10) + 'h of sleep debt from nights under ' + ins.floor + 'h — clear it with about +' + pm + ' min a night this week, or a weekend lie-in.'; }
      else if (ins.streak >= 7 && ins.consistency != null && ins.consistency >= 75) takeaway = 'Locked in — ' + ins.streak + ' nights straight with steady timing. This is exactly how good sleep compounds.';
      else if (ins.consistency != null && ins.consistency < 50) takeaway = 'Your bedtime swings ±' + ins.spread + ' min — steadier timing scores higher than an extra 20 minutes in bed.';
      else if (ins.best && ins.best.sc != null && ins.best.sc >= 80) takeaway = 'Your best night was ' + bestDay + ' — ' + fmtHM(asleepHours(ins.best.e)) + ' asleep, scoring ' + ins.best.sc + '. Worth repeating.';
      else if (ins.debt === 0 && ins.weekNights >= 7) takeaway = 'No sleep debt across ' + ins.weekNights + ' nights — every one cleared your ' + ins.floor + 'h floor. Keep the rhythm going.';
      else takeaway = 'Steady week. Keep stacking consistent nights — it’s the highest-leverage lever you’ve got.';
      var takeHtml = '<div class="sl-takeaway">' + takeaway + '</div>';

      el.innerHTML =
        insHtml + takeHtml +
        '<div class="sl-stats">' +
          '<div><div class="sl-stat-val">' + (avgH != null ? fmtHM(avgH) : '—') + '</div><div class="sl-stat-lbl">7-day asleep</div></div>' +
          '<div><div class="sl-stat-val">' + (avgR != null ? Math.round(avgR) : '—') + '<small> / 100</small></div><div class="sl-stat-lbl">7-day sleep score</div></div>' +
          '<div><div class="sl-stat-val">' + slept.length + '</div><div class="sl-stat-lbl">nights logged</div></div>' +
        '</div>' +
        '<div class="sl-spark">' + bars + '</div>' +
        '<div class="sl-spark-cap"><span>' + view[0].dateKey.slice(5) + '</span><span>hours asleep</span><span>Today</span></div>' +
        '<div class="sl-nights">' + nights + '</div>';
    }

    /* ══════════ WHAT AFFECTS YOU — cross-domain patterns (Phase B) ══════════
       Reads your OTHER logs (caffeine, training, food) + manual night tags,
       then compares recovery/sleep on nights WITH vs WITHOUT each factor
       (Bearable-style; min 3 of each, last 60 nights). Correlation from your
       own data — surfaced honestly, never claimed as proof. All client-side. */
    var TAGS = [
      { id:'alcohol', label:'Alcohol',       emoji:'🍷' },
      { id:'screen',  label:'Late screen',   emoji:'📱' },
      { id:'stress',  label:'Stressful day', emoji:'😰' },
      { id:'nap',     label:'Napped',        emoji:'😴' },
      { id:'sick',    label:'Felt ill',      emoji:'🤒' },
      { id:'travel',  label:'Travel',        emoji:'✈️' }
    ];
    function cafLogs(){ var a = ls('caf:logs'); return Array.isArray(a) ? a : []; }
    function nutLogs(){ var a = ls('nut:logs'); return Array.isArray(a) ? a : []; }
    function workouts(){ var a = ls('po_workouts'); return Array.isArray(a) ? a : []; }
    function prevDay(dk){ var p = dk.split('-').map(Number); return dateKey(new Date(p[0], p[1]-1, p[2]-1)); }
    function avg(a){ return a.reduce(function(x,y){ return x+y; }, 0) / a.length; }
    // Pre-index the evenings that had each behaviour (O(1) lookups afterwards).
    function crossIndex(){
      var lateCaf = {}, trained = {}, lateMeal = {};
      cafLogs().forEach(function(c){ if (c && c.ts != null){ var d = new Date(c.ts); if (!isNaN(d) && d.getHours() >= 14) lateCaf[dateKey(d)] = 1; } });
      workouts().forEach(function(w){ if (w && w.date) trained[w.date] = 1; });
      nutLogs().forEach(function(n){ if (n && n.dateKey && n.ts != null){ var d = new Date(n.ts); if (!isNaN(d) && d.getHours() >= 21) lateMeal[n.dateKey] = 1; } });
      return { lateCaf:lateCaf, trained:trained, lateMeal:lateMeal };
    }
    function factorList(){
      var auto = [
        { key:'caffeine_late', label:'caffeine after 2pm',      test:function(e,X){ return !!X.lateCaf[prevDay(e.dateKey)]; } },
        { key:'trained_prev',  label:'training the day before',  test:function(e,X){ return !!X.trained[prevDay(e.dateKey)]; } },
        { key:'late_meal',     label:'eating after 9pm',         test:function(e,X){ return !!X.lateMeal[prevDay(e.dateKey)]; } }
      ];
      TAGS.forEach(function(t){ auto.push({ key:'tag_'+t.id, label:t.label.toLowerCase(), test:function(e){ return Array.isArray(e.tags) && e.tags.indexOf(t.id) >= 0; } }); });
      return auto;
    }

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>Sleep &amp; Recovery · ALS</title>
  <meta name="theme-color" content="#050507">
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="apple-touch-icon.png">
  <link rel="stylesheet" href="aurora.css">
  <script src="water.js"></script>
  <script src="topbar.js" defer></script>
  <script>window.__pmAutoSel='.sl-hero,.sl-sec';</script>
  <script src="page-motion.js" defer></script>
  <style>
    *, *::before, *::after { box-sizing:border-box; margin:0; padding:0; }
    html, body { min-height:100%; }
    body { padding:0 0 calc(86px + env(safe-area-inset-bottom)); }

    /* ── Hero ─────────────────────────────────────── */
    .sl-hero{ max-width:600px; margin:0 auto; padding:24px 18px 8px; display:flex; align-items:flex-start; justify-content:space-between; gap:14px; }
    .sl-hero-eyebrow{ margin-bottom:12px; }
    .sl-hero-line{ font-family:var(--au-serif); font-style:italic; font-weight:400; color:var(--au-ivory); font-size:clamp(24px,6vw,32px); line-height:1.1; letter-spacing:-.01em; max-width:22ch; }
    .sl-hero .nova{ flex-shrink:0; width:74px; height:74px; margin-top:2px; }

    /* ── Page wrap + cards ────────────────────────── */
    .sl-wrap{ padding:14px 18px; display:flex; flex-direction:column; gap:14px; max-width:600px; margin:0 auto; }
    .sl-sec{ position:relative; background:var(--au-glass); border:1px solid var(--au-line); border-radius:18px; overflow:hidden; backdrop-filter:blur(16px); -webkit-backdrop-filter:blur(16px); transition:border-color .25s, box-shadow .25s; }
    .sl-sec::before{ content:''; position:absolute; top:0; left:8%; right:8%; height:1px; background:linear-gradient(90deg,transparent,rgba(var(--sec-rgb),.55),transparent); pointer-events:none; }
    .sl-sec:hover{ border-color:rgba(var(--sec-rgb),.22); box-shadow:0 14px 44px rgba(0,0,0,.45), 0 0 36px rgba(var(--sec-rgb),.06); }
    .sl-sec-hdr{ display:flex; align-items:center; gap:10px; padding:15px 18px 12px; border-bottom:1px solid var(--au-line); }
    .sl-sec-dot{ width:7px; height:7px; border-radius:50%; background:rgb(var(--sec-rgb)); box-shadow:0 0 10px rgba(var(--sec-rgb),.8); flex-shrink:0; }
    .sl-sec-title{ font-family:var(--au-serif); font-style:italic; font-weight:400; font-size:22px; color:var(--au-ivory); flex:1; line-height:1; }
    .sl-sec-note{ font-family:var(--au-mono); font-size:9px; font-weight:700; letter-spacing:.1em; text-transform:uppercase; color:var(--au-faint); white-space:nowrap; transition:color .25s; }
    .sl-sec-note.saved{ color:rgb(var(--sec-rgb)); }
    .sl-sec-body{ padding:16px 18px; }

    /* ── Recovery card ────────────────────────────── */
    .rec-main{ display:flex; align-items:center; gap:18px; }
    .rec-ring-wrap{ position:relative; width:116px; height:116px; flex-shrink:0; }
    .rec-ring-wrap svg{ transform:rotate(-90deg); }
    .rec-ring-inner{ position:absolute; inset:0; display:flex; flex-direction:column; align-items:center; justify-content:center; }
    .rec-score{ font-family:var(--au-serif); font-style:italic; font-size:42px; font-weight:400; color:var(--au-ivory); line-height:1; letter-spacing:-.015em; }
    .rec-score-lbl{ font-family:var(--au-mono); font-size:8px; font-weight:700; letter-spacing:.18em; text-transform:uppercase; color:var(--au-faint); margin-top:5px; }
    .rec-right{ flex:1; min-width:0; }
    .rec-verdict{ font-family:var(--au-serif); font-style:italic; font-size:24px; color:var(--au-ivory); line-height:1.05; }
    .rec-advice{ font-size:12.5px; color:var(--au-dim); line-height:1.45; margin-top:7px; }
    .rec-bars{ margin-top:16px; display:flex; flex-direction:column; gap:9px; }
    .rec-bar-row{ display:flex; align-items:center; gap:10px; }
    .rec-bar-lbl{ font-family:var(--au-mono); font-size:9px; font-weight:700; letter-spacing:.1em; text-transform:uppercase; color:var(--au-faint); width:74px; flex-shrink:0; }
    .rec-bar-track{ flex:1; height:6px; background:rgba(255,255,255,.07); border-radius:3px; overflow:hidden; }
    .rec-bar-fill{ height:100%; border-radius:3px; transition:width .5s ease; }
    .rec-bar-v{ font-family:var(--au-mono); font-size:10px; color:var(--au-dim); width:30px; text-align:right; flex-shrink:0; }
    .rec-empty{ font-family:var(--au-serif); font-style:italic; font-size:16px; color:var(--au-dim); line-height:1.5; text-align:center; padding:8px 4px; }
    .rec-method{ margin-top:14px; padding-top:12px; border-top:1px solid rgba(255,255,255,.06); font-family:var(--au-mono); font-size:9.5px; line-height:1.5; letter-spacing:.02em; color:var(--au-faint); }
    .rec-method b{ color:var(--au-dim); font-weight:700; }

    /* ── Sleep log (times) ────────────────────────── */
    .sl-times{ display:flex; align-items:stretch; gap:10px; margin-bottom:6px; }
    .sl-time-box{ flex:1; background:rgba(255,255,255,.05); border:1px solid rgba(var(--sec-rgb),.28); border-radius:14px; padding:11px 13px; transition:border-color .2s; }
    .sl-time-box:focus-within{ border-color:rgba(var(--sec-rgb),.6); }
    .sl-time-lbl{ font-family:var(--au-mono); font-size:9px; font-weight:700; letter-spacing:.12em; text-transform:uppercase; color:var(--au-faint); margin-bottom:5px; }
    /* NB: do NOT set -webkit-appearance:none here — it breaks the native time
       picker on iOS (the field won't open / value won't stick). */
    .sl-time-in{ width:100%; background:transparent; border:none; outline:none; color:var(--au-ivory); -webkit-text-fill-color:var(--au-ivory); font-family:var(--au-mono); font-size:21px; font-weight:700; letter-spacing:-.01em; min-height:26px; }
    .sl-time-in::-webkit-calendar-picker-indicator{ filter:invert(1); opacity:.45; }
    .sl-dur{ display:flex; flex-direction:column; align-items:center; justify-content:center; min-width:78px; text-align:center; }
    .sl-dur-val{ font-family:var(--au-mono); font-size:23px; font-weight:700; color:rgb(var(--sec-rgb)); line-height:1; }
    .sl-dur-lbl{ font-family:var(--au-mono); font-size:8px; font-weight:700; letter-spacing:.12em; text-transform:uppercase; color:var(--au-faint); margin-top:4px; }

    /* ── Scale pills (quality + check-in) ─────────── */
    .sl-metric{ margin-top:16px; }
    .sl-metric:first-child{ margin-top:0; }
    .sl-metric-top{ display:flex; align-items:baseline; justify-content:space-between; margin-bottom:8px; }
    .sl-metric-name{ font-family:var(--au-mono); font-size:10px; font-weight:700; letter-spacing:.1em; text-transform:uppercase; color:var(--au-dim); }
    .sl-metric-cur{ font-family:var(--au-serif); font-style:italic; font-size:14px; color:rgb(var(--sec-rgb)); }
    .sl-scale{ display:flex; gap:7px; }
    .sl-pill{ flex:1; padding:11px 0; border-radius:12px; border:1px solid var(--au-line); background:rgba(255,255,255,.04); color:var(--au-faint); font-family:var(--au-mono); font-size:15px; font-weight:700; cursor:pointer; transition:all .15s; -webkit-tap-highlight-color:transparent; }
    .sl-pill:active{ transform:scale(.94); }
    .sl-pill.on{ background:rgba(var(--sec-rgb),.18); border-color:rgba(var(--sec-rgb),.6); color:rgb(var(--sec-rgb)); box-shadow:0 0 14px rgba(var(--sec-rgb),.3); }
    .sl-scale-ends{ display:flex; justify-content:space-between; margin-top:6px; font-family:var(--au-mono); font-size:8.5px; letter-spacing:.06em; text-transform:uppercase; color:var(--au-faint); }

    /* ── Latency / awakenings chips + asleep readout ── */
    .sl-chips{ display:flex; gap:7px; }
    .sl-chip{ flex:1; padding:11px 4px; border-radius:12px; border:1px solid var(--au-line); background:rgba(255,255,255,.04); color:var(--au-faint); font-family:var(--au-mono); font-size:11px; font-weight:700; letter-spacing:.02em; cursor:pointer; transition:transform .12s, border-color .2s, background .2s, color .2s; -webkit-tap-highlight-color:transparent; }
    .sl-chip:active{ transform:scale(.94); }
    .sl-chip.on{ background:rgba(var(--sec-rgb),.18); border-color:rgba(var(--sec-rgb),.6); color:rgb(var(--sec-rgb)); box-shadow:0 0 14px rgba(var(--sec-rgb),.3); }
    .sl-asleep{ display:flex; align-items:center; flex-wrap:wrap; gap:7px; margin-top:11px; padding:10px 12px; border-radius:12px; background:rgba(255,255,255,.04); border:1px solid var(--au-line); font-family:var(--au-mono); font-size:10.5px; letter-spacing:.02em; color:var(--au-faint); }
    .sl-asleep b{ color:var(--au-ivory); font-weight:700; }
    .sl-asleep-sep{ opacity:.4; }
    .sl-asleep-hint{ font-family:var(--au-serif); font-style:italic; font-size:13px; letter-spacing:0; color:var(--au-dim); line-height:1.45; display:block; }

    /* ── Divergence: the night vs the body ────────── */
    .sl-diverge{ display:flex; align-items:flex-start; gap:10px; margin:0 0 16px; padding:12px 14px; border-radius:13px; background:rgba(var(--dv),.09); border:1px solid rgba(var(--dv),.24); font-size:13px; line-height:1.5; color:var(--au-dim); }
    .sl-diverge b{ color:var(--au-ivory); font-weight:700; }
    .sl-diverge-dot{ width:8px; height:8px; border-radius:50%; margin-top:6px; flex-shrink:0; background:rgb(var(--dv)); box-shadow:0 0 9px rgba(var(--dv),.9); }

    /* ── Trends ───────────────────────────────────── */
    .sl-stats{ display:flex; gap:18px; margin-bottom:16px; }
    .sl-stat-val{ font-family:var(--au-mono); font-size:24px; font-weight:700; color:var(--au-ivory); letter-spacing:-.02em; line-height:1; }
    .sl-stat-val small{ font-size:12px; color:var(--au-faint); font-weight:700; }
    .sl-stat-lbl{ font-family:var(--au-mono); font-size:9px; font-weight:700; letter-spacing:.1em; text-transform:uppercase; color:var(--au-faint); margin-top:5px; }
    .sl-spark{ display:flex; align-items:flex-end; gap:4px; height:52px; }
    .sl-spark-col{ flex:1; display:flex; flex-direction:column; align-items:center; gap:4px; height:100%; justify-content:flex-end; }
    .sl-spark-bar{ width:100%; border-radius:4px 4px 0 0; background:rgba(var(--sec-rgb),.28); min-height:3px; transition:height .4s ease; }
    .sl-spark-bar.today{ background:rgb(var(--sec-rgb)); box-shadow:0 0 10px rgba(var(--sec-rgb),.6); }
    .sl-spark-lbl{ font-family:var(--au-mono); font-size:8px; color:var(--au-faint); }
    .sl-spark-cap{ display:flex; justify-content:space-between; font-family:var(--au-mono); font-size:9px; letter-spacing:.05em; color:var(--au-faint); text-transform:uppercase; margin-top:8px; }
    .sl-nights{ display:flex; flex-direction:column; gap:1px; margin-top:14px; }
    .sl-night{ display:flex; align-items:center; gap:10px; padding:9px 0; border-bottom:1px solid rgba(255,255,255,.05); }
    .sl-night:last-child{ border-bottom:none; }
    .sl-night-day{ font-family:var(--au-mono); font-size:11px; color:var(--au-dim); width:52px; flex-shrink:0; }
    .sl-night-hrs{ font-family:var(--au-mono); font-size:13px; font-weight:700; color:var(--au-ivory); }
    .sl-night-q{ font-size:11px; color:var(--au-faint); font-family:var(--au-serif); font-style:italic; flex:1; }
    .sl-night-rec{ font-family:var(--au-mono); font-size:11px; font-weight:700; padding:2px 9px; border-radius:7px; }
    .sl-empty{ font-family:var(--au-serif); font-style:italic; font-size:15px; color:var(--au-dim); text-align:center; padding:10px 0; }

    /* ── Sleep/wake buttons + in-progress hero ────── */
    .sl-acts{ display:flex; gap:9px; margin-bottom:15px; }
    .sl-act{ flex:1; padding:14px 8px; border-radius:14px; border:1px solid var(--au-line); background:rgba(255,255,255,.05); color:var(--au-ivory); font-family:var(--au-sans); font-size:13px; font-weight:700; cursor:pointer; line-height:1.3; text-align:center; transition:transform .12s, border-color .2s, background .2s; -webkit-tap-highlight-color:transparent; }
    .sl-act:active{ transform:scale(.96); }
    .sl-act.prim{ border-color:rgba(var(--sec-rgb),.55); background:rgba(var(--sec-rgb),.16); }
    .sl-act small{ display:block; font-weight:400; font-size:10.5px; opacity:.7; margin-top:2px; }
    .sl-now{ text-align:center; padding:14px 10px 18px; }
    .sl-now-moon{ font-size:34px; line-height:1; filter:drop-shadow(0 0 12px rgba(var(--sec-rgb),.5)); animation:sl-breathe 4s ease-in-out infinite; }
    @keyframes sl-breathe{ 0%,100%{ opacity:.85; transform:scale(1); } 50%{ opacity:1; transform:scale(1.06); } }
    .sl-now-since{ font-family:var(--au-serif); font-style:italic; font-size:22px; color:var(--au-ivory); margin-top:10px; }
    .sl-now-el{ font-family:var(--au-mono); font-size:13px; color:rgb(var(--sec-rgb)); margin-top:4px; letter-spacing:.02em; }
    .sl-now-cancel{ display:inline-block; margin-top:14px; font-family:var(--au-mono); font-size:10px; letter-spacing:.08em; text-transform:uppercase; color:var(--au-faint); background:none; border:none; cursor:pointer; }

    /* ── Bedtime target ───────────────────────────── */
    .sl-target{ display:flex; align-items:center; gap:9px; padding:11px 13px; margin-bottom:14px; border-radius:13px; background:rgba(var(--sec-rgb),.08); border:1px solid rgba(var(--sec-rgb),.2); cursor:pointer; }
    .sl-target-ico{ font-size:17px; }
    .sl-target-txt{ flex:1; font-size:12.5px; color:var(--au-dim); line-height:1.4; }
    .sl-target-txt b{ color:var(--au-ivory); font-weight:700; }
    .sl-target-edit{ font-family:var(--au-mono); font-size:9px; letter-spacing:.08em; text-transform:uppercase; color:rgb(var(--sec-rgb)); }
    .sl-edit-row{ display:flex; gap:10px; align-items:flex-end; padding:12px 0 4px; }
    .sl-edit-box{ flex:1; }
    .sl-edit-box label{ display:block; font-family:var(--au-mono); font-size:9px; font-weight:700; letter-spacing:.1em; text-transform:uppercase; color:var(--au-faint); margin-bottom:5px; }
    .sl-edit-box input, .sl-edit-box select{ width:100%; background:rgba(255,255,255,.05); border:1px solid rgba(var(--sec-rgb),.3); border-radius:11px; padding:9px 11px; color:var(--au-ivory); -webkit-text-fill-color:var(--au-ivory); font-family:var(--au-mono); font-size:15px; font-weight:700; outline:none; }

    /* ── Recovery delta + peak glow ───────────────── */
    .rec-delta{ display:inline-block; font-family:var(--au-mono); font-size:10px; font-weight:700; margin-top:6px; padding:2px 8px; border-radius:7px; }
    .rec-train{ font-size:11.5px; color:var(--au-faint); line-height:1.4; margin-top:8px; font-style:italic; font-family:var(--au-serif); }
    .rec-ring-wrap.peak::after{ content:''; position:absolute; inset:-6px; border-radius:50%; box-shadow:0 0 26px 4px rgba(var(--sec-rgb),.45); animation:sl-peak 2.2s ease-in-out infinite; pointer-events:none; }
    @keyframes sl-peak{ 0%,100%{ opacity:.4; } 50%{ opacity:.9; } }

    /* ── Insights (in Trends) ─────────────────────── */
    .sl-ins{ display:flex; gap:10px; margin-bottom:14px; }
    .sl-ins-card{ flex:1; background:rgba(255,255,255,.04); border:1px solid var(--au-line); border-radius:13px; padding:11px 12px; }
    .sl-ins-v{ font-family:var(--au-mono); font-size:20px; font-weight:700; color:var(--au-ivory); line-height:1; letter-spacing:-.02em; }
    .sl-ins-v small{ font-size:11px; color:var(--au-faint); }
    .sl-ins-l{ font-family:var(--au-mono); font-size:8.5px; font-weight:700; letter-spacing:.09em; text-transform:uppercase; color:var(--au-faint); margin-top:6px; line-height:1.3; }
    .sl-takeaway{ font-family:var(--au-serif); font-style:italic; font-size:14.5px; color:var(--au-ivory); line-height:1.45; padding:12px 14px; margin-bottom:14px; border-radius:13px; background:rgba(var(--sec-rgb),.07); border-left:2px solid rgb(var(--sec-rgb)); }
    .sl-streak{ font-family:var(--au-mono); font-size:9px; }

    /* ── Night tags (Phase B) ─────────────────────── */
    .sl-tags-wrap{ margin-top:18px; padding-top:15px; border-top:1px solid rgba(255,255,255,.06); }
    .sl-tags{ display:flex; flex-wrap:wrap; gap:7px; }
    .sl-tag{ font-family:var(--au-sans); font-size:12px; font-weight:600; color:var(--au-dim); background:rgba(255,255,255,.04); border:1px solid var(--au-line); border-radius:11px; padding:8px 11px; cursor:pointer; transition:transform .12s, border-color .2s, background .2s, color .2s; -webkit-tap-highlight-color:transparent; }
    .sl-tag:active{ transform:scale(.95); }
    .sl-tag.on{ background:rgba(var(--sec-rgb),.18); border-color:rgba(var(--sec-rgb),.55); color:rgb(var(--sec-rgb)); }

    /* ── Patterns / what affects you (Phase B) ────── */
    .pat-today{ font-family:var(--au-serif); font-style:italic; font-size:14.5px; color:var(--au-ivory); line-height:1.45; padding:11px 14px; margin-bottom:14px; border-radius:12px; background:rgba(var(--sec-rgb),.08); border-left:2px solid rgb(var(--sec-rgb)); }
    .pat-list{ display:flex; flex-direction:column; gap:12px; }
    .pat-row{ display:flex; align-items:flex-start; gap:10px; }
    .pat-dot{ width:8px; height:8px; border-radius:50%; margin-top:5px; flex-shrink:0; box-shadow:0 0 8px currentColor; }
    .pat-txt{ font-size:13px; color:var(--au-dim); line-height:1.45; flex:1; }
    .pat-txt b{ color:var(--au-ivory); font-weight:700; }
    .pat-n{ font-family:var(--au-mono); font-size:9.5px; color:var(--au-faint); white-space:nowrap; }
    .pat-rhythm{ margin-top:13px; padding-top:12px; border-top:1px solid rgba(255,255,255,.06); font-size:12px; color:var(--au-dim); line-height:1.55; }
    .pat-rhythm b{ color:var(--au-ivory); font-weight:700; }

    /* ── Tonight: the projection ──────────────────── */
    .tn-head{ display:flex; align-items:center; gap:15px; padding:13px 15px; border-radius:14px; background:rgba(var(--tn),.08); border:1px solid rgba(var(--tn),.22); }
    .tn-score{ font-family:var(--au-serif); font-style:italic; font-size:38px; font-weight:400; line-height:1; letter-spacing:-.02em; color:rgb(var(--tn)); flex-shrink:0; }
    .tn-line{ font-size:13px; color:var(--au-dim); line-height:1.5; }
    .tn-line b{ color:var(--au-ivory); font-weight:700; }
    .tn-opts{ display:flex; gap:7px; margin-top:14px; }
    .tn-opt{ flex:1; display:flex; flex-direction:column; align-items:center; gap:5px; padding:10px 2px; border-radius:12px; border:1px solid var(--au-line); background:rgba(255,255,255,.04); cursor:pointer; transition:transform .12s, border-color .2s, background .2s; -webkit-tap-highlight-color:transparent; }
    .tn-opt:active{ transform:scale(.95); }
    .tn-opt.on{ background:rgba(var(--tn),.16); border-color:rgba(var(--tn),.55); }
    .tn-opt-t{ font-family:var(--au-mono); font-size:11.5px; font-weight:700; color:var(--au-dim); }
    .tn-opt.on .tn-opt-t{ color:var(--au-ivory); }
    .tn-opt-s{ font-family:var(--au-mono); font-size:13px; font-weight:700; color:rgb(var(--tn)); }
    .tn-cuts{ display:flex; gap:9px; margin-top:12px; }
    .tn-cut{ flex:1; display:flex; align-items:center; gap:9px; padding:10px 12px; border-radius:12px; background:rgba(255,255,255,.04); border:1px solid var(--au-line); }
    .tn-cut-ic{ font-size:15px; }
    .tn-cut-k{ font-family:var(--au-mono); font-size:8.5px; font-weight:700; letter-spacing:.09em; text-transform:uppercase; color:var(--au-faint); }
    .tn-cut-v{ font-family:var(--au-mono); font-size:14px; font-weight:700; color:var(--au-ivory); margin-top:3px; }

    /* ── Every night: the history browser ─────────── */
    .hs-month{ display:flex; align-items:baseline; justify-content:space-between; gap:8px; margin:16px 0 6px; padding-bottom:6px; border-bottom:1px solid rgba(255,255,255,.07); font-family:var(--au-mono); font-size:9.5px; font-weight:700; letter-spacing:.12em; text-transform:uppercase; color:var(--au-dim); }
    .hs-month:first-child{ margin-top:0; }
    .hs-month-n{ font-weight:400; letter-spacing:.06em; color:var(--au-faint); }
    .hs-item{ border-bottom:1px solid rgba(255,255,255,.05); }
    .hs-item:last-child{ border-bottom:none; }
    .hs-row{ display:flex; align-items:center; gap:10px; width:100%; padding:11px 2px; background:none; border:none; cursor:pointer; text-align:left; -webkit-tap-highlight-color:transparent; }
    .hs-row:active{ background:rgba(255,255,255,.03); }
    .hs-day{ font-family:var(--au-mono); font-size:11px; color:var(--au-dim); width:56px; flex-shrink:0; }
    .hs-hrs{ font-family:var(--au-mono); font-size:12.5px; font-weight:700; color:var(--au-ivory); width:56px; flex-shrink:0; }
    .hs-bar{ flex:1; min-width:24px; height:4px; border-radius:2px; background:rgba(255,255,255,.07); overflow:hidden; }
    .hs-bar-fill{ display:block; height:100%; border-radius:2px; }
    .hs-score{ font-family:var(--au-mono); font-size:11px; font-weight:700; padding:2px 8px; border-radius:7px; flex-shrink:0; }
    .hs-chev{ font-size:10px; color:var(--au-faint); width:10px; flex-shrink:0; }
    .hs-detail{ padding:4px 2px 15px; }
    .hs-d-row{ display:flex; align-items:baseline; justify-content:space-between; gap:12px; padding:5px 0; }
    .hs-d-k{ font-family:var(--au-mono); font-size:9.5px; font-weight:700; letter-spacing:.09em; text-transform:uppercase; color:var(--au-faint); }
    .hs-d-v{ font-family:var(--au-mono); font-size:12px; color:var(--au-dim); }
    .hs-d-v b{ color:var(--au-ivory); font-weight:700; }
    .hs-d-sub{ font-family:var(--au-mono); font-size:9px; font-weight:700; letter-spacing:.1em; text-transform:uppercase; color:var(--au-faint); margin:13px 0 8px; }
    .hs-d-bars{ display:flex; flex-direction:column; gap:8px; }
    .hs-feels{ display:flex; flex-wrap:wrap; gap:6px; }
    .hs-feel{ font-family:var(--au-mono); font-size:10px; letter-spacing:.02em; color:var(--au-dim); background:rgba(255,255,255,.05); border:1px solid var(--au-line); border-radius:9px; padding:5px 9px; }
    .hs-feel b{ color:var(--au-ivory); font-weight:700; }
    .hs-more{ display:block; width:100%; margin-top:14px; padding:11px; border-radius:12px; border:1px solid var(--au-line); background:rgba(255,255,255,.04); color:var(--au-dim); font-family:var(--au-mono); font-size:10px; font-weight:700; letter-spacing:.08em; text-transform:uppercase; cursor:pointer; -webkit-tap-highlight-color:transparent; }
    .hs-more:active{ transform:scale(.98); }

    /* ── Your day: circadian energy schedule (Phase C) ─── */
    .day-list{ display:flex; flex-direction:column; gap:2px; }
    .day-row{ display:flex; align-items:flex-start; gap:12px; padding:9px 0; border-bottom:1px solid rgba(255,255,255,.05); }
    .day-row:last-child{ border-bottom:none; }
    .day-ic{ font-size:16px; line-height:1.4; width:22px; text-align:center; flex-shrink:0; }
    .day-mid{ flex:1; min-width:0; }
    .day-name{ font-family:var(--au-mono); font-size:10.5px; font-weight:700; letter-spacing:.06em; text-transform:uppercase; color:var(--au-ivory); }
    .day-time{ color:rgb(var(--sec-rgb)); margin-left:5px; }
    .day-tip{ font-size:12px; color:var(--au-dim); line-height:1.4; margin-top:3px; }
  </style>
</head>
<body data-page="sleep" class="au-bg au-mood-alert" id="root">

  <!-- Hero -->
  <div class="sl-hero">
    <div>
      <div class="au-eyebrow sl-hero-eyebrow"><span class="au-dot"></span>SLEEP &amp; RECOVERY<span class="au-sep">&middot;</span><span id="heroDate">TODAY</span></div>
      <p class="sl-hero-line" id="novaSays">How did you sleep?</p>
    </div>
    <div class="nova" id="nova" aria-hidden="true">
      <svg viewBox="0 0 100 100">
        <defs><linearGradient id="novaGradSleep" x1="0" y1="0" x2="1" y2="1">
          <stop offset="0%" stop-color="#9B8CFF"/><stop offset="100%" stop-color="#18C8C0"/>
        </linearGradient></defs>
        <g class="nova-glow">
          <rect x="22" y="22" width="56" height="56" rx="16" transform="rotate(45 50 50)" fill="url(#novaGradSleep)" opacity="0.95"/>
          <circle class="nova-eye" cx="42" cy="50" r="5.5" fill="#04130D"/>
          <circle class="nova-eye" cx="58" cy="50" r="5.5" fill="#04130D"/>
          <circle cx="43.4" cy="48.5" r="1.6" fill="#fff"/>
          <circle cx="59.4" cy="48.5" r="1.6" fill="#fff"/>

      </svg>

  </div>

  <div class="sl-wrap" data-am-reveal-group>

      <div class="sl-sec-hdr"><span class="sl-sec-dot"></span><span class="sl-sec-title">The night</span><span class="sl-sec-note" id="sleepNote">AUTO-SAVED</span></div>

    </section>

    <!-- Tonight — the only part of this you can still change -->

      <div class="sl-sec-hdr"><span class="sl-sec-dot"></span><span class="sl-sec-title">Tonight</span><span class="sl-sec-note">THE LEVER</span></div>

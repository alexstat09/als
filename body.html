<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>Body · ALS</title>
  <meta name="theme-color" content="#050506">
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="apple-touch-icon.png">
  <link rel="stylesheet" href="aurora.css">
  <script src="topbar.js" defer></script>
  <style>
    /* Map legacy tokens onto AURORA so nothing is left behind */
    :root{
      --font:var(--au-sans); --font-mono:var(--au-mono);
      --text-primary:var(--au-ivory); --text-secondary:var(--au-dim); --text-tertiary:var(--au-faint);
      --border:var(--au-line); --surface:var(--au-glass);
    }
    *, *::before, *::after { box-sizing:border-box; margin:0; padding:0; }
    html, body { min-height:100%; }
    body { padding:0 0 calc(86px + env(safe-area-inset-bottom)); }

    /* ── Hero ─────────────────────────────────────── */
    .bp-hero{ max-width:600px; margin:0 auto; padding:24px 18px 8px; display:flex; align-items:flex-start; justify-content:space-between; gap:14px; }
    .bp-hero-eyebrow{ margin-bottom:12px; }
    .bp-hero-line{ font-family:var(--au-serif); font-style:italic; font-weight:400; color:var(--au-ivory); font-size:clamp(24px,6vw,32px); line-height:1.08; letter-spacing:-.01em; max-width:24ch; }
    .bp-hero .nova{ flex-shrink:0; width:74px; height:74px; margin-top:2px; }

    /* ── Snapshot bar ─────────────────────────────── */
    .snap-bar{ max-width:600px; margin:6px auto 0; display:grid; grid-template-columns:repeat(4,1fr); background:rgba(7,8,11,0.72); border:1px solid var(--au-line); border-radius:16px; backdrop-filter:blur(18px); -webkit-backdrop-filter:blur(18px); overflow:hidden; }
    .snap-item{ display:flex; flex-direction:column; align-items:center; justify-content:center; padding:11px 4px; border-right:1px solid var(--au-line); }
    .snap-item:last-child{ border-right:none; }
    .snap-val{ font-family:var(--au-mono); font-size:16px; font-weight:700; color:var(--au-ivory); letter-spacing:-.02em; line-height:1.1; }
    .snap-lbl{ font-family:var(--au-mono); font-size:8px; font-weight:700; letter-spacing:.12em; text-transform:uppercase; color:var(--au-faint); margin-top:3px; }

    /* ── Page wrap ────────────────────────────────── */
    .bp-wrap{ padding:14px 18px; display:flex; flex-direction:column; gap:14px; max-width:600px; margin:0 auto; }

    /* ── Section (glass card) ─────────────────────── */
    .bp-sec{ position:relative; background:var(--au-glass); border:1px solid var(--au-line); border-radius:18px; overflow:hidden; backdrop-filter:blur(16px); -webkit-backdrop-filter:blur(16px); transition:border-color .25s, box-shadow .25s; }
    .bp-sec::before{ content:''; position:absolute; top:0; left:8%; right:8%; height:1px; background:linear-gradient(90deg,transparent,rgba(var(--sec-rgb),.55),transparent); pointer-events:none; }
    .bp-sec:hover{ border-color:rgba(var(--sec-rgb),.22); box-shadow:0 14px 44px rgba(0,0,0,.45), 0 0 36px rgba(var(--sec-rgb),.06); }
    .bp-sec-hdr{ display:flex; align-items:center; gap:10px; padding:15px 18px 12px; border-bottom:1px solid var(--au-line); }
    .bp-sec-dot{ width:7px; height:7px; border-radius:50%; background:rgb(var(--sec-rgb)); box-shadow:0 0 10px rgba(var(--sec-rgb),.8); flex-shrink:0; }
    .bp-sec-title{ font-family:var(--au-serif); font-style:italic; font-weight:400; font-size:22px; color:var(--au-ivory); flex:1; line-height:1; }
    .bp-sec-link{ font-family:var(--au-mono); font-size:10px; font-weight:700; letter-spacing:.1em; text-transform:uppercase; color:var(--au-faint); text-decoration:none; transition:color .2s; white-space:nowrap; }
    .bp-sec-link:hover{ color:rgb(var(--sec-rgb)); }
    .bp-sec-body{ padding:16px 18px; }

    /* ── Weight ───────────────────────────────────── */
    .wt-display{ display:flex; align-items:baseline; gap:6px; margin-bottom:14px; }
    .wt-big{ font-family:var(--au-mono); font-size:38px; font-weight:700; color:var(--au-ivory); letter-spacing:-.04em; line-height:1; }
    .wt-unit{ font-size:15px; font-weight:600; color:var(--au-faint); }
    .wt-edit-btn, .wt-save-btn{ margin-left:auto; padding:8px 16px; border-radius:999px; border:none; font-family:var(--au-sans); font-size:12px; font-weight:700; cursor:pointer; transition:opacity .15s; }
    .wt-edit-btn{ background:rgba(var(--sec-rgb),.12); color:rgb(var(--sec-rgb)); border:1px solid rgba(var(--sec-rgb),.3); }
    .wt-save-btn{ background:rgb(var(--sec-rgb)); color:#04130D; box-shadow:0 4px 18px rgba(var(--sec-rgb),.3); }
    .wt-edit-btn:active, .wt-save-btn:active{ opacity:.75; }
    .wt-input-row{ display:flex; align-items:center; gap:8px; margin-bottom:14px; }
    .wt-input{ flex:1; min-width:0; background:rgba(255,255,255,.05); border:1px solid rgba(var(--sec-rgb),.3); border-radius:12px; padding:11px 14px; color:var(--au-ivory); font-family:var(--au-mono); font-size:20px; font-weight:700; text-align:center; outline:none; -webkit-appearance:none; }
    .wt-input:focus{ border-color:rgba(var(--sec-rgb),.65); }
    .wt-no-entry{ font-family:var(--au-serif); font-style:italic; font-size:15px; color:var(--au-dim); margin-bottom:14px; }
    .wt-spark{ display:flex; align-items:flex-end; gap:4px; height:38px; margin-top:6px; }
    .wt-spark-bar{ flex:1; border-radius:3px 3px 0 0; background:rgba(var(--sec-rgb),.25); min-height:4px; transition:height .3s ease; }
    .wt-spark-bar.today{ background:rgb(var(--sec-rgb)); box-shadow:0 0 10px rgba(var(--sec-rgb),.6); }
    .wt-spark-labels{ display:flex; justify-content:space-between; margin-top:5px; font-size:9px; color:var(--au-faint); font-family:var(--au-mono); }
    .hidden{ display:none !important; }

    /* ── Supplements ──────────────────────────────── */
    .supp-progress{ display:flex; align-items:center; gap:8px; margin-bottom:12px; font-family:var(--au-mono); font-size:11px; color:var(--au-dim); letter-spacing:.04em; }
    .supp-prog-bar-wrap{ flex:1; height:5px; background:rgba(255,255,255,.07); border-radius:3px; overflow:hidden; }
    .supp-prog-bar{ height:100%; border-radius:3px; background:rgb(var(--sec-rgb)); box-shadow:0 0 10px rgba(var(--sec-rgb),.5); transition:width .3s; }
    .supp-group{ margin-bottom:12px; }
    .supp-group:last-child{ margin-bottom:0; }
    .supp-group-title{ font-family:var(--au-mono); font-size:9px; font-weight:700; letter-spacing:.14em; text-transform:uppercase; color:var(--au-faint); margin-bottom:8px; }
    .supp-item{ display:flex; align-items:center; gap:10px; padding:9px 0; border-bottom:1px solid rgba(255,255,255,.05); }
    .supp-item:last-child{ border-bottom:none; }
    .supp-check{ width:22px; height:22px; border-radius:7px; flex-shrink:0; border:1.5px solid rgba(var(--sec-rgb),.45); background:transparent; cursor:pointer; display:flex; align-items:center; justify-content:center; font-size:13px; font-weight:700; color:rgb(var(--sec-rgb)); transition:background .15s, border-color .15s, box-shadow .15s; -webkit-tap-highlight-color:transparent; }
    .supp-check.checked{ background:rgba(var(--sec-rgb),.2); border-color:rgba(var(--sec-rgb),.7); box-shadow:0 0 12px rgba(var(--sec-rgb),.4); }
    .supp-name{ font-size:13px; font-weight:600; color:var(--au-ivory); flex:1; line-height:1.3; }
    .supp-item.taken .supp-name{ color:var(--au-dim); text-decoration:line-through; }
    .supp-dose{ font-size:11px; color:var(--au-faint); font-family:var(--au-mono); }
    .supp-why{ font-size:11px; color:var(--au-dim); font-style:italic; font-family:var(--au-serif); line-height:1.35; margin-top:4px; max-width:42ch; }
    .supp-empty{ font-family:var(--au-serif); font-style:italic; font-size:15px; color:var(--au-dim); text-align:center; padding:8px 0; }

    /* ── Water ────────────────────────────────────── */
    .water-main{ display:flex; align-items:center; gap:16px; }
    .water-ring-wrap{ position:relative; width:80px; height:80px; flex-shrink:0; }
    .water-ring-wrap svg{ transform:rotate(-90deg); }
    .water-ring-inner{ position:absolute; inset:0; display:flex; flex-direction:column; align-items:center; justify-content:center; }
    .water-count{ font-family:var(--au-mono); font-size:23px; font-weight:700; color:var(--au-ivory); line-height:1; }
    .water-target-lbl{ font-size:10px; color:var(--au-faint); margin-top:2px; font-family:var(--au-mono); }
    .water-right{ flex:1; }
    .water-unit-lbl{ font-family:var(--au-mono); font-size:10px; letter-spacing:.08em; text-transform:uppercase; color:var(--au-faint); margin-bottom:10px; }
    .water-btns{ display:flex; gap:8px; }
    .water-btn{ flex:1; padding:12px 0; border-radius:999px; border:none; cursor:pointer; font-family:var(--au-sans); font-size:14px; font-weight:700; transition:opacity .15s; -webkit-tap-highlight-color:transparent; }
    .water-btn-minus{ background:rgba(255,255,255,.06); border:1px solid var(--au-line); color:var(--au-dim); font-size:18px; }
    .water-btn-plus{ background:rgb(var(--sec-rgb)); color:#04130D; box-shadow:0 4px 18px rgba(var(--sec-rgb),.3); }
    .water-btn:active{ opacity:.7; }

    /* ── Caffeine ─────────────────────────────────── */
    .caf-top{ display:flex; align-items:baseline; gap:6px; margin-bottom:12px; }
    .caf-total{ font-family:var(--au-mono); font-size:34px; font-weight:700; color:var(--au-ivory); letter-spacing:-.04em; }
    .caf-unit{ font-size:13px; font-weight:600; color:var(--au-faint); font-family:var(--au-mono); }
    .caf-bar-wrap{ height:5px; background:rgba(255,255,255,.07); border-radius:3px; overflow:hidden; margin-bottom:14px; }
    .caf-bar-fill{ height:100%; border-radius:3px; background:rgb(var(--sec-rgb)); transition:width .4s; }
    .caf-quick{ display:flex; flex-wrap:wrap; gap:7px; margin-bottom:14px; }
    .caf-quick-btn{ padding:8px 13px; border-radius:999px; border:1px solid rgba(var(--sec-rgb),.28); background:rgba(var(--sec-rgb),.08); color:rgb(var(--sec-rgb)); font-family:var(--au-sans); font-size:12px; font-weight:600; cursor:pointer; transition:background .15s; -webkit-tap-highlight-color:transparent; }
    .caf-quick-btn:active{ background:rgba(var(--sec-rgb),.22); }
    .caf-log{ display:flex; flex-direction:column; gap:1px; }
    .caf-entry{ display:flex; align-items:center; gap:8px; padding:9px 0; border-bottom:1px solid rgba(255,255,255,.05); }
    .caf-entry:last-child{ border-bottom:none; }
    .caf-entry-emo{ font-size:15px; line-height:1; }
    .caf-entry-name{ font-size:12px; font-weight:600; color:var(--au-ivory); flex:1; }
    .caf-entry-time{ font-size:11px; color:var(--au-faint); font-family:var(--au-mono); }
    .caf-entry-mg{ font-family:var(--au-mono); font-size:12px; font-weight:700; color:rgb(var(--sec-rgb)); background:rgba(var(--sec-rgb),.12); padding:2px 8px; border-radius:6px; }
    .caf-del{ background:none; border:none; color:var(--au-faint); font-size:16px; cursor:pointer; padding:2px 4px; line-height:1; }
    .caf-del:active{ color:var(--au-rose); }
    .caf-empty{ font-family:var(--au-serif); font-style:italic; font-size:15px; color:var(--au-dim); }

    /* ── Nutrition ────────────────────────────────── */
    .nut-top{ display:flex; align-items:center; gap:16px; margin-bottom:14px; }
    .nut-cal-wrap{ width:80px; height:80px; position:relative; flex-shrink:0; }
    .nut-cal-wrap svg{ transform:rotate(-90deg); }
    .nut-cal-inner{ position:absolute; inset:0; display:flex; flex-direction:column; align-items:center; justify-content:center; }
    .nut-cal-num{ font-family:var(--au-mono); font-size:18px; font-weight:700; color:var(--au-ivory); line-height:1.1; }
    .nut-cal-denom{ font-size:9px; color:var(--au-faint); font-family:var(--au-mono); }
    .nut-macros{ flex:1; display:flex; flex-direction:column; gap:7px; }
    .nut-macro-row{ display:flex; align-items:center; gap:8px; }
    .nut-macro-lbl{ font-family:var(--au-mono); font-size:10px; font-weight:700; letter-spacing:.06em; text-transform:uppercase; color:var(--au-faint); width:14px; }
    .nut-macro-bar-wrap{ flex:1; height:5px; background:rgba(255,255,255,.07); border-radius:3px; overflow:hidden; }
    .nut-macro-bar{ height:100%; border-radius:3px; transition:width .4s; }
    .nut-macro-val{ font-family:var(--au-mono); font-size:11px; font-weight:700; color:var(--au-dim); width:34px; text-align:right; }
    .nut-meals{ display:flex; flex-direction:column; gap:1px; margin-bottom:12px; }
    .nut-meal{ display:flex; align-items:center; gap:8px; padding:9px 0; border-bottom:1px solid rgba(255,255,255,.05); }
    .nut-meal:last-child{ border-bottom:none; }
    .nut-meal-name{ font-size:13px; font-weight:600; color:var(--au-ivory); flex:1; }
    .nut-meal-kcal{ font-family:var(--au-mono); font-size:12px; font-weight:700; color:rgb(var(--sec-rgb)); }
    .nut-log-btn{ display:block; width:100%; padding:12px; border-radius:999px; text-align:center; background:rgb(var(--sec-rgb)); color:#04130D; font-family:var(--au-sans); font-size:13px; font-weight:700; text-decoration:none; cursor:pointer; box-shadow:0 4px 18px rgba(var(--sec-rgb),.3); transition:opacity .15s; }
    .nut-log-btn:active{ opacity:.8; }
    .nut-empty{ font-family:var(--au-serif); font-style:italic; font-size:15px; color:var(--au-dim); margin-bottom:12px; }
  </style>
</head>
<body data-page="body" class="au-bg au-mood-calm" id="root">

  <!-- Hero -->
  <div class="bp-hero">
    <div>
      <div class="au-eyebrow bp-hero-eyebrow"><span class="au-dot"></span>BODY<span class="au-sep">&middot;</span><span id="heroDate">TODAY</span></div>
      <p class="bp-hero-line" id="novaSays">Everything in one place.</p>
    </div>
    <div class="nova" id="nova" aria-hidden="true">
      <svg viewBox="0 0 100 100">
        <defs><linearGradient id="novaGradBody" x1="0" y1="0" x2="1" y2="1">
          <stop offset="0%" stop-color="#34E2B0"/><stop offset="100%" stop-color="#9B8CFF"/>
        </linearGradient></defs>
        <g class="nova-glow">
          <rect x="22" y="22" width="56" height="56" rx="16" transform="rotate(45 50 50)" fill="url(#novaGradBody)" opacity="0.95"/>
          <circle class="nova-eye" cx="42" cy="50" r="5.5" fill="#04130D"/>
          <circle class="nova-eye" cx="58" cy="50" r="5.5" fill="#04130D"/>
          <circle cx="43.4" cy="48.5" r="1.6" fill="#fff"/>
          <circle cx="59.4" cy="48.5" r="1.6" fill="#fff"/>
        </g>
      </svg>
    </div>
  </div>

  <!-- Snapshot bar -->
  <div class="snap-bar">
    <div class="snap-item"><div class="snap-val" id="snapWt">&mdash;</div><div class="snap-lbl">weight</div></div>
    <div class="snap-item"><div class="snap-val" id="snapH2O">0</div><div class="snap-lbl">water</div></div>
    <div class="snap-item"><div class="snap-val" id="snapCaf">0</div><div class="snap-lbl">mg caf</div></div>
    <div class="snap-item"><div class="snap-val" id="snapKcal">0</div><div class="snap-lbl">kcal</div></div>
  </div>

  <div class="bp-wrap" data-am-reveal-group>

    <!-- Weight -->
    <section class="bp-sec" style="--sec-rgb:52,226,176">
      <div class="bp-sec-hdr"><span class="bp-sec-dot"></span><span class="bp-sec-title">Weight</span><a href="weight.html" class="bp-sec-link">Full view &rarr;</a></div>
      <div class="bp-sec-body" id="wtBody"></div>
    </section>

    <!-- Measurements -->
    <section class="bp-sec" style="--sec-rgb:24,200,192">
      <div class="bp-sec-hdr"><span class="bp-sec-dot"></span><span class="bp-sec-title">Measurements</span><a href="measure.html" class="bp-sec-link">Full view &rarr;</a></div>
      <div class="bp-sec-body" id="measBody"></div>
    </section>

    <!-- Supplements -->
    <section class="bp-sec" style="--sec-rgb:155,140,255">
      <div class="bp-sec-hdr"><span class="bp-sec-dot"></span><span class="bp-sec-title">Supplements</span><a href="health.html" class="bp-sec-link">Full view &rarr;</a></div>
      <div class="bp-sec-body" id="suppBody"></div>
    </section>

    <!-- Water -->
    <section class="bp-sec" style="--sec-rgb:24,200,192">
      <div class="bp-sec-hdr"><span class="bp-sec-dot"></span><span class="bp-sec-title">Water</span><a href="po-water.html" class="bp-sec-link">Full view &rarr;</a></div>
      <div class="bp-sec-body" id="h2oBody"></div>
    </section>

    <!-- Caffeine -->
    <section class="bp-sec" style="--sec-rgb:242,192,99">
      <div class="bp-sec-hdr"><span class="bp-sec-dot"></span><span class="bp-sec-title">Caffeine</span><a href="caffeine.html" class="bp-sec-link">Full view &rarr;</a></div>
      <div class="bp-sec-body" id="cafBody"></div>
    </section>

    <!-- Nutrition -->
    <section class="bp-sec" style="--sec-rgb:52,226,176">
      <div class="bp-sec-hdr"><span class="bp-sec-dot"></span><span class="bp-sec-title">Nutrition</span><a href="nutrition.html" class="bp-sec-link">Full view &rarr;</a></div>
      <div class="bp-sec-body" id="nutBody"></div>
    </section>

  </div>

  <script>
  (function () {
    'use strict';

    /* ── Helpers ──────────────────────────────────────── */
    function dateKey(d) {
      return d.getFullYear() + '-' +
        String(d.getMonth() + 1).padStart(2, '0') + '-' +
        String(d.getDate()).padStart(2, '0');
    }
    function today() { return dateKey(new Date()); }
    function suppToday() {
      const n = new Date();
      if (n.getHours() < 6) n.setDate(n.getDate() - 1);
      return dateKey(n);
    }
    function ls(k) { try { return JSON.parse(localStorage.getItem(k)); } catch(e) { return null; } }
    function lsSave(k, v) { try { localStorage.setItem(k, JSON.stringify(v)); } catch(e) {} }
    function esc(s) {
      return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }
    function fmtTime(ts) {
      const d = new Date(ts);
      let h = d.getHours(), m = d.getMinutes();
      const ampm = h >= 12 ? 'pm' : 'am';
      h = h % 12 || 12;
      return h + ':' + String(m).padStart(2,'0') + ampm;
    }
    function r0(n) { return Math.round(n || 0); }

    /* ── Update snapshot bar ─────────────────────────── */
    function updateSnap() {
      // Weight
      const wEntries = ls('po_coach_weights') || [];
      const todayWt = wEntries.find(e => e.dateKey === today());
      const units = (ls('po_coach_v1') || {}).units || 'kg';
      document.getElementById('snapWt').textContent = todayWt
        ? todayWt.weight.toFixed(1) + units : '—';

      // Water
      const ws = ls('po_water_v1') || {};
      const wLogs = ws.logs || {};
      const wCount = wLogs[today()] || 0;
      document.getElementById('snapH2O').textContent = wCount;

      // Caffeine
      const dawn = new Date(); dawn.setHours(0,0,0,0);
      const cafLogs = (ls('caf:logs') || []).filter(l => new Date(l.ts) >= dawn);
      const cafTotal = cafLogs.reduce((s,l) => s + l.mg, 0);
      document.getElementById('snapCaf').textContent = cafTotal;

      // Nutrition
      const nutLogs = (ls('nut:logs') || []).filter(l => new Date(l.ts) >= dawn);
      const kcalTotal = r0(nutLogs.reduce((s,l) => s + (l.kcal||0), 0));
      document.getElementById('snapKcal').textContent = kcalTotal;
    }

    /* ══════════════════════════════════════════════════
       WEIGHT
    ══════════════════════════════════════════════════ */
    function renderWeight() {
      const KEY = 'po_coach_weights';
      let entries = ls(KEY) || [];
      if (!Array.isArray(entries)) entries = [];
      entries.sort((a,b) => a.dateKey.localeCompare(b.dateKey));
      const tod = today();
      const todayEntry = entries.find(e => e.dateKey === tod);
      const units = (ls('po_coach_v1') || {}).units || 'kg';
      const recent = entries.slice(-10);

      let html = '';

      if (todayEntry) {
        html += `<div class="wt-display" id="wtLocked">
          <span class="wt-big">${todayEntry.weight.toFixed(1)}</span>
          <span class="wt-unit">${esc(units)}</span>
          <button class="wt-edit-btn" id="wtEditBtn">Edit</button>
        </div>`;
        html += `<div class="wt-input-row hidden" id="wtInputRow">
          <input type="text" class="wt-input" id="wtInput" value="${todayEntry.weight.toFixed(1)}" inputmode="decimal" pattern="[0-9]*[.,]?[0-9]*" enterkeyhint="done">
          <button class="wt-save-btn" id="wtSaveBtn">Save</button>
        </div>`;
      } else {
        html += `<p class="wt-no-entry">No entry yet today</p>`;
        html += `<div class="wt-input-row" id="wtInputRow">
          <input type="text" class="wt-input" id="wtInput" placeholder="0.0" inputmode="decimal" pattern="[0-9]*[.,]?[0-9]*" enterkeyhint="done">
          <button class="wt-save-btn" id="wtSaveBtn">Save</button>
        </div>`;
      }

      if (recent.length > 1) {
        const vals = recent.map(e => e.weight);
        const min = Math.min(...vals), max = Math.max(...vals);
        const range = max - min || 0.1;
        html += '<div class="wt-spark">';
        recent.forEach(e => {
          const h = Math.round(((e.weight - min) / range) * 28 + 4);
          const isT = e.dateKey === tod;
          html += `<div class="wt-spark-bar${isT?' today':''}" style="height:${h}px" title="${e.dateKey}: ${e.weight}${units}"></div>`;
        });
        html += '</div>';
        const first = recent[0], last = recent[recent.length - 1];
        html += `<div class="wt-spark-labels"><span>${first.dateKey.slice(5)}</span><span>${last.dateKey.slice(5)}</span></div>`;
      }

      document.getElementById('wtBody').innerHTML = html;

      // Wire edit
      const editBtn = document.getElementById('wtEditBtn');
      const inputRow = document.getElementById('wtInputRow');
      const locked = document.getElementById('wtLocked');
      const inp = document.getElementById('wtInput');
      const saveBtn = document.getElementById('wtSaveBtn');

      if (editBtn) {
        editBtn.addEventListener('click', () => {
          locked.classList.add('hidden');
          inputRow.classList.remove('hidden');
          inp.focus(); inp.select();
        });
      }
      if (saveBtn) {
        const doSave = () => {
          // Accept "70.5" or "70,5" — iOS decimal pads vary by locale.
          const v = parseFloat(String(inp.value).trim().replace(',', '.'));
          if (isNaN(v) || v <= 0 || v > 500) return;
          const w = Math.round(v * 10) / 10;
          const idx = entries.findIndex(e => e.dateKey === tod);
          if (idx >= 0) { entries[idx].weight = w; entries[idx].ts = Date.now(); }
          else entries.push({ dateKey: tod, weight: w, ts: Date.now() });
          entries.sort((a,b) => a.dateKey.localeCompare(b.dateKey));
          lsSave(KEY, entries);
          renderWeight();
          updateSnap();
        };
        saveBtn.addEventListener('click', doSave);
        inp.addEventListener('keydown', e => { if (e.key === 'Enter') { e.preventDefault(); doSave(); } });
        // Keep only digits and a single separator while typing.
        inp.addEventListener('input', () => {
          const clean = inp.value.replace(/[^0-9.,]/g, '').replace(/([.,]).*?([.,])/g, '$1');
          if (clean !== inp.value) inp.value = clean;
        });
      }

      updateSnap();
    }

    /* ══════════════════════════════════════════════════
       SUPPLEMENTS
    ══════════════════════════════════════════════════ */
    function renderSupps() {
      const items = ls('stack:items') || [];
      const takenKey = 'stack:taken:' + suppToday();
      const taken = ls(takenKey) || {};
      const el = document.getElementById('suppBody');

      if (!items.length) {
        el.innerHTML = '<p class="supp-empty">No supplements added yet. Set them up in the full view.</p>';
        return;
      }

      // "occasional" items are only-if-needed — don't count them in the daily goal
      const dailyItems = items.filter(i => (i.window || 'anytime') !== 'occasional');
      const takenCount = dailyItems.filter(i => !!taken[i.id]).length;
      const pct = dailyItems.length > 0 ? (takenCount / dailyItems.length) * 100 : 0;

      const WINDOWS = ['morning','lunch','afternoon','evening','night','anytime','occasional'];
      const LABELS  = {morning:'Morning',lunch:'Midday',afternoon:'Afternoon',evening:'Evening',night:'Night',anytime:'Anytime',occasional:'Occasional · only if needed'};

      let html = `<div class="supp-progress">
        <span>${takenCount}/${dailyItems.length} taken</span>
        <div class="supp-prog-bar-wrap">
          <div class="supp-prog-bar" style="width:${pct.toFixed(1)}%"></div>
        </div>
      </div>`;

      WINDOWS.forEach(win => {
        const group = items.filter(i => (i.window || 'anytime') === win);
        if (!group.length) return;
        html += `<div class="supp-group"><div class="supp-group-title">${LABELS[win]}</div>`;
        const isOcc = win === 'occasional';
        group.forEach(item => {
          const isTaken = !!taken[item.id];
          html += `<div class="supp-item${isTaken?' taken':''}">
            <button class="supp-check${isTaken?' checked':''}" data-id="${esc(item.id)}">${isTaken?'✓':''}</button>
            <div>
              <div class="supp-name">${esc(item.name)}</div>
              ${item.dose ? `<div class="supp-dose">${esc(item.dose)}</div>` : ''}
              ${isOcc && item.note ? `<div class="supp-why">${esc(item.note)}</div>` : ''}
            </div>
          </div>`;
        });
        html += '</div>';
      });

      el.innerHTML = html;

      el.querySelectorAll('.supp-check').forEach(btn => {
        btn.addEventListener('click', () => {
          const id = btn.dataset.id;
          const cur = ls(takenKey) || {};
          if (cur[id]) delete cur[id];
          else cur[id] = Date.now();
          lsSave(takenKey, cur);
          renderSupps();
        });
      });
    }

    /* ══════════════════════════════════════════════════
       WATER
    ══════════════════════════════════════════════════ */
    function renderWater() {
      const state = ls('po_water_v1') || {};
      const logs = (state.logs && typeof state.logs === 'object') ? state.logs : {};
      const count = logs[today()] || 0;
      const unit = state.unit || 'glass';
      const unitMl = unit === 'glass' ? (state.glassMl || 250)
                   : unit === 'oz' ? 30
                   : (state.bottleMl || 500);
      const unitName = unit === 'glass' ? 'glasses' : unit === 'oz' ? 'oz' : 'bottles';
      const wKg = (state.profile && state.profile.weightKg) || 75;
      const actHrs = (state.profile && state.profile.activityHrsPerWeek) || 0;
      const targetMl = wKg * 35 + actHrs * 500;
      const target = Math.max(1, Math.ceil(targetMl / unitMl));
      const pct = Math.min(100, (count / target) * 100);

      const R = 32, C = 2 * Math.PI * R;
      const offset = C - (pct / 100) * C;
      const ringColor = pct >= 100 ? '#34E2B0' : '#18C8C0';

      document.getElementById('h2oBody').innerHTML = `
        <div class="water-main">
          <div class="water-ring-wrap">
            <svg width="80" height="80" viewBox="0 0 80 80">
              <circle cx="40" cy="40" r="${R}" fill="none" stroke="rgba(255,255,255,0.07)" stroke-width="8"/>
              <circle class="am-ring" cx="40" cy="40" r="${R}" fill="none"
                stroke="${ringColor}" stroke-width="8" stroke-linecap="round"
                stroke-dasharray="${C.toFixed(2)}" stroke-dashoffset="${offset.toFixed(2)}"/>
            </svg>
            <div class="water-ring-inner">
              <div class="water-count" id="h2oCount">${count}</div>
              <div class="water-target-lbl">/ ${target}</div>
            </div>
          </div>
          <div class="water-right">
            <div class="water-unit-lbl">${unitName} today</div>
            <div class="water-btns">
              <button class="water-btn water-btn-minus" id="h2oMinus">−</button>
              <button class="water-btn water-btn-plus" id="h2oPlus">+ ${unit === 'glass' ? 'Glass' : unit === 'oz' ? 'Oz' : 'Bottle'}</button>
            </div>
          </div>
        </div>`;

      if(window.AuroraMotion){ var _wr=document.getElementById('h2oBody').querySelector('.am-ring'); if(_wr) AuroraMotion.ring(_wr, pct/100, 'body-water'); }
      document.getElementById('h2oPlus').addEventListener('click', () => {
        const s = ls('po_water_v1') || {};
        if (!s.logs) s.logs = {};
        const t = today();
        s.logs[t] = (s.logs[t] || 0) + 1;
        lsSave('po_water_v1', s);
        renderWater(); updateSnap();
      });
      document.getElementById('h2oMinus').addEventListener('click', () => {
        const s = ls('po_water_v1') || {};
        if (!s.logs) s.logs = {};
        const t = today();
        const cur = s.logs[t] || 0;
        if (cur <= 0) return;
        s.logs[t] = cur - 1;
        lsSave('po_water_v1', s);
        renderWater(); updateSnap();
      });

      updateSnap();
    }

    /* ══════════════════════════════════════════════════
       CAFFEINE
    ══════════════════════════════════════════════════ */
    const CAF_LIMIT = 400;
    const CAF_QUICK = [
      {name:'Espresso', mg:63, emoji:'☕'},
      {name:'Double espresso', mg:126, emoji:'☕'},
      {name:'Drip coffee', mg:95, emoji:'☕'},
      {name:'Matcha', mg:70, emoji:'🍵'},
      {name:'Energy drink', mg:160, emoji:'⚡'},
    ];

    function getCafLogs() {
      const dawn = new Date(); dawn.setHours(0,0,0,0);
      return (ls('caf:logs') || []).filter(l => new Date(l.ts) >= dawn);
    }
    function saveCafLogs(logs) { lsSave('caf:logs', logs); }

    function renderCaffeine() {
      const logs = getCafLogs();
      const total = logs.reduce((s,l) => s + l.mg, 0);
      const pct = Math.min(100, (total / CAF_LIMIT) * 100);
      const barColor = pct >= 90 ? '#FF6B8B' : pct >= 70 ? '#F2C063' : 'rgba(242,192,99,0.7)';

      let logHtml = '';
      if (logs.length) {
        logHtml = '<div class="caf-log">' + logs.slice().reverse().map(l =>
          `<div class="caf-entry">
            <span class="caf-entry-emo">${esc(l.emoji||'☕')}</span>
            <span class="caf-entry-name">${esc(l.name)}</span>
            <span class="caf-entry-time">${fmtTime(l.ts)}</span>
            <span class="caf-entry-mg">${l.mg}mg</span>
            <button class="caf-del" data-id="${l.id}">×</button>
          </div>`
        ).join('') + '</div>';
      } else {
        logHtml = '<p class="caf-empty">No caffeine logged today</p>';
      }

      document.getElementById('cafBody').innerHTML = `
        <div class="caf-top">
          <span class="caf-total">${total}</span>
          <span class="caf-unit">/ ${CAF_LIMIT} mg</span>
        </div>
        <div class="caf-bar-wrap"><div class="caf-bar-fill" style="width:${pct.toFixed(1)}%;background:${barColor}"></div></div>
        <div class="caf-quick">${CAF_QUICK.map(d =>
          `<button class="caf-quick-btn" data-name="${esc(d.name)}" data-mg="${d.mg}" data-emoji="${esc(d.emoji)}">${d.emoji} ${d.name} <span style="opacity:.6">${d.mg}mg</span></button>`
        ).join('')}</div>
        ${logHtml}`;

      document.querySelectorAll('.caf-quick-btn').forEach(btn => {
        btn.addEventListener('click', () => {
          const all = ls('caf:logs') || [];
          all.push({ id: Date.now(), name: btn.dataset.name, mg: +btn.dataset.mg, emoji: btn.dataset.emoji, ts: new Date().toISOString() });
          saveCafLogs(all);
          renderCaffeine(); updateSnap();
        });
      });
      document.querySelectorAll('.caf-del').forEach(btn => {
        btn.addEventListener('click', () => {
          const all = ls('caf:logs') || [];
          const id = +btn.dataset.id;
          saveCafLogs(all.filter(l => l.id !== id));
          renderCaffeine(); updateSnap();
        });
      });

      updateSnap();
    }

    /* ══════════════════════════════════════════════════
       NUTRITION
    ══════════════════════════════════════════════════ */
    function renderNutrition() {
      const dawn = new Date(); dawn.setHours(0,0,0,0);
      const logs = (ls('nut:logs') || []).filter(l => new Date(l.ts) >= dawn);
      const prof = ls('nut:profile') || {};

      const tot = logs.reduce((a,l) => ({
        kcal: a.kcal + (l.kcal||0),
        p: a.p + (l.p||0),
        c: a.c + (l.c||0),
        f: a.f + (l.f||0)
      }), {kcal:0,p:0,c:0,f:0});

      // Estimate calorie target (same rough formula as nutrition.html)
      const cm  = prof.heightCm || 175;
      const age = prof.age || 22;
      const sex = prof.sex || 'm';
      const wKg = prof.weightKg || 75;
      const bmr = sex === 'f'
        ? 10 * wKg + 6.25 * cm - 5 * age - 161
        : 10 * wKg + 6.25 * cm - 5 * age + 5;
      const acts = {sedentary:1.2,light:1.375,moderate:1.55,active:1.725,very_active:1.9};
      let tdee = bmr * (acts[prof.activityLevel] || 1.55);
      if (prof.tdeeOverride) tdee = prof.tdeeOverride;
      const goal = prof.goal || 'cut';
      let calTarget = goal === 'cut' ? Math.max(bmr + 200, tdee - 500)
                    : goal === 'mini_cut' ? Math.max(bmr + 200, tdee - 300)
                    : goal === 'bulk' ? tdee + 250 : tdee;
      calTarget = Math.round(calTarget);

      const macroTargets = { p: Math.round(calTarget * 0.30 / 4), c: Math.round(calTarget * 0.45 / 4), f: Math.round(calTarget * 0.25 / 9) };
      const calPct = Math.min(100, (tot.kcal / calTarget) * 100);
      const CAL_R = 32, CAL_C = 2 * Math.PI * CAL_R;
      const calOff = CAL_C - (calPct / 100) * CAL_C;
      const calColor = calPct >= 105 ? '#fb7185' : calPct >= 90 ? '#F2C063' : '#34D399';

      let mealsHtml = '';
      if (logs.length) {
        mealsHtml = '<div class="nut-meals">' + logs.slice().reverse().slice(0,6).map(l =>
          `<div class="nut-meal">
            <span class="nut-meal-name">${esc(l.name)}</span>
            <span class="nut-meal-kcal">${r0(l.kcal)} kcal</span>
          </div>`
        ).join('') + '</div>';
      } else {
        mealsHtml = '<p class="nut-empty">No meals logged today</p>';
      }

      const macroRow = (label, val, target, color) => {
        const pct = target > 0 ? Math.min(100, (val/target)*100) : 0;
        return `<div class="nut-macro-row">
          <span class="nut-macro-lbl">${label}</span>
          <div class="nut-macro-bar-wrap"><div class="nut-macro-bar" style="width:${pct.toFixed(1)}%;background:${color}"></div></div>
          <span class="nut-macro-val">${r0(val)}g</span>
        </div>`;
      };

      document.getElementById('nutBody').innerHTML = `
        <div class="nut-top">
          <div class="nut-cal-wrap">
            <svg width="80" height="80" viewBox="0 0 80 80">
              <circle cx="40" cy="40" r="${CAL_R}" fill="none" stroke="rgba(255,255,255,0.07)" stroke-width="8"/>
              <circle class="am-ring" cx="40" cy="40" r="${CAL_R}" fill="none"
                stroke="${calColor}" stroke-width="8" stroke-linecap="round"
                stroke-dasharray="${CAL_C.toFixed(2)}" stroke-dashoffset="${calOff.toFixed(2)}"/>
            </svg>
            <div class="nut-cal-inner">
              <div class="nut-cal-num">${r0(tot.kcal)}</div>
              <div class="nut-cal-denom">/ ${calTarget}</div>
            </div>
          </div>
          <div class="nut-macros">
            ${macroRow('P', tot.p, macroTargets.p, '#7DD3FC')}
            ${macroRow('C', tot.c, macroTargets.c, '#F2C063')}
            ${macroRow('F', tot.f, macroTargets.f, '#F87171')}
          </div>
        </div>
        ${mealsHtml}
        <a href="nutrition.html" class="nut-log-btn">+ Log meal</a>`;
      if(window.AuroraMotion){ var _cr=document.getElementById('nutBody').querySelector('.am-ring'); if(_cr) AuroraMotion.ring(_cr, (CAL_C ? 1 - calOff/CAL_C : 0), 'body-cal'); }
      updateSnap();
    }

    /* ── Boot ─────────────────────────────────────────── */
    /* ══════════════════════════════════════════════════
       MEASUREMENTS (summary — full page is measure.html)
    ══════════════════════════════════════════════════ */
    function renderMeasure() {
      const el = document.getElementById('measBody');
      if (!el) return;
      let logs = ls('bm:logs') || [];
      if (!Array.isArray(logs)) logs = [];
      logs = logs.filter(e => e && e.dateKey).sort((a,b) => a.dateKey.localeCompare(b.dateKey));
      if (!logs.length) {
        el.innerHTML = '<p style="color:var(--au-dim);font-size:13px;line-height:1.5;margin:0">No measurements yet — track waist, chest &amp; arms over time (the real recomp signal). <a href="measure.html" style="color:rgb(24,200,192);text-decoration:none;font-weight:600">Add your first &rarr;</a></p>';
        return;
      }
      const latest = k => { for (let i = logs.length - 1; i >= 0; i--) if (logs[i][k] != null) return logs[i][k]; return null; };
      const fmt = n => n == null ? '—' : (n % 1 === 0 ? n.toFixed(0) : n.toFixed(1));
      const waist = latest('waist'), chest = latest('chest'), sh = latest('shoulders'), arm = latest('arm');
      const vt = (sh != null && waist != null && waist > 0) ? (sh / waist).toFixed(2) : null;
      const stats = [];
      if (waist != null) stats.push(['Waist', fmt(waist) + ' cm']);
      if (chest != null) stats.push(['Chest', fmt(chest) + ' cm']);
      if (arm != null)   stats.push(['Arm',   fmt(arm)   + ' cm']);
      if (vt != null)    stats.push(['V-taper', vt]);
      const cells = stats.slice(0, 4).map(s =>
        '<div style="text-align:center;padding:10px 4px;background:rgba(255,255,255,.03);border:1px solid var(--au-line);border-radius:12px">' +
          '<div style="font-family:var(--au-mono);font-size:16px;font-weight:700;color:var(--au-ivory);letter-spacing:-.02em">' + esc(s[1]) + '</div>' +
          '<div style="font-family:var(--au-mono);font-size:8px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--au-faint);margin-top:4px">' + esc(s[0]) + '</div>' +
        '</div>').join('');
      const lastKey = logs[logs.length - 1].dateKey;
      const md = lastKey.split('-');
      const mName = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'][(+md[1]) - 1];
      el.innerHTML =
        '<div style="display:grid;grid-template-columns:repeat(' + Math.max(1, Math.min(stats.length, 4)) + ',1fr);gap:8px">' + cells + '</div>' +
        '<div style="font-family:var(--au-mono);font-size:9px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--au-faint);margin-top:11px">Last logged ' + (+md[2]) + ' ' + mName + ' · ' + logs.length + ' ' + (logs.length === 1 ? 'entry' : 'entries') + '</div>';
    }

    function renderAllSections() {
      renderWeight();
      renderMeasure();
      renderSupps();
      renderWater();
      renderCaffeine();
      renderNutrition();
    }
    renderAllSections();

    // Exposed so pocoach-sync.js can refresh the weight UI when a
    // weigh-in arrives from another device via Realtime/polling.
    window._bodyRerender = renderAllSections;

    // Re-render all sections when returning from another page / iOS resume
    document.addEventListener('visibilitychange', () => {
      if (document.visibilityState === 'visible') {
        renderAllSections();
      }
    });

    // Storage events from other tabs/pages
    window.addEventListener('storage', () => {
      renderAllSections();
    });
  })();
  </script>

  <!-- Cross-device sync for weigh-ins (shared with gym.html) -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="pocoach-sync.js?v=2"></script>
  <!-- Water lives in the 'health' row and caffeine in the 'caffeine' row.
       body.html logs both, so it must sync those rows too (same engine, same
       rows as health.html / caffeine.html) — otherwise water/caffeine logged
       here never leave the device. pocoach-sync above still owns weights. -->
  <script src="sync.js"></script>
  <script>
    (function () {
      if (typeof window.initCloudSync !== 'function') return;
      function rerender(){ if (typeof window._bodyRerender === 'function') { try { window._bodyRerender(); } catch (e) {} } }
      window.initCloudSync({ appKey: 'health',   syncedKeys: ['stack:items', 'stack:low', 'po_water_v1'], syncedPrefixes: ['stack:taken:'], onApplied: rerender });
      window.initCloudSync({ appKey: 'caffeine', syncedKeys: ['caf:logs', 'caf:custom'], onApplied: rerender });
      window.initCloudSync({ appKey: 'body-measure', syncedKeys: ['bm:logs'], onApplied: rerender });
    })();
  </script>

  <!-- Nova: time-aware greeting + reactive mood glow (reads your real data) -->
  <script>
  (function () {
    function ls(k){ try { return JSON.parse(localStorage.getItem(k)); } catch(e){ return null; } }
    function tk(){ var d=new Date(); return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0'); }
    function update(){
      var root = document.getElementById('root'); if(!root) return;
      var h = new Date().getHours();
      var dd = new Date();
      var dEl = document.getElementById('heroDate');
      if(dEl) dEl.textContent = ['SUN','MON','TUE','WED','THU','FRI','SAT'][dd.getDay()] + ' ' + dd.getDate();

      var wts = ls('po_coach_weights') || [];
      var wToday = Array.isArray(wts) && wts.some(function(e){ return e && e.dateKey === tk(); });
      var pw = ls('po_water_v1') || {};
      var wc = ((pw.logs||{})[tk()]) || 0;
      var dawn = new Date(); dawn.setHours(0,0,0,0);
      var caf = (ls('caf:logs')||[]).filter(function(l){ return new Date(l.ts) >= dawn; }).reduce(function(s,l){ return s + (l.mg||0); }, 0);
      var kcal = (ls('nut:logs')||[]).filter(function(l){ return new Date(l.ts) >= dawn; }).reduce(function(s,l){ return s + (l.kcal||0); }, 0);

      var logged = (wToday?1:0) + (wc>0?1:0) + (caf>0?1:0) + (kcal>0?1:0);
      var mood = 'calm', line = 'Everything in one place. Let’s check in.';
      if (h < 12 && logged === 0) { mood='low';   line='A fresh day. Start with a weigh-in or some water.'; }
      else if (caf >= 400)        { mood='alert'; line='That’s a lot of caffeine today — ease off and hydrate.'; }
      else if (logged >= 3)       { mood='hot';   line='You’re on top of it today. Keep the streak alive.'; }
      else if (wToday)            { mood='hot';   line='Weight’s in. Nice and consistent.'; }
      else                        { mood='calm';  line='Looking good — a few things left to log.'; }

      root.classList.remove('au-mood-calm','au-mood-hot','au-mood-alert','au-mood-low');
      root.classList.add('au-mood-' + mood);
      var ns = document.getElementById('novaSays'); if(ns) ns.textContent = line;
    }
    update();
    document.addEventListener('visibilitychange', function(){ if(!document.hidden) update(); });
    window.addEventListener('storage', update);
    window.addEventListener('focus', update);
    setInterval(update, 30000);
  })();
  </script>

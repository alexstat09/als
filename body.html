<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>Body · ALS</title>
  <meta name="theme-color" content="#050506">
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="apple-touch-icon.png">
  <script src="topbar.js" defer></script>
  <style>
    :root {
      --font: -apple-system, BlinkMacSystemFont, "Inter", "Segoe UI", Roboto, sans-serif;
      --font-mono: ui-monospace, "SF Mono", Menlo, Consolas, monospace;
      --bg: #050506;
      --surface: rgba(255,255,255,0.035);
      --border: rgba(255,255,255,0.07);
      --text-primary: #FAFAFA;
      --text-secondary: rgba(255,255,255,0.55);
      --text-tertiary: rgba(255,255,255,0.30);
      --success: #6BE3A4;
      --warning: #F2C063;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body {
      background: var(--bg); color: var(--text-secondary);
      font-family: var(--font); -webkit-font-smoothing: antialiased;
      -webkit-text-size-adjust: 100%; min-height: 100%;
    }

    /* ── Snapshot bar ─────────────────────────────── */
    .snap-bar {
      position: sticky; top: 0; z-index: 30;
      display: grid; grid-template-columns: repeat(4, 1fr);
      background: rgba(5,5,6,0.92);
      border-bottom: 1px solid var(--border);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
    }
    .snap-item {
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      padding: 10px 4px;
      border-right: 1px solid var(--border);
    }
    .snap-item:last-child { border-right: none; }
    .snap-val {
      font-family: var(--font-mono); font-size: 15px; font-weight: 700;
      color: var(--text-primary); letter-spacing: -0.02em; line-height: 1.1;
    }
    .snap-lbl {
      font-size: 9px; font-weight: 700; letter-spacing: 0.07em;
      text-transform: uppercase; color: var(--text-tertiary); margin-top: 2px;
    }

    /* ── Page wrap ────────────────────────────────── */
    .bp-wrap {
      padding: 12px 14px calc(80px + env(safe-area-inset-bottom));
      display: flex; flex-direction: column; gap: 12px;
      max-width: 600px; margin: 0 auto;
    }

    /* ── Section card ─────────────────────────────── */
    .bp-sec {
      background: var(--surface);
      border: 1px solid var(--border);
      border-left: 3px solid rgba(var(--sec-rgb), 0.6);
      border-radius: 16px;
      overflow: hidden;
    }
    .bp-sec-hdr {
      display: flex; align-items: center; gap: 8px;
      padding: 14px 16px 12px;
      border-bottom: 1px solid var(--border);
    }
    .bp-sec-icon { font-size: 18px; line-height: 1; flex-shrink: 0; }
    .bp-sec-title {
      font-size: 13px; font-weight: 800; letter-spacing: 0.04em;
      text-transform: uppercase; color: rgba(var(--sec-rgb), 0.9); flex: 1;
    }
    .bp-sec-link {
      font-size: 11px; font-weight: 600; letter-spacing: 0.03em;
      color: var(--text-tertiary); text-decoration: none;
      transition: color 0.15s;
    }
    .bp-sec-link:hover { color: var(--text-secondary); }
    .bp-sec-body { padding: 14px 16px; }

    /* ── Weight section ───────────────────────────── */
    .wt-display { display: flex; align-items: baseline; gap: 6px; margin-bottom: 12px; }
    .wt-big {
      font-family: var(--font-mono); font-size: 36px; font-weight: 800;
      color: var(--text-primary); letter-spacing: -0.04em;
    }
    .wt-unit { font-size: 16px; font-weight: 600; color: var(--text-tertiary); }
    .wt-edit-btn, .wt-save-btn {
      margin-left: auto; padding: 6px 14px; border-radius: 8px; border: none;
      font-family: var(--font); font-size: 12px; font-weight: 700;
      cursor: pointer; transition: opacity 0.15s;
    }
    .wt-edit-btn {
      background: rgba(125,211,252,0.12); color: rgba(125,211,252,0.9);
      border: 1px solid rgba(125,211,252,0.25);
    }
    .wt-save-btn {
      background: rgba(125,211,252,0.2); color: rgba(125,211,252,0.95);
      border: 1px solid rgba(125,211,252,0.4);
    }
    .wt-edit-btn:active, .wt-save-btn:active { opacity: 0.7; }
    .wt-input-row { display: flex; align-items: center; gap: 8px; margin-bottom: 12px; }
    .wt-input {
      flex: 1; background: rgba(255,255,255,0.06); border: 1px solid rgba(125,211,252,0.25);
      border-radius: 10px; padding: 10px 14px; color: var(--text-primary);
      font-family: var(--font-mono); font-size: 20px; font-weight: 700; text-align: center;
      outline: none; -webkit-appearance: none;
    }
    .wt-input:focus { border-color: rgba(125,211,252,0.6); }
    .wt-no-entry { font-size: 13px; color: var(--text-tertiary); margin-bottom: 12px; }
    .wt-spark { display: flex; align-items: flex-end; gap: 4px; height: 36px; margin-top: 4px; }
    .wt-spark-bar {
      flex: 1; border-radius: 3px 3px 0 0;
      background: rgba(125,211,252,0.25); min-height: 4px; transition: height 0.3s ease;
    }
    .wt-spark-bar.today { background: rgba(125,211,252,0.8); }
    .wt-spark-labels {
      display: flex; justify-content: space-between;
      margin-top: 4px; font-size: 9px; color: var(--text-tertiary); font-family: var(--font-mono);
    }
    .hidden { display: none !important; }

    /* ── Supplements section ──────────────────────── */
    .supp-group { margin-bottom: 10px; }
    .supp-group:last-child { margin-bottom: 0; }
    .supp-group-title {
      font-size: 9px; font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase;
      color: var(--text-tertiary); margin-bottom: 6px;
    }
    .supp-item {
      display: flex; align-items: center; gap: 10px;
      padding: 9px 0; border-bottom: 1px solid rgba(255,255,255,0.04);
    }
    .supp-item:last-child { border-bottom: none; }
    .supp-check {
      width: 22px; height: 22px; border-radius: 6px; flex-shrink: 0;
      border: 1.5px solid rgba(167,139,250,0.4);
      background: transparent; cursor: pointer; display: flex; align-items: center;
      justify-content: center; font-size: 13px; font-weight: 700;
      color: rgba(167,139,250,0.9); transition: background 0.15s, border-color 0.15s;
      -webkit-tap-highlight-color: transparent;
    }
    .supp-check.checked {
      background: rgba(167,139,250,0.2); border-color: rgba(167,139,250,0.7);
    }
    .supp-name {
      font-size: 13px; font-weight: 600; color: var(--text-primary); flex: 1; line-height: 1.3;
    }
    .supp-item.taken .supp-name { color: var(--text-secondary); text-decoration: line-through; }
    .supp-dose { font-size: 11px; color: var(--text-tertiary); font-family: var(--font-mono); }
    .supp-empty { font-size: 13px; color: var(--text-tertiary); text-align: center; padding: 8px 0; }
    .supp-progress {
      display: flex; align-items: center; gap: 8px;
      margin-bottom: 10px; font-size: 12px; color: var(--text-secondary);
    }
    .supp-prog-bar-wrap {
      flex: 1; height: 4px; background: rgba(255,255,255,0.07); border-radius: 2px; overflow: hidden;
    }
    .supp-prog-bar { height: 100%; border-radius: 2px; background: rgba(167,139,250,0.7); transition: width 0.3s; }

    /* ── Water section ────────────────────────────── */
    .water-main { display: flex; align-items: center; gap: 16px; }
    .water-ring-wrap { position: relative; width: 80px; height: 80px; flex-shrink: 0; }
    .water-ring-wrap svg { transform: rotate(-90deg); }
    .water-ring-inner {
      position: absolute; inset: 0; display: flex; flex-direction: column;
      align-items: center; justify-content: center;
    }
    .water-count { font-family: var(--font-mono); font-size: 22px; font-weight: 800; color: var(--text-primary); line-height: 1; }
    .water-target-lbl { font-size: 10px; color: var(--text-tertiary); margin-top: 1px; }
    .water-right { flex: 1; }
    .water-unit-lbl { font-size: 11px; color: var(--text-tertiary); margin-bottom: 10px; }
    .water-btns { display: flex; gap: 8px; }
    .water-btn {
      flex: 1; padding: 11px 0; border-radius: 10px; border: none; cursor: pointer;
      font-family: var(--font); font-size: 14px; font-weight: 700;
      transition: opacity 0.15s; -webkit-tap-highlight-color: transparent;
    }
    .water-btn-minus {
      background: rgba(255,255,255,0.06); border: 1px solid var(--border);
      color: var(--text-secondary); font-size: 18px;
    }
    .water-btn-plus {
      background: rgba(56,189,248,0.18); border: 1px solid rgba(56,189,248,0.35);
      color: rgba(56,189,248,0.95);
    }
    .water-btn:active { opacity: 0.65; }

    /* ── Caffeine section ─────────────────────────── */
    .caf-top { display: flex; align-items: baseline; gap: 6px; margin-bottom: 12px; }
    .caf-total { font-family: var(--font-mono); font-size: 34px; font-weight: 800; color: var(--text-primary); letter-spacing: -0.04em; }
    .caf-unit { font-size: 13px; font-weight: 600; color: var(--text-tertiary); }
    .caf-bar-wrap { height: 5px; background: rgba(255,255,255,0.07); border-radius: 3px; overflow: hidden; margin-bottom: 14px; }
    .caf-bar-fill { height: 100%; border-radius: 3px; background: rgba(201,163,107,0.75); transition: width 0.4s; }
    .caf-quick { display: flex; flex-wrap: wrap; gap: 7px; margin-bottom: 14px; }
    .caf-quick-btn {
      padding: 7px 12px; border-radius: 8px; border: 1px solid rgba(201,163,107,0.25);
      background: rgba(201,163,107,0.08); color: rgba(201,163,107,0.9);
      font-family: var(--font); font-size: 12px; font-weight: 600; cursor: pointer;
      transition: background 0.15s; -webkit-tap-highlight-color: transparent;
    }
    .caf-quick-btn:active { background: rgba(201,163,107,0.22); }
    .caf-log { display: flex; flex-direction: column; gap: 1px; }
    .caf-entry {
      display: flex; align-items: center; gap: 8px;
      padding: 8px 0; border-bottom: 1px solid rgba(255,255,255,0.04);
    }
    .caf-entry:last-child { border-bottom: none; }
    .caf-entry-emo { font-size: 16px; line-height: 1; }
    .caf-entry-name { font-size: 12px; font-weight: 600; color: var(--text-primary); flex: 1; }
    .caf-entry-time { font-size: 11px; color: var(--text-tertiary); font-family: var(--font-mono); }
    .caf-entry-mg {
      font-family: var(--font-mono); font-size: 12px; font-weight: 700;
      color: rgba(201,163,107,0.8); background: rgba(201,163,107,0.1);
      padding: 2px 8px; border-radius: 5px;
    }
    .caf-del {
      background: none; border: none; color: var(--text-tertiary); font-size: 16px;
      cursor: pointer; padding: 2px 4px; line-height: 1;
    }
    .caf-del:active { color: #fb7185; }
    .caf-empty { font-size: 13px; color: var(--text-tertiary); }

    /* ── Nutrition section ────────────────────────── */
    .nut-top { display: flex; align-items: center; gap: 16px; margin-bottom: 14px; }
    .nut-cal-wrap {
      width: 80px; height: 80px; position: relative; flex-shrink: 0;
    }
    .nut-cal-wrap svg { transform: rotate(-90deg); }
    .nut-cal-inner {
      position: absolute; inset: 0; display: flex; flex-direction: column;
      align-items: center; justify-content: center;
    }
    .nut-cal-num { font-family: var(--font-mono); font-size: 18px; font-weight: 800; color: var(--text-primary); line-height: 1.1; }
    .nut-cal-denom { font-size: 9px; color: var(--text-tertiary); font-family: var(--font-mono); }
    .nut-macros { flex: 1; display: flex; flex-direction: column; gap: 6px; }
    .nut-macro-row { display: flex; align-items: center; gap: 8px; }
    .nut-macro-lbl {
      font-size: 10px; font-weight: 700; letter-spacing: 0.06em;
      text-transform: uppercase; color: var(--text-tertiary); width: 14px;
    }
    .nut-macro-bar-wrap { flex: 1; height: 5px; background: rgba(255,255,255,0.07); border-radius: 3px; overflow: hidden; }
    .nut-macro-bar { height: 100%; border-radius: 3px; transition: width 0.4s; }
    .nut-macro-val { font-family: var(--font-mono); font-size: 11px; font-weight: 700; color: var(--text-secondary); width: 34px; text-align: right; }
    .nut-meals { display: flex; flex-direction: column; gap: 1px; margin-bottom: 12px; }
    .nut-meal {
      display: flex; align-items: center; gap: 8px;
      padding: 8px 0; border-bottom: 1px solid rgba(255,255,255,0.04);
    }
    .nut-meal:last-child { border-bottom: none; }
    .nut-meal-name { font-size: 13px; font-weight: 600; color: var(--text-primary); flex: 1; }
    .nut-meal-kcal { font-family: var(--font-mono); font-size: 12px; font-weight: 700; color: rgba(52,211,153,0.8); }
    .nut-log-btn {
      display: block; width: 100%; padding: 11px; border-radius: 10px; text-align: center;
      background: rgba(52,211,153,0.10); border: 1px solid rgba(52,211,153,0.25);
      color: rgba(52,211,153,0.85); font-family: var(--font); font-size: 13px; font-weight: 700;
      text-decoration: none; cursor: pointer; transition: background 0.15s;
    }
    .nut-log-btn:active { background: rgba(52,211,153,0.22); }
    .nut-empty { font-size: 13px; color: var(--text-tertiary); margin-bottom: 12px; }
  </style>
</head>
<body data-page="body">

  <!-- Snapshot bar (sticky below topbar) -->
  <div class="snap-bar">
    <div class="snap-item">
      <div class="snap-val" id="snapWt">—</div>
      <div class="snap-lbl">weight</div>
    </div>
    <div class="snap-item">
      <div class="snap-val" id="snapH2O">0</div>
      <div class="snap-lbl">water</div>
    </div>
    <div class="snap-item">
      <div class="snap-val" id="snapCaf">0</div>
      <div class="snap-lbl">mg caf</div>
    </div>
    <div class="snap-item">
      <div class="snap-val" id="snapKcal">0</div>
      <div class="snap-lbl">kcal</div>
    </div>
  </div>

  <div class="bp-wrap">

    <!-- ── Weight ───────────────────────────────────── -->
    <section class="bp-sec" style="--sec-rgb:125,211,252">
      <div class="bp-sec-hdr">
        <span class="bp-sec-icon">⚖️</span>
        <span class="bp-sec-title">Weight</span>
        <a href="gym.html" class="bp-sec-link">Full view →</a>
      </div>
      <div class="bp-sec-body" id="wtBody"></div>
    </section>

    <!-- ── Supplements ──────────────────────────────── -->
    <section class="bp-sec" style="--sec-rgb:167,139,250">
      <div class="bp-sec-hdr">
        <span class="bp-sec-icon">💊</span>
        <span class="bp-sec-title">Supplements</span>
        <a href="health.html" class="bp-sec-link">Full view →</a>
      </div>
      <div class="bp-sec-body" id="suppBody"></div>
    </section>

    <!-- ── Water ────────────────────────────────────── -->
    <section class="bp-sec" style="--sec-rgb:56,189,248">
      <div class="bp-sec-hdr">
        <span class="bp-sec-icon">💧</span>
        <span class="bp-sec-title">Water</span>
        <a href="po-water.html" class="bp-sec-link">Full view →</a>
      </div>
      <div class="bp-sec-body" id="h2oBody"></div>
    </section>

    <!-- ── Caffeine ──────────────────────────────────── -->
    <section class="bp-sec" style="--sec-rgb:201,163,107">
      <div class="bp-sec-hdr">
        <span class="bp-sec-icon">☕</span>
        <span class="bp-sec-title">Caffeine</span>
        <a href="caffeine.html" class="bp-sec-link">Full view →</a>
      </div>
      <div class="bp-sec-body" id="cafBody"></div>
    </section>

    <!-- ── Nutrition ─────────────────────────────────── -->
    <section class="bp-sec" style="--sec-rgb:52,211,153">
      <div class="bp-sec-hdr">
        <span class="bp-sec-icon">🥗</span>
        <span class="bp-sec-title">Nutrition</span>
        <a href="nutrition.html" class="bp-sec-link">Full view →</a>
      </div>
      <div class="bp-sec-body" id="nutBody"></div>
    </section>

  </div>

  <script>
  (function () {
    'use strict';

    /* ── Helpers ──────────────────────────────────────── */
    function dateKey(d) {
      return d.getFullYear() + '-' +
        String(d.getMonth() + 1).padStart(2, '0') + '-' +
        String(d.getDate()).padStart(2, '0');
    }
    function today() { return dateKey(new Date()); }
    function suppToday() {
      const n = new Date();
      if (n.getHours() < 6) n.setDate(n.getDate() - 1);
      return dateKey(n);
    }
    function ls(k) { try { return JSON.parse(localStorage.getItem(k)); } catch(e) { return null; } }
    function lsSave(k, v) { try { localStorage.setItem(k, JSON.stringify(v)); } catch(e) {} }
    function esc(s) {
      return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }
    function fmtTime(ts) {
      const d = new Date(ts);
      let h = d.getHours(), m = d.getMinutes();
      const ampm = h >= 12 ? 'pm' : 'am';
      h = h % 12 || 12;
      return h + ':' + String(m).padStart(2,'0') + ampm;
    }
    function r0(n) { return Math.round(n || 0); }

    /* ── Update snapshot bar ─────────────────────────── */
    function updateSnap() {
      // Weight
      const wEntries = ls('po_coach_weights') || [];
      const todayWt = wEntries.find(e => e.dateKey === today());
      const units = (ls('po_coach_v1') || {}).units || 'kg';
      document.getElementById('snapWt').textContent = todayWt
        ? todayWt.weight.toFixed(1) + units : '—';

      // Water
      const ws = ls('po_water_v1') || {};
      const wLogs = ws.logs || {};
      const wCount = wLogs[today()] || 0;
      document.getElementById('snapH2O').textContent = wCount;

      // Caffeine
      const dawn = new Date(); dawn.setHours(0,0,0,0);
      const cafLogs = (ls('caf:logs') || []).filter(l => new Date(l.ts) >= dawn);
      const cafTotal = cafLogs.reduce((s,l) => s + l.mg, 0);
      document.getElementById('snapCaf').textContent = cafTotal;

      // Nutrition
      const nutLogs = (ls('nut:logs') || []).filter(l => new Date(l.ts) >= dawn);
      const kcalTotal = r0(nutLogs.reduce((s,l) => s + (l.kcal||0), 0));
      document.getElementById('snapKcal').textContent = kcalTotal;
    }

    /* ══════════════════════════════════════════════════
       WEIGHT
    ══════════════════════════════════════════════════ */
    function renderWeight() {
      const KEY = 'po_coach_weights';
      let entries = ls(KEY) || [];
      if (!Array.isArray(entries)) entries = [];
      entries.sort((a,b) => a.dateKey.localeCompare(b.dateKey));
      const tod = today();
      const todayEntry = entries.find(e => e.dateKey === tod);
      const units = (ls('po_coach_v1') || {}).units || 'kg';
      const recent = entries.slice(-10);

      let html = '';

      if (todayEntry) {
        html += `<div class="wt-display" id="wtLocked">
          <span class="wt-big">${todayEntry.weight.toFixed(1)}</span>
          <span class="wt-unit">${esc(units)}</span>
          <button class="wt-edit-btn" id="wtEditBtn">Edit</button>
        </div>`;
        html += `<div class="wt-input-row hidden" id="wtInputRow">
          <input type="number" class="wt-input" id="wtInput" value="${todayEntry.weight.toFixed(1)}" step="0.1" inputmode="decimal">
          <button class="wt-save-btn" id="wtSaveBtn">Save</button>
        </div>`;
      } else {
        html += `<p class="wt-no-entry">No entry yet today</p>`;
        html += `<div class="wt-input-row" id="wtInputRow">
          <input type="number" class="wt-input" id="wtInput" placeholder="0.0" step="0.1" inputmode="decimal">
          <button class="wt-save-btn" id="wtSaveBtn">Save</button>
        </div>`;
      }

      if (recent.length > 1) {
        const vals = recent.map(e => e.weight);
        const min = Math.min(...vals), max = Math.max(...vals);
        const range = max - min || 0.1;
        html += '<div class="wt-spark">';
        recent.forEach(e => {
          const h = Math.round(((e.weight - min) / range) * 28 + 4);
          const isT = e.dateKey === tod;
          html += `<div class="wt-spark-bar${isT?' today':''}" style="height:${h}px" title="${e.dateKey}: ${e.weight}${units}"></div>`;
        });
        html += '</div>';
        const first = recent[0], last = recent[recent.length - 1];
        html += `<div class="wt-spark-labels"><span>${first.dateKey.slice(5)}</span><span>${last.dateKey.slice(5)}</span></div>`;
      }

      document.getElementById('wtBody').innerHTML = html;

      // Wire edit
      const editBtn = document.getElementById('wtEditBtn');
      const inputRow = document.getElementById('wtInputRow');
      const locked = document.getElementById('wtLocked');
      const inp = document.getElementById('wtInput');
      const saveBtn = document.getElementById('wtSaveBtn');

      if (editBtn) {
        editBtn.addEventListener('click', () => {
          locked.classList.add('hidden');
          inputRow.classList.remove('hidden');
          inp.focus(); inp.select();
        });
      }
      if (saveBtn) {
        const doSave = () => {
          const v = parseFloat(inp.value);
          if (isNaN(v) || v <= 0) return;
          const idx = entries.findIndex(e => e.dateKey === tod);
          if (idx >= 0) entries[idx].weight = v;
          else entries.push({ dateKey: tod, weight: v });
          entries.sort((a,b) => a.dateKey.localeCompare(b.dateKey));
          lsSave(KEY, entries);
          renderWeight();
          updateSnap();
        };
        saveBtn.addEventListener('click', doSave);
        inp.addEventListener('keydown', e => { if (e.key === 'Enter') doSave(); });
      }

      updateSnap();
    }

    /* ══════════════════════════════════════════════════
       SUPPLEMENTS
    ══════════════════════════════════════════════════ */
    function renderSupps() {
      const items = ls('stack:items') || [];
      const takenKey = 'stack:taken:' + suppToday();
      const taken = ls(takenKey) || {};
      const el = document.getElementById('suppBody');

      if (!items.length) {
        el.innerHTML = '<p class="supp-empty">No supplements added yet. Set them up in the full view.</p>';
        return;
      }

      const takenCount = items.filter(i => !!taken[i.id]).length;
      const pct = items.length > 0 ? (takenCount / items.length) * 100 : 0;

      const WINDOWS = ['morning','afternoon','evening','night','anytime'];
      const LABELS  = {morning:'Morning',afternoon:'Afternoon',evening:'Evening',night:'Night',anytime:'Anytime'};

      let html = `<div class="supp-progress">
        <span>${takenCount}/${items.length} taken</span>
        <div class="supp-prog-bar-wrap">
          <div class="supp-prog-bar" style="width:${pct.toFixed(1)}%"></div>
        </div>
      </div>`;

      WINDOWS.forEach(win => {
        const group = items.filter(i => (i.window || 'anytime') === win);
        if (!group.length) return;
        html += `<div class="supp-group"><div class="supp-group-title">${LABELS[win]}</div>`;
        group.forEach(item => {
          const isTaken = !!taken[item.id];
          html += `<div class="supp-item${isTaken?' taken':''}">
            <button class="supp-check${isTaken?' checked':''}" data-id="${esc(item.id)}">${isTaken?'✓':''}</button>
            <div>
              <div class="supp-name">${esc(item.name)}</div>
              ${item.dose ? `<div class="supp-dose">${esc(item.dose)}</div>` : ''}
            </div>
          </div>`;
        });
        html += '</div>';
      });

      el.innerHTML = html;

      el.querySelectorAll('.supp-check').forEach(btn => {
        btn.addEventListener('click', () => {
          const id = btn.dataset.id;
          const cur = ls(takenKey) || {};
          if (cur[id]) delete cur[id];
          else cur[id] = Date.now();
          lsSave(takenKey, cur);
          renderSupps();
        });
      });
    }

    /* ══════════════════════════════════════════════════
       WATER
    ══════════════════════════════════════════════════ */
    function renderWater() {
      const state = ls('po_water_v1') || {};
      const logs = (state.logs && typeof state.logs === 'object') ? state.logs : {};
      const count = logs[today()] || 0;
      const unit = state.unit || 'glass';
      const unitMl = unit === 'glass' ? (state.glassMl || 250)
                   : unit === 'oz' ? 30
                   : (state.bottleMl || 500);
      const unitName = unit === 'glass' ? 'glasses' : unit === 'oz' ? 'oz' : 'bottles';
      const wKg = (state.profile && state.profile.weightKg) || 75;
      const actHrs = (state.profile && state.profile.activityHrsPerWeek) || 0;
      const targetMl = wKg * 35 + actHrs * 500;
      const target = Math.max(1, Math.ceil(targetMl / unitMl));
      const pct = Math.min(100, (count / target) * 100);

      const R = 32, C = 2 * Math.PI * R;
      const offset = C - (pct / 100) * C;
      const ringColor = pct >= 100 ? '#6BE3A4' : pct >= 60 ? '#38BDF8' : '#38BDF8';

      document.getElementById('h2oBody').innerHTML = `
        <div class="water-main">
          <div class="water-ring-wrap">
            <svg width="80" height="80" viewBox="0 0 80 80">
              <circle cx="40" cy="40" r="${R}" fill="none" stroke="rgba(255,255,255,0.07)" stroke-width="8"/>
              <circle cx="40" cy="40" r="${R}" fill="none"
                stroke="${ringColor}" stroke-width="8" stroke-linecap="round"
                stroke-dasharray="${C.toFixed(2)}" stroke-dashoffset="${offset.toFixed(2)}"/>
            </svg>
            <div class="water-ring-inner">
              <div class="water-count" id="h2oCount">${count}</div>
              <div class="water-target-lbl">/ ${target}</div>
            </div>
          </div>
          <div class="water-right">
            <div class="water-unit-lbl">${unitName} today</div>
            <div class="water-btns">
              <button class="water-btn water-btn-minus" id="h2oMinus">−</button>
              <button class="water-btn water-btn-plus" id="h2oPlus">+ ${unit === 'glass' ? 'Glass' : unit === 'oz' ? 'Oz' : 'Bottle'}</button>
            </div>
          </div>
        </div>`;

      document.getElementById('h2oPlus').addEventListener('click', () => {
        const s = ls('po_water_v1') || {};
        if (!s.logs) s.logs = {};
        const t = today();
        s.logs[t] = (s.logs[t] || 0) + 1;
        lsSave('po_water_v1', s);
        renderWater(); updateSnap();
      });
      document.getElementById('h2oMinus').addEventListener('click', () => {
        const s = ls('po_water_v1') || {};
        if (!s.logs) s.logs = {};
        const t = today();
        const cur = s.logs[t] || 0;
        if (cur <= 0) return;
        s.logs[t] = cur - 1;
        lsSave('po_water_v1', s);
        renderWater(); updateSnap();
      });

      updateSnap();
    }

    /* ══════════════════════════════════════════════════
       CAFFEINE
    ══════════════════════════════════════════════════ */
    const CAF_LIMIT = 400;
    const CAF_QUICK = [
      {name:'Espresso', mg:63, emoji:'☕'},
      {name:'Double espresso', mg:126, emoji:'☕'},
      {name:'Drip coffee', mg:95, emoji:'☕'},
      {name:'Matcha', mg:70, emoji:'🍵'},
      {name:'Energy drink', mg:160, emoji:'⚡'},
    ];

    function getCafLogs() {
      const dawn = new Date(); dawn.setHours(0,0,0,0);
      return (ls('caf:logs') || []).filter(l => new Date(l.ts) >= dawn);
    }
    function saveCafLogs(logs) { lsSave('caf:logs', logs); }

    function renderCaffeine() {
      const logs = getCafLogs();
      const total = logs.reduce((s,l) => s + l.mg, 0);
      const pct = Math.min(100, (total / CAF_LIMIT) * 100);
      const barColor = pct >= 90 ? '#fb7185' : pct >= 70 ? '#F2C063' : 'rgba(201,163,107,0.75)';

      let logHtml = '';
      if (logs.length) {
        logHtml = '<div class="caf-log">' + logs.slice().reverse().map(l =>
          `<div class="caf-entry">
            <span class="caf-entry-emo">${esc(l.emoji||'☕')}</span>
            <span class="caf-entry-name">${esc(l.name)}</span>
            <span class="caf-entry-time">${fmtTime(l.ts)}</span>
            <span class="caf-entry-mg">${l.mg}mg</span>
            <button class="caf-del" data-id="${l.id}">×</button>
          </div>`
        ).join('') + '</div>';
      } else {
        logHtml = '<p class="caf-empty">No caffeine logged today</p>';
      }

      document.getElementById('cafBody').innerHTML = `
        <div class="caf-top">
          <span class="caf-total">${total}</span>
          <span class="caf-unit">/ ${CAF_LIMIT} mg</span>
        </div>
        <div class="caf-bar-wrap"><div class="caf-bar-fill" style="width:${pct.toFixed(1)}%;background:${barColor}"></div></div>
        <div class="caf-quick">${CAF_QUICK.map(d =>
          `<button class="caf-quick-btn" data-name="${esc(d.name)}" data-mg="${d.mg}" data-emoji="${esc(d.emoji)}">${d.emoji} ${d.name} <span style="opacity:.6">${d.mg}mg</span></button>`
        ).join('')}</div>
        ${logHtml}`;

      document.querySelectorAll('.caf-quick-btn').forEach(btn => {
        btn.addEventListener('click', () => {
          const all = ls('caf:logs') || [];
          all.push({ id: Date.now(), name: btn.dataset.name, mg: +btn.dataset.mg, emoji: btn.dataset.emoji, ts: new Date().toISOString() });
          saveCafLogs(all);
          renderCaffeine(); updateSnap();
        });
      });
      document.querySelectorAll('.caf-del').forEach(btn => {
        btn.addEventListener('click', () => {
          const all = ls('caf:logs') || [];
          const id = +btn.dataset.id;
          saveCafLogs(all.filter(l => l.id !== id));
          renderCaffeine(); updateSnap();
        });
      });

      updateSnap();
    }

    /* ══════════════════════════════════════════════════
       NUTRITION
    ══════════════════════════════════════════════════ */
    function renderNutrition() {
      const dawn = new Date(); dawn.setHours(0,0,0,0);
      const logs = (ls('nut:logs') || []).filter(l => new Date(l.ts) >= dawn);
      const prof = ls('nut:profile') || {};

      const tot = logs.reduce((a,l) => ({
        kcal: a.kcal + (l.kcal||0),
        p: a.p + (l.p||0),
        c: a.c + (l.c||0),
        f: a.f + (l.f||0)
      }), {kcal:0,p:0,c:0,f:0});

      // Estimate calorie target (same rough formula as nutrition.html)
      const cm  = prof.heightCm || 175;
      const age = prof.age || 22;
      const sex = prof.sex || 'm';
      const wKg = prof.weightKg || 75;
      const bmr = sex === 'f'
        ? 10 * wKg + 6.25 * cm - 5 * age - 161
        : 10 * wKg + 6.25 * cm - 5 * age + 5;
      const acts = {sedentary:1.2,light:1.375,moderate:1.55,active:1.725,very_active:1.9};
      let tdee = bmr * (acts[prof.activityLevel] || 1.55);
      if (prof.tdeeOverride) tdee = prof.tdeeOverride;
      const goal = prof.goal || 'cut';
      let calTarget = goal === 'cut' ? Math.max(bmr + 200, tdee - 500)
                    : goal === 'mini_cut' ? Math.max(bmr + 200, tdee - 300)
                    : goal === 'bulk' ? tdee + 250 : tdee;
      calTarget = Math.round(calTarget);

      const macroTargets = { p: Math.round(calTarget * 0.30 / 4), c: Math.round(calTarget * 0.45 / 4), f: Math.round(calTarget * 0.25 / 9) };
      const calPct = Math.min(100, (tot.kcal / calTarget) * 100);
      const CAL_R = 32, CAL_C = 2 * Math.PI * CAL_R;
      const calOff = CAL_C - (calPct / 100) * CAL_C;
      const calColor = calPct >= 105 ? '#fb7185' : calPct >= 90 ? '#F2C063' : '#34D399';

      let mealsHtml = '';
      if (logs.length) {
        mealsHtml = '<div class="nut-meals">' + logs.slice().reverse().slice(0,6).map(l =>
          `<div class="nut-meal">
            <span class="nut-meal-name">${esc(l.name)}</span>
            <span class="nut-meal-kcal">${r0(l.kcal)} kcal</span>
          </div>`
        ).join('') + '</div>';
      } else {
        mealsHtml = '<p class="nut-empty">No meals logged today</p>';
      }

      const macroRow = (label, val, target, color) => {
        const pct = target > 0 ? Math.min(100, (val/target)*100) : 0;
        return `<div class="nut-macro-row">
          <span class="nut-macro-lbl">${label}</span>
          <div class="nut-macro-bar-wrap"><div class="nut-macro-bar" style="width:${pct.toFixed(1)}%;background:${color}"></div></div>
          <span class="nut-macro-val">${r0(val)}g</span>
        </div>`;
      };

      document.getElementById('nutBody').innerHTML = `
        <div class="nut-top">
          <div class="nut-cal-wrap">
            <svg width="80" height="80" viewBox="0 0 80 80">
              <circle cx="40" cy="40" r="${CAL_R}" fill="none" stroke="rgba(255,255,255,0.07)" stroke-width="8"/>
              <circle cx="40" cy="40" r="${CAL_R}" fill="none"
                stroke="${calColor}" stroke-width="8" stroke-linecap="round"
                stroke-dasharray="${CAL_C.toFixed(2)}" stroke-dashoffset="${calOff.toFixed(2)}"/>
            </svg>
            <div class="nut-cal-inner">
              <div class="nut-cal-num">${r0(tot.kcal)}</div>
              <div class="nut-cal-denom">/ ${calTarget}</div>
            </div>
          </div>
          <div class="nut-macros">
            ${macroRow('P', tot.p, macroTargets.p, '#7DD3FC')}
            ${macroRow('C', tot.c, macroTargets.c, '#F2C063')}
            ${macroRow('F', tot.f, macroTargets.f, '#F87171')}
          </div>
        </div>
        ${mealsHtml}
        <a href="nutrition.html" class="nut-log-btn">+ Log meal</a>`;

      updateSnap();
    }

    /* ── Boot ─────────────────────────────────────────── */
    renderWeight();
    renderSupps();
    renderWater();
    renderCaffeine();
    renderNutrition();

    // Re-render all sections when returning from another page / iOS resume
    document.addEventListener('visibilitychange', () => {
      if (document.visibilityState === 'visible') {
        renderWeight();
        renderSupps();
        renderWater();
        renderCaffeine();
        renderNutrition();
      }
    });

    // Storage events from other tabs/pages
    window.addEventListener('storage', () => {
      renderWeight();
      renderSupps();
      renderWater();
      renderCaffeine();
      renderNutrition();
    });
  })();
  </script>
</body>
</html>

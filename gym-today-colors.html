<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>Today card — colourways · ALS</title>
<meta name="theme-color" content="#050506">
<link rel="stylesheet" href="aurora.css">
<style>
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
  html,body{min-height:100%;}
  body{background:#050506;color:var(--au-ivory);font-family:var(--au-sans);padding:26px 18px 90px;}
  .wrap{max-width:600px;margin:0 auto;}
  .lede{font-family:var(--au-serif);font-style:italic;font-size:26px;line-height:1.15;margin-bottom:7px;}
  .lede-sub{font-size:13px;color:var(--au-dim);line-height:1.55;}
  .lede-sub b{color:var(--au-ivory);font-weight:600;}
  .lbl{font-family:var(--au-mono);font-size:9px;font-weight:700;letter-spacing:.2em;text-transform:uppercase;color:var(--au-faint);margin:34px 0 4px;display:flex;align-items:center;gap:9px;}
  .lbl::after{content:"";flex:1;height:1px;background:var(--au-line);}
  .lbl .h{color:var(--au-amber);letter-spacing:.14em;}
  .note{font-size:12px;color:var(--au-faint);line-height:1.55;margin:8px 0 12px;}
  .note b{color:var(--au-dim);}
  .pair{display:flex;flex-direction:column;gap:10px;}

  /* ══ THE CARD — one skeleton, four colourways ══════════════════════════ */
  .t{position:relative;border-radius:18px;padding:16px 17px 15px;overflow:hidden;
     background:var(--surf); border:1px solid var(--edge);}
  .t::before{content:'';position:absolute;top:0;left:8%;right:8%;height:1px;background:var(--hair);}
  .t-eye{font-family:var(--au-mono);font-size:9.5px;font-weight:700;letter-spacing:.16em;text-transform:uppercase;color:var(--eye);display:flex;align-items:center;gap:6px;}
  .t-eye svg{width:12px;height:12px;flex:none;color:var(--mark);}
  .t-num{font-family:var(--au-serif);font-style:italic;font-size:clamp(40px,11vw,50px);line-height:1;letter-spacing:-.02em;color:var(--hero);margin:8px 0 0;}
  .t-line{font-size:13px;color:var(--au-dim);line-height:1.45;margin-top:7px;max-width:40ch;}
  .t-line b{color:var(--au-ivory);font-weight:600;}
  .t-rule{height:1px;background:var(--au-line);margin:13px 0 10px;}
  .t-foot{font-family:var(--au-mono);font-size:10px;letter-spacing:.05em;color:var(--au-faint);}
  .t-foot b{color:var(--au-dim);font-weight:700;}
  .t-acts{display:flex;gap:8px;margin-top:12px;}
  .t-btn{flex:1;font-family:var(--au-mono);font-size:10px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--au-dim);background:rgba(255,255,255,.04);border:1px solid var(--au-line);border-radius:11px;padding:11px;cursor:pointer;}
  /* the scheduled (not yet trained) state, same colourway */
  .t-name{font-family:var(--au-serif);font-style:italic;font-size:25px;color:var(--au-ivory);margin:6px 0 4px;}
  .t-ex{font-size:12px;color:var(--au-faint);line-height:1.45;}
  .t-go{width:100%;margin-top:14px;border:none;border-radius:13px;padding:14px;font-family:var(--au-sans);font-size:14px;font-weight:700;cursor:pointer;background:var(--cta);color:var(--cta-ink);}

  /* ── 0 · LIVE NOW: emerald used four ways at once ── */
  .cw-live{
    --surf:linear-gradient(135deg,rgba(52,226,176,.13),rgba(255,255,255,.02));
    --edge:rgba(52,226,176,.32);
    --hair:linear-gradient(90deg,transparent,rgba(52,226,176,.6),transparent);
    --eye:rgba(52,226,176,.9); --mark:rgb(52,226,176); --hero:var(--au-ivory);
    --cta:linear-gradient(120deg,#34E2B0,#18C8C0); --cta-ink:#04130D;
  }
  /* ── 1 · INK: no colour in the surface at all. Type does the work. ── */
  .cw-ink{
    --surf:radial-gradient(120% 130% at 20% 0%, rgba(255,255,255,.055), rgba(255,255,255,.018) 55%);
    --edge:rgba(255,255,255,.09);
    --hair:linear-gradient(90deg,transparent,rgba(255,255,255,.22),transparent);
    --eye:var(--au-faint); --mark:var(--au-dim); --hero:var(--au-ivory);
    --cta:rgba(255,255,255,.10); --cta-ink:var(--au-ivory);
  }
  /* ── 2 · GOLD: earned, not "success". Warm accent, neutral surface. ── */
  .cw-gold{
    --surf:radial-gradient(120% 130% at 20% 0%, rgba(242,192,99,.07), rgba(255,255,255,.016) 58%);
    --edge:rgba(242,192,99,.22);
    --hair:linear-gradient(90deg,transparent,rgba(242,192,99,.55),transparent);
    --eye:rgba(242,192,99,.85); --mark:#F2C063; --hero:#F6DCA9;
    --cta:linear-gradient(120deg,#F2C063,#E0A64B); --cta-ink:#1A1305;
  }
  /* ── 3 · EMERALD, RESTRAINED: same family, accent as a rim not a wash. ── */
  .cw-emerald{
    --surf:radial-gradient(120% 130% at 20% 0%, rgba(52,226,176,.05), rgba(255,255,255,.016) 58%);
    --edge:rgba(52,226,176,.18);
    --hair:linear-gradient(90deg,transparent,rgba(52,226,176,.45),transparent);
    --eye:var(--au-faint); --mark:rgb(52,226,176); --hero:var(--au-ivory);
    --cta:linear-gradient(120deg,#34E2B0,#18C8C0); --cta-ink:#04130D;
  }
</style>
</head>
<body class="au-bg">
<div class="wrap">
  <div class="lede">The Today card, in four colours.</div>
  <div class="lede-sub">Identical layout and identical words every time — <b>only the colour changes</b>. Each block shows the card <b>after</b> you train and <b>before</b> you train, because they have to feel like the same object. Your real session from today.</div>
  <div id="out"></div>
</div>
<script>
var TICK='<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="M4.5 12.5l5 5 10-11"/></svg>';
var PLAY='<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M6 4.5l13 7.5-13 7.5z"/></svg>';

function done(cw){
  return '<div class="t '+cw+'">'+
    '<div class="t-eye">'+TICK+'Monday &middot; trained</div>'+
    '<div class="t-num">100 &times; 6</div>'+
    '<div class="t-line"><b>chest fly</b> &middot; best ever as your 2nd chest movement &mdash; the weight you lift fresh.</div>'+
    '<div class="t-rule"></div>'+
    '<div class="t-foot"><b>Chest + Back</b> &middot; 3,115 kg &middot; 8 sets &middot; 1h 3m</div>'+
    '<div class="t-acts"><button class="t-btn">See the session</button><button class="t-btn">Train again</button></div>'+
  '</div>';
}
function todo(cw){
  return '<div class="t '+cw+'">'+
    '<div class="t-eye">Monday &middot; today</div>'+
    '<div class="t-name">Chest + Back</div>'+
    '<div class="t-ex">Incline Bench Press &middot; Lat Pulldown &middot; Chest Fly &middot; T Bar Row</div>'+
    '<button class="t-go">Start Chest + Back</button>'+
  '</div>';
}

var ways=[
  ['0 &middot; live now', 'cw-live',
   'Emerald used <b>four ways at once</b>: a 13% wash over the whole panel, a 32% border, a 60% hairline and the label. A flat mint tint over black mixes down to a muddy sea-green. This is the one you don&rsquo;t like &mdash; and you&rsquo;re right.'],
  ['1 &middot; ink <span class="h">my pick</span>', 'cw-ink',
   'No colour in the surface at all. The panel is lifted with <b>light</b> (a soft white radial), not paint, and the type does the work. Most restrained, most in keeping with the rest of the app. Colour returns only where it means something &mdash; a PR would still flash amber.'],
  ['2 &middot; gold', 'cw-gold',
   'Warm, low-chroma accent on a neutral surface. Reads as <b>earned</b>, where green reads as &ldquo;form submitted successfully&rdquo;. The number itself takes a warm ivory tone.'],
  ['3 &middot; emerald, restrained', 'cw-emerald',
   'Same colour family as now, but the accent becomes a <b>rim and a mark</b> instead of a wash: 5% surface instead of 13%, 18% border instead of 32%. If you like the green, this is the green &mdash; just disciplined.']
];
var H='';
ways.forEach(function(w){
  H+='<div class="lbl">'+w[0]+'</div><div class="note">'+w[2]+'</div>'+
     '<div class="pair">'+done(w[1])+todo(w[1])+'</div>';
});
document.getElementById('out').innerHTML=H;
</script>
</body>
</html>

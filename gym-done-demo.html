<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>Done card — demo · ALS</title>
<meta name="theme-color" content="#050506">
<link rel="stylesheet" href="aurora.css">
<style>
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
  html,body{min-height:100%;}
  /* aurora.css has NO --au-void token: the dark ground comes from class="au-bg"
     on <body>. Missing that is why the first demo rendered white. */
  body{background:#050506;color:var(--au-ivory);font-family:var(--au-sans);padding:26px 18px 90px;}
  .wrap{max-width:600px;margin:0 auto;}
  .lede{font-family:var(--au-serif);font-style:italic;font-size:26px;line-height:1.15;margin-bottom:7px;}
  .lede-sub{font-size:13px;color:var(--au-dim);line-height:1.55;}
  .lede-sub b{color:var(--au-ivory);font-weight:600;}
  .lbl{font-family:var(--au-mono);font-size:9px;font-weight:700;letter-spacing:.2em;text-transform:uppercase;color:var(--au-faint);margin:32px 0 9px;display:flex;align-items:center;gap:9px;}
  .lbl::after{content:"";flex:1;height:1px;background:var(--au-line);}
  .lbl .h{color:rgb(var(--au-glow-rgb));letter-spacing:.14em;}
  .note{font-size:12px;color:var(--au-faint);line-height:1.55;margin-top:9px;}
  .note b{color:var(--au-dim);}
  .tall{font-family:var(--au-mono);font-size:9px;letter-spacing:.1em;text-transform:uppercase;color:var(--au-faint);margin-top:6px;}
  .tall b{color:var(--au-ivory);}

  /* shared shell — same glass/border as the live .w-today */
  .dc{position:relative;background:linear-gradient(135deg,rgba(var(--au-glow-rgb),.10),rgba(255,255,255,.02));border:1px solid rgba(var(--au-glow-rgb),.3);border-radius:18px;padding:16px 17px 15px;overflow:hidden;}
  .dc::before{content:"";position:absolute;top:0;left:8%;right:8%;height:1px;background:linear-gradient(90deg,transparent,rgba(var(--au-glow-rgb),.6),transparent);}
  .dc-eyebrow{font-family:var(--au-mono);font-size:9.5px;font-weight:700;letter-spacing:.16em;text-transform:uppercase;color:rgba(var(--au-glow-rgb),.9);display:flex;align-items:center;gap:6px;}
  .dc-eyebrow svg{width:12px;height:12px;flex:none;}
  .dc-rule{height:1px;background:var(--au-line);margin:13px 0 10px;}
  .dc-foot{font-family:var(--au-mono);font-size:10px;letter-spacing:.05em;color:var(--au-faint);}
  .dc-foot b{color:var(--au-dim);font-weight:700;}
  .dc-acts{display:flex;gap:8px;margin-top:12px;}
  .dc-btn{flex:1;font-family:var(--au-mono);font-size:10px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--au-dim);background:rgba(255,255,255,.04);border:1px solid var(--au-line);border-radius:11px;padding:11px;cursor:pointer;}

  /* A2 — the number is the hero, one line carries the meaning (COMPACT) */
  .a2-hero{font-family:var(--au-serif);font-style:italic;font-size:clamp(40px,11vw,52px);line-height:1;letter-spacing:-.02em;color:var(--au-ivory);margin:8px 0 0;}
  .a2-hero small{font-family:var(--au-sans);font-style:normal;font-size:14px;color:var(--au-dim);margin-left:7px;letter-spacing:0;}
  .a2-line{font-size:13px;color:var(--au-dim);line-height:1.45;margin-top:7px;max-width:40ch;}
  .a2-line b{color:var(--au-ivory);font-weight:600;}
  .a2-pr .a2-hero{color:var(--au-amber);}

  /* A1 — the full sentence (the tall one) */
  .a1-hero{font-family:var(--au-serif);font-style:italic;font-size:clamp(24px,6.6vw,31px);line-height:1.12;color:var(--au-ivory);margin:10px 0 0;}
  .a1-hero em{color:rgb(var(--au-glow-rgb));font-style:italic;}
  .a1-sub{font-size:12.5px;color:var(--au-dim);line-height:1.5;margin-top:8px;max-width:36ch;}

  /* B — editorial headline (volume hero) */
  .b-big{font-family:var(--au-serif);font-style:italic;font-size:clamp(46px,13vw,62px);line-height:1;letter-spacing:-.02em;margin:8px 0 0;}
  .b-big small{font-family:var(--au-sans);font-style:normal;font-size:13px;color:var(--au-dim);margin-left:8px;letter-spacing:0;}
  .b-sub{font-family:var(--au-mono);font-size:10.5px;letter-spacing:.05em;color:var(--au-faint);margin-top:10px;}
  .b-sub b{color:var(--au-ivory);font-weight:700;}

  /* CURRENT — what is live right now, for a fair height comparison */
  .cur-name{font-family:var(--au-serif);font-style:italic;font-size:25px;color:var(--au-ivory);margin:5px 0 4px;}
  .cur-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-top:13px;}
  .cur-tot{background:rgba(255,255,255,.03);border:1px solid var(--au-line);border-radius:12px;padding:13px 6px;text-align:center;}
  .cur-tot b{display:block;font-family:var(--au-mono);font-size:19px;font-weight:700;color:var(--au-ivory);line-height:1.1;}
  .cur-tot span{font-family:var(--au-mono);font-size:8px;font-weight:700;letter-spacing:.09em;text-transform:uppercase;color:var(--au-faint);}
  .cur-line{font-family:var(--au-mono);font-size:10.5px;color:var(--au-dim);margin-top:9px;}
  .cur-line b{color:var(--au-ivory);}
  .cur-week{font-family:var(--au-serif);font-style:italic;font-size:13px;color:var(--au-faint);margin-top:11px;}
</style>
</head>
<body class="au-bg">
<div class="wrap">
  <div class="lede">The day, once it&rsquo;s been earned.</div>
  <div class="lede-sub">Your <b>real</b> session from today — Chest + Back, 13 July. Every card reports its own <b>rendered height</b>, so the space question answers itself: the recommended one is <b>shorter</b> than what is live now, because three stat tiles collapse into one footnote.</div>
  <div id="out"></div>
</div>
<script>
var DATA = {"session":{"id":"mriwjjxh2znzk","name":"Chest + Back","date":"2026-07-13","volume":3115,"durationSec":3787,"prs":[]},"entries":[{"exId":"inclinebench-smith","name":"Incline Bench Press (Smith Machine)","muscle":"Chest","kind":"weight","perSide":false,"slot":1,"sets":[{"kg":75,"reps":5,"type":null},{"kg":75,"reps":4,"type":null}]},{"exId":"latpulldown","name":"Lat Pulldown (Machine)","muscle":"Back","kind":"weight","perSide":false,"slot":1,"sets":[{"kg":50,"reps":7,"type":null},{"kg":50,"reps":7,"type":null}]},{"exId":"chestfly","name":"Chest Fly","muscle":"Chest","kind":"weight","perSide":false,"slot":2,"sets":[{"kg":100,"reps":6,"type":null},{"kg":100,"reps":5,"type":null}]},{"exId":"tbarrow","name":"T Bar Row","muscle":"Back","kind":"weight","perSide":false,"slot":2,"sets":[{"kg":40,"reps":8,"type":null},{"kg":40,"reps":8,"type":null}]},{"exId":"cycling","name":"Cycling (Indoor)","muscle":"Cardio","kind":"time","perSide":false,"slot":0,"sets":[{"secs":1200}]}],"priorSlots":{"inclinebench-smith":{"1":{"slot":1,"muscle":"Chest","count":97,"best":90,"bestSet":{"kg":75,"done":true,"reps":6},"lastSet":{"kg":65,"done":true,"reps":6}},"2":{"slot":2,"muscle":"Chest","count":28,"best":82.63333333333334,"bestSet":{"kg":67,"done":true,"reps":7},"lastSet":{"kg":65,"done":true,"reps":8}}},"latpulldown":{"1":{"slot":1,"muscle":"Back","count":64,"best":80,"bestSet":{"kg":60,"done":true,"reps":10},"lastSet":{"kg":50,"done":true,"reps":5}},"2":{"slot":2,"muscle":"Back","count":2,"best":57,"bestSet":{"kg":45,"done":true,"reps":8},"lastSet":{"kg":45,"done":true,"reps":7}}},"chestfly":{"1":{"slot":1,"muscle":"Chest","count":15,"best":126.66666666666666,"bestSet":{"kg":100,"done":true,"reps":8},"lastSet":{"kg":100,"done":true,"reps":8}},"2":{"slot":2,"muscle":"Chest","count":114,"best":117.16666666666667,"bestSet":{"kg":95,"done":true,"reps":7},"lastSet":{"kg":100,"done":true,"reps":5}},"3":{"slot":3,"muscle":"Chest","count":18,"best":94.96666666666667,"bestSet":{"kg":77,"done":true,"reps":7},"lastSet":{"kg":70,"done":true,"reps":7}}},"tbarrow":{"1":{"slot":1,"muscle":"Back","count":11,"best":55.5,"bestSet":{"kg":45,"done":true,"reps":7},"lastSet":{"kg":45,"done":true,"reps":6}},"2":{"slot":2,"muscle":"Back","count":95,"best":56,"bestSet":{"kg":40,"done":true,"reps":12},"lastSet":{"kg":40,"done":true,"reps":8}},"3":{"slot":3,"muscle":"Back","count":17,"best":44.33333333333333,"bestSet":{"kg":35,"done":true,"reps":8},"lastSet":{"kg":35,"done":true,"reps":7}}}},"recentSameName":[{"date":"2026-06-30","volume":3590},{"date":"2026-06-23","volume":3351},{"date":"2026-06-15","volume":3601}]};

var TICK = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="M4.5 12.5l5 5 10-11"/></svg>';
function esc(s){ return String(s==null?'':s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
function e1rm(w,r){ return (+w||0)*(1+(+r||0)/30); }
function ordinal(n){ return n+({1:'st',2:'nd',3:'rd'}[n%100>10&&n%100<14?0:n%10]||'th'); }
function fmtFloorTime(sec){ var m=Math.round((+sec||0)/60); if(m<60) return m+' min'; var h=Math.floor(m/60),r=m%60; return h+'h'+(r?' '+r+'m':''); }
function workSets(ss){ return (ss||[]).filter(function(s){ return s && s.type!=='warmup'; }); }
function isTimeE(e){ return e && (e.kind==='time' || e.muscle==='Cardio'); }
function shortName(n){ return String(n||'').replace(/\s*\(.*?\)\s*/g,'').toLowerCase(); }
function topSet(e){ var b=null,bv=0; workSets(e.sets).forEach(function(s){ var kg=+s.kg||0,r=+s.reps||0; if(kg<=0||r<=0)return; var v=e1rm(kg,r); if(v>bv){bv=v;b=s;} }); return b; }

/* THE VERDICT — ranked, computed, never flattering.
   Returns a short headline (a number wherever possible) + ONE line of meaning. */
function verdict(S, entries, prior){
  var lifts=entries.filter(function(e){ return !isTimeE(e) && workSets(e.sets).length; });
  if(!lifts.length){
    var secs=0,nm='';
    entries.forEach(function(e){ if(isTimeE(e)){ (e.sets||[]).forEach(function(s){ secs+=+s.secs||0; }); if(!nm) nm=shortName(e.name); } });
    if(secs>0) return { big:fmtFloorTime(secs), unit:'', line:'No lifting today &mdash; but you showed up, and the week keeps its shape.' };
    return { big:'Logged', unit:'', line:'A short one &mdash; it still counts.' };
  }
  if(S.prs && S.prs.length){
    var pe=null; entries.forEach(function(e){ if(S.prs.indexOf(e.exId)>-1 && !pe) pe=e; });
    var ps=pe?topSet(pe):null;
    if(pe&&ps) return { big:ps.kg+' × '+ps.reps, unit:'', pr:true, subject:shortName(pe.name), line:'<b>'+esc(shortName(pe.name))+'</b> &middot; a new personal best.' };
  }
  var cand=null;
  entries.forEach(function(e){
    if(isTimeE(e) || !e.slot) return;
    var p=(prior[e.exId]||{})[e.slot]; if(!p || p.count<3 || !p.bestSet) return;
    var t=topSet(e); if(!t) return;
    var g=e1rm(t.kg,t.reps)-p.best;
    if(g>0 && (!cand || g>cand.g)) cand={e:e,t:t,p:p,g:g};
  });
  if(cand){
    var e=cand.e, t=cand.t, m=String(e.muscle||'').toLowerCase();
    var s1=(prior[e.exId]||{})[1];
    var tail=(e.slot>1 && s1 && s1.bestSet && (+t.kg||0)>=(+s1.bestSet.kg||0)) ? ' &mdash; the weight you lift fresh' : '';
    return { big:t.kg+' × '+t.reps, unit:'', subject:shortName(e.name),
      line:'<b>'+esc(shortName(e.name))+'</b> &middot; best ever as your '+ordinal(e.slot)+' '+esc(m)+' movement'+tail+'.' };
  }
  var held=null;
  entries.forEach(function(e){
    if(isTimeE(e) || e.slot<2 || held) return;
    var s1=(prior[e.exId]||{})[1], t=topSet(e);
    if(s1 && s1.bestSet && t && (+t.kg||0)>=(+s1.bestSet.kg||0)) held={e:e,t:t};
  });
  if(held) return { big:held.t.kg+' × '+held.t.reps, unit:'', subject:shortName(held.e.name),
    line:'<b>'+esc(shortName(held.e.name))+'</b> &middot; your fresh weight, carried as your '+ordinal(held.e.slot)+' '+esc(String(held.e.muscle).toLowerCase())+' movement.' };
  var prev=(DATA.recentSameName||[]).map(function(x){ return +x.volume||0; });
  if(prev.length>=3 && S.volume>Math.max.apply(null,prev))
    return { big:(+S.volume).toLocaleString(), unit:'kg', line:'Your heaviest <b>'+esc(S.name)+'</b> yet.' };
  return { big:(+S.volume).toLocaleString(), unit:'kg', line:'<b>'+esc(S.name)+'</b> &middot; logged and in the books.' };
}

function totals(entries,S){
  var sets=0,best=null,bv=0;
  entries.forEach(function(e){ if(isTimeE(e))return; workSets(e.sets).forEach(function(s){ sets++; var v=e1rm(s.kg,s.reps); if(v>bv){bv=v;best={kg:s.kg,reps:s.reps,name:e.name};} }); });
  return { sets:sets, best:best, vol:+S.volume||0, dur:+S.durationSec||0 };
}
/* the footnote never prints an empty fact: no "0 kg", no "0 sets" */
function footLine(S,T){
  var p=['<b>'+esc(S.name)+'</b>'];
  if(T.vol>0) p.push(T.vol.toLocaleString()+' kg');
  if(T.sets>0) p.push(T.sets+(T.sets===1?' set':' sets'));
  if(T.dur>0) p.push(fmtFloorTime(T.dur));
  return p.join(' &middot; ');
}
function acts(){ return '<div class="dc-acts"><button class="dc-btn">See the session</button><button class="dc-btn">Train again</button></div>'; }
function eyebrow(day){ return '<div class="dc-eyebrow">'+TICK+esc(day)+' &middot; trained</div>'; }

function cardA2(S,ents,prior,day){
  var v=verdict(S,ents,prior), T=totals(ents,S);
  return '<div class="dc'+(v.pr?' a2-pr':'')+'">'+eyebrow(day)+
    '<div class="a2-hero">'+v.big+(v.unit?'<small>'+v.unit+'</small>':'')+'</div>'+
    '<div class="a2-line">'+v.line+'</div>'+
    '<div class="dc-rule"></div><div class="dc-foot">'+footLine(S,T)+'</div>'+acts()+'</div>';
}
function cardA1(S,ents,prior,day){
  var v=verdict(S,ents,prior), T=totals(ents,S);
  /* the same verdict, written out as a sentence instead of led by the number */
  var hero = !v.subject ? '<em>'+v.big+(v.unit?' '+v.unit:'')+'</em> moved.'
           : v.pr ? 'A new best on the <em>'+esc(v.subject)+'</em> &mdash; <em>'+v.big+'</em>.'
                  : 'You hit <em>'+v.big+'</em> on the <em>'+esc(v.subject)+'</em>.';
  return '<div class="dc">'+eyebrow(day)+
    '<h2 class="a1-hero">'+hero+'</h2>'+
    '<div class="a1-sub">'+v.line+'</div>'+
    '<div class="dc-rule"></div><div class="dc-foot">'+footLine(S,T)+'</div>'+acts()+'</div>';
}
function cardB(S,ents,day){
  var T=totals(ents,S);
  return '<div class="dc">'+eyebrow(day)+
    '<div class="b-big">'+T.vol.toLocaleString()+'<small>kg moved</small></div>'+
    '<div class="b-sub"><b>'+esc(S.name)+'</b> &middot; '+T.sets+' sets &middot; '+fmtFloorTime(T.dur)+'</div>'+
    (T.best?'<div class="b-sub">Best &middot; <b>'+T.best.kg+'kg × '+T.best.reps+'</b> '+esc(T.best.name)+'</div>':'')+
    acts()+'</div>';
}
function cardCurrent(S,ents,day){
  var T=totals(ents,S);
  return '<div class="dc">'+eyebrow(day)+
    '<div class="cur-name">'+esc(S.name)+'</div>'+
    '<div class="cur-grid">'+
      '<div class="cur-tot"><b>'+T.vol.toLocaleString()+'</b><span>kg lifted</span></div>'+
      '<div class="cur-tot"><b>'+T.sets+'</b><span>sets</span></div>'+
      '<div class="cur-tot"><b>'+fmtFloorTime(T.dur)+'</b><span>on the floor</span></div>'+
    '</div>'+
    (T.best?'<div class="cur-line">Best lift &middot; <b>'+T.best.kg+'kg × '+T.best.reps+'</b> '+esc(T.best.name)+'</div>':'')+
    '<div class="cur-week">1st session this week</div>'+acts()+'</div>';
}

var S=DATA.session, E=DATA.entries, P=DATA.priorSlots;
var pr=JSON.parse(JSON.stringify(DATA)); pr.session.prs=['chestfly'];
var dull=JSON.parse(JSON.stringify(DATA));
dull.entries.forEach(function(e){ if(e.kind!=='time') e.sets=e.sets.map(function(s){ return {kg:Math.round((s.kg||0)*0.7),reps:5,type:s.type}; }); });
dull.session.volume=2180; dull.session.prs=[];
var cardio={ session:{name:'Cycling',volume:0,durationSec:1800,prs:[]},
  entries:[{exId:'cycling',name:'Cycling (Indoor)',muscle:'Cardio',kind:'time',slot:0,sets:[{secs:1800}]}] };

var blocks=[
  ['Now live &mdash; the receipt', cardCurrent(S,E,'Monday'),
   'Three tiles of equal weight and no hero. The one remarkable thing you did is an 8px footnote.'],
  ['A2 &middot; number hero + one line <span class="h">recommended</span>', cardA2(S,E,P,'Monday'),
   'The number <b>is</b> the hero; one line carries the meaning. Compare the height above — the three tiles collapse into a single footnote, so it costs you <b>less</b> space, not more.'],
  ['A1 &middot; the full sentence', cardA1(S,E,P,'Monday'),
   'Same intelligence, written out. The serif paragraph runs long — this is the one your space instinct was right about.'],
  ['B &middot; editorial headline', cardB(S,E,'Monday'),
   'Calm, but no point of view: it tells you what you did, never what it meant.'],
  ['A2 on a PR day', cardA2(pr.session,pr.entries,pr.priorSlots,'Monday'),
   'A real personal best outranks the slot line, and turns amber.'],
  ['A2 on a flat day', cardA2(dull.session,dull.entries,dull.priorSlots,'Wednesday'),
   'Nothing beaten, nothing held → it states the fact and shuts up. It never invents a compliment.'],
  ['A2 on a cardio-only day', cardA2(cardio.session,cardio.entries,{},'Friday'),
   'No lifts → it never mentions kilos you did not move, and never shows an empty "0 kg".']
];

var H='';
blocks.forEach(function(b){
  H+='<div class="lbl">'+b[0]+'</div><div class="m">'+b[1]+'</div><div class="tall"></div><div class="note">'+b[2]+'</div>';
});
document.getElementById('out').innerHTML=H;

/* each card reports its real rendered height — the space question, answered */
document.querySelectorAll('.m').forEach(function(m){
  var card=m.firstElementChild;
  var h=Math.round(card.getBoundingClientRect().height);
  m.nextElementSibling.innerHTML='Rendered height &middot; <b>'+h+'px</b>';
});
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>Done card — demo · ALS</title>
<meta name="theme-color" content="#050506">
<link rel="stylesheet" href="aurora.css">
<style>
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
  body{background:var(--au-void);color:var(--au-ivory);font-family:var(--au-sans);padding:26px 18px 80px;}
  .wrap{max-width:600px;margin:0 auto;}
  .lede{font-family:var(--au-serif);font-style:italic;font-size:26px;line-height:1.15;margin-bottom:6px;}
  .lede-sub{font-size:13px;color:var(--au-dim);line-height:1.5;margin-bottom:26px;}
  .lbl{font-family:var(--au-mono);font-size:9px;font-weight:700;letter-spacing:.2em;text-transform:uppercase;color:var(--au-faint);margin:30px 0 9px;display:flex;align-items:center;gap:9px;}
  .lbl::after{content:"";flex:1;height:1px;background:var(--au-line);}
  .note{font-size:12px;color:var(--au-faint);line-height:1.5;margin-top:8px;}

  /* ── the card ── */
  .dc{position:relative;background:var(--au-glass);border:1px solid var(--au-line);border-radius:18px;padding:18px 18px 16px;overflow:hidden;}
  .dc::before{content:"";position:absolute;top:0;left:8%;right:8%;height:1px;background:linear-gradient(90deg,transparent,rgba(var(--au-glow-rgb),.55),transparent);}
  .dc-eyebrow{font-family:var(--au-mono);font-size:9px;font-weight:700;letter-spacing:.18em;text-transform:uppercase;color:rgba(var(--au-glow-rgb),.85);display:flex;align-items:center;gap:7px;}
  .dc-eyebrow .tick{width:12px;height:12px;}
  .dc-hero{font-family:var(--au-serif);font-style:italic;font-weight:400;font-size:clamp(25px,7vw,33px);line-height:1.1;letter-spacing:-.01em;color:var(--au-ivory);margin:11px 0 0;}
  .dc-hero em{font-style:italic;color:rgb(var(--au-glow-rgb));}
  .dc-sub{font-size:13px;color:var(--au-dim);line-height:1.5;margin-top:9px;max-width:38ch;}
  .dc-rule{height:1px;background:var(--au-line);margin:15px 0 11px;}
  .dc-foot{font-family:var(--au-mono);font-size:10px;letter-spacing:.06em;color:var(--au-faint);}
  .dc-foot b{color:var(--au-dim);font-weight:700;}
  .dc-acts{display:flex;gap:8px;margin-top:14px;}
  .dc-btn{flex:1;font-family:var(--au-mono);font-size:10px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--au-dim);background:rgba(255,255,255,.04);border:1px solid var(--au-line);border-radius:11px;padding:11px;cursor:pointer;}
  .dc-btn.p{color:#04130D;background:rgb(var(--au-glow-rgb));border-color:transparent;}
  .dc-pr{color:var(--au-amber);}

  /* ── runner-up: editorial headline ── */
  .db-big{font-family:var(--au-serif);font-style:italic;font-size:clamp(52px,15vw,68px);line-height:1;letter-spacing:-.02em;margin:9px 0 0;}
  .db-big span{font-family:var(--au-sans);font-style:normal;font-size:13px;color:var(--au-dim);margin-left:8px;letter-spacing:0;}
  .db-sub{font-family:var(--au-mono);font-size:10.5px;letter-spacing:.06em;color:var(--au-faint);margin-top:11px;}
  .db-sub b{color:var(--au-ivory);font-weight:700;}
</style>
</head>
<body>
<div class="wrap">
  <div class="lede">The day, once it&rsquo;s been earned.</div>
  <div class="lede-sub">Two ways to end a workout, both filled with your <b>real</b> session from today (Chest + Back, 13 July). The verdict line is computed, not written &mdash; scroll down to see it hold up on a PR day, an ordinary day and a cardio-only day.</div>
  <div id="out"></div>
</div>
<script>
var DATA = {"session":{"id":"mriwjjxh2znzk","name":"Chest + Back","date":"2026-07-13","volume":3115,"durationSec":3787,"prs":[]},"entries":[{"exId":"inclinebench-smith","name":"Incline Bench Press (Smith Machine)","muscle":"Chest","kind":"weight","perSide":false,"slot":1,"sets":[{"kg":75,"reps":5,"type":null},{"kg":75,"reps":4,"type":null}]},{"exId":"latpulldown","name":"Lat Pulldown (Machine)","muscle":"Back","kind":"weight","perSide":false,"slot":1,"sets":[{"kg":50,"reps":7,"type":null},{"kg":50,"reps":7,"type":null}]},{"exId":"chestfly","name":"Chest Fly","muscle":"Chest","kind":"weight","perSide":false,"slot":2,"sets":[{"kg":100,"reps":6,"type":null},{"kg":100,"reps":5,"type":null}]},{"exId":"tbarrow","name":"T Bar Row","muscle":"Back","kind":"weight","perSide":false,"slot":2,"sets":[{"kg":40,"reps":8,"type":null},{"kg":40,"reps":8,"type":null}]},{"exId":"cycling","name":"Cycling (Indoor)","muscle":"Cardio","kind":"time","perSide":false,"slot":0,"sets":[{"secs":1200}]}],"priorSlots":{"inclinebench-smith":{"1":{"slot":1,"muscle":"Chest","count":97,"best":90,"bestSet":{"kg":75,"done":true,"reps":6},"lastSet":{"kg":65,"done":true,"reps":6}},"2":{"slot":2,"muscle":"Chest","count":28,"best":82.63333333333334,"bestSet":{"kg":67,"done":true,"reps":7},"lastSet":{"kg":65,"done":true,"reps":8}}},"latpulldown":{"1":{"slot":1,"muscle":"Back","count":64,"best":80,"bestSet":{"kg":60,"done":true,"reps":10},"lastSet":{"kg":50,"done":true,"reps":5}},"2":{"slot":2,"muscle":"Back","count":2,"best":57,"bestSet":{"kg":45,"done":true,"reps":8},"lastSet":{"kg":45,"done":true,"reps":7}}},"chestfly":{"1":{"slot":1,"muscle":"Chest","count":15,"best":126.66666666666666,"bestSet":{"kg":100,"done":true,"reps":8},"lastSet":{"kg":100,"done":true,"reps":8}},"2":{"slot":2,"muscle":"Chest","count":114,"best":117.16666666666667,"bestSet":{"kg":95,"done":true,"reps":7},"lastSet":{"kg":100,"done":true,"reps":5}},"3":{"slot":3,"muscle":"Chest","count":18,"best":94.96666666666667,"bestSet":{"kg":77,"done":true,"reps":7},"lastSet":{"kg":70,"done":true,"reps":7}}},"tbarrow":{"1":{"slot":1,"muscle":"Back","count":11,"best":55.5,"bestSet":{"kg":45,"done":true,"reps":7},"lastSet":{"kg":45,"done":true,"reps":6}},"2":{"slot":2,"muscle":"Back","count":95,"best":56,"bestSet":{"kg":40,"done":true,"reps":12},"lastSet":{"kg":40,"done":true,"reps":8}},"3":{"slot":3,"muscle":"Back","count":17,"best":44.33333333333333,"bestSet":{"kg":35,"done":true,"reps":8},"lastSet":{"kg":35,"done":true,"reps":7}}}},"recentSameName":[{"date":"2026-06-30","volume":3590},{"date":"2026-06-23","volume":3351},{"date":"2026-06-15","volume":3601}]};
var TICK = "<svg class=\"tick\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2.4\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M4.5 12.5l5 5 10-11\"/></svg>";
function esc(s){ return String(s==null?"":s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;"); }
function e1rm(w,r){ return (+w||0)*(1+(+r||0)/30); }
function ordinal(n){ return n+({1:"st",2:"nd",3:"rd"}[n%100>10&&n%100<14?0:n%10]||"th"); }
function fmtFloorTime(sec){ var m=Math.round((+sec||0)/60); if(m<60) return m+" min"; var h=Math.floor(m/60),r=m%60; return h+"h"+(r?" "+r+"m":""); }
function workSets(ss){ return (ss||[]).filter(function(s){ return s && s.type!=="warmup"; }); }
function isTimeE(e){ return e && (e.kind==="time" || e.muscle==="Cardio"); }
function topSet(e){ var best=null,bv=0; workSets(e.sets).forEach(function(s){ var kg=+s.kg||0,r=+s.reps||0; if(kg<=0||r<=0)return; var v=e1rm(kg,r); if(v>bv){bv=v;best=s;} }); return best; }

/* ── THE VERDICT ─────────────────────────────────────────────────────────────
   Ranked, and every branch must be TRUE of the data. If nothing earns a line we
   say something plain rather than something clever. */
function verdict(S, entries, prior){
  // 0 · no lifts at all → never talk about kg you didn't move
  var lifts=entries.filter(function(e){ return !isTimeE(e) && workSets(e.sets).length; });
  if(!lifts.length){
    var secs=0, nm="";
    entries.forEach(function(e){ if(isTimeE(e)){ (e.sets||[]).forEach(function(s){ secs+=+s.secs||0; }); if(!nm) nm=shortName(e.name); } });
    if(secs>0) return { hero:"<em>"+fmtFloorTime(secs)+"</em> of "+esc(nm)+".", sub:"No lifting today &mdash; but you showed up, and the week keeps its shape." };
    return { hero:"Logged.", sub:"A short one &mdash; it still counts." };
  }
  // 1 · an all-time PR outranks everything
  if(S.prs && S.prs.length){
    var nm=(entries.filter(function(e){ return S.prs.indexOf(e.exId)>-1; })[0]||{}).name||"";
    var ps=null; entries.forEach(function(e){ if(S.prs.indexOf(e.exId)>-1) ps=topSet(e); });
    if(nm && ps) return { hero:"A new best on <em>"+esc(nm.toLowerCase())+"</em> &mdash; <em>"+ps.kg+" &times; "+ps.reps+"</em>.", sub:"Nothing else you did today matters as much as that.", pr:true };
  }
  // 2 · beat your own best FOR THIS SLOT (needs real history in that slot)
  var cand=null;
  entries.forEach(function(e){
    if(isTimeE(e) || !e.slot) return;
    var p=(prior[e.exId]||{})[e.slot]; if(!p || p.count<3 || !p.bestSet) return;
    var t=topSet(e); if(!t) return;
    var gain=e1rm(t.kg,t.reps)-p.best;
    if(gain>0 && (!cand || gain>cand.gain)) cand={ e:e, t:t, p:p, gain:gain };
  });
  if(cand){
    var e=cand.e, t=cand.t, m=String(e.muscle||"").toLowerCase();
    var s1=(prior[e.exId]||{})[1];
    var sub;
    if(e.slot>1 && s1 && s1.bestSet && (+t.kg||0)>=(+s1.bestSet.kg||0))
      sub="Your best ever in that slot &mdash; at the weight you normally lift fresh.";
    else if(e.slot>1)
      sub="Your best ever in that slot. Previous: "+p2(cand.p)+", over "+cand.p.count+" sessions.";
    else
      sub="Your best ever going in first. Previous: "+p2(cand.p)+".";
    return { hero:"You hit <em>"+t.kg+" &times; "+t.reps+"</em> on the "+esc(shortName(e.name))+" as your <em>"+ordinal(e.slot)+" "+esc(m)+"</em> movement.", sub:sub };
  }
  // 3 · matched the slot reference (held the line under fatigue)
  var held=null;
  entries.forEach(function(e){
    if(isTimeE(e) || e.slot<2) return;
    var s1=(prior[e.exId]||{})[1]; var t=topSet(e);
    if(!s1 || !s1.bestSet || !t) return;
    if((+t.kg||0)>=(+s1.bestSet.kg||0) && !held) held={ e:e, t:t };
  });
  if(held) return { hero:"You held <em>"+held.t.kg+"kg</em> on the "+esc(shortName(held.e.name))+" as your <em>"+ordinal(held.e.slot)+" "+esc(String(held.e.muscle).toLowerCase())+"</em> movement.", sub:"Same weight you lift fresh &mdash; carried under fatigue." };
  // 4 · heaviest session of its kind in a while
  var prev=(DATA.recentSameName||[]).map(function(x){ return +x.volume||0; });
  if(prev.length>=3 && S.volume>Math.max.apply(null,prev))
    return { hero:"<em>"+(+S.volume).toLocaleString()+" kg</em> &mdash; your heaviest "+esc(S.name)+" yet.", sub:"Volume beats every "+esc(S.name)+" you have logged." };
  // 5 · plain and true
  return { hero:"<em>"+(+S.volume).toLocaleString()+" kg</em> moved.", sub:S.name+" &mdash; logged and in the books." };
}
function p2(p){ return (+p.bestSet.kg||0)+" &times; "+(+p.bestSet.reps||0); }
function shortName(n){ return String(n||"").replace(/\s*\(.*?\)\s*/g,"").toLowerCase(); }

function totals(entries, S){
  var sets=0,best=null,bv=0;
  entries.forEach(function(e){ if(isTimeE(e))return; workSets(e.sets).forEach(function(s){ sets++; var v=e1rm(s.kg,s.reps); if(v>bv){bv=v;best={kg:s.kg,reps:s.reps,name:e.name};} }); });
  return { sets:sets, best:best, vol:+S.volume||0, dur:+S.durationSec||0 };
}
/* the footnote never prints an empty fact: no "0 kg", no "0 sets" */
function footLine(S,T){
  var p=["<b>"+esc(S.name)+"</b>"];
  if(T.vol>0)  p.push(T.vol.toLocaleString()+" kg");
  if(T.sets>0) p.push(T.sets+(T.sets===1?" set":" sets"));
  if(T.dur>0)  p.push(fmtFloorTime(T.dur));
  return p.join(" &middot; ");
}
function cardA(S, entries, prior, day){
  var v=verdict(S, entries, prior), T=totals(entries,S);
  return "<div class=\"dc\">"+
    "<div class=\"dc-eyebrow\">"+TICK+esc(day)+" &middot; trained</div>"+
    "<h2 class=\"dc-hero"+(v.pr?" dc-pr":"")+"\">"+v.hero+"</h2>"+
    "<div class=\"dc-sub\">"+v.sub+"</div>"+
    "<div class=\"dc-rule\"></div>"+
    "<div class=\"dc-foot\">"+footLine(S,T)+"</div>"+
    "<div class=\"dc-acts\"><button class=\"dc-btn\">See the session</button><button class=\"dc-btn\">Train again</button></div>"+
  "</div>";
}
function cardB(S, entries, day){
  var T=totals(entries,S);
  return "<div class=\"dc\">"+
    "<div class=\"dc-eyebrow\">"+TICK+esc(day)+" &middot; trained</div>"+
    "<div class=\"db-big\">"+T.vol.toLocaleString()+"<span>kg moved</span></div>"+
    "<div class=\"db-sub\"><b>"+esc(S.name)+"</b> &middot; "+T.sets+" sets &middot; "+fmtFloorTime(T.dur)+"</div>"+
    (T.best?"<div class=\"db-sub\">Best &middot; <b>"+T.best.kg+"kg &times; "+T.best.reps+"</b> "+esc(T.best.name)+"</div>":"")+
    "<div class=\"dc-acts\"><button class=\"dc-btn\">See the session</button><button class=\"dc-btn\">Train again</button></div>"+
  "</div>";
}

var H="";
H+="<div class=\"lbl\">A &middot; coach&rsquo;s verdict (recommended)</div>";
H+=cardA(DATA.session, DATA.entries, DATA.priorSlots, "Monday");
H+="<div class=\"note\">Every word is computed from today: the fly at 100 &times; 6 as your 2nd chest movement really did beat your previous best for that slot (95 &times; 7 over 114 sessions), at the same 100kg you lift fresh. No other app can say this sentence.</div>";

H+="<div class=\"lbl\">B &middot; editorial headline (runner-up)</div>";
H+=cardB(DATA.session, DATA.entries, "Monday");
H+="<div class=\"note\">Calmer, dumber. One number, no point of view.</div>";

H+="<div class=\"lbl\">A, on other days &mdash; does it ever say anything stupid?</div>";
var prDay=JSON.parse(JSON.stringify(DATA));
prDay.session.prs=["chestfly"];
H+=cardA(prDay.session, prDay.entries, prDay.priorSlots, "Monday");
H+="<div class=\"note\">A real PR outranks the slot line.</div>";

var dull=JSON.parse(JSON.stringify(DATA));
dull.entries.forEach(function(e){ if(e.kind!=="time") e.sets=e.sets.map(function(s){ return {kg:Math.round((s.kg||0)*0.7), reps:5, type:s.type}; }); });
dull.session.volume=2180; dull.session.prs=[];
H+=cardA(dull.session, dull.entries, dull.priorSlots, "Wednesday");
H+="<div class=\"note\">A flat day: nothing beaten, nothing held &rarr; it states the fact and shuts up. It never invents a compliment.</div>";

var cardio={ session:{name:"Cycling",volume:0,durationSec:1800,prs:[]}, entries:[{exId:"cycling",name:"Cycling (Indoor)",muscle:"Cardio",kind:"time",slot:0,sets:[{secs:1800}]}] };
H+=cardA(cardio.session, cardio.entries, {}, "Friday");
H+="<div class=\"note\">Cardio-only: no lifts, no fake best. Still a day you showed up.</div>";

document.getElementById("out").innerHTML=H;
</script>
</body>
</html>

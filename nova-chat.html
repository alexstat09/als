<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <!-- user-scalable=no avoids the standalone-PWA "pinch zooms once and sticks"
       bug. It does NOT block taps. No custom touch handlers on this page. -->
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>Nova · MÉTRON</title>
  <meta name="theme-color" content="#070709">
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="apple-touch-icon.png">
  <!-- Nova's ONE heartbeat lives in aurora.css. This page stays self-contained
       for its MESSAGE layout (the thing that kept breaking) — and aurora.css is
       100% class-scoped (.au-*/.nova only, zero bare-element or .nv-* rules), so
       linking it touches nothing but the .nova orb: it gives Nova back her beat,
       float and thinking-state on the very page you talk to her. Linked BEFORE
       the inline <style> so this page's own .nova sizing still wins. -->
  <link rel="stylesheet" href="aurora.css">
  <style>
    /* ════════════════════════════════════════════════════════════════
       Nova chat — rebuilt clean (v53). The recurring "overlapping text"
       was a LAYOUT bug: message bubbles were laid out with fl/inline
       boxes whose height iOS WKWebView could resolve SHORTER than their
       content, so text spilled onto the next message. The cure is the
       dumbest, most deterministic box model there is:
         a message bubble is a BLOCK element with width:fit-content +
         max-width. A block element is ALWAYS at least as tall as its
         content — it cannot be shorter, so text cannot overflow it.
       No flex, no inline-block, no transforms, no fixed/animated layers
       behind the scroll. Plain document flow, like every working page.
       ════════════════════════════════════════════════════════════════ */
    @import url('https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&display=swap');
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
    :root{
      --sans:-apple-system,BlinkMacSystemFont,"Inter","Segoe UI",Roboto,system-ui,sans-serif;
      --serif:"Instrument Serif",Georgia,"Times New Roman",ui-serif,serif;
      --mono:ui-monospace,"SF Mono",Menlo,Consolas,monospace;
      --bg:#070709; --ink:#F4F1EA; --emerald:#34E2B0; --violet:#9B8CFF;
    }
    html,body{background:var(--bg);}
    body{
      min-height:100dvh; color:var(--ink); font-family:var(--sans);
      -webkit-font-smoothing:antialiased; overflow-x:hidden;
      padding-bottom:132px; touch-action:manipulation;
      background:
        radial-gradient(135% 55% at 50% -5%, rgba(52,226,176,.07), transparent 55%),
        radial-gradient(95% 45% at 100% 102%, rgba(155,140,255,.06), transparent 55%),
        var(--bg);
      background-repeat:no-repeat;
    }

    /* ── header (sticky, solid) ── */
    .nv-top{position:sticky;top:0;z-index:10;display:flex;align-items:center;gap:11px;
      padding:calc(12px + env(safe-area-inset-top)) 16px 12px;
      background:rgba(8,8,11,.97);border-bottom:1px solid rgba(255,255,255,.06);}
    .nv-back{flex:none;width:36px;height:36px;border-radius:50%;border:1px solid rgba(255,255,255,.1);
      background:rgba(255,255,255,.04);color:var(--ink);font-size:18px;text-decoration:none;
      display:flex;align-items:center;justify-content:center;}
    .nv-back:active{background:rgba(255,255,255,.12);}
    .nova{display:block;}
    .nv-top .nova{width:38px;height:38px;flex:none;}
    .nv-top .nova svg{width:100%;height:100%;display:block;}
    .nv-id{flex:1;min-width:0;}
    .nv-name{font-family:var(--serif);font-style:italic;font-size:21px;line-height:1;}
    .nv-status{display:flex;align-items:center;gap:6px;margin-top:4px;font-family:var(--mono);
      font-size:9px;font-weight:700;letter-spacing:.16em;text-transform:uppercase;color:rgba(244,241,234,.4);}
    .nv-dot{width:6px;height:6px;border-radius:50%;background:var(--emerald);animation:nv-blink 1.6s ease-in-out infinite;}
    @keyframes nv-blink{0%,100%{opacity:1;}50%{opacity:.25;}}
    .nv-icon{flex:none;background:none;border:none;color:rgba(244,241,234,.32);font-family:var(--mono);
      font-size:9px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;cursor:pointer;padding:8px 4px;}
    .nv-icon.emoji{font-size:17px;letter-spacing:0;}
    .nv-icon:active{color:var(--ink);}

    /* ── conversation (PLAIN BLOCK FLOW) ── */
    .nv-wrap{max-width:720px;margin:0 auto;}
    .nv-scroll{display:block;padding:22px 16px 10px;}
    .nv-row{display:block;margin:0 0 16px;animation:nv-rise .25s ease both;}
    .nv-row:last-child{margin-bottom:0;}
    @keyframes nv-rise{from{opacity:0;}to{opacity:1;}}

    /* THE bubble: a block that shrink-wraps to its text but is always tall
       enough for it. width:fit-content shrink-wraps; if a browser ignored it
       the bubble would simply be wider — never shorter than its text. */
    .nv-bub{
      display:block;
      width:-moz-fit-content; width:fit-content;
      max-width:86%;
      padding:12px 16px;
      border-radius:20px;
      font-size:var(--nv-fs,15px);
      line-height:1.55;
      overflow-wrap:anywhere;
      word-break:break-word;
    }
    .nv-row.nova .nv-bub{background:rgba(255,255,255,.055);border:1px solid rgba(255,255,255,.08);
      border-top-left-radius:7px;color:var(--ink);}
    .nv-row.me .nv-bub{margin-left:auto;
      background:linear-gradient(135deg,rgba(52,226,176,.20),rgba(155,140,255,.13));
      border:1px solid rgba(52,226,176,.30);border-top-right-radius:7px;color:var(--ink);}
    .nv-bub strong{font-weight:700;}
    .nv-text{display:block;}

    .nv-cursor{display:inline-block;width:7px;height:1em;margin-left:2px;vertical-align:-2px;
      background:var(--emerald);border-radius:1px;box-shadow: none;
      animation:nv-caret .9s step-end infinite;}
    @keyframes nv-caret{0%,100%{opacity:1;}50%{opacity:0;}}
    .nv-think{display:inline-flex;gap:5px;padding:2px 0;}
    .nv-think i{width:7px;height:7px;border-radius:50%;background:rgba(52,226,176,.85);animation:nv-bounce 1.1s ease-in-out infinite;}
    .nv-think i:nth-child(2){animation-delay:.15s;} .nv-think i:nth-child(3){animation-delay:.3s;}
    @keyframes nv-bounce{0%,80%,100%{transform:scale(.6);opacity:.4;}40%{transform:scale(1);opacity:1;}}

    /* Nova's hands — confirm-first action chip (inside the nova bubble) */
    .nv-act{margin-top:11px;padding:11px 12px;border-radius:13px;background:rgba(52,226,176,.07);border:1px solid rgba(52,226,176,.28);}
    .nv-act-q{font-size:13.5px;color:var(--ink);line-height:1.4;margin-bottom:9px;}
    .nv-act-btns{display:flex;gap:8px;}
    .nv-act-go,.nv-act-no{border:none;border-radius:9px;padding:8px 15px;font-family:inherit;font-size:13px;font-weight:700;cursor:pointer;}
    .nv-act-go{background:linear-gradient(135deg,var(--emerald),#18C8C0);color:#04130D;}
    .nv-act-no{background:rgba(255,255,255,.06);color:rgba(244,241,234,.65);border:1px solid rgba(255,255,255,.1);}
    .nv-act-go:disabled,.nv-act-no:disabled{opacity:.5;cursor:default;}
    .nv-act.done{background:rgba(52,226,176,.1);border-color:rgba(52,226,176,.4);}
    .nv-act.fail{background:rgba(255,107,139,.08);border-color:rgba(255,107,139,.35);}
    .nv-act.done .nv-act-q,.nv-act.fail .nv-act-q{margin-bottom:0;}

    /* ── intro / suggestions ── */
    .nv-intro{text-align:center;padding:34px 18px 12px;}
    .nv-intro .nova{width:74px;height:74px;margin:0 auto 18px;}
    /* intro hero — Nova at full size, beating */
    .nv-intro .nv-hero{position:relative;width:132px;height:132px;margin:0 auto 20px;}
    .nv-intro .nv-hero .nova{width:100%;height:100%;margin:0;}
    .nv-hero::before{content:"";position:absolute;inset:-22%;border-radius:50%;background:radial-gradient(circle,rgba(63,224,176,.26),rgba(63,224,176,0) 70%);filter:blur(7px);z-index:-1;pointer-events:none;animation:nv-heroGlow 4.6s ease-in-out infinite;}
    @keyframes nv-heroGlow{0%,100%{opacity:.72;transform:scale(1);}50%{opacity:1;transform:scale(1.05);}}
    @media (prefers-reduced-motion: reduce){.nv-hero::before{animation:none;}}
    .nv-intro h1{font-family:var(--serif);font-style:italic;font-size:28px;margin-bottom:9px;line-height:1.15;}
    .nv-intro p{font-size:13.5px;color:rgba(244,241,234,.5);max-width:340px;margin:0 auto;line-height:1.55;}
    .nv-chips{display:flex;flex-wrap:wrap;gap:9px;justify-content:center;margin-top:22px;}
    .nv-chip{font-size:13px;color:var(--ink);background:rgba(255,255,255,.04);border:1px solid rgba(52,226,176,.22);
      border-radius:14px;padding:10px 15px;cursor:pointer;font-family:inherit;transition:background .18s,border-color .18s,transform .18s;}
    .nv-chip:hover{background:rgba(52,226,176,.08);border-color:rgba(52,226,176,.42);transform:translateY(-1px);}
    .nv-chip:active{background:rgba(52,226,176,.14);border-color:rgba(52,226,176,.55);transform:translateY(0);}

    /* ── composer (fixed at the bottom, solid) ── */
    .nv-bar{position:fixed;left:0;right:0;bottom:0;z-index:30;
      padding:10px 14px calc(12px + env(safe-area-inset-bottom));
      background:rgba(8,8,11,.98);border-top:1px solid rgba(255,255,255,.06);}
    .nv-barIn{max-width:720px;margin:0 auto;display:flex;align-items:flex-end;gap:10px;
      background:rgba(255,255,255,.045);border:1px solid rgba(255,255,255,.11);border-radius:22px;
      padding:6px 6px 6px 16px;transition:border-color .2s,box-shadow .2s;}
    .nv-barIn:focus-within{border-color:rgba(52,226,176,.45);box-shadow: none;}
    .nv-in{flex:1;min-width:0;background:none;border:none;outline:none;color:var(--ink);font-family:inherit;
      font-size:16px;line-height:1.4;resize:none;max-height:130px;padding:8px 0;}
    .nv-in::placeholder{color:rgba(244,241,234,.32);}
    .nv-send{flex:none;width:38px;height:38px;border-radius:50%;border:none;cursor:pointer;
      display:flex;align-items:center;justify-content:center;color:#04130D;
      background:linear-gradient(135deg,var(--emerald),#18C8C0 55%,var(--violet));
      box-shadow: none;transition:transform .12s,opacity .2s;}
    .nv-send:active{transform:scale(.92);}
    .nv-send:disabled{opacity:.4;cursor:default;box-shadow:none;}
    .nv-send svg{width:19px;height:19px;}

    /* While Nova generates, the header orb gets the real thinking state from
       aurora.css (the .is-thinking class, toggled in setBusy): a quickened
       heartbeat + a fine sweeping ring. No page-local keyframe — one heartbeat,
       one source. */

    /* memory panel */
    .nv-mem{position:fixed;inset:0;z-index:200;background:rgba(0,0,0,.6);display:flex;align-items:flex-start;justify-content:center;padding:64px 16px;}
    .nv-mem[hidden]{display:none;}
    .nv-mem-card{width:100%;max-width:440px;background:#0c0d11;border:1px solid rgba(255,255,255,.1);border-radius:18px;padding:16px;box-shadow:0 24px 60px rgba(0,0,0,.6);}
    .nv-mem-head{display:flex;align-items:center;justify-content:space-between;font-size:14px;font-weight:700;margin-bottom:12px;}
    .nv-mem-x{background:none;border:none;color:rgba(244,241,234,.5);font-size:18px;cursor:pointer;line-height:1;}
    .nv-mem-list{display:block;max-height:52vh;overflow:auto;}
    .nv-mem-item{display:flex;gap:10px;align-items:flex-start;justify-content:space-between;margin-bottom:8px;
      padding:11px 12px;border-radius:11px;background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.06);
      font-size:13.5px;line-height:1.45;}
    .nv-mem-del{background:none;border:none;color:#FF8FA3;font-size:13px;cursor:pointer;flex:none;}
    .nv-mem-empty{color:rgba(244,241,234,.4);font-size:13px;padding:10px 2px;line-height:1.5;}
    .nv-mem-forget{margin-top:8px;width:100%;padding:11px;border-radius:11px;border:1px solid rgba(255,143,163,.3);background:rgba(255,143,163,.08);color:#FF8FA3;font-weight:700;font-size:13px;cursor:pointer;}
  </style>
</head>
<body id="root">
  <header class="nv-top">
    <a class="nv-back" href="index.html" aria-label="Back to hub">&#8592;</a>
    <div class="nova" aria-hidden="true"><svg viewBox="0 0 100 100" aria-hidden="true"><defs><linearGradient id="nvNova" x1="0" y1="0" x2="1" y2="0"><stop offset="0%" stop-color="#34E2B0"/><stop offset="55%" stop-color="#22CBC6"/><stop offset="100%" stop-color="#9B8CFF"/></linearGradient><radialGradient id="nvNovaF" cx=".5" cy=".5" r=".5"><stop offset="0%" stop-color="#34E2B0" stop-opacity=".16"/><stop offset="100%" stop-color="#34E2B0" stop-opacity="0"/></radialGradient><clipPath id="nvNovaC"><circle cx="50" cy="50" r="40"/></clipPath></defs><g class="nova-glow"><circle cx="50" cy="50" r="40" fill="url(#nvNovaF)"/><circle class="nova-ring" cx="50" cy="50" r="40" fill="none" stroke="url(#nvNova)" stroke-width="2.2" opacity=".55"/><g clip-path="url(#nvNovaC)"><path class="nova-track" d="M18.8 50 H38.3 L42.2 55.1 L48.8 25 L56.3 75 L62.1 46.1 L66.8 50 H81.3" fill="none" stroke="url(#nvNova)" stroke-width="2.6" stroke-linecap="round" stroke-linejoin="round" opacity=".2"/><path class="nova-trace" d="M18.8 50 H38.3 L42.2 55.1 L48.8 25 L56.3 75 L62.1 46.1 L66.8 50 H81.3" fill="none" stroke="url(#nvNova)" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/><path class="nova-trace" d="M18.8 50 H38.3 L42.2 55.1 L48.8 25 L56.3 75 L62.1 46.1 L66.8 50 H81.3" fill="none" stroke="#EAFFF7" stroke-width="1.1" stroke-linecap="round" stroke-linejoin="round" opacity=".5"/></g><g class="nova-node"><circle cx="48.8" cy="25" r="4.4" fill="#EAFFF7"/></g></g></svg></div>
    <div class="nv-id">
      <div class="nv-name">Nova</div>
      <div class="nv-status"><span class="nv-dot"></span><span id="nvStatus">connecting…</span></div>
    </div>
    <button class="nv-icon" id="nvMem" type="button" title="What Nova remembers" aria-label="Memory" style="padding:8px 6px"><svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><path d="M12 5a2.5 2.5 0 0 0-4.5 1.5A2.5 2.5 0 0 0 5 9a2.5 2.5 0 0 0 1 2 2.5 2.5 0 0 0 1.5 4.5A2.5 2.5 0 0 0 12 17zM12 5a2.5 2.5 0 0 1 4.5 1.5A2.5 2.5 0 0 1 19 9a2.5 2.5 0 0 1-1 2 2.5 2.5 0 0 1-1.5 4.5A2.5 2.5 0 0 1 12 17zM12 5v12"/></svg></button>
    <button class="nv-icon" id="nvClear" type="button">Clear</button>
  </header>

  <main class="nv-wrap">
    <div class="nv-scroll" id="nvScroll"></div>
  </main>

  <div class="nv-mem" id="nvMemPanel" hidden>
    <div class="nv-mem-card">
      <div class="nv-mem-head"><span>What Nova remembers</span><button id="nvMemClose" class="nv-mem-x" type="button" aria-label="Close">✕</button></div>
      <div class="nv-mem-list" id="nvMemList"></div>
      <button class="nv-mem-forget" id="nvMemForgetAll" type="button">Forget everything</button>
    </div>
  </div>

  <div class="nv-bar" id="nvBar">
    <div class="nv-barIn">
      <textarea class="nv-in" id="nvIn" rows="1" placeholder="Talk to Nova…" autocomplete="off"></textarea>
      <button class="nv-send" id="nvSend" type="button" aria-label="Send" disabled>
        <svg viewBox="0 0 24 24" fill="none"><path d="M5 12h13M13 6l6 6-6 6" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"/></svg>
      </button>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <!-- This page has no topbar, so it loads the profile itself: it needs the
       name for the greeting AND the access token for /api/nova-chat. -->
  <script src="als-profile.js" defer></script>
  <script src="error-toast.js" defer></script>
  <script src="sync.js" defer></script>
  <script src="insights-engine.js" defer></script>
  <script src="forecast-engine.js" defer></script>
  <script src="nova-actions.js" defer></script>
  <script src="gcal.js" defer></script>
  <script>
  (function(){
    'use strict';
    var KEY = 'nova:chat:v1';
    var BUILD = 'v54';
    var SUGGESTIONS = [
      'How should I train today?',
      'Am I on track with my recomp?',
      'What did I miss today?',
      'Give me a pep talk.'
    ];

    var scroll = document.getElementById('nvScroll');
    var input  = document.getElementById('nvIn');
    var sendBtn= document.getElementById('nvSend');
    var status = document.getElementById('nvStatus');
    var root   = document.getElementById('root');
    var bar    = document.getElementById('nvBar');

    // honour a previously-saved text size (read-only; no pinch handlers)
    (function(){ var s=parseInt(localStorage.getItem('nova:fontsize'),10);
      document.documentElement.style.setProperty('--nv-fs',(isFinite(s)?Math.max(13,Math.min(30,s)):15)+'px'); })();

    function load(){ try { return JSON.parse(localStorage.getItem(KEY)) || []; } catch(e){ return []; } }
    function save(h){ try { localStorage.setItem(KEY, JSON.stringify(h.slice(-40))); } catch(e){} }
    var history = load();
    var busy = false;

    // ── Nova long-term memory (synced array of {id,fact,ts}) ──
    var MEMKEY = 'nova:memory';
    function loadMem(){ try{ var a=JSON.parse(localStorage.getItem(MEMKEY)); return Array.isArray(a)?a.filter(function(m){return m&&m.id&&m.fact;}):[]; }catch(e){ return []; } }
    function saveMem(a){ try{ localStorage.setItem(MEMKEY, JSON.stringify(a.slice(-40))); }catch(e){} }
    function memFacts(){ return loadMem().map(function(m){ return m.fact; }).slice(-30); }
    function normFact(s){ return String(s||'').toLowerCase().replace(/\s+/g,' ').trim(); }
    function addMemory(fact){
      fact=(fact||'').trim(); if(!fact||fact.length>200) return;
      var mem=loadMem(), n=normFact(fact);
      if(mem.some(function(m){ return normFact(m.fact)===n; })) return;
      mem.push({ id:'mem-'+Date.now().toString(36)+Math.random().toString(36).slice(2,6), fact:fact, ts:Date.now() });
      saveMem(mem); if(window.ALSSync&&window.ALSSync.flush) window.ALSSync.flush(); renderMem();
    }
    function forget(id){ saveMem(loadMem().filter(function(m){ return m.id!==id; })); if(window.ALSSync&&window.ALSSync.flush) window.ALSSync.flush(); renderMem(); }
    function forgetAll(){ saveMem([]); if(window.ALSSync&&window.ALSSync.flush) window.ALSSync.flush(); renderMem(); }
    function stripMemory(text){
      var facts=[], action=null; var s=String(text==null?'':text);
      s=s.replace(/\[\[\s*REMEMBER\s*:\s*([^\]]+?)\s*\]\]/gi, function(_,f){ facts.push(f.trim()); return ''; });
      s=s.replace(/\[\[\s*ACTION\s*:\s*(\{[\s\S]*?\})\s*\]\]/gi, function(_,j){ try{ var o=JSON.parse(j); if(o&&o.verb) action=o; }catch(e){} return ''; });
      s=s.replace(/\[\[[^\]]*$/,'');
      s=s.replace(/[ \t]+\n/g,'\n').replace(/\n{3,}/g,'\n\n').replace(/\s+$/,'');
      return { display:s, facts:facts, action:action };
    }
    function renderMem(){
      var list=document.getElementById('nvMemList'); if(!list) return;
      var mem=loadMem();
      if(!mem.length){ list.innerHTML='<div class="nv-mem-empty">Nothing yet. As you tell me things worth remembering, they’ll appear here — and you can forget any of them.</div>'; return; }
      list.innerHTML=mem.slice().reverse().map(function(m){ return '<div class="nv-mem-item"><span>'+esc(m.fact)+'</span><button type="button" class="nv-mem-del" data-id="'+esc(m.id)+'" aria-label="Forget">✕</button></div>'; }).join('');
    }

    function novaSVG(){
      return '<div class="nova" aria-hidden="true"><svg viewBox="0 0 100 100" aria-hidden="true"><defs><linearGradient id="nvNova2" x1="0" y1="0" x2="1" y2="0"><stop offset="0%" stop-color="#34E2B0"/><stop offset="55%" stop-color="#22CBC6"/><stop offset="100%" stop-color="#9B8CFF"/></linearGradient><radialGradient id="nvNova2F" cx=".5" cy=".5" r=".5"><stop offset="0%" stop-color="#34E2B0" stop-opacity=".16"/><stop offset="100%" stop-color="#34E2B0" stop-opacity="0"/></radialGradient><clipPath id="nvNova2C"><circle cx="50" cy="50" r="40"/></clipPath></defs><g class="nova-glow"><circle cx="50" cy="50" r="40" fill="url(#nvNova2F)"/><circle class="nova-ring" cx="50" cy="50" r="40" fill="none" stroke="url(#nvNova2)" stroke-width="2.2" opacity=".55"/><g clip-path="url(#nvNova2C)"><path class="nova-track" d="M18.8 50 H38.3 L42.2 55.1 L48.8 25 L56.3 75 L62.1 46.1 L66.8 50 H81.3" fill="none" stroke="url(#nvNova2)" stroke-width="2.6" stroke-linecap="round" stroke-linejoin="round" opacity=".2"/><path class="nova-trace" d="M18.8 50 H38.3 L42.2 55.1 L48.8 25 L56.3 75 L62.1 46.1 L66.8 50 H81.3" fill="none" stroke="url(#nvNova2)" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/><path class="nova-trace" d="M18.8 50 H38.3 L42.2 55.1 L48.8 25 L56.3 75 L62.1 46.1 L66.8 50 H81.3" fill="none" stroke="#EAFFF7" stroke-width="1.1" stroke-linecap="round" stroke-linejoin="round" opacity=".5"/></g><g class="nova-node"><circle cx="48.8" cy="25" r="4.4" fill="#EAFFF7"/></g></g></svg></div>';
    }
    /* Intro hero = Nova herself, big. This used to be a three.js gem that
       painted the old dark eyes onto a spinning crystal — a different Nova to
       the one on every other page, and 600KB of CDN three.js to say so. She's
       the pulse now, and the pulse is 2KB of SVG the whole app already shares. */
    function novaGemHTML(){ return '<div class="nv-hero">'+ novaSVG() +'</div>'; }
    function esc(s){ return String(s==null?'':s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
    function fmtNova(s){ return esc(s).replace(/\*\*([^*]+?)\*\*/g,'<strong>$1</strong>').replace(/\n/g,'<br>'); }
    function fmtUser(s){ return esc(s).replace(/\n/g,'<br>'); }

    function atBottom(){ return (window.innerHeight + window.scrollY) >= (document.body.scrollHeight - 160); }
    function toBottom(force){ if(force||atBottom()) window.scrollTo(0, document.body.scrollHeight); }
    function setBarSpace(){ try{ document.body.style.paddingBottom = (bar.offsetHeight + 16) + 'px'; }catch(e){} }

    function renderIntro(){
      var chips = SUGGESTIONS.map(function(s){ return '<button class="nv-chip" type="button" data-q="'+esc(s)+'">'+esc(s)+'</button>'; }).join('');
      scroll.innerHTML =
        '<div class="nv-intro">'+ novaGemHTML() +
        '<h1>Hey' + (function(){ try{ var n = window.ALSProfile && ALSProfile.firstName(); return n ? ' ' + n : ' there'; }catch(e){ return ' there'; } })() + '.</h1>'+
        '<p>I can see your training, sleep, recovery, nutrition and habits in real time. Ask me anything — how to train today, why your sleep is off, whether you’re on track.</p>'+
        '<div class="nv-chips">'+chips+'</div></div>';
      try { if (window.NovaGem) NovaGem.scan(); } catch(e){}
    }

    // A message = a BLOCK row containing a BLOCK bubble. Deterministic height.
    function bubble(role, text, streaming){
      var row = document.createElement('div');
      row.className = 'nv-row ' + (role === 'user' ? 'me' : 'nova');
      row.innerHTML = role === 'user'
        ? '<div class="nv-bub"><span class="nv-text">'+fmtUser(text)+'</span></div>'
        : '<div class="nv-bub"><span class="nv-text">'+(streaming?'':fmtNova(text))+'</span>'+(streaming?'<span class="nv-think"><i></i><i></i><i></i></span>':'')+'</div>';
      scroll.appendChild(row);
      return row;
    }

    function renderAll(){
      if(!history.length){ renderIntro(); return; }
      scroll.innerHTML = '';
      history.forEach(function(m){ bubble(m.role, m.content, false); });
      toBottom(true);
    }

    function setStream(row, text, done){
      var t = row.querySelector('.nv-text');
      var think = row.querySelector('.nv-think');
      if(think) think.parentNode.removeChild(think);
      if(!t) return;
      t.innerHTML = fmtNova(text) + (done ? '' : '<span class="nv-cursor"></span>');
    }

    function setBusy(on){
      busy = on;
      sendBtn.disabled = on || !input.value.trim();
      status.textContent = on ? 'Thinking…' : 'online · ' + BUILD;
      root.classList.toggle('nv-live', on);
      var orb = document.querySelector('.nv-top .nova');
      if(orb) orb.classList.toggle('is-thinking', on);
    }

    async function send(text){
      if(busy) return;
      text = (text||'').trim(); if(!text) return;
      if(!history.length) scroll.innerHTML = '';
      history.push({ role:'user', content:text });
      bubble('user', text, false);
      input.value = ''; autosize();
      toBottom(true);
      save(history);
      setBusy(true);

      var row = bubble('nova', '', true);
      toBottom(true);
      var acc = '';
      try {
        var novaInsights = []; try { if(window.ALSInsights) novaInsights = ALSInsights.compute().slice(0,8).map(function(i){ return i.text; }); } catch(e){}
        try { if(window.ALSForecast) novaInsights = novaInsights.concat(ALSForecast.compute().map(function(f){ return f.text; })); } catch(e){}
        var sched=''; try{ if(window.GCal){ var gc=GCal.cached(); if(gc&&gc.events){ var f=function(iso){var d=new Date(iso);if(isNaN(d))return '';var h=d.getHours(),m=d.getMinutes();return h+':'+(m<10?'0':'')+m;}; var ln=function(evs){return evs.map(function(e){return (e.allDay?'all day':f(e.start))+' '+e.title;}).join('; ');}; var t0=GCal.eventsForDay(gc.events,0),t1=GCal.eventsForDay(gc.events,1),o=[]; o.push('Today: '+(t0.length?ln(t0):'nothing scheduled')); if(t1.length)o.push('Tomorrow: '+ln(t1)); sched=o.join('\n'); } } }catch(e){}
        // Nova reads YOUR data — so it has to know who you are. The server
        // verifies this token and scopes every read to that account.
        var authHdr = {}; try { if (window.ALSAuthHeader) authHdr = await window.ALSAuthHeader(); } catch(e){}
        var res = await fetch('/api/nova-chat', {
          method:'POST', headers: Object.assign({'Content-Type':'application/json'}, authHdr),
          body: JSON.stringify({ messages: history, insights: novaInsights, memory: memFacts(), schedule: sched })
        });
        if(res.body && res.body.getReader){
          var reader = res.body.getReader(), dec = new TextDecoder();
          while(true){
            var r = await reader.read(); if(r.done) break;
            acc += dec.decode(r.value, {stream:true});
            setStream(row, stripMemory(acc).display, false); toBottom();
          }
        } else {
          acc = await res.text(); setStream(row, stripMemory(acc).display, false);
        }
      } catch(e){
        acc = acc || 'I lost the connection there — try me again.';
      }
      var sm = stripMemory(acc); var finalText = sm.display.trim() || '…';
      setStream(row, finalText, true);
      history.push({ role:'assistant', content:finalText });
      save(history);
      sm.facts.forEach(addMemory);
      if(sm.action) renderActionChip(row, sm.action);
      setBusy(false);
      toBottom();
    }

    // Confirm-first agency: a tap-to-confirm chip. Nothing runs until tapped.
    function renderActionChip(row, action){
      if(!(window.NovaActions && NovaActions.has(action.verb))) return;
      var label = NovaActions.describe(action.verb, action);
      if(!label) return;
      var bub = row.querySelector('.nv-bub'); if(!bub) return;
      var chip = document.createElement('div'); chip.className = 'nv-act';
      chip.innerHTML = '<div class="nv-act-q">'+esc(label)+'?</div>'+
        '<div class="nv-act-btns"><button type="button" class="nv-act-go">Do it</button>'+
        '<button type="button" class="nv-act-no">Dismiss</button></div>';
      bub.appendChild(chip); toBottom();
      var go = chip.querySelector('.nv-act-go'), no = chip.querySelector('.nv-act-no');
      no.addEventListener('click', function(){ chip.parentNode.removeChild(chip); });
      go.addEventListener('click', async function(){
        go.disabled = true; no.disabled = true; go.textContent = '…';
        var res = await NovaActions.run(action.verb, action);
        chip.className = 'nv-act ' + (res.ok ? 'done' : 'fail');
        chip.innerHTML = '<div class="nv-act-q">'+(res.ok?'✓ ':'⚠ ')+esc(res.message)+'</div>';
        toBottom();
      });
    }

    function autosize(){ input.style.height='auto'; input.style.height = Math.min(input.scrollHeight, 130) + 'px'; setBarSpace(); }

    input.addEventListener('input', function(){ autosize(); sendBtn.disabled = busy || !input.value.trim(); });
    input.addEventListener('keydown', function(e){ if(e.key === 'Enter' && !e.shiftKey){ e.preventDefault(); send(input.value); } });
    sendBtn.addEventListener('click', function(){ send(input.value); });
    scroll.addEventListener('click', function(e){ var c = e.target.closest && e.target.closest('.nv-chip'); if(c) send(c.getAttribute('data-q')); });
    document.getElementById('nvClear').addEventListener('click', function(){
      if(busy) return;
      if(history.length && !confirm('Clear this conversation with Nova?')) return;
      history = []; save(history); renderAll();
    });

    // Keyboard: lift ONLY the fixed composer above the on-screen keyboard.
    if (window.visualViewport){
      var vv = window.visualViewport;
      var fixBar = function(){
        var overlap = window.innerHeight - vv.height - vv.offsetTop;
        bar.style.bottom = (overlap > 1 ? overlap : 0) + 'px';
        setBarSpace(); toBottom();
      };
      vv.addEventListener('resize', fixBar);
      vv.addEventListener('scroll', fixBar);
    }
    window.addEventListener('resize', setBarSpace);

    setBarSpace();
    renderAll();
    if(status) status.textContent = 'online · ' + BUILD;
    setTimeout(setBarSpace, 200);

    // Memory panel wiring + cross-device sync
    var panel=document.getElementById('nvMemPanel'), memBtn=document.getElementById('nvMem');
    if(memBtn && panel){
      memBtn.addEventListener('click', function(){ renderMem(); panel.hidden=false; });
      document.getElementById('nvMemClose').addEventListener('click', function(){ panel.hidden=true; });
      panel.addEventListener('click', function(e){ if(e.target===panel) panel.hidden=true; });
      document.getElementById('nvMemForgetAll').addEventListener('click', function(){ if(loadMem().length && !confirm('Forget everything Nova remembers about you?')) return; forgetAll(); });
      document.getElementById('nvMemList').addEventListener('click', function(e){ var d=e.target.closest && e.target.closest('.nv-mem-del'); if(d) forget(d.getAttribute('data-id')); });
    }
    renderMem();
    (function start(){ if(typeof window.initCloudSync!=='function'){ setTimeout(start,200); return; }
      window.initCloudSync({ appKey:'nova-chat', syncedKeys:[MEMKEY], onApplied:function(){ renderMem(); } });
    })();
  })();
  </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover,interactive-widget=resizes-content">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>Nova · ALS</title>
  <meta name="theme-color" content="#050507">
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="apple-touch-icon.png">
  <link rel="stylesheet" href="aurora.css">
  <style>
    /* ────────────────────────────────────────────────────────────
       ATTEMPT 4 — the simple one. Every other page in this app works
       because it uses NORMAL document flow + a fixed bottom bar. The
       chat kept breaking because it alone tried to lock the viewport
       (position:fixed body + --app-h JS + grid). Messages laid out in
       normal block flow CANNOT overlap each other — full stop. So the
       page just scrolls like any other page; the composer is fixed at
       the bottom (like the app's bottombar), and one tiny visualViewport
       handler nudges ONLY the composer above the keyboard. No grid, no
       locked body, no --app-h.
       ──────────────────────────────────────────────────────────── */
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
    html{background:#050507;}
    body{min-height:100dvh;background:#050507;color:#F4F1EA;
      font-family:var(--au-sans,-apple-system,system-ui,sans-serif);
      overflow-x:hidden;padding-bottom:120px;}

    /* living HUD backdrop — fixed, decorative, always behind content */
    body::before{content:"";position:fixed;inset:0;z-index:0;pointer-events:none;
      background:
        radial-gradient(120% 70% at 50% -10%, rgba(52,226,176,.10), transparent 60%),
        radial-gradient(90% 60% at 90% 110%, rgba(155,140,255,.10), transparent 60%);
      animation:nv-breathe 9s ease-in-out infinite;}
    body::after{content:"";position:fixed;inset:0;z-index:0;pointer-events:none;opacity:.5;
      background-image:linear-gradient(rgba(52,226,176,.045) 1px,transparent 1px),linear-gradient(90deg,rgba(52,226,176,.045) 1px,transparent 1px);
      background-size:40px 40px;
      -webkit-mask-image:radial-gradient(120% 100% at 50% 0,#000,transparent 80%);mask-image:radial-gradient(120% 100% at 50% 0,#000,transparent 80%);}
    @keyframes nv-breathe{0%,100%{opacity:.85;}50%{opacity:1;}}

    .nv-app{position:relative;z-index:1;max-width:760px;margin:0 auto;}

    /* ── header (sticky) ──────────────────────── */
    .nv-top{position:sticky;top:0;z-index:5;display:flex;align-items:center;gap:12px;
      padding:calc(14px + env(safe-area-inset-top)) 16px 13px;
      border-bottom:1px solid rgba(255,255,255,.06);background:linear-gradient(180deg,rgba(5,5,7,.96),rgba(5,5,7,.82));backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px);}
    .nv-back{flex:none;width:36px;height:36px;border-radius:50%;border:1px solid rgba(255,255,255,.1);background:rgba(255,255,255,.04);color:#F4F1EA;font-size:17px;cursor:pointer;display:flex;align-items:center;justify-content:center;text-decoration:none;}
    .nv-back:active{background:rgba(255,255,255,.1);}
    .nv-top .nova{width:40px;height:40px;flex:none;}
    .nv-id{flex:1;min-width:0;}
    .nv-name{font-family:var(--au-serif,Georgia,serif);font-style:italic;font-size:21px;line-height:1;color:#F4F1EA;}
    .nv-status{display:flex;align-items:center;gap:6px;margin-top:3px;font-family:var(--au-mono,ui-monospace,monospace);font-size:9px;font-weight:700;letter-spacing:.16em;text-transform:uppercase;color:rgba(244,241,234,.4);}
    .nv-dot{width:6px;height:6px;border-radius:50%;background:#34E2B0;box-shadow:0 0 7px #34E2B0;animation:nv-blink 1.5s ease-in-out infinite;}
    @keyframes nv-blink{0%,100%{opacity:1;}50%{opacity:.25;}}
    .nv-clear{flex:none;background:none;border:none;color:rgba(244,241,234,.3);font-family:var(--au-mono,ui-monospace,monospace);font-size:9px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;cursor:pointer;padding:8px 4px;}
    .nv-clear:active{color:#F4F1EA;}

    /* ── messages (NORMAL FLOW — the page scrolls, not this div) ── */
    .nv-scroll{padding:18px 14px 12px;}
    .nv-row{display:flex;width:100%;margin-bottom:14px;animation:nv-rise .3s cubic-bezier(.2,.7,.3,1);}
    @keyframes nv-rise{from{opacity:0;transform:translateY(8px);}to{opacity:1;transform:none;}}
    .nv-row.nova{justify-content:flex-start;}
    .nv-row.me{justify-content:flex-end;}
    .nv-bub{max-width:84%;text-align:left;position:relative;padding:11px 15px;border-radius:18px;font-size:15px;line-height:1.5;overflow-wrap:break-word;}
    .nv-bub .nv-text{display:inline;}
    .nv-bub strong{font-weight:700;}
    .nv-row.nova .nv-bub{background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.09);border-bottom-left-radius:6px;color:#F4F1EA;}
    .nv-row.me .nv-bub{background:linear-gradient(135deg,rgba(52,226,176,.18),rgba(24,200,192,.11));border:1px solid rgba(52,226,176,.3);border-bottom-right-radius:6px;color:#F4F1EA;}
    .nv-cursor{display:inline-block;width:7px;height:15px;margin-left:2px;background:#34E2B0;vertical-align:-2px;border-radius:1px;animation:nv-caret .9s step-end infinite;box-shadow:0 0 6px rgba(52,226,176,.7);}
    @keyframes nv-caret{0%,100%{opacity:1;}50%{opacity:0;}}
    .nv-think{display:inline-flex;gap:5px;padding:3px 0;}
    .nv-think i{width:7px;height:7px;border-radius:50%;background:rgba(52,226,176,.85);animation:nv-bounce 1.1s ease-in-out infinite;}
    .nv-think i:nth-child(2){animation-delay:.15s;}.nv-think i:nth-child(3){animation-delay:.3s;}
    @keyframes nv-bounce{0%,80%,100%{transform:scale(.6);opacity:.4;}40%{transform:scale(1);opacity:1;}}

    /* ── intro / suggestions ──────────────────── */
    .nv-intro{text-align:center;padding:30px 16px 10px;}
    .nv-intro .nova{width:72px;height:72px;margin:0 auto 16px;}
    .nv-intro h1{font-family:var(--au-serif,Georgia,serif);font-style:italic;font-size:27px;color:#F4F1EA;margin-bottom:8px;line-height:1.15;}
    .nv-intro p{font-size:13.5px;color:rgba(244,241,234,.5);max-width:340px;margin:0 auto;line-height:1.5;}
    .nv-chips{display:flex;flex-wrap:wrap;gap:9px;justify-content:center;margin-top:20px;}
    .nv-chip{font-size:13px;color:#F4F1EA;background:rgba(255,255,255,.04);border:1px solid rgba(52,226,176,.22);border-radius:13px;padding:9px 14px;cursor:pointer;transition:background .15s,border-color .15s;}
    .nv-chip:active{background:rgba(52,226,176,.12);border-color:rgba(52,226,176,.5);}

    /* ── composer (fixed, like the app bottombar) ── */
    .nv-bar{position:fixed;left:0;right:0;bottom:0;z-index:20;max-width:760px;margin:0 auto;
      padding:10px 14px calc(12px + env(safe-area-inset-bottom));border-top:1px solid rgba(255,255,255,.06);
      background:linear-gradient(0deg,rgba(5,5,7,.98),rgba(5,5,7,.86));backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px);}
    .nv-inwrap{display:flex;align-items:flex-end;gap:10px;background:rgba(255,255,255,.045);border:1px solid rgba(255,255,255,.11);border-radius:22px;padding:6px 6px 6px 16px;transition:border-color .2s,box-shadow .2s;}
    .nv-inwrap:focus-within{border-color:rgba(52,226,176,.45);box-shadow:0 0 0 3px rgba(52,226,176,.1);}
    .nv-in{flex:1;background:none;border:none;outline:none;color:#F4F1EA;font-family:inherit;font-size:16px;line-height:1.4;resize:none;max-height:130px;padding:8px 0;}
    .nv-in::placeholder{color:rgba(244,241,234,.32);}
    .nv-send{flex:none;width:38px;height:38px;border-radius:50%;border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;
      background:linear-gradient(135deg,#34E2B0,#18C8C0 55%,#9B8CFF);color:#04130D;box-shadow:0 4px 16px rgba(52,226,176,.3);transition:transform .12s,opacity .2s;}
    .nv-send:active{transform:scale(.92);}
    .nv-send:disabled{opacity:.4;cursor:default;box-shadow:none;}
    .nv-send svg{width:19px;height:19px;}

    /* crystal reacts while Nova is speaking */
    body.nv-live .nv-top .nova .nova-glow{animation:nv-pulse 1.1s ease-in-out infinite;transform-origin:50% 50%;}
    @keyframes nv-pulse{0%,100%{filter:drop-shadow(0 0 4px rgba(52,226,176,.5));}50%{filter:drop-shadow(0 0 14px rgba(52,226,176,.95));}}
  </style>
</head>
<body id="root" class="au-mood-calm" data-no-aurora>
  <div class="nv-app">
    <header class="nv-top">
      <a class="nv-back" href="index.html" aria-label="Back to hub">&#8592;</a>
      <div class="nova" aria-hidden="true"><svg viewBox="0 0 100 100"><defs><linearGradient id="nvNova" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#34E2B0"/><stop offset="100%" stop-color="#9B8CFF"/></linearGradient></defs><g class="nova-glow"><rect x="22" y="22" width="56" height="56" rx="16" transform="rotate(45 50 50)" fill="url(#nvNova)" opacity="0.95"/><circle class="nova-eye" cx="42" cy="50" r="5.5" fill="#04130D"/><circle class="nova-eye" cx="58" cy="50" r="5.5" fill="#04130D"/><circle cx="43.4" cy="48.5" r="1.6" fill="#fff"/><circle cx="59.4" cy="48.5" r="1.6" fill="#fff"/></g></svg></div>
      <div class="nv-id">
        <div class="nv-name">Nova</div>
        <div class="nv-status"><span class="nv-dot"></span><span id="nvStatus">online · v45</span></div>
      </div>
      <button class="nv-clear" id="nvMem" type="button" title="What Nova remembers" aria-label="Memory">🧠</button>
      <button class="nv-clear" id="nvClear" type="button">Clear</button>
    </header>

    <div class="nv-scroll" id="nvScroll"></div>
  </div>

  <div class="nv-mem" id="nvMemPanel" hidden>
    <div class="nv-mem-card">
      <div class="nv-mem-head"><span>🧠 What Nova remembers</span><button id="nvMemClose" class="nv-mem-x" type="button" aria-label="Close">✕</button></div>
      <div class="nv-mem-list" id="nvMemList"></div>
      <button class="nv-mem-forget" id="nvMemForgetAll" type="button">Forget everything</button>
    </div>
  </div>

  <div class="nv-bar" id="nvBar">
    <div class="nv-inwrap">
      <textarea class="nv-in" id="nvIn" rows="1" placeholder="Talk to Nova…" autocomplete="off"></textarea>
      <button class="nv-send" id="nvSend" type="button" aria-label="Send" disabled>
        <svg viewBox="0 0 24 24" fill="none"><path d="M5 12h13M13 6l6 6-6 6" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"/></svg>
      </button>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="error-toast.js" defer></script>
  <script src="sync.js" defer></script>
  <script src="insights-engine.js" defer></script>
  <script src="forecast-engine.js" defer></script>
  <script>
  (function(){
    'use strict';
    var KEY = 'nova:chat:v1';
    var BUILD = 'v45'; // visible in the header status — confirms the fresh build loaded
    var SUGGESTIONS = [
      'How should I train today?',
      'Am I on track with my recomp?',
      'What did I miss today?',
      'Give me a pep talk.'
    ];

    var scroll = document.getElementById('nvScroll');
    var input  = document.getElementById('nvIn');
    var sendBtn= document.getElementById('nvSend');
    var status = document.getElementById('nvStatus');
    var root   = document.getElementById('root');
    var bar    = document.getElementById('nvBar');

    function load(){ try { return JSON.parse(localStorage.getItem(KEY)) || []; } catch(e){ return []; } }
    function save(h){ try { localStorage.setItem(KEY, JSON.stringify(h.slice(-40))); } catch(e){} }
    var history = load();
    var busy = false;

    // ── Nova long-term memory: facts Nova chooses to remember, synced across
    // devices (array of {id,fact,ts} → clean union merge, no transcript ordering pitfalls).
    var MEMKEY = 'nova:memory';
    function loadMem(){ try{ var a=JSON.parse(localStorage.getItem(MEMKEY)); return Array.isArray(a)?a.filter(function(m){return m&&m.id&&m.fact;}):[]; }catch(e){ return []; } }
    function saveMem(a){ try{ localStorage.setItem(MEMKEY, JSON.stringify(a.slice(-40))); }catch(e){} }
    function memFacts(){ return loadMem().map(function(m){ return m.fact; }).slice(-30); }
    function normFact(s){ return String(s||'').toLowerCase().replace(/\s+/g,' ').trim(); }
    function addMemory(fact){
      fact=(fact||'').trim(); if(!fact||fact.length>200) return;
      var mem=loadMem(), n=normFact(fact);
      if(mem.some(function(m){ return normFact(m.fact)===n; })) return;        // dedup
      mem.push({ id:'mem-'+Date.now().toString(36)+Math.random().toString(36).slice(2,6), fact:fact, ts:Date.now() });
      saveMem(mem); if(window.ALSSync&&window.ALSSync.flush) window.ALSSync.flush(); renderMem();
    }
    function forget(id){ saveMem(loadMem().filter(function(m){ return m.id!==id; })); if(window.ALSSync&&window.ALSSync.flush) window.ALSSync.flush(); renderMem(); }
    function forgetAll(){ saveMem([]); if(window.ALSSync&&window.ALSSync.flush) window.ALSSync.flush(); renderMem(); }
    // pull [[REMEMBER: ...]] markers out of a reply → { display (clean), facts }
    function stripMemory(text){
      var facts=[]; var s=String(text==null?'':text);
      s=s.replace(/\[\[\s*REMEMBER\s*:\s*([^\]]+?)\s*\]\]/gi, function(_,f){ facts.push(f.trim()); return ''; });
      s=s.replace(/\[\[[^\]]*$/,'');                              // drop a trailing unclosed marker mid-stream
      s=s.replace(/[ \t]+\n/g,'\n').replace(/\n{3,}/g,'\n\n').replace(/\s+$/,'');
      return { display:s, facts:facts };
    }
    function renderMem(){
      var list=document.getElementById('nvMemList'); if(!list) return;
      var mem=loadMem();
      if(!mem.length){ list.innerHTML='<div class="nv-mem-empty">Nothing yet. As you tell me things worth remembering, they’ll appear here — and you can forget any of them.</div>'; return; }
      list.innerHTML=mem.slice().reverse().map(function(m){ return '<div class="nv-mem-item"><span>'+esc(m.fact)+'</span><button type="button" class="nv-mem-del" data-id="'+esc(m.id)+'" aria-label="Forget">✕</button></div>'; }).join('');
    }

    function novaSVG(){
      return '<div class="nova" aria-hidden="true"><svg viewBox="0 0 100 100"><g class="nova-glow"><rect x="22" y="22" width="56" height="56" rx="16" transform="rotate(45 50 50)" fill="url(#nvNova)" opacity="0.95"/><circle cx="42" cy="50" r="5.5" fill="#04130D"/><circle cx="58" cy="50" r="5.5" fill="#04130D"/><circle cx="43.4" cy="48.5" r="1.6" fill="#fff"/><circle cx="59.4" cy="48.5" r="1.6" fill="#fff"/></g></svg></div>';
    }
    function esc(s){ return String(s==null?'':s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
    // Render Nova's reply as readable HTML: escape, bold **x**, real line breaks.
    function fmtNova(s){ return esc(s).replace(/\*\*([^*]+?)\*\*/g,'<strong>$1</strong>').replace(/\n/g,'<br>'); }
    function fmtUser(s){ return esc(s).replace(/\n/g,'<br>'); }

    // The PAGE scrolls (normal flow), so scroll the window — not an inner div.
    function atBottom(){ return (window.innerHeight + window.scrollY) >= (document.body.scrollHeight - 160); }
    function toBottom(force){ if(force||atBottom()) window.scrollTo(0, document.body.scrollHeight); }

    // Keep the last message clear of the fixed composer by padding the body to
    // its real height (the textarea grows, so re-measure).
    function setBarSpace(){ try{ document.body.style.paddingBottom = (bar.offsetHeight + 16) + 'px'; }catch(e){} }

    function renderIntro(){
      var chips = SUGGESTIONS.map(function(s){ return '<button class="nv-chip" type="button" data-q="'+esc(s)+'">'+esc(s)+'</button>'; }).join('');
      scroll.innerHTML =
        '<div class="nv-intro">'+ novaSVG() +
        '<h1>Hey Alex.</h1>'+
        '<p>I can see your training, sleep, recovery, nutrition and habits in real time. Ask me anything — how to train today, why your sleep is off, whether you’re on track.</p>'+
        '<div class="nv-chips">'+chips+'</div></div>';
    }

    function bubble(role, text, streaming){
      var row = document.createElement('div');
      row.className = 'nv-row ' + (role === 'user' ? 'me' : 'nova');
      var body = role === 'user'
        ? '<div class="nv-bub">'+fmtUser(text)+'</div>'
        : '<div class="nv-bub"><span class="nv-text">'+(streaming?'':fmtNova(text))+'</span>'+(streaming?'<span class="nv-think"><i></i><i></i><i></i></span>':'')+'</div>';
      row.innerHTML = body;
      scroll.appendChild(row);
      return row;
    }

    function renderAll(){
      if(!history.length){ renderIntro(); return; }
      scroll.innerHTML = '';
      history.forEach(function(m){ bubble(m.role, m.content, false); });
      toBottom(true);
    }

    // Append/replace streaming text inside a Nova row, keeping a live cursor.
    function setStream(row, text, done){
      var t = row.querySelector('.nv-text');
      var think = row.querySelector('.nv-think');
      if(think) think.parentNode.removeChild(think);
      if(!t) return;
      t.innerHTML = fmtNova(text) + (done ? '' : '<span class="nv-cursor"></span>');
    }

    function setBusy(on){
      busy = on;
      sendBtn.disabled = on || !input.value.trim();
      status.textContent = on ? 'Thinking…' : 'online · ' + BUILD;
      root.classList.toggle('nv-live', on);
      // Nova comes alive: the header orb "thinks" while generating a reply.
      var orb = document.querySelector('.nova');
      if(orb){ orb.classList.toggle('is-thinking', on); if(on) orb.classList.remove('is-listening'); }
    }

    async function send(text){
      if(busy) return;
      text = (text||'').trim(); if(!text) return;
      if(!history.length) scroll.innerHTML = '';
      history.push({ role:'user', content:text });
      bubble('user', text, false);
      input.value = ''; autosize();
      toBottom(true);
      save(history);
      setBusy(true);

      var row = bubble('nova', '', true);
      toBottom(true);
      var acc = '';
      try {
        // pass the cross-domain patterns + trajectory forecasts so Nova can cite them
        var novaInsights = []; try { if(window.ALSInsights) novaInsights = ALSInsights.compute().slice(0,8).map(function(i){ return i.text; }); } catch(e){}
        try { if(window.ALSForecast) novaInsights = novaInsights.concat(ALSForecast.compute().map(function(f){ return f.text; })); } catch(e){}
        var res = await fetch('/api/nova-chat', {
          method:'POST', headers:{'Content-Type':'application/json'},
          body: JSON.stringify({ messages: history, insights: novaInsights, memory: memFacts() })
        });
        if(res.body && res.body.getReader){
          var reader = res.body.getReader(), dec = new TextDecoder();
          while(true){
            var r = await reader.read(); if(r.done) break;
            acc += dec.decode(r.value, {stream:true});
            setStream(row, stripMemory(acc).display, false); toBottom();   // hide [[REMEMBER]] markers live
          }
        } else {
          acc = await res.text(); setStream(row, stripMemory(acc).display, false);
        }
      } catch(e){
        acc = acc || 'I lost the connection there — try me again.';
      }
      var sm = stripMemory(acc); var finalText = sm.display.trim() || '…';
      setStream(row, finalText, true);
      history.push({ role:'assistant', content:finalText });   // store the clean text, never the markers
      save(history);
      sm.facts.forEach(addMemory);                              // commit what Nova chose to remember
      setBusy(false);
      toBottom();
    }

    function autosize(){ input.style.height='auto'; input.style.height = Math.min(input.scrollHeight, 130) + 'px'; setBarSpace(); }

    input.addEventListener('input', function(){ autosize(); sendBtn.disabled = busy || !input.value.trim(); });
    // Nova "listens" while you're typing to it.
    input.addEventListener('focus', function(){ if(!busy){ var orb=document.querySelector('.nova'); if(orb) orb.classList.add('is-listening'); } });
    input.addEventListener('blur', function(){ var orb=document.querySelector('.nova'); if(orb) orb.classList.remove('is-listening'); });
    input.addEventListener('keydown', function(e){
      if(e.key === 'Enter' && !e.shiftKey){ e.preventDefault(); send(input.value); }
    });
    sendBtn.addEventListener('click', function(){ send(input.value); });
    scroll.addEventListener('click', function(e){
      var c = e.target.closest && e.target.closest('.nv-chip'); if(c) send(c.getAttribute('data-q'));
    });
    document.getElementById('nvClear').addEventListener('click', function(){
      if(busy) return;
      if(history.length && !confirm('Clear this conversation with Nova?')) return;
      history = []; save(history); renderAll();
    });

    // ── Keyboard: nudge ONLY the composer above the on-screen keyboard.
    // With interactive-widget=resizes-content the viewport already shrinks
    // (overlap ≈ 0). Without it (older iOS), visualViewport tells us the
    // keyboard height and we lift the fixed bar by that much. Messages stay
    // in normal flow and never move, so they can't overlap. No body locking.
    if (window.visualViewport){
      var vv = window.visualViewport;
      var fixBar = function(){
        var overlap = window.innerHeight - vv.height - vv.offsetTop;
        bar.style.bottom = (overlap > 1 ? overlap : 0) + 'px';
        setBarSpace();
        toBottom();
      };
      vv.addEventListener('resize', fixBar);
      vv.addEventListener('scroll', fixBar);
    }
    window.addEventListener('resize', setBarSpace);

    setBarSpace();
    renderAll();
    setTimeout(setBarSpace, 200);

    // ── Memory panel + cross-device sync ──
    (function(){
      var st=document.createElement('style');
      st.textContent='.nv-mem{position:fixed;inset:0;z-index:200;background:rgba(0,0,0,.55);display:flex;align-items:flex-start;justify-content:center;padding:64px 16px;}'
        +'.nv-mem[hidden]{display:none;}'
        +'.nv-mem-card{width:100%;max-width:440px;background:#0c0d11;border:1px solid rgba(255,255,255,.1);border-radius:18px;padding:16px;box-shadow:0 24px 60px rgba(0,0,0,.6);}'
        +'.nv-mem-head{display:flex;align-items:center;justify-content:space-between;font-size:14px;font-weight:700;color:#F4F1EA;margin-bottom:12px;}'
        +'.nv-mem-x{background:none;border:none;color:rgba(244,241,234,.5);font-size:18px;cursor:pointer;line-height:1;}'
        +'.nv-mem-list{display:flex;flex-direction:column;gap:8px;max-height:52vh;overflow:auto;}'
        +'.nv-mem-item{display:flex;gap:10px;align-items:flex-start;justify-content:space-between;padding:11px 12px;border-radius:11px;background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.06);font-size:13.5px;line-height:1.45;color:#F4F1EA;}'
        +'.nv-mem-del{background:none;border:none;color:#FF8FA3;font-size:13px;cursor:pointer;flex:none;}'
        +'.nv-mem-empty{color:rgba(244,241,234,.4);font-size:13px;padding:10px 2px;line-height:1.5;}'
        +'.nv-mem-forget{margin-top:12px;width:100%;padding:11px;border-radius:11px;border:1px solid rgba(255,143,163,.3);background:rgba(255,143,163,.08);color:#FF8FA3;font-weight:700;font-size:13px;cursor:pointer;}';
      document.head.appendChild(st);

      var panel=document.getElementById('nvMemPanel'), memBtn=document.getElementById('nvMem');
      if(memBtn && panel){
        memBtn.addEventListener('click', function(){ renderMem(); panel.hidden=false; });
        document.getElementById('nvMemClose').addEventListener('click', function(){ panel.hidden=true; });
        panel.addEventListener('click', function(e){ if(e.target===panel) panel.hidden=true; });
        document.getElementById('nvMemForgetAll').addEventListener('click', function(){ if(loadMem().length && !confirm('Forget everything Nova remembers about you?')) return; forgetAll(); });
        document.getElementById('nvMemList').addEventListener('click', function(e){ var d=e.target.closest && e.target.closest('.nv-mem-del'); if(d) forget(d.getAttribute('data-id')); });
      }
      renderMem();

      (function start(){ if(typeof window.initCloudSync!=='function'){ setTimeout(start,200); return; }
        window.initCloudSync({ appKey:'nova-chat', syncedKeys:[MEMKEY], onApplied:function(){ renderMem(); } });
      })();
    })();
  })();
  </script>
</body>
</html>

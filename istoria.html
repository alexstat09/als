<!DOCTYPE html>
<html lang="el">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Ιστορία">
<title>Ιστορία · Προσανατολισμού</title>
<meta name="theme-color" content="#050506">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="apple-touch-icon.png">
<!-- Cloud sync (added 2026-07-15): was on-device only, so progress never left the
     phone and wasn't backed up. sync.js is token-aware and merges by deep union
     (empty can never wipe full); once istoria:v1 is a cloud row the Vault backs it up. -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="sync.js" defer></script>
<style>
  *,*::before,*::after{ box-sizing:border-box; margin:0; padding:0; -webkit-tap-highlight-color:transparent; }
  :root{
    --void:#050506; --card:#14141b; --card2:#1b1b24;
    --ivory:#f3f0ea; --dim:#9a97a3; --faint:#5c5964; --line:#26262f;
    --terms:#d98b5f;   /* όροι — sienna */
    --themes:#7aa2e3;  /* νόημα — slate blue */
    --ok:#51cf66; --no:#ff6b6b;
  }
  html,body{ min-height:100%; height:100%; }
  body{
    background:
      radial-gradient(1200px 600px at 82% -10%, rgba(122,162,227,.10), transparent 60%),
      radial-gradient(1000px 500px at -12% 112%, rgba(217,139,95,.08), transparent 60%),
      var(--void);
    color:var(--ivory);
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
    -webkit-font-smoothing:antialiased; overscroll-behavior:none;
    display:flex; flex-direction:column;
  }
  .serif{ font-family:Georgia,"Times New Roman",serif; }
  .wrap{ width:100%; max-width:560px; margin:0 auto; padding:0 18px; }

  /* ── HOME ─────────────────────────── */
  #home{ padding:calc(env(safe-area-inset-top) + 26px) 0 44px; }
  .brand{ display:flex; align-items:flex-start; justify-content:space-between; gap:10px; }
  .brand h1{ font-size:1.5rem; letter-spacing:.02em; font-weight:800; }
  .brand h1 span{ color:var(--dim); font-weight:600; }
  .sub{ color:var(--faint); font-size:.82rem; margin-top:3px; }
  .infobtn{ width:34px;height:34px;border-radius:50%; border:1px solid var(--line); background:var(--card);
    color:var(--dim); font-size:1rem; display:flex;align-items:center;justify-content:center; text-decoration:none; flex:0 0 auto; }

  .cta{ display:block; width:100%; text-align:left; border:none; border-radius:20px; padding:19px 20px;
    background:linear-gradient(135deg,#161f30,#141420); border:1px solid #2a3550; color:var(--ivory);
    position:relative; overflow:hidden; margin-top:20px; }
  .cta .lbl{ font-size:.7rem; letter-spacing:.14em; text-transform:uppercase; color:var(--themes); font-weight:700; }
  .cta .day{ font-size:1.3rem; font-weight:800; margin:5px 0 3px; line-height:1.2; }
  .cta .meta{ color:var(--dim); font-size:.85rem; }
  .cta::after{ content:"›"; position:absolute; right:20px; top:50%; transform:translateY(-50%); font-size:2rem; color:var(--dim); }
  .cta.done{ background:linear-gradient(135deg,#16281c,#141420); border-color:#274b30; }
  .cta.done .lbl{ color:var(--ok); }
  .cta.done::after{ content:""; }

  .mini{ display:flex; gap:8px; margin-top:12px; font-size:.78rem; color:var(--dim); }
  .mini b{ color:var(--ivory); }

  .sectlabel{ font-size:.76rem; letter-spacing:.14em; text-transform:uppercase; color:var(--dim); font-weight:700; margin:26px 2px 12px; }

  .plan{ background:var(--card); border:1px solid var(--line); border-radius:16px; padding:6px 4px; }
  .weekhd{ font-size:.72rem; letter-spacing:.09em; text-transform:uppercase; color:var(--faint); font-weight:800; padding:13px 14px 6px; }
  .prow{ display:flex; align-items:center; gap:12px; width:100%; text-align:left; background:none; border:none; color:var(--ivory); padding:10px 14px; border-radius:12px; }
  .prow:disabled{ opacity:.42; }
  .prow .dn{ width:26px;height:26px;border-radius:8px; background:var(--card2); display:flex;align-items:center;justify-content:center; font-size:.78rem;font-weight:800; color:var(--dim); flex:0 0 auto; }
  .prow.done .dn{ background:rgba(81,207,102,.16); color:var(--ok); }
  .prow.today{ background:rgba(122,162,227,.12); }
  .prow.today .dn{ background:var(--themes); color:#0a1220; }
  .prow .pl{ flex:1; font-size:.92rem; line-height:1.3; }
  .prow .pl small{ display:block; color:var(--faint); font-size:.74rem; margin-top:1px; }

  .unit{ display:block; width:100%; text-align:left; border:none; border-radius:16px; padding:16px 18px;
    background:var(--card); border:1px solid var(--line); color:var(--ivory); position:relative; margin-bottom:10px; }
  .unit .lbl{ font-size:.68rem; letter-spacing:.12em; text-transform:uppercase; color:var(--themes); font-weight:700; }
  .unit .ttl{ font-size:1.1rem; font-weight:800; margin:4px 0 3px; }
  .unit .meta{ color:var(--dim); font-size:.82rem; }
  .unit::after{ content:"›"; position:absolute; right:18px; top:50%; transform:translateY(-50%); font-size:1.6rem; color:var(--dim); }
  .unit.soon{ opacity:.5; } .unit.soon::after{ content:"·"; } .unit.soon .lbl{ color:var(--faint); }

  /* ── UNIT VIEW ────────────────────── */
  #unit{ display:none; padding:calc(env(safe-area-inset-top) + 20px) 0 44px; }
  .backrow{ display:flex; align-items:center; gap:12px; margin-bottom:18px; }
  .backrow button{ background:none;border:none;color:var(--dim);font-size:.95rem;font-weight:600;padding:0; }
  .uhead{ font-size:1.35rem; font-weight:800; }
  .uhead small{ display:block; color:var(--dim); font-size:.8rem; font-weight:600; margin-top:3px; }
  .modes{ display:flex; flex-direction:column; gap:12px; margin-top:22px; }
  .mode{ text-align:left; border:none; border-radius:18px; padding:18px 20px; color:var(--ivory); position:relative; }
  .mode .mt{ font-size:1.15rem; font-weight:800; display:flex; align-items:center; gap:9px; }
  .mode .md{ color:var(--dim); font-size:.85rem; margin-top:5px; }
  .mode .bar{ height:6px; border-radius:4px; background:rgba(255,255,255,.09); overflow:hidden; margin-top:12px; }
  .mode .bar i{ display:block; height:100%; border-radius:4px; }
  .mode.themes{ background:linear-gradient(135deg,rgba(122,162,227,.16),rgba(122,162,227,.03)); border:1px solid rgba(122,162,227,.32); }
  .mode.themes .bar i{ background:var(--themes); }
  .mode.terms{ background:linear-gradient(135deg,rgba(217,139,95,.13),rgba(217,139,95,.03)); border:1px solid rgba(217,139,95,.28); }
  .mode.terms .bar i{ background:var(--terms); }
  .mode.mix{ background:var(--card); border:1px solid var(--line); }
  .mode .cnt{ position:absolute; right:20px; top:18px; font-size:.8rem; color:var(--dim); font-weight:700; }
  .optnote{ font-size:.76rem; color:var(--faint); margin-top:14px; text-align:center; }

  /* ── SESSION ──────────────────────── */
  #session,#summary{ display:none; flex:1; flex-direction:column; min-height:100%; }
  .topbar{ display:flex; align-items:center; gap:12px; padding:calc(env(safe-area-inset-top) + 14px) 18px 10px; }
  .topbar .close{ background:none;border:none;color:var(--dim);font-size:1.5rem;line-height:1;width:30px;text-align:left;flex:0 0 auto; }
  .pbar{ flex:1; height:7px; border-radius:6px; background:#20202a; overflow:hidden; }
  .pbar i{ display:block; height:100%; width:0; border-radius:6px; transition:width .3s; }
  .pcount{ font-size:.8rem; color:var(--dim); font-weight:600; min-width:42px; text-align:right; flex:0 0 auto; }

  .cardarea{ flex:1; display:flex; flex-direction:column; padding:12px 20px 0; overflow-y:auto; }
  .chip{ display:inline-flex; align-items:center; gap:7px; align-self:flex-start; padding:6px 13px; border-radius:100px;
    font-size:.72rem; font-weight:700; letter-spacing:.03em; margin-bottom:20px; }
  .chip i{ width:8px;height:8px;border-radius:50%; }
  .qword{ font-size:clamp(1.7rem,6.4vw,2.4rem); font-weight:800; line-height:1.22; }
  .qprompt{ font-size:1.15rem; color:var(--ivory); font-weight:600; line-height:1.45; }
  .qhint{ color:var(--faint); font-size:.85rem; margin-top:14px; }

  .answer{ margin-top:22px; display:none; }
  .answer.show{ display:block; animation:fade .3s ease; }
  .answer .hr{ height:1px; background:var(--line); margin-bottom:18px; }
  .adef{ font-size:1.18rem; line-height:1.55; }
  .src{ margin-top:14px; font-size:.76rem; color:var(--faint); border-top:1px dashed var(--line); padding-top:10px; }
  .ablock{ margin-bottom:15px; }
  .ablock .h{ font-size:.72rem; letter-spacing:.1em; text-transform:uppercase; font-weight:800; margin-bottom:7px; }
  .ablock.aitia .h{ color:#ff9b7a; } .ablock.geg .h{ color:#ffd479; }
  .ablock.syn .h{ color:#7ee0a3; }  .ablock.link .h{ color:#7aa2e3; }
  .ablock ul{ list-style:none; }
  .ablock li{ position:relative; padding-left:16px; margin-bottom:6px; line-height:1.5; font-size:1rem; }
  .ablock li::before{ content:"·"; position:absolute; left:3px; color:var(--dim); font-weight:800; }
  .ablock.link p{ line-height:1.5; font-size:1rem; color:var(--dim); }

  .controls{ padding:16px 20px calc(env(safe-area-inset-bottom) + 20px); }
  .btn{ width:100%; border:none; border-radius:16px; padding:17px; font-size:1.05rem; font-weight:700; color:var(--void); background:var(--ivory); }
  .judge{ display:grid; grid-template-columns:1fr 1fr; gap:12px; }
  .judge .no{ background:rgba(255,107,107,.14); color:#ff9b9b; border:1px solid rgba(255,107,107,.35); }
  .judge .ok{ background:rgba(81,207,102,.14); color:#8ef0a3; border:1px solid rgba(81,207,102,.35); }
  .jhint{ text-align:center; color:var(--faint); font-size:.78rem; margin-top:11px; }

  /* ── SUMMARY ──────────────────────── */
  .sumwrap{ flex:1; display:flex; flex-direction:column; padding:calc(env(safe-area-inset-top) + 42px) 22px 30px; }
  .sumwrap h2{ font-size:1.6rem; font-weight:800; }
  .score{ font-size:3.6rem; font-weight:800; margin:14px 0 2px; }
  .score small{ font-size:1.3rem; color:var(--dim); font-weight:600; }
  .scmeta{ color:var(--dim); margin-bottom:22px; }
  .misslist{ flex:1; overflow-y:auto; }
  .misslist h3{ font-size:.74rem; letter-spacing:.12em; text-transform:uppercase; color:var(--no); margin-bottom:10px; }
  .missrow{ padding:11px 0; border-bottom:1px solid var(--line); }
  .missrow .g{ font-weight:700; font-size:1rem; }
  .missrow .m{ color:var(--dim); font-size:.9rem; margin-top:2px; line-height:1.4; }
  .allgood{ text-align:center; color:var(--ok); padding:30px 0; font-size:1.05rem; }

  @keyframes fade{ from{opacity:0; transform:translateY(8px);} to{opacity:1; transform:none;} }
  .fadein{ animation:fade .32s ease; }

/* premium layer */
.score{font-family:var(--au-serif,Georgia)!important;font-style:italic;font-weight:400!important;letter-spacing:-.015em;}
</style>
</head>
<body>

<!-- HOME -->
<section id="home" class="wrap">
  <div class="brand">
    <div>
      <h1>Ιστορία <span>· Προσανατολισμού</span></h1>
      <div class="sub">15΄ τη μέρα · κατάλαβε το νόημα, όχι παπαγαλία</div>
    </div>
    <a class="infobtn" id="infoBtn" role="button" aria-label="Οδηγίες">?</a>
  </div>

  <button class="cta" id="dayCta">
    <div class="lbl" id="ctaLbl">Σήμερα</div>
    <div class="day" id="ctaDay">—</div>
    <div class="meta" id="ctaMeta">—</div>
  </button>
  <div class="mini"><span id="miniProg">—</span></div>

  <div class="sectlabel">Το 30-ήμερο πλάνο (νόημα)</div>
  <div class="plan" id="planList"></div>

  <div class="sectlabel">Ενότητες &amp; όροι (προαιρετικά)</div>
  <div id="unitList"></div>

  <div style="text-align:center;margin-top:22px"><a href="index.html" style="color:var(--faint);font-size:.85rem;text-decoration:none">‹ Πίσω στο Dashboard</a></div>
</section>

<!-- UNIT VIEW -->
<section id="unit" class="wrap">
  <div class="backrow"><button id="uBack">‹ Αρχική</button></div>
  <div class="uhead" id="uTitle">—<small id="uYears"></small></div>
  <div class="modes">
    <button class="mode themes" id="mThemes">
      <span class="cnt" id="cThemes"></span>
      <div class="mt">Νόημα</div>
      <div class="md">Κατανόησε τις υποενότητες (Ομάδα Β΄ &amp; πηγές).</div>
      <div class="bar"><i id="barThemes" style="width:0"></i></div>
    </button>
    <button class="mode terms" id="mTerms">
      <span class="cnt" id="cTerms"></span>
      <div class="mt">Όροι <span style="font-size:.7rem;color:var(--faint);font-weight:600">· προαιρετικό</span></div>
      <div class="md">Οι εξεταζόμενοι όροι (Ομάδα Α΄) — κατά το βιβλίο. Για αργότερα.</div>
      <div class="bar"><i id="barTerms" style="width:0"></i></div>
    </button>
    <button class="mode mix" id="mMix">
      <div class="mt">Ανακάτεψε</div>
      <div class="md">Γρήγορη μεικτή επανάληψη.</div>
    </button>
  </div>
  <div class="optnote">Το καθημερινό σου είναι το «Σήμερα» στην αρχική. Εδώ μπες μόνο αν θες κάτι έξτρα.</div>
</section>

<!-- SESSION -->
<section id="session">
  <div class="topbar">
    <button class="close" id="sClose">✕</button>
    <div class="pbar"><i id="pfill"></i></div>
    <div class="pcount" id="pcount">0/0</div>
  </div>
  <div class="cardarea"><div id="flash"></div></div>
  <div class="controls" id="controls"></div>
</section>

<!-- SUMMARY -->
<section id="summary">
  <div class="sumwrap">
    <h2 id="sumTitle">Τέλος</h2>
    <div class="score" id="sumScore">0<small>/0</small></div>
    <div class="scmeta" id="sumMeta">—</div>
    <div class="misslist" id="sumMiss"></div>
    <button class="btn" id="sumDone" style="margin-top:18px">Τέλος</button>
  </div>
</section>

<script>
"use strict";
/* ═══════════════════════════════════════════════════════════════
   ΙΣΤΟΡΙΑ ΠΡΟΣΑΝΑΤΟΛΙΣΜΟΥ — «Θέματα Νεοελληνικής Ιστορίας» (Γ΄ Λυκείου)
   Νόημα-first: 15΄/μέρα, 30-ήμερο πλάνο κατανόησης (Αίτια→Γεγονότα→
   Συνέπειες→Σύνδεση). Οι Όροι (κατά το βιβλίο) μένουν ΠΡΟΑΙΡΕΤΙΚΟΙ.
   Περιεχόμενο επαληθευμένο από το επίσημο βιβλίο (ebooks.edu.gr).
   Offline / on-device (localStorage). Καμία εξωτερική εξάρτηση.
   ═══════════════════════════════════════════════════════════════ */

var UNITS = [
{
  id:"prosf", name:"Το Προσφυγικό Ζήτημα", years:"1821–1930", ready:true,
  terms:[
    {id:"t01", t:"Ο διωγμός του 1914 (ο πρώτος διωγμός)",
      d:"Ο πρώτος διωγμός των Ελλήνων της Οθωμανικής Αυτοκρατορίας (1914). Ο τουρκικός εθνικισμός συνέβαλε στην εχθρική αντιμετώπιση των μειονοτήτων· στο στόχαστρο βρέθηκαν κυρίως οι Έλληνες και οι Αρμένιοι, καθώς είχαν συγκεντρώσει το μεγαλύτερο μέρος του εμπορίου και της βιομηχανίας. Πρώτα θύματα οι Έλληνες της Ανατ. Θράκης (αρχές 1914)· τον Μάιο οι διωγμοί επεκτάθηκαν στη Δυτ. Μικρά Ασία, με την καθοδήγηση των Γερμανών (συμμάχων των Τούρκων)."},
    {id:"t02", t:"Τάγματα εργασίας (αμελέ ταμπουρού)",
      d:"Μία από τις μορφές καταπίεσης κατά τον διωγμό: οι άνδρες άνω των 45 ετών, που δεν στρατεύονταν, επάνδρωσαν τα τάγματα εργασίας, όπου πολλοί πέθαναν από κακουχίες, πείνα και αρρώστιες."},
    {id:"t03", t:"Συνθήκη του Νεϊγύ (Νοέμβριος 1919)",
      d:"Προέβλεπε την παραχώρηση της Δυτικής Θράκης από τη Βουλγαρία στην Ελλάδα. Σε αυτήν ήταν συνημμένο το «Σύμφωνο περί αμοιβαίας μεταναστεύσεως μεταξύ Ελλάδος και Βουλγαρίας»: αναχώρησαν ~50.000 Βούλγαροι από την Ελλάδα και ~30.000 Έλληνες από τη Βουλγαρία."},
    {id:"t04", t:"Η παλιννόστηση",
      d:"Η επιστροφή των προσφύγων στη Μικρά Ασία· ξεκίνησε στους τελευταίους μήνες του 1918 (τερματισμός του πολέμου για την Τουρκία). Οι περισσότεροι επέστρεψαν μετά την απόβαση του ελληνικού στρατού στη Σμύρνη (Μάιος 1919)· ως το τέλος του 1920 η πλειονότητα είχε επιστρέψει στη Μ. Ασία και την Ανατ. Θράκη. Ανακόπηκε τον Αύγουστο του 1922."},
    {id:"t05", t:"Υπηρεσία Παλιννοστήσεως και Περιθάλψεως (Ύπατη Αρμοστεία Σμύρνης)",
      d:"Στα πλαίσια της Ύπατης Αρμοστείας Σμύρνης ιδρύθηκε η «Υπηρεσία Παλιννοστήσεως και Περιθάλψεως», που βοηθούσε όσους επέστρεφαν (κατά την παλιννόστηση) να αποκατασταθούν στα σπίτια τους και τις ασχολίες τους."},
    {id:"t06", t:"Η Μικρασιατική Καταστροφή — η έξοδος (1922)",
      d:"Ο μικρασιατικός πόλεμος έληξε τον Αύγουστο του 1922 με ήττα και υποχώρηση του ελληνικού στρατού. Το φθινόπωρο του 1922 έφθασαν στην Ελλάδα περίπου 900.000 πρόσφυγες (ανάμεσά τους και 50.000 Αρμένιοι). Στους κατοίκους της Ανατ. Θράκης δόθηκε προθεσμία ενός μήνα για να εκκενώσουν την περιοχή."},
    {id:"t07", t:"Η Σύμβαση ανταλλαγής των πληθυσμών (30 Ιαν. 1923)",
      d:"Ελληνοτουρκική Σύμβαση (υπογράφηκε στις 30 Ιανουαρίου 1923, έξι μήνες πριν τη Λοζάνη) που ρύθμιζε την υποχρεωτική ανταλλαγή των Ελλήνων ορθοδόξων κατοίκων της Τουρκίας και των Μουσουλμάνων κατοίκων της Ελλάδας. Ίσχυσε αναδρομικά από τις 18 Οκτωβρίου 1912 (Α΄ Βαλκανικός πόλεμος). Εξαιρέθηκαν οι Έλληνες ορθόδοξοι της Κωνσταντινούπολης, της Ίμβρου και της Τενέδου, και οι Μουσουλμάνοι της Δυτικής Θράκης. Καθιέρωνε για πρώτη φορά μαζική και υποχρεωτική μετακίνηση (οι προηγούμενες ήταν εθελοντικές)."},
    {id:"t08", t:"Η Συνθήκη ειρήνης της Λοζάνης (24 Ιουλ. 1923)",
      d:"Η Συνθήκη ειρήνης της Λοζάνης υπογράφηκε στις 24 Ιουλίου 1923 και καθόρισε το νέο εδαφικό/συνοριακό καθεστώς μετά τη Μικρασιατική Καταστροφή. Με βάση το άρθρο 11 της Σύμβασης της Λοζάνης ιδρύθηκε η Μικτή Επιτροπή Ανταλλαγής."},
    {id:"t09", t:"Μικτή Επιτροπή Ανταλλαγής",
      d:"Ιδρύθηκε με βάση το άρθρο 11 της Σύμβασης της Λοζάνης, με έδρα την Κωνσταντινούπολη. Την αποτελούσαν έντεκα μέλη (τέσσερις Έλληνες, τέσσερις Τούρκοι και τρία μέλη-πολίτες ουδέτερων κατά τον Α΄ Παγκόσμιο πόλεμο κρατών), με αρμοδιότητα τον καθορισμό του τρόπου μετανάστευσης των πληθυσμών και της εκτίμησης της ακίνητης περιουσίας των ανταλλαξίμων."},
    {id:"t10", t:"Οι ανταλλάξιμοι — τα δικαιώματά τους",
      d:"Οι ανταλλάξιμοι, σύμφωνα με τη σύμβαση: (α) θα απέβαλαν την παλιά ιθαγένεια και θα αποκτούσαν εκείνη της χώρας εγκατάστασης· (β) είχαν δικαίωμα να μεταφέρουν την κινητή περιουσία τους· (γ) είχαν δικαίωμα να πάρουν από το κράτος στο οποίο μετανάστευαν, ως αποζημίωση, περιουσία ίσης αξίας με την ακίνητη που εγκατέλειπαν· (δ) θα διευκολύνονταν στη μετακίνησή τους από τη Μικτή Επιτροπή Ανταλλαγής."},
    {id:"t11", t:"Ταμείο Περιθάλψεως Προσφύγων (Νοέμ. 1922)",
      d:"Ιδρύθηκε τον Νοέμβριο του 1922· ανήγειρε ξύλινα παραπήγματα για τη στέγαση των προσφύγων. Ασχολήθηκε με την περίθαλψη/αποκατάσταση την περίοδο 1922–1925."},
    {id:"t12", t:"Επιτροπή Αποκαταστάσεως Προσφύγων (ΕΑΠ)",
      d:"Με πρωτοβουλία της Κοινωνίας των Εθνών (ΚΤΕ), τον Σεπτέμβριο του 1923 ιδρύθηκε ένας αυτόνομος οργανισμός με πλήρη νομική υπόσταση, η Επιτροπή Αποκαταστάσεως Προσφύγων (ΕΑΠ), με έδρα την Αθήνα. Βασική αποστολή της ήταν να εξασφαλίσει στους πρόσφυγες παραγωγική απασχόληση και οριστική στέγαση. Η κυβέρνηση της διέθεσε πάνω από 8.000.000 στρέμματα γης, το ποσό δύο δανείων (1924, 1928) κ.ά. Λειτούργησε ως το τέλος του 1930 και μεταβίβασε στο Ελληνικό Δημόσιο την περιουσία και τις υποχρεώσεις της."},
    {id:"t13", t:"Κοινωνία των Εθνών (ΚΤΕ)",
      d:"Ο διεθνής οργανισμός τη βοήθεια του οποίου ζήτησε η ελληνική κυβέρνηση μπροστά στο τεράστιο έργο της αποκατάστασης· με πρωτοβουλία της ΚΤΕ ιδρύθηκε η ΕΑΠ (1923)."},
    {id:"t14", t:"Η αγροτική αποκατάσταση",
      d:"Παροχή στέγης ΚΑΙ κλήρου στην ύπαιθρο· απέβλεπε στη δημιουργία μικρών γεωργικών ιδιοκτησιών (έργο κυρίως της ΕΑΠ). Δόθηκε προτεραιότητα στη Μακεδονία και τη Δυτ. Θράκη (μουσουλμανικά κτήματα & κτήματα Βουλγάρων του Νεϊγύ, κάλυψη δημογραφικού κενού, εποικισμός παραμεθορίων). Παραχωρούνταν γη, στέγη, εργαλεία, σπόροι, λιπάσματα και ζώα· ο τίτλος ήταν απλής κατοχής και γινόταν πλήρους κυριότητας μετά την αποπληρωμή."},
    {id:"t15", t:"Η αστική αποκατάσταση",
      d:"Παροχή στέγης στις πόλεις (μόνο στέγαση, ΟΧΙ πρόνοια για εύρεση εργασίας). Την ανέλαβε περισσότερο το κράτος και λιγότερο η ΕΑΠ. Ξεκίνησε από την Αθήνα με τη δημιουργία τεσσάρων συνοικισμών: της Καισαριανής, του Βύρωνα, της Νέας Ιωνίας (Αθήνα) και της Κοκκινιάς (Πειραιάς). Συνάντησε περισσότερα εμπόδια (μεγάλος αριθμός προσφύγων, λίγα ανταλλάξιμα σπίτια, καθυστερήσεις)."},
    {id:"t16", t:"Εργολαβία & αυτεπιστασία (συστήματα στέγασης)",
      d:"Τα δύο συστήματα ανέγερσης των κατοικιών: εργολαβία = η ανέγερση των οικιών γινόταν απευθείας από την ΕΑΠ· αυτεπιστασία = η ανέγερση γινόταν από τους ίδιους τους πρόσφυγες, με τη χορήγηση όλων των οικοδομικών υλικών."},
    {id:"t17", t:"Η Συμφωνία της Άγκυρας (10 Ιουν. 1930)",
      d:"Υπογράφηκε στις 10 Ιουνίου 1930 (Βενιζέλος) ως το οικονομικό σύμφωνο των δύο χωρών. Ρύθμισε το ζήτημα των Ελλήνων ορθοδόξων της Κων/πολης και των μουσουλμάνων της Θράκης· όριζε ότι οι ανταλλάξιμες μουσουλμανικές περιουσίες στην Ελλάδα και οι ελληνικές στην Τουρκία περιέρχονταν στην κυριότητα του αντίστοιχου Δημοσίου· προέβλεπε αμοιβαία απόσβεση των οικονομικών υποχρεώσεων. Ο συμψηφισμός (η πολύ μεγαλύτερη ελληνική περιουσία εξισώθηκε με τη μουσουλμανική) προκάλεσε θύελλα αντιδράσεων και συνέβαλε στην ήττα των Φιλελευθέρων (1932-1933). [Διαφορετική από την προγενέστερη Σύμβαση της Άγκυρας του 1925, που δεν εφαρμόστηκε.]"},
    {id:"t18", t:"Γενική Διεύθυνση Ανταλλαγής Πληθυσμών (1924)",
      d:"Συστάθηκε το 1924, υπαγόμενη στο Υπουργείο Γεωργίας, για να βοηθήσει το έργο της ελληνικής αντιπροσωπείας στη Μικτή Επιτροπή (εκτίμηση των ανταλλάξιμων περιουσιών). Κατά τόπους λειτουργούσαν Γραφεία Ανταλλαγής Πληθυσμών."},
    {id:"t19", t:"Γηγενείς και «πρόσφυγες»",
      d:"Οι γηγενείς είναι οι ντόπιοι κάτοικοι, σε αντιδιαστολή με τους πρόσφυγες. Αρχικά οι σχέσεις τους ήταν επιφυλακτικές/ανταγωνιστικές (ο όρος «πρόσφυγας» πήρε υποτιμητική σημασία)· η διάκριση αμβλύνθηκε ουσιαστικά μετά τη δεκαετία του 1940."},
    {id:"t20", t:"Υπουργείο Περιθάλψεως (Ιούλ. 1917)",
      d:"Ιδρύθηκε τον Ιούλιο του 1917 (περίοδος Εθνικού Διχασμού). Για πρώτη φορά θεσμοθετήθηκε η περίθαλψη — και για τις οικογένειες των εφέδρων που βρίσκονταν στο μέτωπο και για τις οικογένειες των θυμάτων του πολέμου. (Νωρίτερα: «Ανωτάτη Διεύθυνσις Περιθάλψεως» στη Θεσσαλονίκη.)"},
    {id:"t21", t:"Ερμούπολη (Σύρος) — 19ος αιώνας",
      d:"Πόλη της Σύρου που ονομάστηκε το 1825 και αναπτύχθηκε από πρόσφυγες του Αγώνα (Χίοι, Ψαριανοί, Κρήτες κ.ά.), χωρίς κρατική βοήθεια· εξελίχθηκε σε μεγάλο εμπορικό και ναυτιλιακό κέντρο — παράδειγμα προσφυγικής αυτο-οργάνωσης τον 19ο αιώνα."}
  ],
  themes:[
    {id:"h01", t:"Οι πρόσφυγες τον 19ο αιώνα", q:"Πώς αντιμετωπίστηκε το προσφυγικό ζήτημα τον 19ο αιώνα;",
      aitia:["Τουρκικά αντίποινα μετά τις επαναστατικές εξεγέρσεις (1821 κ.ε.).","Καταστροφές νησιών & περιοχών (Χίος, Ψαρά, Κάσος, Κρήτη)."],
      geg:["Πρόσφυγες από Μ. Ασία, Κων/πολη, Κύπρο και από νησιά/ηπειρωτική Ελλάδα.","Στην Επανάσταση ΔΕΝ υπήρξε συστηματική κρατική πολιτική — η βοήθεια ήταν τοπική & εθελοντική.","Η Ερμούπολη (Σύρος) αναπτύχθηκε από πρόσφυγες χωρίς κρατική στήριξη.","Πρώτες οργανωμένες προσπάθειες αποκατάστασης επί Καποδίστρια (1828–31)."],
      syn:["Το ζήτημα παρέμεινε διαρκές, συνδεδεμένο με τα αλυτρωτικά κινήματα.","Δημιουργήθηκε εμπειρία που θα φανεί καθοριστική τον 20ό αιώνα."],
      link:"Σε σχέση με τον 19ο αι., ο 20ός φέρνει προσφυγικά ρεύματα ασύγκριτα μεγαλύτερα — και τελικά την υποχρεωτική, οργανωμένη αποκατάσταση."},
    {id:"h02", t:"Προσφυγικά ρεύματα 1914–1922", q:"Ποια ήταν τα προσφυγικά ρεύματα προς την Ελλάδα (1914–1922) και οι αιτίες τους;",
      aitia:["Τουρκικός εθνικισμός & εχθρότητα προς τις μειονότητες.","Η οικονομική ισχύς Ελλήνων/Αρμενίων στο εμπόριο & τη βιομηχανία.","Ο Α΄ Παγκόσμιος Πόλεμος και η Ρωσική Επανάσταση."],
      geg:["Διωγμός του 1914 (Ανατ. Θράκη → Δυτ. Μ. Ασία): επιτάξεις, εκτοπισμοί, τάγματα εργασίας.","Ανατ. Μακεδονία: βουλγαρική κατοχή (1916).","Δυτ. Θράκη: Συνθήκη Νεϊγύ (1919), αμοιβαία μετανάστευση.","Έλληνες από τη Ρωσία (1919–21) λόγω της Επανάστασης.","Ως το 1920 οι πρόσφυγες έφτασαν τους ~800.000."],
      syn:["Ανάγκη για οργανωμένη περίθαλψη — ίδρυση Υπουργείου Περιθάλψεως (1917).","Οι πρόσφυγες θεωρούσαν την προσφυγιά προσωρινή."],
      link:"Η παλιννόστηση (1918–20) έδειχνε λύση — αλλά ανατράπηκε ολοκληρωτικά με τη Μικρασιατική Καταστροφή του 1922."},
    {id:"h03", t:"Μικρασιατική Καταστροφή & ανταλλαγή", q:"Τι ήταν η Μικρασιατική Καταστροφή και πώς ρυθμίστηκε το ζήτημα με τη Λοζάνη;",
      aitia:["Η στρατιωτική ήττα του ελληνικού στρατού (Αύγουστος 1922).","Η βίαιη εκρίζωση του ελληνισμού από τα μικρασιατικά παράλια."],
      geg:["~900.000 πρόσφυγες ως το φθινόπωρο του 1922 (και ~50.000 Αρμένιοι).","Σύμβαση ανταλλαγής πληθυσμών (30 Ιαν. 1923) — υποχρεωτική, αναδρομικά από 18.10.1912.","Συνθήκη ειρήνης της Λοζάνης (24 Ιουλ. 1923).","Εξαιρέσεις: Έλληνες Κων/πολης, Ίμβρου, Τενέδου· Μουσουλμάνοι Δυτ. Θράκης.","Μικτή Επιτροπή Ανταλλαγής (11 μέλη, έδρα Κων/πολη).","Απογραφή 1928: ~1.220.000 πρόσφυγες συνολικά."],
      syn:["Τεράστιο έργο περίθαλψης & αποκατάστασης για το ελληνικό κράτος.","Η υπογραφή της Σύμβασης = ψυχολογική στροφή προς τη ΜΟΝΙΜΗ εγκατάσταση."],
      link:"Το μέγεθος του προβλήματος οδήγησε στην ίδρυση της ΕΑΠ (1923) με τη βοήθεια της Κ.Τ.Ε."},
    {id:"h04", t:"Η αποκατάσταση των προσφύγων (ΕΑΠ)", q:"Πώς έγινε η αποκατάσταση (αγροτική/αστική) και ποιος ο ρόλος της ΕΑΠ;",
      aitia:["Το τεράστιο πλήθος προσφύγων απαιτούσε οριστική, παραγωγική εγκατάσταση — όχι απλή περίθαλψη."],
      geg:["Αίτηση βοήθειας στην Κ.Τ.Ε. → ίδρυση ΕΑΠ (Σεπτ. 1923), αυτόνομος οργανισμός, έδρα Αθήνα.","Πόροι: 8+ εκατ. στρέμματα & δύο δάνεια (1924, 1928).","Κριτήρια: διάκριση «αστών»/«αγροτών», ομαδοποίηση κατά τόπο προέλευσης (π.χ. Νέα Σμύρνη, Νέα Φιλαδέλφεια).","Αγροτική: στέγη + κλήρος (προτεραιότητα Μακεδονία/Δυτ. Θράκη· δόθηκε βάρος στη γεωργία).","Αστική: μόνο στέγη — 4 συνοικισμοί (Καισαριανή, Βύρωνας, Ν. Ιωνία, Κοκκινιά)· εργολαβία ή αυτεπιστασία."],
      syn:["Οριστική εγκατάσταση εκατομμυρίων· διαμόρφωση των σύγχρονων προαστίων.","Η ΕΑΠ έληξε το 1930 και μεταβίβασε το έργο στο ελληνικό Δημόσιο."],
      link:"Παράλληλα έμενε ανοιχτό το ζήτημα των αποζημιώσεων — που έκλεισε με τη Συμφωνία της Άγκυρας (1930)."},
    {id:"h05", t:"Αποζημίωση & Συμφωνία Άγκυρας (1930)", q:"Πώς ρυθμίστηκε η αποζημίωση των ανταλλαξίμων;",
      aitia:["Ανάγκη αποτίμησης & αποζημίωσης των περιουσιών που εγκαταλείφθηκαν εκατέρωθεν.","Επιδίωξη Βενιζέλου για οικονομική εκκαθάριση & ελληνοτουρκική προσέγγιση."],
      geg:["Εκτίμηση περιουσιών: Μικτή Επιτροπή & Γενική Διεύθυνση Ανταλλαγής (1924, Υπ. Γεωργίας)· Γραφεία Ανταλλαγής.","Προσωρινές αποζημιώσεις/προκαταβολή στους απροκατάστατους μέσω της Εθνικής Τράπεζας.","Συμφωνία Άγκυρας (10 Ιουν. 1930): συμψηφισμός περιουσιών & αμοιβαία απόσβεση υποχρεώσεων."],
      syn:["Δυσαρέσκεια των προσφύγων (η ελληνική περιουσία πολύ μεγαλύτερη εξισώθηκε με τη μουσουλμανική· παρακράτηση 25% της προκαταβολής).","Συνέβαλε στην εκλογική ήττα των Φιλελευθέρων (1932 & 1933)."],
      link:"Το ζήτημα των αποζημιώσεων επηρέασε άμεσα την πολιτική στάση & ένταξη των προσφύγων."},
    {id:"h06", t:"Η ένταξη των προσφύγων — συνέπειες", q:"Ποιες ήταν οι συνέπειες της ένταξης των προσφύγων (οικ/κοιν/πολ/πολιτιστικές);",
      aitia:["Η άφιξη >1,2 εκατ. προσφύγων μετέβαλε ριζικά τον πληθυσμό, την οικονομία & την κοινωνία."],
      geg:["Οικονομικές: γεωργία — καλλιεργούμενες εκτάσεις +50%, διπλασιασμός παραγωγής (1922–31), νέες καλλιέργειες (καπνός, βαμβάκι, σταφίδα)· βιομηχανία — φθηνό ειδικευμένο εργατικό δυναμικό, διπλασιασμός μονάδων (1922–32)· αστικοποίηση & γυναικεία εργασία.","Κοινωνικές: ετερογένεια, καχυποψία γηγενών, ο όρος «πρόσφυγας» υποτιμητικός· άμβλυνση μετά το 1940.","Πολιτικές: οι πρόσφυγες πήραν πολιτικά δικαιώματα & στήριξαν τους Βενιζελικούς → αντιβενιζελική εχθρότητα.","Πολιτιστικές/πληθυσμιακές: εθνολογική ομοιογένεια (μη ορθόδοξοι 20%→6%)· ρεμπέτικο· λογοτεχνία (Σεφέρης, Βενέζης, Πολίτης, Θεοτοκάς, Δούκας, Κόντογλου, Καλομοίρης)."],
      syn:["Ο πληθυσμός της Ελλάδας αυξήθηκε ~20% (1920–28).","Διαμορφώθηκε η σύγχρονη Ελλάδα — οικονομικά, κοινωνικά & πολιτισμικά."],
      link:"Η ένταξη «κλείνει» το προσφυγικό ζήτημα (1821–1930) και συνδέει το κεφάλαιο με την οικονομία & τα πολιτικά κόμματα του Μεσοπολέμου."}
  ]
},
{
  id:"komm", name:"Τα Πολιτικά Κόμματα", years:"1821–1936", ready:true,

  themes:[
    {id:"c01", t:"Εξωτ. προσανατολισμός & πελατειακές σχέσεις (1821–1843)", q:"Πώς διαμορφώθηκαν τα πρώτα κόμματα και ποιος ο ρόλος των ξένων;",
      aitia:["Επί Τουρκοκρατίας οι Έλληνες δεν μπορούσαν να συγκροτήσουν κόμματα· τη θέση τους έπαιζαν τα πελατειακά δίκτυα (πατρωνία).","Αίτια της πατρωνίας: ανταγωνισμός για θέσεις εξουσίας, ελλιπής προστασία & απουσία κοινωνικής πρόνοιας από την οθωμανική διοίκηση.","Η εξάρτηση του νέου κράτους από τις Μεγάλες Δυνάμεις."],
      geg:["Τα πελατειακά δίκτυα (οικογένεια → πάτρωνες-προστάτες) μεταφέρθηκαν στο νέο κράτος.","Σχηματίστηκαν τα «ξενικά» κόμματα: Αγγλικό, Γαλλικό, Ρωσικό — προσδεμένο το καθένα σε μια Μεγάλη Δύναμη.","Απόλυτη μοναρχία του Όθωνα (από το 1833), χωρίς Σύνταγμα."],
      syn:["Συσσώρευση δυσαρέσκειας για την αυταρχική διακυβέρνηση.","Επανάσταση της 3ης Σεπτεμβρίου 1843: ο Όθων αναγκάζεται να παραχωρήσει Σύνταγμα."],
      link:"Το Σύνταγμα (1844) ανοίγει την επόμενη περίοδο: τα κόμματα αρχίζουν να χειραφετούνται από τους ξένους."},
    {id:"c02", t:"Χειραφέτηση & αναμόρφωση (1844–1880)", q:"Πώς χειραφετήθηκαν τα κόμματα από τους ξένους;",
      aitia:["Το Σύνταγμα του 1844 (μετά την 3η Σεπτεμβρίου 1843) καθιέρωσε κοινοβουλευτικό πλαίσιο.","Ανάγκη απεξάρτησης της πολιτικής ζωής από τις ξένες προστασίες."],
      geg:["Έξωση του Όθωνα (1862) → νέα δυναστεία (Γεώργιος Α΄) και Σύνταγμα του 1864 (βασιλευομένη δημοκρατία, καθολική ψηφοφορία των ανδρών).","Τα κόμματα χειραφετούνται σταδιακά από τους ξένους προστάτες.","Αρχή της δεδηλωμένης (1875, με τον Χαρίλαο Τρικούπη): ο βασιλιάς δίνει εντολή σχηματισμού κυβέρνησης στον πολιτικό που έχει τη «δεδηλωμένη» εμπιστοσύνη της πλειοψηφίας της Βουλής."],
      syn:["Εδραίωση του κοινοβουλευτισμού· περιορισμός της βασιλικής παρέμβασης."],
      link:"Η δεδηλωμένη ανοίγει τον δρόμο στον οργανωμένο δικομματισμό της επόμενης περιόδου (1880–1909)."},
    {id:"c03", t:"Δικομματισμός & εκσυγχρονισμός (1880–1909)", q:"Τι ήταν ο δικομματισμός και ο εκσυγχρονισμός;",
      aitia:["Η εδραίωση της δεδηλωμένης επέτρεψε σταθερότερες, οργανωμένες κυβερνήσεις.","Ανάγκη εκσυγχρονισμού του κράτους & της οικονομίας."],
      geg:["Δικομματισμός: Χαρίλαος Τρικούπης (εκσυγχρονισμός — έργα υποδομής, στρατός, φορολογία) απέναντι στον Θεόδωρο Δηλιγιάννη (λαϊκότερη πολιτική).","Οικονομική κρίση → πτώχευση του 1893.","Ήττα στον ατυχή πόλεμο του 1897."],

/* ── κατάσταση / αποθήκευση ───────────────────────────── */
var KEY="istoria:v1";
var state=load();
function load(){ try{ return JSON.parse(localStorage.getItem(KEY))||{}; }catch(e){ return {}; } }
function save(){ try{ localStorage.setItem(KEY,JSON.stringify(state)); }catch(e){} }
state.seen=state.seen||{}; state.miss=state.miss||{}; state.days=state.days||{}; state.plan=state.plan||{};

function shuffle(a){ a=a.slice(); for(var i=a.length-1;i>0;i--){ var j=Math.floor(Math.random()*(i+1)); var t=a[i];a[i]=a[j];a[j]=t; } return a; }
function unitById(id){ for(var i=0;i<UNITS.length;i++) if(UNITS[i].id===id) return UNITS[i]; return null; }
function itemRef(unit,id){
  for(var i=0;i<unit.terms.length;i++) if(unit.terms[i].id===id) return {kind:"term",item:unit.terms[i]};
  for(var j=0;j<unit.themes.length;j++) if(unit.themes[j].id===id) return {kind:"theme",item:unit.themes[j]};
  return null;
}
function refAny(id){ for(var i=0;i<UNITS.length;i++){ var r=itemRef(UNITS[i],id); if(r) return r; } return null; }
function termMastered(id){ var s=state.seen[id]; return !!(s&&s.c>=2&&!(state.miss[id]>0)); }
function themeKnown(id){ var s=state.seen[id]; return !!(s&&s.c>=1&&!(state.miss[id]>0)); }
function seenAny(id){ var s=state.seen[id]; return !!(s&&(s.c+s.w)>0); }

/* ── δόμηση ουράς ──────────────────────────────────────── */
function buildQueue(unit,mode){
  var poolT=unit.terms.map(function(x){return {kind:"term",item:x};});
  var poolH=unit.themes.map(function(x){return {kind:"theme",item:x};});
  function order(pool,n){
    var unseen=pool.filter(function(c){ return !seenAny(c.item.id); });
    var due=pool.filter(function(c){ return state.miss[c.item.id]>0; });
    var rest=pool.filter(function(c){ return seenAny(c.item.id) && !(state.miss[c.item.id]>0); });
    return shuffle(due).concat(shuffle(unseen)).concat(shuffle(rest)).slice(0,n);
  }
  if(mode==="terms") return order(poolT,10);
  if(mode==="themes") return order(poolH,5);
  return shuffle(order(poolT,6).concat(order(poolH,3))); // mix
}
function buildDay(p){
  // πλάνο: πάντα explicit ids (νόημα). cross-unit ids αναζητούνται παντού.
  return p.ids.map(function(id){ return refAny(id); }).filter(Boolean);
}
function suggestedDay(){ for(var n=1;n<PLAN.length;n++){ if(PLAN[n].locked) continue; if(!state.plan[n]) return n; } return 0; }

var sess=null;
function startDay(n){
  var p=PLAN[n]; if(p.locked) return;
  var q=buildDay(p); if(!q.length) return;
  sess={ unit:unitById(p.u), queue:q, i:0, correct:0, total:q.length, missed:[], planDay:n, backTo:"home" };
  show("session"); renderCard();
}
function startSession(unit,mode){
  var q=buildQueue(unit,mode); if(!q.length) return;
  sess={ unit:unit, mode:mode, queue:q, i:0, correct:0, total:q.length, missed:[], planDay:null, backTo:"unit" };
  show("session"); renderCard();
}
function renderCard(){
  var c=sess.queue[sess.i], isTerm=(c.kind==="term");
  var col=isTerm?"217,139,95":"122,162,227", label=isTerm?"Όρος · Ομάδα Α΄":"Νόημα · Ομάδα Β΄";

      '<div class="answer" id="ans"><div class="hr"></div>'+blocks+'</div>';
  }
  $("#controls").innerHTML='<button class="btn" id="revealBtn">'+(isTerm?"Δείξε τον ορισμό":"Δείξε την ανάλυση")+'</button>';

function li(arr){ return arr.map(function(x){ return '<li>'+x+'</li>'; }).join(""); }
function reveal(){
  $("#ans").classList.add("show");
  var isTerm=(sess.queue[sess.i].kind==="term");
  $("#controls").innerHTML='<div class="judge">'+
    '<button class="btn no" id="noBtn">'+(isTerm?"✗ Δεν το ήξερα":"✗ Χρειάζεται δουλειά")+'</button>'+
    '<button class="btn ok" id="okBtn">'+(isTerm?"✓ Το ήξερα":"✓ Το είπα σωστά")+'</button></div>'+
    '<div class="jhint">Ειλικρινά — έτσι δουλεύει η επανάληψη.</div>';
  $("#okBtn").onclick=function(){ judge(true); };
  $("#noBtn").onclick=function(){ judge(false); };
}
function judge(knew){
  var c=sess.queue[sess.i], id=c.item.id, s=state.seen[id]||{c:0,w:0};
  if(knew){ s.c++; sess.correct++; if(state.miss[id]){ state.miss[id]--; if(state.miss[id]<=0) delete state.miss[id]; } }
  else { s.w++; state.miss[id]=(state.miss[id]||0)+1; sess.missed.push(c); sess.requeue=(sess.requeue||[]).concat(c); }
  state.seen[id]=s;
  var d=new Date(), ds=d.getFullYear()+"-"+(d.getMonth()+1)+"-"+d.getDate(); state.days[ds]=true;
  save();
  sess.i++;
  if(sess.i>=sess.queue.length && sess.requeue && sess.requeue.length && !sess.requeued){
    sess.requeued=true; sess.queue=sess.queue.concat(shuffle(sess.requeue)); sess.requeue=[];
  }
  if(sess.i>=sess.queue.length) endSession(); else renderCard();
}
function endSession(){
  if(sess.planDay){ state.plan[sess.planDay]=true; save(); }
  var pct=Math.round(sess.correct/sess.total*100);
  $("#sumTitle").textContent = sess.planDay ? ("Μέρα "+sess.planDay+" — τέλος") : "Τέλος";
  $("#sumScore").innerHTML=sess.correct+'<small>/'+sess.total+'</small>';
  $("#sumMeta").textContent=pct+"% "+(pct>=80?"— πολύ δυνατά!":pct>=60?"— καλή δουλειά.":"— τα δύσκολα θα ξαναγυρίσουν.");
  var wrap=$("#sumMiss");
  if(sess.missed.length){
    var seen={}, h='<h3>Ξαναδές αυτά ('+sess.missed.length+')</h3>';
    sess.missed.forEach(function(c){ if(seen[c.item.id])return; seen[c.item.id]=1;
      h+='<div class="missrow"><div class="g">'+c.item.t+'</div><div class="m">'+(c.kind==="term"?c.item.d:c.item.q)+'</div></div>'; });
    wrap.innerHTML=h;
  } else wrap.innerHTML='<div class="allgood">✓ Καθαρό — το κατέχεις.</div>';
  show("summary");
}

/* ── Cloud sync (istoria:v1) — token-aware sync.js, deep-union merge. onApplied
   reloads state before any save() so an incoming merge (this progress arriving
   from the phone) is never clobbered by a stale in-memory copy. renderHome()
   only repaints the home DOM, so it is safe to call mid-session. */
(function initIstoriaSync(){
  var tries=0;
  (function wait(){
    if(typeof initCloudSync!=='function' || !window.supabase){ if(tries++<40){ setTimeout(wait,200); } return; }
    initCloudSync({
      appKey:'istoria',
      syncedKeys:['istoria:v1'],
      onApplied:function(){
        state=load(); state.seen=state.seen||{}; state.miss=state.miss||{}; state.days=state.days||{}; state.plan=state.plan||{};
        try{ renderHome(); }catch(e){}
      }
    });
  })();
})();

if("serviceWorker" in navigator){ navigator.serviceWorker.register("sw.js").catch(function(){}); }

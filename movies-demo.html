<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Cinema — demo</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=JetBrains+Mono:wght@500;600;700&display=swap" rel="stylesheet">
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  :root{
    --bg:#08090b; --bg2:#0d0f13; --card:#111318; --line:rgba(255,255,255,.07);
    --ivory:#F4F1EA; --dim:rgba(244,241,234,.62); --faint:rgba(244,241,234,.34);
    --em:#34E2B0; --gold:#F2C063; --rose:#FF6B8B;
    --serif:'Instrument Serif',serif; --mono:'JetBrains Mono',monospace;
    --sans:-apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,Arial,sans-serif;
  }
  html,body{background:var(--bg);color:var(--ivory);font-family:var(--sans);-webkit-font-smoothing:antialiased}
  body{max-width:560px;margin:0 auto;padding:0 18px 80px;overflow-x:hidden}
  .mono{font-family:var(--mono)}
  .eyebrow{font-family:var(--mono);font-size:9.5px;font-weight:700;letter-spacing:.22em;text-transform:uppercase;color:var(--faint)}
  .serif{font-family:var(--serif)}
  small{font-size:.62em}

  /* header */
  .hd{display:flex;align-items:flex-start;justify-content:space-between;gap:14px;padding:26px 0 18px}
  .hd-l{flex:1}
  .hd-eb{display:flex;align-items:center;gap:7px;margin-bottom:11px}
  .hd-eb .dot{width:6px;height:6px;border-radius:50%;background:var(--em);box-shadow:0 0 10px var(--em)}
  .hero-line{font-family:var(--serif);font-size:29px;line-height:1.12;letter-spacing:.01em;color:var(--ivory)}
  .hero-line b{font-style:italic;color:var(--em);font-weight:400}
  .nova{width:52px;height:52px;flex:0 0 auto;border-radius:50%;position:relative;background:radial-gradient(circle at 50% 42%,rgba(52,226,176,.28),rgba(52,226,176,.04) 60%,transparent 72%)}
  .nova::after{content:"";position:absolute;inset:0;margin:auto;width:11px;height:11px;border-radius:50%;background:var(--em);box-shadow:0 0 16px var(--em);animation:beat 3.2s ease-in-out infinite}
  @keyframes beat{0%,100%{transform:scale(1);opacity:.85}50%{transform:scale(1.32);opacity:1}}

  /* section head */
  .sec-h{display:flex;align-items:center;gap:10px;margin:30px 2px 14px}
  .sec-h .t{font-family:var(--mono);font-size:10px;font-weight:700;letter-spacing:.18em;text-transform:uppercase;color:var(--dim)}
  .sec-h .ln{flex:1;height:1px;background:var(--line)}
  .sec-h .act{font-family:var(--mono);font-size:9px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--faint)}

  /* hero reel */
  .reel-wrap{position:relative;margin:0 -18px;padding:4px 18px 6px;overflow:hidden}
  .reel-bg{position:absolute;inset:-40px -18px auto;height:280px;background-size:cover;background-position:center 22%;filter:blur(34px) saturate(1.1);opacity:.34;transform:scale(1.1);z-index:0}
  .reel-bg::after{content:"";position:absolute;inset:0;background:linear-gradient(180deg,rgba(8,9,11,.5),var(--bg) 92%)}
  .reel{position:relative;z-index:1;display:flex;gap:12px;overflow-x:auto;padding:8px 0 12px;scroll-snap-type:x mandatory;-ms-overflow-style:none;scrollbar-width:none}
  .reel::-webkit-scrollbar{display:none}
  .reel .p{scroll-snap-align:start;flex:0 0 auto}
  .poster{position:relative;border-radius:11px;overflow:hidden;background:var(--card);box-shadow:0 10px 30px rgba(0,0,0,.5);transition:transform .4s cubic-bezier(.2,.7,.2,1),box-shadow .4s}
  .poster img{display:block;width:100%;height:100%;object-fit:cover}
  .reel .poster{width:118px;height:177px}
  .poster .heart{position:absolute;top:7px;right:8px;width:15px;height:15px;filter:drop-shadow(0 1px 3px rgba(0,0,0,.6))}
  .poster .rt{position:absolute;left:7px;bottom:7px;font-family:var(--mono);font-size:10px;font-weight:800;color:#fff;background:rgba(0,0,0,.5);backdrop-filter:blur(6px);padding:2px 6px;border-radius:6px;letter-spacing:.02em}
  .poster:hover{transform:translateY(-6px);box-shadow:0 18px 44px rgba(0,0,0,.6),0 0 0 1px rgba(52,226,176,.22)}

  /* stats strip */
  .stats{display:flex;gap:8px;margin-top:4px}
  .stat{flex:1;background:linear-gradient(180deg,var(--card),var(--bg2));border:1px solid var(--line);border-radius:14px;padding:14px 10px;text-align:center}
  .stat .v{font-family:var(--serif);font-size:32px;line-height:1;color:var(--ivory)}
  .stat .v.em{color:var(--em)}
  .stat .l{font-family:var(--mono);font-size:8px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:var(--faint);margin-top:7px}

  /* taste card */
  .card{background:linear-gradient(180deg,var(--card),var(--bg2));border:1px solid var(--line);border-radius:18px;padding:20px 18px}
  .taste-line{font-family:var(--serif);font-size:22px;line-height:1.25;color:var(--ivory);margin-bottom:4px}
  .taste-line b{font-style:italic;color:var(--em);font-weight:400}
  .taste-sub{font-size:12px;color:var(--dim);line-height:1.5;margin-bottom:18px}
  .grp-t{font-family:var(--mono);font-size:8.5px;font-weight:700;letter-spacing:.15em;text-transform:uppercase;color:var(--faint);margin:18px 0 10px}
  .bar{display:flex;align-items:center;gap:10px;margin-bottom:9px}
  .bar .nm{width:88px;flex:0 0 auto;font-size:12px;color:var(--dim);font-weight:500}
  .bar .tk{flex:1;height:7px;border-radius:4px;background:rgba(255,255,255,.06);overflow:hidden}
  .bar .fl{height:100%;width:100%;border-radius:4px;transform-origin:left;transform:scaleX(0);transition:transform 1s cubic-bezier(.2,.7,.2,1)}
  .bar .vv{width:52px;flex:0 0 auto;text-align:right;font-family:var(--mono);font-size:10px;font-weight:700;color:var(--ivory)}
  .bar .vv small{color:var(--faint);font-size:.82em}
  .dir{display:flex;align-items:center;gap:10px;padding:9px 0;border-top:1px solid var(--line)}
  .dir:first-of-type{border-top:0}
  .dir .dn{flex:1;font-size:13px;color:var(--ivory);font-weight:600}
  .dir .dm{font-family:var(--mono);font-size:9px;color:var(--faint)}
  .dir .dv{font-family:var(--serif);font-size:22px;color:var(--em)}
  .dec{display:flex;gap:5px;align-items:flex-end;height:52px;margin-top:4px}
  .dec .c{flex:1;display:flex;flex-direction:column;align-items:center;gap:5px}
  .dec .cb{width:100%;border-radius:4px 4px 2px 2px;background:linear-gradient(180deg,rgba(52,226,176,.7),rgba(52,226,176,.2));min-height:4px}
  .dec .cl{font-family:var(--mono);font-size:7.5px;color:var(--faint)}

  /* wall */
  .sortbar{display:flex;gap:7px;margin-bottom:14px}
  .sortbar button{font-family:var(--mono);font-size:9px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--faint);background:transparent;border:1px solid var(--line);border-radius:20px;padding:7px 13px;cursor:pointer;transition:.2s}
  .sortbar button.on{color:var(--bg);background:var(--em);border-color:var(--em)}
  .wall{display:grid;grid-template-columns:repeat(3,1fr);gap:11px}
  .wall .poster{width:100%;aspect-ratio:2/3;cursor:pointer;animation:rise .5s both}
  @keyframes rise{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:none}}
  .wall .poster.loved{box-shadow:0 8px 22px rgba(0,0,0,.5),0 0 0 1px rgba(52,226,176,.35)}

  .note{font-family:var(--mono);font-size:9px;letter-spacing:.05em;color:var(--faint);text-align:center;margin-top:34px;line-height:1.7;opacity:.8}
  .badge{display:inline-block;font-family:var(--mono);font-size:8px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--gold);border:1px solid rgba(242,192,99,.3);border-radius:20px;padding:4px 9px;margin-bottom:16px}
  @media (prefers-reduced-motion:reduce){*{animation:none!important;transition:none!important}}
</style>
</head>

  var genreBars=genres.slice(0,6).map(function(x){
    return '<div class="bar"><span class="nm">'+x.g+'</span>'+
      '<span class="tk"><span class="fl" data-fx="'+(x.n/maxN).toFixed(3)+'" style="background:'+barColor(x.avg)+'"></span></span>'+
      '<span class="vv">'+x.avg+'<small> avg</small></span></div>';
  }).join('');

  // director loyalty (2+ films)
  var dTot={},dCnt={};
  FILMS.forEach(function(f){if(!f.director||f.director==='—')return;dTot[f.director]=(dTot[f.director]||0)+f.rating;dCnt[f.director]=(dCnt[f.director]||0)+1;});
  var dirs=Object.keys(dCnt).filter(function(d){return dCnt[d]>=2;})
    .map(function(d){return {d:d,n:dCnt[d],avg:Math.round(dTot[d]/dCnt[d])};})
    .sort(function(a,b){return b.avg-a.avg||b.n-a.n;});
  var dirHtml=dirs.map(function(x){
    return '<div class="dir"><div><div class="dn">'+x.d+'</div><div class="dm">'+x.n+' films seen</div></div><div class="dv">'+x.avg+'</div></div>';
  }).join('');

  // decade lean
  var decCnt={};
  FILMS.forEach(function(f){if(!f.year)return;var d=Math.floor(f.year/10)*10;decCnt[d]=(decCnt[d]||0)+1;});
  var decs=Object.keys(decCnt).sort();
  var maxD=Math.max.apply(null,decs.map(function(d){return decCnt[d];}));
  var decHtml=decs.map(function(d){
    return '<div class="c"><div class="cb" style="height:'+(decCnt[d]/maxD*100)+'%"></div><div class="cl">\''+String(d).slice(2)+'</div></div>';
  }).join('');

  $('tasteCard').innerHTML=
    '<div class="taste-line">A <b>coming-of-age romantic</b><br>with a <b>thriller</b> streak.</div>'+
    '<div class="taste-sub">Comedy and Romance are your comfort; Drama and Thriller are where you give out your 90s. You love the films you love — 24 of 26 hearted.</div>'+
    '<div class="grp-t">Genre affinity · bar = how often, number = your avg</div>'+genreBars+
    '<div class="grp-t">Directors you follow</div>'+dirHtml+
    '<div class="grp-t">The decades you live in</div><div class="dec">'+decHtml+'</div>';

  // grow the genre bars once, via transform (no layout thrash)
  requestAnimationFrame(function(){
    [].forEach.call(document.querySelectorAll('.bar .fl'),function(el){
      el.style.transform='scaleX('+(el.dataset.fx||0)+')';
    });
  });

  // ---- wall ----
  var sort='rating';
  function renderWall(){
    var list=FILMS.slice();
    if(sort==='rating') list.sort(function(a,b){return b.rating-a.rating||b.watched.localeCompare(a.watched);});
    else if(sort==='recent') list.sort(function(a,b){return b.watched.localeCompare(a.watched);});
    else list.sort(function(a,b){return (b.year||0)-(a.year||0);});
    $('wall').innerHTML=list.map(function(f,i){return posterHtml(f).replace('class="poster','style="animation-delay:'+(i*28)+'ms" class="poster');}).join('');
  }
  renderWall();
  $('sortbar').addEventListener('click',function(e){
    var b=e.target.closest('button');if(!b)return;
    [].forEach.call(this.children,function(c){c.classList.remove('on');});
    b.classList.add('on');sort=b.dataset.sort;renderWall();
  });
</script>
</body>
</html>

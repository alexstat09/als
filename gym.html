function chartSVG(vals){
  var WD=320,HT=110,p=14;
  var min=Math.min.apply(null,vals),max=Math.max.apply(null,vals),range=(max-min)||1;
  var pts=vals.map(function(v,i){ var x=vals.length===1?WD/2:p+(WD-2*p)*i/(vals.length-1); var y=p+(HT-2*p)*(1-(v-min)/range); return [x,y]; });
  var line=pts.map(function(pt,i){return (i?'L':'M')+pt[0].toFixed(1)+','+pt[1].toFixed(1);}).join(' ');
  var area=line+' L'+pts[pts.length-1][0].toFixed(1)+','+HT+' L'+pts[0][0].toFixed(1)+','+HT+' Z';
  return '<svg viewBox="0 0 '+WD+' '+HT+'" width="100%" height="'+HT+'" preserveAspectRatio="none">'+
    '<defs><linearGradient id="gpL" x1="0" y1="0" x2="1" y2="0"><stop offset="0%" stop-color="#18C8C0"/><stop offset="100%" stop-color="#34E2B0"/></linearGradient>'+
    '<linearGradient id="gpF" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#34E2B0" stop-opacity="0.26"/><stop offset="100%" stop-color="#34E2B0" stop-opacity="0"/></linearGradient>'+
    '<filter id="gpG" x="-20%" y="-50%" width="140%" height="200%"><feGaussianBlur stdDeviation="3" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter></defs>'+
    '<path d="'+area+'" fill="url(#gpF)"/>'+
    '<path d="'+line+'" fill="none" stroke="url(#gpL)" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" filter="url(#gpG)"/>'+
    '<circle cx="'+pts[pts.length-1][0].toFixed(1)+'" cy="'+pts[pts.length-1][1].toFixed(1)+'" r="4" fill="#34E2B0" filter="url(#gpG)"/></svg>';
}
function exerciseProgress(exId){
  var ex=exById(exId); var h=exHistory(exId);
  var html='<div class="w-sheet-grip"></div><div class="w-sheet-hd"><div class="w-sheet-title">'+esc(ex.name)+'</div><button type="button" class="w-x" data-act="close-sheet">✕</button></div><div class="w-sheet-sub">'+esc(ex.muscle)+' · '+h.length+' session'+(h.length===1?'':'s')+'</div>';
  if(!h.length){ html+='<div class="w-empty" style="font-size:14px;">No history yet — this is your first time. Give it a strong set; it becomes your baseline.</div>'; openSheet(html); return; }
  var prE1=Math.max.apply(null,h.map(function(x){return x.e1rm;}));
  var prW=0; h.forEach(function(x){ if(x.set && (+x.set.kg||0)>prW) prW=+x.set.kg||0; });
  var prV=Math.max.apply(null,h.map(function(x){return x.vol;}));
  html+='<div class="w-prgrid"><div class="w-prstat"><b>'+Math.round(prE1)+'kg</b>est 1RM</div><div class="w-prstat"><b>'+prW+'kg</b>top weight</div><div class="w-prstat"><b>'+prV.toLocaleString()+'</b>best volume</div></div>';
  if(h.length>=2){
    html+=chartSVG(h.map(function(x){return x.e1rm;}));
    html+='<div class="w-chartcap"><span>'+relDate(h[0].date)+'</span><span>estimated 1RM over time</span><span>Now</span></div>';
  }
  /* order-aware: how you perform when this lift is done fresh (1st) vs later in the session */
  var byPos=exHistoryByPos(exId), posKeys=Object.keys(byPos).map(Number).sort(function(a,b){return a-b;});
  if(posKeys.length>1){
    html+='<div class="w-set-head" style="grid-template-columns:1fr;margin:16px 0 6px;">WHEN DONE 1ST VS LATER</div>';
    posKeys.forEach(function(p){ var b=byPos[p]; var st=b.bestSet?((+b.bestSet.kg||0)+'kg × '+(+b.bestSet.reps||0)):'—';
      html+='<div class="w-hist-row"><span class="nm">'+ordinal(p)+' in session <span style="color:var(--au-faint)">· '+b.count+'×</span></span><span class="bs">best '+esc(st)+' · '+Math.round(b.best)+'kg 1RM</span></div>';
    });
  }
  html+='<div class="w-set-head" style="grid-template-columns:1fr;margin:16px 0 6px;">RECENT SESSIONS</div>';
  h.slice(-5).reverse().forEach(function(x){
    var setTxt=x.set?((+x.set.kg||0)+'kg × '+(+x.set.reps||0)):'—';
    html+='<div class="w-hist-row"><span class="nm">'+relDate(x.date)+'</span><span class="bs">'+esc(setTxt)+' · '+Math.round(x.e1rm)+'kg 1RM</span></div>';
  });
  openSheet(html);
}

/* REST TIMER — wall-clock based (survives backgrounding + reload), default 3:00.
   State lives on po_active.rest = {endAt, ei, doneAt} so it can't drift or freeze. */
var restInt=null, restAlerted=false, _actx=null;
function restDefault(){ var v=ls('po_rest_default',180); return (typeof v==='number'&&v>0)?v:180; }
function getRest(){ var a=getActive(); return a?a.rest:null; }
function restRunning(){ return !!getRest(); }
function restCardIndex(){ var r=getRest(); return r?r.ei:-1; }
function restLeftSecs(){ var r=getRest(); if(!r)return 0; return Math.max(0,Math.round((r.endAt-Date.now())/1000)); }
function restInlineHTML(){

document.addEventListener('pointerdown', function(e){
  var grip = e.target && e.target.closest ? e.target.closest('.w-grip') : null; if(!grip) return;
  e.preventDefault();

  var container = ctx==='tpl' ? document.getElementById('wSheet') : W;
  var sel = ctx==='tpl' ? '.w-ex' : '.w-card';
  var items = Array.prototype.slice.call(container.querySelectorAll(sel));
  var item = grip.closest(sel); var from = items.indexOf(item);

  var rects = items.map(function(el){ var r=el.getBoundingClientRect(); return {top:r.top, mid:r.top+r.height/2}; });
  var H = (from < items.length-1) ? (rects[from+1].top - rects[from].top) : (rects[from].top - rects[from-1].top);

  var el=document.getElementById('tgt-'+m); if(el) el.textContent=cur; };
window.resetTargets=function(){ var cv=ls('po_coach_v1',{})||{}; delete cv.muscleTargets; save('po_coach_v1',cv); openSettings(); };

/* ── Reusable exercise form (create / edit) — one on-brand sheet, no prompt chain ── */
function exForm(opts){
  window.__exForm={ name:opts.name||'', muscle:opts.muscle||'Chest', kind:opts.kind||'weight',
    onSave:opts.onSave, title:opts.title||'New exercise', confirm:opts.confirm||'Save' };
  renderExForm();
}
function renderExForm(){
  var f=window.__exForm; var groups=['Chest','Back','Shoulders','Arms','Legs','Core','Cardio','Other'];
  var chips=groups.map(function(m){ return '<button type="button" class="w-mchip'+(m===f.muscle?' on':'')+'" onclick="exFormMuscle(\''+m+'\')">'+m+'</button>'; }).join('');
  var html='<div class="w-sheet-grip"></div>'+
    '<div class="w-sheet-hd"><div class="w-sheet-title">'+esc(f.title)+'</div><button class="w-x" onclick="closeSheet()">✕</button></div>'+
    '<input class="w-search" id="exFormName" placeholder="Exercise name" value="'+esc(f.name)+'" oninput="window.__exForm.name=this.value">'+
    '<div class="w-set-head" style="grid-template-columns:1fr;margin:10px 0 6px;">MUSCLE GROUP</div>'+
    '<div class="w-mchips">'+chips+'</div>'+
    '<div class="w-set-head" style="grid-template-columns:1fr;margin:12px 0 6px;">TRACK BY</div>'+
    '<div class="w-seg" style="margin-bottom:4px;"><button type="button" class="'+(f.kind!=='time'?'on':'')+'" onclick="exFormKind(\'weight\')">Reps &amp; weight</button><button type="button" class="'+(f.kind==='time'?'on':'')+'" onclick="exFormKind(\'time\')">Time</button></div>'+
    '<button class="w-btn" style="margin-top:14px;" onclick="exFormSave()">'+esc(f.confirm)+'</button>';
  openSheet(html);
  setTimeout(function(){ var n=document.getElementById('exFormName'); if(n && !f.name){ n.focus(); } },350);
}
window.exFormMuscle=function(m){ var f=window.__exForm; var n=document.getElementById('exFormName'); if(n)f.name=n.value; f.muscle=m; if(m==='Cardio')f.kind='time'; renderExForm(); };
window.exFormKind=function(k){ var f=window.__exForm; var n=document.getElementById('exFormName'); if(n)f.name=n.value; f.kind=k; renderExForm(); };
window.exFormSave=function(){ var f=window.__exForm; var n=document.getElementById('exFormName'); var name=((n?n.value:f.name)||'').trim();
  if(!name){ ALSAlert('Give the exercise a name.','warn'); return; }
  f.onSave({ name:name, muscle:f.muscle||'Other', kind:(f.muscle==='Cardio'?'time':f.kind) });
};

/* ── Exercise Library manager (edit / rename / retype / delete any exercise) ── */
window.openLibrary=function(){
  var list=exercises().slice().sort(function(a,b){ if((a.muscle||'')!==(b.muscle||'')) return (a.muscle||'')<(b.muscle||'')?-1:1; return (a.name||'')<(b.name||'')?-1:1; });
  var rows = list.length ? list.map(function(e){
    return '<div class="w-ex" style="align-items:center;transition:none;"><div class="w-ex-dot" style="background:rgba(var(--au-glow-rgb),.15);color:rgb(var(--au-glow-rgb));">'+esc((e.muscle||'?').slice(0,2).toUpperCase())+'</div>'+
      '<div class="w-ex-main"><div class="w-ex-name">'+esc(e.name)+(isTime(e)?' <span style="color:var(--au-faint);font-size:11px;font-weight:400;">· time</span>':'')+'</div><div class="w-ex-muscle">'+esc(e.muscle||'Other')+'</div></div>'+
      '<div class="w-ex-tools"><button type="button" class="w-itool" onclick="libEdit(\''+e.id+'\')" aria-label="Edit">✎</button><button type="button" class="w-itool del" onclick="libDelete(\''+e.id+'\')" aria-label="Delete">✕</button></div></div>';
  }).join('') : '<div class="w-empty" style="font-size:13px;">No exercises yet.</div>';
  var html='<div class="w-sheet-grip"></div>'+
    '<div class="w-sheet-hd"><div class="w-sheet-title">Exercise library</div><button class="w-x" onclick="closeSheet()">✕</button></div>'+
    '<div class="w-sheet-sub">'+list.length+' exercise'+(list.length===1?'':'s')+' · edit or remove any</div>'+
    rows+
    '<button class="w-btn-ghost" style="margin-top:10px;" onclick="libNew()">&#65291; New exercise</button>';
  openSheet(html);
};
window.libNew=function(){ exForm({ title:'New exercise', confirm:'Create', onSave:function(v){ var ex={id:uid(),name:v.name,muscle:v.muscle||'Other',kind:v.kind}; var l=exercises(); l.push(ex); save('po_exercises',l); openLibrary(); } }); };
window.libEdit=function(id){ var ex=exById(id); exForm({ title:'Edit exercise', confirm:'Save', name:ex.name, muscle:ex.muscle||'Other', kind:isTime(ex)?'time':'weight',
  onSave:function(v){ var l=exercises(); var i=l.findIndex(function(x){return x.id===id;}); if(i>=0){ l[i].name=v.name; l[i].muscle=v.muscle; l[i].kind=v.kind; save('po_exercises',l); } openLibrary(); } }); };
window.libDelete=function(id){
  var usedHist=workouts().some(function(w){return (w.entries||[]).some(function(en){return en.exId===id;});});
  var usedTpl=templates().some(function(t){return (t.items||[]).some(function(it){return it.exId===id;});});
  var a=getActive(); var usedActive=!!(a&&(a.entries||[]).some(function(en){return en.exId===id;}));
  var msg=(usedHist||usedTpl||usedActive)?'It’s used in your templates/history. Past workouts keep their record; it’ll be removed from templates and the library.':'';
  ALSConfirm({title:'Delete exercise?',message:msg,confirmText:'Delete',danger:true}).then(function(ok){ if(!ok)return;
    save('po_exercises', exercises().filter(function(x){return x.id!==id;}));
    var tl=templates(),ch=false; tl.forEach(function(t){ var nn=(t.items||[]).filter(function(it){return it.exId!==id;}); if(nn.length!==(t.items||[]).length){ t.items=nn; ch=true; } }); if(ch) save('po_templates',tl);
    openLibrary();
  });
};

/* ── Edit a PAST workout (full editor: name, date, sets, add/remove, notes) ── */
window.editWorkout=function(id){ var w=workouts().find(function(x){return x.id===id;}); if(!w)return; window.__editWk=JSON.parse(JSON.stringify(w)); renderWkEditor(); };
function renderWkEditor(){
  var w=window.__editWk; if(!w)return;
  var html='<div class="w-sheet-grip"></div>'+
    '<div class="w-sheet-hd"><div class="w-sheet-title">Edit workout</div><button class="w-x" onclick="closeSheet()">✕</button></div>'+
    '<input class="w-search" placeholder="Workout name" value="'+esc(w.name||'')+'" oninput="window.__editWk.name=this.value">'+
    '<div class="w-set-head" style="grid-template-columns:1fr;margin:8px 0 4px;">DATE</div>'+
    '<input class="w-search" type="date" value="'+esc(w.date||'')+'" onchange="window.__editWk.date=this.value">';
  (w.entries||[]).forEach(function(en,ei){
    var tm=(en.kind==='time')||isTime(en);
    html+='<div class="w-card" style="margin-top:12px;">'+
      '<div class="w-ex" style="border:none;padding:0 0 6px;transition:none;"><div class="w-ex-main"><div class="w-ex-name">'+esc(en.name)+'</div><div class="w-ex-muscle">'+esc(en.muscle||'')+(en.perSide?' &middot; per side':'')+'</div></div>'+
      '<div class="w-ex-tools"><button type="button" class="w-itool del" onclick="wkRemoveEx('+ei+')" aria-label="Remove">✕</button></div></div>';
    if(tm){
      html+='<div class="w-set-head" style="grid-template-columns:38px 1fr 44px;"><span>SET</span><span>TIME · MIN:SEC</span><span></span></div>';
      en.sets.forEach(function(s,si){ html+='<div class="w-set" style="grid-template-columns:38px 1fr 44px;margin-bottom:6px;"><span class="w-set-num">'+(si+1)+'</span>'+
        '<input class="w-in" type="text" inputmode="text" placeholder="0:00" value="'+(s.secs?fmtMMSS(s.secs):'')+'" onchange="wkSet('+ei+','+si+',\'secs\',this.value)">'+
        '<button type="button" class="w-itool del" onclick="wkRemoveSet('+ei+','+si+')" aria-label="Delete set">✕</button></div>'; });
    } else {
      html+='<div class="w-set-head"><span>SET</span><span>'+(en.perSide?'KG/SIDE':'KG')+'</span><span>REPS</span><span></span></div>';
      en.sets.forEach(function(s,si){ html+='<div class="w-set" style="margin-bottom:6px;"><span class="w-set-num">'+(si+1)+'</span>'+
        '<input class="w-in" type="text" inputmode="decimal" placeholder="0" value="'+(s.kg!=null&&s.kg!==''?s.kg:'')+'" oninput="wkSet('+ei+','+si+',\'kg\',this.value)">'+
        '<input class="w-in" type="text" inputmode="numeric" placeholder="0" value="'+(s.reps!=null&&s.reps!==''?s.reps:'')+'" oninput="wkSet('+ei+','+si+',\'reps\',this.value)">'+
        '<button type="button" class="w-itool del" onclick="wkRemoveSet('+ei+','+si+')" aria-label="Delete set">✕</button></div>'; });
    }
    html+='<button type="button" class="w-addset" onclick="wkAddSet('+ei+')">&#65291; Add set</button>'+
      '<textarea class="w-note" rows="2" placeholder="Note…" oninput="window.__editWk.entries['+ei+'].note=this.value">'+esc(en.note||'')+'</textarea>';
    html+='</div>';
  });
  html+='<button type="button" class="w-btn-ghost" style="margin-top:8px;" onclick="pickExercise(wkAddEx)">&#65291; Add exercise</button>'+
    '<button class="w-btn" style="margin-top:16px;" onclick="saveWkEdit()">Save changes</button>'+
    '<button class="w-btn-ghost" style="margin-top:8px;color:var(--au-rose);border-color:rgba(255,107,139,.3);" onclick="deleteWkEdit()">Delete workout</button>';
  openSheet(html);
}
window.wkSet=function(ei,si,f,val){ var w=window.__editWk; if(!w||!w.entries[ei])return; var s=w.entries[ei].sets[si]; if(!s)return;
  if(f==='kg') s.kg=(val===''?0:numVal(val)); else if(f==='reps') s.reps=(val===''?0:(parseInt(val,10)||0)); else if(f==='secs') s.secs=parseTime(val); };
window.wkAddSet=function(ei){ var w=window.__editWk; var en=w.entries[ei]; var last=en.sets[en.sets.length-1];
  if((en.kind==='time')||isTime(en)) en.sets.push({secs:last?last.secs:0,done:true}); else en.sets.push({kg:last?last.kg:0,reps:last?last.reps:0,done:true}); renderWkEditor(); };
window.wkRemoveSet=function(ei,si){ var w=window.__editWk; w.entries[ei].sets.splice(si,1); if(!w.entries[ei].sets.length) w.entries.splice(ei,1); renderWkEditor(); };
window.wkRemoveEx=function(ei){ window.__editWk.entries.splice(ei,1); renderWkEditor(); };
window.wkAddEx=function(ex){ var w=window.__editWk; var tm=isTime(ex); w.entries.push({exId:ex.id,name:ex.name,muscle:ex.muscle,kind:tm?'time':'weight',perSide:tm?false:exPerSide(ex.id),note:exNote(ex.id),sets:[ tm?{secs:0,done:true}:{kg:0,reps:0,done:true} ]}); closeSheet(); renderWkEditor(); };
window.saveWkEdit=function(){ var w=window.__editWk; if(!w)return;
  var volume=0, prs=[];
  (w.entries||[]).forEach(function(en){
    if((en.kind==='time')||isTime(en)) return;
    var mult=en.perSide?2:1, thisBest=0;
    (en.sets||[]).forEach(function(s){ if(isWarm(s)) return; volume+=(+s.kg||0)*(+s.reps||0)*mult; var v=e1rm(s.kg,s.reps); if(v>thisBest)thisBest=v; });
    var prev=bestE1rmFor(en.exId, w.id);
    if(thisBest>prev && prev>0) prs.push(en.exId);
  });
  w.volume=Math.round(volume); w.prs=prs;
  var list=workouts(); var i=list.findIndex(function(x){return x.id===w.id;});
  if(i>=0){ list[i]=w; list.sort(function(a,b){ return (a.date||'')<(b.date||'')?1:-1; }); save('po_workouts',list); }
  closeSheet(); render();
};
window.deleteWkEdit=function(){ var w=window.__editWk; if(!w)return; ALSConfirm({title:'Delete workout?',message:'This is permanent.',confirmText:'Delete',danger:true}).then(function(ok){ if(!ok)return; save('po_workouts', workouts().filter(function(x){return x.id!==w.id;})); closeSheet(); render(); }); };

/* Bulletproof tap handling via delegation (iOS-safe — one listener on document) */
document.addEventListener('click', function(ev){
  var t = ev.target && ev.target.closest ? ev.target.closest('[data-act]') : null;
  if(!t) return;
  var act = t.getAttribute('data-act');
  if(act==='rest-config')      openRestModal();
  else if(act==='rest-pick')   applyRest(t.getAttribute('data-val'));
  else if(act==='rest-set')    restSetFromInputs();
  else if(act==='rest-close'){ if(Date.now()-restOpenedAt>=450) closeRestModal(); }
  else if(act==='rest-adj')    window.restAdjust(t.getAttribute('data-val'));
  else if(act==='rest-skip')   removeRest();
  else if(act==='notif-enable'){ if(window.ALSPush){ window.ALSPush.enable().then(function(){ var nb=document.getElementById('wNotifEnable'); if(nb) nb.style.display='none'; }); } else { requestNotify(); var nb2=document.getElementById('wNotifEnable'); if(nb2) nb2.style.display='none'; } }
  else if(act==='go')          go(t.getAttribute('data-val'));
  else if(act==='ex-progress') exerciseProgress(t.getAttribute('data-val'));
  else if(act==='close-sheet') closeSheet();
});
})();
</script>

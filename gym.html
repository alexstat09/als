<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Fitness · ALS</title>
<meta name="theme-color" content="#050507">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="apple-touch-icon.png">
<link rel="stylesheet" href="aurora.css">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="topbar.js" defer></script>
<style>
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
  html,body{min-height:100%;}
  body{padding:0 0 calc(86px + env(safe-area-inset-bottom));}
  .w-wrap{max-width:600px;margin:0 auto;padding:22px 16px;}

  /* hero */
  .w-hero{display:flex;align-items:flex-start;justify-content:space-between;gap:14px;margin-bottom:16px;}
  .w-hero-eyebrow{margin-bottom:10px;}
  .w-hero-title{font-family:var(--au-serif);font-style:italic;font-weight:400;color:var(--au-ivory);font-size:clamp(28px,7vw,40px);line-height:1.02;letter-spacing:-.01em;}
  .w-hero .nova{flex-shrink:0;width:64px;height:64px;}

  /* segmented nav */
  .w-seg{display:flex;gap:6px;background:rgba(255,255,255,.04);border:1px solid var(--au-line);border-radius:14px;padding:4px;margin-bottom:18px;}
  .w-seg button{flex:1;padding:9px;border:none;background:none;border-radius:10px;font-family:var(--au-mono);font-size:11px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--au-faint);cursor:pointer;transition:background .2s,color .2s;}
  .w-seg button.on{background:rgba(var(--au-glow-rgb),.16);color:var(--au-ivory);}

  /* buttons */
  .w-btn{display:inline-flex;align-items:center;justify-content:center;gap:8px;width:100%;border:none;cursor:pointer;font-family:var(--au-sans);font-size:15px;font-weight:700;padding:15px;border-radius:14px;color:#04130D;background:var(--au-gradient);background-size:160% 160%;box-shadow:0 6px 24px rgba(var(--au-glow-rgb),.28);transition:transform .15s,box-shadow .25s;-webkit-tap-highlight-color:transparent;}
  .w-btn:active{transform:translateY(1px);}
  .w-btn-ghost{display:inline-flex;align-items:center;justify-content:center;gap:7px;width:100%;cursor:pointer;font-family:var(--au-mono);font-size:11px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;padding:12px;border-radius:12px;color:var(--au-dim);background:rgba(255,255,255,.04);border:1px solid var(--au-line);-webkit-tap-highlight-color:transparent;}
  .w-btn-ghost:active{background:rgba(255,255,255,.08);}

  /* section label */
  .w-folder{display:flex;align-items:center;gap:10px;margin:22px 0 10px;}
  .w-folder-name{font-family:var(--au-serif);font-style:italic;font-size:19px;color:var(--au-ivory);}
  .w-folder-count{font-family:var(--au-mono);font-size:10px;color:var(--au-faint);}
  .w-folder-line{flex:1;height:1px;background:linear-gradient(90deg,rgba(var(--au-glow-rgb),.25),transparent);}

  /* template grid */
  .w-tpls{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
  .w-tpl{position:relative;text-align:left;background:var(--au-glass);border:1px solid var(--au-line);border-radius:16px;padding:14px;cursor:pointer;overflow:hidden;transition:border-color .2s,transform .2s;-webkit-tap-highlight-color:transparent;}
  .w-tpl::before{content:'';position:absolute;top:0;left:10%;right:10%;height:1px;background:linear-gradient(90deg,transparent,rgba(var(--au-glow-rgb),.5),transparent);}
  .w-tpl:active{transform:scale(.98);border-color:rgba(var(--au-glow-rgb),.3);}
  .w-tpl-name{font-weight:700;font-size:15px;color:var(--au-ivory);margin-bottom:6px;line-height:1.2;}
  .w-tpl-ex{font-size:11.5px;color:var(--au-faint);line-height:1.45;min-height:48px;}
  .w-tpl-meta{font-family:var(--au-mono);font-size:9px;letter-spacing:.05em;color:var(--au-faint);margin-top:9px;text-transform:uppercase;}

  .w-empty{font-family:var(--au-serif);font-style:italic;color:var(--au-dim);text-align:center;padding:26px 0;font-size:16px;}

  /* sheet (template detail / picker / editor) */
  .w-sheet-bg{position:fixed;inset:0;z-index:60;background:rgba(3,4,6,.6);backdrop-filter:blur(5px);-webkit-backdrop-filter:blur(5px);opacity:0;pointer-events:none;transition:opacity .25s;}
  .w-sheet-bg.on{opacity:1;pointer-events:auto;}
  .w-sheet{position:fixed;left:0;right:0;bottom:0;z-index:61;max-width:600px;margin:0 auto;max-height:88vh;overflow-y:auto;
    background:#0a0c10;border:1px solid var(--au-line);border-bottom:none;border-radius:22px 22px 0 0;
    padding:18px 18px calc(24px + env(safe-area-inset-bottom));transform:translateY(102%);transition:transform .32s cubic-bezier(.34,1.4,.5,1);-webkit-overflow-scrolling:touch;}
  .w-sheet.on{transform:none;}
  .w-sheet-grip{width:38px;height:4px;border-radius:2px;background:rgba(255,255,255,.18);margin:0 auto 14px;}
  .w-sheet-hd{display:flex;align-items:center;justify-content:space-between;gap:10px;margin-bottom:4px;}
  .w-sheet-title{font-family:var(--au-serif);font-style:italic;font-size:24px;color:var(--au-ivory);line-height:1.1;}
  .w-sheet-sub{font-family:var(--au-mono);font-size:10px;letter-spacing:.06em;text-transform:uppercase;color:var(--au-faint);margin:2px 0 16px;}
  .w-x{background:rgba(255,255,255,.06);border:none;color:var(--au-dim);width:34px;height:34px;border-radius:50%;font-size:18px;cursor:pointer;flex-shrink:0;}

  /* exercise row (detail/active) */
  .w-ex{display:flex;align-items:flex-start;gap:12px;padding:12px 0;border-top:1px solid var(--au-line);}
  .w-ex:first-of-type{border-top:none;}
  .w-ex-dot{width:34px;height:34px;border-radius:10px;flex-shrink:0;display:grid;place-items:center;font-family:var(--au-mono);font-size:10px;font-weight:700;color:#04130D;background:rgb(var(--au-glow-rgb));}
  .w-ex-main{flex:1;min-width:0;}
  .w-ex-name{font-weight:700;font-size:14.5px;color:var(--au-ivory);line-height:1.25;}
  .w-ex-muscle{font-family:var(--au-mono);font-size:9.5px;letter-spacing:.08em;text-transform:uppercase;color:var(--au-faint);margin-top:3px;}
  .w-ex-last{font-size:11px;color:var(--au-dim);margin-top:4px;font-style:italic;font-family:var(--au-serif);}

  /* active set rows */
  .w-set-head,.w-set{display:grid;grid-template-columns:38px 1fr 1fr 44px;gap:8px;align-items:center;}
  .w-set-head{font-family:var(--au-mono);font-size:8.5px;letter-spacing:.1em;text-transform:uppercase;color:var(--au-faint);margin:10px 0 6px;}
  .w-set{margin-bottom:7px;}
  .w-set-num{font-family:var(--au-mono);font-size:13px;font-weight:700;color:var(--au-faint);text-align:center;}
  .w-set.done .w-set-num{color:rgb(var(--au-glow-rgb));}
  .w-in{width:100%;background:rgba(255,255,255,.05);border:1px solid var(--au-line);border-radius:9px;padding:9px 6px;color:var(--au-ivory);font-family:var(--au-mono);font-size:15px;font-weight:700;text-align:center;outline:none;-webkit-appearance:none;}
  .w-in:focus{border-color:rgba(var(--au-glow-rgb),.55);}
  .w-in::placeholder{color:rgba(244,241,234,.25);}
  .w-set.done .w-in{border-color:rgba(var(--au-glow-rgb),.3);background:rgba(var(--au-glow-rgb),.07);}
  .w-check{width:40px;height:38px;border-radius:10px;border:1px solid var(--au-line);background:rgba(255,255,255,.04);color:var(--au-faint);font-size:16px;cursor:pointer;-webkit-tap-highlight-color:transparent;}
  .w-check.on{background:rgb(var(--au-glow-rgb));color:#04130D;border-color:transparent;box-shadow:0 0 14px rgba(var(--au-glow-rgb),.5);}
  .w-addset{font-family:var(--au-mono);font-size:10px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:rgb(var(--au-glow-rgb));background:rgba(var(--au-glow-rgb),.08);border:1px solid rgba(var(--au-glow-rgb),.25);border-radius:8px;padding:8px;width:100%;cursor:pointer;margin-top:4px;-webkit-tap-highlight-color:transparent;}

  /* active header */
  .w-active-bar{position:sticky;top:0;z-index:5;background:rgba(7,8,11,.86);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);border-bottom:1px solid var(--au-line);margin:-22px -16px 16px;padding:calc(14px + env(safe-area-inset-top)) 16px 12px;display:flex;align-items:center;justify-content:space-between;gap:10px;}
  .w-timer{font-family:var(--au-mono);font-size:22px;font-weight:700;color:var(--au-ivory);letter-spacing:-.02em;}
  .w-timer-lbl{font-family:var(--au-mono);font-size:8px;letter-spacing:.12em;text-transform:uppercase;color:var(--au-faint);}
  .w-finish{font-family:var(--au-sans);font-weight:700;font-size:13px;color:#04130D;background:var(--au-gradient);border:none;border-radius:999px;padding:9px 18px;cursor:pointer;}
  .w-cancel{font-family:var(--au-mono);font-size:10px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:var(--au-rose);background:rgba(255,107,139,.1);border:1px solid rgba(255,107,139,.3);border-radius:999px;padding:8px 13px;cursor:pointer;-webkit-tap-highlight-color:transparent;}

  .w-card{background:var(--au-glass);border:1px solid var(--au-line);border-radius:16px;padding:14px 16px;margin-bottom:12px;position:relative;overflow:hidden;}
  .w-card::before{content:'';position:absolute;top:0;left:8%;right:8%;height:1px;background:linear-gradient(90deg,transparent,rgba(var(--au-glow-rgb),.4),transparent);}

  /* rest timer bar */
  /* inline rest timer — appears right under the set you just finished */
  .w-rest-inline{display:flex;align-items:center;gap:10px;margin-top:11px;
    background:rgba(var(--au-glow-rgb),.1);border:1px solid rgba(var(--au-glow-rgb),.45);border-radius:12px;padding:11px 14px;
    box-shadow:0 0 26px rgba(var(--au-glow-rgb),.2);animation:wRestIn .25s ease both;}
  @keyframes wRestIn{from{opacity:0;transform:translateY(-6px)}to{opacity:1;transform:none}}
  .w-rest-inline.done{background:rgba(52,226,176,.18);border-color:rgba(52,226,176,.75);box-shadow:0 0 30px rgba(52,226,176,.35);}
  .w-rest-time{font-family:var(--au-mono);font-size:22px;font-weight:700;color:rgb(var(--au-glow-rgb));min-width:58px;letter-spacing:-.02em;}
  .w-rest-lbl{font-family:var(--au-mono);font-size:9px;letter-spacing:.1em;text-transform:uppercase;color:var(--au-faint);flex:1;}
  .w-rest-btn{font-family:var(--au-mono);font-size:11px;font-weight:700;color:var(--au-dim);background:rgba(255,255,255,.06);border:1px solid var(--au-line);border-radius:8px;padding:7px 11px;cursor:pointer;-webkit-tap-highlight-color:transparent;}

  /* rest config */
  .w-restcfg{display:flex;align-items:center;justify-content:center;gap:7px;width:100%;margin-bottom:14px;font-family:var(--au-mono);font-size:11px;letter-spacing:.04em;color:var(--au-faint);background:rgba(255,255,255,.04);border:1px solid var(--au-line);border-radius:12px;padding:11px;cursor:pointer;-webkit-tap-highlight-color:transparent;}
  .w-restcfg b{color:rgb(var(--au-glow-rgb));font-size:13px;}
  .w-presets{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin:10px 0 4px;}
  .w-preset{padding:15px 6px;border-radius:12px;border:1px solid var(--au-line);background:rgba(255,255,255,.04);color:var(--au-ivory);font-family:var(--au-mono);font-size:16px;font-weight:700;cursor:pointer;-webkit-tap-highlight-color:transparent;}
  .w-preset.on{background:rgb(var(--au-glow-rgb));color:#04130D;border-color:transparent;box-shadow:0 0 16px rgba(var(--au-glow-rgb),.4);}

  /* compact rest popup */
  .w-modal-bg{position:fixed;inset:0;z-index:70;background:rgba(3,4,6,.55);opacity:0;pointer-events:none;transition:opacity .18s;}
  .w-modal-bg.on{opacity:1;pointer-events:auto;}
  .w-modal{position:fixed;z-index:71;left:50%;top:40%;transform:translate(-50%,-50%) scale(.92);width:min(320px,86vw);
    background:#0c0e13;border:1px solid rgba(var(--au-glow-rgb),.32);border-radius:20px;padding:22px 20px;
    box-shadow:0 24px 60px rgba(0,0,0,.6),0 0 40px rgba(var(--au-glow-rgb),.12);
    opacity:0;pointer-events:none;transition:opacity .18s,transform .26s cubic-bezier(.34,1.5,.5,1);text-align:center;}
  .w-modal.on{opacity:1;pointer-events:auto;transform:translate(-50%,-50%) scale(1);}
  .w-modal-title{font-family:var(--au-serif);font-style:italic;font-size:23px;color:var(--au-ivory);}
  .w-modal-sub{font-family:var(--au-mono);font-size:9px;letter-spacing:.1em;text-transform:uppercase;color:var(--au-faint);margin:3px 0 18px;}
  .w-modal-time{display:flex;align-items:flex-start;justify-content:center;gap:8px;margin-bottom:16px;}
  .w-modal-col{display:flex;flex-direction:column;align-items:center;gap:5px;}
  .w-modal-in{width:84px;background:rgba(255,255,255,.05);border:1px solid var(--au-line);border-radius:14px;padding:14px 4px;color:var(--au-ivory);font-family:var(--au-mono);font-size:38px;font-weight:700;text-align:center;outline:none;-webkit-appearance:none;}
  .w-modal-in:focus{border-color:rgba(var(--au-glow-rgb),.6);background:rgba(var(--au-glow-rgb),.06);}
  .w-modal-unit{font-family:var(--au-mono);font-size:8px;letter-spacing:.12em;text-transform:uppercase;color:var(--au-faint);}
  .w-modal-colon{font-family:var(--au-mono);font-size:34px;font-weight:700;color:var(--au-faint);line-height:1.6;}
  .w-modal-quick{display:flex;gap:6px;justify-content:center;margin-bottom:18px;flex-wrap:wrap;}
  .w-modal-chip{font-family:var(--au-mono);font-size:11px;font-weight:700;color:var(--au-dim);background:rgba(255,255,255,.05);border:1px solid var(--au-line);border-radius:999px;padding:7px 12px;cursor:pointer;-webkit-tap-highlight-color:transparent;}
  .w-modal-chip:active{background:rgba(var(--au-glow-rgb),.2);color:var(--au-ivory);}

  /* progression targets */
  .w-target{font-family:var(--au-serif);font-style:italic;font-size:12.5px;color:var(--au-dim);margin:2px 0 6px;line-height:1.35;}
  .w-target b{color:rgb(var(--au-glow-rgb));font-style:normal;font-family:var(--au-mono);font-size:11px;}
  .w-set.beat .w-check{background:var(--au-amber)!important;color:#04130D!important;border-color:transparent!important;box-shadow:0 0 16px rgba(242,192,99,.6)!important;}
  /* stats / progress */
  .w-stat-card{display:flex;align-items:center;gap:12px;background:var(--au-glass);border:1px solid var(--au-line);border-radius:14px;padding:13px 15px;margin-bottom:9px;cursor:pointer;width:100%;text-align:left;-webkit-tap-highlight-color:transparent;}
  .w-stat-card:active{border-color:rgba(var(--au-glow-rgb),.3);}
  .w-stat-main{flex:1;min-width:0;}
  .w-stat-name{font-weight:700;font-size:14px;color:var(--au-ivory);line-height:1.2;}
  .w-stat-pr{font-family:var(--au-mono);font-size:10px;color:var(--au-faint);margin-top:3px;letter-spacing:.03em;}
  .w-stat-pr b{color:var(--au-amber);}
  .w-spark{display:flex;align-items:flex-end;gap:2px;height:30px;width:72px;flex-shrink:0;}
  .w-spark-b{flex:1;background:rgba(var(--au-glow-rgb),.3);border-radius:2px 2px 0 0;min-height:3px;}
  .w-spark-b.last{background:rgb(var(--au-glow-rgb));box-shadow:0 0 6px rgba(var(--au-glow-rgb),.6);}
  .w-prgrid{display:flex;gap:16px;margin:6px 0 14px;}
  .w-prstat{font-family:var(--au-mono);font-size:10px;color:var(--au-faint);text-transform:uppercase;letter-spacing:.05em;}
  .w-prstat b{display:block;color:var(--au-ivory);font-size:19px;letter-spacing:-.01em;margin-bottom:2px;}
  .w-chartcap{display:flex;justify-content:space-between;font-family:var(--au-mono);font-size:9px;letter-spacing:.05em;color:var(--au-faint);text-transform:uppercase;margin-top:6px;}

  /* history */
  .w-hist{background:var(--au-glass);border:1px solid var(--au-line);border-radius:16px;padding:15px 16px;margin-bottom:11px;}
  .w-hist-top{display:flex;align-items:baseline;justify-content:space-between;gap:8px;}
  .w-hist-name{font-family:var(--au-serif);font-style:italic;font-size:19px;color:var(--au-ivory);}
  .w-hist-date{font-family:var(--au-mono);font-size:10px;color:var(--au-faint);text-transform:uppercase;letter-spacing:.05em;}
  .w-hist-stats{display:flex;gap:16px;margin:9px 0 10px;}
  .w-hist-stat{font-family:var(--au-mono);font-size:11px;color:var(--au-dim);}
  .w-hist-stat b{color:var(--au-ivory);}
  .w-hist-stat.pr b{color:var(--au-amber);}
  .w-hist-row{display:flex;justify-content:space-between;font-size:12.5px;color:var(--au-dim);padding:3px 0;}
  .w-hist-row .nm{color:var(--au-ivory);}
  .w-hist-row .bs{font-family:var(--au-mono);color:var(--au-faint);}

  /* picker */
  .w-search{width:100%;background:rgba(255,255,255,.05);border:1px solid var(--au-line);border-radius:12px;padding:12px 14px;color:var(--au-ivory);font-family:var(--au-sans);font-size:15px;outline:none;margin-bottom:6px;}
  .w-search:focus{border-color:rgba(var(--au-glow-rgb),.5);}
  .w-pick{display:flex;align-items:center;gap:12px;padding:12px 4px;border:none;border-top:1px solid var(--au-line);background:none;width:100%;text-align:left;font:inherit;cursor:pointer;-webkit-tap-highlight-color:transparent;}
  .w-pick-name{flex:1;font-size:14px;color:var(--au-ivory);font-weight:600;}
  .w-pick-muscle{font-family:var(--au-mono);font-size:9px;letter-spacing:.06em;text-transform:uppercase;color:var(--au-faint);}
  .w-mini{font-family:var(--au-mono);font-size:10px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:rgb(var(--au-glow-rgb));background:none;border:none;cursor:pointer;padding:4px;}
  .w-del{color:var(--au-rose)!important;}
  .w-row-actions{display:flex;gap:10px;margin-top:6px;align-items:center;}
  .w-stepper{display:inline-flex;align-items:center;border:1px solid var(--au-line);border-radius:9px;overflow:hidden;}
  .w-stepper button{width:30px;height:30px;background:rgba(255,255,255,.04);border:none;color:var(--au-ivory);font-size:16px;cursor:pointer;}
  .w-stepper span{min-width:34px;text-align:center;font-family:var(--au-mono);font-size:13px;font-weight:700;color:var(--au-ivory);}
</style>
</head>
<body data-page="fitness" class="au-bg au-mood-hot" id="root">

<div class="w-wrap" id="wWrap"></div>

<div class="w-sheet-bg" id="wSheetBg" onclick="closeSheet()"></div>
<div class="w-sheet" id="wSheet"></div>

<div class="w-modal-bg" id="wModalBg" data-act="rest-close"></div>
<div class="w-modal" id="wModal">
  <div class="w-modal-title">Rest between sets</div>
  <div class="w-modal-sub">Set your own time</div>
  <div class="w-modal-time">
    <div class="w-modal-col"><input id="wRmMin" class="w-modal-in" type="number" inputmode="numeric" min="0" max="30" value="3"><span class="w-modal-unit">min</span></div>
    <span class="w-modal-colon">:</span>
    <div class="w-modal-col"><input id="wRmSec" class="w-modal-in" type="number" inputmode="numeric" min="0" max="59" value="00"><span class="w-modal-unit">sec</span></div>
  </div>
  <div class="w-modal-quick">
    <button type="button" class="w-modal-chip" data-act="rest-pick" data-val="60">1:00</button>
    <button type="button" class="w-modal-chip" data-act="rest-pick" data-val="90">1:30</button>
    <button type="button" class="w-modal-chip" data-act="rest-pick" data-val="120">2:00</button>
    <button type="button" class="w-modal-chip" data-act="rest-pick" data-val="180">3:00</button>
    <button type="button" class="w-modal-chip" data-act="rest-pick" data-val="240">4:00</button>
  </div>
  <button type="button" class="w-btn" data-act="rest-set">Set</button>
</div>

<script src="pocoach-sync.js?v=2"></script>
<script src="nova.js" defer></script>
<script>
(function(){
'use strict';
function ls(k,d){ try{ var v=JSON.parse(localStorage.getItem(k)); return v==null?d:v; }catch(e){ return d; } }
function save(k,v){ try{ localStorage.setItem(k,JSON.stringify(v)); }catch(e){} }
function uid(){ return Date.now().toString(36)+Math.random().toString(36).slice(2,7); }
function pad(n){ return String(n).padStart(2,'0'); }
function dateKey(d){ d=d||new Date(); return d.getFullYear()+'-'+pad(d.getMonth()+1)+'-'+pad(d.getDate()); }
function esc(s){ return String(s==null?'':s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function fmtDur(sec){ sec=Math.max(0,Math.round(sec)); var h=Math.floor(sec/3600),m=Math.floor((sec%3600)/60),s=sec%60; return h?h+':'+pad(m)+':'+pad(s):m+':'+pad(s); }
function relDate(dk){ var d=new Date(dk+'T00:00:00'); var diff=Math.round((new Date()-d)/86400000); if(diff<=0)return'Today'; if(diff===1)return'Yesterday'; if(diff<7)return diff+' days ago'; return d.toLocaleDateString([], {day:'numeric',month:'short',year:'numeric'}); }

function exercises(){ return ls('po_exercises',[]); }
function exById(id){ return exercises().find(function(e){return e.id===id;}) || {id:id,name:id,muscle:''}; }

function setActive(a){ save('po_active', a); }

function e1rm(w,r){ return (+w||0)*(1+(+r||0)/30); }
function lastEntryFor(exId){
  var ws=workouts().slice().sort(function(a,b){return (b.startedAt||'')<(a.startedAt||'')?-1:1;});
  for(var i=0;i<ws.length;i++){ var en=(ws[i].entries||[]).find(function(e){return e.exId===exId;}); if(en && en.sets && en.sets.length) return en; }
  return null;
}
function bestE1rmFor(exId, excludeWorkoutId){
  var best=0;
  workouts().forEach(function(w){ if(w.id===excludeWorkoutId)return; (w.entries||[]).forEach(function(en){ if(en.exId!==exId)return; (en.sets||[]).forEach(function(s){ if(s.done!==false){ var v=e1rm(s.kg,s.reps); if(v>best)best=v; } }); }); });
  return best;
}
function bestSetTxt(entry){
  var best=null; (entry.sets||[]).forEach(function(s){ if(s.done!==false && (!best || (+s.kg||0)>(+best.kg||0))) best=s; });
  if(!best) return '—';
  return (best.kg||0)+'kg × '+(best.reps||0);
}

  var last=lastDoneForTpl(t.id);

    '<div class="w-tpl-name">'+esc(t.name)+'</div>'+

    '<div class="w-tpl-meta">'+(last?'⟳ '+relDate(last):t.items.length+' exercises')+'</div></button>';

  var ws=workouts().filter(function(w){return w.templateId===id;}).sort(function(a,b){return (b.startedAt||'')<(a.startedAt||'')?-1:1;});
  return ws[0]?ws[0].date:null;
}

/* ACTIVE WORKOUT */
function startEmpty(){ setActive({ id:uid(), name:'Quick Workout', templateId:null, startedAt:new Date().toISOString(), entries:[] }); go('active'); }
function startFromTpl(id){
  var t=templates().find(function(x){return x.id===id;}); if(!t)return;
  var entries=t.items.map(function(it){
    var le=lastEntryFor(it.exId); var sets=[];
    for(var i=0;i<it.sets;i++){ var prev = le && le.sets[i]; sets.push({ kg: prev?prev.kg:'', reps: prev?prev.reps:'', done:false }); }
    var ex=exById(it.exId);
    return { exId:it.exId, name:ex.name, muscle:ex.muscle, sets:sets };
  });
  setActive({ id:uid(), name:t.name, templateId:id, startedAt:new Date().toISOString(), entries:entries });
  closeSheet(); go('active');
}
function resumeActive(){ go('active'); }

var timerInt=null;
function renderActive(){
  view='active';
  var a=getActive(); if(!a){ go('home'); return; }
  var html='<div class="w-active-bar"><div><div class="w-timer" id="wTimer">0:00</div><div class="w-timer-lbl">'+esc(a.name)+'</div></div>'+
    '<div style="display:flex;align-items:center;gap:10px;"><button type="button" class="w-cancel" onclick="cancelActive()">✕ Discard</button><button class="w-finish" onclick="finishActive()">Finish</button></div></div>';
  html+='<button type="button" class="w-restcfg" data-act="rest-config">&#9201; Rest between sets &middot; <b>'+fmtDur(restDefault())+'</b> &middot; tap to change</button>';
  if(!a.entries.length){ html+='<div class="w-empty">No exercises yet.</div>'; }
  a.entries.forEach(function(en,ei){
    var tgt=targetFor(en.exId); var allTime=bestE1rmFor(en.exId,a.id);
    var doneMax=0; en.sets.forEach(function(s){ if(s.done){ var v=e1rm(s.kg,s.reps); if(v>doneMax)doneMax=v; } });
    html+='<div class="w-card"><div class="w-ex" style="border:none;padding:0 0 4px;">'+
      '<div class="w-ex-dot" style="background:rgba(var(--au-glow-rgb),.15);color:rgb(var(--au-glow-rgb));">'+esc((en.muscle||'?').slice(0,2).toUpperCase())+'</div>'+
      '<div class="w-ex-main"><div class="w-ex-name">'+esc(en.name)+'</div><div class="w-ex-muscle">'+esc(en.muscle)+'</div></div>'+
      '<button class="w-mini w-del" onclick="removeEx('+ei+')">remove</button></div>';
    if(tgt) html+='<div class="w-target">Last best <b>'+tgt.w+'kg × '+tgt.r+'</b> &middot; beat it: '+esc(tgt.suggest)+'</div>';
    else    html+='<div class="w-target">First time logged &middot; give it a strong set &mdash; this becomes your baseline to beat. &#9733;</div>';
    html+='<div class="w-set-head"><span>SET</span><span>KG</span><span>REPS</span><span></span></div>';
    en.sets.forEach(function(s,si){
      var v=e1rm(s.kg,s.reps);
      var beat = s.done && v>0 && (allTime>0 ? v>allTime : (v>=doneMax));
      html+='<div class="w-set'+(s.done?' done':'')+(beat?' beat':'')+'">'+
        '<span class="w-set-num">'+(si+1)+'</span>'+
        '<input class="w-in" type="number" inputmode="decimal" placeholder="0" value="'+(s.kg!==''&&s.kg!=null?s.kg:'')+'" oninput="setVal('+ei+','+si+',\'kg\',this.value)">'+
        '<input class="w-in" type="number" inputmode="numeric" placeholder="0" value="'+(s.reps!==''&&s.reps!=null?s.reps:'')+'" oninput="setVal('+ei+','+si+',\'reps\',this.value)">'+
        '<button class="w-check'+(s.done?' on':'')+'" onclick="toggleSet('+ei+','+si+')" title="'+(beat?'New PR!':'')+'">'+(beat?'★':'✓')+'</button></div>';
    });
    html+='<button class="w-addset" onclick="addSet('+ei+')">&#65291; Add set</button>';
    if(restRunning() && ei===restCardIdx) html+=restInlineHTML();
    html+='</div>';
  });
  html+='<button class="w-btn-ghost" style="margin-top:6px;" onclick="pickExercise(addExToActive)">&#65291; Add exercise</button>';
  W.innerHTML=html;
  startTimer();
}
function startTimer(){
  clearInterval(timerInt);
  function tick(){ var a=getActive(); if(!a){clearInterval(timerInt);return;} var el=document.getElementById('wTimer'); if(el) el.textContent=fmtDur((Date.now()-new Date(a.startedAt).getTime())/1000); }
  tick(); timerInt=setInterval(tick,1000);
}
function setVal(ei,si,field,val){ var a=getActive(); if(!a)return; a.entries[ei].sets[si][field]= val===''?'':(+val); setActive(a); }
function toggleSet(ei,si){ var a=getActive(); if(!a)return; var s=a.entries[ei].sets[si]; s.done=!s.done; setActive(a); if(s.done){ restStart(ei); } else if(restCardIdx===ei){ clearInterval(restInt); restInt=null; restCardIdx=-1; } render(); }
function addSet(ei){ var a=getActive(); if(!a)return; var sets=a.entries[ei].sets; var last=sets[sets.length-1]||{kg:'',reps:''}; sets.push({kg:last.kg,reps:last.reps,done:false}); setActive(a); render(); }
function removeEx(ei){ var a=getActive(); if(!a)return; if(!confirm('Remove '+a.entries[ei].name+' from this workout?'))return; a.entries.splice(ei,1); setActive(a); render(); }
function addExToActive(ex){ var a=getActive(); if(!a)return; a.entries.push({exId:ex.id,name:ex.name,muscle:ex.muscle,sets:[{kg:'',reps:'',done:false}]}); setActive(a); closeSheet(); render(); }
function cancelActive(){ if(!confirm('Discard this workout? Nothing will be saved.'))return; clearInterval(timerInt); restSkip(); save('po_active',null); go('home'); }

function finishActive(){
  var a=getActive(); if(!a)return;
  var entries=[]; var volume=0; var prExs=[];
  a.entries.forEach(function(en){
    var doneSets=en.sets.filter(function(s){return s.done && (+s.reps||0)>0;});
    if(!doneSets.length) return;
    var prevBest=bestE1rmFor(en.exId,a.id); var thisBest=0;
    doneSets.forEach(function(s){ volume+=(+s.kg||0)*(+s.reps||0); var v=e1rm(s.kg,s.reps); if(v>thisBest)thisBest=v; });
    if(thisBest>prevBest && prevBest>0) prExs.push(en.exId);
    entries.push({exId:en.exId,name:en.name,muscle:en.muscle,sets:doneSets.map(function(s){return {kg:+s.kg||0,reps:+s.reps||0,done:true};})});
  });
  if(!entries.length){ if(!confirm('No sets were checked off. Discard this workout?'))return; save('po_active',null); clearInterval(timerInt); restSkip(); go('home'); return; }
  var dur=(Date.now()-new Date(a.startedAt).getTime())/1000;
  var dk=dateKey(new Date(a.startedAt));
  var session={ id:a.id, name:a.name, templateId:a.templateId, date:dk, startedAt:a.startedAt, durationSec:Math.round(dur), entries:entries, volume:Math.round(volume), prs:prExs };
  var hist=workouts(); hist.unshift(session); save('po_workouts',hist);
  var done=ls('po_coach_workout_done',{})||{}; done[dk]=new Date().toISOString(); save('po_coach_workout_done',done);
  save('po_coach_logs:'+dk, entries.map(function(e){return {exId:e.exId,name:e.name,sets:e.sets};}));
  save('po_active',null); clearInterval(timerInt); restSkip();
  showSummary(session);
}

  var html='<div class="w-sheet-grip"></div>'+
    '<div class="w-sheet-hd"><div class="w-sheet-title">Workout complete</div><button class="w-x" onclick="closeSheet();go(\'home\')">✕</button></div>'+
    '<div class="w-sheet-sub">'+esc(s.name)+' · '+relDate(s.date)+'</div>'+
    '<div class="w-card"><div class="w-hist-stats" style="margin:0;">'+
      '<div class="w-hist-stat"><b>'+fmtDur(s.durationSec)+'</b><br>Duration</div>'+
      '<div class="w-hist-stat"><b>'+s.volume.toLocaleString()+' kg</b><br>Volume</div>'+
      '<div class="w-hist-stat pr"><b>'+s.prs.length+'</b><br>PRs</div></div></div>';

  html+=histExerciseRows(s);

function histExerciseRows(s){
  return (s.entries||[]).map(function(en){
    var best=null; en.sets.forEach(function(x){ if(!best||(+x.kg||0)>(+best.kg||0))best=x; });
    var bs = best?((best.kg||0)+'kg × '+(best.reps||0)):'—';
    return '<div class="w-hist-row"><span class="nm">'+en.sets.length+' × '+esc(en.name)+'</span><span class="bs">'+esc(bs)+'</span></div>';
  }).join('');
}

/* PROGRESSION TARGETS + STATS */
function targetFor(exId){
  var le=lastEntryFor(exId); if(!le) return null;
  var best=null;
  le.sets.forEach(function(s){ if((+s.kg||0)>0 && (+s.reps||0)>0 && (!best||e1rm(s.kg,s.reps)>e1rm(best.kg,best.reps))) best=s; });
  if(!best) return null;
  var w=+best.kg||0, r=+best.reps||0;
  return { w:w, r:r, suggest: w+'kg×'+(r+1)+' or '+(w+2.5)+'kg×'+r };
}
function exHistory(exId){
  var arr=[];
  workouts().slice().sort(function(a,b){return (a.startedAt||'')<(b.startedAt||'')?-1:1;}).forEach(function(w){
    var en=(w.entries||[]).find(function(e){return e.exId===exId;}); if(!en)return;
    var best=0,bw=null,vol=0;
    en.sets.forEach(function(s){ vol+=(+s.kg||0)*(+s.reps||0); var v=e1rm(s.kg,s.reps); if(v>best){best=v;bw=s;} });
    if(best>0) arr.push({date:w.date,e1rm:best,set:bw,vol:vol});
  });
  return arr;
}
function trainedExIds(){
  var seen={},out=[];
  workouts().forEach(function(w){ (w.entries||[]).forEach(function(en){ if(en.exId && !seen[en.exId]){seen[en.exId]=1;out.push(en.exId);} }); });
  return out;
}
function miniSpark(vals){
  if(vals.length<2) return '<div class="w-spark"></div>';
  var min=Math.min.apply(null,vals),max=Math.max.apply(null,vals),range=(max-min)||1;
  var v=vals.slice(-12);
  return '<div class="w-spark">'+v.map(function(x,i){var h=Math.round((x-min)/range*26+4);return '<div class="w-spark-b'+(i===v.length-1?' last':'')+'" style="height:'+h+'px"></div>';}).join('')+'</div>';
}
function renderStats(){
  view='stats';
  var html='<div class="w-hero"><div><div class="au-eyebrow w-hero-eyebrow"><span class="au-dot"></span>FITNESS</div><h1 class="w-hero-title">Progress.</h1></div>'+novaSvg()+'</div>'+segHTML('stats');
  var ids=trainedExIds();
  if(!ids.length){ html+='<div class="w-empty">Log a few workouts and your strength progress shows up here.</div>'; W.innerHTML=html; return; }
  ids.sort(function(a,b){ var ha=exHistory(a),hb=exHistory(b); var da=ha.length?ha[ha.length-1].date:''; var db=hb.length?hb[hb.length-1].date:''; return db<da?-1:db>da?1:0; });
  ids.forEach(function(id){
    var h=exHistory(id); if(!h.length)return;
    var pr=Math.max.apply(null,h.map(function(x){return x.e1rm;}));
    var ex=exById(id);
    html+='<button type="button" class="w-stat-card" data-act="ex-progress" data-val="'+id+'">'+
      '<div class="w-stat-main"><div class="w-stat-name">'+esc(ex.name)+'</div><div class="w-stat-pr">'+esc(ex.muscle)+' · est 1RM <b>'+Math.round(pr)+'kg</b></div></div>'+
      miniSpark(h.map(function(x){return x.e1rm;}))+'</button>';
  });
  W.innerHTML=html;
}
function chartSVG(vals){
  var WD=320,HT=110,p=14;
  var min=Math.min.apply(null,vals),max=Math.max.apply(null,vals),range=(max-min)||1;
  var pts=vals.map(function(v,i){ var x=vals.length===1?WD/2:p+(WD-2*p)*i/(vals.length-1); var y=p+(HT-2*p)*(1-(v-min)/range); return [x,y]; });
  var line=pts.map(function(pt,i){return (i?'L':'M')+pt[0].toFixed(1)+','+pt[1].toFixed(1);}).join(' ');
  var area=line+' L'+pts[pts.length-1][0].toFixed(1)+','+HT+' L'+pts[0][0].toFixed(1)+','+HT+' Z';
  return '<svg viewBox="0 0 '+WD+' '+HT+'" width="100%" height="'+HT+'" preserveAspectRatio="none">'+
    '<defs><linearGradient id="gpL" x1="0" y1="0" x2="1" y2="0"><stop offset="0%" stop-color="#18C8C0"/><stop offset="100%" stop-color="#34E2B0"/></linearGradient>'+
    '<linearGradient id="gpF" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#34E2B0" stop-opacity="0.26"/><stop offset="100%" stop-color="#34E2B0" stop-opacity="0"/></linearGradient>'+
    '<filter id="gpG" x="-20%" y="-50%" width="140%" height="200%"><feGaussianBlur stdDeviation="3" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter></defs>'+
    '<path d="'+area+'" fill="url(#gpF)"/>'+
    '<path d="'+line+'" fill="none" stroke="url(#gpL)" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" filter="url(#gpG)"/>'+
    '<circle cx="'+pts[pts.length-1][0].toFixed(1)+'" cy="'+pts[pts.length-1][1].toFixed(1)+'" r="4" fill="#34E2B0" filter="url(#gpG)"/></svg>';
}
function exerciseProgress(exId){
  var ex=exById(exId); var h=exHistory(exId);
  var html='<div class="w-sheet-grip"></div><div class="w-sheet-hd"><div class="w-sheet-title">'+esc(ex.name)+'</div><button type="button" class="w-x" data-act="close-sheet">✕</button></div><div class="w-sheet-sub">'+esc(ex.muscle)+' · '+h.length+' session'+(h.length===1?'':'s')+'</div>';
  if(h.length<2){ html+='<div class="w-empty" style="font-size:14px;">Do this exercise at least twice to chart your progress.</div>'; openSheet(html); return; }
  var prE1=Math.max.apply(null,h.map(function(x){return x.e1rm;}));
  var prW=0; h.forEach(function(x){ if(x.set && (+x.set.kg||0)>prW) prW=+x.set.kg||0; });
  var prV=Math.max.apply(null,h.map(function(x){return x.vol;}));
  html+='<div class="w-prgrid"><div class="w-prstat"><b>'+Math.round(prE1)+'kg</b>est 1RM</div><div class="w-prstat"><b>'+prW+'kg</b>top weight</div><div class="w-prstat"><b>'+prV.toLocaleString()+'</b>best volume</div></div>';
  html+=chartSVG(h.map(function(x){return x.e1rm;}));
  html+='<div class="w-chartcap"><span>'+relDate(h[0].date)+'</span><span>estimated 1RM over time</span><span>Now</span></div>';
  openSheet(html);
}

/* EXERCISE PICKER */
function pickExercise(cb){
  var html='<div class="w-sheet-grip"></div>'+
    '<div class="w-sheet-hd"><div class="w-sheet-title">Add exercise</div><button class="w-x" onclick="closeSheet()">✕</button></div>'+
    '<input class="w-search" id="wSearch" placeholder="Search exercises…" oninput="filterPick()">'+
    '<button class="w-btn-ghost" style="margin:4px 0 6px;" onclick="addCustomExercise()">&#65291; Create new exercise</button>'+
    '<div id="wPickList"></div>';
  openSheet(html);
  window.__pickCb=cb; filterPick();
  setTimeout(function(){ var s=document.getElementById('wSearch'); if(s)s.focus(); },350);
}
window.filterPick=function(){
  var q=((document.getElementById('wSearch')||{}).value||'').toLowerCase();
  var list=exercises().filter(function(e){return e.name.toLowerCase().indexOf(q)!==-1 || (e.muscle||'').toLowerCase().indexOf(q)!==-1;});
  list.sort(function(a,b){return a.name<b.name?-1:1;});
  var el=document.getElementById('wPickList');
  el.innerHTML=list.map(function(e){return '<button type="button" class="w-pick" onclick="choosePick(\''+e.id+'\')"><div class="w-ex-dot" style="background:rgba(var(--au-glow-rgb),.15);color:rgb(var(--au-glow-rgb));">'+esc((e.muscle||'?').slice(0,2).toUpperCase())+'</div><span class="w-pick-name">'+esc(e.name)+'</span><span class="w-pick-muscle">'+esc(e.muscle)+'</span></button>';}).join('') || '<div class="w-empty" style="font-size:13px;">No match — create it above.</div>';
};
window.choosePick=function(id){ var e=exById(id); if(window.__pickCb) window.__pickCb(e); };
window.addCustomExercise=function(){
  var name=prompt('Exercise name:'); if(!name)return;
  var muscle=prompt('Muscle group (Chest, Back, Legs, Shoulders, Arms, Core, Cardio):','Other')||'Other';
  var ex={id:uid(),name:name.trim(),muscle:muscle.trim()}; var list=exercises(); list.push(ex); save('po_exercises',list); filterPick();
};

/* TEMPLATE EDITOR */
function editTemplate(id){
  var t = id ? JSON.parse(JSON.stringify(templates().find(function(x){return x.id===id;}))) : {id:uid(),folderId:(folders()[0]||{}).id||null,name:'',items:[]};
  window.__editTpl=t; renderEditor();
}
function renderEditor(){
  var t=window.__editTpl; var fs=folders();
  var html='<div class="w-sheet-grip"></div>'+
    '<div class="w-sheet-hd"><div class="w-sheet-title">'+(templates().find(function(x){return x.id===t.id;})?'Edit template':'New template')+'</div><button class="w-x" onclick="closeSheet()">✕</button></div>'+
    '<input class="w-search" placeholder="Template name" value="'+esc(t.name)+'" oninput="window.__editTpl.name=this.value">'+
    '<div class="w-set-head" style="grid-template-columns:1fr;margin:8px 0 4px;">FOLDER</div>'+
    '<select class="w-search" onchange="window.__editTpl.folderId=this.value" style="font-family:var(--au-sans);">'+
      fs.map(function(f){return '<option value="'+f.id+'"'+(f.id===t.folderId?' selected':'')+'>'+esc(f.name)+'</option>';}).join('')+
      '<option value="__new">+ New folder…</option></select>';
  html+='<div class="w-set-head" style="grid-template-columns:1fr;margin:14px 0 2px;">EXERCISES</div>';
  if(!t.items.length) html+='<div class="w-empty" style="font-size:13px;padding:8px 0;">No exercises yet.</div>';
  t.items.forEach(function(it,i){
    var ex=exById(it.exId);
    html+='<div class="w-ex"><div class="w-ex-main"><div class="w-ex-name">'+esc(ex.name)+'</div><div class="w-ex-muscle">'+esc(ex.muscle)+'</div>'+
      '<div class="w-row-actions"><span class="w-stepper"><button onclick="edSets('+i+',-1)">−</button><span>'+it.sets+'×</span><button onclick="edSets('+i+',1)">&#65291;</button></span>'+
      '<button class="w-mini w-del" onclick="edRemove('+i+')">remove</button></div></div></div>';
  });
  html+='<button class="w-btn-ghost" style="margin-top:8px;" onclick="pickExercise(edAddEx)">&#65291; Add exercise</button>';
  html+='<button class="w-btn" style="margin-top:16px;" onclick="saveTpl()">Save template</button>';
  if(templates().find(function(x){return x.id===t.id;})) html+='<button class="w-btn-ghost" style="margin-top:8px;color:var(--au-rose);border-color:rgba(255,107,139,.3);" onclick="deleteTpl()">Delete template</button>';
  openSheet(html);
}
window.edSets=function(i,d){ var t=window.__editTpl; t.items[i].sets=Math.max(1,t.items[i].sets+d); renderEditor(); };
window.edRemove=function(i){ window.__editTpl.items.splice(i,1); renderEditor(); };
window.edAddEx=function(ex){ window.__editTpl.items.push({exId:ex.id,sets:3}); renderEditor(); };
window.saveTpl=function(){
  var t=window.__editTpl;
  if(!t.name||!t.name.trim()){ alert('Give your template a name.'); return; }
  if(t.folderId==='__new'){ var fn=prompt('New folder name:'); if(fn){ var f={id:uid(),name:fn.trim()}; var fl=folders(); fl.push(f); save('po_tpl_folders',fl); t.folderId=f.id; } else { t.folderId=(folders()[0]||{}).id; } }
  if(!t.items.length){ alert('Add at least one exercise.'); return; }
  var list=templates(); var idx=list.findIndex(function(x){return x.id===t.id;});
  if(idx>=0) list[idx]=t; else list.push(t);
  save('po_templates',list); closeSheet(); go('home');
};
window.deleteTpl=function(){ if(!confirm('Delete this template?'))return; var list=templates().filter(function(x){return x.id!==window.__editTpl.id;}); save('po_templates',list); closeSheet(); go('home'); };

/* REST TIMER — default 3:00, change anytime, saved */
var restInt=null, restLeft=0, restCardIdx=-1;
function restDefault(){ var v=ls('po_rest_default',180); return (typeof v==='number'&&v>0)?v:180; }
function restRunning(){ return restInt!==null; }
function restInlineHTML(){
  return '<div class="w-rest-inline" id="wRestInline">'+
    '<span class="w-rest-time" id="wRestTime">'+fmtDur(restLeft)+'</span>'+
    '<span class="w-rest-lbl">Rest</span>'+
    '<button type="button" class="w-rest-btn" data-act="rest-adj" data-val="-15">&minus;15</button>'+
    '<button type="button" class="w-rest-btn" data-act="rest-adj" data-val="15">+15</button>'+
    '<button type="button" class="w-rest-btn" data-act="rest-skip">Skip</button></div>';
}
function updateRestText(){ var el=document.getElementById('wRestTime'); if(el) el.textContent=fmtDur(Math.max(0,restLeft)); }
function restStart(ei){ restCardIdx=ei; restLeft=restDefault(); clearInterval(restInt); restInt=setInterval(restTick,1000); }
function restTick(){ restLeft--; if(restLeft<=0){ restDone(); return; } updateRestText(); }
function restDone(){ clearInterval(restInt); restInt=null; restLeft=0; var el=document.getElementById('wRestTime'); if(el) el.textContent='0:00'; var bar=document.getElementById('wRestInline'); if(bar) bar.classList.add('done'); try{ if(navigator.vibrate) navigator.vibrate([300,120,300]); }catch(e){} setTimeout(function(){ restCardIdx=-1; if(view==='active') render(); },2200); }
function removeRest(){ clearInterval(restInt); restInt=null; restCardIdx=-1; if(view==='active') render(); }
function restSkip(){ clearInterval(restInt); restInt=null; restCardIdx=-1; } /* stop without re-render (used on finish/cancel) */
window.restAdjust=function(d){ if(!restRunning())return; restLeft=Math.max(5,restLeft+(parseInt(d,10)||0)); updateRestText(); };
function openRestModal(){
  var cur=restDefault();
  var mi=document.getElementById('wRmMin'), si=document.getElementById('wRmSec');
  if(mi) mi.value=Math.floor(cur/60);
  if(si) si.value=pad(cur%60);
  document.getElementById('wModalBg').classList.add('on');
  document.getElementById('wModal').classList.add('on');
  setTimeout(function(){ if(mi){ try{ mi.focus(); mi.select(); }catch(e){} } },260);
}
function closeRestModal(){ var b=document.getElementById('wModalBg'),m=document.getElementById('wModal'); if(b)b.classList.remove('on'); if(m)m.classList.remove('on'); }
function applyRest(sec){ sec=parseInt(sec,10); if(isNaN(sec)||sec<5) sec=5; save('po_rest_default',sec); if(restRunning()){ restLeft=sec; updateRestText(); } closeRestModal(); render(); }
function restSetFromInputs(){ var m=parseInt((document.getElementById('wRmMin')||{}).value,10)||0; var s=parseInt((document.getElementById('wRmSec')||{}).value,10)||0; applyRest(m*60+s); }
window.openRestConfig=openRestModal;

/* SHEET */
function openSheet(html){ var s=document.getElementById('wSheet'); s.innerHTML=html; document.getElementById('wSheetBg').classList.add('on'); s.classList.add('on'); s.scrollTop=0; }
window.closeSheet=function(){ document.getElementById('wSheetBg').classList.remove('on'); document.getElementById('wSheet').classList.remove('on'); };

/* nav exports */
window.go=function(v){ closeSheet(); view=v; render(); window.scrollTo(0,0); };
window.openTpl=openTpl; window.startFromTpl=startFromTpl; window.startEmpty=startEmpty; window.resumeActive=resumeActive;
window.editTemplate=editTemplate; window.setVal=setVal; window.toggleSet=toggleSet; window.addSet=addSet; window.removeEx=removeEx;
window.finishActive=finishActive; window.cancelActive=cancelActive; window.pickExercise=pickExercise; window.addExToActive=addExToActive;

if(getActive()) view='active';
render();
window.addEventListener('storage', function(){ if(view!=='active') render(); });

/* Bulletproof tap handling via delegation (iOS-safe — one listener on document) */
document.addEventListener('click', function(ev){
  var t = ev.target && ev.target.closest ? ev.target.closest('[data-act]') : null;
  if(!t) return;
  var act = t.getAttribute('data-act');
  if(act==='rest-config')      openRestModal();
  else if(act==='rest-pick')   applyRest(t.getAttribute('data-val'));
  else if(act==='rest-set')    restSetFromInputs();
  else if(act==='rest-close')  closeRestModal();
  else if(act==='rest-adj')    window.restAdjust(t.getAttribute('data-val'));
  else if(act==='rest-skip')   removeRest();
  else if(act==='go')          go(t.getAttribute('data-val'));
  else if(act==='ex-progress') exerciseProgress(t.getAttribute('data-val'));
  else if(act==='close-sheet') closeSheet();
});
})();
</script>

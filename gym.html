<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Fitness · ALS</title>
<meta name="theme-color" content="#060607">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="apple-touch-icon.png">
<link rel="stylesheet" href="aurora.css">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="water.js"></script>
<script src="topbar.js" defer></script>
<script src="page-motion.js" defer></script>
<style>
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
  html,body{min-height:100%;}
  body{padding:0 0 calc(86px + env(safe-area-inset-bottom));}
  .w-wrap{max-width:600px;margin:0 auto;padding:22px 16px;}

  /* hero */
  .w-hero{display:flex;align-items:flex-start;justify-content:space-between;gap:14px;margin-bottom:16px;}
  .w-hero-eyebrow{margin-bottom:10px;}
  .w-hero-title{font-family:var(--au-serif);font-style:italic;font-weight:400;color:var(--au-ivory);font-size:clamp(28px,7vw,40px);line-height:1.02;letter-spacing:-.01em;}
  .w-hero .nova{flex-shrink:0;width:64px;height:64px;}

  /* segmented nav */
  .w-seg{display:flex;gap:6px;background:rgba(255,255,255,.04);border:1px solid var(--au-line);border-radius:14px;padding:4px;margin-bottom:18px;}
  .w-seg button{flex:1;padding:9px;border:none;background:none;border-radius:10px;font-family:var(--au-mono);font-size:11px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--au-faint);cursor:pointer;transition:background .2s,color .2s;}
  .w-seg button.on{background:rgba(var(--au-glow-rgb),.16);color:var(--au-ivory);}

  /* buttons */
  .w-btn{display:inline-flex;align-items:center;justify-content:center;gap:8px;width:100%;border:none;cursor:pointer;font-family:var(--au-sans);font-size:15px;font-weight:700;padding:15px;border-radius:14px;color:#04130D;background:var(--au-gradient);background-size:160% 160%;box-shadow: none;transition:transform .15s,box-shadow .25s;-webkit-tap-highlight-color:transparent;}
  .w-btn:active{transform:translateY(1px);}
  .w-btn-ghost{display:inline-flex;align-items:center;justify-content:center;gap:7px;width:100%;cursor:pointer;font-family:var(--au-mono);font-size:11px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;padding:12px;border-radius:12px;color:var(--au-dim);background:rgba(255,255,255,.04);border:1px solid var(--au-line);-webkit-tap-highlight-color:transparent;}
  .w-btn-ghost:active{background:rgba(255,255,255,.08);}

  /* section label */
  .w-folder{display:flex;align-items:center;gap:10px;margin:22px 0 10px;}
  .w-folder-name{font-family:var(--au-serif);font-style:italic;font-size:19px;color:var(--au-ivory);}
  .w-folder-count{font-family:var(--au-mono);font-size:10px;color:var(--au-faint);}
  .w-folder-line{flex:1;height:1px;background:linear-gradient(90deg,rgba(var(--au-glow-rgb),.25),transparent);}

  /* template grid */
  .w-tpls{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
  .w-tpl{position:relative;text-align:left;background:var(--au-glass);border:1px solid var(--au-line);border-radius:16px;padding:14px;cursor:pointer;overflow:hidden;transition:border-color .2s,transform .2s;-webkit-tap-highlight-color:transparent;}
  .w-tpl::before{content:'';position:absolute;top:0;left:10%;right:10%;height:1px;background:linear-gradient(90deg,transparent,rgba(var(--au-glow-rgb),.5),transparent);}
  .w-tpl:active{transform:scale(.98);border-color:rgba(var(--au-glow-rgb),.3);}
  .w-tpl-name{font-weight:700;font-size:15px;color:var(--au-ivory);margin-bottom:6px;line-height:1.2;}
  .w-tpl-ex{font-size:11.5px;color:var(--au-faint);line-height:1.45;min-height:48px;}
  .w-tpl-meta{font-family:var(--au-mono);font-size:9px;letter-spacing:.05em;color:var(--au-faint);margin-top:9px;text-transform:uppercase;}

  .w-empty{font-family:var(--au-serif);font-style:italic;color:var(--au-dim);text-align:center;padding:26px 0;font-size:16px;}

  /* sheet (template detail / picker / editor) */
  /* Sheet — a top-layer <dialog> (opened via showModal) so it is positioned
     against the VIEWPORT, immune to any ancestor transform/filter that was
     pushing the old position:fixed box to the bottom of the page. Slide-up
     bottom sheet on phones; floating centered card on wider screens. */
  .w-sheet{position:fixed;inset:auto 0 0 0;z-index:61;width:100%;max-width:600px;margin:0 auto;
    max-height:88vh;overflow-y:auto;color:var(--au-ivory);
    background:#0a0c10;border:1px solid rgba(var(--au-glow-rgb),.28);border-bottom:none;border-radius:24px 24px 0 0;
    padding:9px 18px calc(24px + env(safe-area-inset-bottom));
    transform:translateY(101%);opacity:0;
    transition:opacity .25s ease, transform .44s cubic-bezier(.22,1,.36,1);
    box-shadow: 0 -22px 60px rgba(0,0,0,.6);-webkit-overflow-scrolling:touch;overscroll-behavior:contain;}
  .w-sheet::backdrop{background:rgba(3,4,6,.62);-webkit-backdrop-filter:blur(5px);backdrop-filter:blur(5px);}
  .w-sheet.on{transform:translateY(0);opacity:1;}
  /* the grab handle, visible on the bottom sheet */
  .w-sheet-grip{display:block;width:40px;height:4px;border-radius:999px;background:rgba(255,255,255,.2);margin:0 auto 14px;}
  @media(min-width:620px){
    .w-sheet{inset:0;margin:auto;width:min(540px,92vw);max-width:none;max-height:86vh;height:max-content;
      border:1px solid rgba(var(--au-glow-rgb),.28);border-radius:22px;padding:20px 18px 22px;
      transform:translateY(16px) scale(.96);
      transition:opacity .2s ease, transform .34s cubic-bezier(.34,1.56,.45,1);
      box-shadow: 0 30px 80px rgba(0,0,0,.65);}
    .w-sheet.on{transform:translateY(0) scale(1);}
    .w-sheet-grip{display:none;}
  }
  .w-sheet-hd{display:flex;align-items:center;justify-content:space-between;gap:10px;margin-bottom:4px;}
  .w-sheet-title{font-family:var(--au-serif);font-style:italic;font-size:24px;color:var(--au-ivory);line-height:1.1;}
  .w-sheet-sub{font-family:var(--au-mono);font-size:10px;letter-spacing:.06em;text-transform:uppercase;color:var(--au-faint);margin:2px 0 16px;}
  .w-x{background:rgba(255,255,255,.06);border:none;color:var(--au-dim);width:34px;height:34px;border-radius:50%;font-size:18px;cursor:pointer;flex-shrink:0;}

  /* exercise row (detail/active) */
  .w-ex{display:flex;align-items:flex-start;gap:12px;padding:12px 0;border-top:1px solid var(--au-line);transition:transform .16s ease;}
  .w-ex:first-of-type{border-top:none;}
  .w-ex-dot{width:34px;height:34px;border-radius:10px;flex-shrink:0;display:grid;place-items:center;font-family:var(--au-mono);font-size:10px;font-weight:700;color:#04130D;background:rgb(var(--au-glow-rgb));}
  .w-ex-main{flex:1;min-width:0;}
  .w-ex-name{font-weight:700;font-size:14.5px;color:var(--au-ivory);line-height:1.25;}
  .w-ex-editpen{font-size:11px;color:var(--au-faint);opacity:.7;margin-left:3px;}
  .w-ex-muscle{font-family:var(--au-mono);font-size:9.5px;letter-spacing:.08em;text-transform:uppercase;color:var(--au-faint);margin-top:3px;}
  .w-ex-last{font-size:11px;color:var(--au-dim);margin-top:4px;font-style:italic;font-family:var(--au-serif);}

  /* active set rows */
  .w-set-head,.w-set{display:grid;grid-template-columns:38px 1fr 1fr 44px;gap:8px;align-items:center;}
  .w-set-head{font-family:var(--au-mono);font-size:8.5px;letter-spacing:.1em;text-transform:uppercase;color:var(--au-faint);margin:10px 0 6px;}
  .w-set{margin-bottom:7px;}
  .w-set-num{font-family:var(--au-mono);font-size:13px;font-weight:700;color:var(--au-faint);text-align:center;}
  .w-set.done .w-set-num{color:rgb(var(--au-glow-rgb));}
  .w-in{width:100%;background:rgba(255,255,255,.05);border:1px solid var(--au-line);border-radius:9px;padding:9px 6px;color:var(--au-ivory);font-family:var(--au-mono);font-size:15px;font-weight:700;text-align:center;outline:none;-webkit-appearance:none;}
  .w-in:focus{border-color:rgba(var(--au-glow-rgb),.55);}
  .w-in::placeholder{color:rgba(244,241,234,.25);}
  .w-set.done .w-in{border-color:rgba(var(--au-glow-rgb),.3);background:rgba(var(--au-glow-rgb),.07);}
  .w-check{width:40px;height:38px;border-radius:10px;border:1px solid var(--au-line);background:rgba(255,255,255,.04);color:var(--au-faint);font-size:16px;cursor:pointer;-webkit-tap-highlight-color:transparent;}
  .w-check.on{background:rgb(var(--au-glow-rgb));color:#04130D;border-color:transparent;box-shadow: none;}
  .w-addset{font-family:var(--au-mono);font-size:10px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:rgb(var(--au-glow-rgb));background:rgba(var(--au-glow-rgb),.08);border:1px solid rgba(var(--au-glow-rgb),.25);border-radius:8px;padding:8px;width:100%;cursor:pointer;margin-top:4px;-webkit-tap-highlight-color:transparent;}
  /* set-type marker — tap the set number to cycle working → warm-up → drop */
  .w-set-type{font-family:var(--au-mono);font-size:13px;font-weight:700;text-align:center;color:var(--au-faint);background:none;border:none;padding:0;height:38px;line-height:38px;cursor:pointer;border-radius:8px;-webkit-tap-highlight-color:transparent;}
  .w-set-type.type-warmup{color:var(--au-amber);}
  .w-set-type.type-drop{color:#9B8CFF;}
  .w-set.done .w-set-type.type-work{color:rgb(var(--au-glow-rgb));}
  .w-warm-btn{font-family:var(--au-mono);font-size:9.5px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:var(--au-amber);background:rgba(242,192,99,.08);border:1px solid rgba(242,192,99,.28);border-radius:999px;padding:7px 12px;cursor:pointer;-webkit-tap-highlight-color:transparent;}
  .w-warm-btn:active{background:rgba(242,192,99,.18);}
  /* action chooser rows (replace / edit) */
  .w-choose{display:flex;align-items:center;gap:12px;width:100%;text-align:left;background:rgba(255,255,255,.04);border:1px solid var(--au-line);border-radius:12px;padding:14px;margin-top:10px;cursor:pointer;color:var(--au-ivory);-webkit-tap-highlight-color:transparent;}
  .w-choose:active{background:rgba(255,255,255,.08);}
  .w-choose-ic{font-size:18px;flex:none;}
  .w-choose-main{flex:1;min-width:0;}
  .w-choose-t{display:block;font-weight:700;font-size:14px;color:var(--au-ivory);}
  .w-choose-s{display:block;font-family:var(--au-mono);font-size:9.5px;letter-spacing:.04em;text-transform:uppercase;color:var(--au-faint);margin-top:3px;}
  /* settings rows */
  .w-setrow{display:flex;align-items:center;gap:10px;margin-bottom:9px;}
  .w-setrow-name{font-family:var(--au-mono);font-size:11px;font-weight:700;letter-spacing:.04em;text-transform:uppercase;color:var(--au-dim);flex:1;}
  /* Today / weekly-schedule card */
  .w-today{position:relative;background:linear-gradient(135deg,rgba(var(--au-glow-rgb),.13),rgba(255,255,255,.02));border:1px solid rgba(var(--au-glow-rgb),.32);border-radius:18px;padding:16px 17px;margin-bottom:12px;overflow:hidden;}
  .w-today::before{content:'';position:absolute;top:0;left:8%;right:8%;height:1px;background:linear-gradient(90deg,transparent,rgba(var(--au-glow-rgb),.6),transparent);}
  .w-today-rest{background:rgba(255,255,255,.035);border-color:var(--au-line);}
  .w-today-day{font-family:var(--au-mono);font-size:9.5px;font-weight:700;letter-spacing:.16em;text-transform:uppercase;color:rgba(var(--au-glow-rgb),.9);}
  .w-today-rest .w-today-day{color:var(--au-faint);}
  .w-today-name{font-family:var(--au-serif);font-style:italic;font-size:25px;color:var(--au-ivory);line-height:1.05;margin:5px 0 4px;}
  .w-today-ex{font-size:12px;color:var(--au-faint);line-height:1.45;}
  .w-sched-sel{width:170px;flex:none;background:rgba(255,255,255,.05);border:1px solid var(--au-line);border-radius:10px;padding:9px 10px;color:var(--au-ivory);font-family:var(--au-sans);font-size:13px;outline:none;}
  .w-sched-sel:focus{border-color:rgba(var(--au-glow-rgb),.5);}
  /* live est-1RM readout */
  .w-live{font-family:var(--au-mono);font-size:11px;letter-spacing:.02em;color:var(--au-dim);margin:9px 0 2px;line-height:1.45;}
  .w-live b{color:var(--au-ivory);font-weight:700;}
  .w-live-dim{color:var(--au-faint);}
  .w-live-pr{color:var(--au-amber);font-weight:700;}
  .w-live-off{color:var(--au-faint);}
  /* RPE (effort) — optional 5th column */
  .w-rpe{font-family:var(--au-mono);font-size:13px;font-weight:700;color:var(--au-faint);background:rgba(255,255,255,.05);border:1px solid var(--au-line);border-radius:9px;height:38px;cursor:pointer;-webkit-tap-highlight-color:transparent;}
  .w-rpe.set{color:var(--au-amber);border-color:rgba(242,192,99,.4);background:rgba(242,192,99,.08);}
  .w-rpe-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-top:6px;}
  .w-rpe-opt{padding:15px 6px;border-radius:12px;border:1px solid var(--au-line);background:rgba(255,255,255,.04);color:var(--au-ivory);font-family:var(--au-mono);font-size:17px;font-weight:700;cursor:pointer;-webkit-tap-highlight-color:transparent;}
  .w-rpe-opt:active{background:rgba(var(--au-glow-rgb),.2);}
  /* set-check pop + PR flash (targeted, plays once on toggle) */
  @keyframes wCheckPop{0%{transform:scale(1)}40%{transform:scale(1.3)}100%{transform:scale(1)}}
  .w-check.pop{animation:wCheckPop .32s cubic-bezier(.34,1.56,.64,1);}
  @keyframes wPrFlash{0%{box-shadow: none}30%{box-shadow: none}100%{box-shadow: none}}
  .w-set.prflash{animation:wPrFlash .9s ease;}
  /* ── Phase C: Progress dashboard ── */
  /* lifetime totals */
  .w-tot-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-top:4px;}
  .w-tot{background:rgba(255,255,255,.03);border:1px solid var(--au-line);border-radius:12px;padding:13px 6px;text-align:center;}
  .w-tot b{display:block;font-family:var(--au-mono);font-size:19px;font-weight:700;color:var(--au-ivory);letter-spacing:-.02em;line-height:1.1;}
  .w-tot span{font-family:var(--au-mono);font-size:8px;font-weight:700;letter-spacing:.09em;text-transform:uppercase;color:var(--au-faint);}
  /* coach notes */
  .w-coach{display:flex;gap:10px;align-items:flex-start;padding:10px 0;border-top:1px solid rgba(255,255,255,.05);}
  .w-coach:first-of-type{border-top:none;padding-top:2px;}
  .w-coach-ic{font-size:15px;flex:none;line-height:1.4;}
  .w-coach-t{font-size:13px;line-height:1.45;color:var(--au-dim);}
  .w-coach-t b{color:var(--au-ivory);font-weight:700;}
  /* muscle map */
  .w-heat{width:100%;display:block;margin:4px 0 2px;}
  .w-heat-legend{display:flex;gap:13px;flex-wrap:wrap;margin-top:8px;}
  .w-heat-legend span{display:flex;align-items:center;gap:5px;font-family:var(--au-mono);font-size:8.5px;letter-spacing:.04em;text-transform:uppercase;color:var(--au-faint);}
  .w-heat-dot{width:9px;height:9px;border-radius:50%;flex:none;}
  .w-fig-lbl{font-family:var(--au-mono);font-size:8px;letter-spacing:.14em;fill:rgba(244,241,234,.42);text-transform:uppercase;}
  /* consistency calendar */
  .w-cal{display:flex;gap:3px;margin:4px 0 2px;overflow-x:auto;-webkit-overflow-scrolling:touch;padding-bottom:2px;}
  .w-cal-col{display:flex;flex-direction:column;gap:3px;flex:none;}
  .w-cal-c{width:11px;height:11px;border-radius:3px;background:rgba(255,255,255,.05);}
  .w-cal-c.t1{background:rgba(52,226,176,.3);}
  .w-cal-c.t2{background:rgba(52,226,176,.62);}
  .w-cal-c.t3{background:#34E2B0;box-shadow: none;}
  .w-cal-c.tf{background:transparent;}
  .w-cal-foot{display:flex;justify-content:space-between;font-family:var(--au-mono);font-size:11px;font-weight:700;color:var(--au-dim);margin-top:10px;}
  .w-cal-foot span:last-child{color:var(--au-faint);font-weight:400;}
  /* strength standards */
  .w-std{margin-bottom:13px;}
  .w-std:last-child{margin-bottom:0;}
  .w-std-top{display:flex;justify-content:space-between;align-items:baseline;gap:8px;margin-bottom:5px;}
  .w-std-name{font-size:13px;font-weight:700;color:var(--au-ivory);}
  .w-std-lvl{font-family:var(--au-mono);font-size:10px;font-weight:700;letter-spacing:.04em;color:rgb(var(--au-glow-rgb));white-space:nowrap;}
  .w-std-ratio{font-family:var(--au-mono);font-size:10px;color:var(--au-faint);}
  .w-std-track{height:7px;border-radius:4px;background:rgba(255,255,255,.07);overflow:hidden;}
  .w-std-fill{height:100%;border-radius:4px;background:linear-gradient(90deg,#18C8C0,#34E2B0);}

  /* per-exercise tools (reorder / remove) */
  .w-ex-tools{display:flex;gap:5px;align-items:center;flex-shrink:0;}
  .w-itool{width:30px;height:30px;border-radius:8px;border:1px solid var(--au-line);background:rgba(255,255,255,.04);color:var(--au-dim);font-size:13px;line-height:1;cursor:pointer;display:grid;place-items:center;-webkit-tap-highlight-color:transparent;}
  .w-itool:active{background:rgba(255,255,255,.1);}
  .w-itool.del{color:var(--au-rose);}
  /* drag-to-reorder grip + lifted state */
  .w-grip{width:34px;height:30px;border-radius:8px;border:1px solid var(--au-line);background:rgba(255,255,255,.04);color:var(--au-dim);font-size:15px;line-height:1;cursor:grab;display:grid;place-items:center;touch-action:none;-webkit-tap-highlight-color:transparent;flex-shrink:0;user-select:none;}
  .w-grip:active{cursor:grabbing;background:rgba(255,255,255,.1);}
  .w-dragging{z-index:20!important;box-shadow:0 14px 34px rgba(0,0,0,.55);opacity:.97;transition:none!important;position:relative;}
  /* per-side toggle */
  .w-side{font-family:var(--au-mono);font-size:9.5px;font-weight:700;letter-spacing:.05em;text-transform:uppercase;padding:7px 11px;border-radius:999px;border:1px solid var(--au-line);background:rgba(255,255,255,.04);color:var(--au-faint);cursor:pointer;margin-bottom:8px;-webkit-tap-highlight-color:transparent;}
  .w-side.on{background:rgba(155,140,255,.16);border-color:rgba(155,140,255,.5);color:#9B8CFF;}
  /* per-exercise note */
  .w-note{display:block;width:100%;background:rgba(255,255,255,.03);border:1px dashed var(--au-line);border-radius:9px;padding:8px 11px;color:var(--au-dim);font-family:var(--au-serif);font-style:italic;font-size:13px;outline:none;margin:2px 0 9px;line-height:1.5;min-height:40px;resize:vertical;white-space:pre-wrap;-webkit-appearance:none;}
  .w-note:focus{border-color:rgba(var(--au-glow-rgb),.5);color:var(--au-ivory);background:rgba(255,255,255,.05);}
  .w-note::placeholder{color:var(--au-faint);}
  /* swipe-to-delete a set */
  .w-set-wrap{position:relative;overflow:hidden;border-radius:10px;margin-bottom:7px;}
  .w-set-wrap .w-set{margin-bottom:0;background:#0a0c11;border-radius:10px;padding:5px 6px;position:relative;z-index:1;transition:transform .18s ease;}
  .w-set-wrap .w-set.swiping{transition:none;}
  .w-set-del{position:absolute;inset:0;display:flex;align-items:center;justify-content:flex-end;padding-right:18px;background:linear-gradient(90deg,rgba(255,107,139,.15),rgba(255,107,139,.92));color:#240007;font-family:var(--au-mono);font-size:11px;font-weight:800;letter-spacing:.08em;text-transform:uppercase;border-radius:10px;}
  .w-hist-note{font-family:var(--au-serif);font-style:italic;font-size:11.5px;color:var(--au-faint);padding:1px 0 5px;}

  /* active header */
  .w-active-bar{position:sticky;top:0;z-index:5;background:rgba(7,8,11,.86);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);border-bottom:1px solid var(--au-line);margin:-22px -16px 16px;padding:calc(14px + env(safe-area-inset-top)) 16px 12px;display:flex;align-items:center;justify-content:space-between;gap:10px;}
  .w-timer{font-family:var(--au-mono);font-size:22px;font-weight:700;color:var(--au-ivory);letter-spacing:-.02em;}
  .w-timer-lbl{font-family:var(--au-mono);font-size:8px;letter-spacing:.12em;text-transform:uppercase;color:var(--au-faint);}
  .w-finish{font-family:var(--au-sans);font-weight:700;font-size:13px;color:#04130D;background:var(--au-gradient);border:none;border-radius:999px;padding:9px 18px;cursor:pointer;}
  .w-cancel{font-family:var(--au-mono);font-size:10px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:var(--au-rose);background:rgba(255,107,139,.1);border:1px solid rgba(255,107,139,.3);border-radius:999px;padding:8px 13px;cursor:pointer;-webkit-tap-highlight-color:transparent;}

  .w-card{background:var(--au-glass);border:1px solid var(--au-line);border-radius:16px;padding:14px 16px;margin-bottom:12px;position:relative;overflow:hidden;transition:transform .16s ease;}
  .w-card::before{content:'';position:absolute;top:0;left:8%;right:8%;height:1px;background:linear-gradient(90deg,transparent,rgba(var(--au-glow-rgb),.4),transparent);}

  /* rest timer bar */
  /* inline rest timer — appears right under the set you just finished */
  .w-rest-inline{display:flex;align-items:center;gap:10px;margin-top:11px;
    background:rgba(var(--au-glow-rgb),.1);border:1px solid rgba(var(--au-glow-rgb),.45);border-radius:12px;padding:11px 14px;
    box-shadow: none;animation:wRestIn .25s ease both;}
  @keyframes wRestIn{from{opacity:0;transform:translateY(-6px)}to{opacity:1;transform:none}}
  .w-rest-inline.done{background:rgba(52,226,176,.18);border-color:rgba(52,226,176,.75);box-shadow: none;}
  .w-rest-time{font-family:var(--au-mono);font-size:22px;font-weight:700;color:rgb(var(--au-glow-rgb));min-width:58px;letter-spacing:-.02em;}
  .w-rest-lbl{font-family:var(--au-mono);font-size:9px;letter-spacing:.1em;text-transform:uppercase;color:var(--au-faint);flex:1;}
  .w-rest-btn{font-family:var(--au-mono);font-size:11px;font-weight:700;color:var(--au-dim);background:rgba(255,255,255,.06);border:1px solid var(--au-line);border-radius:8px;padding:7px 11px;cursor:pointer;-webkit-tap-highlight-color:transparent;}

  /* rest config */
  .w-restcfg{display:flex;align-items:center;justify-content:center;gap:7px;width:100%;margin-bottom:14px;font-family:var(--au-mono);font-size:11px;letter-spacing:.04em;color:var(--au-faint);background:rgba(255,255,255,.04);border:1px solid var(--au-line);border-radius:12px;padding:11px;cursor:pointer;-webkit-tap-highlight-color:transparent;}
  .w-restcfg b{color:rgb(var(--au-glow-rgb));font-size:13px;}
  .w-presets{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin:10px 0 4px;}
  .w-preset{padding:15px 6px;border-radius:12px;border:1px solid var(--au-line);background:rgba(255,255,255,.04);color:var(--au-ivory);font-family:var(--au-mono);font-size:16px;font-weight:700;cursor:pointer;-webkit-tap-highlight-color:transparent;}
  .w-preset.on{background:rgb(var(--au-glow-rgb));color:#04130D;border-color:transparent;box-shadow: none;}

  /* compact rest popup — also a top-layer <dialog>, centered to the viewport */
  .w-modal{position:fixed;z-index:71;inset:0;margin:auto;width:min(320px,86vw);height:max-content;
    background:#0c0e13;border:1px solid rgba(var(--au-glow-rgb),.32);border-radius:20px;padding:22px 20px;color:var(--au-ivory);
    box-shadow: 0 24px 60px rgba(0,0,0,.6);
    opacity:0;transform:scale(.92);transition:opacity .18s,transform .26s cubic-bezier(.34,1.5,.5,1);text-align:center;}
  .w-modal::backdrop{background:rgba(3,4,6,.55);}
  .w-modal.on{opacity:1;transform:scale(1);}
  .w-modal-title{font-family:var(--au-serif);font-style:italic;font-size:23px;color:var(--au-ivory);}
  .w-modal-sub{font-family:var(--au-mono);font-size:9px;letter-spacing:.1em;text-transform:uppercase;color:var(--au-faint);margin:3px 0 18px;}
  .w-modal-time{display:flex;align-items:flex-start;justify-content:center;gap:8px;margin-bottom:16px;}
  .w-modal-col{display:flex;flex-direction:column;align-items:center;gap:5px;}
  .w-modal-in{width:84px;background:rgba(255,255,255,.05);border:1px solid var(--au-line);border-radius:14px;padding:14px 4px;color:var(--au-ivory);font-family:var(--au-mono);font-size:38px;font-weight:700;text-align:center;outline:none;-webkit-appearance:none;}
  .w-modal-in:focus{border-color:rgba(var(--au-glow-rgb),.6);background:rgba(var(--au-glow-rgb),.06);}
  .w-modal-unit{font-family:var(--au-mono);font-size:8px;letter-spacing:.12em;text-transform:uppercase;color:var(--au-faint);}
  .w-modal-colon{font-family:var(--au-mono);font-size:34px;font-weight:700;color:var(--au-faint);line-height:1.6;}
  .w-modal-quick{display:flex;gap:6px;justify-content:center;margin-bottom:18px;flex-wrap:wrap;}
  .w-modal-chip{font-family:var(--au-mono);font-size:11px;font-weight:700;color:var(--au-dim);background:rgba(255,255,255,.05);border:1px solid var(--au-line);border-radius:999px;padding:7px 12px;cursor:pointer;-webkit-tap-highlight-color:transparent;}
  .w-modal-chip:active{background:rgba(var(--au-glow-rgb),.2);color:var(--au-ivory);}

  /* progression targets */
  .w-target{font-family:var(--au-serif);font-style:italic;font-size:12.5px;color:var(--au-dim);margin:2px 0 6px;line-height:1.35;}
  .w-target b{color:rgb(var(--au-glow-rgb));font-style:normal;font-family:var(--au-mono);font-size:11px;}
  .w-set.beat .w-check{background:var(--au-amber)!important;color:#04130D!important;border-color:transparent!important;box-shadow: none;}
  /* stats / progress */
  .w-stat-card{display:flex;align-items:center;gap:12px;background:var(--au-glass);border:1px solid var(--au-line);border-radius:14px;padding:13px 15px;margin-bottom:9px;cursor:pointer;width:100%;text-align:left;-webkit-tap-highlight-color:transparent;}
  .w-stat-card:active{border-color:rgba(var(--au-glow-rgb),.3);}
  .w-stat-main{flex:1;min-width:0;}
  .w-stat-name{font-weight:700;font-size:14px;color:var(--au-ivory);line-height:1.2;}
  .w-stat-pr{font-family:var(--au-mono);font-size:10px;color:var(--au-faint);margin-top:3px;letter-spacing:.03em;}
  .w-stat-pr b{color:var(--au-amber);}
  .w-spark{display:flex;align-items:flex-end;gap:2px;height:30px;width:72px;flex-shrink:0;}
  .w-spark-b{flex:1;background:rgba(var(--au-glow-rgb),.3);border-radius:2px 2px 0 0;min-height:3px;}
  .w-spark-b.last{background:rgb(var(--au-glow-rgb));box-shadow: none;}
  .w-prgrid{display:flex;gap:16px;margin:6px 0 14px;}
  .w-prstat{font-family:var(--au-mono);font-size:10px;color:var(--au-faint);text-transform:uppercase;letter-spacing:.05em;}
  .w-prstat b{display:block;color:var(--au-ivory);font-size:19px;letter-spacing:-.01em;margin-bottom:2px;}
  .w-chartcap{display:flex;justify-content:space-between;font-family:var(--au-mono);font-size:9px;letter-spacing:.05em;color:var(--au-faint);text-transform:uppercase;margin-top:6px;}
  /* weekly volume by muscle */
  .w-vol-card{position:relative;background:var(--au-glass);border:1px solid var(--au-line);border-radius:16px;padding:16px 17px;margin-bottom:14px;overflow:hidden;}
  .w-vol-card::before{content:'';position:absolute;top:0;left:8%;right:8%;height:1px;background:linear-gradient(90deg,transparent,rgba(var(--au-glow-rgb),.5),transparent);}
  .w-vol-hd{font-family:var(--au-serif);font-style:italic;font-size:19px;color:var(--au-ivory);}
  .w-vol-sub{font-family:var(--au-mono);font-size:9px;letter-spacing:.06em;text-transform:uppercase;color:var(--au-faint);margin:3px 0 15px;}
  .w-vol-row{display:flex;align-items:center;gap:10px;margin-bottom:11px;}
  .w-vol-row:last-child{margin-bottom:0;}
  .w-vol-name{font-family:var(--au-mono);font-size:11px;font-weight:700;letter-spacing:.04em;text-transform:uppercase;color:var(--au-dim);width:78px;flex-shrink:0;}
  .w-vol-track{flex:1;height:8px;background:rgba(255,255,255,.07);border-radius:4px;overflow:hidden;}
  .w-vol-fill{height:100%;border-radius:4px;transition:width .5s ease;}
  .w-vol-val{font-family:var(--au-mono);font-size:11px;font-weight:700;color:var(--au-ivory);width:50px;text-align:right;}

  /* workout-complete celebration */
  .w-done{position:relative;}
  .w-done-hero{text-align:center;padding:4px 0 2px;position:relative;}
  .w-done-hero .nova{width:78px;height:78px;margin:0 auto 8px;}
  .w-done-eyebrow{font-family:var(--au-mono);font-size:9px;font-weight:700;letter-spacing:.22em;text-transform:uppercase;color:rgba(var(--au-glow-rgb),.85);}
  .w-done-title{font-family:var(--au-serif);font-style:italic;font-weight:400;font-size:clamp(32px,9vw,44px);color:var(--au-ivory);line-height:1.02;letter-spacing:-.01em;margin:5px 0 3px;}
  .w-done-name{font-family:var(--au-mono);font-size:10.5px;letter-spacing:.08em;text-transform:uppercase;color:var(--au-faint);}
  .w-done-stats{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin:20px 0 4px;}
  .w-done-tile{position:relative;background:var(--au-glass);border:1px solid var(--au-line);border-radius:16px;padding:15px 8px 13px;text-align:center;overflow:hidden;animation:wTileIn .55s cubic-bezier(.16,1,.3,1) both;}
  .w-done-tile::before{content:'';position:absolute;inset:0;background:radial-gradient(70% 60% at 50% 0%,rgba(var(--au-glow-rgb),.18),transparent 72%);pointer-events:none;}
  .w-done-tile:nth-child(2){animation-delay:.09s;} .w-done-tile:nth-child(3){animation-delay:.18s;}
  .w-done-tile b{position:relative;display:block;font-family:var(--au-mono);font-size:21px;font-weight:700;color:var(--au-ivory);letter-spacing:-.02em;line-height:1.1;}
  .w-done-tile.pr b{color:var(--au-amber);}
  .w-done-tile span{position:relative;font-family:var(--au-mono);font-size:8px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:var(--au-faint);}
  @keyframes wTileIn{from{opacity:0;transform:translateY(12px);}to{opacity:1;transform:none;}}
  .w-confetti{position:absolute;left:0;right:0;top:0;height:0;pointer-events:none;z-index:3;overflow:visible;}
  .w-confetti i{position:absolute;top:0;width:7px;height:12px;border-radius:2px;opacity:0;animation:wConf 1.6s cubic-bezier(.2,.6,.4,1) forwards;}
  @keyframes wConf{0%{opacity:0;transform:translateY(-14px) rotate(0deg);}12%{opacity:1;}100%{opacity:0;transform:translateY(260px) rotate(460deg);}}

  /* history */
  .w-hist{background:var(--au-glass);border:1px solid var(--au-line);border-radius:16px;padding:15px 16px;margin-bottom:11px;}
  .w-hist-top{display:flex;align-items:baseline;justify-content:space-between;gap:8px;}
  .w-hist-name{font-family:var(--au-serif);font-style:italic;font-size:19px;color:var(--au-ivory);}
  .w-hist-date{font-family:var(--au-mono);font-size:10px;color:var(--au-faint);text-transform:uppercase;letter-spacing:.05em;}
  .w-hist-stats{display:flex;gap:16px;margin:9px 0 10px;}
  .w-hist-stat{font-family:var(--au-mono);font-size:11px;color:var(--au-dim);}
  .w-hist-stat b{color:var(--au-ivory);}
  .w-hist-stat.pr b{color:var(--au-amber);}
  .w-hist-row{display:flex;justify-content:space-between;font-size:12.5px;color:var(--au-dim);padding:3px 0;}
  .w-hist-row .nm{color:var(--au-ivory);}
  .w-hist-row .bs{font-family:var(--au-mono);color:var(--au-faint);}

  /* picker */
  .w-mchips{display:flex;flex-wrap:wrap;gap:6px;margin:2px 0 8px;}
  .w-mchip{font-family:var(--au-mono);font-size:10px;font-weight:700;letter-spacing:.04em;text-transform:uppercase;padding:7px 11px;border-radius:999px;border:1px solid var(--au-line);background:rgba(255,255,255,.04);color:var(--au-faint);cursor:pointer;-webkit-tap-highlight-color:transparent;}
  .w-mchip.on{background:rgba(var(--au-glow-rgb),.16);border-color:rgba(var(--au-glow-rgb),.4);color:var(--au-ivory);}
  .w-fedit{background:rgba(255,255,255,.05);border:1px solid var(--au-line);color:var(--au-faint);width:26px;height:26px;border-radius:8px;font-size:11px;cursor:pointer;-webkit-tap-highlight-color:transparent;flex-shrink:0;}
  .w-fedit:active{background:rgba(255,255,255,.12);color:var(--au-ivory);}
  .w-search{width:100%;background:rgba(255,255,255,.05);border:1px solid var(--au-line);border-radius:12px;padding:12px 14px;color:var(--au-ivory);font-family:var(--au-sans);font-size:15px;outline:none;margin-bottom:6px;}
  .w-search:focus{border-color:rgba(var(--au-glow-rgb),.5);}
  .w-pick{display:flex;align-items:center;gap:12px;padding:12px 4px;border:none;border-top:1px solid var(--au-line);background:none;width:100%;text-align:left;font:inherit;cursor:pointer;-webkit-tap-highlight-color:transparent;}
  .w-pick-name{flex:1;font-size:14px;color:var(--au-ivory);font-weight:600;}
  .w-pick-muscle{font-family:var(--au-mono);font-size:9px;letter-spacing:.06em;text-transform:uppercase;color:var(--au-faint);}
  .w-mini{font-family:var(--au-mono);font-size:10px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:rgb(var(--au-glow-rgb));background:none;border:none;cursor:pointer;padding:4px;}
  .w-del{color:var(--au-rose)!important;}
  .w-row-actions{display:flex;gap:10px;margin-top:6px;align-items:center;}
  .w-stepper{display:inline-flex;align-items:center;border:1px solid var(--au-line);border-radius:9px;overflow:hidden;}
  .w-stepper button{width:30px;height:30px;background:rgba(255,255,255,.04);border:none;color:var(--au-ivory);font-size:16px;cursor:pointer;}
  .w-stepper span{min-width:34px;text-align:center;font-family:var(--au-mono);font-size:13px;font-weight:700;color:var(--au-ivory);}

  /* ══ LUXURY LAYER — matches gym-premium-demo.html ══════════════════
     Appended overrides (same class contract, win by source order — this
     is in-file CSS refinement, NOT a cross-file overlay). Quiets the
     canvas to the demo's restrained near-black, brings the session
     stat-strip + per-exercise est-1RM badge, and refines the cards.
     Every existing element keeps its rule above; nothing is removed. */
  :root{ --au-coral:#FF8A6B; }
  body{ background:#060607; letter-spacing:.005em; }
  /* quiet, restrained canvas — subtle coral (top) + emerald (bottom) wash */
  .au-bg::before{
    background:
      radial-gradient(30% 22% at 14% 3%,  rgba(255,138,107,0.085), transparent 62%),
      radial-gradient(26% 22% at 88% 97%, rgba(63,224,176,0.05),   transparent 66%);
    filter:blur(34px);
  }
  .w-wrap{ max-width:640px; padding:20px 18px calc(86px + env(safe-area-inset-bottom)); }
  /* hero — bigger serif, training-mood coral pulse dot */
  .w-hero-title{ font-size:clamp(34px,8.4vw,52px); }
  .w-hero-eyebrow .au-dot{ background:var(--au-coral); box-shadow: none; }

  /* session stat-strip (Volume · Sets · Best 1RM · PRs) */
  .w-statstrip{ display:flex; margin:2px 0 16px; border:1px solid var(--au-line); border-radius:16px; overflow:hidden; }
  .w-statc{ flex:1; padding:12px 13px; border-right:1px solid var(--au-line); min-width:0; }
  .w-statc:last-child{ border-right:none; }
  .w-statc .k{ font-family:var(--au-mono); font-size:8.5px; letter-spacing:.16em; text-transform:uppercase; color:var(--au-faint); white-space:nowrap; }
  .w-statc .v{ font-family:var(--au-serif); font-style:italic; font-size:24px; color:var(--au-ivory); line-height:1.05; margin-top:5px; }
  .w-statc .v em{ font-style:normal; font-family:var(--au-sans); font-size:11px; color:var(--au-dim); margin-left:2px; }
  .w-statc.pr .v{ color:var(--au-amber); }

  /* per-exercise est-1RM badge (card header, right — data as hero) */
  .w-ex-1rm{ text-align:right; flex-shrink:0; padding-left:8px; }
  .w-ex-1rm .n{ font-family:var(--au-serif); font-style:italic; font-size:23px; color:var(--au-ivory); line-height:1; }
  .w-ex-1rm .l{ font-family:var(--au-mono); font-size:8px; letter-spacing:.14em; text-transform:uppercase; color:var(--au-faint); margin-top:3px; white-space:nowrap; }
  .w-ex-1rm.pr .n{ color:var(--au-amber); }

  /* refined session cards + check */
  .w-card{ border-radius:18px; padding:16px 17px 11px; }
  .w-card.donecard{ opacity:.7; }
  .w-check{ border-radius:9px; }

  /* ── Workout LANDING tab — premium ── */
  .w-hero-sub{ font-family:var(--au-mono); font-size:11px; letter-spacing:.03em; color:var(--au-faint); margin-top:10px; }
  .w-hero-sub b{ color:var(--au-dim); font-weight:700; }
  /* line icons inside buttons */
  .w-ic{ width:16px; height:16px; flex:none; }
  .w-btn-ghost .w-ic{ width:15px; height:15px; opacity:.85; }
  /* primary buttons — slightly calmer, tighter radius */
  .w-btn{ border-radius:15px; letter-spacing:.005em; }
  .w-btn-resume{ background:var(--au-amber); box-shadow: none; color:#231400; margin-bottom:10px; }
  .w-btn-import{ display:flex; text-decoration:none; margin-top:8px; }
  /* seg nav — quieter surface */
  .w-seg{ background:rgba(255,255,255,.03); }
  /* today card — restrained premium hero */
  .w-today{ background:linear-gradient(140deg, rgba(var(--au-glow-rgb),.11), rgba(255,255,255,.014)); border-color:rgba(var(--au-glow-rgb),.26); border-radius:20px; padding:18px 18px; }
  .w-today-day{ letter-spacing:.2em; }
  .w-today-name{ font-size:28px; margin:6px 0 5px; }
  .w-today .w-mini{ color:var(--au-faint); letter-spacing:.08em; }
  /* folder header — refined */
  .w-folder{ margin:26px 0 12px; }
  .w-folder-name{ font-size:20px; }
  .w-folder-count{ font-family:var(--au-mono); font-size:9px; font-weight:700; letter-spacing:.12em; padding:3px 8px; border:1px solid var(--au-line); border-radius:999px; color:var(--au-faint); }
  .w-fedit{ display:grid; place-items:center; }
  .w-fedit-ic{ width:13px; height:13px; }
  /* template cards — premium, data-as-hero identity */
  .w-tpls{ gap:11px; }
  .w-tpl{ border-radius:18px; padding:15px 15px 14px; background:var(--au-glass); border:1px solid var(--au-line);
    transition:transform .3s cubic-bezier(.16,1,.3,1), border-color .3s, box-shadow .3s; }
  .w-tpl:hover{ border-color:rgba(var(--au-glow-rgb),.3); box-shadow:0 12px 34px rgba(0,0,0,.42); }
  .w-tpl:active{ transform:scale(.98); }
  .w-tpl-top{ display:flex; align-items:center; justify-content:space-between; margin-bottom:12px; }
  .w-tpl-ic{ width:19px; height:19px; color:var(--au-faint); transition:color .3s; }
  .w-tpl:hover .w-tpl-ic{ color:rgb(var(--au-glow-rgb)); }
  .w-tpl-count{ font-family:var(--au-mono); font-size:13px; font-weight:700; color:var(--au-ivory); }
  .w-tpl-count em{ font-style:normal; font-size:8.5px; letter-spacing:.1em; text-transform:uppercase; color:var(--au-faint); margin-left:3px; }
  .w-tpl-name{ font-family:var(--au-serif); font-style:italic; font-weight:400; font-size:19px; color:var(--au-ivory); margin-bottom:6px; line-height:1.12; }
  .w-tpl-ex{ min-height:44px; line-height:1.5; }
  .w-tpl-meta{ display:flex; align-items:center; gap:5px; }
  .w-tpl-mic{ width:12px; height:12px; opacity:.85; flex:none; }
</style>
</head>
<body data-page="fitness" class="au-bg au-mood-hot" id="root">

<div class="w-wrap" id="wWrap"></div>

<dialog class="w-sheet" id="wSheet"></dialog>

<dialog class="w-modal" id="wModal">
  <div class="w-modal-title">Rest between sets</div>
  <div class="w-modal-sub">Set your own time</div>
  <div class="w-modal-time">
    <div class="w-modal-col"><input id="wRmMin" class="w-modal-in" type="number" inputmode="numeric" min="0" max="30" value="3"><span class="w-modal-unit">min</span></div>
    <span class="w-modal-colon">:</span>
    <div class="w-modal-col"><input id="wRmSec" class="w-modal-in" type="number" inputmode="numeric" min="0" max="59" value="00"><span class="w-modal-unit">sec</span></div>
  </div>
  <div class="w-modal-quick">
    <button type="button" class="w-modal-chip" data-act="rest-pick" data-val="60">1:00</button>
    <button type="button" class="w-modal-chip" data-act="rest-pick" data-val="90">1:30</button>

function exHistoryByPos(exId){
  var byPos={};
  workouts().slice().sort(function(a,b){return (a.startedAt||'')<(b.startedAt||'')?-1:1;}).forEach(function(w){
    var idx=-1; (w.entries||[]).forEach(function(e,i){ if(idx<0 && e.exId===exId) idx=i; });
    if(idx<0) return;
    var en=w.entries[idx], pos=idx+1, best=0, bw=null;
    workSets(en.sets).forEach(function(s){ if((+s.kg||0)>0 && (+s.reps||0)>0){ var v=e1rm(s.kg,s.reps); if(v>best){ best=v; bw=s; } } });

}

/* HOME */
var DOW_FULL=['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
function getSchedule(){ return (ls('po_coach_v1',{})||{}).schedule||{}; }
function todayTpl(){ var id=getSchedule()[String(new Date().getDay())]; if(!id) return null; return templates().find(function(t){return t.id===id;})||null; }
function renderHome(){
  view='home';
  var active=getActive();
  /* sessions logged in the last 7 days — hero context */
  var now=Date.now();
  var wkCount=workouts().filter(function(w){ return w.date && (now-new Date(w.date+'T00:00:00').getTime()) < 7*86400000 && (now-new Date(w.date+'T00:00:00').getTime()) >= -86400000; }).length;
  var subTxt = wkCount ? '<b data-to="'+wkCount+'">'+wkCount+'</b> session'+(wkCount===1?'':'s')+' this week' : 'No sessions yet this week — start one below';
  var html='<div class="w-hero"><div>'+
    '<div class="au-eyebrow w-hero-eyebrow"><span class="au-dot"></span>FITNESS</div>'+
    '<h1 class="w-hero-title">Train.</h1>'+
    '<div class="w-hero-sub">'+subTxt+'</div></div>'+novaSvg()+'</div>';
  html+=segHTML('home');
  if(active){ html+='<button class="w-btn w-btn-resume" onclick="resumeActive()">'+wIcon('play')+' Resume workout in progress</button>'; }
  /* Today — what's scheduled for this weekday */
  (function(){
    var tt=todayTpl(); var sched=getSchedule(); var hasSched=Object.keys(sched).length>0;
    var dn=DOW_FULL[new Date().getDay()];
    if(tt){
      var names=tt.items.map(function(it){return exById(it.exId).name;});
      html+='<div class="w-today"><div class="w-today-day">'+esc(dn)+' · today</div>'+
        '<div class="w-today-name">'+esc(tt.name)+'</div>'+
        '<div class="w-today-ex">'+esc(names.slice(0,4).join(' · '))+(names.length>4?' …':'')+'</div>'+
        '<button class="w-btn" style="margin-top:14px;" onclick="startFromTpl(\''+tt.id+'\')">'+wIcon('play')+' Start '+esc(tt.name)+'</button>'+
        '<button type="button" class="w-mini" style="margin-top:11px;display:block;" onclick="openSchedule()">Edit weekly schedule</button></div>';
    } else if(hasSched){
      html+='<div class="w-today w-today-rest"><div class="w-today-day">'+esc(dn)+'</div>'+
        '<div class="w-today-name">Rest day</div>'+
        '<div class="w-today-ex">Nothing scheduled — recover, or start anything below.</div>'+
        '<button type="button" class="w-mini" style="margin-top:11px;display:block;" onclick="openSchedule()">Edit weekly schedule</button></div>';
    } else if(templates().length){
      html+='<button type="button" class="w-btn-ghost" style="margin-bottom:10px;" onclick="openSchedule()">'+wIcon('cal')+' Plan your week — schedule your sessions</button>';
    }
  })();
  html+='<button class="w-btn" onclick="startEmpty()">'+wIcon('plus')+' Start an empty workout</button>';
  html+='<div style="display:flex;gap:8px;margin-top:8px;">'+
    '<button class="w-btn-ghost" style="margin:0;" onclick="editTemplate(null)">'+wIcon('plus')+' New template</button>'+
    '<button class="w-btn-ghost" style="margin:0;" onclick="newFolder()">'+wIcon('folder')+' New folder</button></div>';
  html+='<a class="w-btn-ghost w-btn-import" href="import-strong.html">'+wIcon('down')+' Import history from Strong</a>';
  var fs=folders(), tpls=templates();
  var ORDER={'f-cbas':0,'f-ul':1,'f-ppl':2};
  fs.sort(function(a,b){ return (ORDER[a.id]==null?99:ORDER[a.id])-(ORDER[b.id]==null?99:ORDER[b.id]); });
  fs.forEach(function(f){
    var list=tpls.filter(function(t){return t.folderId===f.id;});
    html+='<div class="w-folder"><span class="w-folder-name">'+esc(f.name)+'</span><span class="w-folder-count">'+list.length+'</span><button type="button" class="w-fedit" onclick="editFolder(\''+f.id+'\')" aria-label="Edit folder">'+wIcon('pen','w-fedit-ic')+'</button><span class="w-folder-line"></span></div>';
    if(!list.length){ html+='<div class="w-empty" style="font-size:13px;padding:10px 0;">No templates here yet.</div>'; }
    else { html+='<div class="w-tpls">'+list.map(tplCard).join('')+'</div>'; }
  });
  var orphan=tpls.filter(function(t){return !fs.find(function(f){return f.id===t.folderId;});});
  if(orphan.length){ html+='<div class="w-folder"><span class="w-folder-name">My templates</span><span class="w-folder-count">'+orphan.length+'</span><span class="w-folder-line"></span></div><div class="w-tpls">'+orphan.map(tplCard).join('')+'</div>'; }
  W.innerHTML=html;
}
function tplCard(t){
  var names=t.items.map(function(it){return exById(it.exId).name;});
  var preview=names.slice(0,4).join(', ')+(names.length>4?' …':'');
  var last=lastDoneForTpl(t.id);
  return '<button class="w-tpl" onclick="openTpl(\''+t.id+'\')">'+
    '<div class="w-tpl-top">'+wIcon('dumbbell','w-tpl-ic')+'<span class="w-tpl-count">'+t.items.length+'<em>ex</em></span></div>'+
    '<div class="w-tpl-name">'+esc(t.name)+'</div>'+
    '<div class="w-tpl-ex">'+esc(preview)+'</div>'+
    '<div class="w-tpl-meta">'+(last? wIcon('ref','w-tpl-mic')+relDate(last) : 'never done')+'</div></button>';
}
function lastDoneForTpl(id){
  var ws=workouts().filter(function(w){return w.templateId===id;}).sort(function(a,b){return (b.startedAt||'')<(a.startedAt||'')?-1:1;});
  return ws[0]?ws[0].date:null;
}
/* Weekly schedule editor — assign a template (or rest) to each weekday */
window.openSchedule=function(){
  var tpls=templates(); var sched=getSchedule();
  var html='<div class="w-sheet-grip"></div><div class="w-sheet-hd"><div class="w-sheet-title">Weekly schedule</div><button class="w-x" onclick="closeSheet()">✕</button></div>'+
    '<div class="w-sheet-sub">Pick a session for each day · it greets you as “today”</div>';
  if(!tpls.length){ html+='<div class="w-empty" style="font-size:14px;">Make a template first, then schedule it here.</div>'; openSheet(html); return; }
  var todayIdx=new Date().getDay();
  html+=DOW_FULL.map(function(dn,i){
    var cur=sched[String(i)]||'';
    var opts='<option value="">Rest day</option>'+tpls.map(function(t){return '<option value="'+t.id+'"'+(cur===t.id?' selected':'')+'>'+esc(t.name)+'</option>';}).join('');
    return '<div class="w-setrow"><span class="w-setrow-name"'+(i===todayIdx?' style="color:rgb(var(--au-glow-rgb));"':'')+'>'+dn.slice(0,3)+'</span><select class="w-sched-sel" onchange="setScheduleDay('+i+',this.value)">'+opts+'</select></div>';
  }).join('');
  html+='<button class="w-btn" style="margin-top:16px;" onclick="closeSheet();render();">Done</button>';
  openSheet(html);
};
window.setScheduleDay=function(i,val){ var cv=ls('po_coach_v1',{})||{}; cv.schedule=cv.schedule||{}; if(val) cv.schedule[String(i)]=val; else delete cv.schedule[String(i)]; save('po_coach_v1',cv); };

/* TEMPLATE DETAIL */
function openTpl(id){
  var t=templates().find(function(x){return x.id===id;}); if(!t)return;
  var last=lastDoneForTpl(id);
  var html='<div class="w-sheet-grip"></div>'+
    '<div class="w-sheet-hd"><div class="w-sheet-title">'+esc(t.name)+'</div><button class="w-x" onclick="closeSheet()">✕</button></div>'+
    '<div class="w-sheet-sub">'+(last?'Last done '+relDate(last):'Never done yet')+' · '+t.items.length+' exercises</div>';
  t.items.forEach(function(it){
    var ex=exById(it.exId); var le=lastEntryFor(it.exId);
    var lastTxt = le ? ('Last: '+bestSetTxt(le)) : '';
    html+='<div class="w-ex"><div class="w-ex-dot">'+it.sets+'×</div><div class="w-ex-main">'+
      '<div class="w-ex-name">'+esc(ex.name)+'</div><div class="w-ex-muscle">'+esc(ex.muscle)+'</div>'+
      (lastTxt?'<div class="w-ex-last">'+esc(lastTxt)+'</div>':'')+'</div></div>';
  });
  html+='<button class="w-btn" style="margin-top:18px;" onclick="startFromTpl(\''+id+'\')">Start Workout</button>'+
    '<button class="w-btn-ghost" style="margin-top:8px;" onclick="editTemplate(\''+id+'\')">Edit template</button>';
  openSheet(html);
}

/* ACTIVE WORKOUT */
function startEmpty(){ if(window.ALSPush){ window.ALSPush.enable(); } else requestNotify(); ensureAudio(); setActive({ id:uid(), name:'Quick Workout', templateId:null, startedAt:new Date().toISOString(), entries:[] }); go('active'); }
function startFromTpl(id){
  var t=templates().find(function(x){return x.id===id;}); if(!t)return;
  if(window.ALSPush){ window.ALSPush.enable(); } else requestNotify(); ensureAudio();
  var entries=t.items.map(function(it){
    var ex=exById(it.exId); var le=lastEntryFor(it.exId); var tm=isTime(ex); var sets=[];
    for(var i=0;i<it.sets;i++){ var prev = le && le.sets[i];
      if(tm) sets.push({ secs: prev&&prev.secs?prev.secs:'', done:false });
      else sets.push({ kg: prev?prev.kg:'', reps: prev?prev.reps:'', done:false }); }
    return { exId:it.exId, name:ex.name, muscle:ex.muscle, kind:tm?'time':'weight', note:exNote(it.exId), perSide:tm?false:exPerSide(it.exId), sets:sets };
  });
  setActive({ id:uid(), name:t.name, templateId:id, startedAt:new Date().toISOString(), entries:entries });
  closeSheet(); go('active');
}
function resumeActive(){ go('active'); }

var timerInt=null;
/* Keep the screen awake during an active workout (iOS 16.4+ / Android).
   Re-acquired on foreground because the OS auto-releases it when backgrounded. */
var _wakeLock=null;
function acquireWake(){ try{ if(_wakeLock || !('wakeLock' in navigator) || document.visibilityState!=='visible') return;
  navigator.wakeLock.request('screen').then(function(wl){ _wakeLock=wl; try{ wl.addEventListener('release',function(){ _wakeLock=null; }); }catch(e){} }).catch(function(){}); }catch(e){} }
function releaseWake(){ try{ if(_wakeLock){ var w=_wakeLock; _wakeLock=null; if(w.release) w.release().catch(function(){}); } }catch(e){} }

function rpeEnabled(){ return !!(ls('po_coach_v1',{})||{}).trackRpe; }
/* live estimated-1RM line that updates as you type (PR-pace aware) */
function liveE1rmText(en, a){
  var allTime=bestE1rmFor(en.exId, a.id);
  var best=0, bw=null;
  (en.sets||[]).forEach(function(s){ if(isWarm(s)) return; var k=+s.kg||0, r=+s.reps||0; if(k>0&&r>0){ var v=e1rm(k,r); if(v>best){ best=v; bw=s; } } });
  if(best<=0) return '<span class="w-live-dim">Fill a set to see your estimated 1RM</span>';
  var t='Top set <b>'+(bw.kg)+'kg × '+(+bw.reps||0)+'</b> · est 1RM <b>'+Math.round(best)+'kg</b>';
  if(allTime>0){ if(best>allTime) t+=' · <span class="w-live-pr">PR pace +'+Math.round(best-allTime)+'kg</span>';
                 else t+=' · <span class="w-live-off">'+Math.round(allTime-best)+'kg off your best</span>'; }
  return t;
}
/* one exercise card's inner HTML — used by the full render AND by paintCard
   (targeted single-card repaint) so a set toggle never rebuilds the whole list */
function entryCardHTML(en, ei, a){
  var tm=isTime(en);
  /* est-1RM badge — this session's best done working set, else all-time best (data as hero) */
  var _at=bestE1rmFor(en.exId,a.id), _sess=0;
  if(!tm){ (en.sets||[]).forEach(function(s){ if(s.done && !isWarm(s)){ var v=e1rm(s.kg,s.reps); if(v>_sess)_sess=v; } }); }
  var _show=_sess||_at, _pr=_sess>0&&_at>0&&_sess>_at;
  var badge = (!tm && _show>0) ? '<div class="w-ex-1rm'+(_pr?' pr':'')+'"><div class="n" data-to="'+Math.round(_show)+'">'+Math.round(_show)+'</div><div class="l">'+(_pr?'PR · 1RM':'est 1RM')+'</div></div>' : '';
  var html='<div class="w-ex" style="border:none;padding:0 0 4px;">'+
    '<div class="w-ex-dot" style="background:rgba(var(--au-glow-rgb),.15);color:rgb(var(--au-glow-rgb));">'+esc((en.muscle||'?').slice(0,2).toUpperCase())+'</div>'+
    '<div class="w-ex-main" data-exhist="'+esc(en.exId)+'" onclick="editEntryEx('+ei+')" style="cursor:pointer;"><div class="w-ex-name">'+esc(en.name)+' <span class="w-ex-editpen">✎ · hold for history</span></div><div class="w-ex-muscle">'+esc(en.muscle)+(en.perSide?' &middot; per side':'')+'</div></div>'+
    badge+
    '<div class="w-ex-tools">'+
      (a.entries.length>1?'<span class="w-grip" data-drag="active" aria-label="Drag to reorder" title="Drag to reorder">&#8801;</span>':'')+
      '<button type="button" class="w-itool del" onclick="removeEx('+ei+')" aria-label="Remove">✕</button>'+
    '</div></div>';
  html+='<textarea class="w-note" rows="2" placeholder="Sticky note — stays on this exercise…" oninput="setNote('+ei+',this.value)">'+esc(en.note||'')+'</textarea>';
  if(tm){
    var lastT=lastTimeFor(en.exId);
    html+='<div class="w-target">'+(lastT?'Last time <b>'+fmtMMSS(lastT)+'</b> &middot; beat it':'Log your time — minutes (e.g. 20) or mm:ss.')+'</div>';
    html+='<div class="w-set-head" style="grid-template-columns:38px 1fr 44px;"><span>SET</span><span>TIME · MIN:SEC</span><span></span></div>';
    en.sets.forEach(function(s,si){
      html+='<div class="w-set-wrap" data-ei="'+ei+'" data-si="'+si+'"><div class="w-set-del">Delete</div>'+
        '<div class="w-set'+(s.done?' done':'')+'" style="grid-template-columns:38px 1fr 44px;">'+
        '<span class="w-set-num">'+(si+1)+'</span>'+
        '<input class="w-in" type="text" inputmode="text" placeholder="0:00" value="'+(s.secs?fmtMMSS(s.secs):'')+'" onchange="setTime('+ei+','+si+',this.value)">'+
        '<button class="w-check'+(s.done?' on':'')+'" onclick="toggleSet('+ei+','+si+')">✓</button></div></div>';
    });
  } else {
    var tgt=targetFor(en.exId); var allTime=bestE1rmFor(en.exId,a.id);
    var doneMax=0; en.sets.forEach(function(s){ if(s.done && !isWarm(s)){ var v=e1rm(s.kg,s.reps); if(v>doneMax)doneMax=v; } });
    /* fatigue-aware reference: if you train this lift in different slots, show what you hit when it was done in THIS slot */
    var _pos=ei+1, _byPos=exHistoryByPos(en.exId), _posVaries=Object.keys(_byPos).length>1, _bp=_byPos[_pos];
    if(_posVaries && _bp && _bp.lastSet){
      html+='<div class="w-target">When done '+ordinal(_pos)+' &middot; last best <b>'+(+_bp.lastSet.kg||0)+'kg × '+(+_bp.lastSet.reps||0)+'</b> &middot; beat it</div>';
    } else if(tgt) html+='<div class="w-target">Last best <b>'+tgt.w+'kg × '+tgt.r+'</b> &middot; beat it: '+esc(tgt.suggest)+'</div>';
    else    html+='<div class="w-target">First time logged &middot; give it a strong set &mdash; this becomes your baseline to beat. &#9733;</div>';
    html+='<div style="display:flex;gap:8px;flex-wrap:wrap;align-items:center;margin-bottom:8px;">'+
      '<button type="button" class="w-side'+(en.perSide?' on':'')+'" style="margin:0;" onclick="togglePerSide('+ei+')">'+(en.perSide?'✓ Per side (each hand counts double)':'＋ Per side / single-arm?')+'</button>'+
      '<button type="button" class="w-warm-btn" onclick="addWarmups('+ei+')">Warm-up</button></div>';
    var rpe=rpeEnabled();
    var gstyle=rpe?' style="grid-template-columns:30px 1fr 1fr 40px 40px;"':'';
    html+='<div class="w-set-head"'+gstyle+'><span>SET</span><span>'+(en.perSide?'KG/SIDE':'KG')+'</span><span>REPS</span>'+(rpe?'<span>RPE</span>':'')+'<span></span></div>';
    var wn=0;
    en.sets.forEach(function(s,si){
      var warm=isWarm(s);
      var v=e1rm(s.kg,s.reps);
      var beat = s.done && !warm && v>0 && (allTime>0 ? v>allTime : (v>=doneMax));
      var label = warm ? 'W' : (s.type==='drop' ? 'D' : String(++wn));
      html+='<div class="w-set-wrap" data-ei="'+ei+'" data-si="'+si+'"><div class="w-set-del">Delete</div>'+
        '<div class="w-set'+(s.done?' done':'')+(beat?' beat':'')+'"'+gstyle+'>'+
        '<button type="button" class="w-set-type type-'+(s.type||'work')+'" onclick="cycleType('+ei+','+si+')" title="Tap: working → warm-up → drop">'+label+'</button>'+
        '<input class="w-in" type="text" inputmode="decimal" placeholder="0" value="'+(s.kg!==''&&s.kg!=null?s.kg:'')+'" oninput="setVal('+ei+','+si+',\'kg\',this.value)">'+
        '<input class="w-in" type="text" inputmode="numeric" placeholder="0" value="'+(s.reps!==''&&s.reps!=null?s.reps:'')+'" oninput="setVal('+ei+','+si+',\'reps\',this.value)">'+
        (rpe?'<button type="button" class="w-rpe'+(s.rpe?' set':'')+'" onclick="pickRPE('+ei+','+si+')">'+(s.rpe?s.rpe:'–')+'</button>':'')+
        '<button class="w-check'+(s.done?' on':'')+'" onclick="toggleSet('+ei+','+si+')" title="'+(beat?'New PR!':'')+'">'+(beat?'★':'✓')+'</button></div></div>';
    });
    html+='<div class="w-live" id="live-'+ei+'">'+liveE1rmText(en, a)+'</div>';
  }
  html+='<button class="w-addset" onclick="addSet('+ei+')">&#65291; Add set</button>';
  if(restRunning() && ei===restCardIndex()) html+=restInlineHTML();
  return html;
}
/* repaint exactly one exercise card (no full-list rebuild → no flicker/scroll-jump) */
function paintCard(ei){
  var a=getActive(); if(!a||!a.entries[ei]) return;
  var card=W.querySelector('.w-card[data-card="'+ei+'"]');
  if(!card){ render(); return; }
  card.innerHTML=entryCardHTML(a.entries[ei], ei, a);
}
function updateLive(ei){ var a=getActive(); if(!a||!a.entries[ei]) return; var el=document.getElementById('live-'+ei); if(el) el.innerHTML=liveE1rmText(a.entries[ei], a); }
/* live session stat-strip — Volume · Sets · Best est-1RM · PRs today */
function sessionStatsHTML(a){
  var vol=0, sdone=0, stot=0, best1=0, prs=0;
  (a.entries||[]).forEach(function(en){
    var tm=isTime(en), exPr=false, at=bestE1rmFor(en.exId,a.id);
    (en.sets||[]).forEach(function(s){
      stot++; if(s.done) sdone++;
      if(!tm && s.done && !isWarm(s)){
        var k=+s.kg||0, r=+s.reps||0;
        if(k>0 && r>0){ vol += Math.round(k*r*(en.perSide?2:1)); var v=e1rm(k,r); if(v>best1)best1=v; if(at>0 && v>at) exPr=true; }
      }
    });
    if(exPr) prs++;
  });
  return '<div class="w-statc"><div class="k">Volume</div><div class="v">'+fmtBig(vol)+'<em>kg</em></div></div>'+
    '<div class="w-statc"><div class="k">Sets</div><div class="v"><span data-to="'+sdone+'">'+sdone+'</span><em>/ '+stot+'</em></div></div>'+
    '<div class="w-statc"><div class="k">Best 1RM</div><div class="v">'+(best1?'<span data-to="'+Math.round(best1)+'">'+Math.round(best1)+'</span><em>kg</em>':'—')+'</div></div>'+
    '<div class="w-statc'+(prs?' pr':'')+'"><div class="k">PRs today</div><div class="v"><span data-to="'+prs+'">'+prs+'</span></div></div>';
}
function updateStats(){ var a=getActive(); if(!a) return; var el=document.getElementById('wStats'); if(el) el.innerHTML=sessionStatsHTML(a); }
function renderActive(){
  view='active';
  var a=getActive(); if(!a){ go('home'); return; }
  var html='<div class="w-active-bar"><div><div class="w-timer" id="wTimer">0:00</div><div class="w-timer-lbl" onclick="renameActive()" style="cursor:pointer;">'+esc(a.name)+' <span class="w-ex-editpen">✎</span></div></div>'+
    '<div style="display:flex;align-items:center;gap:10px;"><button type="button" class="w-cancel" onclick="cancelActive()">✕ Discard</button><button class="w-finish" onclick="finishActive()">Finish</button></div></div>';
  html+='<div class="w-statstrip" id="wStats">'+sessionStatsHTML(a)+'</div>';
  html+='<button type="button" class="w-restcfg" data-act="rest-config">Rest between sets &middot; <b>'+fmtDur(restDefault())+'</b> &middot; tap to change</button>';
  if(!a.entries.length){ html+='<div class="w-empty">No exercises yet. Add one below.</div>'; }
  a.entries.forEach(function(en,ei){
    html+='<div class="w-card" data-card="'+ei+'">'+entryCardHTML(en,ei,a)+'</div>';
  });
  html+='<button class="w-btn-ghost" style="margin-top:6px;" onclick="pickExercise(addExToActive)">&#65291; Add exercise</button>';
  W.innerHTML=html;
  startTimer();
  acquireWake();
  if(getActive() && getActive().rest) ensureRest();
}
function startTimer(){
  clearInterval(timerInt);
  function tick(){ var a=getActive(); if(!a){clearInterval(timerInt);return;} var el=document.getElementById('wTimer'); if(el) el.textContent=fmtDur((Date.now()-new Date(a.startedAt).getTime())/1000); }
  tick(); timerInt=setInterval(tick,1000);
}
function setVal(ei,si,field,val){ var a=getActive(); if(!a)return; var s=a.entries[ei].sets[si];
  if(field==='kg') s.kg = (val===''?'':numVal(val));
  else s.reps = (val===''?'':(parseInt(val,10)||0));
  setActive(a); updateLive(ei); updateStats(); }
function setTime(ei,si,val){ var a=getActive(); if(!a)return; a.entries[ei].sets[si].secs=parseTime(val); setActive(a); paintCard(ei); updateStats(); }
function setNote(ei,val){ var a=getActive(); if(!a)return; var en=a.entries[ei]; en.note=val; setActive(a); if(en.exId) setExField(en.exId,'note',val); } /* sticky note lives on the exercise — no re-render, keep focus */
function togglePerSide(ei){ var a=getActive(); if(!a)return; var en=a.entries[ei]; en.perSide=!en.perSide; setActive(a); if(en.exId) setExField(en.exId,'perSide',en.perSide); paintCard(ei); }
function moveEx(ei,dir){ var a=getActive(); if(!a)return; var j=ei+dir; if(j<0||j>=a.entries.length)return; var t=a.entries[ei]; a.entries[ei]=a.entries[j]; a.entries[j]=t; setActive(a); render(); }
function toggleSet(ei,si){ var a=getActive(); if(!a)return;
  var prevRestEi=(a.rest&&typeof a.rest.ei==='number')?a.rest.ei:-1;
  var s=a.entries[ei].sets[si]; s.done=!s.done;
  if(s.done){ ensureAudio(); setActive(a); restStart(ei); }
  else { if(a.rest && a.rest.ei===ei){ a.rest=null; clearInterval(restInt); restInt=null; } setActive(a); }
  paintCard(ei);
  if(prevRestEi>=0 && prevRestEi!==ei) paintCard(prevRestEi);
  updateStats();
  if(s.done) animateCheck(ei,si);
}
function animateCheck(ei,si){
  var card=W.querySelector('.w-card[data-card="'+ei+'"]'); if(!card) return;
  var wrap=card.querySelector('.w-set-wrap[data-ei="'+ei+'"][data-si="'+si+'"]'); if(!wrap) return;
  var chk=wrap.querySelector('.w-check'); if(chk){ chk.classList.remove('pop'); void chk.offsetWidth; chk.classList.add('pop'); }
  var setEl=wrap.querySelector('.w-set'); if(setEl && setEl.classList.contains('beat')){ setEl.classList.remove('prflash'); void setEl.offsetWidth; setEl.classList.add('prflash'); try{ if(window.AuroraBG&&AuroraBG.flare) AuroraBG.flare(); }catch(e){} }
}
function addSet(ei){ var a=getActive(); if(!a)return; var en=a.entries[ei]; var sets=en.sets; var last=sets[sets.length-1];
  if(isTime(en)) sets.push({ secs:(last&&last.secs)?last.secs:'', done:false });
  else sets.push({ kg:last?last.kg:'', reps:last?last.reps:'', done:false });
  setActive(a); paintCard(ei); updateStats(); }
function removeSet(ei,si){ var a=getActive(); if(!a||!a.entries[ei])return; a.entries[ei].sets.splice(si,1); setActive(a); paintCard(ei); updateStats(); }
async function removeEx(ei){ var a=getActive(); if(!a)return; if(!(await ALSConfirm({title:'Remove exercise?',message:'Remove '+a.entries[ei].name+' from this workout?',confirmText:'Remove',danger:true})))return; a.entries.splice(ei,1); setActive(a); render(); }
function lastTimeFor(exId){ var le=lastEntryFor(exId); if(!le)return 0; var m=0; (le.sets||[]).forEach(function(s){ if((s.secs||0)>m)m=s.secs; }); return m; }
function addExToActive(ex){ var a=getActive(); if(!a)return; var tm=isTime(ex);
  a.entries.push({exId:ex.id,name:ex.name,muscle:ex.muscle,kind:tm?'time':'weight',note:exNote(ex.id),perSide:tm?false:exPerSide(ex.id),sets:[ tm?{secs:'',done:false}:{kg:'',reps:'',done:false} ]});
  setActive(a); closeSheet(); render(); }
async function cancelActive(){ if(!(await ALSConfirm({title:'Discard workout?',message:'Nothing will be saved.',confirmText:'Discard',danger:true})))return; clearInterval(timerInt); restSkip(); save('po_active',null); go('home'); }

async function finishActive(){
  var a=getActive(); if(!a)return;
  var entries=[]; var volume=0; var prExs=[];
  a.entries.forEach(function(en){
    if(isTime(en)){
      var ds=en.sets.filter(function(s){return s.done && (s.secs||0)>0;});
      if(!ds.length) return;
      entries.push({exId:en.exId,name:en.name,muscle:en.muscle,kind:'time',note:en.note||'',sets:ds.map(function(s){return {secs:s.secs,done:true};})});
      return;
    }
    var doneSets=en.sets.filter(function(s){return s.done && (+s.reps||0)>0;});
    if(!doneSets.length) return;
    var prevBest=bestE1rmFor(en.exId,a.id); var thisBest=0; var mult=en.perSide?2:1;
    doneSets.forEach(function(s){ if(isWarm(s)) return; volume+=(+s.kg||0)*(+s.reps||0)*mult; var v=e1rm(s.kg,s.reps); if(v>thisBest)thisBest=v; });
    if(thisBest>prevBest && prevBest>0) prExs.push(en.exId);
    entries.push({exId:en.exId,name:en.name,muscle:en.muscle,kind:'weight',perSide:!!en.perSide,note:en.note||'',sets:doneSets.map(function(s){var o={kg:+s.kg||0,reps:+s.reps||0,done:true}; if(s.type&&s.type!=='work') o.type=s.type; if(s.rpe) o.rpe=s.rpe; return o;})});
  });
  if(!entries.length){ if(!(await ALSConfirm({title:'Discard workout?',message:'No sets were checked off.',confirmText:'Discard',danger:true})))return; save('po_active',null); clearInterval(timerInt); restSkip(); go('home'); return; }
  var dur=(Date.now()-new Date(a.startedAt).getTime())/1000;
  var dk=dateKey(new Date(a.startedAt));
  var session={ id:a.id, name:a.name, templateId:a.templateId, date:dk, startedAt:a.startedAt, durationSec:Math.round(dur), entries:entries, volume:Math.round(volume), prs:prExs };
  var hist=workouts(); hist.unshift(session); save('po_workouts',hist);
  var done=ls('po_coach_workout_done',{})||{}; done[dk]=new Date().toISOString(); save('po_coach_workout_done',done);
  save('po_coach_logs:'+dk, entries.map(function(e){return {exId:e.exId,name:e.name,sets:e.sets};}));
  var srcTpl = session.templateId ? templates().find(function(x){return x.id===session.templateId;}) : null;
  var changed = tplDiffers(srcTpl, entries);
  save('po_active',null); clearInterval(timerInt); restSkip(); releaseWake();
  showSummary(session, srcTpl, changed);
}
/* did the workout deviate from the template it started from? */
function tplDiffers(tpl, entries){
  if(!tpl) return entries.length>0;
  if((tpl.items||[]).length!==entries.length) return true;
  for(var i=0;i<entries.length;i++){ if(tpl.items[i].exId!==entries[i].exId) return true; if((tpl.items[i].sets||0)!==workSets(entries[i].sets).length) return true; }
  return false;
}
window.updateTplFromSession=async function(){ var s=window.__lastSession; if(!s||!s.templateId)return; var list=templates(); var idx=list.findIndex(function(x){return x.id===s.templateId;}); if(idx<0){await ALSAlert('That template no longer exists.','warn');return;} list[idx].items=s.entries.map(function(e){return {exId:e.exId,sets:workSets(e.sets).length||e.sets.length};}); save('po_templates',list); closeSheet(); go('home'); };
window.saveSessionAsTemplate=async function(){ var s=window.__lastSession; if(!s)return; var name=await ALSPrompt({title:'Save as template',placeholder:'Template name',value:(s.name && s.name!=='Quick Workout') ? s.name : '',confirmText:'Save'}); if(!name||!name.trim())return; var t={id:uid(),folderId:(folders()[0]||{}).id||null,name:name.trim(),items:s.entries.map(function(e){return {exId:e.exId,sets:workSets(e.sets).length||e.sets.length};})}; var list=templates(); list.push(t); save('po_templates',list); closeSheet(); go('home'); };

/* HISTORY */
function renderHistory(){
  view='history';
  /* Order by when the workout happened — never trust raw array order (cloud merges append
     newly-finished sessions to the end, which used to bury today's workout at the bottom). */
  var ws=workouts().slice().sort(function(a,b){
    var ka=a.startedAt||(a.date?a.date+'T00:00:00Z':''), kb=b.startedAt||(b.date?b.date+'T00:00:00Z':'');
    return kb<ka?-1:kb>ka?1:0;
  });
  var eyebrow='FITNESS'+(ws.length?(' · '+ws.length+' session'+(ws.length>1?'s':'')):'');
  var html='<div class="w-hero"><div><div class="au-eyebrow w-hero-eyebrow"><span class="au-dot"></span>'+eyebrow+'</div><h1 class="w-hero-title">History.</h1></div>'+novaSvg()+'</div>';
  html+=segHTML('history');
  if(!ws.length){ html+='<div class="w-empty">No workouts logged yet.<br>Start one and it’ll show up here.</div>'; W.innerHTML=html; return; }
  ws.forEach(function(s){
    html+='<div class="w-hist" onclick="editWorkout(\''+s.id+'\')" style="cursor:pointer;"><div class="w-hist-top"><span class="w-hist-name">'+esc(s.name)+' <span class="w-ex-editpen">✎</span></span><span style="display:flex;align-items:center;gap:8px;"><span class="w-hist-date">'+relDate(s.date)+'</span><button type="button" class="w-itool del" style="width:26px;height:26px;font-size:11px;" onclick="event.stopPropagation();deleteWorkout(\''+s.id+'\')" aria-label="Delete workout">✕</button></span></div>'+
      '<div class="w-hist-stats">'+
        '<span class="w-hist-stat"><b>'+fmtDur(s.durationSec)+'</b> time</span>'+
        '<span class="w-hist-stat"><b>'+(s.volume||0).toLocaleString()+'</b> kg</span>'+
        '<span class="w-hist-stat pr"><b>'+(s.prs?s.prs.length:0)+'</b> PRs</span></div>'+
      histExerciseRows(s)+'</div>';

  html+='<button type="button" class="w-btn-ghost" style="margin-top:10px;" onclick="openLibrary()">Manage exercise library</button>';

}
function histExerciseRows(s){
  return (s.entries||[]).map(function(en){
    var noteHtml = en.note?'<div class="w-hist-note">&ldquo;'+esc(en.note)+'&rdquo;</div>':'';
    if(en.kind==='time' || isTime(en)){
      var tot=0; (en.sets||[]).forEach(function(x){tot+=x.secs||0;});
      return '<div class="w-hist-row"><span class="nm">'+esc(en.name)+'</span><span class="bs">'+fmtMMSS(tot)+'</span></div>'+noteHtml;
    }
    var best=null; en.sets.forEach(function(x){ if(!best||(+x.kg||0)>(+best.kg||0))best=x; });
    var bs = best?((best.kg||0)+'kg × '+(best.reps||0)+(en.perSide?'/side':'')):'—';
    return '<div class="w-hist-row"><span class="nm">'+(workSets(en.sets).length||en.sets.length)+' × '+esc(en.name)+'</span><span class="bs">'+esc(bs)+'</span></div>'+noteHtml;
  }).join('');
}

/* PROGRESSION TARGETS + STATS */
function targetFor(exId){
  var le=lastEntryFor(exId); if(!le) return null;
  var best=null;
  workSets(le.sets).forEach(function(s){ if((+s.kg||0)>0 && (+s.reps||0)>0 && (!best||e1rm(s.kg,s.reps)>e1rm(best.kg,best.reps))) best=s; });
  if(!best) return null;
  var w=+best.kg||0, r=+best.reps||0;
  return { w:w, r:r, suggest: w+'kg×'+(r+1)+' or '+(w+2.5)+'kg×'+r };
}
function exHistory(exId){
  var arr=[];
  workouts().slice().sort(function(a,b){return (a.startedAt||'')<(b.startedAt||'')?-1:1;}).forEach(function(w){
    var en=(w.entries||[]).find(function(e){return e.exId===exId;}); if(!en)return;
    var best=0,bw=null,vol=0;
    workSets(en.sets).forEach(function(s){ vol+=(+s.kg||0)*(+s.reps||0); var v=e1rm(s.kg,s.reps); if(v>best){best=v;bw=s;} });
    if(best>0) arr.push({date:w.date,e1rm:best,set:bw,vol:vol});
  });
  return arr;
}
function trainedExIds(){
  var seen={},out=[];
  workouts().forEach(function(w){ (w.entries||[]).forEach(function(en){ if(en.exId && !seen[en.exId]){seen[en.exId]=1;out.push(en.exId);} }); });
  return out;
}
function miniSpark(vals){
  if(vals.length<2) return '<div class="w-spark"></div>';
  var min=Math.min.apply(null,vals),max=Math.max.apply(null,vals),range=(max-min)||1;
  var v=vals.slice(-12);
  return '<div class="w-spark">'+v.map(function(x,i){var h=Math.round((x-min)/range*26+4);return '<div class="w-spark-b'+(i===v.length-1?' last':'')+'" style="height:'+h+'px"></div>';}).join('')+'</div>';
}

function getMuscleTargets(){

function weekRange(){ var t=new Date(); t.setHours(0,0,0,0); var dow=(t.getDay()+6)%7; var s=new Date(t); s.setDate(t.getDate()-dow); return {start:dateKey(s), end:dateKey(t)}; }

function lifetimeTotals(){
  var t={workouts:0,sets:0,tonnage:0,timeSec:0,prs:0}, days={};

/* ── Phase C: consistency calendar ── */
function _trainVol(){ var v={}; workouts().forEach(function(w){ if(w&&w.date) v[w.date]=(v[w.date]||0)+(+w.volume||0); }); return v; }
function _weekHas(vol, monday){ for(var d=0;d<7;d++){ var c=new Date(monday); c.setDate(monday.getDate()+d); if(vol[dateKey(c)]) return true; } return false; }
function _mondayOf(d){ var x=new Date(d); x.setHours(0,0,0,0); var dow=(x.getDay()+6)%7; x.setDate(x.getDate()-dow); return x; }
function streakWeeks(vol){ var cur=_mondayOf(new Date()); if(!_weekHas(vol,cur)) cur.setDate(cur.getDate()-7); var n=0; while(_weekHas(vol,cur)){ n++; cur.setDate(cur.getDate()-7); } return n; }
function bestStreakWeeks(vol){ var keys=Object.keys(vol).sort(); if(!keys.length) return 0; var cur=_mondayOf(new Date(keys[0]+'T00:00:00')); var end=_mondayOf(new Date()); var best=0,run=0;
  while(cur<=end){ if(_weekHas(vol,cur)){ run++; if(run>best)best=run; } else run=0; cur.setDate(cur.getDate()+7); } return best; }
function renderCalendar(){
  var vol=_trainVol(); var WEEKS=18;
  var today=new Date(); today.setHours(0,0,0,0);
  var start=_mondayOf(today); start.setDate(start.getDate()-(WEEKS-1)*7);
  var maxVol=0; Object.keys(vol).forEach(function(k){ if(vol[k]>maxVol) maxVol=vol[k]; });
  var cols='';
  for(var wk=0; wk<WEEKS; wk++){ var cells='';
    for(var d=0; d<7; d++){ var cur=new Date(start); cur.setDate(start.getDate()+wk*7+d); var key=dateKey(cur); var v=vol[key]||0;
      var tier = cur>today?'tf' : v<=0?'' : maxVol&&v<maxVol*0.34?'t1' : maxVol&&v<maxVol*0.67?'t2':'t3';
      cells+='<div class="w-cal-c '+tier+'" title="'+key+(v?' · '+Math.round(v)+'kg':'')+'"></div>'; }
    cols+='<div class="w-cal-col">'+cells+'</div>'; }
  var streak=streakWeeks(vol), best=bestStreakWeeks(vol), last28=0;
  for(var i=0;i<28;i++){ var dd=new Date(today); dd.setDate(today.getDate()-i); if(vol[dateKey(dd)]) last28++; }
  return '<div class="w-vol-card" style="margin-bottom:14px;"><div class="w-vol-hd">Consistency</div><div class="w-vol-sub">Last '+WEEKS+' weeks · '+last28+' days trained in the last 28</div>'+
    '<div class="w-cal">'+cols+'</div><div class="w-cal-foot"><span>🔥 '+streak+'-week streak</span><span>best '+best+' weeks</span></div></div>';
}

/* ── Phase C: strength standards (vs bodyweight) ── */
function bodyweightKg(){
  var w=ls('po_coach_weights',[]); if(!Array.isArray(w)||!w.length) return null;
  var latest=null; w.forEach(function(x){ if(x&&typeof x.weight==='number'&&x.dateKey){ if(!latest||x.dateKey>latest.dateKey) latest=x; } });
  if(!latest) return null;
  return ((ls('po_coach_v1',{})||{}).units==='lb') ? latest.weight*0.453592 : latest.weight;
}
var STANDARDS=[
  {key:'bench press', not:['incline','decline','close','db','dumbbell','machine','smith'], name:'Bench Press', bands:[0.5,0.75,1.25,1.75,2.0]},
  {key:'squat', not:['hack','split','goblet','bulgarian','leg','box','pistol','sissy'], name:'Squat', bands:[0.75,1.25,1.5,2.25,2.75]},
  {key:'deadlift', not:['romanian','rdl','stiff','single','snatch','deficit'], name:'Deadlift', bands:[1.0,1.5,2.0,2.5,3.0]},
  {key:'overhead press', not:['db','dumbbell','machine','seated'], name:'Overhead Press', bands:[0.35,0.55,0.8,1.1,1.4]}
];
function renderStandards(){
  var bw=bodyweightKg();
  var card='<div class="w-vol-card" style="margin-bottom:14px;"><div class="w-vol-hd">Strength standards</div><div class="w-vol-sub">Best est-1RM vs your bodyweight</div>';
  if(!bw) return card+'<div class="w-empty" style="font-size:13px;padding:6px 0;">Log your <a href="weight.html" style="color:rgb(var(--au-glow-rgb));text-decoration:none;border-bottom:1px solid rgba(var(--au-glow-rgb),.4);">bodyweight</a> to see how your lifts stack up.</div></div>';
  var LEVELS=['Untrained','Beginner','Novice','Intermediate','Advanced','Elite'];
  var exs=exercises(), found=[];
  STANDARDS.forEach(function(st){ var best=0;
    exs.forEach(function(ex){ var nm=(ex.name||'').toLowerCase(); if(nm.indexOf(st.key)===-1) return; if(st.not.some(function(w){return nm.indexOf(w)!==-1;})) return; var v=bestE1rmFor(ex.id); if(v>best) best=v; });
    if(best>0) found.push({st:st, e1rm:best}); });
  if(!found.length) return card+'<div class="w-empty" style="font-size:13px;padding:6px 0;line-height:1.5;">These track the big barbell lifts — bench, squat, deadlift, overhead press. Log those to see your level; your machine work shows in the map &amp; totals above.</div></div>';
  card+=found.map(function(f){
    var ratio=f.e1rm/bw, bands=f.st.bands, lv=0;
    for(var i=0;i<bands.length;i++){ if(ratio>=bands[i]) lv=i+1; }
    var prev=lv>0?bands[lv-1]:0, next=lv<bands.length?bands[lv]:bands[bands.length-1];
    var pct = lv>=bands.length?100:Math.max(3,Math.min(100,Math.round((ratio-prev)/(next-prev)*100)));
    return '<div class="w-std"><div class="w-std-top"><span class="w-std-name">'+esc(f.st.name)+'</span><span class="w-std-lvl">'+LEVELS[lv]+'</span></div>'+
      '<div class="w-std-track"><div class="w-std-fill" style="width:'+pct+'%;"></div></div>'+
      '<div class="w-std-ratio" style="margin-top:4px;">'+Math.round(f.e1rm)+'kg · '+(Math.round(ratio*100)/100)+'× bodyweight'+(lv<bands.length?' · next '+bands[lv]+'×':' · maxed')+'</div></div>';
  }).join('');
  return card+'</div>';
}

/* ── Phase C: per-lift overload / plateau coaching ── */
function coachNotes(){
  var notes=[];
  trainedExIds().forEach(function(id){
    var ex=exById(id); if(isTime(ex)||ex.muscle==='Cardio') return;
    var h=exHistory(id); if(h.length<3) return;
    var recent=h[h.length-1].date; var daysAgo=Math.round((Date.now()-new Date(recent+'T00:00:00').getTime())/86400000);
    if(daysAgo>28) return;                        // only coach actively-trained lifts
    var last=h.slice(-Math.min(5,h.length)); var first=last[0].e1rm, lastv=last[last.length-1].e1rm;
    var ch=first>0?(lastv-first)/first:0;
    if(ch<=-0.04) notes.push({pri:1,kind:'down',text:'<b>'+esc(ex.name)+'</b> has slipped ~'+Math.round(Math.abs(ch)*100)+'% over your last '+last.length+' sessions. Take a lighter day, then rebuild — and check sleep & food.'});
    else if(Math.abs(ch)<0.02) notes.push({pri:2,kind:'flat',text:'<b>'+esc(ex.name)+'</b> has stalled near '+Math.round(lastv)+'kg for '+last.length+' sessions. Add a set, +2.5kg, or one more rep to break through.'});
    else if(ch>=0.03) notes.push({pri:3,kind:'up',text:'<b>'+esc(ex.name)+'</b> is climbing — up ~'+Math.round(ch*100)+'% lately. Keep the progression going.'});
  });
  notes.sort(function(a,b){ return a.pri-b.pri; });
  return notes.slice(0,3);
}
function renderCoach(){
  var n=coachNotes(); if(!n.length) return '';
  return '<div class="w-vol-card" style="margin-bottom:14px;"><div class="w-vol-hd">Coach notes</div><div class="w-vol-sub">Per-lift progression — what to do next</div>'+
    n.map(function(x){ var ic=x.kind==='down'?'🪫':x.kind==='flat'?'⏸️':'📈';
      return '<div class="w-coach"><span class="w-coach-ic">'+ic+'</span><span class="w-coach-t">'+x.text+'</span></div>'; }).join('')+'</div>';
}

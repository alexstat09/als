<!DOCTYPE html>
<html lang="en">
<head>
<script src="lock.js"></script>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#050506">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="apple-touch-icon.png">
<title>Dashboard</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="sync.js" defer></script>
<script src="topbar.js" defer></script>
<style>
:root {
  --text-primary: #FAFAFA;
  --text-secondary: #B8B6B0;
  --text-tertiary: #76746E;
  --success: #6BE3A4;
  --warning: #F2C063;
  --danger: #FF6B6B;
  --font: -apple-system, BlinkMacSystemFont, "Inter", "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
  --font-mono: ui-monospace, "SF Mono", Menlo, Consolas, monospace;
}

* { box-sizing: border-box; }
html, body {
  margin: 0; padding: 0;
  background: #050506;
  color: var(--text-secondary);
  font-family: var(--font);
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
  -webkit-text-size-adjust: 100%;
}
body {
  min-height: 100vh;
  position: relative;
  overflow-x: hidden;
  padding: 0 20px 60px;
}

/* Drifting glow background */
body::before {
  content: '';
  position: fixed; inset: 0;
  background:
    radial-gradient(circle at 82% 14%, rgba(224, 118, 88, 0.16), transparent 45%),
    radial-gradient(circle at 18% 90%, rgba(180, 180, 200, 0.06), transparent 50%);
  filter: blur(40px);
  pointer-events: none;
  z-index: -2;
  animation: drift 36s ease-in-out infinite alternate;
}

/* Dot texture */
body::after {
  content: '';
  position: fixed; inset: 0;
  background-image: radial-gradient(rgba(255,255,255,0.014) 1px, transparent 1px);
  background-size: 3px 3px;
  pointer-events: none;
  z-index: -1;
}

@keyframes drift {
  0%   { transform: translate3d(0,0,0); }
  100% { transform: translate3d(-22px, 14px, 0); }
}

.page {
  max-width: 1100px;
  margin: 0 auto;
}

/* Page title — same gradient style as other pages */
.dash-title {
  margin: 0 0 14px;
  font-size: 28px;
  font-weight: 700;
  letter-spacing: -0.025em;
  background: linear-gradient(180deg, #FFFFFF 0%, #C7C4BC 120%);
  -webkit-background-clip: text;
  background-clip: text;
  -webkit-text-fill-color: transparent;
  color: transparent;
}
@media (max-width: 480px) { .dash-title { font-size: 22px; } }

/* ===== Bento grid ===== */
.bento-grid {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  grid-auto-rows: 168px;
  gap: 14px;
  grid-auto-flow: dense;
}

/* Size variants */
.tile.big  { grid-column: span 2; grid-row: span 2; }
.tile.wide { grid-column: span 2; }

/* Glass tile base */
.tile {
  position: relative;
  display: flex;
  flex-direction: column;
  padding: 16px 18px 14px;
  border-radius: 18px;
  background: rgba(255, 255, 255, 0.04);
  border: 1px solid rgba(255, 255, 255, 0.07);
  backdrop-filter: blur(24px) saturate(1.2);
  -webkit-backdrop-filter: blur(24px) saturate(1.2);
  box-shadow: 0 8px 32px rgba(0, 0, 0, 0.40);
  text-decoration: none;
  color: inherit;
  overflow: hidden;
  transition: transform 0.18s ease, border-color 0.18s ease, box-shadow 0.18s ease;
}

/* Subtle inner highlight at top */
.tile::before {
  content: '';
  position: absolute; top: 0; left: 0; right: 0;
  height: 1px;
  background: linear-gradient(90deg, transparent, rgba(255,255,255,0.08), transparent);
  pointer-events: none;
}

.tile:hover {
  transform: translateY(-3px);
  border-color: rgba(var(--accent-rgb), 0.35);
  box-shadow: 0 14px 40px rgba(0, 0, 0, 0.55);
}

/* Accent glow on hover behind the card */
.tile::after {
  content: '';
  position: absolute; inset: 0;
  border-radius: inherit;
  background: radial-gradient(circle at 50% 0%, rgba(var(--accent-rgb), 0.06), transparent 70%);
  opacity: 0;
  transition: opacity 0.25s ease;
  pointer-events: none;
}
.tile:hover::after { opacity: 1; }

/* Tile top row: mono number + emoji */
.tile-top {
  display: flex;
  justify-content: space-between;
  align-items: flex-start;
}

.tile-num {
  font-family: var(--font-mono);
  font-size: 11px;
  font-weight: 700;
  letter-spacing: 0.1em;
  color: var(--text-tertiary);
}

.tile-emoji {
  font-size: 22px;
  line-height: 1;
  filter: drop-shadow(0 0 8px rgba(var(--accent-rgb), 0.6));
  transition: filter 0.2s ease;
}
.tile:hover .tile-emoji {
  filter: drop-shadow(0 0 14px rgba(var(--accent-rgb), 0.85));
}

/* Spacer pushes footer to bottom */
.tile-spacer { flex: 1; }

/* Tile title */
.tile-title {
  font-size: 17px;
  font-weight: 700;
  letter-spacing: -0.02em;
  color: var(--text-primary);
  margin-bottom: 6px;
}
.tile.big .tile-title { font-size: 22px; }

/* Footer row */
.tile-footer {
  display: flex;
  align-items: center;
  justify-content: space-between;
}

.tile-sub {
  font-size: 12px;
  color: var(--text-tertiary);
  line-height: 1.3;
}

.tile-arrow {
  font-size: 16px;
  font-weight: 700;
  color: rgb(var(--accent-rgb));
  transition: transform 0.18s ease;
  flex-shrink: 0;
  margin-left: 8px;
}
.tile:hover .tile-arrow { transform: translateX(5px); }

/* ===== Per-tile accent colours ===== */
/* accent stored as R,G,B for rgba() usage */
.tile-main     { --accent-rgb: 107, 227, 164; }
.tile-fitness  { --accent-rgb: 125, 211, 252; }
.tile-health   { --accent-rgb: 167, 243, 208; }
.tile-water    { --accent-rgb: 96, 165, 250; }
.tile-finance  { --accent-rgb: 242, 192, 99; }
.tile-caffeine   { --accent-rgb: 201, 163, 107; }
.tile-nutrition  { --accent-rgb: 124, 184, 122; }

/* ===== Responsive ===== */
@media (max-width: 720px) {
  .bento-grid {
    grid-template-columns: repeat(2, 1fr);
    grid-auto-rows: 148px;
  }
  /* big tiles become 2 cols × 1 row on tablet */
  .tile.big { grid-column: span 2; grid-row: span 1; }
}

@media (max-width: 440px) {
  .bento-grid {
    grid-template-columns: 1fr;
    grid-auto-rows: 130px;
  }
  .tile.big, .tile.wide { grid-column: span 1; grid-row: span 1; }
}
</style>
</head>
<body>
<div class="page">
  <h1 class="dash-title">Dashboard</h1>

  <div class="bento-grid">

    <!-- ·01 Main — Goals & daily plan -->
    <a class="tile tile-main big" href="main.html">
      <div class="tile-top">
        <span class="tile-num">·01</span>
        <span class="tile-emoji">🏠</span>
      </div>
      <div class="tile-spacer"></div>
      <div class="tile-title">Main</div>
      <div class="tile-footer">

        <span class="tile-arrow">→</span>
      </div>
    </a>

    <!-- ·02 Fitness — Workouts, splits, sessions -->
    <a class="tile tile-fitness wide" href="gym.html">

      </div>
      <div class="tile-spacer"></div>
      <div class="tile-title">Fitness</div>

        <span class="tile-sub">Workouts, splits, sessions</span>

      </div>

    <a class="tile tile-health" href="health.html">
      <div class="tile-top">
        <span class="tile-num">·03</span>

      </div>
      <div class="tile-spacer"></div>
      <div class="tile-title">Health</div>
      <div class="tile-footer">
        <span class="tile-sub">Supplements &amp; vitals</span>

    <!-- ·04 Water — Hydration -->
    <a class="tile tile-water" href="po-water.html">
      <div class="tile-top">
        <span class="tile-num">·04</span>
        <span class="tile-emoji">💧</span>
      </div>
      <div class="tile-spacer"></div>
      <div class="tile-title">Water</div>

        <span class="tile-sub">Hydration</span>
        <span class="tile-arrow">→</span>

    <!-- ·05 Finance — Net worth & spending -->
    <a class="tile tile-finance wide" href="finance.html">
      <div class="tile-top">

        <span class="tile-emoji">📊</span>
      </div>
      <div class="tile-spacer"></div>

    <!-- ·07 Nutrition — Calories & macros -->
    <a class="tile tile-nutrition" href="nutrition.html">

      </div>

        <span class="tile-sub">Calories &amp; macros</span>

    </a>

    <!-- ·06 Caffeine — Intake & timing -->
    <a class="tile tile-caffeine" href="caffeine.html">
      <div class="tile-top">

      </div>
      <div class="tile-spacer"></div>

  </div>
</div>
</body>
</html>

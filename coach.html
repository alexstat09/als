<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>Coach · ALS</title>
  <meta name="theme-color" content="#050506">
  <link rel="stylesheet" href="aurora.css">
  <style>
    :root{ --co:155,140,255; }
    *,*::before,*::after{ box-sizing:border-box; margin:0; padding:0; -webkit-tap-highlight-color:transparent; }
    body{ background:var(--au-void,#050506); color:var(--au-ivory,#F4F1EA); font-family:var(--au-sans,-apple-system,system-ui,sans-serif);
      min-height:100vh; padding:0 0 calc(40px + env(safe-area-inset-bottom)); }

    .co-head{ position:relative; z-index:5; display:flex; align-items:center; gap:12px; padding:16px 20px 6px; }
    .co-back{ font-family:var(--au-mono,ui-monospace,monospace); font-size:12px; color:var(--au-dim,#9a958c); text-decoration:none; border:1px solid var(--au-line,rgba(255,255,255,.1)); border-radius:9px; padding:7px 11px; flex:none; }
    .co-htext{ flex:1; min-width:0; }
    .co-eyebrow{ font-family:var(--au-mono,ui-monospace,monospace); font-size:10px; font-weight:700; letter-spacing:.22em; text-transform:uppercase; color:rgba(var(--co),.9); }
    .co-title{ font-family:var(--au-serif,Georgia,serif); font-size:27px; font-weight:600; line-height:1.05; margin-top:2px; }
    .co-state{ font-family:var(--au-mono,ui-monospace,monospace); font-size:11px; color:var(--au-faint,#6b675f); flex:none; text-align:right; }

    .co-wrap{ position:relative; z-index:5; max-width:620px; margin:0 auto; padding:6px 18px; }
    .co-nova{ display:flex; align-items:center; gap:10px; font-size:13.5px; line-height:1.5; color:var(--au-dim,#c9c4ba); margin:8px 2px 18px; }
    .co-nova .orb{ width:24px; height:24px; flex:none; }

    .co-sec{ font-family:var(--au-mono,ui-monospace,monospace); font-size:9.5px; font-weight:700; letter-spacing:.2em; text-transform:uppercase; color:var(--au-faint,#6b675f); margin:24px 2px 11px; }

    /* hero focus card */
    .co-hero{ position:relative; border:1px solid rgba(var(--hc,155,140,255),.34); border-radius:18px; padding:20px; overflow:hidden;
      background:linear-gradient(150deg, rgba(var(--hc,155,140,255),.12), rgba(var(--hc,155,140,255),.02)); }
    .co-hero .tag{ font-family:var(--au-mono,ui-monospace,monospace); font-size:9px; font-weight:700; letter-spacing:.2em; text-transform:uppercase; color:rgba(var(--hc,155,140,255),.95); display:flex; align-items:center; gap:8px; }
    .co-hero .em{ font-size:30px; margin:12px 0 8px; display:block; }
    .co-hero .tx{ font-size:16px; line-height:1.5; color:var(--au-ivory,#F4F1EA); }
    .co-hero .act{ display:inline-flex; align-items:center; gap:9px; margin-top:16px; text-decoration:none;
      background:rgba(var(--hc,155,140,255),.16); border:1px solid rgba(var(--hc,155,140,255),.4); border-radius:12px; padding:11px 15px;
      font-size:13.5px; font-weight:600; color:#fff; }
    .co-hero .act .ar{ font-family:var(--au-mono,ui-monospace,monospace); color:rgba(var(--hc,155,140,255),1); }

    /* insight cards */
    .co-card{ position:relative; display:block; border:1px solid var(--au-line,rgba(255,255,255,.1)); border-left:3px solid rgb(var(--cc,155,140,255)); border-radius:14px; padding:15px 16px; margin-bottom:12px; text-decoration:none; color:inherit; background:rgba(255,255,255,.025); transition:transform .15s, border-color .2s; }
    .co-card:active{ transform:scale(.985); }
    .co-card .top{ display:flex; align-items:center; gap:9px; margin-bottom:9px; }
    .co-card .em{ font-size:18px; flex:none; }
    .co-card .conf{ margin-left:auto; font-family:var(--au-mono,ui-monospace,monospace); font-size:9px; font-weight:700; letter-spacing:.1em; text-transform:uppercase; color:rgba(var(--cc,155,140,255),.9); display:flex; align-items:center; gap:6px; }
    .co-card .bar{ width:34px; height:3px; border-radius:2px; background:rgba(255,255,255,.1); overflow:hidden; }
    .co-card .bar i{ display:block; height:100%; background:rgb(var(--cc,155,140,255)); border-radius:2px; }
    .co-card .tx{ font-size:14px; line-height:1.5; color:var(--au-ivory,#F4F1EA); }
    .co-card .act{ display:flex; align-items:center; gap:8px; margin-top:11px; padding-top:11px; border-top:1px solid var(--au-line,rgba(255,255,255,.08)); font-size:12.5px; color:var(--au-dim,#c9c4ba); }
    .co-card .act b{ color:rgb(var(--cc,155,140,255)); font-weight:700; font-family:var(--au-mono,ui-monospace,monospace); font-size:10px; letter-spacing:.06em; }
    .co-card .act .go{ margin-left:auto; font-family:var(--au-mono,ui-monospace,monospace); color:var(--au-faint,#6b675f); }

    .co-fc{ border:1px solid var(--au-line,rgba(255,255,255,.1)); border-radius:14px; padding:14px 16px; margin-bottom:12px; background:rgba(255,255,255,.02); display:flex; gap:12px; align-items:flex-start; }
    .co-fc .em{ font-size:18px; flex:none; }
    .co-fc .tx{ font-size:13.5px; line-height:1.5; color:var(--au-dim,#c9c4ba); }

    .co-empty{ border:1px dashed var(--au-line,rgba(255,255,255,.14)); border-radius:16px; padding:22px; text-align:center; }
    .co-empty .em{ font-size:30px; }
    .co-empty .t{ font-size:15px; color:var(--au-ivory,#F4F1EA); margin-top:10px; line-height:1.5; }
    .co-empty .s{ font-size:12.5px; color:var(--au-faint,#6b675f); margin-top:8px; line-height:1.5; }

    .co-cta{ display:flex; align-items:center; justify-content:center; gap:10px; margin-top:26px; text-decoration:none;
      border:1px solid rgba(var(--co),.3); border-radius:14px; padding:14px; background:rgba(var(--co),.06); color:var(--au-ivory,#F4F1EA); font-size:14px; }
    .co-cta .o{ width:22px; height:22px; flex:none; }
    .co-foot{ text-align:center; font-family:var(--au-mono,ui-monospace,monospace); font-size:10px; color:var(--au-faint,#6b675f); margin-top:16px; line-height:1.6; }
    .hidden{ display:none !important; }
    @keyframes coIn{ from{ opacity:0; transform:translateY(8px); } to{ opacity:1; transform:none; } }
    .co-anim{ animation:coIn .5s cubic-bezier(.22,.61,.36,1) both; }
  </style>
</head>
<body class="au-mood-calm">
  <div class="co-head">
    <a class="co-back" href="index.html">← home</a>
    <div class="co-htext">
      <div class="co-eyebrow">Intelligence</div>
      <div class="co-title">Coach</div>
    </div>
    <div class="co-state" id="coState"></div>
  </div>

  <div class="co-wrap">
    <div class="co-nova">
      <span class="orb" aria-hidden="true"><svg viewBox="0 0 100 100"><defs><linearGradient id="coNova" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#34E2B0"/><stop offset="100%" stop-color="#9B8CFF"/></linearGradient></defs><rect x="24" y="24" width="52" height="52" rx="15" transform="rotate(45 50 50)" fill="url(#coNova)" opacity="0.95"/><circle cx="43" cy="50" r="5" fill="#04130D"/><circle cx="57" cy="50" r="5" fill="#04130D"/></svg></span>
      <span id="coIntro">Reading your patterns…</span>
    </div>

    <div id="coHeroWrap"></div>
    <div id="coEmptyWrap"></div>

    <div class="co-sec hidden" id="coPatSec">Patterns I’m noticing</div>
    <div id="coPatterns"></div>

    <div class="co-sec hidden" id="coFcSec">Where you’re headed</div>
    <div id="coForecasts"></div>

    <a class="co-cta" href="nova-chat.html">
      <span class="o" aria-hidden="true"><svg viewBox="0 0 100 100"><rect x="26" y="26" width="48" height="48" rx="14" transform="rotate(45 50 50)" fill="url(#coNova)" opacity="0.95"/><circle cx="44" cy="50" r="4.5" fill="#04130D"/><circle cx="56" cy="50" r="4.5" fill="#04130D"/></svg></span>
      Ask Nova to go deeper →
    </a>
    <div class="co-foot" id="coFoot"></div>
  </div>

  <script src="topbar.js" defer></script>
<script>window.__pmAutoSel='.co-hero,.co-sec,.co-card,.co-state,.co-fc';(function(){var n=0,t=setInterval(function(){try{if(window.PageMotion){PageMotion.scan(window.__pmAutoSel);if(++n>=5)clearInterval(t);}}catch(e){clearInterval(t);}},700);})();</script>
<script src="page-motion.js" defer></script>
  <script src="aurora-bg.js" defer></script>
  <script src="insights-engine.js" defer></script>
  <script src="forecast-engine.js" defer></script>
  <script>
  (function(){
    'use strict';
    function $(id){ return document.getElementById(id); }
    function ls(k){ try{ return JSON.parse(localStorage.getItem(k)); }catch(e){ return null; } }
    function esc(s){ return String(s==null?'':s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
    function clamp(v,lo,hi){ return Math.max(lo,Math.min(hi,v)); }

    var DMAP = {
      training:{ p:'gym.html',      c:'124,211,252', l:'Training' },
      nutrition:{ p:'nutrition.html', c:'124,184,122', l:'Nutrition' },
      sleep:{ p:'sleep.html',      c:'155,140,255', l:'Sleep' },
      caffeine:{ p:'caffeine.html', c:'201,163,107', l:'Caffeine' },
      recovery:{ p:'sleep.html',   c:'52,226,176',  l:'Recovery' },
      body:{ p:'body.html',        c:'96,165,250',  l:'Body' }
    };
    function dm(d){ return DMAP[d] || { p:'index.html', c:'155,140,255', l:'' }; }
    function confLabel(i){ var c = (i.confidence != null) ? i.confidence : (i.strength || 0); return c >= 0.6 ? 'strong signal' : c >= 0.38 ? 'clear signal' : 'emerging'; }

    /* Persist the #1 insight to a tiny cloud row so the serverless weekly cron
       (/api/run-reminders) can push it with the app closed. Best-effort. */
    function persistTopInsight(hero){
      try{
        var SUPA='https://oiyvadqfldwbjroiknjc.supabase.co';
        var KEY='sb_publishable_fGKn40f1Ek1Y4j0VComsFA_l4aXkKM-';
        fetch(SUPA+'/rest/v1/app_state?on_conflict=key',{
          method:'POST',
          headers:{ 'apikey':KEY,'Authorization':'Bearer '+KEY,'Content-Type':'application/json','Prefer':'resolution=merge-duplicates' },
          body:JSON.stringify({ key:'insight', data:{ 'insight:top':{ emoji:hero.emoji||'🧠', text:hero.text||'', action:hero.action||'', domain:hero.domain||'', strength:hero.strength||0, ts:Date.now() } }, updated_at:new Date().toISOString() })
        }).catch(function(){});
      }catch(e){}
    }

    function stateLine(){
      var sl = ls('sleep:logs'); if(!Array.isArray(sl) || !sl.length) return '';
      var last = sl[sl.length-1]; if(!last || typeof last.recovery !== 'number') return '';
      var r = last.recovery, w = r>=80?'primed':r>=65?'recovered':r>=50?'steady':r>=40?'flat':'depleted';
      return 'Recovery ' + r + ' · ' + w;
    }

    function heroHTML(i){
      var c = dm(i.domain).c;
      var act = i.action ? '<a class="act" href="'+dm(i.domain).p+'"><span class="ar">▸</span>'+esc(i.action)+'</a>' : '';
      return '<div class="co-hero co-anim" style="--hc:'+c+'"><div class="tag">Focus right now</div>'+
        '<span class="em" style="color:#3FE0B0">●</span><div class="tx">'+esc(i.text)+'</div>'+act+'</div>';
    }
    function cardHTML(i){
      var d = dm(i.domain), c = d.c;
      var strengthPct = Math.round(clamp(i.strength||0,0,1)*100);
      var act = i.action
        ? '<div class="act"><b>DO</b> '+esc(i.action)+'<span class="go">'+(d.l?d.l+' →':'→')+'</span></div>'
        : (d.l ? '<div class="act"><span class="go" style="margin-left:0">'+d.l+' →</span></div>' : '');
      return '<a class="co-card co-anim" href="'+d.p+'" style="--cc:'+c+'">'+
        '<div class="top"><span class="em" style="color:#3FE0B0">●</span>'+
        '<span class="conf">'+confLabel(i)+'<span class="bar"><i style="width:'+strengthPct+'%"></i></span></span></div>'+
        '<div class="tx">'+esc(i.text)+'</div>'+act+'</a>';
    }
    function fcHTML(f){ return '<div class="co-fc co-anim"><span class="em" style="color:#9B8CFF"><svg viewBox="0 0 24 24" width="15" height="15" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="8.5"/><circle cx="12" cy="12" r="4.5"/><circle cx="12" cy="12" r="0.5"/></svg></span><div class="tx">'+esc(f.text)+'</div></div>'; }

    function dataDays(){
      try{ return Object.keys(window.ALSInsights._timeline()).length; }catch(e){ return 0; }
    }

    function build(){
      var insights = [], forecasts = [];
      try{ if(window.ALSInsights) insights = window.ALSInsights.compute() || []; }catch(e){}
      try{ if(window.ALSForecast) forecasts = window.ALSForecast.compute() || []; }catch(e){}

      $('coState').textContent = stateLine();

      // hero = strongest insight that carries an action, else strongest, else nothing
      var hero = null;
      for(var i=0;i<insights.length;i++){ if(insights[i].action){ hero = insights[i]; break; } }
      if(!hero && insights.length) hero = insights[0];

      var rest = insights.filter(function(x){ return x !== hero; });
      var days = dataDays();

      if(hero) persistTopInsight(hero);

      if(hero){
        $('coIntro').textContent = insights.length>1
          ? 'I’ve connected ' + insights.length + ' patterns across your data. Here’s what matters most:'
          : 'Here’s the clearest pattern in your data right now:';
        $('coHeroWrap').innerHTML = heroHTML(hero);
        $('coEmptyWrap').innerHTML = '';
      } else {
        $('coIntro').textContent = 'I’m still learning your patterns.';
        $('coHeroWrap').innerHTML = '';
        $('coEmptyWrap').innerHTML = '<div class="co-empty co-anim"><div class="em" style="color:#3FE0B0"><svg viewBox="0 0 24 24" width="34" height="34" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><path d="M9.5 4.5A3.5 3.5 0 0 0 6 8a3.3 3.3 0 0 0-2 3.2 3.4 3.4 0 0 0 1.6 3A3.5 3.5 0 0 0 9 19.5c1.4 0 2.6-.8 3-2V6.7a3.4 3.4 0 0 0-2.5-2.2zM14.5 4.5A3.5 3.5 0 0 1 18 8a3.3 3.3 0 0 1 2 3.2 3.4 3.4 0 0 1-1.6 3A3.5 3.5 0 0 1 15 19.5c-1.4 0-2.6-.8-3-2"/></svg></div>'+
          '<div class="t">No strong patterns yet — I only surface things that are statistically real, never guesses.</div>'+
          '<div class="s">' + (days < 14
            ? 'I’ve got ' + days + ' day' + (days===1?'':'s') + ' logged. Keep logging sleep, training and food for ~2 weeks and I’ll start connecting the dots.'
            : 'Your habits look steady, or the signal’s still noisy across ' + days + ' days. Keep going — patterns sharpen with more data.') + '</div></div>';
      }

      if(rest.length){ $('coPatSec').classList.remove('hidden'); $('coPatterns').innerHTML = rest.map(cardHTML).join(''); }
      else { $('coPatSec').classList.add('hidden'); $('coPatterns').innerHTML = ''; }

      if(forecasts.length){ $('coFcSec').classList.remove('hidden'); $('coForecasts').innerHTML = forecasts.map(fcHTML).join(''); }
      else { $('coFcSec').classList.add('hidden'); $('coForecasts').innerHTML = ''; }

      $('coFoot').textContent = 'Patterns are associations from your own data — not medical advice. Surfaced only when statistically real.';
    }

    if(document.readyState === 'loading') window.addEventListener('DOMContentLoaded', build, { once:true }); else build();
    document.addEventListener('visibilitychange', function(){ if(!document.hidden) build(); });
  })();
  </script>
</body>
</html>

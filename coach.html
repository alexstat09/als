<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>Coach · MÉTRON</title>
  <meta name="theme-color" content="#050506">
  <link rel="stylesheet" href="aurora.css">
  <style>
    :root{ --co:155,140,255; }
    *,*::before,*::after{ box-sizing:border-box; margin:0; padding:0; -webkit-tap-highlight-color:transparent; }
    body{ background:var(--au-void,#050506); color:var(--au-ivory,#F4F1EA); font-family:var(--au-sans,-apple-system,system-ui,sans-serif);
      min-height:100vh; padding:0 0 calc(40px + env(safe-area-inset-bottom)); }

    .co-head{ position:relative; z-index:5; display:flex; align-items:center; gap:12px; padding:16px 20px 6px; }
    .co-back{ font-family:var(--au-mono,ui-monospace,monospace); font-size:12px; color:var(--au-dim,#9a958c); text-decoration:none; border:1px solid var(--au-line,rgba(255,255,255,.1)); border-radius:9px; padding:7px 11px; flex:none; }
    .co-htext{ flex:1; min-width:0; }
    .co-eyebrow{ font-family:var(--au-mono,ui-monospace,monospace); font-size:10px; font-weight:700; letter-spacing:.22em; text-transform:uppercase; color:rgba(var(--co),.9); }
    .co-title{ font-family:var(--au-serif,Georgia,serif); font-size:27px; font-weight:600; line-height:1.05; margin-top:2px; }
    .co-state{ font-family:var(--au-mono,ui-monospace,monospace); font-size:11px; color:var(--au-faint,#6b675f); flex:none; text-align:right; }

    .co-wrap{ position:relative; z-index:5; max-width:620px; margin:0 auto; padding:6px 18px; }
    .co-sec{ font-family:var(--au-mono,ui-monospace,monospace); font-size:9.5px; font-weight:700; letter-spacing:.2em; text-transform:uppercase; color:var(--au-faint,#6b675f); margin:26px 2px 12px; display:flex; align-items:center; gap:9px; }
    .co-sec .ln{ flex:1; height:1px; background:var(--au-line,rgba(255,255,255,.08)); }

    /* ── Nova briefing — the coach speaks ── */
    .cb{ display:flex; gap:13px; align-items:flex-start; margin:12px 2px 6px; }
    .cb .orb{ width:34px; height:34px; flex:none; margin-top:1px; }
    .cb-txt{ font-family:var(--au-serif,Georgia,serif); font-size:17.5px; line-height:1.5; color:var(--au-ivory,#F4F1EA); letter-spacing:-.005em; }
    .cb-txt b{ color:rgb(var(--co)); font-weight:600; }

    /* ── This week — the focus loop ── */
    .wk{ border:1px solid rgba(var(--co),.28); border-radius:20px; padding:5px 15px 15px; background:linear-gradient(160deg,rgba(var(--co),.07),rgba(var(--co),.015)); overflow:hidden; }
    .wk-hd{ display:flex; align-items:center; gap:8px; padding:14px 2px 4px; }
    .wk-hd .t{ font-family:var(--au-mono,ui-monospace,monospace); font-size:10px; font-weight:700; letter-spacing:.2em; text-transform:uppercase; color:rgba(var(--co),.95); }
    .wk-hd .r{ margin-left:auto; font-family:var(--au-mono,ui-monospace,monospace); font-size:10px; color:var(--au-faint,#6b675f); }

    /* verdict on last week's focus */
    .vd{ border:1px solid var(--au-line,rgba(255,255,255,.1)); border-radius:14px; padding:13px 14px; margin:8px 0 12px; background:rgba(255,255,255,.02); }
    .vd .lab{ display:flex; align-items:center; gap:8px; font-family:var(--au-mono,ui-monospace,monospace); font-size:9px; font-weight:700; letter-spacing:.16em; text-transform:uppercase; color:var(--au-faint,#6b675f); margin-bottom:8px; }
    .vd .grade{ font-family:var(--au-serif,Georgia,serif); font-size:15px; font-weight:600; }
    .vd .tx{ font-size:13px; line-height:1.5; color:var(--au-dim,#c9c4ba); margin-top:5px; }
    .vd.win{ border-color:rgba(63,224,176,.35); } .vd.win .grade{ color:#4fe0b0; }
    .vd.hold .grade{ color:rgb(var(--co)); }
    .vd.miss .grade{ color:var(--au-dim,#c9c4ba); }

    /* the one focus */
    .fx{ border-radius:15px; padding:2px; }
    .fx .em{ font-size:22px; }
    .fx-action{ font-family:var(--au-serif,Georgia,serif); font-size:22px; font-weight:600; line-height:1.15; color:var(--au-ivory,#F4F1EA); margin:6px 0 4px; }
    .fx-why{ font-size:13px; line-height:1.5; color:var(--au-dim,#c9c4ba); }
    .fx-why b{ color:rgba(var(--co),.95); font-weight:600; }
    .fx-btns{ display:flex; gap:9px; margin-top:15px; }
    .fx-btn{ flex:1; text-align:center; font-family:var(--au-sans); font-size:13.5px; font-weight:700; padding:12px; border-radius:12px; cursor:pointer; border:1px solid rgba(var(--co),.4); background:rgba(var(--co),.14); color:#fff; }
    .fx-btn.ghost{ flex:0 0 auto; background:transparent; border-color:var(--au-line,rgba(255,255,255,.12)); color:var(--au-dim,#c9c4ba); font-weight:600; padding:12px 15px; }
    .fx-btn:active{ transform:scale(.98); }
    .fx-on{ display:flex; align-items:center; gap:9px; margin-top:14px; padding-top:13px; border-top:1px solid rgba(var(--co),.18); }
    .fx-on .dot{ width:8px; height:8px; border-radius:50%; background:#4fe0b0; box-shadow:0 0 10px #4fe0b0; flex:none; }
    .fx-on .l{ font-size:12.5px; color:var(--au-dim,#c9c4ba); }
    .fx-on .l b{ color:var(--au-ivory,#F4F1EA); font-weight:700; }
    .fx-hint{ font-size:12px; color:var(--au-faint,#6b675f); margin-top:12px; line-height:1.5; }

    /* streak chips */
    .wk-chips{ display:flex; gap:8px; margin-top:14px; }
    .wk-chip{ flex:1; text-align:center; border:1px solid var(--au-line,rgba(255,255,255,.08)); border-radius:11px; padding:10px 6px; background:rgba(255,255,255,.015); }
    .wk-chip .v{ font-family:var(--au-serif,Georgia,serif); font-size:20px; color:var(--au-ivory,#F4F1EA); line-height:1; }
    .wk-chip .v small{ font-size:.62em; color:var(--au-faint,#6b675f); }
    .wk-chip .l{ font-family:var(--au-mono,ui-monospace,monospace); font-size:7.5px; font-weight:700; letter-spacing:.12em; text-transform:uppercase; color:var(--au-faint,#6b675f); margin-top:6px; }

    /* ── the why-chain ── */
    .chn{ display:flex; align-items:stretch; gap:0; overflow-x:auto; scrollbar-width:none; padding:2px 0; }
    .chn::-webkit-scrollbar{ display:none; }
    .chn-node{ flex:0 0 auto; display:flex; flex-direction:column; align-items:center; gap:6px; padding:12px 8px; border:1px solid var(--au-line,rgba(255,255,255,.1)); border-radius:13px; background:rgba(255,255,255,.02); min-width:78px; }
    .chn-node .em{ font-size:19px; }
    .chn-node .nm{ font-size:11px; color:var(--au-ivory,#F4F1EA); font-weight:600; text-align:center; }
    .chn-arrow{ flex:0 0 auto; align-self:center; padding:0 4px; color:rgba(var(--co),.8); font-family:var(--au-mono,ui-monospace,monospace); font-size:15px; }
    .chn-cap{ font-size:12.5px; color:var(--au-dim,#c9c4ba); line-height:1.5; margin-top:10px; }

    /* ── evidence cards (the t-tested patterns) ── */
    .co-card{ position:relative; display:block; border:1px solid var(--au-line,rgba(255,255,255,.1)); border-left:3px solid rgb(var(--cc,155,140,255)); border-radius:14px; padding:14px 15px; margin-bottom:11px; text-decoration:none; color:inherit; background:rgba(255,255,255,.022); transition:transform .15s, border-color .2s; }
    .co-card:active{ transform:scale(.985); }
    .co-card .top{ display:flex; align-items:center; gap:9px; margin-bottom:8px; }
    .co-card .em{ font-size:16px; flex:none; }
    .co-card .conf{ margin-left:auto; font-family:var(--au-mono,ui-monospace,monospace); font-size:9px; font-weight:700; letter-spacing:.1em; text-transform:uppercase; color:rgba(var(--cc,155,140,255),.9); display:flex; align-items:center; gap:6px; }
    .co-card .bar{ width:32px; height:3px; border-radius:2px; background:rgba(255,255,255,.1); overflow:hidden; }
    .co-card .bar i{ display:block; height:100%; background:rgb(var(--cc,155,140,255)); border-radius:2px; }
    .co-card .tx{ font-size:13.5px; line-height:1.5; color:var(--au-ivory,#F4F1EA); }
    .co-card .act{ display:flex; align-items:center; gap:8px; margin-top:10px; padding-top:10px; border-top:1px solid var(--au-line,rgba(255,255,255,.08)); font-size:12px; color:var(--au-dim,#c9c4ba); }
    .co-card .act b{ color:rgb(var(--cc,155,140,255)); font-weight:700; font-family:var(--au-mono,ui-monospace,monospace); font-size:9.5px; letter-spacing:.06em; }
    .co-card .act .go{ margin-left:auto; font-family:var(--au-mono,ui-monospace,monospace); color:var(--au-faint,#6b675f); }

    .co-fc{ border:1px solid var(--au-line,rgba(255,255,255,.1)); border-radius:14px; padding:13px 15px; margin-bottom:11px; background:rgba(255,255,255,.02); display:flex; gap:12px; align-items:flex-start; }
    .co-fc .em{ font-size:17px; flex:none; color:#9B8CFF; }
    .co-fc .tx{ font-size:13px; line-height:1.5; color:var(--au-dim,#c9c4ba); }

    .co-empty{ border:1px dashed var(--au-line,rgba(255,255,255,.14)); border-radius:16px; padding:22px; text-align:center; }
    .co-empty .em{ font-size:30px; color:#3FE0B0; }
    .co-empty .t{ font-size:15px; color:var(--au-ivory,#F4F1EA); margin-top:10px; line-height:1.5; }
    .co-empty .s{ font-size:12.5px; color:var(--au-faint,#6b675f); margin-top:8px; line-height:1.5; }

    .co-cta{ display:flex; align-items:center; justify-content:center; gap:10px; margin-top:26px; text-decoration:none;
      border:1px solid rgba(var(--co),.3); border-radius:14px; padding:14px; background:rgba(var(--co),.06); color:var(--au-ivory,#F4F1EA); font-size:14px; }
    .co-cta .o{ width:22px; height:22px; flex:none; }
    .co-foot{ text-align:center; font-family:var(--au-mono,ui-monospace,monospace); font-size:10px; color:var(--au-faint,#6b675f); margin-top:16px; line-height:1.6; }
    .hidden{ display:none !important; }
    @keyframes coIn{ from{ opacity:0; transform:translateY(8px); } to{ opacity:1; transform:none; } }
    .co-anim{ animation:coIn .5s cubic-bezier(.22,.61,.36,1) both; }
    .co-toast{ position:fixed; left:50%; bottom:calc(24px + env(safe-area-inset-bottom)); transform:translateX(-50%) translateY(10px); background:rgba(20,18,26,.96); border:1px solid rgba(var(--co),.4); color:var(--au-ivory,#F4F1EA); font-size:13px; padding:11px 16px; border-radius:12px; opacity:0; pointer-events:none; transition:opacity .2s, transform .2s; z-index:50; }
    .co-toast.show{ opacity:1; transform:translateX(-50%) translateY(0); }
  </style>
</head>

<script>window.__pmAutoSel='.cb,.wk,.co-sec,.co-card,.co-state,.co-fc,.chn';(function(){var n=0,t=setInterval(function(){try{if(window.PageMotion){PageMotion.scan(window.__pmAutoSel);if(++n>=5)clearInterval(t);}}catch(e){clearInterval(t);}},700);})();</script>

  <script>
  (function(){
    'use strict';
    function $(id){ return document.getElementById(id); }
    function ls(k){ try{ return JSON.parse(localStorage.getItem(k)); }catch(e){ return null; } }
    function save(k,v){ try{ localStorage.setItem(k,JSON.stringify(v)); }catch(e){} if(window.ALSSync&&window.ALSSync.flush) window.ALSSync.flush(); }
    function esc(s){ return String(s==null?'':s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
    function clamp(v,lo,hi){ return Math.max(lo,Math.min(hi,v)); }
    function mean(a){ return a.length? a.reduce(function(s,x){return s+x;},0)/a.length : 0; }
    function median(a){ if(!a.length) return 0; var b=a.slice().sort(function(x,y){return x-y;}); var m=b.length>>1; return b.length%2?b[m]:(b[m-1]+b[m])/2; }
    function round(n,p){ p=p||0; var m=Math.pow(10,p); return Math.round((n||0)*m)/m; }
    function lower(s){ s=String(s||''); return s.charAt(0).toLowerCase()+s.slice(1); }
    function stripDot(s){ return String(s||'').replace(/[.!]\s*$/,''); }

    function pad(n){ return String(n).padStart(2,'0'); }
    function dkOf(d){ return d.getFullYear()+'-'+pad(d.getMonth()+1)+'-'+pad(d.getDate()); }
    function addDaysKey(dk,n){ var d=new Date(dk+'T00:00:00'); if(isNaN(d)) return dk; d.setDate(d.getDate()+n); return dkOf(d); }
    // Monday-first week (a week is Mon–Sun across the app).
    function weekStart(d){ d=new Date(d.getFullYear(),d.getMonth(),d.getDate()); var wd=(d.getDay()+6)%7; d.setDate(d.getDate()-wd); return d; }
    function weekDays(wk){ var out=[]; for(var i=0;i<7;i++) out.push(addDaysKey(wk,i)); return out; }

    var DMAP = {
      training:{ p:'gym.html',      c:'124,211,252', l:'Training' },
      nutrition:{ p:'nutrition.html', c:'124,184,122', l:'Nutrition' },
      sleep:{ p:'sleep.html',      c:'155,140,255', l:'Sleep' },
      caffeine:{ p:'caffeine.html', c:'201,163,107', l:'Caffeine' },
      recovery:{ p:'sleep.html',   c:'52,226,176',  l:'Recovery' },
      body:{ p:'body.html',        c:'96,165,250',  l:'Body' }
    };
    function dm(d){ return DMAP[d] || { p:'index.html', c:'155,140,255', l:'' }; }
    function confLabel(i){ var c=(i.confidence!=null)?i.confidence:(i.strength||0); return c>=0.6?'strong signal':c>=0.38?'clear signal':'emerging'; }

    // human nouns for behaviours (A) and outcomes (B)
    var NOUN = { recovery:'recovery', sleepH:'sleep', energy:'energy', volume:'training volume', pr:'PR rate',
      protein:'protein', trained:'training', cafLate:'late caffeine', caf:'caffeine', water:'hydration',
      quality:'sleep quality', carbs:'carbs' };
    // outcome units + whether higher is better (all our B's: higher = better)
    var UNIT = { recovery:' pts', sleepH:'h', energy:' pts', volume:'', pr:'' };
    function noun(k){ return NOUN[k]||k; }

    // ── engine access (all read-only, exposed by insights-engine.js) ──
    function engineRows(){ try{ return window.ALSInsights._timeline(); }catch(e){ return {}; } }
    function hypById(id){ try{ var H=window.ALSInsights._HYP||[]; for(var i=0;i<H.length;i++) if(H[i].id===id) return H[i]; }catch(e){} return null; }
    function splitOf(rows,h){ try{ return window.ALSInsights._splitAuto(rows,h.A,h.B,h.lag,{thr:h.thr,missingA:h.missingA,minN:4}); }catch(e){ return null; } }

    // ── the focus store (synced) ──
    var FKEY='coach:focus';
    function focusStore(){ var s=ls(FKEY); return (s&&typeof s==='object'&&!Array.isArray(s))?s:{}; }

    // Choose this week's proposed focus: strongest actionable insight that is
    // gradeable (has an A→B hypothesis), else strongest actionable, else strongest.
    function pickFocus(insights, skipId){
        var pool=insights.filter(function(i){ return i.action && i.id!==skipId; });
        var gradeable=pool.filter(function(i){ return !!hypById(i.id); });
        return gradeable[0] || pool[0] || insights.filter(function(i){return i.id!==skipId;})[0] || null;
    }
    function focusRecord(i, wk){ return { wk:wk, id:i.id, text:i.text, action:i.action||'', domain:i.domain||'', emoji:i.emoji||'●', accepted:false, ts:Date.now() }; }

    // Desired behaviour direction the action pushes toward: if more-A gives a
    // higher (better) B, the coach wants more A; otherwise less.
    function desiredMoreA(rows,h){ var s=splitOf(rows,h); if(!s) return null; return (s.hiMean-s.loMean)>0; }

    // Grade a completed week's focus against the real data.
    function gradeFocus(rec, rows){
      var h=hypById(rec.id);
      if(!h) return { kind:'nudge' };                      // single-series nudge, not a week-long behaviour
      var days=weekDays(rec.wk);
      var aW=[],bW=[],aAll=[],bAll=[];
      Object.keys(rows).forEach(function(dk){ var r=rows[dk];
        if(r[h.A]!=null){ aAll.push(r[h.A]); if(days.indexOf(dk)>=0) aW.push(r[h.A]); }
        if(r[h.B]!=null){ bAll.push(r[h.B]); if(days.indexOf(dk)>=0) bW.push(r[h.B]); }
      });
      if(aW.length<3 || bW.length<2 || aAll.length<6) return { kind:'thin', logged:aW.length };
      var more=desiredMoreA(rows,h); if(more==null) more=true;
      var aWk=mean(aW), aBase=mean(aAll), bWk=mean(bW), bBase=mean(bAll);
      var acted = more ? (aWk>aBase*1.02) : (aWk<aBase*0.98);
      var outcome = bWk-bBase;               // + = outcome improved (all B higher=better)
      var better = outcome > (h.B==='sleepH'?0.15:1.5);
      return { kind:'graded', acted:acted, better:better, outcome:outcome, B:h.B, A:h.A,
        aWk:aWk, aBase:aBase, bWk:bWk, bBase:bBase };
    }

    // Adherence this week: of the days you've logged the behaviour, how many were
    // on the "good" side (toward what the action asks)?
    function adherence(rec, rows){
      var h=hypById(rec.id); if(!h) return null;
      var more=desiredMoreA(rows,h); if(more==null) return null;
      var aAll=[]; Object.keys(rows).forEach(function(dk){ if(rows[dk][h.A]!=null) aAll.push(rows[dk][h.A]); });
      if(aAll.length<4) return null;
      var med=median(aAll);
      var days=weekDays(rec.wk), logged=0, held=0;
      days.forEach(function(dk){ var r=rows[dk]; if(!r||r[h.A]==null) return; logged++;
        var good = more ? (r[h.A]>=med) : (r[h.A]<=med); if(good) held++; });
      return { logged:logged, held:held };
    }

    function loggedDaysThisWeek(rows){
      var days=weekDays(dkOf(weekStart(new Date()))), n=0;
      days.forEach(function(dk){ var r=rows[dk]; if(r && Object.keys(r).length>1) n++; });
      return n;
    }

    // Count consecutive prior weeks (ending last week) that had an accepted focus.
    function focusStreak(store){
      var wk=dkOf(weekStart(new Date())), n=0;
      for(var i=1;i<=26;i++){ var pw=addDaysKey(wk,-7*i); var r=store[pw]; if(r&&r.accepted) n++; else break; }
      return n;
    }

    function stateLine(){
      var sl=ls('sleep:logs'); if(!Array.isArray(sl)||!sl.length) return '';
      var last=sl[sl.length-1]; if(!last||typeof last.recovery!=='number') return '';
      var r=last.recovery, w=r>=80?'primed':r>=65?'recovered':r>=50?'steady':r>=40?'flat':'depleted';
      return 'Recovery '+r+' · '+w;
    }

    /* Persist the #1 insight to a tiny cloud row so the serverless weekly cron
       (/api/run-reminders) can push it with the app closed. Best-effort. */
    function persistTopInsight(hero){
      try{
        var SUPA='https://oiyvadqfldwbjroiknjc.supabase.co';
        var KEY='sb_publishable_fGKn40f1Ek1Y4j0VComsFA_l4aXkKM-';
        var body={ key:'insight', data:{ 'insight:top':{ emoji:hero.emoji||'🧠', text:hero.text||'', action:hero.action||'', domain:hero.domain||'', strength:hero.strength||0, ts:Date.now() } }, updated_at:new Date().toISOString() };
        // Rows are keyed (user_id, key): on_conflict=key matches no unique
        // constraint and Postgres rejects it 42P10/400. Send the owner.
        var go=function(tok,uid){ var row=Object.assign({},body); if(uid) row.user_id=uid;
          fetch(SUPA+'/rest/v1/app_state?on_conflict='+(uid?'user_id,key':'key'),{ method:'POST', headers:{ 'apikey':KEY,'Authorization':'Bearer '+(tok||KEY),'Content-Type':'application/json','Prefer':'resolution=merge-duplicates' }, body:JSON.stringify(row) }).catch(function(){}); };
        var c=(window.ALSAuth&&window.ALSAuth.client)||window.__alsAuthClient;
        if(c&&c.auth&&c.auth.getSession){ c.auth.getSession().then(function(s){ var ss=s&&s.data&&s.data.session; go(ss&&ss.access_token, ss&&ss.user&&ss.user.id); }).catch(function(){ go(null); }); }
        else go(null);
      }catch(e){}
    }

    // ── deterministic briefing — assembled from real insight objects, never invents ──
    function briefing(insights, focus, verdict){
      if(!insights.length) return 'I’m still learning your patterns. Keep logging sleep, training and food and I’ll start coaching — I only ever speak from your real data.';
      var parts=[];
      if(verdict && verdict.kind==='graded'){
        if(verdict.acted && verdict.better) parts.push('Last week landed — I can see it in the numbers.');
        else if(verdict.acted) parts.push('You put in the work last week; give it another week to show.');
      }
      var top=insights[0];
      parts.push('The clearest signal in your data: '+stripDot(top.text)+'.');
      var second=null;
      for(var i=1;i<insights.length;i++){ if(insights[i].domain!==top.domain){ second=insights[i]; break; } }
      if(second) parts.push('It’s not the only thread — '+lower(stripDot(second.text))+'.');
      if(focus) parts.push('If we fix <b>one thing</b> this week, make it this: '+lower(stripDot(focus.action))+'.');
      return parts.join(' ');
    }

    // ── the why-chain: the causal path the strongest actionable insight sits on ──
    var CHAIN_ICON={ caffeine:'☕', 'late caffeine':'☕', sleep:'😴', 'sleep quality':'😴', recovery:'❤️‍🩹', energy:'⚡',
      training:'🏋️', 'training volume':'🏋️', protein:'🥩', carbs:'🍚', hydration:'💧', 'PR rate':'🏆' };
    function chainFor(insights){
      // Prefer a caffeine/sleep/recovery/training spine when the data supports it;
      // otherwise build a 3-node chain from the strongest actionable insight's A→B.
      var byId={}; insights.forEach(function(i){ byId[i.id]=i; });
      var spine=[];
      if(byId['caflate-sleep']||byId['caf-sleep']) spine.push('caffeine');
      if(byId['caflate-sleep']||byId['caf-sleep']||byId['sleep-energy']||byId['train-sleep']) spine.push('sleep');
      if(byId['sleep-energy']){ /* energy handled below */ }
      if(byId['prot-rec']||byId['water-rec']||byId['carb-rec']||byId['caf-rec']||byId['vol-rec']||byId['rec-energy']) spine.push('recovery');
      if(byId['rec-pr']||byId['rec-vol']||byId['qual-vol']) spine.push('training');
      // de-dup consecutive
      spine=spine.filter(function(x,i){ return i===0||spine[i-1]!==x; });
      if(spine.length>=3) return { nodes:spine, cap:'Each link here is a pattern that held up in your own data — pull one lever and it ripples down the chain.' };
      // fallback: A → B of the strongest actionable gradeable insight
      var f=null; for(var j=0;j<insights.length;j++){ if(insights[j].action&&hypById(insights[j].id)){ f=insights[j]; break; } }
      if(f){ var h=hypById(f.id); return { nodes:[noun(h.A), noun(h.B)], cap:stripDot(f.text)+'.' }; }
      return null;
    }

    function heroFocusHTML(rec, insights, rows){
      var c=dm(rec.domain).c;
      var whyIns=null; for(var i=0;i<insights.length;i++){ if(insights[i].id===rec.id){ whyIns=insights[i]; break; } }
      var whyTx = whyIns ? stripDot(whyIns.text)+'.' : stripDot(rec.text)+'.';
      var body='<div class="fx" style="--co:'+c+'">'+
        '<span class="em">'+esc(rec.emoji||'●')+'</span>'+
        '<div class="fx-action">'+esc(rec.action||rec.text)+'</div>'+
        '<div class="fx-why"><b>Why</b> — '+esc(whyTx)+'</div>';
      if(rec.accepted){
        var ad=adherence(rec, rows);
        var adLine = ad && ad.logged>0
          ? 'On it — held it <b>'+ad.held+'/'+ad.logged+'</b> logged day'+(ad.logged===1?'':'s')+' this week.'
          : 'On it — I’ll grade this against your data when the week turns.';
        body += '<div class="fx-on"><span class="dot"></span><div class="l">'+adLine+'</div></div>'+
          '<div class="fx-btns"><button class="fx-btn ghost" data-swap="1">Change focus</button></div>';
      } else {
        body += '<div class="fx-btns"><button class="fx-btn" data-accept="1">I’m on it</button>'+
          '<button class="fx-btn ghost" data-swap="1">Swap</button></div>'+
          '<div class="fx-hint">Commit and I’ll hold you to it — next week I grade it against what your body actually did.</div>';
      }
      return body+'</div>';
    }

    function verdictHTML(v, rec){
      if(!v) return '';
      if(v.kind==='nudge') return ''; // don't grade one-off nudges
      var lab='<div class="lab"><span>Last week · '+esc(stripDot(rec.action||rec.text)).slice(0,42)+'</span></div>';
      if(v.kind==='thin'){
        return '<div class="vd miss">'+lab+'<div class="grade">Not enough logged to call it</div>'+
          '<div class="tx">Only '+ (v.logged||0) +' day'+((v.logged===1)?'':'s')+' of data last week — I won’t pretend to grade what I can’t see. Keeping the focus live.</div></div>';
      }
      var unit=UNIT[v.B]!=null?UNIT[v.B]:'';
      var move=round(Math.abs(v.outcome), v.B==='sleepH'?1:0);
      var dir=v.outcome>=0?'up':'down';
      var cls, grade, tx;
      if(v.acted && v.better){ cls='win'; grade='It worked — lock it in';
        tx='You moved your '+noun(v.A)+' the right way, and your '+noun(v.B)+' went '+dir+' about '+move+unit+' versus your baseline. That’s real. Keep it as a habit.'; }
      else if(v.acted){ cls='hold'; grade='You did the work';
        tx='Your '+noun(v.A)+' shifted the right way, but '+noun(v.B)+' hasn’t clearly moved yet ('+ (v.outcome>=0?'+':'') +move+unit+'). Worth one more week before we call it.'; }
      else { cls='miss'; grade='We didn’t really test it';
        tx='Your '+noun(v.A)+' didn’t change much last week, so there’s nothing to judge. Want to give this focus a real run?'; }
      return '<div class="vd '+cls+'">'+lab+'<div class="grade">'+esc(grade)+'</div><div class="tx">'+esc(tx)+'</div></div>';
    }

    function cardHTML(i){
      var d=dm(i.domain), c=d.c;
      var strengthPct=Math.round(clamp(i.strength||0,0,1)*100);
      var act=i.action
        ? '<div class="act"><b>DO</b> '+esc(i.action)+'<span class="go">'+(d.l?d.l+' →':'→')+'</span></div>'
        : (d.l?'<div class="act"><span class="go" style="margin-left:0">'+d.l+' →</span></div>':'');
      return '<a class="co-card co-anim" href="'+d.p+'" style="--cc:'+c+'">'+
        '<div class="top"><span class="em" style="color:#3FE0B0">●</span>'+
        '<span class="conf">'+confLabel(i)+'<span class="bar"><i style="width:'+strengthPct+'%"></i></span></span></div>'+
        '<div class="tx">'+esc(i.text)+'</div>'+act+'</a>';
    }
    function fcHTML(f){ return '<div class="co-fc co-anim"><span class="em"><svg viewBox="0 0 24 24" width="15" height="15" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="8.5"/><circle cx="12" cy="12" r="4.5"/><circle cx="12" cy="12" r="0.5"/></svg></span><div class="tx">'+esc(f.text)+'</div></div>'; }
    function chainHTML(ch){
      if(!ch) return '';
      var nodes=ch.nodes.map(function(n){ return '<div class="chn-node"><span class="em">'+(CHAIN_ICON[n]||'●')+'</span><span class="nm">'+esc(n.charAt(0).toUpperCase()+n.slice(1))+'</span></div>'; });
      return '<div class="chn">'+nodes.join('<span class="chn-arrow">→</span>')+'</div><div class="chn-cap">'+esc(ch.cap)+'</div>';
    }

    function toast(m){ var t=$('coToast'); t.textContent=m; t.classList.add('show'); clearTimeout(t._tm); t._tm=setTimeout(function(){ t.classList.remove('show'); },1800); }

    // ── build ──
    var _insights=[], _rows={};
    function build(){
      var insights=[], forecasts=[];
      try{ if(window.ALSInsights) insights=window.ALSInsights.compute()||[]; }catch(e){}
      try{ if(window.ALSForecast) forecasts=window.ALSForecast.compute()||[]; }catch(e){}
      var rows=engineRows();
      _insights=insights; _rows=rows;

      $('coState').textContent=stateLine();

      var store=focusStore();
      var wk=dkOf(weekStart(new Date()));

      // grade last week (if there was a focus and we haven't rolled past it)
      var prevWk=addDaysKey(wk,-7), prev=store[prevWk], verdict=null;
      if(prev) verdict=gradeFocus(prev, rows);

      // this week's focus — propose + persist a record so there is continuity;
      // Accept flips it to committed. Only write when something actually changes.
      var cur=store[wk];
      if(!cur && insights.length){
        var pf=pickFocus(insights);
        if(pf){ cur=focusRecord(pf, wk); store[wk]=cur; save(FKEY, store); }
      }

      // empty state
      if(!insights.length){
        var days=0; try{ days=Object.keys(rows).length; }catch(e){}
        $('coEmptyWrap').innerHTML='<div class="co-empty co-anim"><div class="em"><svg viewBox="0 0 24 24" width="34" height="34" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><path d="M9.5 4.5A3.5 3.5 0 0 0 6 8a3.3 3.3 0 0 0-2 3.2 3.4 3.4 0 0 0 1.6 3A3.5 3.5 0 0 0 9 19.5c1.4 0 2.6-.8 3-2V6.7a3.4 3.4 0 0 0-2.5-2.2zM14.5 4.5A3.5 3.5 0 0 1 18 8a3.3 3.3 0 0 1 2 3.2 3.4 3.4 0 0 1-1.6 3A3.5 3.5 0 0 1 15 19.5c-1.4 0-2.6-.8-3-2"/></svg></div>'+
          '<div class="t">No strong patterns yet — I only surface things that are statistically real, never guesses.</div>'+
          '<div class="s">'+(days<14?('I’ve got '+days+' day'+(days===1?'':'s')+' logged. Keep going for ~2 weeks and I’ll start connecting the dots.'):'Your habits look steady, or the signal’s still noisy. Keep logging — patterns sharpen with more data.')+'</div></div>';
        $('coWeekWrap').innerHTML='';
        $('coChainSec').classList.add('hidden'); $('coChain').innerHTML='';
      } else {
        $('coEmptyWrap').innerHTML='';
        if(cur && cur.accepted) persistTopInsight({ emoji:cur.emoji, text:cur.text, action:cur.action, domain:cur.domain, strength:1 });
        else if(insights[0]) persistTopInsight(insights[0]);

        // THIS WEEK card
        var streak=focusStreak(store), logged=loggedDaysThisWeek(rows);
        var wkHtml='<div class="wk co-anim"><div class="wk-hd"><span class="t">This week · your focus</span><span class="r">'+(streak>0?(streak+'-week streak'):'')+'</span></div>';
        wkHtml += verdictHTML(verdict, prev);
        if(cur) wkHtml += heroFocusHTML(cur, insights, rows);
        wkHtml += '<div class="wk-chips">'+
          '<div class="wk-chip"><div class="v">'+logged+'<small>/7</small></div><div class="l">days logged</div></div>'+
          '<div class="wk-chip"><div class="v">'+insights.length+'</div><div class="l">live patterns</div></div>'+
          '<div class="wk-chip"><div class="v">'+streak+'</div><div class="l">week streak</div></div>'+
          '</div>';
        wkHtml += '</div>';
        $('coWeekWrap').innerHTML=wkHtml;

        // why-chain
        var ch=chainFor(insights);
        if(ch){ $('coChainSec').classList.remove('hidden'); $('coChain').innerHTML=chainHTML(ch); }
        else { $('coChainSec').classList.add('hidden'); $('coChain').innerHTML=''; }
      }

      // briefing
      $('coBrief').innerHTML = briefing(insights, cur, verdict);

      // evidence (everything except the one that's the current focus)
      var rest=insights.filter(function(x){ return !cur || x.id!==cur.id; });
      if(rest.length){ $('coPatSec').classList.remove('hidden'); $('coPatterns').innerHTML=rest.map(cardHTML).join(''); }
      else { $('coPatSec').classList.add('hidden'); $('coPatterns').innerHTML=''; }

      // forecasts
      if(forecasts.length){ $('coFcSec').classList.remove('hidden'); $('coForecasts').innerHTML=forecasts.map(fcHTML).join(''); }
      else { $('coFcSec').classList.add('hidden'); $('coForecasts').innerHTML=''; }

      $('coFoot').textContent='Your focus is graded against your own data — nothing here is medical advice, and no number is invented.';
    }

    // ── actions ──
    function acceptFocus(){
      var store=focusStore(), wk=dkOf(weekStart(new Date())), cur=store[wk];
      if(!cur) return;
      cur.accepted=true; cur.ts=Date.now(); store[wk]=cur; save(FKEY, store);
      toast('Locked in. I’ll hold you to it.'); build();
    }
    function swapFocus(){
      var store=focusStore(), wk=dkOf(weekStart(new Date())), cur=store[wk];
      var next=pickFocus(_insights, cur&&cur.id);
      if(!next){ toast('No other pattern strong enough right now.'); return; }
      var rec=focusRecord(next, wk); rec.accepted = !!(cur&&cur.accepted); // swapping while committed keeps the commitment
      store[wk]=rec; save(FKEY, store);
      toast(rec.accepted?'Focus swapped — still on it.':'New focus proposed.'); build();
    }

    document.addEventListener('click', function(e){
      if(e.target.closest('[data-accept]')){ acceptFocus(); }
      else if(e.target.closest('[data-swap]')){ swapFocus(); }
    });

    if(document.readyState==='loading') window.addEventListener('DOMContentLoaded', build, { once:true }); else build();
    document.addEventListener('visibilitychange', function(){ if(!document.hidden) build(); });
    if(window.initCloudSync) window.initCloudSync({ appKey:'coach', syncedKeys:[FKEY], onApplied:function(){ build(); } });
    else window.addEventListener('load', function(){ if(window.initCloudSync) window.initCloudSync({ appKey:'coach', syncedKeys:[FKEY], onApplied:function(){ build(); } }); });
  })();
  </script>
</body>
